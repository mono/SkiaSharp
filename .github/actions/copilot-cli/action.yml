name: 'Copilot CLI'
description: 'Install and run the GitHub Copilot CLI with a prompt'
inputs:
  copilot-token:
    description: 'PAT with "Copilot Requests" permission (GITHUB_TOKEN does NOT work)'
    required: true
  prompt:
    description: 'Prompt to send to Copilot'
    required: true
  model:
    description: 'Model to use (e.g., "claude-opus-4.6", "claude-sonnet-4.5", "gpt-5")'
    required: true
    default: 'claude-opus-4.6'
  mcp-config:
    description: 'MCP server configuration JSON'
    required: false
  artifact-name:
    description: 'Name for the uploaded artifact'
    required: true
    default: 'copilot-output'
outputs:
  logs-path:
    description: 'Path to copilot logs'
    value: ${{ steps.copilot.outputs.logs_path }}
  exit-code:
    description: 'Exit code from copilot'
    value: ${{ steps.copilot.outputs.exit_code }}
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Run Copilot CLI
      id: copilot
      shell: bash
      run: |
        echo "::group::Install Copilot CLI"
        npm install -g @github/copilot
        echo "CLI Version: $(copilot --version)"
        echo "::endgroup::"

        # Configure MCP servers
        if [ -n "$MCP_CONFIG" ]; then
          echo "::group::Configure MCP"
          mkdir -p ${XDG_CONFIG_HOME:-$HOME/.config}/.copilot
          CONFIG_DIR="${XDG_CONFIG_HOME:-$HOME/.config}/.copilot"
          echo "$MCP_CONFIG" > "$CONFIG_DIR/mcp-config.json"
          cat "$CONFIG_DIR/mcp-config.json"
          echo "::endgroup::"
        fi

        echo "::group::Run Copilot CLI"
        set +e
        copilot -p "$PROMPT" --yolo --model $MODEL --log-level all --log-dir $HOME/.copilot/logs --screen-reader --no-color --stream off
        EXIT_CODE=$?
        set -e
        echo "::endgroup::"

        echo "logs_path=$HOME/.copilot/logs" >> $GITHUB_OUTPUT
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ github.token }}
        COPILOT_GITHUB_TOKEN: ${{ inputs.copilot-token }}
        PROMPT: ${{ inputs.prompt }}
        COPILOT_VERSION: ${{ inputs.copilot-version }}
        MCP_CONFIG: ${{ inputs.mcp-config }}
        MODEL: ${{ inputs.model }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() && inputs.upload-artifact == 'true' }}
      with:
        name: ${{ inputs.artifact-name }}-${{ github.run_id }}-${{ github.run_attempt }}
        path: ~/.copilot/logs
        if-no-files-found: warn
