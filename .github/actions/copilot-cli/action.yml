name: 'Copilot CLI'
description: 'Install and run the GitHub Copilot CLI with a prompt (cross-platform)'
inputs:
  copilot-token:
    description: 'PAT with "Copilot Requests" permission (GITHUB_TOKEN does NOT work)'
    required: true
  prompt:
    description: 'Prompt to send to Copilot'
    required: true
  model:
    description: 'Model to use (e.g., "claude-opus-4.6", "claude-sonnet-4.5", "gpt-5")'
    required: true
    default: 'claude-opus-4.6'
  mcp-config:
    description: 'MCP server configuration JSON'
    required: false
  artifact-name:
    description: 'Name for the uploaded artifact'
    required: true
    default: 'copilot-output'
outputs:
  logs-path:
    description: 'Path to copilot logs'
    value: ${{ steps.copilot.outputs.logs_path }}
  exit-code:
    description: 'Exit code from copilot'
    value: ${{ steps.copilot.outputs.exit_code }}
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Run Copilot CLI
      id: copilot
      shell: bash
      run: |
        echo "::group::Install Copilot CLI"
        npm install -g @github/copilot
        echo "CLI Version: $(copilot --version)"
        echo "::endgroup::"

        # Cross-platform log directory (RUNNER_TEMP is set by GitHub on all OSes)
        LOG_DIR="$RUNNER_TEMP/copilot-logs"
        mkdir -p "$LOG_DIR"

        # Cross-platform MCP config
        if [ -n "$MCP_CONFIG" ]; then
          echo "::group::Configure MCP"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            CONFIG_DIR="$APPDATA/.copilot"
          else
            CONFIG_DIR="${XDG_CONFIG_HOME:-$HOME/.config}/.copilot"
          fi
          mkdir -p "$CONFIG_DIR"
          echo "$MCP_CONFIG" > "$CONFIG_DIR/mcp-config.json"
          cat "$CONFIG_DIR/mcp-config.json"
          echo "::endgroup::"
        fi

        echo "::group::Run Copilot CLI"
        set +e
        copilot -p "$PROMPT" --yolo --model "$MODEL" --log-level all --log-dir "$LOG_DIR" --screen-reader --no-color --stream off
        EXIT_CODE=$?
        set -e
        echo "::endgroup::"

        echo "logs_path=$LOG_DIR" >> "$GITHUB_OUTPUT"
        echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ github.token }}
        COPILOT_GITHUB_TOKEN: ${{ inputs.copilot-token }}
        PROMPT: ${{ inputs.prompt }}
        MCP_CONFIG: ${{ inputs.mcp-config }}
        MODEL: ${{ inputs.model }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ inputs.artifact-name }}-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ steps.copilot.outputs.logs_path }}
        if-no-files-found: warn
