name: AI Triage and Reproduction

# Two-stage workflow:
# Stage 1: Triage on Linux → classify issue, determine repro platform
# Stage 2: Reproduce on the appropriate platform (linux/macos/windows)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage and reproduce'
        required: true
        type: string

  issue_comment:
    types: [created]

  # Self-test: trigger on workflow/action file changes
  push:
    paths:
      - '.github/workflows/triage-and-repro.yml'
      - '.github/actions/copilot-cli/**'

permissions:
  contents: write
  issues: write
  pull-requests: write

# MCP config shared across all Copilot invocations
env:
  MCP_CONFIG: |
    {
      "mcpServers": {
        "mslearn": {
          "tools": ["*"],
          "type": "http",
          "url": "https://learn.microsoft.com/api/mcp",
          "headers": {}
        },
        "playwright": {
          "type": "local",
          "command": "npx",
          "tools": ["*"],
          "args": ["-y", "@playwright/mcp@latest"]
        }
      }
    }

jobs:
  # ===========================================================================
  # Stage 1: AI Triage (always Linux)
  # ===========================================================================
  triage:
    name: AI Triage
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'issue_comment' &&
        !github.event.issue.pull_request &&
        (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR') &&
        startsWith(github.event.comment.body, '/triage-and-repro')
      )

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      issue_number: ${{ steps.issue.outputs.issue_number }}

    steps:
      - name: Determine issue number
        id: issue
        shell: pwsh
        run: |
          $issueNum = switch ('${{ github.event_name }}') {
            'workflow_dispatch' { '${{ inputs.issue_number }}' }
            'push'             { '3520' }
            default            { '${{ github.event.issue.number }}' }
          }
          if ($issueNum -notmatch '^\d+$') {
            Write-Error "Invalid issue number: '$issueNum'"
            exit 1
          }
          "issue_number=$issueNum" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Processing issue #$issueNum"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure git identity
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Fetch data-cache branch
        shell: pwsh
        run: |
          git fetch origin docs-data-cache:docs-data-cache
          git branch --set-upstream-to=origin/docs-data-cache docs-data-cache

      - name: Run AI triage
        uses: ./.github/actions/copilot-cli
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          prompt: 'triage issue #${{ steps.issue.outputs.issue_number }}'
          model: 'claude-opus-4.6'
          mcp-config: ${{ env.MCP_CONFIG }}
          artifact-name: 'triage-${{ steps.issue.outputs.issue_number }}'

      - name: Build repro matrix
        id: matrix
        shell: pwsh
        run: |
          $triageFile = '/tmp/skiasharp/triage/${{ steps.issue.outputs.issue_number }}.json'
          $result = .github/skills/issue-triage/scripts/extract-platform.ps1 -TriageFile $triageFile

          $runners = @{
            linux   = 'ubuntu-latest'
            macos   = 'macos-latest'
            windows = 'windows-latest'
          }

          if ($result.NeedsRepro -eq 'true') {
            $matrix = @{
              include = @(
                @{ platform = $result.Platform; runner = $runners[$result.Platform] }
              )
            }
          } else {
            $matrix = @{ include = @() }
          }

          $json = $matrix | ConvertTo-Json -Depth 3 -Compress
          Write-Host "Matrix: $json"
          "matrix=$json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload triage JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triage-output
          path: /tmp/skiasharp/triage/
          retention-days: 7
          if-no-files-found: warn

  # ===========================================================================
  # Stage 2: Reproduce on target platform (dynamic matrix from triage)
  # ===========================================================================

  repro:
    name: Reproduce (${{ matrix.platform }})
    needs: triage
    if: ${{ fromJSON(needs.triage.outputs.matrix).include[0] != null }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJSON(needs.triage.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure git identity
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Fetch data-cache branch
        shell: pwsh
        run: |
          git fetch origin docs-data-cache:docs-data-cache
          git branch --set-upstream-to=origin/docs-data-cache docs-data-cache

      - name: Run AI reproduction
        uses: ./.github/actions/copilot-cli
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          prompt: 'reproduce issue #${{ needs.triage.outputs.issue_number }}'
          model: 'claude-opus-4.6'
          mcp-config: ${{ env.MCP_CONFIG }}
          artifact-name: 'repro-${{ matrix.platform }}-${{ needs.triage.outputs.issue_number }}'

      - name: Upload repro JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-output-${{ matrix.platform }}
          path: /tmp/skiasharp/repro/
          retention-days: 7
          if-no-files-found: warn
