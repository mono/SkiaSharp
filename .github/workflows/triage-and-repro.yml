name: AI Triage and Reproduction

# Two-stage workflow:
# Stage 1: Triage on Linux → classify issue, determine repro platform
# Stage 2: Reproduce on the appropriate platform (linux/macos/windows)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage and reproduce'
        required: true
        type: string

  issue_comment:
    types: [created]

  # Self-test: trigger on workflow/action file changes
  push:
    paths:
      - '.github/workflows/triage-and-repro.yml'
      - '.github/actions/copilot-cli/**'

permissions:
  contents: read
  issues: write
  pull-requests: write
  models: read

# MCP config shared across all Copilot invocations
env:
  MCP_CONFIG: |
    {
      "mcpServers": {
        "mslearn": {
          "tools": ["*"],
          "type": "http",
          "url": "https://learn.microsoft.com/api/mcp",
          "headers": {}
        },
        "playwright": {
          "type": "local",
          "command": "npx",
          "tools": ["*"],
          "args": ["-y", "@playwright/mcp@latest", "--browser", "webkit"]
        }
      }
    }

jobs:
  # ===========================================================================
  # Stage 1: AI Triage (always Linux)
  # ===========================================================================
  triage:
    name: AI Triage
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'issue_comment' &&
        !github.event.issue.pull_request &&
        (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR') &&
        startsWith(github.event.comment.body, '/triage-and-repro')
      )

    outputs:
      repro_platform: ${{ steps.extract.outputs.platform }}
      needs_repro: ${{ steps.extract.outputs.needs_repro }}
      issue_number: ${{ steps.issue.outputs.issue_number }}

    steps:
      - name: Determine issue number
        id: issue
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUM="${{ inputs.issue_number }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            ISSUE_NUM="3520"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi
          if ! [[ "$ISSUE_NUM" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid issue number: '$ISSUE_NUM'" && exit 1
          fi
          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          echo "📋 Processing issue #$ISSUE_NUM"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run AI triage
        uses: ./.github/actions/copilot-cli
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          prompt: 'triage issue #${{ steps.issue.outputs.issue_number }}'
          model: 'claude-opus-4.6'
          mcp-config: ${{ env.MCP_CONFIG }}
          artifact-name: 'triage-${{ steps.issue.outputs.issue_number }}'

      - name: Extract platform from triage
        id: extract
        shell: bash
        run: |
          ISSUE_NUM="${{ steps.issue.outputs.issue_number }}"
          TRIAGE_FILE="/tmp/skiasharp/triage/${ISSUE_NUM}.json"
          # Triage always runs on Linux, so /tmp is fine here

          if [ -f "$TRIAGE_FILE" ]; then
            PLATFORM=$(jq -r '.output.actionability.suggestedReproPlatform // "linux"' "$TRIAGE_FILE")
            PLATFORM=${PLATFORM,,}
            case "$PLATFORM" in
              linux|macos|windows) ;;
              *) echo "⚠ Unknown platform '$PLATFORM', defaulting to linux"; PLATFORM="linux" ;;
            esac

            ACTION=$(jq -r '.output.actionability.suggestedAction // ""' "$TRIAGE_FILE")
            NEEDS_REPRO=$( [ "$ACTION" = "needs-investigation" ] && echo "true" || echo "false" )

            echo "platform=$PLATFORM" >> $GITHUB_OUTPUT
            echo "needs_repro=$NEEDS_REPRO" >> $GITHUB_OUTPUT
            echo "✓ Triage: platform=$PLATFORM, needs_repro=$NEEDS_REPRO, action=$ACTION"
          else
            echo "⚠ Triage file not found — defaults"
            echo "platform=linux" >> $GITHUB_OUTPUT
            echo "needs_repro=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload triage JSON
        if: steps.extract.outputs.needs_repro == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: triage-output
          path: /tmp/skiasharp/triage/
          retention-days: 7

  # ===========================================================================
  # Stage 2: Reproduce on target platform
  # ===========================================================================

  repro-linux:
    name: Reproduce (Linux)
    runs-on: ubuntu-latest
    needs: triage
    if: needs.triage.outputs.needs_repro == 'true' && needs.triage.outputs.repro_platform == 'linux'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          name: triage-output
          path: /tmp/skiasharp/triage/
      - name: Run AI reproduction
        uses: ./.github/actions/copilot-cli
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          prompt: 'reproduce issue #${{ needs.triage.outputs.issue_number }}'
          model: 'claude-opus-4.6'
          mcp-config: ${{ env.MCP_CONFIG }}
          artifact-name: 'repro-linux-${{ needs.triage.outputs.issue_number }}'

  repro-macos:
    name: Reproduce (macOS)
    runs-on: macos-latest
    needs: triage
    if: needs.triage.outputs.needs_repro == 'true' && needs.triage.outputs.repro_platform == 'macos'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          name: triage-output
          path: /tmp/skiasharp/triage/
      - name: Run AI reproduction
        uses: ./.github/actions/copilot-cli
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          prompt: 'reproduce issue #${{ needs.triage.outputs.issue_number }}'
          model: 'claude-opus-4.6'
          mcp-config: ${{ env.MCP_CONFIG }}
          artifact-name: 'repro-macos-${{ needs.triage.outputs.issue_number }}'

  repro-windows:
    name: Reproduce (Windows)
    runs-on: windows-latest
    needs: triage
    if: needs.triage.outputs.needs_repro == 'true' && needs.triage.outputs.repro_platform == 'windows'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download triage artifact
        uses: actions/download-artifact@v4
        with:
          name: triage-output
          path: ${{ runner.temp }}/skiasharp/triage/
      - name: Copy triage to /tmp for skill compatibility
        shell: bash
        run: |
          # Skills expect /tmp/skiasharp/triage/ — on Windows Git Bash, /tmp maps
          # to a real temp dir, so create the expected structure
          mkdir -p /tmp/skiasharp/triage
          cp -r "$RUNNER_TEMP/skiasharp/triage/"* /tmp/skiasharp/triage/ 2>/dev/null || true
      - name: Run AI reproduction
        uses: ./.github/actions/copilot-cli
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          prompt: 'reproduce issue #${{ needs.triage.outputs.issue_number }}'
          model: 'claude-opus-4.6'
          mcp-config: ${{ env.MCP_CONFIG }}
          artifact-name: 'repro-windows-${{ needs.triage.outputs.issue_number }}'
