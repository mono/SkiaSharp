name: AI Triage and Reproduction

# Four-stage pipeline:
# 1. Setup: Parse issue number(s) into a matrix
# 2. Triage: Classify each issue in parallel on Linux
# 3. Build repro matrix: Aggregate triage results into repro matrix
# 4. Reproduce: Run reproduction on the appropriate platform per issue

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number(s) — comma or space separated (e.g. "3520, 3521" or "3520 3521 #3400")'
        required: true
        type: string

  issue_comment:
    types: [created]

  # Self-test: trigger on workflow/action file changes
  push:
    paths:
      - '.github/workflows/triage-and-repro.yml'
      - '.github/actions/copilot-cli/**'

permissions:
  contents: write
  issues: write
  pull-requests: write

# MCP config shared across all Copilot invocations
env:
  MCP_CONFIG: |
    {
      "mcpServers": {
        "mslearn": {
          "tools": ["*"],
          "type": "http",
          "url": "https://learn.microsoft.com/api/mcp",
          "headers": {}
        },
        "playwright": {
          "type": "local",
          "command": "npx",
          "tools": ["*"],
          "args": ["-y", "@playwright/mcp@latest"]
        }
      }
    }

jobs:
  # ===========================================================================
  # Stage 0: Parse issue numbers into a matrix
  # ===========================================================================
  setup:
    name: Parse Issues
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'issue_comment' &&
        !github.event.issue.pull_request &&
        (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR') &&
        startsWith(github.event.comment.body, '/triage-and-repro')
      )

    outputs:
      issue_matrix: ${{ steps.parse.outputs.issue_matrix }}

    steps:
      - name: Parse issue numbers
        id: parse
        shell: pwsh
        run: |
          $raw = switch ('${{ github.event_name }}') {
            'workflow_dispatch' { '${{ inputs.issue_number }}' }
            'push'             { '3520' }
            default            { '${{ github.event.issue.number }}' }
          }

          # Split on commas and/or whitespace, strip # prefixes, filter to digits
          $issues = $raw -split '[,\s]+' |
            ForEach-Object { $_ -replace '^#', '' } |
            Where-Object { $_ -match '^\d+$' } |
            Select-Object -Unique

          if ($issues.Count -eq 0) {
            Write-Error "No valid issue numbers found in: '$raw'"
            exit 1
          }

          $matrix = @{
            include = @($issues | ForEach-Object { @{ issue = $_ } })
          }
          $json = $matrix | ConvertTo-Json -Depth 3 -Compress
          Write-Host "Issues: $($issues -join ', ') ($($issues.Count) total)"
          Write-Host "Matrix: $json"
          "issue_matrix=$json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  # ===========================================================================
  # Stage 1: AI Triage (parallel, one per issue, always Linux)
  # ===========================================================================
  triage:
    name: Triage #${{ matrix.issue }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.issue_matrix) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure git identity
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Fetch data-cache branch
        shell: pwsh
        run: |
          git fetch origin docs-data-cache:docs-data-cache
          git branch --set-upstream-to=origin/docs-data-cache docs-data-cache

      - name: Run AI triage
        uses: ./.github/actions/copilot-cli
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          prompt: 'triage issue #${{ matrix.issue }}'
          model: 'claude-opus-4.6'
          mcp-config: ${{ env.MCP_CONFIG }}
          artifact-name: 'triage-${{ matrix.issue }}'

      - name: Upload triage JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triage-output-${{ matrix.issue }}
          path: /tmp/skiasharp/triage/
          retention-days: 7
          if-no-files-found: warn

  # ===========================================================================
  # Stage 2: Aggregate triage results into a repro matrix
  # ===========================================================================
  build-repro-matrix:
    name: Build Repro Matrix
    needs: triage
    runs-on: ubuntu-latest
    if: always() && needs.triage.result != 'cancelled'

    outputs:
      repro_matrix: ${{ steps.matrix.outputs.repro_matrix }}

    steps:
      - name: Checkout (for extract-platform script)
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/skills/issue-triage/scripts

      - name: Download all triage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: triage-output-*
          path: ${{ runner.temp }}/triage-artifacts
          merge-multiple: true

      - name: Build repro matrix from triage results
        id: matrix
        shell: pwsh
        run: |
          $runners = @{
            linux   = 'ubuntu-latest'
            macos   = 'macos-latest'
            windows = 'windows-latest'
          }

          $includes = @()
          $triageFiles = Get-ChildItem '${{ runner.temp }}/triage-artifacts' -Filter '*.json' -ErrorAction SilentlyContinue

          foreach ($file in $triageFiles) {
            Write-Host "Processing: $($file.Name)"
            try {
              $result = .github/skills/issue-triage/scripts/extract-platform.ps1 -TriageFile $file.FullName
              $issue = $file.BaseName  # e.g. "3520" from "3520.json"
              if ($result.NeedsRepro -eq 'true') {
                $includes += @{
                  issue    = $issue
                  platform = $result.Platform
                  runner   = $runners[$result.Platform]
                }
                Write-Host "  → Repro needed: $($result.Platform) for #$issue"
              } else {
                Write-Host "  → No repro needed for #$issue (action: $($result.Action))"
              }
            } catch {
              Write-Host "  ⚠️ Failed to process $($file.Name): $_"
            }
          }

          $matrix = @{ include = $includes }
          $json = $matrix | ConvertTo-Json -Depth 3 -Compress
          Write-Host "Repro matrix: $json"
          "repro_matrix=$json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  # ===========================================================================
  # Stage 3: Reproduce on target platform (dynamic matrix from triage results)
  # ===========================================================================
  repro:
    name: Repro #${{ matrix.issue }} (${{ matrix.platform }})
    needs: build-repro-matrix
    if: ${{ fromJSON(needs.build-repro-matrix.outputs.repro_matrix).include[0] != null }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJSON(needs.build-repro-matrix.outputs.repro_matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure git identity
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Fetch data-cache branch
        shell: pwsh
        run: |
          git fetch origin docs-data-cache:docs-data-cache
          git branch --set-upstream-to=origin/docs-data-cache docs-data-cache

      - name: Run AI reproduction
        uses: ./.github/actions/copilot-cli
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          prompt: 'reproduce issue #${{ matrix.issue }}'
          model: 'claude-opus-4.6'
          mcp-config: ${{ env.MCP_CONFIG }}
          artifact-name: 'repro-${{ matrix.platform }}-${{ matrix.issue }}'

      - name: Upload repro JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-output-${{ matrix.platform }}-${{ matrix.issue }}
          path: /tmp/skiasharp/repro/
          retention-days: 7
          if-no-files-found: warn
