name: AI Triage and Reproduction

# Two-stage workflow:
# Stage 1: Triage on Linux → classify issue, determine repro platform
# Stage 2: Reproduce on the appropriate platform (linux/macos/windows)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage and reproduce'
        required: true
        type: string

  issue_comment:
    types: [created]

  # Self-test: trigger on workflow/action file changes
  push:
    paths:
      - '.github/workflows/triage-and-repro.yml'
      - '.github/actions/copilot-cli/**'

permissions:
  contents: read
  issues: write
  pull-requests: write
  models: read

# MCP config shared across all Copilot invocations
env:
  MCP_CONFIG: |
    {
      "mcpServers": {
        "mslearn": {
          "tools": ["*"],
          "type": "http",
          "url": "https://learn.microsoft.com/api/mcp",
          "headers": {}
        },
        "playwright": {
          "type": "local",
          "command": "npx",
          "tools": ["*"],
          "args": ["-y", "@playwright/mcp@latest"]
        }
      }
    }

jobs:
  # ===========================================================================
  # Stage 1: AI Triage (always Linux)
  # ===========================================================================
  triage:
    name: AI Triage
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'issue_comment' &&
        !github.event.issue.pull_request &&
        (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR') &&
        startsWith(github.event.comment.body, '/triage-and-repro')
      )

    outputs:
      repro_platform: ${{ steps.extract.outputs.platform }}
      needs_repro: ${{ steps.extract.outputs.needs_repro }}
      issue_number: ${{ steps.issue.outputs.issue_number }}

    steps:
      - name: Determine issue number
        id: issue
        shell: pwsh
        run: |
          $issueNum = switch ('${{ github.event_name }}') {
            'workflow_dispatch' { '${{ inputs.issue_number }}' }
            'push'             { '3520' }
            default            { '${{ github.event.issue.number }}' }
          }
          if ($issueNum -notmatch '^\d+$') {
            Write-Error "Invalid issue number: '$issueNum'"
            exit 1
          }
          "issue_number=$issueNum" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Processing issue #$issueNum"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run AI triage
        uses: ./.github/actions/copilot-cli
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          prompt: 'triage issue #${{ steps.issue.outputs.issue_number }}'
          model: 'claude-opus-4.6'
          mcp-config: ${{ env.MCP_CONFIG }}
          artifact-name: 'triage-${{ steps.issue.outputs.issue_number }}'

      - name: Extract platform from triage
        id: extract
        shell: pwsh
        run: |
          $triageFile = '/tmp/skiasharp/triage/${{ steps.issue.outputs.issue_number }}.json'
          .github/skills/issue-triage/scripts/extract-platform.ps1 -TriageFile $triageFile

      - name: Upload triage JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triage-output
          path: /tmp/skiasharp/triage/
          retention-days: 7
          if-no-files-found: warn

  # ===========================================================================
  # Stage 2: Reproduce on target platform
  # ===========================================================================

  repro-linux:
    name: Reproduce (Linux)
    runs-on: ubuntu-latest
    needs: triage
    if: needs.triage.outputs.needs_repro == 'true' && needs.triage.outputs.repro_platform == 'linux'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          name: triage-output
          path: /tmp/skiasharp/triage/
      - name: Run AI reproduction
        uses: ./.github/actions/copilot-cli
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          prompt: 'reproduce issue #${{ needs.triage.outputs.issue_number }}'
          model: 'claude-opus-4.6'
          mcp-config: ${{ env.MCP_CONFIG }}
          artifact-name: 'repro-linux-${{ needs.triage.outputs.issue_number }}'
      - name: Upload repro JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-output-linux
          path: /tmp/skiasharp/repro/
          retention-days: 7
          if-no-files-found: warn

  repro-macos:
    name: Reproduce (macOS)
    runs-on: macos-latest
    needs: triage
    if: needs.triage.outputs.needs_repro == 'true' && needs.triage.outputs.repro_platform == 'macos'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          name: triage-output
          path: /tmp/skiasharp/triage/
      - name: Run AI reproduction
        uses: ./.github/actions/copilot-cli
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          prompt: 'reproduce issue #${{ needs.triage.outputs.issue_number }}'
          model: 'claude-opus-4.6'
          mcp-config: ${{ env.MCP_CONFIG }}
          artifact-name: 'repro-macos-${{ needs.triage.outputs.issue_number }}'
      - name: Upload repro JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-output-macos
          path: /tmp/skiasharp/repro/
          retention-days: 7
          if-no-files-found: warn

  repro-windows:
    name: Reproduce (Windows)
    runs-on: windows-latest
    needs: triage
    if: needs.triage.outputs.needs_repro == 'true' && needs.triage.outputs.repro_platform == 'windows'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download triage artifact
        uses: actions/download-artifact@v4
        with:
          name: triage-output
          path: ${{ runner.temp }}/skiasharp/triage/
      - name: Copy triage to /tmp for skill compatibility
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path '/tmp/skiasharp/triage' | Out-Null
          Copy-Item "$env:RUNNER_TEMP/skiasharp/triage/*" '/tmp/skiasharp/triage/' -ErrorAction SilentlyContinue
      - name: Run AI reproduction
        uses: ./.github/actions/copilot-cli
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          prompt: 'reproduce issue #${{ needs.triage.outputs.issue_number }}'
          model: 'claude-opus-4.6'
          mcp-config: ${{ env.MCP_CONFIG }}
          artifact-name: 'repro-windows-${{ needs.triage.outputs.issue_number }}'
      - name: Upload repro JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-output-windows
          path: |
            /tmp/skiasharp/repro/
            ${{ runner.temp }}/skiasharp/repro/
          retention-days: 7
          if-no-files-found: warn
