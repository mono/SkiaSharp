name: Deploy Landing Page

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/build-landing.yml'
  pull_request:
    paths:
      - 'site/**'
      - '.github/workflows/build-landing.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment
        shell: bash
        run: |
          WORK_DIR=$(mktemp -d)
          REMOTE_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          BRANCH="docs-live"

          # Clone existing docs-live to preserve subdirectories
          if git ls-remote --exit-code "$REMOTE_URL" "refs/heads/$BRANCH" > /dev/null 2>&1; then
            git clone --depth=1 --branch "$BRANCH" "$REMOTE_URL" "$WORK_DIR"
          else
            git init "$WORK_DIR"
            git -C "$WORK_DIR" checkout -b "$BRANCH"
          fi

          # Remove old DocFX root files (they've moved to docs/ subdirectory)
          rm -f "$WORK_DIR/index.html"
          rm -f "$WORK_DIR/index.json"
          rm -f "$WORK_DIR/TOC.html"
          rm -f "$WORK_DIR/TOC.json"
          rm -f "$WORK_DIR/xrefmap.yml"
          rm -f "$WORK_DIR/manifest.json"
          rm -f "$WORK_DIR/logo.svg"
          rm -f "$WORK_DIR/favicon.ico"
          rm -rf "$WORK_DIR/public"
          rm -rf "$WORK_DIR/images"

          # Copy landing page files to root
          cp site/index.html "$WORK_DIR/"
          cp site/style.css "$WORK_DIR/"
          cp site/404.html "$WORK_DIR/"

          # Ensure .nojekyll exists
          touch "$WORK_DIR/.nojekyll"

          git -C "$WORK_DIR" config user.name "github-actions[bot]"
          git -C "$WORK_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$WORK_DIR" add -A
          git -C "$WORK_DIR" commit --allow-empty -m "Deploy landing page - ${{ github.sha }}"

          DRY_RUN="false"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DRY_RUN="true"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run — skipping push."
            git -C "$WORK_DIR" show --stat HEAD
          else
            git -C "$WORK_DIR" push "$REMOTE_URL" "HEAD:refs/heads/$BRANCH"
            echo "Deployed landing page to https://mono.github.io/SkiaSharp/"
          fi

          rm -rf "$WORK_DIR"
