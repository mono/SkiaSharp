name: Sync - Issue Template Versions

on:
  schedule:
    - cron: "0 9 * * 1"  # Weekly, Mondays at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update-issue-template-versions
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SkiaSharp
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PyYAML (for validation)
        run: pip install --quiet pyyaml

      - name: Regenerate version dropdowns
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/infra/milestones/update-bug-template.py --repo "${{ github.repository }}"

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet -- .github/ISSUE_TEMPLATE/bug-report.yml; then
            echo "Version dropdowns are up to date — nothing to do"
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version dropdowns changed"
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update PR
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="automation/update-issue-template-versions"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Always start fresh from main — avoids stale commit accumulation.
          # The working-tree edit survives the branch switch because the runner's
          # HEAD already equals origin/main (no conflicting change to the file).
          git checkout -B "$BRANCH" origin/main

          git add .github/ISSUE_TEMPLATE/bug-report.yml
          if git diff --cached --quiet; then
            echo "No changes after staging"
            exit 0
          fi

          git commit -m "Update issue template version dropdowns"

          git push origin "$BRANCH" --force

          # Create PR if one doesn't already exist
          existing=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already exists, force-pushed update"
          else
            gh pr create --base main --head "$BRANCH" \
              --title "Update issue template version dropdowns" \
              --body "Automated refresh of the SkiaSharp version dropdowns in \`.github/ISSUE_TEMPLATE/bug-report.yml\`.

          The \`Version of SkiaSharp\` and \`Last Known Good Version of SkiaSharp\` option lists are regenerated from the published GitHub Releases so the **Next Preview / Previous Preview / Current / Previous / Deprecated** labels stay accurate as new packages ship. Retired majors collapse to a single \`N.x (Obsolete)\` entry (the last-known-good dropdown keeps each stable of the previous major individually).

          Generated by [\`update-bug-template.py\`](https://github.com/${{ github.repository }}/blob/main/scripts/infra/milestones/update-bug-template.py) via the [auto-update-issue-template-versions](https://github.com/${{ github.repository }}/actions/workflows/auto-update-issue-template-versions.yml) workflow."
          fi
