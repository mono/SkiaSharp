name: Track - Benchmarks

# Daily BenchmarkDotNet run on Linux/Windows/macOS, per version role:
#   * nightly       -> newest -nightly.* from the EAP feed (daily trend)
#   * curr-stable    \
#   * prev-stable     >  released baselines, resolved from nuget.org (size-tracker roles)
#   * prev-major     /
#
# Each (OS, role) leg appends to its own rolling history (kept ~60 days, 10 shown) and
# a report job renders a per-OS dashboard. Runs on a schedule, on PRs and on pushes to
# main, so every CI produces a benchmark run.
#
# A leg is SKIPPED when its "fingerprint" (pinned version + hash of the benchmark
# source) matches the last recorded one — released baselines don't change unless a new
# release bumps the role or the benchmark code changes, so there's no point re-running
# old code on old versions every day. The nightly role runs whenever a new nightly
# publishes (its version changes).
#
# Feed policy: the committed nuget.config is dnceng dotnet-public + EAP (NO nuget.org).
# Released baselines whose exact version is not on dotnet-public are restored by
# injecting nuget.org into a RUNTIME-ONLY nuget.config on the released legs (never
# committed), so the internal build system's config scan stays clean.

on:
  schedule:
    - cron: "0 8 * * *"  # Daily at 08:00 UTC (offset from the 07:00 size tracker)
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Per-ref so PRs/branches run independently; a new commit cancels the in-flight run.
  group: track-benchmarks-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  resolve:
    if: github.repository_owner == 'mono'
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.resolve.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve version roles
        id: resolve
        run: |
          echo "versions=$(python3 .github/scripts/resolve-versions.py)" >> "$GITHUB_OUTPUT"

  benchmark:
    needs: resolve
    if: github.repository_owner == 'mono'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        role: [nightly, curr-stable, prev-stable, prev-major]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      PROJECT: benchmarks/SkiaSharp.Benchmarks.Tracking
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set leg variables
        run: |
          echo "LABEL=${{ runner.os }}" >> "$GITHUB_ENV"
          echo "HISTORY=benchmarks-${{ runner.os }}-${{ matrix.role }}.json" >> "$GITHUB_ENV"
          echo "VERSION=${{ fromJSON(needs.resolve.outputs.versions)[matrix.role] }}" >> "$GITHUB_ENV"

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1

      - name: Inject nuget.org for released baseline (runtime-only)
        if: matrix.role != 'nightly'
        run: |
          cat > "$PROJECT/nuget.config" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="dotnet-public" value="https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-public/nuget/v3/index.json" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Pin version
        run: |
          python3 .github/scripts/write-version-props.py "$VERSION" "$PROJECT/version.props"

      - name: Restore history
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.HISTORY }}
          key: benchmarks-${{ runner.os }}-${{ matrix.role }}-v1-${{ github.run_id }}
          restore-keys: |
            benchmarks-${{ runner.os }}-${{ matrix.role }}-v1-

      - name: Check freshness (skip unchanged baselines)
        id: check
        run: |
          decision=$(python3 .github/scripts/track-benchmarks.py --history "$HISTORY" --version "$VERSION" --check)
          echo "skip=$([ "$decision" = skip ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "$decision: ${{ runner.os }}/${{ matrix.role }} ($VERSION)"

      - name: Run benchmarks
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ env.PROJECT }}
        run: dotnet run -c Release -- --filter '*'

      - name: Record results
        if: steps.check.outputs.skip != 'true'
        run: |
          python3 .github/scripts/track-benchmarks.py \
            --history "$HISTORY" \
            --os "$LABEL" \
            --role "${{ matrix.role }}" \
            --version "$VERSION"

      - name: Save history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.HISTORY }}
          key: benchmarks-${{ runner.os }}-${{ matrix.role }}-v1-${{ github.run_id }}

      - name: Upload history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ runner.os }}-${{ matrix.role }}
          path: ${{ env.HISTORY }}
          if-no-files-found: warn

  # "this PR / this branch" column: build SkiaSharp MANAGED from the checkout and
  # benchmark it against the nightly's native binaries. Reflects the branch's managed
  # changes (marshalling / allocations / wrapper hot paths). A from-scratch native
  # Skia build is intentionally NOT done here (too heavy for hosted runners); native
  # C++ changes are therefore not reflected in this column. Isolated + best-effort so
  # it can never turn the run red.
  benchmark-source:
    needs: resolve
    if: github.repository_owner == 'mono'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    env:
      PROJECT: benchmarks/SkiaSharp.Benchmarks.Tracking.Source
      NIGHTLY: ${{ fromJSON(needs.resolve.outputs.versions).nightly }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux native dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1

      - name: Label this run
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            echo "PR_LABEL=pr/${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"
          else
            echo "PR_LABEL=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Stage nightly native
        run: python3 .github/scripts/fetch-native.py Linux "$NIGHTLY"

      - name: Build source benchmarks
        run: dotnet build "$PROJECT" -c Release

      - name: Run source benchmarks
        working-directory: ${{ env.PROJECT }}
        run: dotnet run -c Release --no-build -- --filter '*'

      - name: Record results (pr)
        run: |
          python3 .github/scripts/track-benchmarks.py \
            --history "benchmarks-Linux-pr.json" \
            --os Linux \
            --role pr \
            --version "$PR_LABEL"

      - name: Upload history artifact (pr)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-Linux-pr
          path: benchmarks-Linux-pr.json
          if-no-files-found: warn

  report:
    needs: [benchmark, benchmark-source]
    if: always() && github.repository_owner == 'mono'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download all histories
        uses: actions/download-artifact@v4
        with:
          path: histories
          pattern: benchmarks-*
          merge-multiple: true
      - name: Render dashboard
        run: python3 .github/scripts/render-benchmarks.py histories
