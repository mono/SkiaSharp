name: Track - Benchmarks

# Daily BenchmarkDotNet run on Linux/Windows/macOS, per version role:
#   * nightly       -> newest -nightly.* from the EAP feed (daily trend)
#   * curr-stable    \
#   * prev-stable     >  released baselines, resolved from nuget.org (size-tracker roles)
#   * prev-major     /
#   * pr             -> a FULL source build (native + managed) of THIS checkout
#
# History is PERSISTED to the `aw-data` branch (not the Actions cache), so it survives
# indefinitely — years of trend, no cache eviction or size limits. Each (OS, role) leg
# reads its existing history from that branch, appends today's point, and uploads it as
# an artifact; the `report` job aggregates everything, and — only on main/schedule — the
# `persist-aw-data.yml` workflow commits the updated JSON back to the branch.
#
# A leg is SKIPPED when its "fingerprint" (pinned version + hash of the benchmark
# source) matches the last recorded one — released baselines don't change unless a new
# release bumps the role or the benchmark code changes. The nightly role runs whenever a
# new nightly publishes (its version changes).
#
# Outputs of the report job:
#   * a Markdown dashboard in the run summary (time + allocations, per OS);
#   * `benchmark-dashboard` artifact: a self-contained interactive HTML page with the
#     data embedded — download it (incl. from a PR run) and open in a browser;
#   * on main/schedule, the `agent` artifact that persist-aw-data commits to `aw-data`,
#     which the live dashboard page (aw-data branch: benchmarks/dashboard.html) reads.
#
# Feed policy: the committed nuget.config is dnceng dotnet-public + EAP (NO nuget.org).
# Released baselines whose exact version is not on dotnet-public are restored by
# injecting nuget.org into a RUNTIME-ONLY nuget.config on the released legs (never
# committed), so the internal build system's config scan stays clean.

on:
  schedule:
    - cron: "0 8 * * *"  # Daily at 08:00 UTC (offset from the 07:00 size tracker)
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Per-ref so PRs/branches run independently; a new commit cancels the in-flight run.
  group: track-benchmarks-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  DATA_BRANCH: aw-data

jobs:
  resolve:
    if: github.repository_owner == 'mono'
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.resolve.outputs.versions }}
      roles: ${{ steps.resolve.outputs.roles }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve version roles
        id: resolve
        run: |
          versions=$(python3 .github/scripts/perf/benchmarks/resolve_versions.py)
          echo "versions=$versions" >> "$GITHUB_OUTPUT"
          # Only schedule the roles that actually resolved (a brand-new major may have no
          # prev-stable/prev-major yet), so no leg ever runs with an empty version.
          echo "roles=$(echo "$versions" | jq -c 'keys')" >> "$GITHUB_OUTPUT"

  benchmark:
    needs: resolve
    if: github.repository_owner == 'mono'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        role: ${{ fromJSON(needs.resolve.outputs.roles) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      PROJECT: benchmarks/SkiaSharp.Benchmarks.Tracking
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set leg variables
        run: |
          echo "LABEL=${{ runner.os }}" >> "$GITHUB_ENV"
          echo "HISTORY=benchmarks-${{ runner.os }}-${{ matrix.role }}.json" >> "$GITHUB_ENV"
          echo "VERSION=${{ fromJSON(needs.resolve.outputs.versions)[matrix.role] }}" >> "$GITHUB_ENV"

      - name: Restore history from data branch
        # Read this leg's existing history from the aw-data branch (public raw URL, no
        # auth). Missing (first run) is fine — the freshness check then decides to run.
        run: |
          url="https://raw.githubusercontent.com/${{ github.repository }}/${DATA_BRANCH}/benchmarks/${HISTORY}"
          if curl -fsSL "$url" -o "$HISTORY"; then
            echo "restored $HISTORY from $DATA_BRANCH"
          else
            echo "no existing $HISTORY on $DATA_BRANCH (fresh start)"
            rm -f "$HISTORY"
          fi

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1

      - name: Inject nuget.org for released baseline (runtime-only)
        if: matrix.role != 'nightly'
        run: |
          cat > "$PROJECT/nuget.config" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="dotnet-public" value="https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-public/nuget/v3/index.json" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Pin version
        run: |
          python3 .github/scripts/perf/benchmarks/write_version_props.py "$VERSION" "$PROJECT/version.props"

      - name: Check freshness (skip unchanged baselines)
        id: check
        run: |
          decision=$(python3 .github/scripts/perf/benchmarks/track.py --history "$HISTORY" --version "$VERSION" --check)
          echo "skip=$([ "$decision" = skip ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "$decision: ${{ runner.os }}/${{ matrix.role }} ($VERSION)"

      - name: Run benchmarks
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ env.PROJECT }}
        run: dotnet run -c Release -- --filter '*'

      - name: Record results
        if: steps.check.outputs.skip != 'true'
        run: |
          python3 .github/scripts/perf/benchmarks/track.py \
            --history "$HISTORY" \
            --os "$LABEL" \
            --role "${{ matrix.role }}" \
            --version "$VERSION"

      - name: Upload history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ runner.os }}-${{ matrix.role }}
          path: ${{ env.HISTORY }}
          if-no-files-found: warn

  # "this PR / this branch" column: a source build of SkiaSharp benchmarked against the
  # baselines on ALL THREE desktop OSes, so this branch's changes show up in the ⭐ column.
  #
  # PR_NATIVE_SOURCE_BUILD toggles how the native libSkiaSharp is obtained:
  #   * "false" (fast, default while iterating) — download the prebuilt nightly natives
  #     via `externals-download`, then build only the MANAGED SkiaSharp.dll from source.
  #     ~10 min/leg; reflects MANAGED changes on the branch (native = nightly).
  #   * "true" (full) — build libSkiaSharp FROM SOURCE per host (Linux Docker, macOS
  #     Xcode+Ninja, Windows VS+LLVM+Ninja), so native/C-API changes (e.g. #4421) are
  #     reflected too. ~30-40 min on Windows.
  # Each leg is isolated + best-effort so it can never turn the run red. PR data is fresh
  # each run (single day, labelled by PR/branch) and is NOT persisted to the data branch.
  benchmark-source:
    needs: resolve
    if: github.repository_owner == 'mono'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
          - os: macos-latest
            label: macOS
          - os: windows-latest
            label: Windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 150
    continue-on-error: true
    env:
      PROJECT: benchmarks/SkiaSharp.Benchmarks.Tracking.Source
      # Skip the emscripten activation git-sync-deps does by default — the desktop
      # native builds don't need it (Linux runs in Docker and is unaffected).
      GIT_SYNC_DEPS_SKIP_EMSDK: "1"
      # Flip to "true" for the real native/C-API PR signal; keep "false" for fast
      # iteration (prebuilt natives + managed-only source build).
      PR_NATIVE_SOURCE_BUILD: "false"
    steps:
      # Full native build needs the externals/skia submodule; fast mode does not.
      - name: Checkout (with submodules for native source build)
        if: env.PR_NATIVE_SOURCE_BUILD == 'true'
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Checkout (fast, no submodules)
        if: env.PR_NATIVE_SOURCE_BUILD != 'true'
        uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Label this run
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$PR_NUMBER" ]; then
            echo "PR_LABEL=pr/$PR_NUMBER" >> "$GITHUB_ENV"
          else
            echo "PR_LABEL=$REF_NAME" >> "$GITHUB_ENV"
          fi

      - name: Download prebuilt natives (fast mode)
        if: env.PR_NATIVE_SOURCE_BUILD != 'true'
        # C#-only bootstrap: pulls the current-milestone (nightly) natives into
        # output/native so the managed build + benchmarks can run without a native compile.
        run: |
          dotnet tool restore
          dotnet cake --target=externals-download

      - name: Build libSkiaSharp from source (Linux x64, Docker)
        if: runner.os == 'Linux' && env.PR_NATIVE_SOURCE_BUILD == 'true'
        # Docker + cake, same pattern as build-site.yml's WASM build. Produces
        # output/native/linux/x64/libSkiaSharp.so from THIS source.
        run: |
          sudo apt-get update && sudo apt-get install -y libfontconfig1
          bash scripts/infra/native/linux/docker/glibc/build-local.sh x64
          sudo chown -R "$(id -u):$(id -g)" output

      - name: Build libSkiaSharp from source (macOS)
        if: runner.os == 'macOS' && env.PR_NATIVE_SOURCE_BUILD == 'true'
        # Xcode (preinstalled) + Ninja. Ad-hoc codesigned; no identity needed.
        # Produces output/native/osx/libSkiaSharp.dylib for the host arch.
        run: |
          dotnet tool restore
          pwsh ./scripts/infra/native/shared/install-ninja.ps1
          arch=$([ "$(uname -m)" = "arm64" ] && echo arm64 || echo x64)
          dotnet cake --target=externals-macos --configuration=Release --arch=$arch

      - name: Build libSkiaSharp from source (Windows x64)
        if: runner.os == 'Windows' && env.PR_NATIVE_SOURCE_BUILD == 'true'
        shell: pwsh
        # Visual Studio (preinstalled) + LLVM + Ninja, mirroring the AzDO Windows
        # native job. Produces output/native/windows/x64/libSkiaSharp.dll.
        # We invoke the native cake with target=libSkiaSharp (not externals-windows,
        # which also builds libHarfBuzzSharp via a vcxproj pinned to an older Windows
        # SDK that isn't on the runner). We only need libSkiaSharp here.
        run: |
          dotnet tool restore
          ./scripts/infra/native/shared/install-ninja.ps1
          ./scripts/infra/native/windows/select-vs.ps1
          ./scripts/infra/native/windows/install-7zip.ps1
          ./scripts/infra/native/windows/install-llvm.ps1
          dotnet cake native/windows/build.cake --target=libSkiaSharp --configuration=Release --arch=x64

      - name: Build SkiaSharp (managed, net10 only)
        # AllTargetFrameworks=net10.0 drops SkiaSharp's platform TFMs (android/ios/...).
        # BuildingInsideVisualStudio=true drops the SkiaSharp.NativeAssets.* project
        # references, which on non-Linux hosts add -macos TFMs that would demand the
        # 'macos' workload. We only need the managed SkiaSharp.dll here (native comes
        # from output/native), so excluding those packaging projects is correct.
        run: dotnet build binding/SkiaSharp/SkiaSharp.csproj -c Release -p:AllTargetFrameworks=net10.0 -p:BuildingInsideVisualStudio=true

      - name: Build source benchmarks
        run: dotnet build "$PROJECT" -c Release

      - name: Run source benchmarks
        working-directory: ${{ env.PROJECT }}
        run: dotnet run -c Release --no-build -- --filter '*'

      - name: Record results (pr)
        run: |
          python3 .github/scripts/perf/benchmarks/track.py \
            --history "benchmarks-${{ matrix.label }}-pr.json" \
            --os "${{ matrix.label }}" \
            --role pr \
            --version "$PR_LABEL"

      - name: Upload history artifact (pr)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ matrix.label }}-pr
          path: benchmarks-${{ matrix.label }}-pr.json
          if-no-files-found: warn

  report:
    needs: [benchmark, benchmark-source]
    if: always() && github.repository_owner == 'mono'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all histories
        uses: actions/download-artifact@v4
        with:
          path: histories
          pattern: benchmarks-*
          merge-multiple: true

      - name: Render Markdown dashboard (run summary)
        run: python3 .github/scripts/perf/benchmarks/render_md.py histories

      - name: Fetch sizes from data branch (for the unified dashboard)
        run: |
          python3 .github/scripts/perf/fetch_branch_data.py \
            "https://raw.githubusercontent.com/${{ github.repository }}/${DATA_BRANCH}" \
            sizes branch-sizes

      - name: Build interactive HTML dashboard
        # Self-contained page: benchmarks (incl. the PR column) embedded fresh, sizes
        # pulled from the branch -> the same unified perf dashboard, for download.
        run: |
          mkdir -p out
          python3 .github/scripts/perf/render_html.py \
            .github/scripts/perf/templates/dashboard.html out/dashboard.html histories branch-sizes

      - name: Upload HTML dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-dashboard
          path: out/dashboard.html
          if-no-files-found: warn

      - name: Assemble data for the aw-data branch
        # Only persist from main/schedule/dispatch on main — never from PRs. Stages the
        # persisted set (baseline + nightly histories, NOT the ephemeral pr files), the
        # live dashboard page, and a manifest under agent/benchmarks/ so persist-aw-data.yml
        # commits them to the aw-data branch. The sentinel file keeps the artifact's
        # least-common-ancestor at aw-upload/, preserving the required agent/ prefix.
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p aw-upload/agent/benchmarks
          touch aw-upload/.artifact-root
          for f in histories/benchmarks-*.json; do
            case "$f" in *-pr.json) continue ;; esac
            cp "$f" aw-upload/agent/benchmarks/
          done
          cp .github/scripts/perf/templates/dashboard.html aw-upload/agent/benchmarks/dashboard.html
          python3 - <<'PY'
          import glob, os, json, datetime
          d = "aw-upload/agent/benchmarks"
          files = sorted(os.path.basename(p) for p in glob.glob(f"{d}/benchmarks-*.json"))
          json.dump({"generatedUtc": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                     "files": files}, open(f"{d}/index.json", "w"), indent=2)
          print("persisting:", files)
          PY

      - name: Upload aw-data payload (agent)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: agent
          path: aw-upload
          if-no-files-found: warn
