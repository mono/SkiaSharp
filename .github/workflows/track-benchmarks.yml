name: Track - Benchmarks

# Daily BenchmarkDotNet run on Linux/Windows/macOS, per version role:
#   * nightly       -> newest -nightly.* from the EAP feed (daily trend)
#   * curr-stable    \
#   * prev-stable     >  released baselines, resolved from nuget.org (size-tracker roles)
#   * prev-major     /
#
# Each (OS, role) leg appends to its own rolling history (kept ~60 days, 10 shown) and
# a report job renders a per-OS dashboard. Runs on a schedule, on PRs and on pushes to
# main, so every CI produces a benchmark run.
#
# A leg is SKIPPED when its "fingerprint" (pinned version + hash of the benchmark
# source) matches the last recorded one — released baselines don't change unless a new
# release bumps the role or the benchmark code changes, so there's no point re-running
# old code on old versions every day. The nightly role runs whenever a new nightly
# publishes (its version changes).
#
# Feed policy: the committed nuget.config is dnceng dotnet-public + EAP (NO nuget.org).
# Released baselines whose exact version is not on dotnet-public are restored by
# injecting nuget.org into a RUNTIME-ONLY nuget.config on the released legs (never
# committed), so the internal build system's config scan stays clean.

on:
  schedule:
    - cron: "0 8 * * *"  # Daily at 08:00 UTC (offset from the 07:00 size tracker)
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Per-ref so PRs/branches run independently; a new commit cancels the in-flight run.
  group: track-benchmarks-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  resolve:
    if: github.repository_owner == 'mono'
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.resolve.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve version roles
        id: resolve
        run: |
          echo "versions=$(python3 .github/scripts/resolve-skiasharp-version.py --roles)" >> "$GITHUB_OUTPUT"

  benchmark:
    needs: resolve
    if: github.repository_owner == 'mono'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        role: [nightly, curr-stable, prev-stable, prev-major]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      PROJECT: benchmarks/SkiaSharp.Benchmarks.Tracking
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set leg variables
        run: |
          echo "LABEL=${{ runner.os }}" >> "$GITHUB_ENV"
          echo "HISTORY=benchmarks-${{ runner.os }}-${{ matrix.role }}.json" >> "$GITHUB_ENV"
          echo "VERSION=${{ fromJSON(needs.resolve.outputs.versions)[matrix.role] }}" >> "$GITHUB_ENV"

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1

      - name: Inject nuget.org for released baseline (runtime-only)
        if: matrix.role != 'nightly'
        run: |
          cat > "$PROJECT/nuget.config" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="dotnet-public" value="https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-public/nuget/v3/index.json" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Pin version
        run: |
          python3 .github/scripts/resolve-skiasharp-version.py --pin "$VERSION" --write-props "$PROJECT/version.props"

      - name: Restore history
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.HISTORY }}
          key: benchmarks-${{ runner.os }}-${{ matrix.role }}-v1-${{ github.run_id }}
          restore-keys: |
            benchmarks-${{ runner.os }}-${{ matrix.role }}-v1-

      - name: Check freshness (skip unchanged baselines)
        id: check
        run: |
          hash=$(git ls-files "$PROJECT" | grep -E '\.(cs|csproj)$' | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)
          fp="$VERSION|$hash"
          echo "FINGERPRINT=$fp" >> "$GITHUB_ENV"
          last=$(python3 .github/scripts/track-benchmarks.py --history "$HISTORY" --print-fingerprint)
          if [ -n "$last" ] && [ "$fp" = "$last" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Unchanged ($fp) — skipping benchmark run for ${{ runner.os }}/${{ matrix.role }}."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Running ${{ runner.os }}/${{ matrix.role }} (fingerprint=$fp, last=$last)."
          fi

      - name: Run benchmarks
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ env.PROJECT }}
        run: dotnet run -c Release -- --filter '*'

      - name: Record results
        if: steps.check.outputs.skip != 'true'
        run: |
          python3 .github/scripts/track-benchmarks.py \
            --results "$PROJECT/BenchmarkDotNet.Artifacts/results" \
            --history "$HISTORY" \
            --os "$LABEL" \
            --role "${{ matrix.role }}" \
            --version "$VERSION" \
            --fingerprint "$FINGERPRINT"

      - name: Save history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.HISTORY }}
          key: benchmarks-${{ runner.os }}-${{ matrix.role }}-v1-${{ github.run_id }}

      - name: Upload history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ runner.os }}-${{ matrix.role }}
          path: ${{ env.HISTORY }}
          if-no-files-found: warn

  report:
    needs: benchmark
    if: always() && github.repository_owner == 'mono'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download all histories
        uses: actions/download-artifact@v4
        with:
          path: histories
          pattern: benchmarks-*
          merge-multiple: true
      - name: Render dashboard
        run: python3 .github/scripts/render-benchmarks.py --input histories
