# Feed mirror — copies packages from a source Azure DevOps Artifacts feed to a
# destination feed, driven by scripts/infra/package/mirror-nuget-feed.ps1.
#
# This replaces the old in-place "manage-nuget-feed" cleanup approach: instead of
# deleting junk from a live feed, we mirror ONLY the packages/versions that pass
# the rules into a clean destination. It is currently configured for the
# xamarin -> dnceng migration, and keeps the destination feeds clean via per-feed
# rules (the public 'skiasharp' feed excludes the internal '_'-prefixed CI
# wrapper packages; the internal 'skiasharp-ci' feed keeps them).
#
#   * On PR / push that touches the script or this workflow  -> DRY RUN only
#     (inventory + diff + plan, read anonymously, no writes, NO secret in scope).
#   * On manual dispatch with `push: true`                   -> real mirror
#     (requires the AZURE_DEVOPS_PAT secret with packaging read/write on dnceng).
#
# Secret handling: the PAT is injected into the job ONLY for an opted-in push, so
# dry-run logs never contain it (not even masked). For the push, auth goes through
# the Azure Artifacts Credential Provider (VSS_NUGET_EXTERNAL_FEED_ENDPOINTS) — the
# token is never written to a nuget.config or passed on any command line.
#
# The script is idempotent and timeout-safe, so a real mirror can be re-run as
# many times as needed; each run only transfers what is still missing.

name: Mirror NuGet Feeds

on:
  pull_request:
    paths:
      - 'scripts/infra/package/mirror-nuget-feed.ps1'
      - '.github/workflows/mirror-nuget-feed.yml'
  push:
    paths:
      - 'scripts/infra/package/mirror-nuget-feed.ps1'
      - '.github/workflows/mirror-nuget-feed.yml'
  workflow_dispatch:
    inputs:
      feed:
        description: 'Which feed to mirror'
        type: choice
        required: true
        default: both
        options:
          - both
          - skiasharp
          - skiasharp-ci
      push:
        description: 'Actually push packages (opt in). Unchecked = dry run.'
        type: boolean
        required: true
        default: false

# Never let two real mirrors of the same feed run concurrently.
concurrency:
  group: mirror-nuget-feed-${{ github.event.inputs.feed || 'dryrun' }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    # A little under the 360-min hard cap; the script's own budget stops earlier.
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        # Both feeds run in parallel. All per-feed behaviour (source, destination,
        # and rules like excluding the internal '_' packages) lives in the script.
        feed: [skiasharp, skiasharp-ci]

    name: "${{ matrix.feed }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gate — should this feed run, and is this an opted-in push?
        id: gate
        shell: bash
        run: |
          selected="${{ github.event.inputs.feed }}"
          if [ -z "$selected" ] || [ "$selected" = "both" ] || [ "$selected" = "${{ matrix.feed }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.feed }} (feed input = $selected)"
          fi
          # A push is only ever performed on a manual dispatch that explicitly
          # opts in. Everything else (PR, push, dispatch dry run) never needs a
          # secret, so we never expose one to those runs.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.push }}" = "true" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      # The credential provider + PAT are only set up for a real, opted-in push.
      # Dry runs (PR / push / dispatch without push) never install it and never
      # receive the secret.
      - name: Install Azure Artifacts Credential Provider
        if: steps.gate.outputs.run == 'true' && steps.gate.outputs.push == 'true'
        shell: bash
        run: sh -c "$(curl -fsSL https://aka.ms/install-artifacts-credprovider.sh)"

      - name: Mirror ${{ matrix.feed }}
        if: steps.gate.outputs.run == 'true'
        shell: pwsh
        env:
          # The secret is injected ONLY for an opted-in push. On every other run
          # this evaluates to an empty string, so the token is never present in
          # the job environment (and therefore cannot appear in logs, even masked).
          AZURE_DEVOPS_PAT: ${{ steps.gate.outputs.push == 'true' && secrets.AZURE_DEVOPS_PAT || '' }}
        run: |
          $params = @{
            Feed        = "${{ matrix.feed }}"
            SummaryFile = $env:GITHUB_STEP_SUMMARY
          }
          if ("${{ steps.gate.outputs.push }}" -eq "true") { $params.Push = $true }
          ./scripts/infra/package/mirror-nuget-feed.ps1 @params
