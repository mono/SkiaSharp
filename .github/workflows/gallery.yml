name: Deploy Gallery

on:
  push:
    branches:
      - main
    paths:
      - 'samples/Gallery/**'
      - '.github/workflows/gallery.yml'
  pull_request:
    paths:
      - 'samples/Gallery/**'
      - '.github/workflows/gallery.yml'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      git_branch:
        description: 'Git branch to fetch CI packages from (e.g. main, release/3.119.4)'
        required: false
        default: 'main'
      dry_run:
        description: 'Dry run — build the gallery but do not deploy'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  deploy:
    name: Build and Deploy Gallery
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Download NuGet packages from CI feed
        run: |
          dotnet cake --target=docs-download-output \
            --gitBranch="${{ inputs.git_branch || 'main' }}"

      - name: Detect preview version from downloaded packages
        id: version
        shell: pwsh
        run: |
          # Find a SkiaSharp preview nupkg to extract the version
          # Match SkiaSharp.{version}-{prerelease}.nupkg but not sub-packages like SkiaSharp.NativeAssets.*
          $previewPkg = Get-ChildItem 'output/nugets/SkiaSharp.[0-9]*-*.nupkg' | Select-Object -First 1
          if (-not $previewPkg) {
            throw "No preview SkiaSharp package found in output/nugets/"
          }

          $fileName = $previewPkg.Name
          Write-Host "Found package: $fileName"

          # Parse version from filename: SkiaSharp.{base}-{previewLabel}.{buildNumber}.nupkg
          # Example: SkiaSharp.3.119.4-preview.0.76.nupkg
          if ($fileName -match '^SkiaSharp\.(\d+\.\d+\.\d+)-(.+)\.(\d+)\.nupkg$') {
            $baseVersion = $Matches[1]
            $previewLabel = $Matches[2]
            $buildNumber = $Matches[3]
          } else {
            throw "Could not parse version from package filename: $fileName"
          }

          $fullVersion = "$baseVersion-$previewLabel.$buildNumber"

          Write-Host "Base version: $baseVersion"
          Write-Host "Preview label: $previewLabel"
          Write-Host "Build number: $buildNumber"
          Write-Host "Full version: $fullVersion"

          "base_version=$baseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "preview_label=$previewLabel" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "build_number=$buildNumber" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "full_version=$fullVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Generate samples (convert ProjectReference to PackageReference)
        run: |
          dotnet cake --target=samples-generate \
            --previewLabel="${{ steps.version.outputs.preview_label }}" \
            --buildNumber="${{ steps.version.outputs.build_number }}"

      - name: Add local NuGet source for downloaded packages
        run: |
          dotnet nuget add source "$(pwd)/output/nugets" --name local-ci-packages

      - name: Publish Gallery Blazor WASM app
        run: |
          dotnet publish "output/samples-preview/Gallery/Blazor/SkiaSharpSample.Blazor.csproj" \
            -c Release \
            -o output/gallery-publish

      - name: Post-process for GitHub Pages
        shell: bash
        run: |
          PUBLISH_DIR="output/gallery-publish/wwwroot"

          # Rewrite <base href> for the /SkiaSharp/gallery/ subpath
          sed -i 's|<base href="/" />|<base href="/SkiaSharp/gallery/" />|g' "$PUBLISH_DIR/index.html"

          # Add .nojekyll to prevent Jekyll processing
          touch "$PUBLISH_DIR/.nojekyll"

          # Create a 404.html that redirects to index.html for SPA routing
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html>' \
            '<head>' \
            '  <meta charset="utf-8" />' \
            '  <script>' \
            '    var pathSegmentsToKeep = 2;' \
            '    var l = window.location;' \
            '    l.replace(' \
            '      l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +' \
            '      l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +' \
            '      l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +' \
            '      (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +' \
            '      l.hash' \
            '    );' \
            '  </script>' \
            '</head>' \
            '<body></body>' \
            '</html>' \
            > "$PUBLISH_DIR/404.html"

          echo "Post-processing complete. Contents of publish directory:"
          ls -la "$PUBLISH_DIR"

      - name: Deploy to docs-live branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PUBLISH_DIR="output/gallery-publish/wwwroot"
          BRANCH_NAME="docs-live"
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          SKIASHARP_VERSION="${{ steps.version.outputs.full_version }}"

          # Dry run: triggered by a pull_request event, or the dry_run input is set to true
          DRY_RUN="false"
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN="true"
          fi

          echo "Deploying gallery for SkiaSharp $SKIASHARP_VERSION (dry_run=$DRY_RUN)"

          # Clone the existing docs-live branch
          WORK_DIR=$(mktemp -d)
          trap 'rm -rf "$WORK_DIR"' EXIT

          if git ls-remote --exit-code "$REMOTE_URL" "refs/heads/${BRANCH_NAME}" > /dev/null; then
            git clone --depth=1 --branch "${BRANCH_NAME}" "$REMOTE_URL" "$WORK_DIR"
          else
            git init "$WORK_DIR"
            git -C "$WORK_DIR" checkout -b "${BRANCH_NAME}"
          fi

          # Replace only the gallery/ subdirectory (preserve everything else)
          rm -rf "$WORK_DIR/gallery"
          cp -r "$PUBLISH_DIR" "$WORK_DIR/gallery"

          git -C "$WORK_DIR" config user.name "github-actions[bot]"
          git -C "$WORK_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$WORK_DIR" add .
          git -C "$WORK_DIR" commit --allow-empty -m "Deploy gallery - SkiaSharp $SKIASHARP_VERSION"

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run — skipping push. Would deploy gallery to branch: $BRANCH_NAME"
            git -C "$WORK_DIR" show --stat HEAD
          else
            git -C "$WORK_DIR" push "$REMOTE_URL" "HEAD:refs/heads/${BRANCH_NAME}"
            echo "Successfully deployed gallery to https://mono.github.io/SkiaSharp/gallery/"
          fi
