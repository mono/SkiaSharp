# Manage NuGet Feed — mirrors packages from a source Azure DevOps Artifacts feed
# to a destination feed, driven by scripts/infra/package/manage-nuget-feed.ps1.
#
# Rather than deleting junk in place from a live feed, we mirror ONLY the
# packages/versions that pass the rules into a clean destination. Currently
# configured for the xamarin -> dnceng migration, and keeps the destination
# feeds clean via per-feed rules (the public 'skiasharp' feed excludes the
# internal '_'-prefixed CI wrapper packages; the internal 'skiasharp-ci' keeps
# them).
#
#   * Manual dispatch (push unchecked)      -> DRY RUN only
#     (inventory + diff + plan, read anonymously, no writes, NO secret in scope).
#   * Manual dispatch with `push: true`     -> real mirror
#     (requires the AZURE_DEVOPS_PAT secret with packaging read/write on dnceng).
#
# This workflow never runs automatically — there is no PR/push trigger.
#
# Secret handling: the PAT is injected into the job ONLY for an opted-in push, so
# dry-run logs never contain it (not even masked). For the push, auth goes through
# the Azure Artifacts Credential Provider (VSS_NUGET_EXTERNAL_FEED_ENDPOINTS) — the
# token is never written to a nuget.config or passed on any command line.
#
# The script is idempotent and timeout-safe, so a real mirror can be re-run as
# many times as needed; each run only transfers what is still missing.

name: Manage NuGet Feed

# Manual only — this workflow is never triggered automatically. Run it from the
# Actions tab (or `gh workflow run`) with the feed + push inputs below.
on:
  workflow_dispatch:
    inputs:
      feed:
        description: 'Which feed to mirror'
        type: choice
        required: true
        default: both
        options:
          - both
          - skiasharp
          - skiasharp-ci
      push:
        description: 'Actually push packages (opt in). Unchecked = dry run.'
        type: boolean
        required: true
        default: false

# Least privilege. This workflow never needs to write to the GitHub repo.
permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    # A little under the 360-min hard cap; the script's own budget stops earlier.
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        # Both feeds run in parallel. All per-feed behaviour (source, destination,
        # and rules like excluding the internal '_' packages) lives in the script.
        feed: [skiasharp, skiasharp-ci]

    # Serialize real mirrors of the same feed across runs.
    concurrency:
      group: manage-nuget-feed-${{ matrix.feed }}
      cancel-in-progress: false

    name: "${{ matrix.feed }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Gate — should this feed run, and is this an opted-in real copy?
        id: gate
        shell: bash
        # Inputs are passed via env (never interpolated into the script body) and
        # strictly validated, so a dispatch input can never inject shell commands.
        env:
          FEED_INPUT: ${{ github.event.inputs.feed }}
          PUSH_INPUT: ${{ github.event.inputs.push }}
          MATRIX_FEED: ${{ matrix.feed }}
        run: |
          set -euo pipefail
          case "$FEED_INPUT" in both|skiasharp|skiasharp-ci|"") ;; *) echo "Invalid feed input"; exit 2 ;; esac
          case "$PUSH_INPUT" in true|false|"") ;; *) echo "Invalid push input"; exit 2 ;; esac

          if [ -z "$FEED_INPUT" ] || [ "$FEED_INPUT" = "both" ] || [ "$FEED_INPUT" = "$MATRIX_FEED" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping $MATRIX_FEED (feed input = $FEED_INPUT)"
          fi
          # A real copy (write) happens only on a manual dispatch that explicitly
          # opts in via push=true. The workflow is manual-only and dispatch is
          # restricted to users with write access, so it may be run from any
          # branch (e.g. to populate the feeds before this migration merges).
          # A dry run never opts in and never needs the secret.
          if [ "$PUSH_INPUT" = "true" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      # The credential provider + PAT are only set up for a real, opted-in push.
      # Dry runs never install it and never receive the secret.
      - name: Install Azure Artifacts Credential Provider
        if: steps.gate.outputs.run == 'true' && steps.gate.outputs.push == 'true'
        shell: bash
        run: sh -c "$(curl -fsSL https://aka.ms/install-artifacts-credprovider.sh)"

      - name: Mirror ${{ matrix.feed }}
        if: steps.gate.outputs.run == 'true'
        shell: pwsh
        env:
          # The secret is injected ONLY for an opted-in push. On every other run
          # this evaluates to an empty string, so the token is never present in
          # the job environment (and therefore cannot appear in logs, even masked).
          AZURE_DEVOPS_PAT: ${{ steps.gate.outputs.push == 'true' && secrets.AZURE_DEVOPS_PAT || '' }}
          # matrix.feed is a fixed, workflow-controlled value (skiasharp | skiasharp-ci)
          # and gate.outputs.push is a validated 'true'/'false' — passed via env and
          # never interpolated into the script body.
          MIRROR_FEED: ${{ matrix.feed }}
          MIRROR_PUSH: ${{ steps.gate.outputs.push }}
        run: |
          $params = @{
            Feed        = $env:MIRROR_FEED
            SummaryFile = $env:GITHUB_STEP_SUMMARY
          }
          if ($env:MIRROR_PUSH -eq "true") { $params.Push = $true }
          ./scripts/infra/package/manage-nuget-feed.ps1 @params
