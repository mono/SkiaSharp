name: API Diff

# ─────────────────────────────────────────────────────────────────────────────
# API Diff workflow
#
# READ FIRST: documentation/dev/release-notes-and-changelogs.md is the behavior
# spec for the unified release-notes + API-changelog system. This workflow is the
# automation around the API-changelog (Cake) engine only.
#
# Keeps the committed API changelogs up to date under the in-site releases tree
# (spec §3.1): documentation/docfx/releases/. It is a thin runner around a single
# Cake target — there is no shell wrapper to keep in sync:
#
#     dotnet cake --target=docs-api-diff-past
#
# That target (now living in the release-notes skill at
# .agents/skills/release-notes/scripts/api-diff.cake) wraps
# Mono.ApiTools.NuGetDiff, walks every version published to NuGet.org
# (prereleases included) and writes a per-assembly markdown diff into the
# line-first, package-namespaced layout (spec §3.3):
#   documentation/docfx/releases/<line>/<PackageId>/<Assembly>.md (+ .breaking.md)
# HarfBuzzSharp-versioned packages go to the parallel tree (spec §3.4):
#   documentation/docfx/releases/harfbuzzsharp/<hb-line>/...
# and the co-release map sidecar (spec §3.6) is written to
#   documentation/docfx/releases/co-release-map.json
# Baseline selection and superseded-version handling are driven by
# scripts/infra/docs/versions.json — see that file's $comment fields and the
# docs-api-diff-past target in api-diff.cake.
#
# OWNERSHIP (spec §3.5): the releases/ tree is SHARED. This workflow only ever
# touches the Cake-owned entries (numeric <line>/ folders, the harfbuzzsharp/
# tree, and co-release-map.json). It MUST NOT delete or rewrite the human pages
# (<line>.md, <line>-unreleased.md), TOC.yml or index.md — those belong to the
# release-notes (Python + AI) engine and its own workflow.
#
# Preview ("what will an unreleased branch's diff look like?") is intentionally
# NOT automated here. It is a manual, multi-step operation — see the "Previewing
# an unreleased branch" section in documentation/dev/writing-docs.md.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - 'release/**'
    paths-ignore:
      # Don't loop: the workflow's own changelog commits must not retrigger it.
      - 'documentation/docfx/releases/**'
      - '.github/workflows/api-diff.yml'
    tags:
      - 'v*'
  schedule:
    # Weekly safety net on Sunday at 00:00 UTC, in case a publish was missed.
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Include prerelease versions in the diff set'
        type: boolean
        required: false
        default: true

concurrency:
  group: api-diff
  cancel-in-progress: true

permissions: {}

env:
  # Single source of truth for the in-site releases tree (spec §3.1).
  RELEASES_DIR: documentation/docfx/releases

jobs:
  generate:
    name: Generate API Diff
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      # Default to including prereleases (the 4.x line ships only as prereleases
      # for now, so they must appear in the changelog set). Only an explicit
      # workflow_dispatch with prerelease=false turns them off; every other
      # trigger (and the default) yields 'true'. Written this way to avoid the
      # `&& inputs || 'true'` boolean footgun, where false would collapse back
      # to 'true' and make the input impossible to disable.
      PRERELEASE: ${{ (github.event_name == 'workflow_dispatch' && inputs.prerelease == false) && 'false' || 'true' }}
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Always regenerate the full historical set from main; the diff source
          # is NuGet.org, not the checked-out tree.
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: global.json

      # Single Cake target — the exact same command a human runs locally. It
      # reads scripts/infra/docs/versions.json for compare_to / supersession
      # overrides and writes only the Cake-owned entries under releases/.
      - name: Generate changelogs
        run: |
          set -euo pipefail
          dotnet tool restore
          dotnet cake --target=docs-api-diff-past --nugetDiffPrerelease="$PRERELEASE"

      - name: Check for changes
        id: check
        run: |
          # The Cake target clears and rewrites only its owned entries (numeric
          # <line>/ dirs, harfbuzzsharp/, co-release-map.json), so any porcelain
          # change under releases/ here is a real API-diff change — the human
          # pages are never touched by this job.
          if [ -n "$(git status --porcelain "$RELEASES_DIR")" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      # Upload ONLY the Cake-owned entries so the publish job can reapply them
      # over a clean main checkout without clobbering the human pages.
      - name: Stage owned changelog entries
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          rm -rf _api_diff_owned
          mkdir -p _api_diff_owned
          cd "$RELEASES_DIR"
          # Numeric line folders (X.Y.Z) + the harfbuzz tree + the sidecar are
          # the only things this engine owns (spec §3.5).
          find . -maxdepth 1 -mindepth 1 -type d -regextype posix-extended \
            -regex '\./[0-9]+\.[0-9]+\.[0-9]+' -print0 \
            | xargs -0 -I{} cp -R {} "$GITHUB_WORKSPACE/_api_diff_owned/"
          if [ -d harfbuzzsharp ]; then
            cp -R harfbuzzsharp "$GITHUB_WORKSPACE/_api_diff_owned/"
          fi
          if [ -f co-release-map.json ]; then
            cp co-release-map.json "$GITHUB_WORKSPACE/_api_diff_owned/"
          fi

      - name: Upload changelogs
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: changelogs
          path: _api_diff_owned/
          if-no-files-found: warn

  publish:
    name: Create PR
    needs: generate
    if: needs.generate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 1

      - name: Clear Cake-owned changelog entries
        run: |
          set -euo pipefail
          # The artifact holds the COMPLETE desired set of Cake-OWNED entries.
          # download-artifact only ever ADDS/overwrites files, so a folder the
          # generate job removed (e.g. a now-empty line, or a stale *.breaking.md
          # after a baseline change) would survive here and the deletion would be
          # silently lost. Clearing ONLY the owned entries first makes the
          # artifact authoritative for them, while leaving the human pages
          # (<line>.md, <line>-unreleased.md, TOC.yml, index.md) untouched
          # (spec §3.5 ownership).
          cd "$RELEASES_DIR"
          find . -maxdepth 1 -mindepth 1 -type d -regextype posix-extended \
            -regex '\./[0-9]+\.[0-9]+\.[0-9]+' -exec rm -rf {} +
          rm -rf harfbuzzsharp
          rm -f co-release-map.json

      - name: Download changelogs artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: changelogs
          path: ${{ env.RELEASES_DIR }}/

      - name: Commit and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Single rolling PR branch — force-pushed each run so there is at most
          # one open API-changelog PR, never one-per-version.
          PR_BRANCH="bot/api-diff"

          # No-op guard: if regeneration produced byte-identical output, don't
          # open/refresh a PR. `-A` stages additions, modifications AND the
          # deletions exposed by the clear-before-extract step above.
          git add -A "$RELEASES_DIR"
          if git diff --cached --quiet; then
            echo "No changelog changes detected. Skipping PR."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "$PR_BRANCH"
          git commit -m "[docs] Update API changelogs" \
            -m "Regenerated by the api-diff workflow using Mono.ApiTools.NuGetDiff.
          Compares all published NuGet.org versions (including prereleases).
          Respects scripts/infra/docs/versions.json for comparison overrides."

          git push --force origin "$PR_BRANCH"

          existing=$(gh pr list --head "$PR_BRANCH" --base main --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR #$existing already exists, force-pushed update"
          else
            gh pr create --base main --head "$PR_BRANCH" \
              --title "[docs] API changelogs" \
              --label "documentation" \
              --body "Automated API changelogs comparing all published NuGet.org versions.
          Generated by the \`api-diff\` workflow using \`Mono.ApiTools.NuGetDiff\`.

          Respects \`scripts/infra/docs/versions.json\` for comparison overrides and supersession tracking.

          ---
          - **Workflow run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
