name: API Diff

# ─────────────────────────────────────────────────────────────────────────────
# API Diff workflow
#
# Regenerates the per-assembly API changelogs under changelogs/ and opens (or
# updates) a single PR with the result. ALL generation logic lives in
# .agents/skills/changelog/scripts/generate-changelogs.sh so that the exact same
# steps can be run locally — this workflow is just "run the script, then make a
# PR". See .agents/skills/changelog/SKILL.md for the full explanation.
#
# Modes (workflow_dispatch only; pushes/schedule always use 'past'):
#   past     Regenerate every changelog from NuGet.org. Baselines + supersession
#            come from scripts/versions.json. This is the committed output.
#   preview  Diff a branch/tag/SHA's CI build against its baseline to preview an
#            unreleased version. Artifact-only — never committed.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - 'release/**'
    paths-ignore:
      # Don't loop: the workflow's own changelog commits must not retrigger it.
      - 'changelogs/**'
      - '.github/workflows/api-diff.yml'
    tags:
      - 'v*'
  schedule:
    # Weekly safety net on Sunday at 00:00 UTC, in case a publish was missed.
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: past (all historical from NuGet.org) or preview (current CI build vs baseline)'
        type: choice
        options:
          - past
          - preview
        default: 'past'
      ref:
        description: 'Branch/tag/SHA for preview mode (ignored in past mode)'
        required: false
        default: 'main'
      prerelease:
        description: 'Include prerelease versions'
        type: boolean
        required: false
        default: true

concurrency:
  group: api-diff
  cancel-in-progress: true

permissions: {}

jobs:
  generate:
    name: Generate API Diff
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      # Pushes and the schedule always regenerate the committed 'past' set.
      # Only manual runs may request 'preview'.
      MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'past' }}
      PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'true' }}
      REF: ${{ inputs.ref || 'main' }}
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Always work from main; the script fetches other refs itself in
          # preview mode. fetch-depth:0 so preview's `git fetch <ref>` works.
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: global.json

      # Single entry point — same script humans run locally. It restores tools,
      # runs the right Cake targets for the mode, and (preview) overlays the
      # ref's nuget versions + downloads CI packages.
      - name: Generate changelogs
        run: |
          set -euo pipefail
          if [ "$MODE" = "preview" ]; then
            .agents/skills/changelog/scripts/generate-changelogs.sh preview "$REF" --prerelease "$PRERELEASE"
          else
            .agents/skills/changelog/scripts/generate-changelogs.sh past --prerelease "$PRERELEASE"
          fi

      - name: Check for changes
        id: check
        run: |
          if [ -d changelogs ] && [ "$(find changelogs -name '*.md' | head -1)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload API diff artifact (preview mode)
        if: env.MODE == 'preview'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: api-diff
          path: output/api-diff/
          if-no-files-found: warn

      - name: Upload changelogs
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: changelogs
          path: changelogs/
          if-no-files-found: warn

  publish:
    name: Create PR
    needs: generate
    # Only the committed 'past' output is turned into a PR. Preview is artifact-
    # only, so a manual preview run never opens a PR.
    if: needs.generate.outputs.has_changes == 'true' && (github.event_name != 'workflow_dispatch' || inputs.mode == 'past')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 1

      - name: Download changelogs artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: changelogs
          path: changelogs/

      - name: Commit and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Single rolling PR branch — force-pushed each run so there is at most
          # one open API-changelog PR, never one-per-version.
          PR_BRANCH="bot/api-diff"

          # No-op guard: if regeneration produced byte-identical output, don't
          # open/refresh a PR.
          git add changelogs/
          if git diff --cached --quiet; then
            echo "No changelog changes detected. Skipping PR."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "$PR_BRANCH"
          git commit -m "[docs] Update API changelogs" \
            -m "Regenerated by the api-diff workflow using Mono.ApiTools.NuGetDiff.
          Compares all published NuGet.org versions (including prereleases).
          Respects scripts/versions.json for comparison overrides."

          git push --force origin "$PR_BRANCH"

          existing=$(gh pr list --head "$PR_BRANCH" --base main --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already exists, force-pushed update"
          else
            gh pr create --base main --head "$PR_BRANCH" \
              --title "[docs] API changelogs" \
              --label "documentation" \
              --body "Automated API changelogs comparing all published NuGet.org versions.
          Generated by the \`api-diff\` workflow using \`Mono.ApiTools.NuGetDiff\`.

          Respects \`scripts/versions.json\` for comparison overrides and supersession tracking.

          ---
          - **Workflow run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
