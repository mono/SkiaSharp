<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1543, "repo": "mono/SkiaSharp", "analyzedAt": "2026-05-03T05:46:00Z"}, "summary": "Setting SKImageInfo.ColorSpace = null before decoding no longer suppresses color correction in SkiaSharp 2.80.2, whereas it worked as expected in 1.68.3, producing visually incorrect color-converted output.", "classification": {"type": {"value": "type/bug", "confidence": 0.92}, "area": {"value": "area/SkiaSharp", "confidence": 0.88}, "platforms": ["os/Windows-Classic"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "wrong-output", "errorMessage": "Color space conversion applied during decode even when ColorSpace is set to null in SKImageInfo", "reproQuality": "complete", "targetFrameworks": ["net5.0"]}, "reproEvidence": {"stepsToReproduce": ["Create an SKCodec from a JPEG with embedded wide-gamut color profile (e.g., ProPhoto RGB or Adobe RGB)", "Get codec.Info, then set info.ColorSpace = null", "Call SKBitmap.Decode(codec, info)", "Encode the resulting bitmap as JPEG and compare to input"], "environmentDetails": "SkiaSharp 2.80.2, Windows 10, .NET console app", "repoLinks": [{"url": "https://user-images.githubusercontent.com/2389359/97585892-ebe2ea00-19f9-11eb-9f25-aa2c62e36dc0.jpg", "description": "Expected output (1.68.3) - ProPhoto no color correction"}, {"url": "https://user-images.githubusercontent.com/2389359/97585909-f0a79e00-19f9-11eb-95fc-0a67a4728102.jpg", "description": "Expected output (1.68.3) - AdobeRGB no color correction"}, {"url": "https://user-images.githubusercontent.com/2389359/97586149-36646680-19fa-11eb-9b8e-fbabacd12a0f.jpg", "description": "Actual output (2.80.2) - ProPhoto with unwanted color correction"}, {"url": "https://user-images.githubusercontent.com/2389359/97586155-3a908400-19fa-11eb-9225-7bd6177e0492.jpg", "description": "Actual output (2.80.2) - AdobeRGB with unwanted color correction"}]}, "versionAnalysis": {"mentionedVersions": ["1.68.3", "2.80.2"], "workedIn": "1.68.3", "brokeIn": "2.80.2", "currentRelevance": "likely", "relevanceReason": "The SKImageInfo.ColorSpace null-passthrough path has not changed since 2.80.2 — IntPtr.Zero is still passed to native for null colorspace, so the native behavior change likely persists."}, "regression": {"isRegression": true, "confidence": 0.9, "reason": "Reporter explicitly identifies 1.68.3 as last known good, provides side-by-side images proving the behavior difference, and the code pattern of null ColorSpace to skip color correction was a supported workflow.", "workedInVersion": "1.68.3", "brokeInVersion": "2.80.2"}}, "analysis": {"summary": "SKBitmap.Decode with a null ColorSpace in SKImageInfo passes IntPtr.Zero to Skia's native sk_codec_get_pixels. In Skia 1.68.x, a null destination colorspace suppressed color transformation. In Skia 2.80.x, the native codec appears to apply the source image's embedded ICC profile regardless of the null destination colorspace, converting wide-gamut images (ProPhoto, AdobeRGB) into sRGB or another default space, changing the raw pixel values.", "rationale": "The C# binding correctly converts null ColorSpace to IntPtr.Zero (confirmed in SKImageInfoNative.FromManaged). The behavioral change is therefore in the underlying Skia C++ codec. This is a real regression: a previously documented workflow (null colorspace = raw decode) no longer works in the 2.x series, and the reporter provides complete reproduction code and before/after image evidence.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKImageInfo.cs", "lines": "18-25", "finding": "SKImageInfoNative.FromManaged maps ColorSpace to IntPtr.Zero when null — the C# layer correctly passes null colorspace to native. The bug is therefore in native Skia behavior, not the SkiaSharp wrapper.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKCodec.cs", "lines": "119-137", "finding": "GetPixels passes the nInfo struct (with zero colorspace handle) directly to sk_codec_get_pixels. No additional color-space fixup is done in C# before calling native — behavior depends entirely on Skia's codec implementation.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "446-460", "finding": "Decode(SKCodec codec, SKImageInfo bitmapInfo) allocates an SKBitmap and calls codec.GetPixels with the caller-supplied bitmapInfo unchanged. No modification of bitmapInfo.ColorSpace occurs — null is preserved and forwarded.", "relevance": "related"}], "keySignals": [{"text": "info.ColorSpace = null; ... using var bitmap = SKBitmap.Decode(codec, info);", "source": "issue body", "interpretation": "Reporter explicitly sets null ColorSpace to suppress Skia's color transformation during decode — a pattern that worked in 1.x."}, {"text": "Version with issue: 2.80.2 / Last known good version: 1.68.3", "source": "issue body", "interpretation": "Clear regression: the major version bump from 1.x to 2.x corresponded to a significant Skia engine update that changed codec color handling."}, {"text": "It seems in 2.80.2 color conversion is always performed, so can't be disabled anymore?", "source": "issue body", "interpretation": "Reporter's hypothesis is consistent with Skia changing the null-colorspace behavior in newer versions."}], "workarounds": ["Try creating an SKColorSpace that matches the source image's color space exactly (so the conversion becomes a no-op): var codec = SKCodec.Create(stream); var info = codec.Info; /* keep info.ColorSpace as-is or explicitly set to match source */ — this may not be possible without access to the exact ICC profile.", "Read raw pixel bytes directly without using SKBitmap.Decode by copying codec pixel memory without transformation, if the application only needs the raw encoded values."], "nextQuestions": ["Does the behavior persist in SkiaSharp 2.88.x or 3.x?", "Is there a new SKCodecOptions or API in 2.x that allows disabling color correction explicitly?", "What Skia milestone change caused the null-colorspace behavior to change?", "Can the issue be reproduced on Linux (to rule out Windows-specific ICC profile handling)?"], "resolution": {"hypothesis": "Skia's codec changed its handling of a null destination colorspace between 1.68 and 2.80 — possibly now treating null as 'use source colorspace' rather than 'no transformation'. The SkiaSharp wrapper itself is correct; the fix would require either exposing a new native option or documenting the changed behavior with an alternative API.", "proposals": [{"title": "Investigate Skia codec null-colorspace behavior change", "description": "Review Skia changelog and SkCodec source between m76 (SkiaSharp 1.68) and m80+ (SkiaSharp 2.80) to understand how null SkColorSpace in SkImageInfo is handled by getPixels. Determine if a no-transformation mode still exists.", "category": "investigation", "confidence": 0.85, "effort": "cost/m", "validated": "untested"}, {"title": "Document new API for disabling color correction", "description": "If Skia now requires an explicit mechanism to skip color correction (e.g., passing a linearized or identity colorspace), document the new approach and provide a migration guide from the 1.x null-colorspace pattern.", "category": "alternative", "confidence": 0.7, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Investigate Skia codec null-colorspace behavior change", "recommendedReason": "The root cause is unknown — the native behavior change needs to be confirmed before any fix or documentation can be written."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.87, "reason": "Complete reproduction code is provided and the regression is clearly documented with visual evidence. The C# binding is correct; native behavior needs investigation to find whether a no-transformation mode still exists in current Skia.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, area, platform, and compatibility labels", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "tenet/compatibility"]}, {"type": "add-comment", "description": "Acknowledge regression and explain current investigation status", "risk": "medium", "confidence": 0.85, "comment": "Thank you for the detailed report and the visual comparison images — they make the regression very clear.\n\nThe SkiaSharp binding correctly forwards `null` ColorSpace as a null pointer to Skia's native `sk_codec_get_pixels`. The behavior change is therefore in the underlying Skia engine between versions 1.68 (Skia m76) and 2.80 (Skia m80+).\n\nIn newer Skia, passing a null destination `SkColorSpace` in `SkImageInfo` to the codec may no longer suppress color transformation — Skia may now apply the source image's embedded ICC profile regardless.\n\nAs a potential workaround, you could try:\n1. Keep the original `codec.Info.ColorSpace` (don't set it to null) — if you just want the raw wide-gamut pixels without sRGB conversion, you may need to explicitly set a colorspace that matches the source.\n2. Investigate whether `SKPixmap` with a null colorspace offers different behavior.\n\nWe'll investigate whether the current Skia version exposes a way to explicitly disable color correction during decode."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
