<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 832, "repo": "mono/SkiaSharp", "analyzedAt": "2026-05-01T06:53:15Z"}, "summary": "On iOS, touches are not passed through to underlying elements (e.g., a button behind SKCanvasView) regardless of whether EnableTouchEvents is false or whether e.Handled is set to false in the touch handler — while Android works correctly.", "classification": {"type": {"value": "type/bug", "confidence": 0.92}, "area": {"value": "area/SkiaSharp.Views", "confidence": 0.88}, "platforms": ["os/iOS"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "platform-specific", "reproQuality": "partial", "targetFrameworks": ["Xamarin.iOS"]}, "reproEvidence": {"stepsToReproduce": ["Place a button in a Xamarin.Forms layout", "Place an SKCanvasView on top of the button (FillAndExpand)", "Set EnableTouchEvents=\"false\" on the SKCanvasView, OR set it true and set e.Handled = false in the Touch handler", "Tap on the area covered by the SKCanvasView on iOS", "Observe that the button's tap command is never triggered"], "environmentDetails": "SkiaSharp 1.68.0, iOS 11.3 / 12.2, Simulator & iPhone 6s, Visual Studio for Mac / Rider", "repoLinks": [{"url": "https://github.com/Alex-Witkowski/SkiaSharpTouchTest", "description": "Reporter's minimal demo application"}]}, "versionAnalysis": {"mentionedVersions": ["1.68.0"], "currentRelevance": "likely", "relevanceReason": "The iOS touch handling on Apple platforms still uses UIGestureRecognizer without overriding hitTest:withEvent:. The structural cause (gesture recognizer does not make touches fall through to sibling views) persists in the current MAUI codebase."}}, "analysis": {"summary": "On iOS, SKCanvasView absorbs touch events even when EnableTouchEvents is false or e.Handled is false, preventing underlying sibling views (such as buttons) from receiving touches. This is caused by iOS's hit-testing model: the SKCanvasView UIView has UserInteractionEnabled=true, so it wins hit testing and touches go to it (not to the button beneath). The UIGestureRecognizer's IgnoreTouch call in TouchesBegan only tells the recognizer not to participate — it does not re-route the touch to sibling views. Android works differently (event bubbling), which explains the platform asymmetry.", "rationale": "The reported behavior is a real platform bug specific to iOS. The code investigation confirms that neither the UIGestureRecognizer removal (when EnableTouchEvents=false) nor the IgnoreTouch call (when e.Handled=false) causes touches to pass through to overlapping sibling views in UIKit. The bug is in the iOS platform touch handler, not user error. Android works correctly because Android uses a different touch dispatch model.", "keySignals": [{"text": "touch events don't reach the button on iOS even if EnableTouchEvents is set to false", "source": "issue body", "interpretation": "Hit testing assigns touches to the top UIView regardless of whether a gesture recognizer is present."}, {"text": "setting Handled property of TouchEventArgs to false", "source": "issue body", "interpretation": "IgnoreTouch is called in TouchesBegan but only tells the recognizer to opt-out; it does not route the touch to sibling views below."}, {"text": "On Android everything works as expected", "source": "issue body", "interpretation": "Android's event dispatch model supports pass-through; iOS UIKit does not without overriding hitTest:withEvent:."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Platform/Apple/SKTouchHandler.cs", "lines": "25-42", "finding": "SetEnabled removes the gesture recognizer when enableTouchEvents=false but does NOT set UserInteractionEnabled=false (because DisablesUserInteraction defaults to false and the condition on line 29 is false when UserInteractionEnabled is already true). Without UserInteractionEnabled=false, the UIView still wins hit testing and absorbs touches.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Platform/Apple/SKTouchHandler.cs", "lines": "54-65", "finding": "TouchesBegan calls IgnoreTouch when FireEvent returns false (i.e., e.Handled=false). However, IgnoreTouch only signals the UIGestureRecognizer to not claim the touch sequence — it does not cause the touch to be delivered to sibling views at the same Z-order level. UIKit's responder chain goes UP the view hierarchy (to parents), not sideways to overlapping siblings.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views/Platform/iOS/SKCanvasView.cs", "lines": "15-153", "finding": "The iOS SKCanvasView (SkiaSharp.Views.iOS) is a plain UIView subclass with no override of hitTest:withEvent: or pointInside:withEvent:. When UserInteractionEnabled=true (default), the standard hit testing always routes touches to this view if it is topmost, with no mechanism to pass to underlying siblings.", "relevance": "related"}], "workarounds": ["Set UserInteractionEnabled = false on the native iOS SKCanvasView when touch passthrough is needed. In Xamarin.Forms, this can be done via a custom renderer that sets the underlying UIView's UserInteractionEnabled to false.", "Use a custom renderer to override hitTest:withEvent: on the iOS SKCanvasView to return nil (or the result of testing child views), allowing touches to fall through to views below.", "Restructure the layout to avoid overlapping — use absolute layout with the button positioned outside the SKCanvasView bounds."], "nextQuestions": ["Does this bug still reproduce with the current MAUI code on iOS?", "Should the fix set UserInteractionEnabled=false when EnableTouchEvents=false, or override hitTest:withEvent: for a more targeted passthrough?", "Is the same issue present on macOS/Catalyst?"], "resolution": {"hypothesis": "When EnableTouchEvents=false, the fix is to set UserInteractionEnabled=false on the UIView so it is excluded from hit testing and touches reach the underlying button. When EnableTouchEvents=true and e.Handled=false, the fix requires overriding hitTest:withEvent: in SKTouchHandler or the SKCanvasView to return nil when no handler claims the touch.", "proposals": [{"title": "Set UserInteractionEnabled based on EnableTouchEvents", "description": "When EnableTouchEvents=false, set UserInteractionEnabled=false on the UIView. This causes the iOS hit-test to skip the SKCanvasView entirely, delivering touches to the button below. Existing code has a DisablesUserInteraction flag but it defaults to false; ensure it is set appropriately or simplify the logic.", "category": "fix", "confidence": 0.78, "effort": "cost/s", "validated": "untested"}, {"title": "Override hitTest:withEvent: to pass through unhandled touches", "description": "Subclass the iOS view (or use a swizzle/category) to override hitTest:withEvent:. When EnableTouchEvents=false or when the app has indicated touches should not be consumed, return nil so the system skips this view and continues hit-testing to the button below.", "category": "fix", "confidence": 0.72, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Set UserInteractionEnabled based on EnableTouchEvents", "recommendedReason": "Simpler change with well-understood iOS semantics. Setting UserInteractionEnabled=false excludes the view from hit-testing entirely, which is the correct behavior when the user does not want the view to capture touches."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Real iOS-specific bug with clear root cause and a reproduction repo. The fix path is understood but needs verification that the behavior still reproduces on current MAUI code and that the proposed fix doesn't break existing touch handling.", "suggestedReproPlatform": "macos"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp.Views, os/iOS, tenet/compatibility", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/SkiaSharp.Views", "os/iOS", "tenet/compatibility"]}, {"type": "add-comment", "description": "Explain root cause and provide workaround for now", "risk": "medium", "confidence": 0.82, "comment": "Thanks for the detailed report and the demo repo!\n\nThe root cause is an iOS-specific behavior: UIKit uses **hit testing** to determine which view receives a touch. Because `SKCanvasView` is on top and has `UserInteractionEnabled = true` (the default), it always wins the hit test — the button beneath never sees the touch, regardless of `EnableTouchEvents` or `e.Handled`.\n\nOn Android this works because Android's touch dispatch model supports event bubbling through overlapping views; UIKit does not.\n\n**Workaround (Xamarin.Forms):**\nCreate a custom renderer for iOS that sets `UserInteractionEnabled = false` on the native view when you don't need touch:\n```csharp\n[assembly: ExportRenderer(typeof(SkiaSharp.Views.Forms.SKCanvasView), typeof(YourApp.iOS.PassthroughSKCanvasViewRenderer))]\nnamespace YourApp.iOS\n{\n    public class PassthroughSKCanvasViewRenderer : SKCanvasViewRenderer\n    {\n        protected override void OnElementChanged(ElementChangedEventArgs<SkiaSharp.Views.Forms.SKCanvasView> e)\n        {\n            base.OnElementChanged(e);\n            if (Control != null)\n                Control.UserInteractionEnabled = false;\n        }\n    }\n}\n```\nThis makes the SKCanvasView invisible to hit-testing and lets touches reach the button below.\n\nWe're tracking a proper fix that will honor `EnableTouchEvents=false` by automatically setting `UserInteractionEnabled=false` on the native iOS view."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
