<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2807, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-21T18:36:00Z", "currentLabels": ["type/bug"]}, "summary": "SKXamlCanvas PointerWheelChanged event only fires in the top-left portion of the canvas when running an Uno WinUI app on a high-DPI Surface device, while other pointer events (PointerDown, PointerMoved) work correctly across the full canvas area.", "classification": {"type": {"value": "type/bug", "confidence": 0.88}, "area": {"value": "area/SkiaSharp.Views.Uno", "confidence": 0.85}, "platforms": ["os/Windows-WinUI"], "partner": "partner/unoplatform"}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "platform-specific", "reproQuality": "partial", "targetFrameworks": ["net8.0-windows"]}, "reproEvidence": {"stepsToReproduce": ["Create an Uno WinUI app with SKXamlCanvas filling most of the screen", "Attach PointerWheelChanged and PointerPressed event handlers", "Run on a high-DPI device (e.g., Surface with 150% or 200% scaling)", "Observe that PointerWheelChanged only fires in the top-left corner while PointerPressed fires everywhere"], "environmentDetails": "Surface device, Windows, SkiaSharp.Views.Uno.WinUI 2.88.7, SkiaSharp.Views.WinUI 2.88.7, Visual Studio (Windows)"}, "versionAnalysis": {"mentionedVersions": ["2.88.7"], "currentRelevance": "likely", "relevanceReason": "The DPI scaling logic in SKXamlCanvas (Skia and Shared implementations) has not materially changed since 2.88.x."}}, "analysis": {"summary": "On high-DPI devices, the SKXamlCanvas background brush in the Uno Skia implementation is created from a WriteableBitmap sized at physical pixels with Stretch.Fill, which may cause Uno's hit-test region to track physical pixel coordinates rather than logical ones, limiting PointerWheelChanged dispatch to a sub-region of the canvas.", "rationale": "The reporter describes a clear, device-specific discrepancy: PointerWheelChanged does not fire outside the top-left corner on a high-DPI Surface but works elsewhere. The asymmetry with PointerDown (which fires correctly) suggests a hit-test region issue specific to how Uno routes wheel events. The Skia backend implementation uses Stretch.Fill with a physical-pixel-sized WriteableBitmap whereas the native WinUI implementation uses Stretch.None plus an explicit ScaleTransform — this difference is a plausible root cause. The bug is DPI-dependent (desktop at default DPI works, Surface at higher DPI fails).", "keySignals": [{"text": "PointerWheelChanged-Event only gets invoked when the mouse pointer is in the top left corner of the Canvas", "source": "issue body", "interpretation": "Symptom consistent with a hit-test region smaller than the logical canvas — the 'active' region scales inversely with DPI."}, {"text": "It feels like it is only nearly respecting half of the screen size", "source": "issue body", "interpretation": "At 2x DPI the physical bitmap is 2x the logical size; if the hit-test region uses physical pixel dimensions it would be half the logical area in each axis."}, {"text": "other events like PointerDown get invoked correctly above every part of the canvas", "source": "issue body", "interpretation": "PointerPressed/PointerMoved likely use the XAML element bounds for hit testing; PointerWheelChanged routing in Uno may use a different path that is sensitive to the background brush geometry."}, {"text": "On my desktop, it works as expected", "source": "issue body", "interpretation": "Default 100% DPI means no scaling, so the physical and logical sizes are identical and the bug does not manifest."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views.Uno/SkiaSharp.Views.Uno.WinUI.Skia/SKXamlCanvas.Skia.cs", "lines": "89-100", "finding": "WriteableBitmap created at physical pixel dimensions (info.Width × info.Height where info is DPI-scaled). ImageBrush uses Stretch.Fill with no ScaleTransform. On high-DPI, the bitmap's intrinsic DIP size equals the physical pixel count, which is larger than the logical canvas; Stretch.Fill rescales it, but Uno's internal geometry for the brush may record the unscaled DIP extent, potentially restricting the hit-test region.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/SKXamlCanvas.cs", "lines": "229-269", "finding": "The native WinUI implementation also creates a WriteableBitmap at physical pixel size, but uses Stretch.None with UpdateBrushScale() applying ScaleTransform(1/Dpi, 1/Dpi). This is a different approach: the brush shrinks from physical to logical size via transform rather than Stretch.Fill. On Windows the Uno WinUI package defers to this implementation for -windows TFM.", "relevance": "related"}, {"file": "source/SkiaSharp.Views.Uno/SkiaSharp.Views.Uno.WinUI.Shared/SKXamlCanvas.cs", "lines": "91-95", "finding": "Shared Uno implementation reads DPI via DisplayInformation.GetForCurrentView().LogicalDpi / 96. On WinUI 3, this UWP-era API may return different values than XamlRoot.RasterizationScale used by the native WinUI implementation. A mismatch could cause the computed physical pixel size to be incorrect.", "relevance": "related"}, {"file": "source/SkiaSharp.Views.Uno/SkiaSharp.Views.Uno.WinUI/SkiaSharp.Views.Uno.WinUI.csproj", "lines": "113-115", "finding": "For -windows TFM all Uno-specific code is excluded and the package defers to SkiaSharp.Views.WinUI. A Surface running native WinUI would therefore use SKXamlCanvas from SkiaSharp.Views.WinUI. A Skia-renderer Uno app on Windows uses SKXamlCanvas.Skia.cs.", "relevance": "context"}], "nextQuestions": ["Is the reporter using the native WinUI renderer or the Uno Skia renderer on Windows?", "What exact DPI/scale factor is the Surface device set to?", "Does the issue reproduce when IgnorePixelScaling=true on SKXamlCanvas?", "Is the issue in SkiaSharp.Views.WinUI (native) or SkiaSharp.Views.Uno.WinUI.Skia (Skia renderer)?", "Is the Canvas Width/Height fixed or does it use stretch layout?"], "resolution": {"hypothesis": "On high-DPI, the Skia-renderer Uno implementation sets a physical-pixel-sized WriteableBitmap as the Canvas Background with Stretch.Fill. Uno's internal hit-test geometry for the brush may be computed from the unscaled DIP dimensions of the bitmap (= physical pixels), making the effective hit-test region smaller than the logical canvas by a factor of 1/Dpi in each dimension — matching the 'top left corner only' symptom.", "proposals": [{"title": "Request additional environment details", "description": "Ask the reporter whether they are using the Uno Skia renderer or native WinUI on Windows, the exact DPI setting, and whether the issue reproduces with IgnorePixelScaling=true. This will narrow the root cause to the correct code path.", "category": "investigation", "confidence": 0.9, "effort": "cost/xs", "validated": "untested"}, {"title": "Align Skia-renderer brush setup with WinUI implementation", "description": "In SKXamlCanvas.Skia.cs, replace Stretch.Fill with Stretch.None and add a ScaleTransform(1/Dpi, 1/Dpi) on the ImageBrush.Transform (matching the native WinUI approach). This would ensure Uno's hit-test geometry is based on the logical canvas size rather than the physical pixel bitmap size.", "category": "fix", "confidence": 0.65, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Request additional environment details", "recommendedReason": "Without knowing whether the reporter uses the Uno Skia renderer or native WinUI on Windows, the exact fix path is unclear. Gathering environment info first avoids a wasted fix attempt."}}, "output": {"actionability": {"suggestedAction": "needs-info", "confidence": 0.8, "reason": "Bug symptoms are consistent with a DPI hit-test region issue, but critical info is missing: whether the Skia renderer or native WinUI renderer is in use, the exact DPI setting, and any IgnorePixelScaling behavior. The code investigation identified two plausible code paths and an asymmetry between them, but without confirming which path is active, a targeted fix cannot be made.", "suggestedReproPlatform": "windows"}, "missingInfo": ["Which Uno renderer is in use on Windows: native WinUI or Uno Skia renderer?", "Exact Windows display DPI/scale setting on the Surface device", "Does the issue reproduce with SKXamlCanvas.IgnorePixelScaling = true?", "Target framework: net8.0-windows (WinUI) or net8.0 with Skia renderer?", "Does the issue also affect PointerMoved or only PointerWheelChanged?"], "actions": [{"type": "update-labels", "description": "Apply bug, Uno views, Windows WinUI, and partner labels", "risk": "low", "confidence": 0.88, "labels": ["type/bug", "area/SkiaSharp.Views.Uno", "os/Windows-WinUI", "partner/unoplatform"]}, {"type": "add-comment", "description": "Request environment details to identify which code path (Skia renderer vs native WinUI) is involved", "risk": "medium", "confidence": 0.8, "comment": "Thanks for the report! The DPI-dependent hit-test area you're describing is a recognized class of issue. To narrow down the root cause, could you provide:\n\n1. **Renderer**: Is your Uno app using the **native WinUI renderer** or the **Uno Skia renderer** on Windows? (Check your app's `AppHead` or project configuration — Skia renderer apps typically reference `Uno.WinUI.Skia.*` packages.)\n2. **Display scale**: What DPI/scale percentage is set on the Surface device? (Settings → Display → Scale)\n3. **IgnorePixelScaling**: Does setting `IgnorePixelScaling=\"True\"` on the `SKXamlCanvas` change the behavior?\n4. **Target framework**: Is the Windows target `net8.0-windows10.0.xxxxx` or `net8.0`?\n\nThis will tell us whether the issue is in the native WinUI code path or the Uno Skia rendering path, as the two have different DPI handling implementations."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
