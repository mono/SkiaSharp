<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3313, "repo": "mono/SkiaSharp", "analyzedAt": "2026-05-02T00:49:27Z", "currentLabels": ["type/bug"]}, "summary": "SKCanvasView in Blazor/WASM shows severe frame-rate degradation (120fps → ~10fps) when drawing a scaled SKImage due to software rasterization and large putImageData transfers, unlike SKGLView which is GPU-accelerated.", "classification": {"type": {"value": "type/bug", "confidence": 0.88}, "area": {"value": "area/SkiaSharp.Views.Blazor", "confidence": 0.95}, "platforms": ["os/WASM"], "tenets": ["tenet/performance"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "performance", "reproQuality": "partial", "targetFrameworks": ["net8.0-browser"]}, "reproEvidence": {"stepsToReproduce": ["In a Blazor WASM app using SKCanvasView, load a 786x1090 SKBitmap and create a cached SKImage from it", "Draw the cached SKImage scaled to a larger rect (e.g. 800x800 or 1600x1600) using canvas.DrawImage()", "Observe FPS drop from 120fps (1:1 drawing) to 50fps (800x800) to 12fps (1600x1600)", "Apply canvas.Scale(2) before 1:1 drawing and observe same degradation (~10fps)"], "environmentDetails": "macOS M2 Pro, Chrome/Firefox/Safari, SkiaSharp 3.119.0", "codeSnippets": ["using (new SKAutoCanvasRestore(canvas)) {\n    canvas.ResetMatrix();\n    canvas.Scale(2);\n    canvas.DrawImage(image.Image, new SKRect(0,0, 786, 1090), SKSamplingOptions.Default, theme.BitmapPaint);\n}"], "screenshots": [{"url": "https://github.com/user-attachments/assets/085a25a2-0300-4adc-8c6d-343d8e88d898", "description": "Screenshot: 800x800 rect at ~50fps"}, {"url": "https://github.com/user-attachments/assets/1cd90261-e281-4d8b-9109-605a28980f6f", "description": "Screenshot: 1600x1600 rect at ~12fps"}, {"url": "https://github.com/user-attachments/assets/835f2669-29da-40dc-aa22-98ed79a458f9", "description": "Screenshot: 1:1 786x1090 rect at 120fps"}]}, "versionAnalysis": {"mentionedVersions": ["3.119.0"], "currentRelevance": "likely", "relevanceReason": "The software raster architecture of SKCanvasView in Blazor has not changed — putImageData transfer approach is the same."}}, "analysis": {"summary": "SKCanvasView in Blazor uses a CPU software raster pipeline: Skia renders into a byte[] backed SKSurface in WASM memory, then the entire framebuffer is transferred to the HTML canvas via ctx.putImageData(). When the image is scaled, Skia must perform software bilinear filtering for every output pixel in WASM, and the resulting large pixel buffer (e.g. 1600x1600x4 = ~10MB) must cross the WASM/JS boundary on every frame. SKGLView bypasses this entirely by using WebGL, where the GPU handles texture scaling in hardware with no per-pixel CPU work and no large buffer transfer.", "rationale": "Classified as type/bug because the reporter observes a severe platform-specific performance disparity (iOS/Android handle this smoothly). The architecture of SKCanvasView in Blazor is inherently software-raster based, creating a known WASM performance trap. The area is area/SkiaSharp.Views.Blazor since the issue is in the Blazor-specific canvas view implementation.", "keySignals": [{"text": "When drawing exactly in a 786x1090 Rect, we get the solid 120fps. If I then just do a canvas.Scale(2) before drawing in the fixed size rect, we go back to around 10fps.", "source": "issue body", "interpretation": "Scaling triggers expensive software resampling regardless of output rect size — confirms Skia is doing per-pixel software work, not GPU-accelerated scaling."}, {"text": "SKCanvasView tanks performance, SKGLView handles it fine.", "source": "issue body", "interpretation": "The perf gap is between software raster (SKCanvasView) and GPU-accelerated (SKGLView) — confirms architecture is root cause."}, {"text": "I've tried experimenting with different SKSamplingOptions, but none improve it.", "source": "issue body", "interpretation": "Filter quality changes don't help because the bottleneck is the entire software raster pipeline and putImageData transfer, not just the sampling algorithm."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views.Blazor/SKCanvasView.razor.cs", "lines": "87-108", "finding": "OnRenderFrame() creates SKSurface backed by a pinned byte[] array, invokes user paint callback, then calls interop.PutImageData() to transfer the whole pixel buffer to the HTML canvas. Every frame requires a full WASM→JS pixel buffer copy, which is O(width*height*4) bytes.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.Blazor/wwwroot/SKHtmlCanvas.js", "lines": "129-145", "finding": "putImageData() calls ctx.putImageData(new ImageData(Uint8ClampedArray from WASM heap), 0, 0). This transfers the entire pixel buffer from WASM linear memory to the browser's ImageData every frame — no GPU compositing, no caching.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.Blazor/SKCanvasView.razor.cs", "lines": "67-77", "finding": "OnAfterRenderAsync calls interop.InitRaster() (not InitGL), locking this view to software raster mode. There is no option to switch to GPU-backed rendering without using SKGLView.", "relevance": "related"}], "nextQuestions": ["Can the Blazor SKCanvasView be enhanced to use OffscreenCanvas + GPU compositing for scaling to reduce CPU pressure?", "Is there an intermediate option to render to a smaller surface and let the browser scale, as a workaround for image-heavy content?", "Does pre-scaling the SKImage to the target size before caching eliminate the per-frame cost?"], "workarounds": ["Use SKGLView instead of SKCanvasView for image-heavy rendering in Blazor WASM (confirmed smooth by reporter); investigate the DrawLine performance issue separately.", "Pre-scale the SKImage to the exact display size once (using SKImage.Resize or drawing to a new SKBitmap at target size), then cache the pre-scaled image and draw 1:1 — this avoids per-frame software resampling.", "Reduce the canvas size or use IgnorePixelScaling=true to lower the pixel buffer size that must be transferred each frame."], "resolution": {"hypothesis": "SKCanvasView in Blazor has a fundamental architecture mismatch: it uses software rasterization + full-frame putImageData, which is extremely expensive for scaled image drawing in WASM. Fixing properly would require offloading compositing to the browser GPU or using an intermediate OffscreenCanvas.", "proposals": [{"title": "Pre-scale image to display size", "description": "Create a pre-scaled version of the SKImage at the target display dimensions and cache it. Draw 1:1 each frame to avoid per-frame software resampling.", "category": "workaround", "confidence": 0.9, "effort": "cost/xs", "validated": "untested"}, {"title": "Investigate OffscreenCanvas + GPU compositing", "description": "Explore whether SKCanvasView's putImageData approach could be replaced with a createImageBitmap + drawImage call that leverages browser GPU compositing for scaling operations.", "category": "investigation", "confidence": 0.6, "effort": "cost/l", "validated": "untested"}], "recommendedProposal": "Pre-scale image to display size", "recommendedReason": "Immediately actionable workaround with no library changes needed. Eliminates per-frame software scaling cost entirely."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Real performance bug with clear repro numbers and a known root cause (software raster + putImageData). Needs investigation into whether a GPU-backed fix is feasible for SKCanvasView, and the reporter needs a workaround.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, Blazor area, WASM, and performance tenet labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp.Views.Blazor", "os/WASM", "tenet/performance"]}, {"type": "add-comment", "description": "Explain root cause (software raster) and suggest pre-scaling workaround", "risk": "medium", "confidence": 0.85, "comment": "Thanks for the detailed repro with FPS numbers!\n\n**Root cause:** `SKCanvasView` in Blazor WASM uses a software raster pipeline — Skia draws into a pinned `byte[]` in WASM memory, then the entire pixel buffer is transferred to the HTML canvas every frame via `ctx.putImageData()`. When you scale an image, Skia must compute filtered pixel values for every output pixel in CPU/software, and then transfer a potentially large buffer (e.g. 1600×1600×4 ≈ 10MB) across the WASM/JS boundary on every frame. This is fundamentally different from `SKGLView`, which uses WebGL so GPU hardware handles scaling with no per-pixel CPU work.\n\n**Workaround:** Pre-scale the image to the exact display dimensions once and cache the result:\n```csharp\n// Do this once when the image or target size changes\nvar scaledBitmap = new SKBitmap(displayWidth, displayHeight);\nusing var canvas = new SKCanvas(scaledBitmap);\ncanvas.DrawImage(sourceImage, new SKRect(0, 0, displayWidth, displayHeight), SKSamplingOptions.Default);\nvar scaledImage = SKImage.FromBitmap(scaledBitmap);\n\n// Then each frame, draw 1:1 (no scaling = no per-frame resampling cost)\ncanvas.DrawImage(scaledImage, 0, 0);\n```\n\nThis eliminates per-frame software resampling entirely.\n\nWe're tracking whether `SKCanvasView` in Blazor can be improved to use GPU-backed compositing for scaling operations."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
