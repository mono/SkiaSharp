<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1407, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-28T18:55:00Z"}, "summary": "Reporter describes that SKPaint.GetTextPath() returns a path at the given x/y coordinates without adjusting for paint.TextAlign, while SKCanvas.DrawText() adjusts the origin based on TextAlign. When TextAlign is Center or Right, the halo path rendered via DrawPath(GetTextPath(...)) is misaligned with the DrawText() output. Reported against SkiaSharp 2.80.1 on Windows; believed to affect all platforms.", "classification": {"type": {"value": "type/bug", "confidence": 0.92}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "wrong-output", "errorMessage": "Halo text path position doesn't match actual text position when paint.TextAlign != SKTextAlign.Left", "reproQuality": "complete"}, "reproEvidence": {"stepsToReproduce": ["Create SKPaint with TextAlign = SKTextAlign.Center", "Call paint.GetTextPath(\"Test Text\", 0, 0) to get path for halo rendering", "Call canvas.DrawPath(path, haloPaint) to draw halo", "Call canvas.DrawText(\"Test Text\", 0, 0, paint) to draw text", "Observe halo is left-aligned while text is center-aligned"], "codeSnippets": ["SKPaint paint = new SKPaint();\npaint.TextAlign = SKTextAlign.Center;\n// Draw Halo\ncanvas.DrawPath(paint.GetTextPath(\"Test Text\", 0, 0), haloPaint);\n// Draw text\ncanvas.DrawText(\"Test Text\", 0, 0, paint);"], "screenshots": [{"url": "https://user-images.githubusercontent.com/63121477/87454665-e8059600-c5c9-11ea-8426-81ec935e470e.png", "description": "Red text with blue halo showing alignment offset when TextAlign is Center"}], "environmentDetails": "SkiaSharp 2.80.1, Visual Studio, Windows (believed to affect all platforms)"}, "versionAnalysis": {"mentionedVersions": ["2.80.1", "1.68.3"], "workedIn": "1.68.3", "brokeIn": "2.80.1", "currentRelevance": "likely", "relevanceReason": "SKPaint.GetTextPath() is now marked [Obsolete] but still delegates to SKFont.GetTextPath() without any alignment adjustment. The behavior mismatch persists in current code."}, "regression": {"isRegression": true, "confidence": 0.55, "reason": "Reporter states it worked in 1.68.3. The 1.x-to-2.x API refactoring moved text handling to SKFont, which does not apply alignment — causing the mismatch. Whether 1.68.3 applied alignment is unverified.", "workedInVersion": "1.68.3", "brokeInVersion": "2.80.1"}}, "analysis": {"summary": "SKPaint.GetTextPath() does not apply TextAlign to the origin when computing the text outline path, while SKCanvas.DrawText() explicitly adjusts the x coordinate for Center/Right alignment. This mismatch means that when a developer uses GetTextPath() with a Center-aligned paint to draw a halo, the path is positioned as if TextAlign were Left. The root cause is that SKPaint.GetTextPath() simply delegates to SKFont.GetTextPath(), which calls sk_text_utils_get_path natively without alignment — alignment is not in scope for SKFont. By contrast, DrawText() explicitly computes font.MeasureText() and subtracts the offset. A workaround is to manually apply the translation after getting the path.", "rationale": "The behavior mismatch is confirmed by code inspection: SKCanvas.DrawText() at lines 661-665 explicitly adjusts x for non-Left alignment, while SKPaint.GetTextPath() at line 427-428 delegates to SKFont.GetTextPath() without any adjustment. The reporter's screenshot visually confirms the offset. A CONTRIBUTOR comment already explains the architectural reason and provides a valid workaround. The [Obsolete] SKPaint.GetTextPath() path still exists in the codebase and issue #3732 tracks deprecation. The inconsistency is real and worth tracking even as the API is deprecated.", "keySignals": [{"text": "paint.GetTextPath() doesn't respect paint.TextAlign property", "source": "issue title", "interpretation": "Direct API inconsistency between GetTextPath and DrawText"}, {"text": "the halo was off because the text Align is Center, but Halo seems still using TextAlign.Left", "source": "issue body", "interpretation": "Clear description of alignment mismatch with screenshot evidence"}, {"text": "I think SKPaint.GetTextPath should be deprecated...Neither SKFont nor that native SkTextUtils::GetPath have alignment", "source": "comment by ziriax (CONTRIBUTOR)", "interpretation": "Architectural explanation: alignment was intentionally not included in SKFont.GetTextPath — it is the caller's responsibility"}, {"text": "You can align the path yourself with e.g. path.Transform(SKMatrix.CreateTranslation(-path.Bounds.Width / 2f, 0))", "source": "comment by ziriax (CONTRIBUTOR)", "interpretation": "A working workaround already exists and was positively received (+1 reaction)"}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKCanvas.cs", "lines": "652-673", "finding": "DrawText(string, float, float, SKTextAlign, SKFont, SKPaint) explicitly adjusts x for non-Left alignment: computes font.MeasureText(text) and subtracts full width (Right) or half width (Center). This is why DrawText positions correctly while GetTextPath does not.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKPaint.cs", "lines": "426-428", "finding": "SKPaint.GetTextPath(string, float, float) is marked [Obsolete] and delegates directly to GetFont().GetTextPath(text, new SKPoint(x, y)) with no alignment adjustment applied.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFont.cs", "lines": "746-754", "finding": "SKFont.GetTextPath() calls native sk_text_utils_get_path with the given origin coordinates; no alignment offset is applied at any layer.", "relevance": "related"}], "workarounds": ["For Center alignment: var path = paint.GetTextPath(text, x, y); path.Transform(SKMatrix.CreateTranslation(-paint.MeasureText(text) / 2f, 0));", "For Right alignment: var path = paint.GetTextPath(text, x, y); path.Transform(SKMatrix.CreateTranslation(-paint.MeasureText(text), 0));", "Alternatively: compute the alignment offset yourself and pass adjusted coordinates to GetTextPath — e.g., for Center pass x - (width/2) as the x argument."], "nextQuestions": ["Should the obsolete SKPaint.GetTextPath() be patched to apply TextAlign before it is promoted to [Obsolete(error:true)] in issue #3732?", "Should SKFont.GetTextPath() offer an overload accepting a textAlign parameter for convenience?"], "resolution": {"hypothesis": "SKFont.GetTextPath() intentionally omits alignment (alignment is a canvas-level concern). SKPaint.GetTextPath() inherited this behavior when it was refactored to delegate to SKFont. The fix is either to apply alignment in the legacy SKPaint wrapper, or document and enforce the manual-translation pattern.", "proposals": [{"title": "Apply manual translation after GetTextPath", "description": "Use the existing (obsolete) or new SKFont.GetTextPath(), then apply a SKMatrix.CreateTranslation() to correct for alignment. Mirrors exactly what DrawText() does internally.", "category": "workaround", "codeSnippet": "// Get the path\nvar path = paint.GetTextPath(\"Test Text\", x, y);\n// Apply alignment offset to match DrawText behavior\nfloat width = paint.MeasureText(\"Test Text\");\nif (paint.TextAlign == SKTextAlign.Center)\n    path.Transform(SKMatrix.CreateTranslation(-width / 2f, 0));\nelse if (paint.TextAlign == SKTextAlign.Right)\n    path.Transform(SKMatrix.CreateTranslation(-width, 0));", "confidence": 0.92, "effort": "cost/xs", "validated": "yes"}, {"title": "Fix SKPaint.GetTextPath to apply alignment before deprecation error", "description": "Update the obsolete SKPaint.GetTextPath(string, float, float) overloads to apply TextAlign adjustment (matching DrawText behavior) before issue #3732 promotes them to [Obsolete(error: true)].", "category": "fix", "confidence": 0.72, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Apply manual translation after GetTextPath", "recommendedReason": "Immediate workaround using existing public APIs, no code changes required. Mirrors the exact logic used internally by DrawText. The code fix depends on #3732 timeline decisions."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Real behavior mismatch confirmed by code inspection. Workaround exists. Decision needed on whether to fix the legacy SKPaint.GetTextPath() wrapper before issue #3732 promotes it to an error, or just document the manual alignment pattern.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, core API area, and compatibility tenet labels", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/SkiaSharp", "tenet/compatibility"]}, {"type": "add-comment", "description": "Post analysis with workaround for immediate use", "risk": "medium", "confidence": 0.9, "comment": "Thanks for the detailed report and screenshot.\n\nThis is a confirmed inconsistency: `SKCanvas.DrawText()` adjusts the x origin based on `TextAlign`, but `SKPaint.GetTextPath()` (and the underlying `SKFont.GetTextPath()`) does not — alignment is the caller's responsibility when working with paths.\n\nAs a workaround, apply the alignment offset manually after getting the path:\n\n```csharp\nvar path = paint.GetTextPath(\"Test Text\", x, y);\nfloat width = paint.MeasureText(\"Test Text\");\nif (paint.TextAlign == SKTextAlign.Center)\n    path.Transform(SKMatrix.CreateTranslation(-width / 2f, 0));\nelse if (paint.TextAlign == SKTextAlign.Right)\n    path.Transform(SKMatrix.CreateTranslation(-width, 0));\n```\n\nNote: `SKPaint.GetTextPath()` is now marked `[Obsolete]` — the modern replacement is `SKFont.GetTextPath()`. See also #3732 which tracks the migration of text APIs from `SKPaint` to `SKFont`."}, {"type": "link-related", "description": "Link to #3732 which tracks SKPaint text API deprecation", "risk": "low", "confidence": 0.85, "linkedIssue": 3732}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
