<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1880, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-29T01:50:35Z"}, "summary": "SKPaint (and related container objects) does not hold a C# reference to properties assigned to it (Shader, MaskFilter, ColorFilter, ImageFilter, PathEffect), allowing the GC to collect the C# wrapper and call unref() on the underlying C++ object while the paint is still alive, potentially causing fatal crashes.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/SkiaSharp", "confidence": 0.95}, "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "crash", "errorMessage": "Fatal crash / Access Violation when SKPaint uses a GC-collected shader", "reproQuality": "partial", "targetFrameworks": ["net6.0-windows10.0.19041.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a new SKPaint instance", "Set paint.Shader = SKShader.CreateColor(...) without keeping a C# reference to the shader", "Trigger garbage collection (GC.Collect() or natural GC pressure)", "Continue using the SKPaint or dispose it — fatal crash occurs"], "codeSnippets": ["public SKShader Shader {\n  get => SKShader.GetObject(SkiaApi.sk_paint_get_shader(Handle));\n  set => SkiaApi.sk_paint_set_shader(Handle, value == null ? IntPtr.Zero : value.Handle);\n}"], "attachments": [{"url": "https://user-images.githubusercontent.com/518177/145032550-149cd681-17b7-4c26-a5ca-8b3cfa895679.png", "filename": "fatal-crash-2.80.3.png"}, {"url": "https://user-images.githubusercontent.com/1216684/220228873-700f187d-06f8-462b-bf49-53c9b90eb158.png", "filename": "fatal-crash-2.88.3-winui.png"}], "relatedIssues": [2794], "repoLinks": []}, "versionAnalysis": {"mentionedVersions": ["2.80.3", "2.88.3.0"], "currentRelevance": "likely", "relevanceReason": "Code investigation confirms that SKPaint property setters (Shader, MaskFilter, ColorFilter, ImageFilter, PathEffect, Blender) in the current codebase do not call Referenced() to keep the C# wrapper alive. The Referenced() mechanism exists in SKObject but is not applied to SKPaint setters."}}, "analysis": {"summary": "SKPaint property setters (Shader, MaskFilter, ColorFilter, ImageFilter, PathEffect, Blender) pass the native handle to Skia via P/Invoke but do not store a strong C# reference to the wrapper object. Because HandleDictionary uses WeakReference, the GC can collect the C# wrapper while the paint is still alive. If the finalizer calls unref() and the C++ refcount reaches zero (e.g., due to a borrowed-reference pattern in the C API shim or race condition), the shader is freed while the paint still holds a pointer to it, causing a fatal crash.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKPaint.cs", "lines": "204-207", "finding": "SKPaint.Shader setter calls sk_paint_set_shader and does not store a C# reference to the shader object. No call to Referenced(this, value) or KeepAliveObjects. Same pattern for MaskFilter (210-212), ColorFilter (214-217), ImageFilter (219-222), PathEffect (276-279), and Blender (229-232).", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKObject.cs", "lines": "200-209", "finding": "Referenced<T>(T owner, SKObject child) stores child in owner.KeepAliveObjects[child.Handle], preventing GC of child as long as owner is alive. This mechanism exists but is not used in SKPaint property setters.", "relevance": "direct"}, {"file": "binding/SkiaSharp/HandleDictionary.cs", "lines": "21", "finding": "HandleDictionary uses WeakReference for all registered objects. Once the only strong C# reference to an SKShader is gone, the GC can collect it and the finalizer will call unref() on the native handle.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKObject.cs", "lines": "94-98", "finding": "DisposeNative() for ISKReferenceCounted objects calls SafeUnRef(), which decrements the C++ refcount. If the shader was created with owns=true (refcount 1) and Skia stores a borrowed reference in the paint, unref brings refcount to 0 and frees the shader.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKColorSpace.cs", "lines": "105", "finding": "SKColorSpace.Create uses Referenced(GetObject(...), profile) as a correct pattern to keep profile alive. This same pattern should be applied to SKPaint setters.", "relevance": "related"}], "keySignals": [{"text": "The SKPaint class should hold a reference to the C# Shader to prevent garbage collection.", "source": "issue body", "interpretation": "Reporter correctly identifies the root cause: no strong C# reference to the shader wrapper."}, {"text": "A fatal crash will occur since the SKPaint is making use of the freed memory", "source": "issue body", "interpretation": "Confirms this is a use-after-free scenario triggered by GC collecting the C# wrapper."}, {"text": "v2.88.3.0, net6.0-windows10.0.19041.0\\win10-x64\\AppX\\SkiaSharp.Views.Windows.dll", "source": "comment by DamianSuess", "interpretation": "Issue still reproducible on v2.88.3 on WinUI, confirming cross-platform and not fixed in 2.x branch."}], "workarounds": ["Keep an explicit C# field/variable reference to the SKShader (and other properties) for as long as the SKPaint is in use: `private SKShader _shader; ... _shader = SKShader.CreateColor(...); paint.Shader = _shader;`", "Call GC.KeepAlive(shader) at the end of any method that uses the paint to prevent premature collection within a single method scope."], "nextQuestions": ["Does sk_paint_set_shader in the SkiaSharp C API shim call sk_ref_sp (incrementing refcount) or store a borrowed pointer? If it refs, then the crash requires a double-unref scenario.", "Does the issue reproduce in SkiaSharp 3.x with the current codebase?", "Should the fix use Referenced() in setters, or should SKPaint track a private field per property?", "Are SKFont, SKBitmap, SKImage or other container objects similarly missing keepalive references for their sub-objects?"], "rationale": "Reporter provides a clear code analysis identifying the missing C# strong reference in SKPaint property setters. Source code investigation confirms the pattern: setters pass the handle via P/Invoke but do not call Referenced() or store the C# object anywhere with a strong reference. The Referenced() mechanism already exists and is used in SKDocument, SKColorSpace, and SKSVG — but not in SKPaint. The crash is classified as high severity because it causes a fatal/unrecoverable crash, though it requires a specific usage pattern (discarding the property value) and GC pressure.", "resolution": {"hypothesis": "SKPaint property setters must store a strong C# reference to property objects to prevent premature GC. The existing Referenced() mechanism is the correct fix approach.", "proposals": [{"title": "Keep C# reference in SKPaint setters using Referenced()", "description": "Modify each property setter in SKPaint (Shader, MaskFilter, ColorFilter, ImageFilter, PathEffect, Blender) to call Referenced(this, value) after setting the native value. This stores value in KeepAliveObjects, preventing GC until the paint is disposed.", "category": "fix", "confidence": 0.85, "effort": "cost/s", "validated": "untested"}, {"title": "Workaround: keep explicit C# reference to shader/filter objects", "description": "As a user-side workaround, store the SKShader (and other filter objects) in a field or local variable that lives at least as long as the SKPaint. This prevents GC of the C# wrapper.", "codeSnippet": "// Workaround: keep a strong reference to prevent premature GC\nprivate SKShader _shader;\n\nvoid SetupPaint()\n{\n    _shader = SKShader.CreateColor(SKColors.Red);\n    paint.Shader = _shader; // _shader field prevents GC\n}", "category": "workaround", "confidence": 0.95, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Keep C# reference in SKPaint setters using Referenced()", "recommendedReason": "The fix is small, follows the existing pattern used in SKDocument/SKColorSpace, and is the correct long-term solution. Users should not need to manually track property lifetimes."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.88, "reason": "Bug is real and reproducible with a clear root cause identified. Needs investigation to confirm current 3.x behavior, determine whether sk_paint_set_shader refs or borrows, and implement the Referenced() fix in setters.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, area/SkiaSharp, and reliability tenet labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp", "tenet/reliability"]}, {"type": "add-comment", "description": "Post analysis with root cause and workaround", "risk": "medium", "confidence": 0.88, "comment": "Thank you for the detailed analysis! You've correctly identified the root cause: `SKPaint` property setters (e.g., `Shader`, `MaskFilter`, `ColorFilter`, `ImageFilter`, `PathEffect`, `Blender`) pass the native handle to Skia but do not hold a strong C# reference to the wrapper object. Since `HandleDictionary` stores only `WeakReference` entries, the GC can collect the C# wrapper and call `unref()` while the paint is still using the underlying C++ object.\n\nThe `SKObject.Referenced()` helper already exists in the codebase for this purpose (it's used in `SKDocument`, `SKColorSpace`, etc.) but hasn't been applied to `SKPaint`'s property setters.\n\n**Workaround (until fixed):** Keep an explicit strong reference to your shader/filter objects for as long as the paint is in use:\n\n```csharp\n// Store in a field to prevent premature GC\nprivate SKShader _shader;\n\nvoid Setup()\n{\n    _shader = SKShader.CreateColor(SKColors.Red);\n    paint.Shader = _shader;\n}\n```\n\nAlternatively, call `GC.KeepAlive(shader)` at the end of any method scope where the paint is used."}, {"type": "link-related", "description": "Link to related issue #2794 which describes a similar finalizer crash in SkiaSharp 3.x", "risk": "low", "confidence": 0.75, "linkedIssue": 2794}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
