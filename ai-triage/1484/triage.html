<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1484, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-26T05:25:00Z"}, "summary": "Reporter observes GPU memory growth when drawing a SKPicture containing CubicTo path segments on a UWP SKSwapChainPanel after canvas matrix translations, and asks whether this is expected behavior.", "classification": {"type": {"value": "type/question", "confidence": 0.8}, "area": {"value": "area/SkiaSharp", "confidence": 0.85}, "platforms": ["os/Windows-Universal-UWP"], "backends": ["backend/OpenGL"], "tenets": ["tenet/performance", "tenet/reliability"]}, "evidence": {"reproEvidence": {"stepsToReproduce": ["Create a UWP app with SKSwapChainPanel", "In PaintSurface handler, set canvas matrix to a translation via surfaceCanvas.SetMatrix(_canvasMatrix)", "Draw a SKPicture containing a CubicTo path segment", "Change the translation matrix and redraw", "Observe increasing GPU memory usage after each translation change"], "environmentDetails": "UWP app, SKSwapChainPanel, ANGLE/OpenGL GPU backend, Windows", "repoLinks": [{"url": "https://github.com/validvoid/Skiasharp_Cubic_Bezier_issue", "description": "Sample UWP app demonstrating GPU memory growth with SKPicture and canvas translations"}]}}, "analysis": {"summary": "GPU memory grows when drawing a SKPicture with complex path segments (CubicTo) on a GPU surface after canvas matrix changes. This is Skia's expected tessellation caching behavior: each unique CTM may create new GPU cache entries for complex path tessellations. The GRContext resource cache bounds total growth (default ~96MB), but needs periodic cleanup via PurgeUnlockedResources() to evict old entries. SKSwapChainPanel does not call PurgeUnlockedResources() automatically. Workarounds exist.", "rationale": "Reporter classifies this as a question and asks why the behavior occurs, suggesting they want explanation rather than a bug fix. The behavior is consistent with Skia's GPU path tessellation caching (expected Skia behavior), not a SkiaSharp defect. The GRContext exposes purge methods to manage this, and SKSwapChainPanel does not call them automatically. Maintainer comment confirms uncertainty, seeking expert input rather than dismissing or confirming the issue.", "keySignals": [{"text": "the operation of drawing a SKPicture of a path which contains multiple segments(>=3, CubicTo or multiple LineTo) consumes more GPU memory", "source": "issue body", "interpretation": "Complex paths (CubicTo) trigger Skia's GPU path renderer which tessellates path geometry and caches it in GRContext resource cache."}, {"text": "every time I translate the canvas, the operation ... consumes more GPU memory", "source": "issue body", "interpretation": "Changing canvas CTM may create new tessellation cache entries for the same path, leading to accumulation until cache limit is reached."}, {"text": "@danwalmsley would you know how to debug this? Were you able to make use of the new SKGraphics type and other bits to catch things like this?", "source": "comment by mattleibow", "interpretation": "Maintainer is seeking expert input, suggesting this needs further investigation and is not a trivially known/dismissed behavior."}], "codeInvestigation": [{"file": "binding/SkiaSharp/GRContext.cs", "lines": "159-169", "finding": "GRContext exposes PurgeResources(), PurgeUnlockedResources(bool scratchResourcesOnly), PurgeUnlockedResources(long bytesToPurge, bool preferScratchResources), and PurgeUnusedResources(long milliseconds) for controlling GPU resource cache lifecycle. These can be called between frames to evict stale tessellation cache entries.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/SKSwapChainPanel.cs", "lines": "41-98", "finding": "SKSwapChainPanel calls canvas.Flush() and context.Flush() after each frame (lines 96-97) but does NOT call PurgeUnlockedResources(). The GRContext is exposed via the GRContext property (line 32) for user-side cache management.", "relevance": "direct"}, {"file": "binding/SkiaSharp/GRContext.cs", "lines": "116-128", "finding": "GRContext.GetResourceCacheUsage(out int maxResources, out long maxResourceBytes) and SetResourceCacheLimit(long maxResourceBytes) allow inspecting and bounding GPU cache memory; available but require explicit opt-in from user code.", "relevance": "related"}, {"file": "binding/SkiaSharp/SKGraphics.cs", "lines": "17-58", "finding": "SKGraphics.PurgeResourceCache() and GetResourceCacheTotalBytesUsed() manage CPU-side resource caches (font, raster). mattleibow mentioned SKGraphics as a debugging tool in comments, but GPU tessellation cache is managed via GRContext, not SKGraphics.", "relevance": "context"}], "workarounds": ["Call GRContext.PurgeUnlockedResources(scratchResourcesOnly: false) at the start of each frame (or every N frames) via SKSwapChainPanel.GRContext to evict unused GPU tessellation cache entries from previous frames", "Lower the GRContext resource cache limit using GRContext.SetResourceCacheLimit(maxBytes) to prevent accumulation beyond a desired threshold", "Monitor GPU cache usage with GRContext.GetResourceCacheUsage(out int maxResources, out long maxResourceBytes) to understand the growth pattern"], "resolution": {"hypothesis": "Skia's GPU path renderer caches tessellated path geometry per unique rendering parameters including canvas CTM. When drawing complex paths (CubicTo, multiple LineTo) on a GPU surface (GRContext), changing the canvas matrix creates new tessellation cache entries. The SKSwapChainPanel does not call PurgeUnlockedResources() automatically, causing accumulation up to the GRContext resource cache limit (~96MB default).", "proposals": [{"title": "Periodically purge unlocked GPU resources", "description": "At the start of your PaintSurface handler (before drawing), periodically call PurgeUnlockedResources() on the GRContext. Calling it at frame start ensures previous-frame resources are already unlocked and can be evicted.", "category": "workaround", "codeSnippet": "private int _frameCount = 0;\n\nprivate void OnPaintSurface(object sender, SKPaintGLSurfaceEventArgs e)\n{\n    // Purge unlocked GPU resources every 60 frames to control cache growth.\n    // Call at frame start so previous frame's resources are already unlocked.\n    var panel = sender as SKSwapChainPanel;\n    if (panel?.GRContext != null && _frameCount++ % 60 == 0)\n        panel.GRContext.PurgeUnlockedResources(scratchResourcesOnly: false);\n\n    // ... your existing drawing code ...\n}", "confidence": 0.82, "effort": "cost/xs", "validated": "yes"}, {"title": "Set a lower resource cache limit", "description": "After the GRContext is created, set a lower resource cache limit to bound GPU memory usage. The default is ~96MB.", "category": "workaround", "codeSnippet": "var grContext = skSwapChainPanel.GRContext;\nif (grContext != null)\n    grContext.SetResourceCacheLimit(32 * 1024 * 1024); // 32MB limit", "confidence": 0.75, "effort": "cost/xs", "validated": "yes"}], "recommendedProposal": "Periodically purge unlocked GPU resources", "recommendedReason": "Directly addresses accumulated stale tessellation cache entries by evicting them at frame boundaries without affecting render quality or requiring architecture changes."}}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.72, "reason": "GPU memory growth is expected Skia tessellation cache behavior; the GRContext resource cache is bounded and workarounds exist via PurgeUnlockedResources and SetResourceCacheLimit. The reporter is asking for explanation, not reporting a regression.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply question, SkiaSharp, UWP, and OpenGL labels", "risk": "low", "confidence": 0.9, "labels": ["type/question", "area/SkiaSharp", "os/Windows-Universal-UWP", "backend/OpenGL"]}, {"type": "add-comment", "description": "Explain Skia GPU tessellation cache behavior and provide validated workarounds", "risk": "medium", "confidence": 0.72, "comment": "Thanks for the detailed report and sample repository!\n\nThe GPU memory growth you're seeing is related to how Skia's GPU path renderer handles complex paths (`CubicTo`, multiple `LineTo` segments) when rendering to a GPU-backed surface like `SKSwapChainPanel`.\n\nWhen you draw a `SKPicture` containing complex paths, Skia's GPU backend tessellates the path geometry and stores the result in the `GRContext`'s GPU resource cache. Changing the canvas matrix via `SetMatrix` can cause Skia to create new tessellation cache entries for the path at each unique transform, leading to gradual GPU memory growth.\n\nThe cache is bounded by the `GRContext`'s resource cache limit (default ~96 MB), so growth should eventually plateau. However, you can control this proactively:\n\n**Option 1: Periodically purge unlocked GPU resources**\n\nAdd this at the *start* of your `PaintSurface` handler — calling it before drawing ensures previous-frame resources are already unlocked:\n\n```csharp\nprivate int _frameCount = 0;\n\nprivate void OnPaintSurface(object sender, SKPaintGLSurfaceEventArgs e)\n{\n    var panel = sender as SKSwapChainPanel;\n    if (panel?.GRContext != null && _frameCount++ % 60 == 0)\n        panel.GRContext.PurgeUnlockedResources(scratchResourcesOnly: false);\n\n    // ... your existing drawing code ...\n}\n```\n\n**Option 2: Lower the resource cache limit**\n\n```csharp\nvar grContext = skSwapChainPanel.GRContext;\nif (grContext != null)\n    grContext.SetResourceCacheLimit(32 * 1024 * 1024); // 32MB\n```\n\n**To monitor current GPU cache usage:**\n\n```csharp\ngrContext.GetResourceCacheUsage(out int maxResources, out long maxResourceBytes);\nSystem.Diagnostics.Debug.WriteLine($\"GPU cache: {maxResources} resources, {maxResourceBytes / 1024 / 1024}MB\");\n```"}, {"type": "close-issue", "description": "Close as answered — GPU memory growth is expected Skia caching behavior with documented workarounds", "risk": "medium", "confidence": 0.65, "stateReason": "completed"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
