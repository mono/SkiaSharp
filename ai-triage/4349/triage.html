<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 4349, "repo": "mono/SkiaSharp", "analyzedAt": "2026-07-06T05:45:00Z", "currentLabels": ["type/bug"]}, "summary": "SKCanvasView crashes with FileNotFoundException on _Microsoft.Android.Resource.Designer when publishing a MAUI Android app with PublishAot=true (NativeAOT), because the Android resource designer shim uses Assembly.Load which is unsupported in NativeAOT.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/SkiaSharp.Views", "confidence": 0.92}, "platforms": ["os/Android"], "tenets": ["tenet/compatibility"], "partner": "partner/maui"}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "exception", "errorMessage": "System.IO.FileNotFoundException: IO_FileNotFound_FileName, _Microsoft.Android.Resource.Designer", "stackTrace": "at Internal.Runtime.TypeLoaderExceptionHelper.CreateFileNotFoundException(ExceptionStringID, String) + 0x50\nat SkiaSharp.Views.Android.SKCanvasView.Initialize(IAttributeSet) + 0x18\nat SkiaSharp.Views.Maui.Handlers.SKCanvasViewHandler.CreatePlatformView() + 0x38", "reproQuality": "partial", "targetFrameworks": ["net10.0-android"]}, "reproEvidence": {"stepsToReproduce": ["Create a MAUI app that uses SKCanvasView (directly or via LottieView)", "Publish for Android with PublishAot=true: dotnet publish -f net10.0-android -r android-arm64 -c Release /p:PublishAot=true", "Launch the app on Android device/emulator", "Observe crash when SKCanvasView is instantiated"], "environmentDetails": "Android 16, net10.0-android, SkiaSharp 3.116.0, NativeAOT (PublishAot=true), arm64", "repoLinks": [{"url": "https://github.com/dotnet/android/issues/10852", "description": "Related dotnet/android issue: Assembly.Load failure in NativeAOT for _Microsoft.Android.Resource.Designer"}]}, "versionAnalysis": {"mentionedVersions": ["3.116.0"], "currentRelevance": "likely", "relevanceReason": "The Resource.Styleable usage in SKCanvasView.Initialize has not changed; NativeAOT incompatibility persists in current codebase."}}, "analysis": {"summary": "SKCanvasView.Initialize references Resource.Styleable.SKCanvasView (from attrs.xml) which triggers Android.Runtime.ResourceIdManager.UpdateIdValues() -> Assembly.Load('_Microsoft.Android.Resource.Designer') at static initialization time. In NativeAOT, Assembly.Load is unsupported, causing a crash. The NativeAOT compiler may eagerly initialize the Resource.Styleable type even when attrs is null, placing the failure at the start of Initialize (offset +0x18).", "rationale": "The stack trace clearly points to SKCanvasView.Initialize at offset +0x18, and the exception is FileNotFoundException for _Microsoft.Android.Resource.Designer — this is the well-known .NET for Android resource designer shim pattern that fails under NativeAOT. The crash only manifests with PublishAot=true. The code path via SKCanvasViewHandler.CreatePlatformView calls new SKCanvasView(Context) (no attrs), but the Resource.Styleable type's static constructor is triggered either eagerly or by the JIT's preparation of Initialize, which calls Assembly.Load and fails.", "keySignals": [{"text": "System.IO.FileNotFoundException: IO_FileNotFound_FileName, _Microsoft.Android.Resource.Designer", "source": "stack trace in issue body", "interpretation": "Assembly.Load('_Microsoft.Android.Resource.Designer') is called and fails because NativeAOT does not support runtime assembly loading."}, {"text": "at SkiaSharp.Views.Android.SKCanvasView.Initialize(IAttributeSet) + 0x18", "source": "stack trace", "interpretation": "Crash occurs very early in Initialize (offset 24 bytes), consistent with eager static-type initialization in NativeAOT of the Resource.Styleable class referenced in that method."}, {"text": "dotnet publish -f net10.0-android -r android-arm64 -c Release /p:PublishAot=true", "source": "build command in issue body", "interpretation": "Confirms NativeAOT publish mode, which disables Assembly.Load."}, {"text": "Here is a similar issue but posted on .Net repo: https://github.com/dotnet/android/issues/10852", "source": "comment by reporter", "interpretation": "This is a cross-cutting issue between SkiaSharp and dotnet/android toolchain; fix may need to come from both sides."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views/Platform/Android/SKCanvasView.cs", "lines": "48-60", "finding": "Initialize(IAttributeSet) accesses Resource.Styleable.SKCanvasView and Resource.Styleable.SKCanvasView_ignorePixelScaling inside an if (attrs != null) guard. However, in NativeAOT the Resource.Styleable static constructor may run eagerly before the null check is evaluated, triggering Assembly.Load('_Microsoft.Android.Resource.Designer') which is unsupported in NativeAOT.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views/Platform/Android/Resources/values/attrs.xml", "lines": "1-6", "finding": "Declares a custom styleable SKCanvasView with an ignorePixelScaling attribute. This attrs.xml causes the .NET for Android build to generate a Resource.designer.cs with a static initializer that calls ResourceIdManager.UpdateIdValues(), which uses Assembly.Load.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Handlers/SKCanvasView/SKCanvasViewHandler.Android.cs", "lines": "14", "finding": "CreatePlatformView() calls new SKCanvasView(Context) (no IAttributeSet). With attrs=null the attrs processing block is guarded, but the Resource.Styleable type initialization still occurs in NativeAOT.", "relevance": "related"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views/Platform/Android/SKSurfaceView.cs", "lines": "12-29", "finding": "SKSurfaceView does not use Resource.Styleable and its Initialize() takes no IAttributeSet — it is not affected by this NativeAOT incompatibility.", "relevance": "context"}], "workarounds": ["Build without NativeAOT (remove PublishAot=true) — not suitable for release size optimization goals.", "Set SKCanvasView.IgnorePixelScaling programmatically after view creation rather than via XML attributes — avoids the attrs processing entirely but does not prevent the static init crash.", "Wait for dotnet/android to fix the Assembly.Load issue in NativeAOT (tracked at https://github.com/dotnet/android/issues/10852)."], "nextQuestions": ["Does the crash also occur with SKGLView or other SkiaSharp Android views?", "Is this crash reproducible on net8.0-android or net9.0-android with NativeAOT, or only net10.0-android?", "Can the attrs.xml / Resource.Styleable usage be removed from SKCanvasView without breaking existing apps (the ignorePixelScaling attribute can still be set programmatically)?"], "resolution": {"hypothesis": "SkiaSharp.Views.Android declares an attrs.xml causing the .NET for Android build to generate a Resource.designer.cs whose static constructor calls Assembly.Load. In NativeAOT this fails. The fix is to remove or guard the Resource.Styleable usage to make SKCanvasView NativeAOT-compatible.", "proposals": [{"title": "Wrap attrs processing in try-catch", "description": "Wrap the entire attrs processing block in a try-catch(Exception) so that if the Resource.Styleable initialization fails in NativeAOT, the view continues to work with default settings (ignorePixelScaling=false).", "category": "workaround", "confidence": 0.75, "effort": "cost/xs", "validated": "untested"}, {"title": "Remove attrs.xml and Resource.Styleable usage", "description": "Remove the Platform/Android/Resources/values/attrs.xml file and the associated Resource.Styleable usage from SKCanvasView.Initialize. The IgnorePixelScaling property remains settable programmatically. This is a minor breaking change for the very rare case of setting ignorePixelScaling via XML layout attributes.", "category": "fix", "confidence": 0.8, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Remove attrs.xml and Resource.Styleable usage", "recommendedReason": "Setting IgnorePixelScaling via XML attributes is a rarely-used feature; removing it eliminates the NativeAOT incompatibility cleanly without requiring ongoing maintenance of the try-catch approach."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.88, "reason": "Confirmed bug in SkiaSharp.Views.Android with clear stack trace and root cause. Fix needs investigation into whether attrs.xml removal is safe (backward compat) and whether the Resource.Styleable static init can be deferred or guarded in NativeAOT.", "suggestedReproPlatform": "linux"}, "missingInfo": ["Minimal repro project (e.g. GitHub repo) to confirm the crash is reproducible and validate fixes.", "Confirmation whether the crash also occurs without LottieView (plain SKCanvasView in MAUI with NativeAOT).", "Affected SkiaSharp versions: is 3.119.x affected or was this fixed?"], "actions": [{"type": "update-labels", "description": "Apply bug, views, android, maui, and compatibility labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp.Views", "os/Android", "partner/maui", "tenet/compatibility"]}, {"type": "add-comment", "description": "Acknowledge bug, explain root cause, request minimal repro, provide workaround information", "risk": "medium", "confidence": 0.88, "comment": "Thanks for the detailed report and for pointing to the dotnet/android issue!\n\nThis is a confirmed bug in `SkiaSharp.Views.Android`. The root cause is that `SKCanvasView` declares a custom `attrs.xml` attribute (`ignorePixelScaling`), which causes the .NET for Android build toolchain to generate a `Resource.designer.cs` whose static constructor calls `Assembly.Load(\"_Microsoft.Android.Resource.Designer\")` to resolve resource IDs at runtime. In NativeAOT mode (`PublishAot=true`), `Assembly.Load` is unsupported, causing the crash.\n\n**Workarounds while we investigate a fix:**\n1. If you're setting `IgnorePixelScaling` via XML layout attributes, switch to setting it programmatically after the view is created instead.\n2. If the crash persists (i.e. occurs even without XML attributes), it means the static initializer is being eagerly triggered by NativeAOT — in this case, there's no user-side workaround short of disabling NativeAOT.\n\nThe upstream tracking issue in dotnet/android is https://github.com/dotnet/android/issues/10852 — a fix there may also resolve this.\n\nCould you share a minimal repro project? It would help us validate a fix on our side. Also, could you confirm: does the crash occur with a plain `SKCanvasView` (without LottieView), e.g. in a fresh MAUI app with just an `<SkiaSharp:SKCanvasView />` in the page?"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
