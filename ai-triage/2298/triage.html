<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2298, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-25T00:01:59Z"}, "summary": "User asks how to use SKFontManager.MatchCharacter with emoji characters and how to render complex emoji in SkiaSharp, hitting a crash because emoji in .NET strings are stored as surrogate pairs (two chars) rather than a single Unicode code point.", "classification": {"type": {"value": "type/question", "confidence": 0.92}, "area": {"value": "area/SkiaSharp", "confidence": 0.88}}, "evidence": {"reproEvidence": {"stepsToReproduce": ["Call value.ToCharArray() on a string containing 'P' followed by a heart-eyes emoji", "Iterate over chars and call fontManager.MatchCharacter(charArray[index]) for each char", "Observe crash when index reaches the high-surrogate char of the emoji"], "codeSnippets": ["var charArray = value.ToCharArray();\nwhile (++index < charArray.Length)\n{\n    var result = fontManager.MatchCharacter(paint.Typeface.FamilyName, charArray[index]);\n    if (result == null)\n    {\n        var emojiTypeface = fontManager.MatchCharacter(charArray[index]);\n    }\n}"], "environmentDetails": "Xamarin app with SkiaSharp; Apple emoji font on iOS device", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/982", "description": "Related: emoji causes PDF to be too large — shows StringUtilities.GetUnicodeCharacterCode pattern"}, {"url": "https://github.com/mono/SkiaSharp/issues/232", "description": "Related: SKCanvas.DrawText does not render Unicode characters — Skia does not perform text shaping"}]}}, "analysis": {"summary": "The crash occurs because emoji characters (e.g., 😍 U+1F60D) are stored as UTF-16 surrogate pairs in .NET strings. Calling ToCharArray() yields two char values per emoji, and passing a surrogate-half char to MatchCharacter(char) implicitly casts it to an invalid Unicode code point, causing Skia's native code to crash. The correct approach is to iterate the string using StringInfo or by combining surrogate pairs with char.ConvertToUtf32, then pass the resulting int code point to the int overload. For rendering complex emoji (including ZWJ sequences), Skia itself does not perform text shaping; SkiaSharp.HarfBuzz / SKTextShaper must be used.", "rationale": "This is a usage question, not a bug. The crash is caused by misusing the char overload of MatchCharacter with surrogate characters; the API itself is working as designed. The lack of complex emoji rendering via DrawText is by design — Skia delegates text shaping to HarfBuzz. Both issues have been explained in comments by a contributor. The correct patterns are documented in related issues.", "keySignals": [{"text": "I see that the Array gets 3 chars but I think it's should be 2.", "source": "issue body", "interpretation": "Confirms the reporter is iterating char values without handling surrogate pairs; a single emoji occupies 2 chars in .NET strings."}, {"text": "Some characters come in surrogate pairs and therefore are stored via two char values", "source": "comment by Gillibald", "interpretation": "Root cause of crash explained — reporter needs to use int code points, not chars."}, {"text": "Skia isn't doing any shaping. Use SkiaSharp.Harfbuzz", "source": "comment by Gillibald", "interpretation": "Complex emoji rendering requires the HarfBuzz text shaper; simple DrawText will not produce correct results."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "131-133", "finding": "The char overload of MatchCharacter passes the char value directly (implicitly cast to int) to the int overload. For emoji encoded as surrogate pairs, each half is an isolated surrogate (U+D800–U+DFFF), which is not a valid Unicode scalar value. This causes Skia's native sk_fontmgr_match_family_style_character to receive an invalid code point and crash.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "176-191", "finding": "The canonical int overload calls sk_fontmgr_match_family_style_character with the character as a raw int Unicode code point. This works correctly when given a full code point (e.g., 0x1F60D for 😍) obtained via char.ConvertToUtf32 or StringUtilities.GetUnicodeCharacterCode.", "relevance": "direct"}, {"file": "binding/SkiaSharp/Util.cs", "lines": "148-157", "finding": "StringUtilities.GetUnicodeCharacterCode(string, SKTextEncoding.Utf32) provides the correct way to obtain a full Unicode code point integer from a single-character string containing an emoji. This is the recommended API for this use-case.", "relevance": "related"}], "workarounds": ["Use char.IsHighSurrogate / char.IsLowSurrogate and char.ConvertToUtf32 to reconstruct full Unicode code points when iterating a string", "Use StringUtilities.GetUnicodeCharacterCode(emojiString, SKTextEncoding.Utf32) to obtain the int code point for a single emoji", "Use SkiaSharp.HarfBuzz (SKTextShaper) for rendering complex emoji and mixed text/emoji strings"], "resolution": {"hypothesis": "Reporter needs to (1) use Unicode scalar values (int) rather than individual chars when calling MatchCharacter with emoji, and (2) use SkiaSharp.HarfBuzz for rendering strings that mix regular text and complex emoji.", "proposals": [{"title": "Iterate string by Unicode scalar values, not chars", "description": "Use StringInfo.GetTextElementEnumerator or manually handle surrogate pairs to obtain full Unicode code points before calling MatchCharacter(int).", "category": "workaround", "codeSnippet": "// Correct way to iterate a string and match fonts for each Unicode code point\nfor (var i = 0; i < value.Length; )\n{\n    int codePoint;\n    if (char.IsHighSurrogate(value[i]) && i + 1 < value.Length && char.IsLowSurrogate(value[i + 1]))\n    {\n        codePoint = char.ConvertToUtf32(value[i], value[i + 1]);\n        i += 2;\n    }\n    else\n    {\n        codePoint = value[i];\n        i++;\n    }\n    var typeface = fontManager.MatchCharacter(paint.Typeface.FamilyName, codePoint);\n    // use typeface to draw the character\n}", "confidence": 0.92, "effort": "cost/s", "validated": "yes"}, {"title": "Use SkiaSharp.HarfBuzz for complex emoji rendering", "description": "For rendering strings with mixed text and complex emoji (including ZWJ sequences), use SKTextShaper from the SkiaSharp.HarfBuzz package. Skia's DrawText does not perform text shaping.", "category": "workaround", "codeSnippet": "// Add NuGet package: SkiaSharp.HarfBuzz\nusing SkiaSharp.HarfBuzz;\n\nvar paint = new SKPaint { Typeface = emojiTypeface };\nusing var shaper = new SKShaper(paint.Typeface);\ncanvas.DrawShapedText(shaper, \"P 😍\", 20, 40, paint);", "confidence": 0.9, "effort": "cost/s", "validated": "yes"}], "recommendedProposal": "Iterate string by Unicode scalar values, not chars", "recommendedReason": "Directly addresses the crash by correctly handling surrogate pairs when calling MatchCharacter. HarfBuzz can then be used for the final rendering step."}}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.88, "reason": "Both questions (crash in MatchCharacter, complex emoji rendering) have been answered in comments. The crash is a usage error (passing surrogate halves to an int-based API); the rendering limitation is by design. Existing workarounds are well-documented in related issues.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply question and core SkiaSharp area labels", "risk": "low", "confidence": 0.92, "labels": ["type/question", "area/SkiaSharp"]}, {"type": "add-comment", "description": "Post answer explaining surrogate pairs and HarfBuzz workaround", "risk": "medium", "confidence": 0.88, "comment": "Thanks for the question! There are two separate issues here:\n\n**1. Crash in `MatchCharacter`**\n\nEmoji like 😍 are stored as UTF-16 *surrogate pairs* in .NET strings — `ToCharArray()` gives you two `char` values for each such emoji (one high surrogate + one low surrogate), which is why you see 3 chars for \"P😍\". Passing a surrogate `char` to `MatchCharacter(char)` sends an invalid Unicode code point to Skia's native code.\n\nUse `char.IsHighSurrogate` / `char.ConvertToUtf32` to reconstruct the full Unicode scalar value, then use the `int` overload:\n\n```csharp\nfor (var i = 0; i < text.Length; )\n{\n    int codePoint;\n    if (char.IsHighSurrogate(text[i]) && i + 1 < text.Length && char.IsLowSurrogate(text[i + 1]))\n    {\n        codePoint = char.ConvertToUtf32(text[i], text[i + 1]);\n        i += 2;\n    }\n    else\n    {\n        codePoint = text[i];\n        i++;\n    }\n    var typeface = fontManager.MatchCharacter(paint.Typeface.FamilyName, codePoint);\n    // use typeface to render the character\n}\n```\n\nAlternatively, `StringUtilities.GetUnicodeCharacterCode(\"😍\", SKTextEncoding.Utf32)` returns the correct int code point for a single emoji.\n\n**2. Complex emoji not rendering correctly**\n\nSkia does not perform text shaping on its own — complex emoji (including ZWJ sequences like 👨‍👩‍👧) require HarfBuzz. Install the **`SkiaSharp.HarfBuzz`** NuGet package and use `SKShaper` / `DrawShapedText`:\n\n```csharp\nusing SkiaSharp.HarfBuzz;\n\nusing var shaper = new SKShaper(paint.Typeface);\ncanvas.DrawShapedText(shaper, \"P 😍\", x, y, paint);\n```\n\nSee also #982 for a working emoji pattern with `MatchCharacter`."}, {"type": "close-issue", "description": "Close as answered — both questions resolved with documented workarounds", "risk": "medium", "confidence": 0.85, "stateReason": "completed"}, {"type": "link-related", "description": "Link to related emoji question #982", "risk": "low", "confidence": 0.88, "linkedIssue": 982}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
