<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2493, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-26T16:57:53Z"}, "summary": "On iOS MAUI, no SKTouchAction.Cancelled event fires when a FlyOut navigation element opens and interrupts an active touch, unlike Android which correctly fires Cancel; a commenter further reports that only Pressed events fire on iOS at all.", "classification": {"type": {"value": "type/bug", "confidence": 0.93}, "area": {"value": "area/SkiaSharp.Views.Maui", "confidence": 0.95}, "platforms": ["os/iOS"], "tenets": ["tenet/compatibility", "tenet/reliability"], "partner": "partner/maui"}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "platform-specific", "errorMessage": "No SKTouchAction.Cancelled event fired on iOS when MAUI FlyOut opens", "reproQuality": "partial", "targetFrameworks": ["net7.0-ios", "net8.0-ios"]}, "reproEvidence": {"stepsToReproduce": ["Create a MAUI app with SKCanvasView in a FlyoutPage or Shell with FlyOut enabled", "Press and hold on the SKCanvasView to start tracking touch", "Open the FlyOut (e.g., swipe from edge or tap hamburger)", "Observe: Android fires SKTouchAction.Cancelled; iOS fires nothing"], "environmentDetails": "SkiaSharp 2.88.3, MAUI iOS (maui-ios 7.0.86/7.0.100), iPhone Pro Max 14 (physical device)", "relatedIssues": [2722], "repoLinks": [{"url": "https://github.com/nm4568/SkiaSharpSamples", "description": "Minimal repro MAUI sample by commenter nm4568; also reproduces broader issue of only Pressed firing on iOS"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.3"], "currentRelevance": "likely", "relevanceReason": "The iOS SKTouchHandler implementation using UIGestureRecognizer has not changed in a way that would address FlyOut-triggered cancellation since 2.88.x."}}, "analysis": {"summary": "The iOS SKTouchHandler extends UIGestureRecognizer and implements TouchesCancelled to fire SKTouchAction.Cancelled, but when a MAUI FlyOut opens it intercepts touches at the MAUI/native layer without triggering UIKit's standard gesture-recognizer cancellation path. Additionally, when the touch handler's FireEvent returns false (touch not marked as Handled), IgnoreTouch is called on the first touch, causing UIKit to stop delivering all subsequent touch phases (Moved, Released, Cancelled) to that recognizer — explaining the commenter's observation that only Pressed fires.", "rationale": "Clear platform parity bug: Android's View.Touch event delivers MotionEventActions.Cancel which maps to SKTouchAction.Cancelled, but the iOS UIGestureRecognizer-based approach does not receive UIKit's TouchesCancelled when a MAUI FlyOut (which operates at MAUI's navigation layer) interrupts the touch. The secondary root cause — IgnoreTouch being called when events are not marked Handled — may be the dominant code path causing both the missing Cancelled and the broader 'only Pressed fires' symptom reported in #2722.", "keySignals": [{"text": "On Android an SKTouchAction.Cancelled is called, but on iOS no event at all", "source": "issue body", "interpretation": "Cross-platform parity gap. Android touch cancel path works; iOS does not deliver cancellation when FlyOut intercepts."}, {"text": "Only the SKTouchAction.Pressed event is firing on iOS", "source": "comment by nm4568", "interpretation": "IgnoreTouch called on first touch when Handled=false, causing UIKit to stop delivering subsequent events (Moved, Released, Cancelled) to the gesture recognizer."}, {"text": "We need to track those to know how many fingers are pressed. If an event is missing there is no way to correct for that.", "source": "issue body", "interpretation": "Practical impact: touch-count state corrupted in apps like Mapsui that track multi-finger interactions."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Platform/Apple/SKTouchHandler.cs", "lines": "87-95", "finding": "TouchesCancelled is implemented and calls FireEvent(SKTouchAction.Cancelled, ...) — the handler does support cancellation at the UIKit level, but only if UIKit delivers the TouchesCancelled call.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Platform/Apple/SKTouchHandler.cs", "lines": "54-64", "finding": "In TouchesBegan, if FireEvent returns false (SKTouchEventArgs.Handled == false), IgnoreTouch(touch, evt) is called. UIKit then stops delivering Moved, Ended, and Cancelled for that touch to this gesture recognizer — explaining why only Pressed fires when the user does not set e.Handled = true.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Platform/Android/SKTouchHandler.cs", "lines": "100-108", "finding": "Android OnTouch handler maps MotionEventActions.Cancel to SKTouchAction.Cancelled correctly. No IgnoreTouch equivalent — all touch events are always delivered, explaining why Cancel works on Android.", "relevance": "related"}], "workarounds": ["Set e.Handled = true in the SKCanvasView Touch event handler to prevent IgnoreTouch from being called. This ensures Moved, Released, and Cancelled are all delivered by UIKit — likely resolves the 'only Pressed fires' variant. The FlyOut cancellation scenario may still not fire if MAUI intercepts before UIKit.", "Implement an app-level cancel guard: subscribe to the MAUI Shell FlyoutIsPresented property change and when it becomes true, manually reset all tracked finger state."], "nextQuestions": ["Does setting e.Handled = true resolve the missing Cancelled when FlyOut opens, or does MAUI still intercept before UIKit's cancellation path?", "Does the same issue affect SKGLView on iOS?", "Is this also reproducible on Mac Catalyst or tvOS?", "Does the issue exist in the Xamarin.Forms SKTouchHandler for iOS (Views.Forms)?", "Does the FlyOut on iOS use a gesture recognizer that should trigger requiresExclusiveTouchType or shouldRecognizeSimultaneously?"], "resolution": {"hypothesis": "Two overlapping root causes: (1) IgnoreTouch is called when Handled=false, stopping all subsequent touch delivery; (2) MAUI FlyOut navigation on iOS does not trigger UIKit-level gesture cancellation on the SKTouchHandler recognizer.", "proposals": [{"title": "Document: set e.Handled = true", "description": "Explain in docs/comment that the Pressed event's e.Handled must be true for subsequent Moved/Released/Cancelled events to fire on iOS. This is a UIGestureRecognizer constraint.", "category": "workaround", "confidence": 0.8, "effort": "cost/xs", "validated": "untested"}, {"title": "Remove IgnoreTouch call or make it opt-in", "description": "In TouchesBegan, remove or gate the IgnoreTouch call so that not-handled touches still receive subsequent phase events. This would match Android behavior where all events are delivered regardless of Handled.", "category": "fix", "confidence": 0.7, "effort": "cost/s", "validated": "untested"}, {"title": "Synthesize Cancelled on FlyOut open", "description": "In the MAUI layer, listen for FlyoutIsPresented or UIKit's gesture recognizer interruption callback and synthesize a Cancelled event for all active touches.", "category": "fix", "confidence": 0.6, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Remove IgnoreTouch call or make it opt-in", "recommendedReason": "Removing the IgnoreTouch call aligns iOS behavior with Android (where all phases are always delivered) and likely resolves the reported symptom without requiring MAUI-level plumbing."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.85, "reason": "Repro sample available, code investigation identifies likely root cause (IgnoreTouch on unhandled touch), but physical iOS device needed to verify and confirm whether FlyOut scenario is separately broken.", "suggestedReproPlatform": "macos"}, "actions": [{"type": "update-labels", "description": "Apply bug, MAUI views, iOS, compatibility, reliability, MAUI partner labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp.Views.Maui", "os/iOS", "tenet/compatibility", "tenet/reliability", "partner/maui"]}, {"type": "link-related", "description": "Link to #2722 which is the same reporter's broader repro of iOS-only-Pressed-fires", "risk": "low", "confidence": 0.9, "linkedIssue": 2722}, {"type": "add-comment", "description": "Post analysis with workaround (set e.Handled = true) and root cause hypothesis", "risk": "medium", "confidence": 0.8, "comment": "Thanks for the report and for providing the repro sample!\n\nAfter investigating the iOS `SKTouchHandler` code, I found two likely contributors to this issue:\n\n**1. `e.Handled` must be `true` for subsequent events to fire on iOS**\n\nThe iOS handler is a `UIGestureRecognizer`. In `TouchesBegan`, if your event handler doesn't set `e.Handled = true`, `IgnoreTouch` is called on that touch. UIKit then stops delivering `Moved`, `Ended`, and `Cancelled` phases to this recognizer. This is likely why @nm4568's repro only sees `Pressed`.\n\n**Workaround:** Set `e.Handled = true` in your Touch handler:\n```csharp\nprivate void SkCanvasView_Touch(object? sender, SKTouchEventArgs e)\n{\n    e.Handled = true; // Required on iOS to receive Moved/Released/Cancelled\n    // ... your logic\n}\n```\n\n**2. FlyOut-triggered cancellation may still be missing**\n\nEven with `e.Handled = true`, when a MAUI FlyOut opens, it intercepts at the MAUI navigation layer without necessarily going through UIKit's standard gesture-recognizer cancellation. As a fallback, you can subscribe to Shell/FlyoutPage state and reset finger tracking manually:\n```csharp\n// In your page or view model\nShell.Current.PropertyChanged += (s, e) => {\n    if (e.PropertyName == nameof(Shell.FlyoutIsPresented) && Shell.Current.FlyoutIsPresented)\n        ResetTouchTracking(); // clear your finger count\n};\n```\n\nCould you confirm whether setting `e.Handled = true` resolves the issue? This will help narrow down which of the two causes dominates."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
