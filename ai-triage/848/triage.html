<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 848, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T12:38:00Z", "currentLabels": ["type/enhancement", "type/question", "type/feature-request", "area/SkiaSharp", "backend/PDF", "tenet/performance", "triage/triaged"]}, "summary": "Reporter finds that a simple two-page PDF with basic text generated by SkiaSharp's CreatePdfSample produces a ~510KB file on Windows, and asks whether compression settings exist to reduce PDF output size.", "classification": {"type": {"value": "type/feature-request", "confidence": 0.88}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.82}, "backends": ["backend/PDF"], "tenets": ["tenet/performance"]}, "evidence": {"reproEvidence": {"stepsToReproduce": ["Run the CreatePdfSample.cs sample that creates a simple two-page PDF", "Observe output file is ~510KB on Windows for a simple text-only PDF"], "environmentDetails": "Windows, SkiaSharp (2019), default system font (Segoe UI ~900KB TTF)", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/blob/master/samples/Gallery/Shared/Samples/CreatePdfSample.cs", "description": "PDF sample referenced in the original issue"}, {"url": "https://bugs.chromium.org/p/skia/issues/detail?id=10491", "description": "Skia bug tracker issue opened by mattleibow to expose a public font subsetting hook in Skia's PDF backend"}]}, "versionAnalysis": {"mentionedVersions": ["1.x"], "currentRelevance": "likely", "relevanceReason": "Font subsetting remains disabled in SkiaSharp's native Skia build as of the latest version — no build flag change has been landed."}}, "analysis": {"summary": "Skia's PDF backend embeds entire font files rather than subsets because subsetting requires building the native library with HarfBuzz/sfntly/icu support, which is not enabled in SkiaSharp's current native build. The SKDocumentPdfMetadata.EncodingQuality field affects only raster/image compression, not font embedding, confirming no workaround exists via the current API.", "rationale": "This is a feature request for enabling font subsetting in SkiaSharp's PDF output. The root cause is a build-time configuration gap: Skia includes subsetting code but requires HarfBuzz or sfntly to activate it. The maintainer (mattleibow) confirmed this in 2020 and opened a Skia upstream issue. A community member (jeffska) proved the fix works — a custom build with HarfBuzz subsetting reduced a 280KB PDF to under 10KB (96% reduction). The fix belongs in area/libSkiaSharp.native (native build flags) rather than area/SkiaSharp (C# bindings). Given the issue has been open since 2019, is backlog-milestoned, and has 11 upvotes and 39 comments, it is a valid high-value feature request worth keeping open.", "codeInvestigation": [{"file": "binding/SkiaSharp/Definitions.cs", "lines": "385-496", "finding": "SKDocumentPdfMetadata exposes EncodingQuality (default 101) which maps to fEncodingQuality in the native metadata struct. This field controls raster/image compression quality in the PDF, not font embedding. Community testing confirms setting it lower has no impact on file size when the large size comes from embedded fonts.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKDocument.cs", "lines": "136-173", "finding": "CreatePdf(stream, metadata) passes SKDocumentPdfMetadata fields (including fEncodingQuality) to sk_document_create_pdf_from_stream_with_metadata. No font subsetting parameter is exposed in the C API or C# wrapper — subsetting would need to be enabled at the native build level.", "relevance": "direct"}, {"file": "samples/Gallery/Shared/Samples/PdfComposerSample.cs", "lines": "55-62", "finding": "Current PDF sample uses SKDocumentPdfMetadata without specifying EncodingQuality, defaulting to 101 (lossless). Confirms no subsetting configuration is available or exposed in the C# API.", "relevance": "context"}], "keySignals": [{"text": "Skia (native lib) PDF backend design will embed any font file needed to render the text at the target device", "source": "comment by neodynamic (2020-07-10)", "interpretation": "Root cause confirmed: Skia embeds full font files by design when subsetting is not enabled."}, {"text": "Looking at the skia code, it seems there is 2 subsetters built in. But, this is disabled because we are not building with either icu or harfbuzz/sfntly.", "source": "comment by mattleibow (2020-07-10)", "interpretation": "Maintainer confirmed subsetting exists in Skia source but is gated on a native build flag not currently enabled in SkiaSharp."}, {"text": "I was able to build the Windows libSkiaSharp using Skia's support for Harfbuzz subsetting... My test PDF that was over 280 KB went down to less than 10 KB with the subsetting.", "source": "comment by jeffska (2021-10-27)", "interpretation": "Community proof-of-concept: enabling HarfBuzz subsetting in a custom native build produces a 96% file size reduction."}, {"text": "Contains conservatively compressed streams: Uncompressed: (141 instances). Optimizing it with 3rd party tools allowed to go from ~500kb to 100kb.", "source": "comment by KillyMXI (2022-01-17)", "interpretation": "Secondary size issue: Skia PDF streams are also uncompressed. Post-processing with PDF optimizer yields 80% reduction independently of font subsetting."}], "workarounds": ["Post-process the generated PDF with a third-party PDF optimizer — reported to reduce ~500KB to ~100KB (80% reduction from stream compression alone)", "Convert text to paths using SKFont.GetGlyphPaths before rendering to PDF — avoids font embedding entirely but loses text searchability", "Load a pre-subsetted font file (containing only the required glyphs) before rendering, so only the small subset gets embedded", "Build a custom libSkiaSharp.native with HarfBuzz subsetting enabled — requires modifying Skia GN build args"], "nextQuestions": ["Is HarfBuzz already linked into SkiaSharp's native build for HarfBuzzSharp? If so, enabling PDF font subsetting may be a small GN flag change.", "Does the current Skia milestone expose a more public subsetting hook than in 2020 (per the Skia bug tracker issue)?", "Can PDF stream compression be enabled independently of font subsetting as a lower-effort intermediate improvement?"], "resolution": {"hypothesis": "Enabling HarfBuzz font subsetting in SkiaSharp's native Skia build would reduce PDF file size by up to 96% for typical text-heavy documents.", "proposals": [{"title": "Enable HarfBuzz font subsetting in native Skia build", "description": "Update SkiaSharp's Skia GN build arguments to enable font subsetting via HarfBuzz (skia_use_harfbuzz=true and relevant PDF subsetting flags). Since HarfBuzz is already part of SkiaSharp via HarfBuzzSharp, this may only require enabling the subsetting hook in the PDF backend.", "category": "fix", "confidence": 0.8, "effort": "cost/m", "validated": "untested"}, {"title": "Document text-to-path workaround for font-free PDFs", "description": "Add documentation/sample showing how to draw text as vector paths (SKFont.GetGlyphPaths or equivalent) for use cases where text searchability is not required. This avoids all font embedding overhead.", "category": "workaround", "confidence": 0.88, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Enable HarfBuzz font subsetting in native Skia build", "recommendedReason": "Directly addresses the root cause with proven 96% file size reduction. HarfBuzz is already part of the SkiaSharp ecosystem, making this likely a build configuration change rather than a new dependency."}}, "output": {"actionability": {"suggestedAction": "keep-open", "confidence": 0.85, "reason": "Valid, high-value feature request with clear implementation path and community proof-of-concept. Root cause is well-understood (missing native build flag for HarfBuzz subsetting). Assigned to Backlog milestone. Keep open until native build changes are prioritized.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Correct area label to libSkiaSharp.native and retain PDF and performance tenets", "risk": "low", "confidence": 0.85, "labels": ["type/feature-request", "area/libSkiaSharp.native", "backend/PDF", "tenet/performance"]}, {"type": "add-comment", "description": "Post root cause explanation and available workarounds for the many users waiting", "risk": "medium", "confidence": 0.85, "comment": "**Root cause summary:** Skia's PDF backend embeds complete font files by design. Font *subsetting* (embedding only the glyphs actually used) requires building the native Skia library with HarfBuzz/sfntly support — which is currently disabled in SkiaSharp's native build.\n\nThe `EncodingQuality` field in `SKDocumentPdfMetadata` affects raster/image compression only and does not reduce font-related size.\n\n**Available workarounds:**\n1. **Post-process with a PDF optimizer** — Third-party PDF tools can compress Skia's uncompressed output streams, typically reducing file size by ~80% (e.g., 500 KB → 100 KB) without any code changes.\n2. **Convert text to vector paths** — Draw text as `SKPath` objects to avoid font embedding entirely. The PDF will contain vector shapes instead of font data. Best for logos and headings; not suitable for body text (loses searchability/copy-paste).\n3. **Use a pre-subsetted font** — Prepare a font file containing only the glyphs you need (using tools like `pyftsubset` from fonttools) and load that as your `SKTypeface`. The embedded subset will be much smaller.\n\nThis feature request is tracked for a future native build update to enable HarfBuzz font subsetting."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
