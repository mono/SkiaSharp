<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1437, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-28T20:00:00Z", "currentLabels": ["type/question"]}, "summary": "Reporter is loading JPEG bytes extracted from BLP (Blizzard Picture Format) files and expecting SkiaSharp to decode an alpha channel, but standard JPEG does not support alpha; the BLP container stores alpha separately and the caller must apply it manually.", "classification": {"type": {"value": "type/question", "confidence": 0.88}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}}, "evidence": {"reproEvidence": {"environmentDetails": "No version specified; uses SkiaSharp to decode byte arrays extracted from BLP files", "repoLinks": [{"url": "https://github.com/Drake53/War3Net/tree/master/tests/War3Net.Common.Testing/TestData/Blp", "description": "Reporter's test files including the BLP, raw JPEG, and correct PNG reference"}, {"url": "https://www.hiveworkshop.com/threads/the-evil-that-is-blp.269997/", "description": "BLP format overview on Hive Workshop"}, {"url": "https://www.hiveworkshop.com/threads/blp-specifications-wc3.279306/", "description": "BLP2 specification: alpha is stored separately from JPEG color data"}]}}, "analysis": {"summary": "Standard JPEG does not support alpha channels. In the BLP2 file format, color data is stored as JPEG but the alpha channel is stored separately in the BLP container as raw 8-bit values. When the reporter passes only the JPEG bytes to SkiaSharp, Skia's JPEG codec correctly reports the image as opaque (no alpha) because the JPEG data itself contains no alpha information. The alpha must be extracted from the BLP container separately and then manually applied to the decoded bitmap.", "rationale": "The behavior is correct per the JPEG specification. JPEG (JFIF/Exif) has no alpha channel support. Skia's JPEG codec sets AlphaType.Opaque for JPEG streams, which is confirmed by the SkiaSharp source code (SKBitmap.Decode reads codec.Info, which is opaque for JPEG). The alpha in BLP2 files is stored in the container structure alongside but separate from the JPEG scan data. This is not a SkiaSharp or Skia deficiency — the caller must parse the BLP format to extract and combine both planes. The maintainer's comment ('This is a discussion for the native skia team') reflects uncertainty about JPEG alpha extensions, but for BLP specifically the alpha is structurally outside the JPEG stream. This is a question with a clear answer: manually apply the BLP alpha channel after decoding.", "keySignals": [{"text": "this jpg data can have an alpha channel, but when I load the byte array using SkiaSharp, this information is lost", "source": "issue body", "interpretation": "Reporter is passing only the JPEG bytes from the BLP container, not the separate BLP alpha plane — the alpha is never in the JPEG stream."}, {"text": "Instead of fully transparent white pixels, I'm getting opaque black pixels", "source": "issue body", "interpretation": "Confirms JPEG is decoded opaque (black at alpha=0 areas when premultiplied to nothing). Expected output is RGBA transparency."}, {"text": "I tried using different SKColorSpaces and setting SKImageInfo.AlphaType, but nothing seems to work", "source": "issue body", "interpretation": "Changing AlphaType in the target SKImageInfo does not inject alpha data; the JPEG stream has no alpha to extract regardless of the decode target format."}, {"text": "Not gonna lie, that transparent jpeg threw me a bit. I didn't know that was even a thing. This is a discussion for the native skia team.", "source": "comment by maintainer mattleibow", "interpretation": "Maintainer is unsure about JPEG alpha support; for BLP2 specifically the alpha is stored outside the JPEG scan data in the BLP container header/alpha section."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "434-443", "finding": "SKBitmap.Decode(SKCodec) reads codec.Info for the target image info. For JPEG, Skia's codec reports AlphaType.Opaque — there is no alpha channel in the JPEG stream. Setting a different AlphaType in the destination SKImageInfo only controls the pixel memory layout, not whether alpha data is decoded from the source.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "295-314", "finding": "GetPixelSpan() and SetPixels() provide direct access to raw pixel memory. A caller who has the BLP alpha plane can decode the JPEG, create a new RGBA8888 bitmap, copy pixels from the decoded JPEG, and then write the separate alpha bytes into the alpha channel of each pixel using GetPixelSpan().", "relevance": "related"}], "workarounds": ["Extract the alpha channel bytes from the BLP container structure separately from the JPEG data. Decode the JPEG using SKBitmap.Decode(). Create a new SKBitmap with SKColorType.Rgba8888 and SKAlphaType.Premul at the same dimensions. Copy each pixel from the decoded JPEG bitmap and set the alpha byte from the BLP alpha plane, then premultiply if needed."], "resolution": {"hypothesis": "The BLP2 format stores alpha as raw 8-bit values in a separate section of the container, completely outside the JPEG scan data. The fix is to parse and apply the BLP alpha after JPEG decoding using SkiaSharp's pixel access APIs.", "proposals": [{"title": "Manually apply BLP alpha after JPEG decode", "description": "Decode the JPEG bytes with SKBitmap.Decode(), then create a new Rgba8888 bitmap. For each pixel, copy the RGB from the decoded JPEG and write the alpha byte from the separately-extracted BLP alpha plane.", "category": "workaround", "codeSnippet": "// jpegBytes: byte[] — JPEG data from BLP container\n// blpAlpha: byte[] — alpha plane extracted from BLP container (one byte per pixel, row-major)\nusing var jpegBitmap = SKBitmap.Decode(jpegBytes);\nvar info = new SKImageInfo(jpegBitmap.Width, jpegBitmap.Height, SKColorType.Rgba8888, SKAlphaType.Premul);\nusing var result = new SKBitmap(info);\nvar srcSpan = jpegBitmap.GetPixelSpan();\nvar dstSpan = result.GetPixelSpan();\nfor (int i = 0, a = 0; i < dstSpan.Length; i += 4, a++) {\n    byte alpha = blpAlpha[a];\n    // Source pixels from JPEG decoded as BGRA or RGBA — adjust channel order as needed\n    dstSpan[i + 0] = (byte)(srcSpan[i + 0] * alpha / 255); // R premultiplied\n    dstSpan[i + 1] = (byte)(srcSpan[i + 1] * alpha / 255); // G premultiplied\n    dstSpan[i + 2] = (byte)(srcSpan[i + 2] * alpha / 255); // B premultiplied\n    dstSpan[i + 3] = alpha;\n}", "confidence": 0.8, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Manually apply BLP alpha after JPEG decode", "recommendedReason": "The BLP alpha plane is structurally outside the JPEG stream; no SkiaSharp API can decode what isn't in the JPEG data. Manual composition is the only correct path."}}, "output": {"actionability": {"suggestedAction": "close-as-external", "confidence": 0.85, "reason": "The JPEG format does not support alpha channels; behavior is correct per JPEG spec. The BLP2 container stores alpha separately from JPEG scan data. SkiaSharp cannot decode alpha that is not present in the JPEG byte stream. The caller must extract both planes from the BLP container and combine them manually.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/question and area/SkiaSharp labels", "risk": "low", "confidence": 0.9, "labels": ["type/question", "area/SkiaSharp"]}, {"type": "add-comment", "description": "Explain that standard JPEG has no alpha, BLP stores alpha separately, and provide workaround", "risk": "high", "confidence": 0.85, "comment": "Thanks for the detailed test files — those were helpful for understanding what's happening.\n\nThe core issue is that **standard JPEG does not support alpha channels**. The alpha in BLP2 files is stored in a completely separate section of the BLP container, not inside the JPEG scan data. When you pass just the JPEG bytes to SkiaSharp, Skia's JPEG codec reports the image as fully opaque — correctly, because the JPEG stream contains no alpha information regardless of the alpha type you request on decode.\n\nThe fix needs to happen in your BLP parser: extract the alpha plane from the BLP container separately, decode the JPEG for RGB data, then combine them:\n\n```csharp\n// jpegBytes: JPEG data from BLP container\n// blpAlpha: alpha plane from BLP container (one byte per pixel, row-major)\nusing var jpegBitmap = SKBitmap.Decode(jpegBytes);\nvar info = new SKImageInfo(jpegBitmap.Width, jpegBitmap.Height,\n    SKColorType.Rgba8888, SKAlphaType.Premul);\nusing var result = new SKBitmap(info);\nvar srcSpan = jpegBitmap.GetPixelSpan();\nvar dstSpan = result.GetPixelSpan();\nfor (int i = 0, a = 0; i < dstSpan.Length; i += 4, a++) {\n    byte alpha = blpAlpha[a];\n    dstSpan[i + 0] = (byte)(srcSpan[i + 0] * alpha / 255);\n    dstSpan[i + 1] = (byte)(srcSpan[i + 1] * alpha / 255);\n    dstSpan[i + 2] = (byte)(srcSpan[i + 2] * alpha / 255);\n    dstSpan[i + 3] = alpha;\n}\n```\n\nNote: the channel order of `srcSpan` depends on the platform color type (BGRA vs RGBA) — check `SKImageInfo.PlatformColorType` on your platform and adjust accordingly."}, {"type": "close-issue", "description": "Close as answered — behavior is correct per JPEG spec, workaround documented", "risk": "medium", "confidence": 0.8, "stateReason": "completed"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
