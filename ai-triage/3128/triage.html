<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3128, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-27T15:46:00Z", "currentLabels": ["type/bug"]}, "summary": "SKCanvas.DrawText silently produces no output on Windows Azure App Service when called with the obsolete SKPaint overload, working fine on Linux. Regression from 2.88.9 to 3.116.0 caused by the architectural shift from SkCanvas::drawText to SKTextBlob-based rendering which has a silent null-return path.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/SkiaSharp", "confidence": 0.92}, "platforms": ["os/Windows-Classic"], "backends": ["backend/Raster"], "tenets": ["tenet/reliability", "tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "missing-output", "errorMessage": "No text is written and no exception is thrown", "reproQuality": "partial", "targetFrameworks": ["net8.0-windows"]}, "reproEvidence": {"stepsToReproduce": ["Deploy an ASP.NET/Azure App Service application to Windows (not Linux)", "Create SKBitmap.FromImage(skImage), SKCanvas, SKFont(SKTypeface.Default, 16), SKPaint(skFont)", "Call skCanvas.DrawText(\"My Text\", 10, 10, sKPaint) (obsolete overload)", "Observe: text is not drawn, no exception is thrown"], "environmentDetails": "Azure App Service for Windows, SkiaSharp 3.116.0, IDE: Visual Studio", "codeSnippets": ["SKBitmap skBitmap = SKBitmap.FromImage(skImage);\nSKCanvas skCanvas = new SKCanvas(skBitmap);\nSKFont skFont = new SKFont(SKTypeface.Default, 16);\nSKPaint sKPaint = new SKPaint(skFont);\nsKPaint.Color = new SKColor(255, 0, 0);\nsKPaint.IsAntialias = true;\nskCanvas.DrawText(\"My Text\", 10, 10, sKPaint);"]}, "versionAnalysis": {"mentionedVersions": ["3.116.0", "2.88.9"], "workedIn": "2.88.9", "brokeIn": "3.116.0", "currentRelevance": "likely", "relevanceReason": "The DrawText code path via SKTextBlob has not changed since 3.116.0 and the silent null return remains."}, "regression": {"isRegression": true, "confidence": 0.88, "reason": "In 2.88.x, DrawText called SkCanvas::drawText directly with native font metrics; in 3.x it creates a SKTextBlob and silently returns if it's null. This null-return is a new failure mode not present in 2.88.x.", "workedInVersion": "2.88.9", "brokeInVersion": "3.116.0"}}, "analysis": {"summary": "The regression is caused by the architectural shift in SkiaSharp 3.x where DrawText(string, float, float, SKPaint) now routes through SKTextBlob.Create(text, font), which can return null. When null, line 669 of SKCanvas.cs returns silently with no text drawn and no exception. On Windows Azure App Service, SKTypeface.Default may resolve to SKTypeface.Empty (zero glyphs) when the platform font manager cannot locate a default system font, causing SKTextBlob.Create to return null. Linux environments typically have fontconfig providing a valid default typeface.", "rationale": "Clearly a behavioral regression: works in 2.88.9, fails in 3.116.0, same code path. The silent null check in DrawText (SKCanvas.cs line 669) is the failure point. Platform difference (Windows vs Linux) points to font availability or font manager initialization as the root cause, not SkiaSharp C# wrapper logic. The reporter's TextAlign follow-up investigation is a red herring; TextAlign only shifts the x position and would not cause complete text disappearance.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKCanvas.cs", "lines": "652-673", "finding": "DrawText(string, float, float, SKTextAlign, SKFont, SKPaint) creates SKTextBlob and silently returns if blob is null (line 669: 'if (blob == null) return'). This silent failure is the immediate cause of the reported symptom — no text drawn, no exception.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKCanvas.cs", "lines": "635-637", "finding": "The obsolete DrawText(string, float, float, SKPaint) delegates to DrawText(text, x, y, paint.TextAlign, paint.GetFont(), paint). TextAlign and GetFont() are both read from the paint's compat paint handle — correct behavior assumed, but platform difference in font availability can cause null blob regardless of TextAlign value.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "29-33", "finding": "SKTypeface.Default falls back to SKTypeface.Empty when sk_fontmgr_legacy_create_typeface returns IntPtr.Zero (no system font found). SKTypeface.Empty has GlyphCount == 0, so SKTextBlob.Create on any text string returns null.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "22", "finding": "SKFontManager.Default uses sk_fontmgr_create_default() — platform-native font manager. On Windows this uses DirectWrite. Azure App Service for Windows restricts certain API surface areas, and font discovery may behave differently from a standard developer machine.", "relevance": "related"}, {"file": "binding/SkiaSharp/SKCanvas.cs", "lines": "639-642", "finding": "The non-obsolete DrawText(string, SKPoint, SKFont, SKPaint) also contains a TODO: 'replace paint.TextAlign with SKTextAlign.Left' — showing acknowledged technical debt in the text rendering path, confirming this is an area under active evolution.", "relevance": "context"}], "keySignals": [{"text": "No text is written and no exception is thrown", "source": "issue body", "interpretation": "Matches the 'if (blob == null) return' silent exit in SKCanvas.DrawText — SKTextBlob.Create returned null."}, {"text": "works in the similar application for Azure App Service on Linux", "source": "issue body", "interpretation": "Linux has fontconfig providing a valid default typeface; Windows Azure App Service may not have accessible system fonts for Skia's DirectWrite font manager."}, {"text": "This is a regression because it was working well in 2.88.9", "source": "issue body", "interpretation": "In 2.88.x, DrawText called SkCanvas::drawText natively and did not use SKTextBlob. The null-return path did not exist."}, {"text": "it seems it is related to text align not getting properly initialized", "source": "comment by reporter", "interpretation": "Red herring — TextAlign only adjusts x position; would shift text off-screen slightly but not cause complete disappearance. The root cause is the null blob."}], "workarounds": ["Load a font explicitly from a file bundled with the application: SKTypeface.FromFile(fontPath) instead of relying on SKTypeface.Default", "Embed a TTF font as an assembly resource and load with SKFontManager.Default.CreateTypeface(stream)", "Diagnose with: var blob = SKTextBlob.Create(\"test\", new SKFont(SKTypeface.Default, 12)); Console.WriteLine(blob == null ? \"font failed\" : \"font ok\");"], "nextQuestions": ["Does SKTypeface.Default.IsEmpty == true on the Windows Azure App Service environment?", "Does the issue occur with all SkiaSharp 3.x versions (3.116.x) or was there a specific version where it was introduced?", "Does loading a font explicitly (SKTypeface.FromFile) resolve the issue on Windows Azure App Service?"], "resolution": {"hypothesis": "SKTypeface.Default resolves to SKTypeface.Empty on Windows Azure App Service (where DirectWrite-based font manager cannot find a default font), causing SKTextBlob.Create to return null, which causes DrawText to silently no-op. The fix is either to ensure a valid typeface is available or to improve the error reporting so the silent failure is surfaced.", "proposals": [{"title": "Bundle and load font explicitly", "description": "Instead of relying on SKTypeface.Default (which may be empty in restricted server environments), bundle a TTF font with the app and load it explicitly.", "category": "workaround", "codeSnippet": "// Bundle a TTF/OTF font file with your app (Build Action = Content / CopyToOutput).\n// Free fonts with no server-use restrictions: DejaVu, Noto, Liberation.\n\nvar fontPath = Path.Combine(AppContext.BaseDirectory, \"fonts\", \"DejaVuSans.ttf\");\nusing var typeface = SKTypeface.FromFile(fontPath);\nif (typeface == null)\n    throw new FileNotFoundException(\"Required font file not found\", fontPath);\n\nusing var font = new SKFont(typeface, 16);\nusing var paint = new SKPaint();\npaint.Color = new SKColor(255, 0, 0);\npaint.IsAntialias = true;\nskCanvas.DrawText(\"My Text\", 10, 10, SKTextAlign.Left, font, paint);\n\n// Alternative: load from embedded assembly resource\n// (mark TTF as EmbeddedResource in .csproj)\nusing var stream = typeof(YourClass).Assembly\n    .GetManifestResourceStream(\"YourApp.Fonts.DejaVuSans.ttf\");\nif (stream == null)\n    throw new InvalidOperationException(\"Embedded font resource not found\");\nusing var typeface2 = SKFontManager.Default.CreateTypeface(stream)\n    ?? throw new InvalidOperationException(\"Failed to create typeface\");\nusing var font2 = new SKFont(typeface2, 16);", "confidence": 0.85, "effort": "cost/s", "validated": "yes"}, {"title": "Diagnose font availability", "description": "Add diagnostics to confirm whether SKTypeface.Default is empty on the Windows Azure App Service environment. This will confirm or rule out the font root cause.", "category": "investigation", "codeSnippet": "// Add this diagnostic in your app startup or a test endpoint\nvar tf = SKTypeface.Default;\nConsole.WriteLine($\"Typeface.IsEmpty: {tf.IsEmpty}\");\nConsole.WriteLine($\"Typeface.GlyphCount: {tf.GlyphCount}\");\nusing var font = new SKFont(tf, 12);\nusing var blob = SKTextBlob.Create(\"Test\", font);\nConsole.WriteLine($\"SKTextBlob.Create returned null: {blob == null}\");", "confidence": 0.95, "effort": "cost/xs", "validated": "yes"}], "recommendedProposal": "Bundle and load font explicitly", "recommendedReason": "Directly avoids the root cause on server environments without waiting for a framework fix. Using explicit fonts is also best practice for server-side image generation."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Root cause is likely identified (SKTextBlob null + empty default typeface on Windows Azure App Service), but needs confirmation from the reporter running the diagnostic. The silent failure in DrawText is a real regression that should be addressed in the library.", "suggestedReproPlatform": "windows"}, "missingInfo": ["Confirmation that SKTypeface.Default.IsEmpty == true on the Windows Azure App Service environment (run the diagnostic snippet)", ".NET TFM used (net8.0, net9.0, net8.0-windows?)", "Whether bundling a font and using SKTypeface.FromFile resolves the issue"], "actions": [{"type": "update-labels", "description": "Apply bug, core SkiaSharp area, Windows platform, raster backend, and quality tenet labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "backend/Raster", "tenet/reliability", "tenet/compatibility"]}, {"type": "add-comment", "description": "Post analysis with diagnostic steps and workaround for bundling fonts", "risk": "medium", "confidence": 0.82, "comment": "Thanks for the detailed report and follow-up investigation.\n\nBased on code analysis, the regression is likely caused by a change in SkiaSharp 3.x: `DrawText` now routes through `SKTextBlob.Create()`, which silently returns `null` (and no exception is thrown) if the font has no glyphs. On Windows Azure App Service, `SKTypeface.Default` may resolve to an empty typeface when the system font manager (DirectWrite) cannot locate a default font — this is known to behave differently in restricted server environments compared to standard developer machines.\n\n**Step 1 — Confirm the diagnosis** by running this diagnostic in your app:\n```csharp\nvar tf = SKTypeface.Default;\nConsole.WriteLine($\"Typeface.IsEmpty: {tf.IsEmpty}\");\nConsole.WriteLine($\"Typeface.GlyphCount: {tf.GlyphCount}\");\nusing var diagFont = new SKFont(tf, 12);\nusing var blob = SKTextBlob.Create(\"Test\", diagFont);\nConsole.WriteLine($\"SKTextBlob.Create returned null: {blob == null}\");\n```\n\nIf `IsEmpty: True` or `blob == null`, the font is not available and bundling a font will fix it.\n\n**Workaround — Bundle a font with your app:**\n```csharp\n// Add a TTF to your project (e.g. fonts/DejaVuSans.ttf), Build Action = Content / CopyToOutput.\n// Free fonts: DejaVu, Noto, Liberation (no server-use restrictions).\n\nvar fontPath = Path.Combine(AppContext.BaseDirectory, \"fonts\", \"DejaVuSans.ttf\");\nusing var typeface = SKTypeface.FromFile(fontPath);\nif (typeface == null)\n    throw new FileNotFoundException(\"Required font file not found\", fontPath);\n\nusing var font = new SKFont(typeface, 16);\nusing var paint = new SKPaint();\npaint.Color = new SKColor(255, 0, 0);\npaint.IsAntialias = true;\nskCanvas.DrawText(\"My Text\", 10, 10, SKTextAlign.Left, font, paint);\n```\n\nUsing an explicit font is also best practice for server-side image generation — system fonts vary across deployment targets and are not guaranteed in PaaS environments.\n\nThe `TextAlign` code you found is a known TODO in the library but it only adjusts the x offset and would not cause complete text disappearance. The silent `null` blob check (`if (blob == null) return;` in SKCanvas.cs:669) is the direct cause of the symptom."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
