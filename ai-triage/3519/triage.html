<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3519, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T15:26:00Z", "currentLabels": ["type/bug", "os/Windows-Classic", "os/Linux", "area/libSkiaSharp.native", "tenet/reliability", "triage/triaged"]}, "summary": "Native asset NuGet packages for libSkiaSharp in 3.119.2 are dramatically larger than 3.119.1, with Win32 growing from ~13 MB to ~75 MB and Linux from ~39 MB to ~54 MB, because PDB/debug symbol files were included in the main runtime package instead of (or in addition to) the symbols package.", "classification": {"type": {"value": "type/bug", "confidence": 0.92}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.95}, "platforms": ["os/Windows-Classic", "os/Linux"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "wrong-output", "errorMessage": "PDB files present in runtimes\\**\\*.pdb inside the main libSkiaSharp NuGet package", "reproQuality": "partial", "targetFrameworks": []}, "reproEvidence": {"stepsToReproduce": ["Install SkiaSharp 3.119.2 NuGet package", "Build/publish the project", "Observe large .pdb files in the output/publish runtimes directory"], "environmentDetails": "Windows, Visual Studio; also reproducible on Linux", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/3519#issuecomment-3940956859", "description": "Community workaround: MSBuild target to remove PDB files from runtimes after build/publish"}]}, "versionAnalysis": {"mentionedVersions": ["3.119.1", "3.119.2"], "workedIn": "3.119.1", "brokeIn": "3.119.2", "currentRelevance": "likely", "relevanceReason": "No fix has been landed; 3.119.3 changelog directory exists but no specific PDB-removal fix was found in source."}, "regression": {"isRegression": true, "confidence": 0.9, "reason": "Reporter provides concrete size comparison table: Win32 went from 13 051 KB to 75 014 KB and Linux from 39 466 KB to 53 908 KB. macOS was unchanged, suggesting a platform-specific packaging change.", "workedInVersion": "3.119.1", "brokeInVersion": "3.119.2"}}, "analysis": {"summary": "PDB (debug symbol) files for the Windows and Linux native libraries are being included in the main runtime NuGet packages in 3.119.2, causing a 5-6x size increase on Windows and ~36% increase on Linux. The `NativeAssets.Build.targets` file (lines 50-52) explicitly filters PDB files from `_BuildOutputInPackage` and routes them to `_TargetPathsToSymbols`, but the Windows build script copies `.pdb` files to the output directory alongside the DLL. The community confirms PDB files are present at `runtimes\\**\\*.pdb` after install. A packaging pipeline change in 3.119.2 appears to have caused these symbol files to land in the primary package.", "rationale": "Reporter shows a quantified size regression with a concrete before/after version table. A community commenter confirmed PDB files are in the installed package and provided a workaround. Code investigation shows the intent is to exclude PDB from main packages (NativeAssets.Build.targets line 50), but Windows build.cake explicitly copies .pdb to the output directory, suggesting the filtering may not be working correctly or IncludeSymbols=true is causing them to be bundled into the main nupkg.", "keySignals": [{"text": "Win32|13,051|75,014", "source": "issue body table", "interpretation": "Win32 package grew ~5.75x, strongly suggesting large binary files (PDB symbols) were added"}, {"text": "MacOS|6,934|6,934", "source": "issue body table", "interpretation": "macOS size is unchanged, which rules out a Skia upstream size increase and points to a Windows/Linux-specific packaging change"}, {"text": "It seems that the new version includes pdb files in package", "source": "comment by Jack251970", "interpretation": "Community confirms root cause: .pdb files in runtimes\\**\\*.pdb inside the main package"}, {"text": "Whatever change happened seemed to land before preview 1", "source": "issue body", "interpretation": "Regression was introduced early in the 3.119.2 preview cycle"}], "codeInvestigation": [{"file": "binding/NativeAssets.Build.targets", "lines": "49-53", "finding": "Line 50 explicitly excludes `.pdb` and `.dbg` from `_BuildOutputInPackage` (the main package); line 52 routes them to `_TargetPathsToSymbols` (symbols package). However, line 30 sets `IncludeSymbols=true` which may cause the symbols to be double-included via NuGet's symbol packaging path.", "relevance": "direct"}, {"file": "native/windows/build.cake", "lines": "83-88", "finding": "Build output step copies both `libSkiaSharp.dll` AND `libSkiaSharp.pdb` to the native output directory (line 86). Similarly `libHarfBuzzSharp.pdb` is copied at line 108. If the packaging targets later pick up all files in that directory unconditionally, PDB files would be bundled.", "relevance": "direct"}, {"file": "binding/NativeAssets.Build.targets", "lines": "28-31", "finding": "`IncludeSymbols=true` is set on native assets projects. This could interact with NuGet packaging to include symbols in both the main `.nupkg` and the `.snupkg`, potentially inflating the installed size.", "relevance": "related"}], "nextQuestions": ["What specific change between 3.119.1 and 3.119.2-preview1 added PDB files to the main package?", "Is the `_BuildOutputInPackage` filter in NativeAssets.Build.targets actually being applied to the packages published to NuGet?", "Are the PDB files in the `.nupkg` itself or in a co-installed `.snupkg` symbols package?", "Does the size regression also affect libHarfBuzzSharp.native packages?"], "workarounds": ["Add MSBuild targets to delete PDB files from runtimes directory after Build and Publish (workaround by Jack251970 in issue comments)"], "resolution": {"hypothesis": "A packaging pipeline change in 3.119.2 caused .pdb files to be included in the main native NuGet packages (runtimes/**/*.pdb), circumventing the intended filter in NativeAssets.Build.targets.", "proposals": [{"title": "Investigate and fix packaging pipeline to exclude PDB from main package", "description": "Trace what changed in the NuGet packaging pipeline between 3.119.1 and 3.119.2 that allowed PDB files past the NativeAssets.Build.targets filter. Fix the pipeline to restore 3.119.1 behavior.", "category": "fix", "confidence": 0.8, "effort": "cost/m", "validated": "untested"}, {"title": "Remove PDB file copy step from Windows build script", "description": "In native/windows/build.cake, remove the CopyFileToDirectory calls for .pdb files (lines 86 and 108) to prevent them from entering the packaging input directory entirely.", "category": "fix", "confidence": 0.7, "effort": "cost/s", "validated": "untested"}, {"title": "MSBuild workaround to delete PDB files post-build/publish", "description": "Users can add MSBuild targets to remove runtimes/**/*.pdb after Build and Publish steps as a short-term workaround (community-provided in issue comments).", "category": "workaround", "confidence": 0.9, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Investigate and fix packaging pipeline to exclude PDB from main package", "recommendedReason": "The root cause should be fixed at the packaging level so downstream users don't need workarounds. The targets file already has the correct intent (filter .pdb from main package); fixing the pipeline change that bypassed it is the right approach."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.88, "reason": "Clear regression with quantified size data and confirmed root cause (PDB files in main package). Needs investigation into which packaging pipeline change in 3.119.2 caused this and a proper fix.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply bug, native, windows, linux, reliability labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/libSkiaSharp.native", "os/Windows-Classic", "os/Linux", "tenet/reliability"]}, {"type": "add-comment", "description": "Acknowledge regression, confirm PDB root cause, share workaround", "risk": "medium", "confidence": 0.88, "comment": "Thanks for the detailed size comparison! This is a real regression — the Win32 package grew ~5.75× between 3.119.1 and 3.119.2, which is consistent with `.pdb` debug symbol files being accidentally included in the main NuGet package (confirmed by the community comment above).\n\nThe `NativeAssets.Build.targets` file has a filter to exclude `.pdb` files from the primary package and route them to the symbols package instead, but something in the 3.119.2 packaging pipeline bypassed that filter.\n\n**Workaround** (from @Jack251970 above) — add these MSBuild targets to your `.csproj` to strip the PDB files after build/publish:\n\n```xml\n<!-- Workaround for https://github.com/mono/SkiaSharp/issues/3519 -->\n<Target Name=\"RemoveUnnecessaryPdbFilesAfterBuild\" AfterTargets=\"Build\">\n  <ItemGroup>\n    <PdbFilesToRemoveBuild Include=\"$(OutputPath)runtimes\\**\\*.pdb\" />\n  </ItemGroup>\n  <Delete Files=\"@(PdbFilesToRemoveBuild)\" />\n</Target>\n<Target Name=\"RemoveUnnecessaryPdbFilesAfterPublish\" AfterTargets=\"Publish\">\n  <ItemGroup>\n    <PdbFilesToRemovePublish Include=\"$(PublishDir)runtimes\\**\\*.pdb\" />\n  </ItemGroup>\n  <Delete Files=\"@(PdbFilesToRemovePublish)\" />\n</Target>\n```\n\nWe will investigate the packaging pipeline change that caused this and issue a fix."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
