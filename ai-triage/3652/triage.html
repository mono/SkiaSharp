<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3652, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-27T14:20:00Z", "currentLabels": ["type/bug"]}, "summary": "ASP.NET Core app on AWS EC2 (Linux) returns 502/503 proxy errors when invoking SkiaSharp drawing code using SkiaSharp.NativeAssets.Linux v3.119.1; worked correctly in v3.116.1.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.9}, "platforms": ["os/Linux"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": true, "errorType": "crash", "errorMessage": "Proxy Error: The proxy server received an invalid response from an upstream server. Reason: Error reading from remote server", "reproQuality": "partial", "targetFrameworks": ["net8.0"]}, "reproEvidence": {"stepsToReproduce": ["Create an ASP.NET Core app targeting net8.0 on Linux (AWS EC2)", "Reference SkiaSharp.NativeAssets.Linux v3.119.1", "Call SKBitmap, SKCanvas, SKTypeface.FromFamilyName, SKPaint and SKImage APIs", "Observe 502/503 proxy error from the server"], "environmentDetails": "AWS EC2 instance, Linux, ASP.NET Core .NET 8.0, SkiaSharp.NativeAssets.Linux v3.119.1", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/3386", "description": "Similar DllNotFoundException with fontconfig on Azure Container App (Aspire) – same pattern: libfontconfig.so.1 not resolved, causing app crash"}]}, "versionAnalysis": {"mentionedVersions": ["3.116.1", "3.119.1"], "workedIn": "3.116.1", "brokeIn": "3.119.1", "currentRelevance": "likely", "relevanceReason": "Reporter confirmed regression between these two specific versions; no server logs yet to confirm exact failure mode."}, "regression": {"isRegression": true, "confidence": 0.85, "reason": "Reporter explicitly states it works in v3.116.1 and fails in v3.119.1 with the same code and environment. The Skia milestone bump from m116 to m119 may have introduced new native dependencies or changed the fontconfig linkage.", "workedInVersion": "3.116.1", "brokeInVersion": "3.119.1"}}, "analysis": {"summary": "The process hosting the ASP.NET Core application is likely crashing or failing to initialize SkiaSharp due to a missing or incompatible native dependency introduced in the v3.119 native binary. The 502/503 proxy errors are consistent with the worker process crashing before returning a response. SKTypeface.FromFamilyName() calls SKFontManager.Default.MatchFamily() which requires fontconfig on Linux; although the reporter installed fontconfig, the v3.119.1 native binary may require a different version or an additional system library not present on the AWS EC2 instance. No server-side logs are available to confirm the exact exception.", "rationale": "Classified as type/bug and area/libSkiaSharp.native because the failure is a native library load or initialization crash (proxy errors indicate server process death), not a code logic error. It is a regression between 3.116.1 and 3.119.1, pointing to a native binary dependency change in the m119 Skia milestone bump. The tenet/compatibility label reflects the version regression. Needs-info is suggested because no server logs exist to identify the exact failure mode, AWS EC2 distro and version are unknown, and the reporter has not tried NoDependencies as suggested by maintainer.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "74-80", "finding": "SKTypeface.FromFamilyName() delegates to SKFontManager.Default.MatchFamily() — the default font manager on Linux uses fontconfig to enumerate and match system fonts. If fontconfig or a transitive native dependency cannot be loaded, this call will trigger a DllNotFoundException or similar crash at the point SkiaSharp first accesses the native library.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "39", "finding": "SKFontManager.Default is a static singleton. Its first access initializes the native font manager. On Linux this is backed by libSkiaSharp.so which dynamically links to libfontconfig.so.1. If fontconfig is present but at an incompatible ABI version, dlopen will fail.", "relevance": "direct"}, {"file": "documentation/dev/packages.md", "finding": "SkiaSharp.NativeAssets.Linux requires libfontconfig.so.1 as a runtime dependency. The NoDependencies variant strips all external dependencies. If the v3.119 binary added new native deps or updated fontconfig linkage beyond what was in v3.116, environments with older or differently-configured fontconfig will fail.", "relevance": "related"}], "keySignals": [{"text": "This issue does not occur in v3.116.1", "source": "issue body", "interpretation": "Clear regression — native binary or dependency requirements changed between Skia milestone m116 and m119."}, {"text": "Proxy Error: Error reading from remote server", "source": "issue body log output", "interpretation": "The upstream ASP.NET Core server process is crashing/dying, not returning an HTTP error. This is consistent with an unhandled exception during native library initialization (e.g., DllNotFoundException or TypeInitializationException)."}, {"text": "The server logs were not printed", "source": "comment by Akash26Arul", "interpretation": "Confirms the process is dying before logging — likely a TypeInitializationException or process-level crash rather than a handled exception."}, {"text": "We installed fontconfig correctly in our application, but we are still facing the issue", "source": "comment by Akash26Arul", "interpretation": "Fontconfig version mismatch or additional undeclared native dependencies added in v3.119.1 are likely causing the failure, not a simple missing fontconfig package."}], "workarounds": ["Switch from SkiaSharp.NativeAssets.Linux to SkiaSharp.NativeAssets.Linux.NoDependencies — this variant has no external dependencies (only libc/libm/libpthread/libdl) and avoids fontconfig entirely.", "Load fonts explicitly with SKTypeface.FromFile('/path/to/font.ttf') instead of SKTypeface.FromFamilyName() to avoid triggering the fontconfig-backed font manager.", "Run 'ldd /path/to/publish/libSkiaSharp.so' on the EC2 instance to identify which shared library is missing or incompatible.", "Enable ASP.NET Core stdout logging or set ASPNETCORE_ENVIRONMENT=Development to capture the full exception before the process crashes."], "nextQuestions": ["What is the AWS EC2 Linux distro and version (Amazon Linux 2, Amazon Linux 2023, Ubuntu, etc.)?", "What is the exact exception in the server logs when ASPNETCORE_ENVIRONMENT=Development is set?", "Does the issue reproduce with SkiaSharp.NativeAssets.Linux.NoDependencies?", "What does 'ldd libSkiaSharp.so' show on the EC2 instance — are there any 'not found' dependencies?", "Is the application running inside a Docker container on the EC2 instance?"], "resolution": {"hypothesis": "The v3.119.1 native binary for SkiaSharp.NativeAssets.Linux has a native dependency (likely fontconfig or a transitive library) that is present at a different version or not present at all on the AWS EC2 environment, causing a crash at library load time which manifests as a 502/503 proxy error.", "proposals": [{"title": "Switch to NoDependencies package", "description": "Replace SkiaSharp.NativeAssets.Linux with SkiaSharp.NativeAssets.Linux.NoDependencies. This variant has zero external dependencies and works in any Linux environment. Fonts must be loaded explicitly using SKTypeface.FromFile() instead of SKTypeface.FromFamilyName().", "category": "workaround", "codeSnippet": "// In your .csproj, replace:\n// <PackageReference Include=\"SkiaSharp.NativeAssets.Linux\" Version=\"3.119.1\" />\n// with:\n// <PackageReference Include=\"SkiaSharp.NativeAssets.Linux.NoDependencies\" Version=\"3.119.1\" />\n\n// And load fonts explicitly:\nusing var typeface = SKTypeface.FromFile(\"/usr/share/fonts/truetype/arial.ttf\")\n    ?? SKTypeface.Default;", "confidence": 0.85, "effort": "cost/xs", "validated": "untested"}, {"title": "Diagnose and install missing native dependency", "description": "Run 'ldd' on the deployed libSkiaSharp.so to identify the exact missing library, then install it. This preserves system font enumeration via fontconfig.", "category": "investigation", "codeSnippet": "# On the EC2 instance, find the deployed .so and check deps:\nfind /var/app -name 'libSkiaSharp.so' 2>/dev/null\nldd /path/to/libSkiaSharp.so | grep 'not found'", "confidence": 0.75, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Switch to NoDependencies package", "recommendedReason": "Immediately unblocks the reporter without needing to debug native dependency chains. The NoDependencies variant is specifically designed for server/container deployments where fontconfig system integration isn't critical."}}, "output": {"actionability": {"suggestedAction": "needs-info", "confidence": 0.85, "reason": "The regression claim is credible and the failure pattern is consistent with a native dependency issue in v3.119.1. However, no server logs exist to identify the exact exception, and the reporter has not yet tried the NoDependencies workaround suggested by the maintainer. Server logs and EC2 distro details are required to confirm root cause.", "suggestedReproPlatform": "linux"}, "missingInfo": ["Server logs with full exception stack trace (set ASPNETCORE_ENVIRONMENT=Development or check stdout logs)", "AWS EC2 Linux distribution and version (Amazon Linux 2, Amazon Linux 2023, Ubuntu, etc.)", "Output of 'ldd libSkiaSharp.so' on the EC2 instance to identify missing native dependencies", "Whether the application runs inside a Docker container on EC2", "Whether SkiaSharp.NativeAssets.Linux.NoDependencies resolves the issue"], "actions": [{"type": "update-labels", "description": "Apply bug, linux, native, compatibility labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/libSkiaSharp.native", "os/Linux", "tenet/compatibility"]}, {"type": "add-comment", "description": "Request server logs and offer NoDependencies workaround", "risk": "medium", "confidence": 0.85, "comment": "Thanks for following up. The 502/503 proxy error pattern strongly suggests the ASP.NET Core worker process is crashing before returning a response — typically caused by a native library load failure.\n\nA few things that would help diagnose this:\n\n1. **Server logs**: Set `ASPNETCORE_ENVIRONMENT=Development` (or enable stdout logging) to capture the full exception stack trace before the process dies. Look for `DllNotFoundException`, `TypeInitializationException`, or similar.\n\n2. **Check native dependencies**: On the EC2 instance, find and inspect the deployed native binary:\n   ```bash\n   find /var/app -name 'libSkiaSharp.so' 2>/dev/null\n   ldd /path/to/libSkiaSharp.so | grep 'not found'\n   ```\n   This will show exactly which dependency is missing.\n\n3. **AWS EC2 details**: What Linux distro/version is your EC2 instance running (Amazon Linux 2, Amazon Linux 2023, Ubuntu 20.04/22.04, etc.)?\n\n**Workaround while investigating**: Switch to `SkiaSharp.NativeAssets.Linux.NoDependencies` — this variant has zero external dependencies and works on any Linux without fontconfig:\n```xml\n<!-- Replace NativeAssets.Linux with NoDependencies -->\n<PackageReference Include=\"SkiaSharp.NativeAssets.Linux.NoDependencies\" Version=\"3.119.1\" />\n```\nNote: With `NoDependencies`, you must load fonts explicitly using `SKTypeface.FromFile(\"/path/to/font.ttf\")` instead of `SKTypeface.FromFamilyName(\"Arial\")`."}, {"type": "link-related", "description": "Cross-reference similar native loading issue on Azure Container Apps", "risk": "low", "confidence": 0.8, "linkedIssue": 3386}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
