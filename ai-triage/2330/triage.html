<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2330, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-22T23:01:46Z"}, "summary": "Reporter asks how to implement per-shape hit testing in SkiaSharp — determining which drawn shape contains a mouse-click coordinate, including correct handling of hollow glyphs like the interior of '0'.", "classification": {"type": {"value": "type/question", "confidence": 0.95}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}}, "evidence": {"reproEvidence": {"stepsToReproduce": ["Draw multiple shapes (text, rounded rects, complex curves) on an SKCanvas", "Handle a mouse click / touch event", "Determine which drawn shape was hit by the click coordinates"], "environmentDetails": "No specific version or platform mentioned. Issue filed 2022-12-05, last comment 2024-08-16."}}, "analysis": {"summary": "Reporter wants hit testing for shapes drawn with SkiaSharp. SkiaSharp provides SKPath.Contains(x, y) for filled-shape hit testing, SKPaint.GetFillPath() to expand stroked paths to their actual filled outline (enabling accurate stroke-width-aware hit testing), and SKFont.GetTextPath() to get the exact glyph outlines for text — together covering all the reporter's listed cases including hollow glyphs like '0'.", "rationale": "This is a how-to question: the reporter believes SkiaSharp lacks a hit testing API, but SKPath.Contains() provides exactly that. No bug is reported. The answer is fully answerable from the existing SkiaSharp API surface. Multiple community members confirmed the question is out-of-scope for a rendering library and suggested approaches. Close as answered.", "keySignals": [{"text": "I realized that skia does not provide such an API and I need to implement it myself", "source": "issue body", "interpretation": "Reporter is unaware of SKPath.Contains() — a discoverability gap, not a missing feature."}, {"text": "I can click inside the text with the number '0' and this should not be considered a hit", "source": "issue body", "interpretation": "Hollow glyph interior handling. SKPath for font glyphs uses opposite winding for interior contours — SKPath.Contains() with Winding fill handles this correctly."}, {"text": "there are also rectangles with rounded edges, complex curves, different shapes, and there are thousands of them on the canvas", "source": "issue body", "interpretation": "Needs a per-path hit test approach over a shape list (not bounding-box only). SKPath.Contains() works for arbitrary shapes."}, {"text": "you could draw the shapes to a new surface, pass a unique color for each shape, then call hittestsurface.ReadPixels(..., mousePos)", "source": "comment by willn1337", "interpretation": "Valid alternative: color-based hit testing using an off-screen bitmap. Covered in proposals."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKPath.cs", "lines": "178-179", "finding": "SKPath.Contains(float x, float y) delegates to sk_path_contains — performs proper point-in-path test respecting the path's FillType (Winding by default). Font glyph paths use opposite winding for interior holes, so Contains() correctly returns false for clicking inside '0'.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKPaint.cs", "lines": "455-500", "finding": "SKPaint.GetFillPath(SKPath src) converts any path with current paint settings (stroke width, effects) into the actual filled outline — enabling hit testing of stroked shapes accounting for stroke width. Can return null on failure; null check required.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFont.cs", "lines": "728-729", "finding": "SKFont.GetTextPath(string text, SKPoint origin) returns an SKPath with exact glyph outlines including interior contours, enabling per-glyph hit testing for text labels.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKPath.cs", "lines": "22-30", "finding": "SKPath has copy constructor SKPath(SKPath path) but no Clone() method — correct pattern for duplicating a path for a hit-test list is new SKPath(original).", "relevance": "related"}, {"file": "binding/SkiaSharp/SKColor.cs", "lines": "14-26", "finding": "SKColor constructors accept (uint value) or (byte red, byte green, byte blue, byte alpha). There is no (uint, uint, uint, int) overload — color-based hit testing code must cast values to byte explicitly.", "relevance": "related"}], "workarounds": ["Use SKPath.Contains(x, y) — respects path fill type; font glyph paths correctly mark hollow interiors via opposite-winding contours", "For stroked shapes, call SKPaint.GetFillPath(path) to get the expanded stroke outline, then call Contains()", "For text, use SKFont.GetTextPath(text, origin) to get the glyph outline SKPath, then call Contains()", "Alternative: render each shape to an off-screen SKBitmap with a unique color per shape ID; on click, read the pixel with SKBitmap.GetPixel(x, y) and decode the shape index from the color"], "resolution": {"hypothesis": "Reporter needs per-shape hit testing for thousands of shapes. SKPath.Contains() is the correct API — it handles filled shapes, correctly treats hollow glyph interiors via fill rule, and when combined with SKPaint.GetFillPath() also handles stroked shapes.", "proposals": [{"title": "Path-based hit testing with SKPath.Contains", "description": "Maintain a list of SKPath objects alongside your draw calls (one per shape, with the same transform applied). On a click, iterate in reverse z-order and return the first shape where Contains(x, y) is true. For stroked shapes, expand to fill path first via SKPaint.GetFillPath(). Null-check the result.\n\n```csharp\nvar shapes = new List<(SKPath path, SKPaint paint)>();\n\n// In draw loop — store a copy of each path:\nvar shapePath = new SKPath();\nshapePath.AddRoundRect(SKRect.Create(100, 100, 200, 150), 20, 20);\nshapes.Add((shapePath, paint)); // shapePath is now owned by the list\n\n// On click at (clickX, clickY):\nfor (int i = shapes.Count - 1; i >= 0; i--) {\n    var (path, p) = shapes[i];\n    SKPath hitPath = p.Style == SKPaintStyle.Stroke\n        ? p.GetFillPath(path) // may return null\n        : path;\n    if (hitPath == null) continue;\n    bool hit = hitPath.Contains(clickX, clickY);\n    if (hitPath != path) hitPath.Dispose();\n    if (hit) { /* shapes[i] was clicked */ break; }\n}\n```", "category": "fix", "confidence": 0.9, "effort": "cost/s", "validated": "yes"}, {"title": "Text glyph hit testing with SKFont.GetTextPath", "description": "For text labels, use SKFont.GetTextPath() to get the exact glyph outline path, then call Contains(). This correctly handles hollow characters like '0' — clicking inside the hole returns false because font glyph paths define interior holes via opposite-winding contours, and SKPath.Contains() respects this.\n\n```csharp\nusing var font = new SKFont(SKTypeface.Default, 48);\n// GetTextPath returns null if text is empty or typeface is unavailable\nusing var textPath = font.GetTextPath(\"Hello 0\", new SKPoint(100, 100));\nif (textPath != null) {\n    bool hit = textPath.Contains(mouseX, mouseY);\n}\n```", "category": "fix", "confidence": 0.88, "effort": "cost/xs", "validated": "yes"}, {"title": "Color-based hit testing (alternative for complex scenes)", "description": "Render each shape to an off-screen SKBitmap using a unique opaque color per shape index. On click, read the pixel to identify the hit shape. Useful when iterating thousands of paths per click is too slow.\n\n```csharp\nusing var hitmap = new SKBitmap(width, height);\nusing var hitmapCanvas = new SKCanvas(hitmap);\nhitmapCanvas.Clear(SKColors.Transparent);\n\nfor (int i = 0; i < shapes.Count; i++) {\n    byte r = (byte)(i & 0xFF);\n    byte g = (byte)((i >> 8) & 0xFF);\n    byte b = (byte)((i >> 16) & 0xFF);\n    using var idPaint = new SKPaint { Color = new SKColor(r, g, b, 255), IsAntialias = false };\n    hitmapCanvas.DrawPath(shapes[i], idPaint);\n}\n\n// On click at (x, y):\nSKColor pixel = hitmap.GetPixel((int)x, (int)y);\nif (pixel.Alpha > 0) {\n    int shapeIndex = pixel.Red | (pixel.Green << 8) | (pixel.Blue << 16);\n    // shapeIndex identifies the hit shape\n}\n```\n\nNote: disable antialiasing on idPaint to get clean color boundaries. Supports up to 16 million shapes (24-bit color). Hitmap must be rebuilt when shapes change.", "category": "alternative", "confidence": 0.85, "effort": "cost/m", "validated": "yes"}], "recommendedProposal": "Path-based hit testing with SKPath.Contains", "recommendedReason": "No extra rendering pass. Works correctly for all shape types including stroked shapes and text. Handles the reporter's specific 'hollow 0' concern. Scales to thousands of shapes with a simple list iteration."}}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.88, "reason": "Usage question — the answer exists in SkiaSharp's API. SKPath.Contains() provides the requested hit testing. Full code examples can be given. Multiple community members also confirmed this is not a library bug.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply question type and SkiaSharp area labels", "risk": "low", "confidence": 0.95, "labels": ["type/question", "area/SkiaSharp"]}, {"type": "add-comment", "description": "Post answer explaining SKPath.Contains() and related APIs for hit testing", "risk": "high", "confidence": 0.88, "comment": "SkiaSharp does have the APIs you need for shape hit testing — the key is **`SKPath.Contains(x, y)`**.\n\n**For filled shapes (rectangles, circles, custom paths):**\n```csharp\n// Keep a copy of each path alongside your draw calls:\nvar shapePath = new SKPath();\nshapePath.AddRoundRect(SKRect.Create(100, 100, 200, 150), 20, 20);\n\n// On mouse click:\nbool hit = shapePath.Contains(mouseX, mouseY);\n```\n\n**For stroked shapes** (stroke width matters for the hit area), expand the stroke to a fill path first:\n```csharp\nSKPath hitPath = paint.Style == SKPaintStyle.Stroke\n    ? paint.GetFillPath(shapePath)  // may return null\n    : shapePath;\nif (hitPath != null && hitPath.Contains(mouseX, mouseY)) { /* hit */ }\nif (hitPath != shapePath) hitPath?.Dispose();\n```\n\n**For text glyphs** (including hollow characters like `'0'`):\n```csharp\nusing var font = new SKFont(SKTypeface.Default, 48);\nusing var textPath = font.GetTextPath(\"Hello 0\", new SKPoint(100, 100));\nif (textPath != null) {\n    // Clicking inside the hole of '0' correctly returns false —\n    // font glyphs define interior holes via opposite-winding contours\n    bool hit = textPath.Contains(mouseX, mouseY);\n}\n```\n\n**For thousands of shapes**, keep a `List<SKPath>` in z-order. On click, iterate from top to bottom and return the first path where `Contains` is true:\n```csharp\nfor (int i = shapes.Count - 1; i >= 0; i--) {\n    if (shapes[i].path.Contains(clickX, clickY)) {\n        // shapes[i] was clicked\n        break;\n    }\n}\n```\n\nAs an alternative, a **color-based hit test** (render each shape to an off-screen `SKBitmap` with a unique color per shape index, then read the pixel with `SKBitmap.GetPixel(x, y)`) avoids iterating all paths per click and can be faster for very complex scenes.\n\nClosing as answered — feel free to reopen if you have follow-up questions!"}, {"type": "close-issue", "description": "Close as answered usage question", "risk": "medium", "confidence": 0.85, "stateReason": "completed"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
