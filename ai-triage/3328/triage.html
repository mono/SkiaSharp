<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3328, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-28T05:14:37Z", "currentLabels": ["type/bug"]}, "summary": "SKFont.GetTextPath returns an empty path (zero width/height bounds) for emoji characters on Windows 11 using Segoe UI Emoji font in SkiaSharp 3.119.0, reportedly working in 2.88.9.", "classification": {"type": {"value": "type/bug", "confidence": 0.88}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "platforms": ["os/Windows-Classic"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "wrong-output", "errorMessage": "path.Bounds shows 0 width and 0 height for emoji character", "reproQuality": "partial"}, "reproEvidence": {"stepsToReproduce": ["Create an SKTypeface from 'Segoe UI Emoji' using SKTypeface.FromFamilyName", "Create an SKFont with size 48", "Call fontTest.GetTextPath with emoji string and new SKPoint(0, 0)", "Observe path.Bounds returns empty rect (0 width and 0 height)"], "environmentDetails": "Windows 11, SkiaSharp 3.119.0, HarfBuzz 3.119.0, Visual Studio", "relatedIssues": [3244]}, "versionAnalysis": {"mentionedVersions": ["3.119.0", "2.88.9"], "workedIn": "2.88.9", "brokeIn": "3.119.0", "currentRelevance": "likely", "relevanceReason": "No fix has been identified in the GetTextPath code path for color emoji font handling."}, "regression": {"isRegression": true, "confidence": 0.65, "reason": "Reporter explicitly states the feature worked in 2.88.9. The Skia library was significantly upgraded between SkiaSharp 2.88.x and 3.x (multiple Skia milestones), which may have changed COLR/bitmap emoji path extraction behavior in SkTextUtils::GetPath.", "workedInVersion": "2.88.9", "brokeInVersion": "3.119.0"}}, "analysis": {"summary": "SKFont.GetTextPath calls Skia's SkTextUtils::GetPath via sk_text_utils_get_path, which constructs a path by accumulating individual glyph outlines. Modern color emoji fonts like Segoe UI Emoji on Windows 11 use COLR (v1) or CBDT/CBLC bitmap formats rather than traditional vector outlines. Skia's SkFont::getPath() returns an empty result for such glyphs because there is no conventional outline to extract, resulting in an empty overall path. The regression claim from 2.88.9 is plausible given major Skia version changes between 2.88.x and 3.x SkiaSharp releases.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKFont.cs", "lines": "746-754", "finding": "GetTextPath (internal, void*) calls sk_text_utils_get_path which maps to Skia's SkTextUtils::GetPath. This function iterates over glyphs and calls SkFont::getPath() for each, returning an empty path for color/bitmap emoji glyphs (COLR, CBDT/CBLC) that have no traditional vector outline.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFont.cs", "lines": "712-722", "finding": "GetGlyphPath calls sk_font_get_path (SkFont::getPath) and returns null when the function returns false. This is the same underlying limitation as GetTextPath for color emoji. However, for COLR v0 fonts, individual layer outlines might be accessible via this method.", "relevance": "related"}], "keySignals": [{"text": "All works as expected, except for emoji characters", "source": "issue body", "interpretation": "The issue is specific to emoji glyphs, which use color/bitmap font formats without extractable outline paths via the standard Skia path API."}, {"text": "Last Known Good Version: 2.88.9 (Previous)", "source": "issue body", "interpretation": "Regression claim between SkiaSharp 2.88.9 and 3.119.0. This correlates with a major Skia upstream version bump that may have changed COLR emoji handling."}, {"text": "fontFamily = Segoe UI Emoji", "source": "issue body", "interpretation": "Segoe UI Emoji on Windows 11 uses COLR v1 format (vector glyphs with gradient/color layers). These glyphs may not expose outline paths the same way they did in older Skia builds."}], "rationale": "Classified as type/bug because the reporter explicitly claims a regression from 2.88.9 where the API previously returned a usable path and now returns empty. Area is area/SkiaSharp since the issue is in the SKFont.GetTextPath binding. Platform is os/Windows-Classic because Segoe UI Emoji is a Windows-specific font. tenet/compatibility applies due to the behavior change across major SkiaSharp versions. The root cause is likely in Skia's handling of color emoji glyphs, but investigation is needed to confirm the regression and identify a workaround.", "nextQuestions": ["Does SkiaSharp 2.88.9 actually return a non-empty path for Segoe UI Emoji, or is the regression claim incorrect?", "Which emoji glyph format does Segoe UI Emoji use on Windows 11 (COLR v0, COLR v1, CBDT/CBLC)?", "Does GetGlyphPath on individual glyph IDs from GetGlyphs return non-null paths for the emoji?", "Does the issue also reproduce with other emoji fonts such as Noto Color Emoji?"], "workarounds": ["Use a non-color emoji font with traditional vector outlines rather than COLR or bitmap formats. GetTextPath will produce proper paths from outline-based fonts.", "Render the emoji text to a bitmap SKSurface using DrawText or DrawShapedText, then process the rasterized output instead of vector path operations."], "resolution": {"hypothesis": "Emoji glyphs in color fonts (COLR v1/CBDT) do not expose traditional outline paths through SkTextUtils::GetPath. A Skia version change between 2.88.x and 3.x may have altered how COLR emoji path extraction behaves.", "proposals": [{"title": "Try GetGlyphPath on individual emoji glyph IDs", "description": "Use GetGlyphs to convert emoji text to glyph IDs, then GetGlyphPath on each glyph ID. For COLR v0 fonts, the component outline paths may still be accessible even if GetTextPath returns empty.", "category": "workaround", "codeSnippet": "var glyphs = fontTest.GetGlyphs(text);\nvar glyphPositions = fontTest.GetGlyphPositions(glyphs, new SKPoint(0, 0));\nusing var combinedPath = new SKPath();\nfor (int i = 0; i < glyphs.Length; i++) {\n    using var glyphPath = fontTest.GetGlyphPath(glyphs[i]);\n    if (glyphPath != null) {\n        var offset = SKMatrix.CreateTranslation(glyphPositions[i].X, glyphPositions[i].Y);\n        combinedPath.AddPath(glyphPath, in offset);\n    }\n}\n// Note: returns null for CBDT/CBLC bitmap emoji. Results vary for COLR emoji.", "confidence": 0.5, "effort": "cost/xs", "validated": "untested"}, {"title": "Render emoji to bitmap surface instead of path", "description": "For color emoji processing, render the text to an SKSurface and work with the resulting bitmap rather than attempting path extraction.", "category": "alternative", "confidence": 0.8, "effort": "cost/s", "validated": "untested"}, {"title": "Investigate COLR emoji path regression in Skia upgrade", "description": "Compare Skia's SkTextUtils::GetPath and SkFont::getPath COLR behavior between the Skia milestone used in SkiaSharp 2.88.9 vs 3.119.0 to confirm or refute the regression.", "category": "investigation", "confidence": 0.75, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Try GetGlyphPath on individual emoji glyph IDs", "recommendedReason": "Simple to test first. If it works for the reporter's Segoe UI Emoji COLR font, it provides an immediate workaround. If also empty, it confirms the limitation is fundamental to Skia color emoji path extraction, guiding the fix direction."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Regression claim from 2.88.9 to 3.119.0 with code reproduction steps. Root cause (color emoji font path handling in Skia) needs verification and the GetGlyphPath workaround needs confirmation.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply bug, SkiaSharp area, Windows platform, and compatibility tenet labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "tenet/compatibility"]}, {"type": "add-comment", "description": "Post analysis of color emoji path limitation with workaround suggestions", "risk": "medium", "confidence": 0.75, "comment": "Thanks for the detailed report!\n\nThe empty path for emoji is likely related to how modern emoji fonts store glyph data. **Segoe UI Emoji** on Windows 11 uses **COLR** (color-layered vector) format rather than traditional outline paths. Skia's `GetTextPath` (via `SkTextUtils::GetPath`) extracts glyph outlines — for COLR or bitmap (CBDT/CBLC) emoji glyphs, there may be no conventional outline to extract, resulting in an empty path.\n\nWhile we investigate the reported regression from 2.88.9, please try these workarounds:\n\n**Option 1 — Use GetGlyphPath on individual glyph IDs:**\n```csharp\nvar glyphs = fontTest.GetGlyphs(text);\nvar glyphPositions = fontTest.GetGlyphPositions(glyphs, new SKPoint(0, 0));\nusing var combinedPath = new SKPath();\nfor (int i = 0; i < glyphs.Length; i++) {\n    using var glyphPath = fontTest.GetGlyphPath(glyphs[i]);\n    if (glyphPath != null) {\n        var offset = SKMatrix.CreateTranslation(glyphPositions[i].X, glyphPositions[i].Y);\n        combinedPath.AddPath(glyphPath, in offset);\n    }\n}\n```\n*Note: Results depend on the COLR format version used by the font. This may also return empty for pure bitmap emoji glyphs.*\n\n**Option 2 — Render to bitmap surface:**\nFor processing emoji appearance, render to a temporary `SKSurface` with `DrawText`/`DrawShapedText` and work with the rasterized bitmap output.\n\nCould you confirm: does `GetGlyphPath` on the individual glyph IDs from `fontTest.GetGlyphs(\"\\uD83D\\uDE0A\")` return a non-null path? That would help determine whether this is a `GetTextPath`-specific issue or a deeper Skia limitation with COLR emoji on Windows 11."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
