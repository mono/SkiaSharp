<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1870, "repo": "mono/SkiaSharp", "analyzedAt": "2026-06-24T05:35:00Z"}, "summary": "SKCanvas rotation (RotateDegrees) causes a ~10x performance regression on UWP (500ms vs 50ms) when drawing surfaces in PaintSurface, while iOS shows no penalty and Android shows only minor overhead, suggesting the UWP raster surface backend incurs high software interpolation cost for non-axis-aligned transforms.", "classification": {"type": {"value": "type/bug", "confidence": 0.88}, "area": {"value": "area/SkiaSharp.Views", "confidence": 0.85}, "platforms": ["os/Windows-Universal-UWP"], "tenets": ["tenet/performance"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "performance", "reproQuality": "partial", "targetFrameworks": ["uap10.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a UWP app with SKXamlCanvas using PaintSurface", "In PaintSurface, call canvas.RotateDegrees with any non-zero angle that is not a multiple of 360", "Draw one or more SKSurface objects onto the canvas using DrawSurface", "Measure elapsed time for the PaintSurface callback"], "environmentDetails": "Visual Studio 2019 16.11.3, UWP, Xamarin.iOS 14.20.0.25, Xamarin.Android 11.4.0.5", "relatedIssues": [758], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/758", "description": "Prior related report: SKCanvas rendering rotated image very slow compared to System.Drawing (closed milestone 1.68.1)"}]}, "versionAnalysis": {"mentionedVersions": [], "currentRelevance": "likely", "relevanceReason": "No SkiaSharp version specified, but UWP raster rendering path via WriteableBitmap has not changed substantially. The root cause (software rendering for rotation) is architectural."}}, "analysis": {"summary": "On UWP, SKXamlCanvas uses a WriteableBitmap-backed raster surface (CPU rendering). Applying RotateDegrees forces Skia to use software anti-aliased interpolation for every draw call, creating a ~10x CPU overhead. On iOS (Metal GPU) and Android (GPU-accelerated), transforms are applied cheaply in hardware, explaining the platform gap.", "rationale": "The 10x slowdown with any non-zero rotation specifically on UWP, with no penalty on iOS and minor penalty on Android, points directly to the software raster rendering path used by SKXamlCanvas. The UWP view creates its surface as a CPU-backed raster surface (SKSurface.Create with raw pixel pointer from WriteableBitmap), so all transforms including rotation must be applied in software. The related #758 was about general rotation slowness fixed by switching to Clang; this is a distinct architectural issue with the UWP canvas backend.", "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/SKXamlCanvas.cs", "lines": "195-206", "finding": "DoInvalidate() creates surface as SKSurface.Create(info, pixels, info.RowBytes) — a CPU-backed raster surface using raw pixel pointer from WriteableBitmap. No GPU context is used. All draw operations including rotation happen in software.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKCanvas.cs", "lines": "224-230", "finding": "RotateDegrees calls sk_canvas_rotate_degrees — sets a rotation transform on the canvas. For a raster (CPU) canvas, subsequent DrawSurface calls must apply this transform in software with interpolation, which is expensive for arbitrary angles.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/SKSwapChainPanel.cs", "lines": "1-50", "finding": "SKSwapChainPanel uses ANGLE (OpenGL ES) for GPU-accelerated rendering via GRGlInterface/GRContext. Rotation transforms would be applied on the GPU, avoiding the software interpolation cost.", "relevance": "related"}], "keySignals": [{"text": "500ms with Rotation != 0, and 50ms with no Rotation on UWP", "source": "issue body", "interpretation": "10x slowdown from rotation exclusively on UWP — strong signal of software rendering path being the bottleneck."}, {"text": "With Android 100ms with and 70ms without, with iOS no difference, 70ms with or without rotation", "source": "issue body", "interpretation": "iOS shows zero penalty (GPU handles transform), Android shows small penalty (partial GPU), UWP shows massive penalty (full software CPU path)."}, {"text": "I'm following up https://github.com/mono/SkiaSharp/issues/758 — The issue is closed, but I dont know, if it was fixed or if there is a workaround", "source": "issue body", "interpretation": "Reporter is aware of #758 (fixed in 1.68.1 via Clang switch) but is seeing a different UWP-specific performance gap that persists."}], "nextQuestions": ["What SkiaSharp version is the reporter using? The fix in #758 (Clang) may or may not apply.", "Does using SKSwapChainPanel (GPU) instead of SKXamlCanvas (raster) resolve the performance issue on UWP?", "Is the async/await timing approach accurate — could the 500ms include I/O or scheduling overhead from `await l.ViewHasChanged()`?", "What surface type do the layer surfaces (l.Surface) use? If they are raster surfaces, DrawSurface at a rotated angle requires software pixel interpolation."], "workarounds": ["Use SKSwapChainPanel (GPU-accelerated ANGLE/OpenGL backend) instead of SKXamlCanvas (raster/CPU) on UWP. SKSwapChainPanel handles transforms on the GPU and will not have this penalty.", "If using SKXamlCanvas is required, reduce filter quality (SKFilterQuality.Low or None) — this was noted in #758 to restore performance at the cost of visual quality.", "Pre-rotate the layer surfaces before rendering so that the final DrawSurface call does not need an active rotation transform on the canvas."], "resolution": {"hypothesis": "SKXamlCanvas uses CPU raster rendering on UWP. Any non-axis-aligned transform (rotation != 0 or 90/180/270) forces software pixel interpolation for every DrawSurface call, causing a 10x throughput drop. Switching to the GPU-backed SKSwapChainPanel should eliminate this penalty.", "proposals": [{"title": "Switch to SKSwapChainPanel for GPU rendering", "description": "Use SKSwapChainPanel instead of SKXamlCanvas in the UWP app. It uses ANGLE/OpenGL which handles rotation transforms on the GPU with no CPU interpolation overhead.", "category": "workaround", "confidence": 0.85, "effort": "cost/s", "validated": "untested"}, {"title": "Reduce filter quality for rotation-heavy use cases", "description": "Set paint filter quality to Low or None when drawing surfaces that will be rotation-transformed. This trades visual quality for performance and was confirmed effective in related issue #758.", "category": "workaround", "confidence": 0.8, "effort": "cost/xs", "validated": "untested"}, {"title": "Investigate GPU-backed SKXamlCanvas option", "description": "Evaluate adding an optional GPU-backed rendering path to SKXamlCanvas on UWP (using DirectX/ANGLE) so users don't have to switch to SKSwapChainPanel for performance.", "category": "investigation", "confidence": 0.55, "effort": "cost/xl", "validated": "untested"}], "recommendedProposal": "Switch to SKSwapChainPanel for GPU rendering", "recommendedReason": "Most direct fix with clear API path — SKSwapChainPanel already provides GPU-accelerated rendering on UWP. No SkiaSharp code changes needed."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.8, "reason": "Real performance regression with partial repro code on UWP. Architectural root cause (raster CPU vs GPU rendering) is identified, but the reporter should confirm their SkiaSharp version and validate whether SKSwapChainPanel resolves the issue.", "suggestedReproPlatform": "windows"}, "missingInfo": ["SkiaSharp NuGet package version being used", "Whether the timing also includes the async layer update (await l.ViewHasChanged) overhead or just the canvas drawing", "Whether the same performance regression occurs with a minimal repro without the async pattern"], "actions": [{"type": "update-labels", "description": "Apply bug, views, UWP, and performance tenet labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp.Views", "os/Windows-Universal-UWP", "tenet/performance"]}, {"type": "add-comment", "description": "Suggest SKSwapChainPanel workaround and ask for version info", "risk": "medium", "confidence": 0.8, "comment": "Thanks for the detailed timing measurements and platform comparison!\n\nThe performance difference you're seeing is likely due to how the UWP canvas is implemented. `SKXamlCanvas` uses a CPU-backed raster surface (renders into a `WriteableBitmap` using software). When `RotateDegrees` is applied with a non-axis-aligned angle, Skia must interpolate every pixel in software for each `DrawSurface` call — this is much more expensive than a plain copy (no rotation).\n\nOn iOS, Metal (GPU) handles the rotation transform for free. On Android, the smaller overhead suggests partial GPU involvement. On UWP raster, the full cost is paid in CPU cycles.\n\n**Workaround:** Try `SKSwapChainPanel` instead of `SKXamlCanvas` on UWP. It uses ANGLE/OpenGL for GPU-accelerated rendering and should handle rotation without this penalty.\n\nAlso:\n- Could you share which SkiaSharp NuGet version you're using?\n- Does the timing include the `await l.ViewHasChanged(...)` call, or only the canvas drawing portion? Separating the two would help isolate whether the 500ms is purely from the canvas operations.\n- Related: #758 tracked general rotation slowness and was addressed in 1.68.1 (Clang compilation). If you're on an older version, upgrading may help somewhat, but the architectural CPU/GPU difference for UWP is a separate concern."}, {"type": "link-related", "description": "Link to prior rotation performance issue #758", "risk": "low", "confidence": 0.95, "linkedIssue": 758}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
