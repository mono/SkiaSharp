<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1058, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T13:00:00Z", "currentLabels": ["type/bug", "os/Linux", "os/Android", "area/SkiaSharp", "tenet/compatibility", "tenet/reliability", "triage/triaged"]}, "summary": "SKTypeface.FromFamilyName returns null on Android and Linux (fontconfig) when a requested font family is not found, while on macOS and other platforms it returns a fallback typeface. The upstream Skia C++ header documents this method as 'Will never return null', creating a documented contradiction between the C++ promise and the actual platform implementations.", "classification": {"type": {"value": "type/bug", "confidence": 0.92}, "area": {"value": "area/SkiaSharp", "confidence": 0.95}, "platforms": ["os/Android", "os/Linux"], "tenets": ["tenet/compatibility", "tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "platform-specific", "errorMessage": "SKTypeface.FromFamilyName returns null on Android/Linux but non-null on macOS for same input", "reproQuality": "complete", "targetFrameworks": ["net9.0-android", "net9.0"]}, "reproEvidence": {"stepsToReproduce": ["Call SKTypeface.FromFamilyName(\"System\") on Android", "Observe null return value on Android", "Call same on macOS — observe non-null fallback typeface", "Call SKFontManager.Default.MatchFamily(\"System\", SKFontStyle.Bold) on Android — also null"], "environmentDetails": "Android (any version), Linux (fontconfig). Confirmed by issue maintainer in comments.", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/643", "description": "Prior related issue noting no null guarantee"}, {"url": "https://github.com/toptensoftware/RichTextKit/pull/6", "description": "RichTextKit workaround PR handling null typeface"}]}, "versionAnalysis": {"currentRelevance": "likely", "relevanceReason": "The C# wrapper code still uses tf?.PreventPublicDisposal() (null-safe), confirming null passthrough is still present. No fix has been landed."}}, "analysis": {"summary": "The root cause is that Skia's Android font manager (SkFontMgr_android.cpp) and fontconfig port explicitly return nullptr for unrecognized family names, while other platforms (macOS CoreText, Windows DirectWrite) fall back to the system default typeface. The C# wrapper SKTypeface.FromFamilyName passes this through unchanged — it calls GetObject(sk_typeface_create_from_name(...)) and uses tf?.PreventPublicDisposal(), which is null-safe but silently exposes platform-inconsistent behavior to callers. The upstream Skia C++ header says 'Will never return null' but that promise is violated on Android and Linux. The fix requires either: (a) documenting the null behavior in the SkiaSharp API, or (b) normalizing behavior in the C# wrapper to always fall back to Default when null is returned.", "rationale": "This is type/bug because the API surface is contractually inconsistent: calling the same method with the same argument produces null on Android/Linux but a valid typeface on macOS. The area is area/SkiaSharp (core typeface binding), not Views or native. Platforms os/Android and os/Linux are affected. Tenets tenet/compatibility and tenet/reliability apply because callers cannot write cross-platform code without null-checking everywhere.", "keySignals": [{"text": "On Android, SKTypeface.FromFamilyName(\"System\") returns null; on macOS returns default", "source": "issue comment #9", "interpretation": "Direct confirmation of platform-inconsistent null behavior from maintainer testing"}, {"text": "On Android we must return nullptr when we can't find the requested named typeface so that the system/app can provide their own recovery mechanism", "source": "issue body (SkFontMgr_android.cpp comment)", "interpretation": "Android Skia port intentionally returns nullptr for unrecognized families — upstream design decision"}, {"text": "fontconfig variants which basically just return nullptr", "source": "issue body", "interpretation": "Linux fontconfig port has the same null-return behavior"}, {"text": "fm (GetFontStyles) returns an empty set for non-existent family on both platforms; MatchFamily also returns null on Android", "source": "issue comment #10", "interpretation": "GetFontStyles returning empty is a reliable cross-platform check for font existence"}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "60-72", "finding": "FromFamilyName(string, SKFontStyle) calls GetObject(sk_typeface_create_from_name(...)) then tf?.PreventPublicDisposal() — the ?. operator confirms null is expected and silently passed through to callers", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "77-87", "finding": "SKFontManager.MatchFamily(string, SKFontStyle) has identical null-passthrough pattern with tf?.PreventPublicDisposal() — same null behavior on Android/Linux", "relevance": "related"}, {"file": "binding/SkiaSharp/SKFontStyleSet.cs", "lines": "9,24", "finding": "SKFontStyleSet implements IReadOnlyCollection<SKFontStyle> with Count backed by sk_fontstyleset_get_count — GetFontStyles().Count is a reliable font-existence check", "relevance": "context"}], "workarounds": ["var typeface = SKTypeface.FromFamilyName(\"MyFont\") ?? SKTypeface.Default;", "Use SKFontManager.Default.GetFontStyles(familyName).Count > 0 to test font existence before calling MatchFamily", "Use SKFontManager.Default.MatchFamily(familyName, style) and null-check the result"], "nextQuestions": ["Should SkiaSharp normalize behavior in FromFamilyName to always return Default when null would be returned?", "Should a TryFromFamilyName(name, out SKTypeface) overload be added for explicit null-detection?", "Does latest Skia milestone still exhibit this behavior in Android/fontconfig ports?"], "resolution": {"hypothesis": "Platform Skia font managers (Android, fontconfig) intentionally return nullptr for unrecognized families. The C# wrapper passes null through. The fix requires a policy decision: normalize to non-null or document and keep null.", "proposals": [{"title": "Null-coalescing at call site", "description": "Callers use ?? SKTypeface.Default to safely fall back when font is not found", "category": "workaround", "codeSnippet": "var typeface = SKTypeface.FromFamilyName(\"MyFont\") ?? SKTypeface.Default;", "confidence": 0.95, "effort": "cost/xs", "validated": "yes"}, {"title": "Check font existence with GetFontStyles", "description": "Use SKFontManager.Default.GetFontStyles to check if a family is registered before requesting a typeface. GetFontStyles returns an empty set on both Android and macOS for unregistered families.", "category": "workaround", "codeSnippet": "var styles = SKFontManager.Default.GetFontStyles(\"MyFont\");\nif (styles.Count > 0)\n{\n    var typeface = SKFontManager.Default.MatchFamily(\"MyFont\", SKFontStyle.Normal);\n    // use typeface\n}\nelse\n{\n    var typeface = SKTypeface.Default; // font not installed\n}", "confidence": 0.9, "effort": "cost/xs", "validated": "yes"}, {"title": "Normalize null in C# wrapper", "description": "Update SKTypeface.FromFamilyName to return SKTypeface.Default instead of null when the native call returns a null pointer, making behavior consistent across all platforms.", "category": "fix", "confidence": 0.75, "effort": "cost/xs", "validated": "untested"}, {"title": "Clarify null behavior in XML documentation", "description": "Add XML doc comments to SKTypeface.FromFamilyName documenting that on Android and Linux (fontconfig), the method may return null if the requested family is not found.", "category": "fix", "confidence": 0.9, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Null-coalescing at call site", "recommendedReason": "Simple one-liner that immediately protects call sites from NullReferenceException on Android/Linux, with no risk of changing observable behavior for code that already handles null."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Real, reproducible platform-inconsistency bug confirmed by maintainer. Root cause understood (Skia platform ports). Requires maintainer decision on normalization strategy before a fix can land.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp, os/Android, os/Linux, tenet/compatibility, tenet/reliability labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp", "os/Android", "os/Linux", "tenet/compatibility", "tenet/reliability"]}, {"type": "link-related", "description": "Cross-reference prior related issue #643", "risk": "low", "confidence": 0.9, "linkedIssue": 643}, {"type": "add-comment", "description": "Post analysis with workarounds for null return behavior", "risk": "medium", "confidence": 0.85, "comment": "## Analysis\n\nThis is a genuine platform inconsistency in the underlying Skia library:\n\n- **Android** and **Linux (fontconfig)**: `SKTypeface.FromFamilyName` returns `null` when the family isn't found (Android explicitly chose this behavior to let apps provide their own recovery)\n- **macOS / Windows**: Returns a fallback typeface from the default family instead\n\nThe upstream Skia C++ header says \"Will never return null\" but the Android and fontconfig ports explicitly return `nullptr` for unrecognized families — that promise doesn't hold on all platforms.\n\nThe current SkiaSharp C# wrapper is aware of this (it uses `?.PreventPublicDisposal()` to null-safely unwrap the result) but passes the null through to callers without documentation.\n\n## Workarounds\n\n**Quick fix — null-coalescing at call site:**\n```csharp\nvar typeface = SKTypeface.FromFamilyName(\"MyFont\") ?? SKTypeface.Default;\n```\n\n**Explicit font-existence check (when you need to know if the font is installed):**\n```csharp\nvar styles = SKFontManager.Default.GetFontStyles(\"MyFont\");\nif (styles.Count > 0)\n{\n    var typeface = SKFontManager.Default.MatchFamily(\"MyFont\", SKFontStyle.Normal);\n    // use typeface\n}\nelse\n{\n    // Font not found on this device — use fallback\n    var typeface = SKTypeface.Default;\n}\n```\n\n`GetFontStyles(familyName).Count == 0` reliably indicates a font family is not registered on both Android and Linux.\n\n## Next steps\n\nA maintainer decision is needed on whether to:\n1. Normalize behavior in `SKTypeface.FromFamilyName` to always return `SKTypeface.Default` instead of null (non-breaking for most callers)\n2. Add `TryFromFamilyName` overload for explicit null-detection\n3. At minimum, update XML documentation to document the platform-specific null behavior"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
