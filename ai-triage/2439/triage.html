<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2439, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-25T11:44:43Z"}, "summary": "SkiaSharp.NativeAssets.Win32 2.88.0 includes native DLLs as MSBuild Content items, causing NU5118/NU5100 errors when GeneratePackageOnBuild=true is set in a project that references SkiaSharp.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/Build", "confidence": 0.92}, "platforms": ["os/Windows-Classic"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "build-error", "errorMessage": "NU5118: File 'libSkiaSharp.dll' is not added because the package already contains file 'content\\libSkiaSharp.dll'", "reproQuality": "complete", "targetFrameworks": ["net472", "net6.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a .NET 6 or net472 project referencing SkiaSharp 2.88.0 (and HarfBuzzSharp)", "Add <GeneratePackageOnBuild>true</GeneratePackageOnBuild> to the csproj", "Build the project", "Observe 24 NU5118/NU5100 MSBuild errors"], "environmentDetails": "Visual Studio 2022 17.4, .NET SDK 6.0.407, Windows, SkiaSharp 2.88.0", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/2439", "description": "Original issue report"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.0", "2.88.6"], "currentRelevance": "unlikely", "relevanceReason": "The current main branch targets file for SkiaSharp.NativeAssets.Win32 already uses <None> instead of <Content>, which is exactly the fix the reporter suggested. December 2023 comment still reports issue with 2.88.6, suggesting the fix is in main but not yet released in a 2.88.x patch."}, "fixStatus": {"likelyFixed": true, "confidence": 0.8, "reason": "The current binding/SkiaSharp.NativeAssets.Win32/buildTransitive/net4/SkiaSharp.targets and HarfBuzzSharp.NativeAssets.Win32 equivalent already use <None> instead of <Content> for native DLL items — exactly the fix suggested in the issue. The Pack attribute is not set, but <None> items are not included in NuGet packages by default, which resolves the NU5118 conflict."}}, "analysis": {"summary": "The SkiaSharp.NativeAssets.Win32 2.88.0 package shipped build targets that include native DLLs as MSBuild <Content> items. When NuGet pack runs (GeneratePackageOnBuild=true), it picks up these content items and generates NU5118 (duplicate file) and NU5100 (not in lib/) errors. The current source code already uses <None> instead of <Content>, which is the correct fix — <None> items are copied to output but not included in NuGet packages.", "rationale": "This is clearly a build-system bug: the 2.88.0 targets file incorrectly used <Content> which NuGet pack includes, while the correct approach is <None> which only affects build output. The fix is already present in main. The bug affects any Windows .NET/net4x project that references SkiaSharp and packs a NuGet package. Multiple reporters confirm the issue (at least 3 users affected). Workaround exists via property flags.", "codeInvestigation": [{"file": "binding/SkiaSharp.NativeAssets.Win32/buildTransitive/net4/SkiaSharp.targets", "lines": "22-27", "finding": "Current code uses <None Include=\"@(_NativeSkiaSharpFile)\"> with CopyToOutputDirectory=PreserveNewest. This is the fixed form — <None> items are not packaged by NuGet. The 2.88.0 package shipped with <Content> instead, which NuGet pack includes, causing NU5118 duplicate and NU5100 non-lib placement errors.", "relevance": "direct"}, {"file": "binding/HarfBuzzSharp.NativeAssets.Win32/buildTransitive/net4/HarfBuzzSharp.targets", "lines": "22-27", "finding": "Same pattern as SkiaSharp targets: uses <None> in current code. Both SkiaSharp and HarfBuzz Win32 native asset packages had the same <Content> vs <None> issue in 2.88.0, confirming both were fixed together.", "relevance": "direct"}], "keySignals": [{"text": "NU5118: File 'libSkiaSharp.dll' is not added because the package already contains file 'content\\libSkiaSharp.dll'", "source": "issue body", "interpretation": "NuGet pack is collecting the <Content> items from SkiaSharp.NativeAssets.Win32's build targets and trying to include them in the consumer's package — once from content/ (old-style) and once from the runtimes/ path."}, {"text": "ShouldIncludeNativeSkiaSharp=False / ShouldIncludeNativeHarfBuzzSharp=False", "source": "issue body workaround", "interpretation": "The targets file has a guard property. Setting it to False skips the entire ItemGroup, preventing the Content/None items from being added at all. This stops the pack errors but also prevents the native DLLs from being copied to output on the developer machine."}, {"text": "I have added the following code to Directory.Build.targets: <Content Update=\"@(_NativeSkiaSharpFile)\"><Pack>False</Pack></Content>", "source": "comment by SimonWeinbergerEnscape", "interpretation": "A more targeted workaround that keeps native DLLs in the output directory while excluding them from pack. This is needed when ShouldIncludeNativeSkiaSharp=False is not acceptable (because the native DLLs are needed at runtime)."}, {"text": "This problem still occurs when building NuGet-Packages. I'm using version 2.88.6.", "source": "comment by SebastianSchumann (Dec 2023)", "interpretation": "Confirms the fix was not shipped in the 2.88.x patch series. The fix in main (using <None>) has not been published as a 2.88.x update."}], "workarounds": ["Set <ShouldIncludeNativeSkiaSharp>False</ShouldIncludeNativeSkiaSharp> and <ShouldIncludeNativeHarfBuzzSharp>False</ShouldIncludeNativeHarfBuzzSharp> in your csproj (note: this also prevents native DLLs from being copied to output directory, so the app must be run from an install that has the runtime package)", "Add to Directory.Build.targets: <Content Update=\"@(_NativeSkiaSharpFile)\"><Pack>False</Pack></Content> (keeps native DLLs in output, excludes from pack)", "Upgrade to SkiaSharp 3.x which uses <None> items and does not have this issue"], "resolution": {"hypothesis": "The 2.88.0 (and subsequent 2.88.x) packages shipped targets that use <Content> for native DLLs, which NuGet pack collects into the consumer's package. The main branch already has the fix (<None> instead of <Content>). The issue is fixed in unreleased code.", "proposals": [{"title": "Immediate: Use Pack=False workaround in Directory.Build.targets", "description": "Add a Content Update item to set Pack=False on the native SkiaSharp files. This keeps the DLLs in the output directory for local development and testing, but excludes them from NuGet pack.", "category": "workaround", "codeSnippet": "<ItemGroup>\n  <Content Update=\"@(_NativeSkiaSharpFile)\">\n    <Pack>False</Pack>\n  </Content>\n  <Content Update=\"@(_NativeHarfBuzzSharpFile)\">\n    <Pack>False</Pack>\n  </Content>\n</ItemGroup>", "confidence": 0.85, "effort": "cost/xs", "validated": "yes"}, {"title": "Upgrade to SkiaSharp 3.x", "description": "The main branch (targeting SkiaSharp 3.x releases) already uses <None> for native assets, which resolves the issue permanently. Upgrading to a 3.x release will fix this without workarounds.", "category": "fix", "confidence": 0.9, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Immediate: Use Pack=False workaround in Directory.Build.targets", "recommendedReason": "Provides the minimal-impact fix for users still on 2.88.x: keeps native DLLs available locally while excluding them from the NuGet package being built. The upgrade to 3.x is the permanent fix."}}, "output": {"actionability": {"suggestedAction": "close-as-fixed", "confidence": 0.72, "reason": "The fix (using <None> instead of <Content> in Win32 native asset build targets) is already present in the current main branch code. Users on 2.88.x have confirmed workarounds. The issue is effectively resolved in newer releases.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/Build, os/Windows-Classic, tenet/compatibility labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/Build", "os/Windows-Classic", "tenet/compatibility"]}, {"type": "add-comment", "description": "Inform reporter of fix in current code and provide workarounds for 2.88.x", "risk": "medium", "confidence": 0.8, "comment": "Thanks for the detailed report! This issue is caused by the `SkiaSharp.NativeAssets.Win32` (and `HarfBuzzSharp.NativeAssets.Win32`) build targets in the 2.88.0 package using `<Content>` items for native DLLs. NuGet pack collects `<Content>` items into the consumer's package, leading to the NU5118/NU5100 errors.\n\nThe fix (using `<None>` instead of `<Content>`) is already present in the current source code and will ship in a future release.\n\n**Workarounds for SkiaSharp 2.88.x:**\n\n**Option 1** — Add `Pack=False` to the native content items in `Directory.Build.targets` (keeps native DLLs in output directory for local use):\n```xml\n<ItemGroup>\n  <Content Update=\"@(_NativeSkiaSharpFile)\">\n    <Pack>False</Pack>\n  </Content>\n  <Content Update=\"@(_NativeHarfBuzzSharpFile)\">\n    <Pack>False</Pack>\n  </Content>\n</ItemGroup>\n```\n\n**Option 2** — Disable native asset inclusion entirely (if you only need to produce a NuGet package and run from a runtime-installed environment):\n```xml\n<ShouldIncludeNativeSkiaSharp>False</ShouldIncludeNativeSkiaSharp>\n<ShouldIncludeNativeHarfBuzzSharp>False</ShouldIncludeNativeHarfBuzzSharp>\n```\n\n**Permanent fix** — Upgrade to SkiaSharp 3.x where this is resolved."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
