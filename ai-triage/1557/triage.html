<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1557, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-29T12:58:52Z"}, "summary": "iOS native linker fails with MT5214 (undefined symbols: _hb_feature_to_string and others) when using SkiaSharp.HarfBuzz 2.80.2 / HarfBuzzSharp 2.6.17; downgrading to 1.x resolves the error.", "classification": {"type": {"value": "type/bug", "confidence": 0.9}, "area": {"value": "area/libHarfBuzzSharp.native", "confidence": 0.88}, "platforms": ["os/iOS"], "tenets": ["tenet/reliability", "tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": true, "errorType": "build-error", "errorMessage": "MTOUCH: error MT5214: Native linking failed, undefined symbol: _hb_feature_to_string", "reproQuality": "partial", "targetFrameworks": ["xamarinios"]}, "reproEvidence": {"stepsToReproduce": ["Create a cross-platform (iOS/Android) Xamarin project", "Reference a multiplatform library that depends on SkiaSharp.HarfBuzz 2.80.2 / HarfBuzzSharp 2.6.17", "Build the iOS app target", "Observe MT5214 native linking errors for multiple _hb_* symbols"], "environmentDetails": "Visual Studio for Mac 8.8.3, Mono 6.12.0.107, Xamarin.iOS 14.6.0.15, SkiaSharp.HarfBuzz 2.80.2, HarfBuzzSharp 2.6.17"}, "versionAnalysis": {"mentionedVersions": ["2.80.2", "2.6.17", "1.68.0", "1.4.6.2"], "workedIn": "1.68.0 / HarfBuzzSharp 1.4.6.2", "brokeIn": "2.80.2 / HarfBuzzSharp 2.6.17", "currentRelevance": "unknown", "relevanceReason": "Issue filed in 2020 against a 2.x version; the codebase has since moved to 3.x with significant HarfBuzz rebinding. No explicit fix commit or maintainer confirmation found."}, "regression": {"isRegression": true, "confidence": 0.85, "reason": "Working in version 1.68.0/1.4.6.2 and failing in 2.80.2/2.6.17 on identical project.", "workedInVersion": "HarfBuzzSharp 1.4.6.2", "brokeInVersion": "HarfBuzzSharp 2.6.17"}}, "analysis": {"summary": "The iOS native library libHarfBuzzSharp.framework shipped with HarfBuzzSharp 2.6.17 does not export all the HarfBuzz C symbols (e.g. hb_feature_to_string) that the corresponding managed bindings reference via P/Invoke, causing Xamarin.iOS's native linker to fail at build time. The 1.x native library matched its older binding surface; the 2.x binding added new symbols that were not exported from the rebuilt framework.", "rationale": "The error is a native linker error (MT5214), not a runtime DllNotFoundException, confirming the library IS being found but is missing specific symbols. All failing symbols start with _hb and are called from HarfBuzzSharp.HarfBuzzApi — the generated P/Invoke class. Code inspection shows hb_feature_to_string is used in Feature.ToString() and is declared in HarfBuzzApi.generated.cs as an extern P/Invoke. The iOS framework path is @rpath/libHarfBuzzSharp.framework/libHarfBuzzSharp, and the native header in native/ios is empty — no explicit export list.", "codeInvestigation": [{"file": "binding/HarfBuzzSharp/HarfBuzzApi.cs", "lines": "9-10", "finding": "iOS/tvOS uses @rpath/libHarfBuzzSharp.framework/libHarfBuzzSharp as the native library path — framework must be linked into the app and export all referenced _hb_* symbols.", "relevance": "direct"}, {"file": "binding/HarfBuzzSharp/Feature.cs", "lines": "51-58", "finding": "Feature.ToString() calls HarfBuzzApi.hb_feature_to_string() directly — this is one of the undefined symbols reported. If the native framework lacks this export the iOS linker will fail.", "relevance": "direct"}, {"file": "binding/HarfBuzzSharp/HarfBuzzApi.generated.cs", "finding": "hb_feature_to_string is declared as an extern DllImport (or delegate-based P/Invoke). The symbol MUST be exported by the native framework for the iOS static linker to resolve it at build time.", "relevance": "direct"}, {"file": "native/ios/libHarfBuzzSharp/libHarfBuzzSharp/libHarfBuzzSharp.h", "finding": "Header file is empty — no explicit public symbol export list. Whether the framework exports all required _hb_* symbols depends entirely on the build configuration used to compile the .a/framework.", "relevance": "related"}, {"file": "binding/HarfBuzzSharp.NativeAssets.iOS/HarfBuzzSharp.NativeAssets.iOS.csproj", "finding": "NativeAssets.iOS package bundles output/native/ios/libHarfBuzzSharp.framework. The framework must be present and correctly built for all symbols to resolve.", "relevance": "related"}], "keySignals": [{"text": "MTOUCH: error MT5214: Native linking failed, undefined symbol: _hb_feature_to_string", "source": "issue body", "interpretation": "Build-time linker failure — the .framework is found but missing symbol exports."}, {"text": "All the failed symbols begin with _hb and is from HarfBuzzSharp.HarfBuzzApi", "source": "issue body", "interpretation": "Systematic missing exports — not a single symbol but an entire set of new HarfBuzz APIs added in the 2.x binding."}, {"text": "I tried to downgrade pkg's version to 1.68.0(SkiaSharp.HarfBuzz)/1.4.6.2(HarfBuzzSharp), then it can build successfully.", "source": "issue body", "interpretation": "Clear regression: works in 1.x, fails in 2.x — confirms mismatch between new binding symbols and native library exports."}, {"text": "SkiaSharp.HarfBuzz pkg is used by a multiplatform library, and the library is referenced by the ios app project.", "source": "issue body", "interpretation": "Transitive reference chain — native assets must flow through to the app project for Xamarin.iOS linking to work."}, {"text": "The same on my side :/", "source": "comment by SeRgI1982", "interpretation": "Confirmed by a second user — not a project-specific misconfiguration."}], "workarounds": ["Downgrade to SkiaSharp.HarfBuzz 1.68.0 / HarfBuzzSharp 1.4.6.2 (confirmed working by reporter).", "Ensure HarfBuzzSharp.NativeAssets.iOS is explicitly referenced in the iOS app project (not just the library), as Xamarin.iOS requires native frameworks to be linked from the application project."], "nextQuestions": ["Is this still reproducible with current SkiaSharp 3.x on modern .NET iOS?", "Does explicitly adding HarfBuzzSharp.NativeAssets.iOS to the iOS app project resolve the error with 2.x?", "Are all _hb_* symbols that are P/Invoked in HarfBuzzApi.generated.cs present in the 2.x libHarfBuzzSharp.framework?"], "resolution": {"hypothesis": "The libHarfBuzzSharp.framework for iOS in HarfBuzzSharp 2.6.17 was not built/exported with all the new HarfBuzz symbols that were added to the 2.x C# bindings, causing build-time linker failures.", "proposals": [{"title": "Add HarfBuzzSharp.NativeAssets.iOS directly to the iOS app project", "description": "In Xamarin.iOS/MAUI, native frameworks from transitive dependencies may not always propagate to the app linker. Add HarfBuzzSharp.NativeAssets.iOS as a direct PackageReference in the iOS application (.csproj), not just in the library.", "category": "workaround", "confidence": 0.6, "effort": "cost/xs", "validated": "untested"}, {"title": "Verify and rebuild libHarfBuzzSharp.framework with full symbol exports", "description": "Audit the iOS Xcode project at native/ios/libHarfBuzzSharp to confirm all _hb_* symbols referenced in HarfBuzzApi.generated.cs are exported. Rebuild and publish a corrected 2.x native assets package if any are missing.", "category": "fix", "confidence": 0.8, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Add HarfBuzzSharp.NativeAssets.iOS directly to the iOS app project", "recommendedReason": "Quickest workaround to try that doesn't require a patch release. Matches the documented pattern for native assets in application vs library projects."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.78, "reason": "Real build failure confirmed by two users; root cause points to missing symbol exports in the 2.x iOS native framework. Needs verification in current 3.x versions before any close decision.", "suggestedReproPlatform": "macos"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/libHarfBuzzSharp.native, os/iOS, tenet/reliability, tenet/compatibility labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/libHarfBuzzSharp.native", "os/iOS", "tenet/reliability", "tenet/compatibility"]}, {"type": "add-comment", "description": "Ask reporter to verify with current versions and suggest the direct NativeAssets workaround", "risk": "medium", "confidence": 0.78, "comment": "Thanks for the report, and thanks to @SeRgI1982 for confirming.\n\nThis looks like the `libHarfBuzzSharp.framework` for iOS in HarfBuzzSharp 2.6.17 was not built with all the `hb_*` symbol exports that the 2.x managed bindings reference via P/Invoke. The 1.x native library matched its older, smaller binding surface; 2.x added new symbols (e.g. `hb_feature_to_string`) that the framework didn't export.\n\n**Workaround to try:**\nMake sure `HarfBuzzSharp.NativeAssets.iOS` is referenced **directly** in your iOS app project (`.csproj`), not only in the intermediate library. Native frameworks in Xamarin.iOS must be linked from the application project to be picked up by the static linker.\n\n```xml\n<!-- In your iOS app .csproj -->\n<PackageReference Include=\"HarfBuzzSharp.NativeAssets.iOS\" Version=\"2.6.17\" />\n```\n\nIf that doesn't help, downgrading to 1.68.0 / 1.4.6.2 remains the confirmed working path.\n\nCould you also check whether this is still reproducible with the latest SkiaSharp 3.x and modern `.NET iOS` TFM? That would help us determine whether a fix has already shipped."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
