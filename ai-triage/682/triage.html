<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 682, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-22T02:51:40Z", "currentLabels": ["type/enhancement", "type/feature-request", "os/Windows-Classic", "os/Windows-Universal-UWP", "area/SkiaSharp"]}, "summary": "SKTypeface.FromFamilyName(\"Arial Black\") returns Segoe UI on Windows because Skia uses DirectWrite, which groups 'Arial Black' as a weight variant under the 'Arial' typographic family rather than a separate family as GDI+ does.", "classification": {"type": {"value": "type/enhancement", "confidence": 0.88}, "area": {"value": "area/SkiaSharp", "confidence": 0.95}, "platforms": ["os/Windows-Classic", "os/Windows-Universal-UWP"], "tenets": ["tenet/compatibility"]}, "evidence": {"reproEvidence": {"codeSnippets": ["SKTypeface tf = SKTypeface.FromFamilyName(\"Arial Black\", SKFontStyleWeight.Bold, SKFontStyleWidth.Normal, SKFontStyleSlant.Upright);"], "stepsToReproduce": ["On Windows 10 (.NET Framework 4.7.2), call SKTypeface.FromFamilyName(\"Arial Black\", SKFontStyleWeight.Bold, SKFontStyleWidth.Normal, SKFontStyleSlant.Upright)", "Inspect the FamilyName of the returned SKTypeface", "Observe it returns 'Segoe UI' instead of 'Arial Black'"], "environmentDetails": "SkiaSharp 1.60.3, Windows 10 / Windows Server 2016, .NET Framework 4.7.2", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/682#issuecomment-438053141", "description": "Reporter workaround: map 'Arial Black' to ('Arial', SKFontStyleWeight.Black)"}, {"url": "https://github.com/mono/SkiaSharp/issues/682#issuecomment-441464324", "description": "Maintainer comment: technically Skia is correct but GDI+ compat issue needs investigation"}, {"url": "https://github.com/mono/SkiaSharp/issues/682#issuecomment-446129274", "description": "User request for SKTypeface.FromName API"}, {"url": "https://github.com/mono/SkiaSharp/issues/682#issuecomment-1695762942", "description": "Community-provided comprehensive lookup dictionary for Windows font names"}, {"url": "https://github.com/mono/SkiaSharp/issues/682#issuecomment-2342975483", "description": "Advanced workaround using SKFontManager.FontFamilies + OpenType name/STAT table parsing"}]}, "versionAnalysis": {"mentionedVersions": ["1.60.3"], "currentRelevance": "likely", "relevanceReason": "FromFamilyName delegates directly to sk_typeface_create_from_name which calls into Skia's native font matching; the DirectWrite typographic family grouping behavior has not changed."}}, "analysis": {"summary": "Skia's Windows font backend uses DirectWrite, which follows OpenType typographic family conventions. Under DirectWrite, 'Arial Black' is not an independent family — it is the Black weight variant of the 'Arial' family. GDI+ (System.Drawing) exposes it as a separate named family for legacy compatibility. FromFamilyName('Arial Black') fails because Skia asks DirectWrite for a family named 'Arial Black', which does not exist, so it falls back to the default (Segoe UI). The fix would be a compatibility shim in SkiaSharp that parses known GDI+ family name patterns (e.g., 'Arial Black' → family='Arial', weight=Black) before passing to the native API, or a new FromName helper that enumerates fonts by their GDI+ names.", "rationale": "The behavior is technically correct at the Skia/DirectWrite level. The requested enhancement is a GDI+ compatibility layer in SkiaSharp's C# wrapper. Multiple users have confirmed the workaround (use 'Arial' + SKFontStyleWeight.Black) but want SkiaSharp to handle the mapping automatically. The maintainer acknowledged this in 2018 and left it open for community discussion. The issue is clearly scoped to SkiaSharp's C# API layer, not Skia itself.", "keySignals": [{"text": "GDI+ handles font families differently — it uses different families for styles like narrow or black. DirectWrite or other frameworks just have one FontFamily 'Arial' and uses styles for all different combinations.", "source": "comment by Gillibald (contributor)", "interpretation": "Confirms the root cause: DirectWrite typographic family model vs GDI+ RBIS family model."}, {"text": "TECHNICALLY skia is right. But we are in the old world and it is unexpected. Google mentions that they have an extra layer over the font to read the prefix/suffix to read the weight and spacing.", "source": "comment by mattleibow (maintainer)", "interpretation": "Maintainer confirms by-design behavior but acknowledges the UX problem. Enhancement is needed in SkiaSharp."}, {"text": "My vote is to handle this in SkiaSharp so that the correct family and weight are chosen. Perhaps an additional API SKTypeface.FromName which can do this.", "source": "comment by sansjunk", "interpretation": "Community request for a dedicated API."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "60-72", "finding": "FromFamilyName(string, SKFontStyle) calls sk_typeface_create_from_name directly with the raw family name. No pre-processing or name-to-style mapping is performed. Passing 'Arial Black' goes straight to the native Skia/DirectWrite lookup.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "43-72", "finding": "SKFontManager exposes FontFamilies enumeration and GetFontStyles(familyName). These APIs can be used to enumerate fonts and build a name-to-(family,style) mapping at the C# layer as a compatibility shim, which is the approach suggested by community members.", "relevance": "related"}], "workarounds": ["Use SKTypeface.FromFamilyName(\"Arial\", SKFontStyleWeight.Black, SKFontStyleWidth.Normal, SKFontStyleSlant.Upright) instead of \"Arial Black\"", "Build a lookup dictionary mapping legacy GDI+ font names to (family, weight, width) tuples using SKFontManager.FontFamilies + SKFontManager.GetFontStyles", "Use SKFontManager.FontFamilies + TryGetTableData('name'/'STAT') to build a full GDI+ name cache as described in comment #2342975483"], "nextQuestions": ["Should a new SKTypeface.FromName() API be added that resolves GDI+ names to typographic family + style?", "Should a static helper/cache class be provided to build the mapping, or should FromFamilyName be patched to fall back to name-prefix parsing?", "Would this behavior also benefit non-Windows platforms (macOS CoreText, Linux fontconfig) that may have similar typographic family grouping?"], "resolution": {"hypothesis": "SkiaSharp needs a GDI+ compatibility layer that maps legacy family names containing weight/width keywords (e.g., 'Arial Black', 'Arial Narrow') to the correct typographic (family, weight, width) pair before calling the native font API.", "proposals": [{"title": "Use 'Arial' family name with Black weight", "description": "Pass the typographic family name ('Arial') with the correct weight (SKFontStyleWeight.Black) to FromFamilyName. This is the standard DirectWrite approach.", "category": "workaround", "codeSnippet": "SKTypeface tf = SKTypeface.FromFamilyName(\"Arial\", SKFontStyleWeight.Black, SKFontStyleWidth.Normal, SKFontStyleSlant.Upright);", "confidence": 0.95, "effort": "cost/xs", "validated": "yes"}, {"title": "Add SKTypeface.FromName() with GDI+ name resolution", "description": "Add a new public static method SKTypeface.FromName(string fullName) that enumerates all system fonts, reads their 'name' table entries, and matches by GDI+ family name. This would handle 'Arial Black', 'Arial Narrow', and similar legacy names transparently.", "category": "fix", "confidence": 0.75, "effort": "cost/l", "validated": "untested"}], "recommendedProposal": "Use 'Arial' family name with Black weight", "recommendedReason": "The workaround is trivial to apply now and produces correct results. The long-term API addition is a design decision for maintainers."}}, "output": {"actionability": {"suggestedAction": "keep-open", "confidence": 0.82, "reason": "Valid enhancement request with community support. Maintainer acknowledged the GDI+ compat gap in 2018. A workaround exists but multiple users want a first-class API. No implementation decision has been made. Keeping open for design discussion.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Correct labels: replace dual type labels with single type/enhancement, retain platform and area labels, add tenet/compatibility", "risk": "low", "confidence": 0.9, "labels": ["type/enhancement", "area/SkiaSharp", "os/Windows-Classic", "os/Windows-Universal-UWP", "tenet/compatibility"]}, {"type": "add-comment", "description": "Post workaround and context explaining the DirectWrite vs GDI+ naming difference", "risk": "medium", "confidence": 0.88, "comment": "Thanks for the detailed report!\n\nThis is a known difference between how **Skia/DirectWrite** and **GDI+** handle font families. Under DirectWrite (which Skia uses on Windows), *Arial Black* is not a separate font family — it is the **Black weight** of the *Arial* family. GDI+ exposes it as a distinct named family for legacy reasons.\n\n**Workaround** — use the typographic family name with the Black weight:\n\n```csharp\nSKTypeface tf = SKTypeface.FromFamilyName(\n    \"Arial\",\n    SKFontStyleWeight.Black,\n    SKFontStyleWidth.Normal,\n    SKFontStyleSlant.Upright);\n```\n\nSimilarly, `Arial Narrow` maps to `(\"Arial\", weight=Normal, width=Condensed)`.\n\nFor a comprehensive lookup of all Windows font name mappings, see the dictionary posted in [this comment](https://github.com/mono/SkiaSharp/issues/682#issuecomment-1695762942).\n\nWe're tracking whether to add a `SKTypeface.FromName()` API that handles these GDI+ name patterns automatically. If you'd find that useful, please add a 👍 to keep the discussion moving."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
