<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2359, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-26T14:34:22Z"}, "summary": "SKBitmap.Decode returns null (or fails) for specific images on Windows Classic when using SKManagedStream, with reporter citing issue #1621 as not yet fixed in version 2.88.3.", "classification": {"type": {"value": "type/bug", "confidence": 0.82}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "platforms": ["os/Windows-Classic"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "missing-output", "reproQuality": "partial", "targetFrameworks": ["net6.0-windows"]}, "reproEvidence": {"stepsToReproduce": ["Open specific image files with File.OpenRead", "Wrap in SKManagedStream", "Call SKBitmap.Decode(inputStream)", "Observe that return value is null (or exception) for certain images"], "codeSnippets": ["using (var input = File.OpenRead(imageFileName))\n{\n    using (SKManagedStream inputStream = new SKManagedStream(input))\n    {\n        skBitmap = SKBitmap.Decode(inputStream);\n    }\n}"], "environmentDetails": "Windows Classic 10, SkiaSharp 2.88.3, Visual Studio Code", "attachments": [{"url": "https://github.com/mono/SkiaSharp/files/10410128/images.zip", "filename": "images.zip", "description": "Sample images that fail to decode with SKBitmap.Decode"}], "relatedIssues": [1621, 1551], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/1621", "description": "Closed duplicate: SKBitmap.Decode fails for some images (fixed in v2.88.3 via PR #2265)"}, {"url": "https://github.com/mono/SkiaSharp/issues/1551", "description": "Root cause issue: SKManagedStream.OnReadManagedStream ArgumentNullException when buffer=IntPtr.Zero (fixed in v2.88.3)"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.3"], "currentRelevance": "unknown", "relevanceReason": "The fix for the null-buffer exception in SKManagedStream (issue #1551, #1621) was shipped in v2.88.3 via PR #2265. The current code contains the fix (buffer != IntPtr.Zero guard at line 85 of SKManagedStream.cs). The reporter uses 2.88.3 and claims the issue persists, but provides no actual error or stack trace. It is unclear if this is the same bug or a distinct decode failure."}, "fixStatus": {"likelyFixed": false, "confidence": 0.35, "reason": "PR #2265 addressed the ArgumentNullException in SKManagedStream for the same symptom (issues #1551/#1621, milestone v2.88.3), and the fix is present in current code. However, the reporter explicitly states the issue persists on 2.88.3, and sample images were attached. Without a stack trace or actual behavior description it is impossible to confirm whether this is the same code path or a separate decode failure.", "relatedPRs": [2265], "fixedInVersion": "2.88.3"}}, "analysis": {"summary": "Reporter claims SKBitmap.Decode silently fails (likely returns null) for certain images on Windows Classic using SkiaSharp 2.88.3. Related issues #1551 and #1621 describing an ArgumentNullException in SKManagedStream.OnReadManagedStream were fixed in v2.88.3 (PR #2265), and the fix is confirmed present in the current codebase. However, the reporter filed this after the fix was released and says the issue still occurs. The 'Actual Behavior' field in the report is empty, making it impossible to determine whether this is the same exception, a silent null return, or a different failure mode. The attached image zip may help diagnose image-specific characteristics triggering the failure.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKManagedStream.cs", "lines": "73-96", "finding": "OnReadManagedStream handles buffer==IntPtr.Zero since the fix in PR #2265 (line 85: 'if (buffer != IntPtr.Zero)'). Reads are performed into a temp buffer regardless, but the copy to native memory is skipped when buffer is null. This fix is present in the current codebase.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "487-498", "finding": "SKBitmap.Decode(SKStream stream) creates an SKCodec from the stream via SKCodec.Create(stream). If codec creation returns null (native decode failure), Decode returns null with no exception — silent null return.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKCodec.cs", "lines": "252-261", "finding": "SKCodec.Create(SKStream stream) delegates directly to native sk_codec_new_from_stream. If Skia native cannot identify the image format or rejects the file, it returns null, leading to SKBitmap.Decode returning null.", "relevance": "related"}, {"file": "binding/SkiaSharp/SKCodec.cs", "lines": "278-290", "finding": "WrapManagedStream wraps seekable streams in SKManagedStream and non-seekable in SKFrontBufferedManagedStream. File.OpenRead is always seekable, so SKManagedStream is used — consistent with the reporter's explicit wrapping.", "relevance": "context"}], "keySignals": [{"text": "Seems like https://github.com/mono/SkiaSharp/issues/1621 is not fixed yet. Is there a workaround to get past this?", "source": "comment by reporter (Himanshu4)", "interpretation": "Reporter assumes this is the same ArgumentNullException as #1621. Without a stack trace, this assumption cannot be confirmed."}, {"text": "[images.zip] These are some of the images which are failing for @Himanshu4", "source": "comment by deepakupretims", "interpretation": "Sample images attached. The specific images may have an unusual format, EXIF metadata, or encoding that native Skia cannot parse."}, {"text": "Actual Behavior: (empty section in issue body)", "source": "issue body", "interpretation": "The reporter did not fill in the actual behavior section. It is unknown whether SKBitmap.Decode returns null, throws an exception, or crashes. This is critical missing information."}, {"text": "Version with issue: 2.88.3", "source": "issue body", "interpretation": "The fix for #1551/#1621 shipped in milestone v2.88.3. If the reporter is truly on the released 2.88.3 build, the ArgumentNullException fix is present. Their images may expose a different failure path."}], "rationale": "Classified as type/bug in area/SkiaSharp because SKBitmap.Decode is a core decoding API and the reporter's images consistently fail. The area is SkiaSharp (not a view layer) because the issue is about image decoding. Severity is medium: only certain images fail, and a documented workaround (SKImage.FromEncodedData) exists. Suggested action is needs-info because the 'Actual Behavior' section is empty — the triage cannot determine if this is the same exception as #1551/#1621 (already fixed) or a different decode failure without a stack trace or error message.", "workarounds": ["Use SKImage.FromEncodedData(stream) + SKBitmap.FromImage(img) instead of SKBitmap.Decode (documented workaround from #1621)", "Read the file into a byte array first and call SKBitmap.Decode(byte[]) to avoid any streaming issues"], "nextQuestions": ["What is the actual behavior: does SKBitmap.Decode return null, throw an exception (ArgumentNullException or other), or crash?", "Can the reporter provide a stack trace if an exception is thrown?", "What are the characteristics of the failing images (JPEG, PNG, format, DPI, EXIF orientation)?", "Does the workaround SKImage.FromEncodedData(stream) then SKBitmap.FromImage(img) resolve the issue?"], "resolution": {"hypothesis": "The images likely have a specific encoding characteristic (e.g., EXIF orientation, high DPI metadata, CMYK color space, or unusual JPEG variant) that causes native Skia's codec to reject them. The #1621 fix addressed only the null-buffer exception; image-specific decode failures in native Skia are a separate issue.", "proposals": [{"title": "Use SKImage.FromEncodedData as workaround", "description": "Replace SKBitmap.Decode with SKImage.FromEncodedData + SKBitmap.FromImage. This was the documented workaround for #1621 and may bypass the decode path that fails.", "category": "workaround", "codeSnippet": "using var input = File. [{"type": "update-labels", "description": "Apply bug, SkiaSharp core, and Windows Classic labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "tenet/reliability"]}, {"type": "add-comment", "description": "Ask reporter for actual behavior, stack trace, and image characteristics. Provide known workaround.", "risk": "medium", "confidence": 0.82, "comment": "Thanks for the report and the sample images!\n\nThe related issue #1621 (and its root cause #1551) were fixed in v2.88.3 via PR #2265. The fix addressed an `ArgumentNullException` in `SKManagedStream.OnReadManagedStream` that occurred when Skia called the stream with a null buffer.\n\nTo help us determine whether you're hitting the same issue or a different one, could you provide:\n\n1. **Actual behavior** — does `SKBitmap.Decode` return `null`, throw an exception, or crash the app?\n2. **Stack trace** — if an exception is thrown, please share the full stack trace.\n3. **Image characteristics** — are the failing images JPEG, PNG, or another format? Do they have specific properties (high DPI, EXIF orientation, ICC profile)?\n\nIn the meantime, you can try these workarounds:\n\n```csharp\n// Workaround 1: Use SKImage.FromEncodedData instead\nusing var input = File.OpenRead(imageFileName);\nusing var skImage = SKImage.FromEncodedData(input);\nif (skImage != null)\n    skBitmap = SKBitmap.FromImage(skImage);\n\n// Workaround 2: Read to byte array first\nvar bytes = File.ReadAllBytes(imageFileName);\nskBitmap = SKBitmap.Decode(bytes);\n```"}, {"type": "link-related", "description": "Cross-reference closed root-cause issue #1551", "risk": "low", "confidence": 0.9, "linkedIssue": 1551}, {"type": "link-related", "description": "Cross-reference closed related issue #1621", "risk": "low", "confidence": 0.9, "linkedIssue": 1621}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
