<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2136, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-21T23:19:00Z"}, "summary": "Reporter gets 'Unable to allocate pixels for the bitmap' exception when decoding a 6004x3283px PNG image 21 times in a loop in Azure App Service (Linux), while the same code works on Windows; root cause is the decoded SKBitmap not being disposed, causing unmanaged memory to accumulate until allocation fails.", "classification": {"type": {"value": "type/bug", "confidence": 0.8}, "area": {"value": "area/SkiaSharp", "confidence": 0.92}, "platforms": ["os/Linux"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "exception", "errorMessage": "Unable to allocate pixels for the bitmap.", "stackTrace": "System.Exception: Unable to allocate pixels for the bitmap. at SkiaSharp.SKBitmap.Decode(SKCodec codec, SKImageInfo bitmapInfo) at SkiaSharp.SKBitmap.Decode(SKCodec codec) at SkiaSharp.SKBitmap.Decode(SKData data) at AzureAppSeviceLinux.Controllers.HomeController.DecodeImage(String button)", "reproQuality": "complete", "targetFrameworks": ["netcoreapp2.1"]}, "reproEvidence": {"stepsToReproduce": ["Open a PNG file into a MemoryStream", "Loop 21 times: create SKData from stream, call SKBitmap.Decode(skData), dispose SKData — but NOT the returned SKBitmap", "Each iteration allocates ~75MB of unmanaged pixel memory (6004 x 3283 x 4 bytes) that is never freed", "Deploy to Azure App Service (Linux P1v2)", "Observe exception on approximately iteration 10–15 when available memory is exhausted"], "codeSnippets": ["for (int i = 0; i <= 20; i++) { imageStream.Position = 0; SkiaSharp.SKData skData = SkiaSharp.SKData.Create(imageStream); SkiaSharp.SKBitmap.Decode(skData); /* bitmap NOT disposed */ skData.Dispose(); }"], "environmentDetails": "Azure App Service P1v2 (Linux), ASP.NET Core 2.1, SkiaSharp 2.88.0-preview.209, image: 6004 x 3283 px PNG", "attachments": [{"url": "https://github.com/mono/SkiaSharp/files/9019402/AzureAppSeviceLinux-543651564.zip", "filename": "AzureAppSeviceLinux-543651564.zip"}], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/928", "description": "Similar 'Unable to allocate pixels' on Linux server — closed as size limit issue"}, {"url": "https://github.com/mono/SkiaSharp/issues/1249", "description": "SKImage.FromEncodedData fails on very large image — closed duplicate, discusses Skia internal size limits"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.0-preview.209", "2.88.1-preview.79"], "workedIn": "2.88.1-preview.79", "brokeIn": "2.88.0-preview.209", "currentRelevance": "likely", "relevanceReason": "The underlying pattern (undisposed SKBitmap causing memory exhaustion in memory-limited environments) is not version-specific and would still manifest."}}, "analysis": {"summary": "The reporter's code calls SKBitmap.Decode(skData) in a 21-iteration loop but never stores or disposes the returned SKBitmap. Each decode of the 6004x3283 image allocates approximately 75MB of unmanaged native memory (~6004 * 3283 * 4 bytes). Without disposal, ~1.58GB of unmanaged memory accumulates before the GC can intervene. Azure App Service (Linux) enforces tighter memory limits than Windows, causing sk_bitmap_try_alloc_pixels to fail. The 'works on Windows' behavior is because Windows typically has more available virtual address space and the GC finalizers run sooner.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "513-524", "finding": "SKBitmap.Decode(SKData data) creates an SKCodec then delegates to Decode(codec). The returned SKBitmap contains fully allocated native pixel memory. The method documentation does not warn that the caller must dispose; this is easy to miss.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "446-459", "finding": "Decode(SKCodec codec, SKImageInfo bitmapInfo) allocates a new SKBitmap(bitmapInfo) which immediately calls TryAllocPixels — reserving the full native pixel buffer. If the caller does not dispose the returned object, this buffer leaks until GC runs the finalizer.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "52-58", "finding": "SKBitmap(SKImageInfo info, int rowBytes) constructor calls TryAllocPixels and throws System.Exception with 'Unable to allocate pixels for the bitmap.' when sk_bitmap_try_alloc_pixels returns false — exactly matching the reporter's stack trace.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "68-72", "finding": "SKBitmap disposes via DisposeNative() calling sk_bitmap_destructor. The GC finalizer will eventually call this but cannot guarantee timely reclamation of the large unmanaged buffer, especially under memory pressure.", "relevance": "related"}], "keySignals": [{"text": "SkiaSharp.SKBitmap.Decode(skData);", "source": "issue body code snippet", "interpretation": "Return value is discarded — the SKBitmap is never stored, used, or disposed. This is the primary leak."}, {"text": "Note: This code works properly in windows", "source": "issue body", "interpretation": "Windows has more available virtual memory; the GC finalizers run before hitting the limit. Linux in Azure App Service has tighter memory constraints."}, {"text": "What is the image dimensions? Usually that error means you have exceeded the int.maxvalue somehow.", "source": "comment by maintainer mattleibow", "interpretation": "Maintainer was checking for a Skia internal size limit overflow. At 6004x3283, byte count is ~75MB — well within int32 range, so the real cause is memory exhaustion from not disposing."}, {"text": "The image dimension was: 6004 x 3283px", "source": "comment by reporter", "interpretation": "Confirms approximately 75MB per bitmap. 21 iterations = ~1.58GB total unmanaged memory held without disposal."}], "rationale": "The exception is thrown by SkiaSharp's own allocation guard (TryAllocPixels returning false), not by a Skia internal limit overflow. The user's code pattern of calling SKBitmap.Decode() without disposing the result leaks native memory. The Azure App Service P1v2 plan and Linux process memory limits cause the failure before Windows does. This is a usage error, not a SkiaSharp defect — the API contract requires callers to dispose returned SKBitmap instances.", "workarounds": ["Dispose the SKBitmap returned by SKBitmap.Decode() using a 'using' statement or explicit Dispose() call after use.", "If only validating that an image can be decoded (no processing needed), use SKCodec.Create() to check the image info without allocating the full pixel buffer."], "nextQuestions": ["Is the real application code also missing disposal, or only this isolated repro?", "Does adding GC.Collect() between iterations resolve the issue (to confirm the GC/finalizer lag hypothesis)?", "What .NET version / Azure App Service stack is being used — is there any memory limit setting that could be adjusted?"], "resolution": {"hypothesis": "The root cause is the user not disposing the SKBitmap returned by SKBitmap.Decode(). Each iteration holds ~75MB of unmanaged native memory. On Azure App Service (Linux), this exhausts available memory after ~10-15 iterations, causing sk_bitmap_try_alloc_pixels to fail.", "proposals": [{"title": "Dispose SKBitmap after use", "description": "Wrap SKBitmap.Decode in a using statement so native pixel memory is freed immediately after each iteration rather than waiting for GC finalization.", "category": "workaround", "codeSnippet": "for (int i = 0; i <= 20; i++)\n{\n    imageStream.Position = 0;\n    using var skData = SKData.Create(imageStream);\n    using var bitmap = SKBitmap.Decode(skData);\n    // process bitmap here\n}", "confidence": 0.95, "effort": "cost/xs", "validated": "yes"}, {"title": "Use SKCodec to check decodability without full allocation", "description": "If the goal is simply to test that the image can be decoded (no actual pixel processing), use SKCodec.Create() to inspect image info without allocating the full pixel buffer.", "category": "alternative", "codeSnippet": "for (int i = 0; i <= 20; i++)\n{\n    imageStream.Position = 0;\n    using var skData = SKData.Create(imageStream);\n    using var codec = SKCodec.Create(skData);\n    if (codec == null)\n        throw new Exception(\"Failed to create codec\");\n    var info = codec.Info; // width, height, color type — no pixel allocation\n}", "confidence": 0.9, "effort": "cost/xs", "validated": "yes"}], "recommendedProposal": "Dispose SKBitmap after use", "recommendedReason": "Directly fixes the memory leak with minimal code change. Adding 'using' to both SKData and SKBitmap is idiomatic .NET and resolves the issue immediately."}}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.82, "reason": "The exception is caused by the user's code not disposing the SKBitmap returned by Decode(). The API contract requires callers to dispose IDisposable objects. SkiaSharp's behavior is correct. The difference between Windows and Linux is a memory availability difference, not a SkiaSharp defect. Workaround is straightforward: add 'using' statement.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, SkiaSharp core, and Linux labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp", "os/Linux", "tenet/reliability"]}, {"type": "add-comment", "description": "Explain root cause and provide workaround with correct disposal pattern", "risk": "high", "confidence": 0.82, "comment": "Thanks for the detailed report and reproduction sample!\n\nAfter investigating the code path, the root cause is that `SKBitmap.Decode()` returns a new `SKBitmap` object containing the full decoded pixel data, but the returned object is never stored or disposed in your loop:\n\n```csharp\n// ❌ Problem: returned SKBitmap is never disposed\nSkiaSharp.SKBitmap.Decode(skData);\n```\n\nEach decoded `SKBitmap` holds approximately **~75 MB of native unmanaged memory** (6004 × 3283 × 4 bytes). After 21 iterations, ~1.58 GB of native memory accumulates without being freed. The .NET GC cannot reclaim unmanaged memory fast enough under pressure, so `sk_bitmap_try_alloc_pixels` fails — producing the 'Unable to allocate pixels' exception.\n\nThe fix is to dispose the `SKBitmap` after use:\n\n```csharp\nfor (int i = 0; i <= 20; i++)\n{\n    imageStream.Position = 0;\n    using var skData = SKData.Create(imageStream);\n    using var bitmap = SKBitmap.Decode(skData);\n    // use bitmap here\n}\n```\n\n**Why it works on Windows:** Windows typically has more available virtual address space, so the GC finalizers run before the limit is hit. Azure App Service (Linux) enforces tighter process memory limits, causing the failure first.\n\nIf you only need to verify the image can be decoded without processing all pixels, `SKCodec.Create()` is lighter:\n\n```csharp\nusing var skData = SKData.Create(imageStream);\nusing var codec = SKCodec.Create(skData);\nvar info = codec?.Info; // dimensions, color type — no pixel buffer allocated\n```\n\nThis is a usage issue rather than a SkiaSharp defect — `SKBitmap` implements `IDisposable` and callers must dispose returned instances. Closing as not a bug, but please reopen if you're seeing this with proper disposal in place."}, {"type": "close-issue", "description": "Close as not a bug — usage error confirmed; workaround provided", "risk": "medium", "confidence": 0.8, "stateReason": "not_planned"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
