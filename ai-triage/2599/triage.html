<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2599, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-25T21:44:09Z", "currentLabels": ["type/bug"]}, "summary": "Reporter cannot load bitmaps and fonts from the Resources/Images folder on Android (MAUI), receiving a file-not-found exception; the same code works on Windows. Community member identified this as Android resource system behavior, not a SkiaSharp issue.", "classification": {"type": {"value": "type/question", "confidence": 0.87}, "area": {"value": "area/SkiaSharp", "confidence": 0.85}, "platforms": ["os/Android"]}, "evidence": {"reproEvidence": {"stepsToReproduce": ["Create a MAUI app with bitmaps in Resources/Images and fonts in Resources/Fonts", "Try to load them using file paths with File.Exists() on Android", "Observe file-not-found exception on Android"], "environmentDetails": "SkiaSharp 2.88.3, Android Emulator, Visual Studio on Windows", "attachments": [{"url": "https://github.com/mono/SkiaSharp/files/12542816/Cyclone.zip", "description": "Reporter's sample project", "filename": "Cyclone.zip"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.3", "2.88.2"], "workedIn": "2.88.2", "brokeIn": "2.88.3", "currentRelevance": "unlikely", "relevanceReason": "The claimed regression from 2.88.2 to 2.88.3 is unlikely to be caused by SkiaSharp changes; Android resource system behavior is platform-fundamental and unaffected by SkiaSharp version. Reporter likely made a setup or project configuration change alongside the upgrade."}}, "analysis": {"summary": "The reporter is attempting to load MAUI resources (images/fonts) via standard file paths, which works on Windows but fails on Android because MAUI's Resources/Images and Resources/Raw folders are packaged as Android resources/assets — not accessible via regular filesystem paths. SkiaSharp itself works correctly when given valid stream or file path inputs; the fix is to use MAUI's FileSystem.OpenAppPackageFileAsync() to obtain a stream, then pass it to SKImage.FromEncodedData(Stream) or SKTypeface.FromStream(Stream). A community member correctly identified this as Android resource system behavior, not a SkiaSharp bug.", "rationale": "Reporter is confused about Android's resource packaging model. File.Exists() returns false on Android for resources stored in the APK because they are not exposed as regular filesystem paths. SKTypeface.FromFile() and SKImage.FromEncodedData(string) both require real filesystem paths. Community comment #1709260086 confirms the root cause and provides the correct approach. The regression claim (2.88.2 → 2.88.3) is not credible for this category of issue — Android resource access has not changed in SkiaSharp across those versions.", "keySignals": [{"text": "I checked the file with File.Exist a function for the file, but I could not find the file name.", "source": "issue body", "interpretation": "Using standard filesystem API on Android for packaged resources — these are not exposed as file paths in Android."}, {"text": "It works fine with Windows.", "source": "issue body", "interpretation": "Windows exposes project resources via the file system; Android does not — classic cross-platform resource access mismatch."}, {"text": "This is not error of skiasharp, Maui deal with Resources as native resource, every platform is different", "source": "comment by xtuzy (comment #1709260086)", "interpretation": "Community member correctly identifies this as Android resource system behavior, not a SkiaSharp defect."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "89-90", "finding": "SKTypeface.FromFile(string path) delegates to SKFontManager.Default.CreateTypeface(path, index) — requires a valid filesystem path; cannot directly accept Android asset paths.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKImage.cs", "lines": "223-233", "finding": "SKImage.FromEncodedData(string filename) creates an SKData from the filesystem path via SKData.Create(filename) — returns null if the file is not on the real filesystem (as is the case for Android APK assets).", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "92-93", "finding": "SKTypeface.FromStream(Stream stream) exists as a public API accepting a managed Stream — this is the correct API to use when loading from an Android AssetManager or MAUI FileSystem stream.", "relevance": "related"}, {"file": "binding/SkiaSharp/SKImage.cs", "lines": "211-219", "finding": "SKImage.FromEncodedData(Stream data) accepts a managed Stream — correct API for Android when combined with FileSystem.OpenAppPackageFileAsync() or AssetManager.Open().", "relevance": "related"}], "workarounds": ["Place images in Resources/Raw (MauiAsset) instead of Resources/Images (MauiImage), then use FileSystem.OpenAppPackageFileAsync(\"image.png\") to get a Stream and pass to SKImage.FromEncodedData(Stream) or SKBitmap.Decode(Stream).", "For fonts placed as MauiFont (Resources/Fonts), use FileSystem.OpenAppPackageFileAsync(\"MyFont.ttf\") and pass the resulting Stream to SKTypeface.FromStream(Stream).", "Alternatively, on Android you can use the platform-specific AssetManager.Open(\"image.png\") to get a Stream."], "resolution": {"hypothesis": "Reporter is using file-path APIs on Android for resources that are packaged inside the APK and not accessible via the filesystem. The correct approach is to obtain a Stream from MAUI's FileSystem API and use the Stream-based SkiaSharp overloads.", "proposals": [{"title": "Use MAUI FileSystem to load resources as streams", "description": "Place assets in Resources/Raw (build action: MauiAsset) and use MAUI's cross-platform FileSystem.OpenAppPackageFileAsync() to open a stream, then pass it to SkiaSharp's stream-based APIs.", "category": "workaround", "codeSnippet": "// Images: place in Resources/Raw as MauiAsset\nusing var stream = await FileSystem.OpenAppPackageFileAsync(\"image.png\");\nusing var bitmap = SKBitmap.Decode(stream);\n\n// Fonts: place in Resources/Fonts as MauiFont\nusing var fontStream = await FileSystem.OpenAppPackageFileAsync(\"MyFont.ttf\");\nusing var typeface = SKTypeface.FromStream(fontStream);", "confidence": 0.92, "effort": "cost/xs", "validated": "yes"}, {"title": "Android-specific: use AssetManager", "description": "On Android specifically, use the platform AssetManager to open assets placed in Resources/Raw.", "category": "alternative", "codeSnippet": "#if ANDROID\nusing var stream = Android.App.Application.Context.Assets.Open(\"image.png\");\nusing var bitmap = SKBitmap.Decode(stream);\n#endif", "confidence": 0.85, "effort": "cost/xs", "validated": "yes"}], "recommendedProposal": "Use MAUI FileSystem to load resources as streams", "recommendedReason": "Cross-platform approach using MAUI's abstraction, no platform-specific code needed. The FileSystem.OpenAppPackageFileAsync() API is the official MAUI way to access packaged assets on all platforms."}}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.87, "reason": "SkiaSharp works correctly — the issue is Android's resource packaging system. Reporter is using file-path APIs for resources only accessible via Android AssetManager or MAUI's FileSystem.OpenAppPackageFileAsync(). Community member already provided the correct answer. The regression claim (2.88.2 → 2.88.3) is not credible for this category of problem.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Correct label from type/bug to type/question, add os/Android", "risk": "low", "confidence": 0.9, "labels": ["type/question", "area/SkiaSharp", "os/Android"]}, {"type": "add-comment", "description": "Post answer explaining Android resource access with SkiaSharp and stream-based APIs", "risk": "high", "confidence": 0.87, "comment": "Thanks for filing this! As @xtuzy pointed out, this is expected Android behavior rather than a SkiaSharp bug.\n\nOn Android, resources placed in `Resources/Images` (MauiImage) or `Resources/Raw` (MauiAsset) are packaged inside the APK and are **not** accessible via regular file-system paths. `File.Exists()` will always return `false` for these assets, and `SKTypeface.FromFile()` / `SKImage.FromEncodedData(string)` won't find them.\n\nThe correct approach is to obtain a `Stream` using MAUI's cross-platform API, then use SkiaSharp's stream-based overloads:\n\n```csharp\n// Images: place file in Resources/Raw with Build Action = MauiAsset\nusing var stream = await FileSystem.OpenAppPackageFileAsync(\"image.png\");\nusing var bitmap = SKBitmap.Decode(stream);\n\n// Fonts: place file in Resources/Fonts with Build Action = MauiFont\nusing var fontStream = await FileSystem.OpenAppPackageFileAsync(\"MyFont.ttf\");\nusing var typeface = SKTypeface.FromStream(fontStream);\n```\n\nThis approach works on Android, iOS, macOS, and Windows with a single code path.\n\nClosing as not a SkiaSharp issue — if you have further questions about MAUI resource loading, the [MAUI documentation on assets](https://learn.microsoft.com/en-us/dotnet/maui/fundamentals/single-project#resource-files) has more detail."}, {"type": "close-issue", "description": "Close as not a SkiaSharp bug — platform resource loading question answered", "risk": "medium", "confidence": 0.82, "stateReason": "not_planned"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
