<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2249, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-22T17:33:25Z"}, "summary": "SKBitmap.Decode(Stream) produces corrupted output when the stream is a non-seekable network stream (e.g., HttpWebResponse.GetResponseStream()), due to SKManagedStream not looping to fill the read buffer and an incorrect isAsEnd condition that fires prematurely on partial reads.", "classification": {"type": {"value": "type/bug", "confidence": 0.97}, "area": {"value": "area/SkiaSharp", "confidence": 0.93}, "platforms": ["os/Windows-Classic"], "backends": ["backend/Raster"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "wrong-output", "errorMessage": "Decoded PNG image is partially rendered / corrupted when loaded from network stream", "reproQuality": "partial", "targetFrameworks": ["net48", "net6.0"]}, "reproEvidence": {"stepsToReproduce": ["Create an HttpWebRequest to a PNG URL (e.g., https://tile.openstreetmap.org/1/0/0.png)", "Obtain the response stream via GetResponseStream()", "Pass the stream directly to SKBitmap.Decode(stream)", "Encode result to PNG and save to file", "Observe that saved image is partially rendered/corrupted"], "environmentDetails": "Windows Console, .NET Framework 4.8 and .NET 6, SkiaSharp 2.88.2–2.88.3", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/1981", "description": "Related PNG decode corruption issue (fixed for local streams in 2.88.1, zlib SSE bug)"}], "codeSnippets": ["using var webResponse = await request.GetResponseAsync();\nawait using var input = webResponse.GetResponseStream();\nvar bitmap = SKBitmap.Decode(input);"]}, "versionAnalysis": {"mentionedVersions": ["2.80.2", "2.88.2", "2.88.3"], "workedIn": "2.80.2", "brokeIn": "2.88.2", "currentRelevance": "likely", "relevanceReason": "SKManagedStream.OnReadManagedStream still uses a single Stream.Read() call without a fill loop; the isAsEnd condition remains len <= size which is always true for non-empty reads on non-seekable streams."}, "regression": {"isRegression": true, "confidence": 0.85, "reason": "Reporter explicitly states 2.80.2 worked; 2.88.2 and 2.88.3 both exhibit corruption for the same URL and code. Maintainer confirmed a related PNG bug was fixed for local streams (zlib) but network stream path was not addressed.", "workedInVersion": "2.80.2", "brokeInVersion": "2.88.2"}}, "analysis": {"summary": "SKManagedStream.OnReadManagedStream uses a single Stream.Read() call with no fill-loop. Network streams (non-seekable) legally return fewer bytes than requested (partial reads) on every call. When this happens, Skia's codec receives partial PNG data and renders a corrupted image. Additionally, the isAsEnd sentinel is set when len <= size (always true for any non-empty read on a non-seekable stream), which can cause Skia to prematurely signal end-of-stream. The confirmed workaround—copying to MemoryStream first—bypasses both issues since MemoryStream fills the full requested buffer.", "rationale": "This is clearly a regression bug. The code path for non-seekable streams (SKFrontBufferedManagedStream → SKManagedStream) has a deficiency: Stream.Read() partial reads are not retried. The isAsEnd condition using <= instead of < looks like a typo-level bug that makes every non-empty read from a non-seekable stream appear to be the end of stream. The workaround—copy to MemoryStream before decoding—is confirmed effective by multiple reporters.", "keySignals": [{"text": "This issue happens randomly, and a workaround is to copy the network stream to MemoryStream and then feed the SKBitmap.", "source": "issue comment (reporter, 2022-11-01)", "interpretation": "Confirms partial-read root cause: when full data arrives in one Read() call it works; when chunked it corrupts. MemoryStream always fills the buffer."}, {"text": "It works fine in 2.80.2, not working in the current one 2.88.2", "source": "issue body", "interpretation": "Regression between 2.80.2 and 2.88.2; related PNG bug fix for local streams (#1981) did not address network streams."}, {"text": "I see the same issue in the latest version, 2.88.3. Do you mean the problem of #1981? It looks to me the case for the local stream is fixed, but not for the web stream.", "source": "issue comment (reporter, 2022-10-16)", "interpretation": "Confirms issue #1981's local-stream fix did NOT address network streams, suggesting a different root cause."}, {"text": "It works if I load the same image from a file.", "source": "issue comment (reporter)", "interpretation": "File streams are seekable (CanSeek=true) → go through SKManagedStream without isAsEnd tracking; network streams are non-seekable → hit the partial-read and isAsEnd bug."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKManagedStream.cs", "lines": "73-96", "finding": "OnReadManagedStream calls stream.Read() once without a fill loop. For a non-seekable stream (e.g., NetworkStream), Stream.Read() may return fewer bytes than requested. The method returns the partial count to Skia, which then receives incomplete PNG chunk data. Additionally, the isAsEnd sentinel is set when `len <= (int)size` — since len is always <= size for any read, this condition is always true after the first non-empty read on a non-seekable stream, prematurely marking the stream as exhausted.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKCodec.cs", "lines": "278-288", "finding": "WrapManagedStream branches on stream.CanSeek: seekable streams → SKManagedStream; non-seekable streams → SKFrontBufferedManagedStream(stream, MinBufferedBytesNeeded). Network streams are non-seekable, so they go through SKFrontBufferedManagedStream which itself delegates reads back to SKManagedStream for data beyond the front-buffer. Both layers are affected by the partial-read problem.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFrontBufferedManagedStream.cs", "lines": "64-124", "finding": "OnRead phase 3 (reading past the front buffer) calls stream.Read(buffer, size) on SKManagedStream without looping. Any partial read here returns a short byte count, leaving `size > 0` unreported. This confirms partial reads propagate to Skia even past the initial buffer phase.", "relevance": "related"}], "workarounds": ["Copy the network stream to a MemoryStream before decoding: `using var ms = new MemoryStream(); await input.CopyToAsync(ms); ms.Position = 0; var bitmap = SKBitmap.Decode(ms);`", "Read all bytes into a byte array first: `var bytes = await new HttpClient().GetByteArrayAsync(url); var bitmap = SKBitmap.Decode(bytes);`"], "nextQuestions": ["Does the same corruption occur with SKImage.FromEncodedData(stream) / SKData.Create(stream) for non-seekable streams?", "Is the regression from 2.80.2→2.88.2 due to the SKManagedStream rewrite, or the SKFrontBufferedManagedStream introduction for non-seekable streams?", "Does the isAsEnd <= condition cause consistent failure or intermittent failure depending on timing of partial reads?"], "resolution": {"hypothesis": "SKManagedStream.OnReadManagedStream must loop until the buffer is filled or the underlying stream returns 0 bytes (true EOF). The isAsEnd condition should use strict less-than (`len < (int)size`) to only signal end-of-stream when a partial read is detected.", "proposals": [{"title": "Fix OnReadManagedStream to loop on partial reads", "description": "Replace the single Stream.Read() call in OnReadManagedStream with a fill loop that retries until the requested bytes are read or the stream returns 0. Also correct the isAsEnd condition from `len <= (int)size` to `len < (int)size`.", "codeSnippet": "// In SKManagedStream.OnReadManagedStream:\nusing var managedBuffer = Utils.RentArray<byte>((int)size);\nint totalRead = 0;\nint remaining = (int)size;\nwhile (remaining > 0) {\n    var chunk = stream.Read(managedBuffer.Array, totalRead, remaining);\n    if (chunk == 0) break; // true EOF\n    totalRead += chunk;\n    remaining -= chunk;\n}\nif (buffer != IntPtr.Zero) {\n    var src = managedBuffer.Span.Slice(0, totalRead);\n    var dst = buffer.AsSpan(managedBuffer.Length);\n    src.CopyTo(dst);\n}\nif (!stream.CanSeek && (int)size > 0 && totalRead < (int)size)\n    isAsEnd = true;\nreturn (IntPtr)totalRead;", "category": "fix", "confidence": 0.85, "effort": "cost/s", "validated": "untested"}, {"title": "Workaround: copy to MemoryStream before decoding", "description": "Copy the network stream to a MemoryStream before passing to SKBitmap.Decode. MemoryStream is seekable and always satisfies full reads, bypassing the partial-read issue entirely.", "codeSnippet": "using var ms = new MemoryStream();\nawait networkStream.CopyToAsync(ms);\nms.Position = 0;\nvar bitmap = SKBitmap.Decode(ms);", "category": "workaround", "confidence": 0.99, "effort": "cost/xs", "validated": "yes"}], "recommendedProposal": "Fix OnReadManagedStream to loop on partial reads", "recommendedReason": "The workaround requires callers to know about the issue and add boilerplate. The fix is low-risk, small-scope change in one method that correctly implements .NET Stream contract semantics."}}, "output": {"actionability": {"suggestedAction": "ready-to-fix", "confidence": 0.82, "reason": "Root cause is identified (missing fill-loop and incorrect isAsEnd condition in SKManagedStream.OnReadManagedStream). Fix path is clear and low-risk. Confirmed workaround validates the diagnosis.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, core, regression, and reliability labels", "risk": "low", "confidence": 0.97, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "backend/Raster", "tenet/reliability"]}, {"type": "add-comment", "description": "Post analysis with root cause and confirmed workaround", "risk": "medium", "confidence": 0.85, "comment": "Thanks for the detailed report and the workaround confirmation! After investigating the code, the root cause appears to be in `SKManagedStream.OnReadManagedStream` (binding/SkiaSharp/SKManagedStream.cs).\n\n**Root Cause**\n\n`Stream.Read()` is not guaranteed to fill the entire requested buffer — it can return fewer bytes than requested (a *partial read*). This is expected and documented .NET behavior, especially for network streams where data arrives in TCP packets. The current code calls `Stream.Read()` once and returns whatever partial result it gets to Skia's native codec. The codec then receives an incomplete PNG chunk and produces a corrupted image.\n\nAdditionally, the `isAsEnd` sentinel is set when `len <= (int)size`, but since `len` can never exceed `size`, this condition fires after *every* non-empty read from a non-seekable stream, which may cause the codec to signal end-of-stream prematurely.\n\nThe fix in #1981 addressed a zlib SSE decoding bug for local streams; this issue is a separate code path for non-seekable/network streams.\n\n**Confirmed Workaround**\n\nCopy the network stream to a `MemoryStream` before decoding — `MemoryStream` is seekable and always satisfies full buffer reads:\n\n```csharp\nusing var ms = new MemoryStream();\nawait networkStream.CopyToAsync(ms);\nms.Position = 0;\nvar bitmap = SKBitmap.Decode(ms);\n```\n\nAlternatively, use `HttpClient.GetByteArrayAsync` and pass the byte array directly to `SKBitmap.Decode(byte[])`."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
