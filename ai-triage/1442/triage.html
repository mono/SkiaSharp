<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1442, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-28T21:02:36Z", "currentLabels": ["type/bug", "area/SkiaSharp", "backend/OpenGL"]}, "summary": "Feature request to add a user-specified dispose callback on GPU-bound objects (e.g., SKSurface) so that finalization from the GC finalizer thread does not crash when the GPU context is not active on that thread.", "classification": {"type": {"value": "type/feature-request", "confidence": 0.88}, "area": {"value": "area/SkiaSharp", "confidence": 0.92}, "backends": ["backend/OpenGL"], "tenets": ["tenet/reliability"]}, "evidence": {"reproEvidence": {"stepsToReproduce": ["Create a GPU-bound SkiaSharp object (e.g., SKSurface via GRContext)", "Let the application exit via Main() exit or Environment.Exit(), or allow object to be GC'd without explicit Dispose()", "The GC finalizer thread calls Dispose on the GPU-bound object without the GPU context being active on that thread", "Observe crash (SIGSEGV / EXC_BAD_ACCESS or similar)"], "environmentDetails": "Any platform using GPU-backed SkiaSharp objects (OpenGL, Metal, etc.)", "repoLinks": [{"url": "https://github.com/AvaloniaUI/Avalonia/issues/4423", "description": "Avalonia crash caused by this issue — GPU object finalized on wrong thread"}, {"url": "https://github.com/AvaloniaUI/Avalonia/pull/7887", "description": "Avalonia workaround PR — disabling finalizer on SKFont to prevent crash"}, {"url": "https://github.com/mono/SkiaSharp/issues/2794", "description": "Related: Access Violation on Finalizer/Dispose for SKPaint in SkiaSharp 3.x"}, {"url": "https://github.com/mono/SkiaSharp/issues/3178", "description": "Related (closed/fixed): iOS crash when GC collects SKMetalView resources — GRContext finalized on wrong thread"}]}}, "analysis": {"summary": "The SKNativeObject finalizer unconditionally calls Dispose(false) on the finalizer thread, but GPU-bound objects (SKSurface created with GRContext, GRContext itself) require the GPU context to be current on the disposing thread. There is no hook to redirect finalization to the correct thread. The proposed solution is a new disposeCallback API on GPU-bound factory methods.", "rationale": "The issue title and body explicitly frame this as a [FEATURE] request — the reporter is asking for a new API (disposeCallback parameter on Create overloads) rather than reporting a regression in existing behavior. The underlying crash is real and confirmed by related issues and Avalonia workarounds, but the fix requires a new API surface. This is not a regression — the GPU-thread-safety requirement has always existed; the missing piece is a hook to route finalization to the right thread. Classification as type/feature-request is appropriate despite the crash potential, since no current API is broken; the missing mechanism is new functionality.", "keySignals": [{"text": "[FEATURE] Controlled finalization for GPU-bound objects", "source": "issue title", "interpretation": "Reporter explicitly frames this as a feature request."}, {"text": "Dispose might be called from the finalizer thread ... leads to crashes such as https://github.com/AvaloniaUI/Avalonia/issues/4423", "source": "issue body", "interpretation": "Real crash scenario affecting production apps using GPU-backed SkiaSharp (e.g., Avalonia)."}, {"text": "public static SKSurface Create(GRContext context, bool budgeted, SKImageInfo info, Action<Action> disposeCallback)", "source": "issue body", "interpretation": "Concrete API proposal for new disposeCallback parameter on GPU surface factory methods."}, {"text": "This is the native stack trace ... EXC_BAD_ACCESS ... libSkiaSharp.dylib ... -[AvnWindow windowWillClose:]", "source": "comment by ltetak", "interpretation": "Confirms the crash affects macOS (Metal/OpenGL) when closing windows — GPU object finalized on wrong thread."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKObject.cs", "lines": "229-234", "finding": "SKNativeObject finalizer unconditionally calls Dispose(false) — no hook to redirect finalization to a GPU-context thread. No disposeCallback mechanism exists.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKObject.cs", "lines": "259-277", "finding": "Dispose(bool disposing) calls DisposeNative() which for GPU objects requires the GPU context to be active; called from finalizer thread without any thread-affinity check.", "relevance": "direct"}, {"file": "binding/SkiaSharp/GRContext.cs", "lines": "18-23", "finding": "GRContext.DisposeNative() calls AbandonContext() which requires the GPU context to be current — crashes if called from the finalizer thread without the context being active.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKSurface.cs", "lines": "78-180", "finding": "GPU surface factory overloads (Create with GRContext) have no disposeCallback parameter — the requested API does not exist in current codebase.", "relevance": "direct"}], "workarounds": ["Ensure all GPU-bound SkiaSharp objects (SKSurface, GRContext) are explicitly disposed before application exit using using statements or Dispose() calls in cleanup handlers.", "Register a handler for AppDomain.CurrentDomain.ProcessExit or Application shutdown events to explicitly dispose GPU objects on the correct thread before the runtime exits.", "Suppress finalization on long-lived GPU objects with GC.SuppressFinalize() once ownership is established, and ensure Dispose() is called manually on the GPU thread (Avalonia workaround pattern from PR #7887)."], "nextQuestions": ["Should the disposeCallback be per-object (on Create) or a global/context-level hook on GRContext?", "Is this still reproducible in SkiaSharp 3.x, or were any mitigations added since 2020?", "Does the fix in issue #3178 (iOS SKMetalView GC crash) address the same root cause?"], "resolution": {"hypothesis": "Introducing a disposeCallback parameter on GPU-bound factory methods would allow callers to marshal finalization to the correct GPU thread or context, preventing crashes when the GC finalizer thread disposes GPU-bound objects.", "proposals": [{"title": "Add disposeCallback to GPU surface factory overloads", "description": "Add Action<Action> disposeCallback parameter to GPU-backed SKSurface.Create overloads (and optionally GRContext). When the finalizer fires and a callback is set, invoke the callback with the Dispose action instead of calling Dispose directly.", "category": "fix", "confidence": 0.75, "effort": "cost/m"}, {"title": "Add a global GRContext finalizer delegate", "description": "Allow a global or per-GRContext hook that intercepts finalization of any GPU-bound object associated with that context, routing disposal to the GPU thread.", "category": "alternative", "confidence": 0.6, "effort": "cost/l"}, {"title": "Workaround: suppress finalizer and dispose explicitly", "description": "Document and encourage callers to use GC.SuppressFinalize() on GPU-bound objects and explicitly dispose on the GPU thread. This is the current best practice used by Avalonia.", "category": "workaround", "confidence": 0.9, "effort": "cost/xs"}], "recommendedProposal": "Workaround: suppress finalizer and dispose explicitly", "recommendedReason": "The API design for a disposeCallback needs careful thought (scope, threading semantics, ABI compatibility). In the meantime the workaround of explicit disposal with GC.SuppressFinalize() is well-tested by Avalonia."}}, "output": {"actionability": {"suggestedAction": "keep-open", "confidence": 0.8, "reason": "Valid feature request addressing a real crash scenario affecting production GPU apps. The disposeCallback API requires design discussion and ABI considerations. A workaround exists (explicit disposal + GC.SuppressFinalize). Keep open for future planning.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Correct type label from type/bug to type/feature-request; add tenet/reliability", "risk": "low", "confidence": 0.88, "labels": ["type/feature-request", "area/SkiaSharp", "backend/OpenGL", "tenet/reliability"]}, {"type": "add-comment", "description": "Acknowledge the feature request, confirm the root cause, suggest workaround", "risk": "medium", "confidence": 0.8, "comment": "Thanks for the detailed write-up and proposal!\n\nThis is a real problem — `SKNativeObject`'s finalizer calls `Dispose(false)` directly on the GC finalizer thread, but GPU-bound objects like `SKSurface` (backed by a `GRContext`) and `GRContext` itself require the GPU context to be current on the disposing thread. When `Main` exits or the GC collects an undisposed GPU object, the finalizer can fire on the wrong thread, causing the crash you described.\n\n**Workaround (current best practice):**\n\nUntil a disposal-callback API is available, you can suppress finalization and ensure explicit disposal on the GPU thread:\n\n```csharp\n// After creating a GPU-bound object, suppress the finalizer\nGC.SuppressFinalize(surface); // or GRContext, etc.\n\n// In your GPU thread cleanup / app shutdown:\ngpuThread.Invoke(() => surface.Dispose());\n```\n\nAlternatively, register for process exit and dispose GPU objects explicitly before the runtime tears down:\n\n```csharp\nAppDomain.CurrentDomain.ProcessExit += (_, _) =>\n{\n    // Dispose on GPU thread\n    gpuDispatcher.Invoke(() =>\n    {\n        grContext?.Dispose();\n        surface?.Dispose();\n    });\n};\n```\n\nThis is the pattern used by Avalonia (see https://github.com/AvaloniaUI/Avalonia/pull/7887).\n\nThe proposed `disposeCallback` API is a good idea for a future release — it would allow proper marshalling of finalization to the correct thread without requiring callers to manually suppress the finalizer. This will need design work to ensure ABI compatibility and define the threading contract."}, {"type": "link-related", "description": "Link to related crash issue #2794", "risk": "low", "confidence": 0.8, "linkedIssue": 2794}, {"type": "link-related", "description": "Link to related (closed) crash issue #3178", "risk": "low", "confidence": 0.8, "linkedIssue": 3178}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
