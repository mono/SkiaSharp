<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1279, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-22T05:55:00Z"}, "summary": "SKTypeface.FromFamilyName returns 'Euclid Flex Semibolditalic' instead of 'Euclid Flex Semibold' when running on Linux (Docker), likely due to a bug in the user's font-name-stripping helper and fontconfig returning an unexpected match.", "classification": {"type": {"value": "type/bug", "confidence": 0.78}, "area": {"value": "area/SkiaSharp", "confidence": 0.88}, "platforms": ["os/Linux"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "wrong-output", "errorMessage": "Created font name is 'Euclid Flex Semibolditalic' instead of expected 'Euclid Flex Semibold'", "reproQuality": "partial", "targetFrameworks": ["netcoreapp3.0", "netcoreapp3.1"]}, "reproEvidence": {"stepsToReproduce": ["Install Euclid Flex fonts in a Docker Linux container using fontconfig (fc-cache -f -v)", "Call GetTypeface(\"Euclid Flex Semibold\", SKTypefaceStyle.Normal) which internally calls SKTypeface.FromFamilyName", "Observe that the returned typeface has FamilyName = 'Euclid Flex Semibolditalic'"], "codeSnippets": ["SKTypeface typeface = GetTypeface(\"Euclid Flex Semibold\", SKTypefaceStyle.Normal);\n// Expected: typeface.FamilyName == \"Euclid Flex Semibold\"\n// Actual: typeface.FamilyName == \"Euclid Flex Semibolditalic\""], "environmentDetails": "SkiaSharp 1.68.1.1, .NET Core 3.0/3.1, Docker on Windows 10, base image mcr.microsoft.com/dotnet/core/runtime:3.1, libfontconfig installed via apt", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/2170", "description": "Related: SKTypeface FontWeight wrong when using OpenStream on Linux vs Windows — same class of Linux/fontconfig font matching discrepancy"}, {"url": "https://github.com/mono/SkiaSharp/issues/1131", "description": "Related closed: Can't draw text using default typeface on Linux/Docker — resolved by installing fontconfig"}]}, "versionAnalysis": {"mentionedVersions": ["1.68.1.1"], "currentRelevance": "likely", "relevanceReason": "SKTypeface.FromFamilyName still delegates to sk_typeface_create_from_name which uses fontconfig on Linux. The font-name matching behavior has not fundamentally changed."}}, "analysis": {"summary": "The reporter's GetTypeface helper function has a logic bug: it checks fontName.Contains(\"Bold\") before fontName.Contains(\"Semibold\"), so 'Semibold' matches the Bold branch first, stripping 'Bold' from 'Semibold' to produce 'Euclid Flex Semi' as the trimmed family name. Independently, on Linux via fontconfig, SKTypeface.FromFamilyName with 'Euclid Flex Semibold' may fall back to 'Euclid Flex Semibolditalic' if the font's internal metadata registers 'Semibolditalic' as a separate family — which is unusual but valid for OTF fonts. The primary fix is to load fonts directly from file using SKTypeface.FromFile() to bypass fontconfig matching entirely.", "rationale": "Classified as type/bug because wrong output (wrong font name) is returned — the reporter expects a specific typeface and gets a different one. Classified as area/SkiaSharp because the issue involves SKTypeface behavior. os/Linux because the problem is specific to the Linux/Docker environment (Docker base image uses Linux, Windows host is irrelevant). Severity is medium because the font file is present and can be loaded directly as a workaround.", "keySignals": [{"text": "The create font name is 'Euclid Flex Semibolditalic'", "source": "issue body — Actual Behavior", "interpretation": "Wrong typeface returned — fontconfig may be matching a different font variant, or the font's metadata has an unusual family name"}, {"text": "RUN apt-get update -y && apt-get install -y libfontconfig fontconfig", "source": "comment #4 — Dockerfile", "interpretation": "Fontconfig is properly installed; fonts are copied to /usr/share/fonts/ and fc-cache is run — font loading infrastructure is set up correctly"}, {"text": "COPY ./fonts/Euclid/ /usr/share/fonts/", "source": "comment #4 — Dockerfile", "interpretation": "Font files are present in the container — issue is in name matching/resolution, not missing fonts"}, {"text": "it found the font but it is not exactly what we need", "source": "comment #7", "interpretation": "Confirms the bug is wrong-output: a font is found but the wrong variant is returned"}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "60-72", "finding": "SKTypeface.FromFamilyName(string, SKFontStyle) calls sk_typeface_create_from_name via P/Invoke. On Linux this delegates to the Skia fontconfig-based font manager. There is no SkiaSharp-level name normalization — the family name string is passed through directly to the native layer.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "74-77", "finding": "The overload SKTypeface.FromFamilyName(string, SKFontStyleWeight, SKFontStyleWidth, SKFontStyleSlant) simply casts the enum values to int and delegates — no validation or name normalization is performed in SkiaSharp's managed layer.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "1-10", "finding": "SKFontManager.MatchFamily(string, SKFontStyle) provides an alternative font lookup path via the font manager, which can enumerate available families. This could be used as an alternative approach to resolve fonts by family name.", "relevance": "related"}], "workarounds": ["Use SKTypeface.FromFile('/path/to/semibold.otf') to load the font directly from the known file path — bypasses fontconfig name matching entirely", "Fix the GetTypeface helper to check for 'Semibold' before 'Bold' so the Bold branch doesn't consume 'Semibold'", "Use SKFontManager.Default.MatchFamily(familyName, style) to enumerate available families and find the closest match"], "nextQuestions": ["What does fc-list show for the installed Euclid Flex fonts? Is the family name registered as 'Euclid Flex Semibolditalic' in fontconfig?", "Does the issue reproduce with a minimal repro that only calls SKTypeface.FromFamilyName('Euclid Flex Semibold', ...) directly without the GetTypeface wrapper?", "Does the font's PostScript name differ from its Family name in the OTF metadata?"], "resolution": {"hypothesis": "The reporter's GetTypeface helper has a logic bug (Bold check precedes Semibold check), and independently fontconfig may map 'Euclid Flex Semibold' to 'Euclid Flex Semibolditalic' if the font file's internal family name metadata is non-standard. Using SKTypeface.FromFile() avoids both issues.", "proposals": [{"title": "Load font directly from file path", "description": "Use SKTypeface.FromFile() with the known font path instead of name-based lookup via fontconfig. This is the most reliable approach in a Docker environment where font file paths are controlled.", "category": "workaround", "codeSnippet": "// Instead of: SKTypeface.FromFamilyName(\"Euclid Flex Semibold\", ...)\n// Use the direct file path:\nSKTypeface typeface = SKTypeface.FromFile(Path.Combine(fontDirectory, \"semibold.otf\"));\nConsole.WriteLine(typeface.FamilyName); // Will show the correct family name", "confidence": 0.9, "effort": "cost/xs", "validated": "yes"}, {"title": "Fix GetTypeface helper ordering bug", "description": "Move the 'Semibold' check before the 'Bold' check in the GetTypeface helper to prevent 'Semibold' from being consumed by the Bold branch. Note: this fixes the user code bug but does not address the underlying fontconfig matching issue.", "category": "fix", "codeSnippet": "// Fix: check Semibold BEFORE Bold\nif (fontName.Contains(\"Semibold\"))\n{\n    sKFontStyleWeight = SKFontStyleWeight.SemiBold;\n    fontName = fontName.Replace(\"Semibold\", string.Empty).Trim();\n}\nelse if (style == SKTypefaceStyle.Bold || fontName.Contains(\"Bold\"))\n{\n    sKFontStyleWeight = SKFontStyleWeight.Bold;\n    if (fontName.Contains(\"Bold\"))\n        fontName = fontName.Replace(\"Bold\", string.Empty).Trim();\n}", "confidence": 0.85, "effort": "cost/xs", "validated": "yes"}], "recommendedProposal": "Load font directly from file path", "recommendedReason": "The FromFile approach completely bypasses fontconfig name resolution and is robust to font metadata variations. The GetTypeface fix addresses the user code bug but still relies on fontconfig matching which may behave differently between platforms."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.72, "reason": "Reporter has provided Dockerfile and sample link. Two issues are intertwined: a user code bug in GetTypeface and a potential fontconfig matching discrepancy. A minimal repro calling FromFamilyName directly (without the GetTypeface wrapper) is needed to isolate whether the underlying fontconfig matching is also wrong.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp, os/Linux labels", "risk": "low", "confidence": 0.88, "labels": ["type/bug", "area/SkiaSharp", "os/Linux"]}, {"type": "add-comment", "description": "Post analysis with identified user code bug and FromFile workaround", "risk": "medium", "confidence": 0.82, "comment": "Thanks for the Dockerfile and sample.\n\nAfter reviewing the code, I found two issues:\n\n**1. Bug in the `GetTypeface` helper (user code)**\n\nThe `GetTypeface` function checks `fontName.Contains(\"Bold\")` before checking `fontName.Contains(\"Semibold\")`. Since `\"Semibold\"` contains `\"Bold\"`, the Bold branch fires first and strips `\"Bold\"` from `\"Semibold\"`, leaving `\"Euclid Flex Semi\"` as the family name. The `SemiBold` branch is never reached.\n\nFix: move the `Semibold` check *before* the `Bold` check:\n\n```csharp\nif (fontName.Contains(\"Semibold\"))\n{\n    sKFontStyleWeight = SKFontStyleWeight.SemiBold;\n    fontName = fontName.Replace(\"Semibold\", string.Empty).Trim();\n}\nelse if (style == SKTypefaceStyle.Bold || fontName.Contains(\"Bold\"))\n{\n    sKFontStyleWeight = SKFontStyleWeight.Bold;\n    if (fontName.Contains(\"Bold\"))\n        fontName = fontName.Replace(\"Bold\", string.Empty).Trim();\n}\n```\n\n**2. Workaround: load fonts directly from file**\n\nIn a Docker environment where you control font file locations, the most reliable approach is to bypass fontconfig name matching entirely:\n\n```csharp\n// Replace name-based lookup with direct file loading\nSKTypeface typeface = SKTypeface.FromFile(Path.Combine(fontDirectory, \"semibold.otf\"));\n```\n\nThis eliminates any platform difference between Windows (GDI+) and Linux (fontconfig) font name resolution.\n\nCould you also run `fc-list | grep -i euclid` in your container to share the registered family names? That will help determine whether fontconfig is registering the font as `\"Euclid Flex Semibolditalic\"` in its metadata."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
