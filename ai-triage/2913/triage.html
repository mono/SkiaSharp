pChainPanel/AngleSwapChainPanel Windows rendering path in the codebase still uses ANGLE with EGL_EXPERIMENTAL_PRESENT_PATH_FAST_ANGLE and GRSurfaceOrigin.BottomLeft; no evidence this specific rendering artifact has been addressed."}}, "analysis": {"summary": "SKGLView on Windows uses ANGLE (OpenGL ES over Direct3D 11) via SKSwapChainPanel/AngleSwapChainPanel. The rendering path uses GRSurfaceOrigin.BottomLeft and EGL_EXPERIMENTAL_PRESENT_PATH_FAST_ANGLE. On Intel UHD Graphics, bilinear texture filtering samples adjacent pixels at atlas sprite boundaries when coordinates land on odd pixel values, causing color bleeding as stray lines. The reporter found a workaround (+1.0f to source rect left and destination rect bottom in DrawImage calls) suggesting two off-by-one coordinate errors in the Windows GL rendering path.", "rationale": "The visual evidence (video + screenshot), GPU-specific behavior (Intel vs NVIDIA), and SKGLView-only reproduction (SKCanvasView unaffected) all confirm a real rendering bug in the ANGLE/Direct3D path. The reporter's workaround pointing to off-by-one in DrawImage rect coordinates is consistent with the OpenGL texture atlas bilinear filtering behavior described in comments. This is a wrong-output bug, not a crash.", "keySignals": [{"text": "SKGLView draws randomly a red horizontal line across the whole screen. A dedicated NVIDIA graphics card on the same laptop works fine. SKCanvasView also works fine.", "source": "issue body", "interpretation": "GPU-specific and view-type-specific: strongly points to the ANGLE/OpenGL ES rendering path rather than core SkiaSharp drawing logic."}, {"text": "This seems to be fixed on Windows by adding +1.0f to source rectangle's left and +1.0f to destination rectangle's bottom in every DrawImage call.", "source": "comment #4 (janne-hmp)", "interpretation": "Two off-by-one coordinate offsets in SKSwapChainPanel DrawImage calls on Windows; implies the surface origin or coordinate mapping is slightly misaligned."}, {"text": "For texture atlases you need to align everything to 2x2 rectangles because bilinear texture filtering will sample 4 adjacent pixels. If you put the sprite boundary on an odd pixel, there will be some color bleeding from the neighboring sprite.", "source": "comment #5 (TommiGustafsson-HMP, quoting OpenGL Reddit)", "interpretation": "Root cause hypothesis: atlas sprite coordinates at sub-pixel boundaries cause bilinear filtering bleed; the bottom-left surface origin flip in ANGLE may produce a half-pixel offset on Intel but not NVIDIA."}, {"text": "I've got a similar problem but green vertical lines on certain zoom levels.", "source": "comment #3 (janne-hmp)", "interpretation": "Both horizontal and vertical artifacts, and only at specific zoom levels, is consistent with texture sampling coordinate errors amplified at non-integer scale factors."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/SKSwapChainPanel.cs", "lines": "13-14", "finding": "SKSwapChainPanel uses GRSurfaceOrigin.BottomLeft — standard OpenGL convention, but ANGLE translates this to Direct3D coordinate space. A subtle off-by-one in this translation could explain Intel-specific artifacts.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/GlesInterop/GlesContext.cs", "lines": "163-175", "finding": "ANGLE is initialized with EGL_EXPERIMENTAL_PRESENT_PATH_FAST_ANGLE. This 'fast path' skips some present-stage compositing steps and could interact differently with Intel's D3D driver vs NVIDIA, potentially introducing a 1-pixel alignment difference.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/AngleSwapChainPanel.cs", "lines": "228-231", "finding": "OnRenderFrame is called with a Rect using integer surface dimensions queried from EGL. The rect is passed to SKSwapChainPanel.OnRenderFrame which creates the GRBackendRenderTarget. Coordinates are truncated to int via cast.", "relevance": "related"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Handlers/SKGLView/SKGLViewHandler.Windows.cs", "lines": "13", "finding": "MAUI handler wraps MauiSKSwapChainPanel (subclass of SKSwapChainPanel) — same underlying rendering path is used in both MAUI and non-MAUI SKGLView on Windows.", "relevance": "context"}], "nextQuestions": ["Does the issue reproduce with a minimal SkiaSharp project (not the full game), or only when using sprite atlas DrawImage calls at non-integer scale factors?", "Does removing EGL_EXPERIMENTAL_PRESENT_PATH_FAST_ANGLE from the ANGLE init attributes mitigate the issue on Intel?", "Does switching from GRSurfaceOrigin.BottomLeft to GRSurfaceOrigin.TopLeft in SKSwapChainPanel change the behavior?", "Is the off-by-one only in DrawImage, or does it appear with DrawBitmap or other primitives?", "Which SkiaSharp 3.x preview version first exhibited the problem — was this present in 2.x?"], "workarounds": ["Add +1.0f to the left coordinate of the source rectangle in every DrawImage call on Windows (user-identified workaround).", "Add +1.0f to the bottom coordinate of the destination rectangle in every DrawImage call on Windows (user-identified workaround).", "Use SKCanvasView instead of SKGLView on Windows — unaffected by the OpenGL rendering path."], "resolution": {"hypothesis": "The ANGLE D3D11 fast-path present combined with GRSurfaceOrigin.BottomLeft produces a sub-pixel offset in texture sampling on Intel UHD Graphics drivers, causing bilinear filtering bleed at sprite atlas boundaries. This manifests as stray colored lines at certain zoom/scale levels.", "proposals": [{"title": "Disable EGL_EXPERIMENTAL_PRESENT_PATH_FAST_ANGLE on Intel GPUs", "description": "Detect Intel GPU and fall back to EGL_EXPERIMENTAL_PRESENT_PATH_COMPATIBLE_ANGLE (or no fast path) to avoid the sub-pixel offset. Requires P/Invoke or DXGI query to detect Intel GPU vendor ID (0x8086).", "category": "fix", "confidence": 0.55, "effort": "cost/m", "validated": "untested"}, {"title": "Switch surface origin to TopLeft for Windows", "description": "Try GRSurfaceOrigin.TopLeft in SKSwapChainPanel on Windows to see if the coordinate flip eliminates the off-by-one. D3D convention is top-left; the BottomLeft convention may introduce a 1-pixel shift in the ANGLE translation on some drivers.", "category": "investigation", "confidence": 0.45, "effort": "cost/s", "validated": "untested"}, {"title": "Round DrawImage coordinates to nearest even pixel", "description": "Align DrawImage source and destination rectangle coordinates to 2-pixel boundaries to avoid bilinear sampling across atlas sprite borders. This is a user-space recommendation, not a framework change.", "category": "workaround", "confidence": 0.7, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Round DrawImage coordinates to nearest even pixel", "recommendedReason": "This user-space workaround directly addresses the bilinear bleeding root cause (misaligned atlas boundaries) without requiring driver-specific hacks, and can be applied immediately while the underlying ANGLE issue is investigated."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Real bug with visual evidence (video + screenshot) and a partial user-identified workaround. Root cause points to ANGLE/Intel GPU interaction in the SwapChainPanel rendering path; needs a minimal repro and targeted investigation of EGL fast-path and surface origin settings.", "suggestedReproPlatform": "windows"}, "missingInfo": ["Minimal reproduction project (not the full game) to isolate the issue to SKGLView DrawImage", "Confirmation of which SkiaSharp 3.x preview version first showed the problem", "Whether the issue appears in SkiaSharp 2.x or only in 3.x (to identify if it's a regression)"], "actions": [{"type": "update-labels", "description": "Apply area, platform and backend labels", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/SkiaSharp.Views", "os/Windows-WinUI", "backend/OpenGL", "tenet/reliability"]}, {"type": "add-comment", "description": "Acknowledge the visual evidence, explain the suspected root cause, provide workaround, and request a minimal repro", "risk": "medium", "confidence": 0.82, "comment": "Thank you for the video, screenshot, and the repro project link — very helpful!\n\nBased on the evidence (GPU-specific behavior on Intel vs NVIDIA, SKGLView-only, zoom-level dependency), this looks like a texture sampling coordinate issue in the **ANGLE/Direct3D 11** rendering path used by `SKGLView` on Windows (`SKSwapChainPanel`). The behavior is consistent with bilinear texture filtering bleeding across sprite atlas boundaries when coordinates land on sub-pixel values — something that manifests differently depending on the GPU driver's implementation of the OpenGL-to-D3D coordinate transform.\n\n**Workaround (while we investigate):**\nAs you found, you can compensate by adjusting the source and destination rectangle coordinates in `DrawImage` calls:\n```csharp\n// Align atlas sprite coordinates to even pixels to avoid bilinear bleed\nvar srcRect = new SKRect(sprite.Left + 1f, sprite.Top, sprite.Right, sprite.Bottom);\nvar dstRect = new SKRect(dest.Left, dest.Top, dest.Right, dest.Bottom + 1f);\ncanvas.DrawImage(image, srcRect, dstRect, paint);\n```\nAlternatively, aligning all sprite coordinates to 2-pixel boundaries avoids the issue entirely.\n\n**To help us narrow this down further**, could you provide:\n1. A minimal standalone SkiaSharp project (not the full game) that reliably triggers the line?\n2. Which SkiaSharp 3.x preview version first showed the problem? Did it also occur on 2.x?\n\nWe will investigate whether the `EGL_EXPERIMENTAL_PRESENT_PATH_FAST_ANGLE` setting or the `GRSurfaceOrigin.BottomLeft` flip in `SKSwapChainPanel` is the root cause."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
