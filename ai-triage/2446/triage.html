<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2446, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-22T05:09:28Z"}, "summary": "Memory grows unboundedly when creating SKTypeface from a stream in a loop and calling MeasureText, because Skia's internal glyph cache retains data after the typeface is disposed; workarounds via SKGraphics.PurgeFontCache() exist.", "classification": {"type": {"value": "type/bug", "confidence": 0.8}, "area": {"value": "area/SkiaSharp", "confidence": 0.92}, "platforms": ["os/Windows-Classic"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "memory-leak", "errorMessage": "Memory allocation increasing rapidly without any disposal", "reproQuality": "complete", "targetFrameworks": ["net6.0-windows"]}, "reproEvidence": {"stepsToReproduce": ["Run a loop calling SKTypeface.FromStream() with a .ttf file each iteration", "Create SKPaint with that typeface and call paint.MeasureText()", "Dispose paint, typeface, and stream; call GC.Collect()", "Observe memory growing continuously"], "environmentDetails": "Windows 10 Pro, Visual Studio 2022 Preview, SkiaSharp 2.88.3", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/files/11273548/SkiaSharpTesting.zip", "description": "Attached minimal repro project"}, {"url": "https://github.com/mono/SkiaSharp/issues/996", "description": "Related prior issue: memory leak when creating SKTypeface from file/stream (closed as fixed in 1.68.1, but glyph cache concern remains)"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.3"], "currentRelevance": "likely", "relevanceReason": "The glyph cache behavior is fundamental to Skia and has not changed; the SKGraphics cache control APIs are available but underdocumented for this use case."}}, "analysis": {"summary": "When SKTypeface is created from a stream and used with MeasureText, Skia's internal SkStrikeCache (glyph cache) retains rendered glyph data globally even after the typeface is disposed. This is by-design for performance, but in batch scenarios (e.g., 100+ document conversions each using unique embedded fonts) the cache grows beyond practical limits and can cause OOM. The fix is to call SKGraphics.PurgeFontCache() periodically, or to set cache limits via SKGraphics.SetFontCacheCountLimit/SetFontCacheLimit.", "rationale": "The memory growth is due to Skia's global glyph cache (SkStrikeCache), not a raw memory leak in SKTypeface disposal. A contributor confirmed this is by-design caching behavior. The difference between FromFamilyName (no leak) vs FromStream/FromFile (apparent leak) is that Skia deduplicates named system fonts in the cache, whereas stream-loaded fonts each get their own cache entry. Issue #996 described a similar pattern and was closed as fixed in 1.68.1; the current issue is the expected glyph cache behavior with no built-in auto-eviction for stream typefaces. The workaround via SKGraphics.PurgeFontCache() was confirmed by both a community member and the original reporter.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKGraphics.cs", "lines": "14-41", "finding": "SKGraphics.PurgeFontCache(), SetFontCacheCountLimit(int), and SetFontCacheLimit(long) are all publicly available APIs that let callers control and purge Skia's global glyph cache. These are the intended escape valves for this scenario.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "92-113", "finding": "SKTypeface.FromStream converts the managed Stream to an SKMemoryStream, then calls sk_typeface_create_from_stream. The SKTypeface object is ref-counted (ISKReferenceCounted). Disposing the C# wrapper decrements the ref count, but does NOT purge glyph data already placed into Skia's global SkStrikeCache during MeasureText.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "55-71", "finding": "SKTypeface.FromFamilyName calls PreventPublicDisposal() and returns a cached handle — system fonts are deduplicated, explaining why callers do not see memory growth with named fonts.", "relevance": "related"}], "keySignals": [{"text": "Skia is caching glyphs data and is only clearing the cache if it reaches some defined memory usage level.", "source": "comment by contributor @Gillibald", "interpretation": "Confirms by-design caching behavior, not a raw memory leak."}, {"text": "SKGraphics.PurgeFontCache(); — You can also set your own limits in the cache via SKGraphics.SetFontCacheCountLimit / SetFontCacheLimit", "source": "comment by @themcoo", "interpretation": "Confirmed workaround using existing public API."}, {"text": "Huge thanks for your solution. It's solved the problem in attached simple app.", "source": "reporter reply to @themcoo", "interpretation": "PurgeFontCache workaround confirmed working by the original reporter."}, {"text": "At certain stage, app crashed with out of memory problem.", "source": "reporter comment explaining Word-to-PDF batch conversion use case", "interpretation": "Real-world severity: OOM crash in batch document processing with unique embedded fonts per document."}], "workarounds": ["Call SKGraphics.PurgeFontCache() after each document/batch to force-release cached glyph data.", "Call SKGraphics.SetFontCacheCountLimit(n) to cap the number of typeface entries in the cache.", "Call SKGraphics.SetFontCacheLimit(bytes) to cap total cache memory (e.g., SKGraphics.SetFontCacheLimit(1024 * 1024) for 1 MB).", "Cache SKTypeface instances in a static dictionary keyed by font identity (file path or stream hash) to avoid creating duplicate entries."], "nextQuestions": ["Does SKGraphics.PurgeFontCache() also resolve the issue for @afruzan who reported it did not help with FromFile?", "Should SKTypeface.Dispose() automatically call PurgeFontCache for stream-loaded typefaces to match user expectations?"], "resolution": {"hypothesis": "The memory growth is caused by Skia's global glyph cache accumulating entries for each unique stream-loaded typeface. Disposing the SKTypeface only frees the typeface object, not its glyph cache entries. The cache is evicted automatically only when it exceeds a size threshold.", "proposals": [{"title": "Purge font cache after batch", "description": "Call SKGraphics.PurgeFontCache() at the end of each document conversion to release all cached glyph data.", "category": "workaround", "codeSnippet": "// After each document conversion:\nSKGraphics.PurgeFontCache();\n\n// Or set a tight limit at app startup:\nSKGraphics.SetFontCacheCountLimit(2);\nSKGraphics.SetFontCacheLimit(4 * 1024 * 1024); // 4 MB", "confidence": 0.9, "effort": "cost/xs", "validated": "yes"}, {"title": "Cache and reuse SKTypeface instances", "description": "Keep a static dictionary of SKTypeface instances keyed by font identity. Reuse existing typefaces instead of creating new ones from stream each iteration. Only applicable when fonts repeat across documents.", "category": "alternative", "codeSnippet": "private static readonly ConcurrentDictionary<string, SKTypeface> _typefaceCache = new();\n\npublic static SKTypeface GetTypeface(string fontKey, Func<SKTypeface> factory)\n    => _typefaceCache.GetOrAdd(fontKey, _ => factory());", "confidence": 0.8, "effort": "cost/s", "validated": "yes"}], "recommendedProposal": "Purge font cache after batch", "recommendedReason": "Directly addresses the batch document scenario with minimal code change. Confirmed working by the original reporter."}}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.78, "reason": "The memory growth is Skia's intentional glyph caching behavior, not a SkiaSharp bug. The public API (SKGraphics.PurgeFontCache, SetFontCacheLimit) provides full control, and the reporter confirmed the workaround resolves the issue.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp, os/Windows-Classic, tenet/reliability", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "tenet/reliability"]}, {"type": "add-comment", "description": "Explain glyph cache behavior and provide PurgeFontCache workaround", "risk": "medium", "confidence": 0.85, "comment": "Thanks for the detailed report and repro!\n\nThe memory growth you're seeing is caused by Skia's **internal glyph cache** (`SkStrikeCache`). When `MeasureText` is called, Skia renders and caches the glyph metrics for that typeface globally — this cache is not released when you dispose the `SKTypeface`. It's a performance optimization (avoid re-rasterizing the same glyphs), but in a batch scenario with many unique stream-loaded fonts it can grow significantly.\n\nSkiaSharp exposes the cache control APIs you need via `SKGraphics`:\n\n```csharp\n// Option 1: Purge cache after each document conversion\nSKGraphics.PurgeFontCache();\n\n// Option 2: Cap cache size at app startup (e.g., 4 MB)\nSKGraphics.SetFontCacheLimit(4 * 1024 * 1024);\n\n// Option 3: Cap number of cached typefaces\nSKGraphics.SetFontCacheCountLimit(10);\n```\n\nFor your Word-to-PDF scenario, calling `SKGraphics.PurgeFontCache()` after each document conversion should keep memory bounded.\n\nSince this behavior is by design in Skia and the workaround is available via the public API, I'll close this issue. Please reopen if `PurgeFontCache` doesn't fully resolve your use case."}, {"type": "close-issue", "description": "Close as not a bug — by-design Skia glyph caching with documented workaround", "risk": "medium", "confidence": 0.78, "stateReason": "not_planned"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
