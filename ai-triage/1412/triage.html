<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1412, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-22T08:10:00Z"}, "summary": "macOS app crashes with EXC_BAD_ACCESS on the .NET finalizer thread when GPU-backed SkiaSharp objects (SKImage, GRContext) are garbage-collected without the OpenGL context being current, because SKGLView does not override Dispose to release GPU resources on the correct GL thread.", "classification": {"type": {"value": "type/bug", "confidence": 0.9}, "area": {"value": "area/SkiaSharp.Views", "confidence": 0.88}, "platforms": ["os/macOS"], "backends": ["backend/OpenGL"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "crash", "errorMessage": "EXC_BAD_ACCESS (SIGABRT) — abort() called from glDeleteBuffers / glDeleteTextures on Finalizer thread", "stackTrace": "Thread 2 Crashed: Finalizer\n  glDeleteBuffers / glDeleteTextures (libGL.dylib)\n  GrGLBuffer::onRelease / SkImage_Gpu::~SkImage_Gpu (libSkiaSharp.dylib)\n  mono_gc_run_finalize (gc.c:331)", "reproQuality": "partial", "targetFrameworks": ["xamarinmac"]}, "reproEvidence": {"stepsToReproduce": ["Use SKGLView on macOS with Xamarin.Forms", "Call TakeScreenshot() or create GPU-backed SKImage objects in OnPaintSurface handler", "Do not dispose SKImage objects before reassigning", "Let GC run (more likely on low-memory machines) — triggers crash on Finalizer thread"], "environmentDetails": "macOS 10.13.6 (High Sierra), SkiaSharp 2.80.1, Xamarin.Forms 4.6.0.847, MacBook Pro 5,4 with 8 GB RAM, NVIDIA GeForce 9400M (OpenGL)", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/3178", "description": "Related: iOS crash when GC collects SKMetalView resources — same category of bug on iOS/Metal, closed as completed 2025-08-22"}]}, "versionAnalysis": {"mentionedVersions": ["2.80.1"], "currentRelevance": "likely", "relevanceReason": "macOS SKGLView.cs still has no Dispose override to clean up context, surface, renderTarget, and canvas fields on the GL thread."}}, "analysis": {"summary": "The crash is caused by GPU-backed Skia objects (SKImage_Gpu, GrGLBuffer) being finalized on the .NET finalizer thread, which calls OpenGL functions (glDeleteBuffers, glDeleteTextures) without a current GL context. This triggers an abort(). Two contributing factors: (1) the reporter was not calling Dispose() on captured SKImage screenshots, allowing them to accumulate and be GC'd; (2) macOS SKGLView does not override Dispose(bool) to explicitly release GRContext, surface, and renderTarget on the correct GL thread, meaning these GPU resources can always be finalized off-thread.", "rationale": "Reporter provided two crash reports and symbolicated traces confirming the call chain leads from the .NET finalizer thread through Skia GPU resource destruction into libGL.dylib. The reporter found and fixed their immediate bug (undisposed SKImage objects) but a deeper library issue exists: SKGLView.cs (macOS) holds GRContext, SKSurface, GRBackendRenderTarget, and SKCanvas as fields with no Dispose override, so they are always subject to finalizer-thread GL call crashes. This matches the pattern in issue #3178 (iOS SKMetalView, closed as completed in 2025).", "keySignals": [{"text": "Thread 2 Crashed: Finalizer ... glDeleteBuffers + 18 (libGL.dylib) ... GrGLBuffer::onRelease() ... mono_gc_run_finalize", "source": "symbolicated crash report (comment #660056062)", "interpretation": "OpenGL deletion called on finalizer thread without current GL context — root cause of abort()"}, {"text": "My mistake was that I didn't call _test.Dispose() before reassignment my new screenshot to this field.", "source": "reporter comment #660056062", "interpretation": "Reporter's immediate user error — undisposed GPU SKImage accumulates and is GC'd"}, {"text": "It seems to be fixed if this context is properly disposed with SKGLView — source/SkiaSharp.Views/SkiaSharp.Views.Mac/SKGLView.cs#L92", "source": "community commenter (ltetak, comment #718714580)", "interpretation": "Points to the library-level bug: GRContext created in PrepareOpenGL() is never disposed with the view"}, {"text": "Can it be same as #3178 by any chance?", "source": "community commenter (taublast, comment #2954106462, 2025-06-08)", "interpretation": "Links to related iOS/Metal issue (#3178) which was closed as completed — pattern is the same"}], "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views/Platform/macOS/SKGLView.cs", "lines": "28-34", "finding": "Fields context (GRContext), renderTarget (GRBackendRenderTarget), surface (SKSurface), and canvas (SKCanvas) are declared but never disposed in any Dispose override. The class extends NSOpenGLView and has no Dispose(bool disposing) override.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views/Platform/macOS/SKGLView.cs", "lines": "88-95", "finding": "GRContext is created in PrepareOpenGL() (called once when GL context becomes available) but there is no corresponding cleanup when the view is removed from the hierarchy or disposed.", "relevance": "direct"}, {"file": "binding/SkiaSharp/GRContext.cs", "lines": "18-23", "finding": "GRContext.DisposeNative() calls AbandonContext() which calls the native gr_direct_context_abandon_context — a GPU API call. If GRContext is finalized on the .NET finalizer thread (not the GL thread), this native call executes without a current GL context, causing downstream GL resource deletion to abort().", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views/Platform/iOS/SKGLView.cs", "lines": "53-57", "finding": "iOS SKGLView similarly holds GRContext, surface, renderTarget, canvas fields with no Dispose override — same pattern as macOS. iOS variant is obsoleted (OpenGLES deprecated) but same structural issue exists.", "relevance": "related"}], "workarounds": ["Explicitly call Dispose() on all GPU-backed SKImage/SKSurface objects before they go out of scope (especially in OnPaintSurface handlers that capture screenshots via TakeScreenshot())", "Call context.AbandonContext(releaseResources: true) when navigating away from pages containing SKGLView, to release GPU resources while the GL context is still current", "Override OnDisappearing() or equivalent lifecycle hook to call surface?.Dispose(), renderTarget?.Dispose(), context?.Dispose() on the UI thread before the view is removed from the hierarchy", "Call GC.SuppressFinalize(context) after explicitly disposing the GRContext to prevent finalizer thread reentry"], "nextQuestions": ["Was the same fix applied to macOS OpenGL SKGLView as part of the #3178 fix for iOS Metal SKMetalView?", "Does the crash still occur in current SkiaSharp (3.x) on macOS with SKGLView?", "Should SKGLView.cs (macOS) implement IDisposable/Dispose override to abandon/dispose GRContext on the NSOpenGLView thread?"], "errorFingerprint": "glDeleteBuffers-finalizer-thread-skglview-macos-opengl", "resolution": {"hypothesis": "SKGLView (macOS) must override Dispose(bool) to explicitly dispose GPU resources (surface, renderTarget, context) while the OpenGL context is still current on the correct thread, mirroring the fix pattern applied to SKMetalView in issue #3178.", "proposals": [{"title": "Add Dispose override to macOS SKGLView", "description": "Override Dispose(bool) in SKGLView.cs (macOS) to dispose surface, renderTarget, and call context.AbandonContext() / context.Dispose() while making the GL context current. This ensures GPU resources are released on the correct thread, not the finalizer.", "category": "fix", "confidence": 0.82, "effort": "cost/s", "validated": "untested"}, {"title": "Explicit application-level GPU resource disposal", "description": "Users should call Dispose() on all GPU-backed SkiaSharp objects (SKImage, SKSurface) before they go out of scope, and call context.AbandonContext(releaseResources: true) in the view's disappear/dispose lifecycle hook.", "category": "workaround", "confidence": 0.9, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Add Dispose override to macOS SKGLView", "recommendedReason": "The fix should be in the library to prevent crashes for all users, not just those who remember to manually abandon the context. The pattern was already applied to SKMetalView (#3178)."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.8, "reason": "The crash pattern is clearly diagnosed (GL ops on finalizer thread from SKGLView not disposing GRContext), and a related iOS fix was merged (#3178). Investigation is needed to determine whether the macOS OpenGL path received the same fix in current SkiaSharp, and to implement a fix if not.", "suggestedReproPlatform": "macos"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp.Views, os/macOS, backend/OpenGL, tenet/reliability", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp.Views", "os/macOS", "backend/OpenGL", "tenet/reliability"]}, {"type": "link-related", "description": "Cross-reference issue #3178 (iOS/Metal GC crash — same pattern, closed as completed)", "risk": "low", "confidence": 0.88, "linkedIssue": 3178}, {"type": "add-comment", "description": "Acknowledge the user-level fix, explain the library-level issue, and provide workaround guidance", "risk": "medium", "confidence": 0.82, "comment": "Thanks for the detailed investigation and symbolicated stack trace!\n\nThe root crash pattern is clear: when GPU-backed SkiaSharp objects (`SKImage_Gpu`, `GrGLBuffer`) are garbage-collected, their finalizers call OpenGL functions (`glDeleteBuffers`, `glDeleteTextures`) on the .NET Finalizer thread — but those GL calls require a current OpenGL context, which the finalizer thread does not have. This causes `abort()`.\n\nYou correctly identified the immediate cause (not calling `Dispose()` on captured `SKImage` screenshots). As a broader workaround:\n\n1. **Always dispose GPU-backed objects explicitly** before they go out of scope — especially `SKImage` objects from `TakeScreenshot()`.\n2. **Call `context.AbandonContext(releaseResources: true)`** in your page/view disappear lifecycle hook (before the view is removed from the hierarchy).\n3. **Dispose surface, renderTarget, and context** on the UI thread when done.\n\nThe underlying library issue is that `SKGLView` (macOS) does not override `Dispose()` to release the `GRContext` and related GPU resources while the OpenGL context is current on the correct thread. A similar issue was fixed for iOS `SKMetalView` in #3178."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
