<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3229, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T14:56:22Z", "currentLabels": ["type/bug", "os/Linux", "area/libSkiaSharp.native", "tenet/reliability", "triage/triaged"]}, "summary": "libSkiaSharp.so on Linux arm64 and riscv64 fails to load with 'undefined symbol: FT_Get_BDF_Property' because the bundled fontconfig was built against a newer FreeType version that exports this BDF symbol, but the system's installed FreeType lacks it (e.g., Debian Bookworm FreeType 2.12.x compiled without BDF support).", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.95}, "platforms": ["os/Linux"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "crash", "errorMessage": "symbol lookup error: libSkiaSharp.so: undefined symbol: FT_Get_BDF_Property", "reproQuality": "complete", "targetFrameworks": ["net9.0"]}, "reproEvidence": {"stepsToReproduce": ["Run a .NET 9.0 application referencing SkiaSharp 3.119.0-preview on Linux RISC-V 64 or ARM64", "The process immediately exits with 'symbol lookup error: libSkiaSharp.so: undefined symbol: FT_Get_BDF_Property'"], "environmentDetails": "RISC-V 64 (AOSC OS 12.1 / QEMU), also confirmed on ARM64 (Raspberry Pi Debian Bookworm, Pi 5), SkiaSharp 3.119.0-preview.1.2 / 3.119.0, .NET 8 and 9", "relatedIssues": [3272, 3436], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/pull/3221", "description": "PR referenced in issue thread (possibly related fix)"}, {"url": "https://github.com/unoplatform/uno/issues/20429", "description": "Same error on RPi CM4 via Uno Platform"}, {"url": "https://github.com/linuxserver/docker-jellyfin/issues/298", "description": "Same error reported in Jellyfin on Pi5 arm64"}]}, "versionAnalysis": {"mentionedVersions": ["3.119.0-preview.1.2", "3.119.0", "3.116.0"], "workedIn": "3.116.0", "brokeIn": "3.119.0-preview.1.2", "currentRelevance": "likely", "relevanceReason": "Issue is still open and multiple users confirm it on SkiaSharp 3.119.0 final; the Dockerfile build matrix shows the fontconfig version divergence remains."}}, "analysis": {"summary": "libSkiaSharp.so for Linux (arm64 / riscv64) is dynamically linked against the system libfontconfig. The build Docker image uses fontconfig 2.15.0-2.3 for riscv64 and 2.13.1-2 for other arches. Both fontconfig versions reference FT_Get_BDF_Property from libfreetype. On end-user systems running Debian Bookworm (FreeType 2.12.x) or any distro where FreeType was compiled without BDF support (TT_CONFIG_OPTION_BDF), the symbol is absent at runtime and the binary fails to load.", "codeInvestigation": [{"file": "scripts/Docker/debian/10/Dockerfile", "lines": "59-61", "finding": "riscv64 is built against fontconfig 2.15.0-2.3 (from Debian trixie), while arm, arm64, x86, x64 use fontconfig 2.13.1-2 (from Debian buster archive). Both versions use FT_Get_BDF_Property from libfreetype at runtime.", "relevance": "direct"}, {"file": "native/linux/build.cake", "lines": "108", "finding": "skia_use_system_freetype2=false — Skia compiles its own freetype sources, but fontconfig is NOT listed as a system-override, so the SkiaSharp .so dynamically links against the system libfontconfig at runtime, which in turn expects a compatible libfreetype from the OS.", "relevance": "direct"}, {"file": "documentation/dev/packages.md", "lines": "183-195", "finding": "The Troubleshooting section already documents this error pattern: 'A .so was found and loaded, but it has a dependency that isn't installed'. The fix documented is to switch to SkiaSharp.NativeAssets.Linux.NoDependencies. However, no mention of the FT_Get_BDF_Property symptom or specific FreeType version requirements.", "relevance": "related"}, {"file": "scripts/Docker/debian/10/Dockerfile", "lines": "96-99", "finding": "Bionic variant uses skia_use_fontconfig=false to disable fontconfig entirely — this is the same approach that NoDependencies uses to avoid the fontconfig/freetype runtime dependency chain.", "relevance": "related"}], "keySignals": [{"text": "symbol lookup error: /home/gamma/Downloads/WattToolkit/native/linux-riscv64/libSkiaSharp.so: undefined symbol: FT_Get_BDF_Property", "source": "issue body", "interpretation": "libSkiaSharp.so loaded successfully but a symbol it (or its transitive dependency fontconfig) requires is missing from the system libfreetype."}, {"text": "This issue also happens on linux-arm64", "source": "comment by jeromelaban", "interpretation": "Not riscv64-specific — affects any Linux arch where the system freetype lacks FT_Get_BDF_Property (BDF support not compiled in, or version too old)."}, {"text": "it's not specific to riscv64. you will find the same issue with x86_64 etc. with same (new) version of fontconfig", "source": "comment by kasperk81", "interpretation": "The root issue is the fontconfig version on the system, not the architecture. Any system with a fontconfig that references FT_Get_BDF_Property from a FreeType version that doesn't have it will fail."}, {"text": "export LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libfreetype.so.6 / dotnet run", "source": "comment by YuriiYa", "interpretation": "Workaround confirmed: forcing the loader to use the correctly built system FreeType (one with BDF support) resolves the error."}], "rationale": "This is a genuine native packaging bug. The NativeAssets.Linux package dynamically links fontconfig, which has a transitive runtime dependency on a specific FreeType version with BDF support. Users on Debian Bookworm (FreeType 2.12.x) and RPi/ARM64 devices hit this. The NoDependencies variant avoids it entirely. The bug is in the mismatch between what FreeType version fontconfig expects vs. what is available on common distro versions.", "workarounds": ["Use SkiaSharp.NativeAssets.Linux.NoDependencies instead of SkiaSharp.NativeAssets.Linux — this variant has no fontconfig/freetype runtime deps", "Install a FreeType with BDF support and force-load it: sudo apt-get install -y libfreetype6 libfontconfig1 && export LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libfreetype.so.6", "For systemd services, add Environment=LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libfreetype.so.6 to the [Service] section"], "nextQuestions": ["What exact FreeType version and compile flags are present on the failing systems? (ldd /usr/lib/aarch64-linux-gnu/libfreetype.so.6)", "Would switching to static fontconfig linkage or providing a statically-bundled freetype (similar to how harfbuzz is handled) resolve this for the standard Linux package?", "Is the FT_Get_BDF_Property requirement coming from fontconfig itself or another Skia dependency?", "Should the docs update to list the required libfreetype version per architecture?"], "resolution": {"hypothesis": "fontconfig (dynamically linked into libSkiaSharp) uses FT_Get_BDF_Property from libfreetype at runtime. When the system FreeType lacks BDF support or is too old, the symbol is missing.", "proposals": [{"title": "Switch to NoDependencies package", "description": "Use SkiaSharp.NativeAssets.Linux.NoDependencies instead of SkiaSharp.NativeAssets.Linux. This build has no fontconfig/freetype runtime deps and avoids the issue entirely. Fonts must be loaded explicitly (no system font enumeration).", "category": "workaround", "confidence": 0.95, "effort": "cost/xs", "validated": "yes"}, {"title": "LD_PRELOAD compatible libfreetype", "description": "Install libfreetype6 and libfontconfig1, then set LD_PRELOAD to point to the installed libfreetype.so.6. This forces the dynamic linker to use a FreeType with BDF support.", "codeSnippet": "sudo apt-get install -y libfreetype6 libfontconfig1\nexport LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libfreetype.so.6\ndotnet run", "category": "workaround", "confidence": 0.85, "effort": "cost/xs", "validated": "yes"}, {"title": "Investigate static fontconfig linkage in native build", "description": "Explore whether libfontconfig can be statically linked into libSkiaSharp (like libstdc++ is today) to avoid the runtime FreeType dependency chain, or whether the fontconfig version used in the Dockerfile should be aligned with the system's FreeType version.", "category": "fix", "confidence": 0.65, "effort": "cost/l", "validated": "untested"}], "recommendedProposal": "Switch to NoDependencies package", "recommendedReason": "Zero-risk workaround available immediately. NoDependencies is already documented as the recommended package for containers and minimal environments. Users who need system font enumeration should use the LD_PRELOAD workaround until the native build is fixed."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.85, "reason": "Clear bug with real-world impact on ARM64/RISC-V Linux devices. Root cause (fontconfig/freetype version mismatch at runtime) is understood; the fix path (static fontconfig linkage or aligned freetype version) needs engineering investigation. Workarounds exist and should be communicated.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/libSkiaSharp.native, os/Linux, tenet/reliability labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/libSkiaSharp.native", "os/Linux", "tenet/reliability"]}, {"type": "add-comment", "description": "Post workarounds and root cause analysis", "risk": "medium", "confidence": 0.88, "comment": "Thanks for the detailed report, and to everyone who added context in the comments.\n\n**Root cause:** `libSkiaSharp.so` (standard Linux package) is dynamically linked against the system `libfontconfig`, which in turn requires `FT_Get_BDF_Property` from `libfreetype`. On Debian Bookworm, Raspberry Pi OS, and similar distros, the installed FreeType may be compiled without BDF support, causing the symbol lookup failure at runtime.\n\n**Workaround 1 (recommended for containers / minimal environments):** Switch to the `NoDependencies` package, which has no fontconfig or FreeType runtime dependencies:\n```xml\n<!-- Remove this -->\n<PackageReference Include=\"SkiaSharp.NativeAssets.Linux\" Version=\"3.119.0\" />\n<!-- Add this -->\n<PackageReference Include=\"SkiaSharp.NativeAssets.Linux.NoDependencies\" Version=\"3.119.0\" />\n```\nNote: with `NoDependencies`, you must load fonts explicitly (system font enumeration via `SKFontManager` won't return system fonts).\n\n**Workaround 2 (for standard Linux, keep fontconfig):** Install the required FreeType and force-load it:\n```bash\nsudo apt-get install -y libfreetype6 libfontconfig1\nexport LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libfreetype.so.6\ndotnet run\n```\nFor systemd services, add to the `[Service]` section:\n```\nEnvironment=LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libfreetype.so.6\n```\n\nWe're investigating a longer-term fix in the native build to eliminate the runtime FreeType version sensitivity."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
