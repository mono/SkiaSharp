e issue — three SkLabel instances in different layouts"}, {"url": "https://github.com/mono/SkiaSharp/issues/2811", "description": "Related issue #2811: MeasureOverride result not respected in MAUI layout, same class of problem"}, {"url": "https://github.com/dotnet/maui/issues/4019#issuecomment-1510654509", "description": "MAUI upstream issue with workaround referenced by related issue #2811"}]}, "versionAnalysis": {"mentionedVersions": ["3.116.0", "3.116.1", "2.88.9"], "workedIn": "2.88.9", "brokeIn": "3.116.0", "currentRelevance": "likely", "relevanceReason": "No fix or related PR found for this issue; SKCanvasViewHandler command mapper still does not override InvalidateMeasure handling"}, "regression": {"isRegression": true, "confidence": 0.9, "reason": "Reporter explicitly states the behavior worked in SkiaSharp 2.88.9 (Xamarin.Forms era) and broke in 3.x MAUI. The MAUI view handler architecture differs fundamentally from Xamarin.Forms renderers.", "workedInVersion": "2.88.9", "brokeInVersion": "3.116.0"}}, "analysis": {"summary": "SKCanvasViewHandler does not override GetDesiredSize to delegate to the MAUI virtual view's MeasureOverride. After the first measure pass, MAUI's layout engine caches the platform view's intrinsic size. Subsequent InvalidateMeasure() calls trigger the MAUI IView.InvalidateMeasure() chain (which calls the base ViewHandler's MapInvalidateMeasure) but since GetDesiredSize returns the native view's size rather than invoking MeasureOverride, the layout does not re-measure the virtual view. Setting HeightRequest/WidthRequest bypasses MAUI's measurement caching, which is why the workaround works.", "rationale": "The issue is clearly a regression introduced by the MAUI migration. The Xamarin.Forms renderer used OnMeasure which was called repeatedly; the MAUI handler-based architecture uses GetDesiredSize which is only delegated if the handler overrides it. SKCanvasViewHandler lacks this override, causing silent measurement caching. This is a SkiaSharp responsibility to fix in the handler layer, not purely a MAUI bug.", "codeInvestigation": [{"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Handlers/SKCanvasView/SKCanvasViewHandler.cs", "lines": "1-31", "finding": "SKCanvasViewCommandMapper only maps InvalidateSurface — there is no GetDesiredSize override and no special handling for the InvalidateMeasure command beyond what the base ViewHandler.ViewCommandMapper provides", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Controls/SKCanvasView.cs", "lines": "1-67", "finding": "SKCanvasView (MAUI Controls) does not override MeasureOverride itself — that is left to subclasses. No mechanism exists to notify the handler that the desired size has changed.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Handlers/SKCanvasView/SKCanvasViewHandler.Windows.cs", "lines": "1-89", "finding": "Windows handler creates an SKXamlCanvas but does not override GetDesiredSize. When MAUI asks for the view's desired size it falls through to the base handler which measures the native XAML control's intrinsic size, ignoring the virtual view's MeasureOverride result.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Handlers/SKCanvasView/SKCanvasViewHandler.Android.cs", "lines": "1-79", "finding": "Android handler also does not override GetDesiredSize — same root cause applies cross-platform even though reporter only tested on Windows.", "relevance": "related"}], "keySignals": [{"text": "After the first MeasureOverride occurs, calling InvalidateMeasure no longer causes MeasureOverride to occur.", "source": "issue body", "interpretation": "Confirms measurement caching: MAUI caches size after first measure and does not re-invoke MeasureOverride unless the handler provides a fresh desired size."}, {"text": "explicitly setting HeightRequest in these two methods is required to workaround the issue", "source": "issue body", "interpretation": "Setting HeightRequest bypasses MAUI measurement caching by providing an explicit size constraint, confirming the root cause is in the measurement pipeline rather than painting."}, {"text": "The two nested SkLabel instances don't resize unless the 'Try Workaround' checkbox is checked.", "source": "comment by DanTravison", "interpretation": "Root layout SkLabel works (MAUI may handle root layout measure differently) but nested layouts fail — consistent with measurement caching only affecting constraint-propagation in nested layouts."}, {"text": "overriding SKCanvasViewHandler.GetDesiredSize does not fix the issue for me. I must still set HeightRequest", "source": "comment by DanTravison (2025-06-18)", "interpretation": "Overriding GetDesiredSize alone is insufficient — the fix must also ensure MAUI re-runs layout after property changes, suggesting the IView.InvalidateMeasure contract needs additional implementation in the handler or the virtual view."}], "nextQuestions": ["Does the bug reproduce on Android/iOS, or is it Windows-specific?", "Which MAUI version is in use? The layout caching behavior may differ between MAUI versions.", "Is SKGLView affected by the same issue?"], "workarounds": ["Set HeightRequest (and/or WidthRequest) to the computed desired height in MeasureOverride and in the property-changed handler that calls InvalidateMeasure — this forces MAUI to respect the explicit size and re-layout.", "Override SKCanvasViewHandler.GetDesiredSize in a custom handler and register it via MauiAppBuilder.ConfigureMauiHandlers — note that reporter found this alone did not fully resolve the issue without also setting HeightRequest."], "resolution": {"hypothesis": "SKCanvasViewHandler needs to override GetDesiredSize to call the virtual view's MeasureOverride (via VirtualView.Measure / VirtualView.DesiredSize) and ensure that the MAUI IView.InvalidateMeasure command properly propagates to the platform native view's layout invalidation so subsequent measures are triggered.", "proposals": [{"title": "Override GetDesiredSize in SKCanvasViewHandler to delegate to MeasureOverride", "description": "Add a GetDesiredSize override in each platform-specific SKCanvasViewHandler that calls VirtualView.Measure(widthConstraint, heightConstraint) and returns the resulting DesiredSize. This ensures MAUI calls MeasureOverride on the virtual view rather than using the native view's intrinsic size.", "category": "fix", "confidence": 0.72, "effort": "cost/s", "validated": "untested"}, {"title": "Set HeightRequest/WidthRequest in the property-changed handler", "description": "In the custom SKCanvasView subclass, after computing the desired size, explicitly set HeightRequest and WidthRequest to the computed values. This bypasses MAUI measurement caching entirely.", "category": "workaround", "confidence": 0.9, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Set HeightRequest/WidthRequest in the property-changed handler", "recommendedReason": "Confirmed by reporter to work reliably, no SkiaSharp source changes needed, immediately applicable."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.85, "reason": "Confirmed regression with a minimal repro app, clear call stack, and consistent failure mode. Root cause is in SKCanvasViewHandler's measurement delegation to MAUI. Needs deeper investigation into MAUI layout engine interaction and a fix in the handler layer.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply bug, MAUI views area, Windows platform, reliability/compatibility tenets, and MAUI partner labels", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/SkiaSharp.Views.Maui", "os/Windows-Classic", "tenet/reliability", "tenet/compatibility", "partner/maui"]}, {"type": "link-related", "description": "Cross-reference related issue #2811 which describes the same MeasureOverride/OnSizeAllocated mismatch in MAUI", "risk": "low", "confidence": 0.9, "linkedIssue": 2811}, {"type": "add-comment", "description": "Post analysis with workaround and investigation notes", "risk": "medium", "confidence": 0.85, "comment": "Thanks for the detailed repro — the minimal sample app makes this much easier to investigate.\n\nThe root cause appears to be that `SKCanvasViewHandler` does not override `GetDesiredSize`, so MAUI's layout engine uses the native platform view's intrinsic size rather than calling your `MeasureOverride`. After the first measure pass, MAUI caches this size, and subsequent `InvalidateMeasure()` calls don't trigger another `MeasureOverride` invocation because the handler never returns a fresh desired size.\n\n**Workaround (confirmed by reporter):** In your property-changed handler (e.g. `InvalidateTextMetrics`), explicitly set `HeightRequest` and `WidthRequest` to the values you compute for the new size. This bypasses MAUI's measurement cache and forces re-layout.\n\nThis is related to #2811 which describes a similar sizing mismatch with `SKCanvasView` in MAUI. The fix will require overriding `GetDesiredSize` in `SKCanvasViewHandler` to properly delegate to the virtual view's `MeasureOverride`.\n\nA few questions to help investigation:\n- Does this also reproduce on Android or iOS, or only on Windows?\n- Which .NET MAUI version are you targeting?"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
