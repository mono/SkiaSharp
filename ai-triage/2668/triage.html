<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2668, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-27T23:32:46Z", "currentLabels": ["type/feature-request"]}, "summary": "Request for SkiaSharp PDF output to preserve 1bpp (monochrome) image color depth instead of upsampling to 24bpp, which causes a ~10× file size increase in scanned-document workflows.", "classification": {"type": {"value": "type/feature-request", "confidence": 0.93}, "area": {"value": "area/SkiaSharp", "confidence": 0.85}, "backends": ["backend/PDF"], "tenets": ["tenet/performance"]}, "evidence": {"reproEvidence": {"stepsToReproduce": ["Take a scanned PDF containing 1bpp images (~4 MB).", "Print it to XPS, retaining 1bpp.", "Modify the XPS file while keeping 1bpp images.", "Use SkiaSharp to re-encode the XPS to a new PDF.", "Observe the output PDF is 40+ MB because images are stored as 24bpp."], "environmentDetails": "SkiaSharp PDF backend; XPS→PDF workflow on Windows", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/848", "description": "Related: PDF output size request for general PDF compression options"}]}, "versionAnalysis": {"mentionedVersions": [], "currentRelevance": "likely", "relevanceReason": "SKDocumentPdfMetadata still has no color-depth controls; the issue is architectural rather than version-specific."}}, "analysis": {"summary": "SkiaSharp's PDF pipeline always rasterizes through its full-color canvas (BGRA8888 or similar), losing the original 1bpp depth. No API currently lets callers request monochrome or grayscale-only PDF image encoding. Skia's PDF backend does have internal paths for encoding lower-depth images (e.g., CCITTFax for 1bpp), but none are surfaced in the C API or SkiaSharp metadata struct. Implementing this would require Skia-level changes plus a new SKDocumentPdfMetadata field.", "rationale": "This is a feature request because the current behavior is by design: Skia's canvas model normalizes all pixel data through its color pipeline, discarding the source bit depth. No existing SkiaSharp or Skia API allows round-tripping 1bpp images through PDF. The issue is valid and has community interest (+3 reactions, original author follow-up in 2025), but requires upstream Skia changes to expose CCITTFax/monochrome image embedding to SkiaSharp.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKDocument.cs", "lines": "78-177", "finding": "All CreatePdf() overloads ultimately pass only SKDocumentPdfMetadata to sk_document_create_pdf_from_stream_with_metadata. No color-depth or pixel-format parameter exists on this code path.", "relevance": "direct"}, {"file": "binding/SkiaSharp/Definitions.cs", "lines": "385-496", "finding": "SKDocumentPdfMetadata exposes Title, Author, Subject, Keywords, Creator, Producer, Creation, Modified, RasterDpi, PdfA, and EncodingQuality. There is no color-type, bit-depth, or grayscale option. Adding a new field (e.g., PreferGrayscale or ImageColorDepth) would be the correct extension point.", "relevance": "direct"}, {"file": "binding/SkiaSharp/Definitions.cs", "lines": "36-79", "finding": "SKColorType includes Gray8 (8bpp grayscale) but no 1bpp monochrome type. Skia has no kMono_SkColorType; true 1bpp output would require embedding pre-encoded CCITTFax image data rather than going through the pixel pipeline.", "relevance": "related"}, {"file": "binding/SkiaSharp/SkiaApi.generated.cs", "lines": "18779-18813", "finding": "SKDocumentPdfMetadataInternal mirrors the C sk_document_pdf_metadata_t struct: fTitle, fAuthor, fSubject, fKeywords, fCreator, fProducer, fCreation, fModified, fRasterDPI, fPDFA, fEncodingQuality. No color-depth field exists at the native boundary.", "relevance": "direct"}], "keySignals": [{"text": "the resulting pdf file now has a file size of 40+mb because all the 1bpp images are automatically converted to 24bpp by SkiaSharp", "source": "issue body", "interpretation": "Core of the request: SkiaSharp's PDF rasterizer normalizes bit depth to 24bpp, inflating scanned-document PDFs by ~10×."}, {"text": "input (PDF) --> printed (XPS) --> changes (XPS) --> save with SkiaSharp (PDF) / 1 bpp --> 1 bpp --> 1 bpp --> 24 bpp", "source": "issue body", "interpretation": "The full pipeline preserves 1bpp everywhere except the final SkiaSharp PDF step, confirming the issue is in SKDocument/PDF encoding."}, {"text": "Any updates on this? As PDF files made with SkiaSharp really grow a lot this way.", "source": "comment by wstaelens (2025-09-17)", "interpretation": "Original reporter bumped after ~2 years; still unresolved and actively impacting them."}], "workarounds": ["Use SKColorType.Gray8 when drawing the canvas surface to reduce from 24bpp to 8bpp. This cuts image data to 1/3 the size but not to 1bpp.", "Lower EncodingQuality in SKDocumentPdfMetadata (e.g., 50-75) to apply JPEG compression to images. This reduces file size at the cost of sharpness — not acceptable for scanned documents per reporter.", "Use an alternative PDF library (e.g., PDFSharp, iText7, or Windows WIC/Direct2D PDF APIs) that supports CCITT/G4 1bpp image encoding natively for the final PDF save step."], "nextQuestions": ["Does Skia's C++ SkPDF::MakeDocument support a metadata flag or image-encoding hint for monochrome/CCITTFax encoding?", "Is there a way to embed a pre-encoded CCITT image as an opaque PDF image via SkiaSharp without going through the canvas pixel pipeline?", "Would a new SKDocumentPdfMetadata.Grayscale bool (similar to how SkPaint uses SKHighContrastConfig) be sufficient to request grayscale PDF output?"], "resolution": {"hypothesis": "The SkiaSharp PDF backend would need to expose a color-depth hint (e.g., grayscale/monochrome mode) in SKDocumentPdfMetadata, backed by a new field in the Skia C API, that tells the PDF image encoder to use lower-bit encodings (e.g., CCITTFax G4 for 1bpp).", "proposals": [{"title": "Workaround: draw using Gray8 surface", "description": "Create the PDF canvas surface with SKColorType.Gray8 and SKAlphaType.Opaque. This halves depth from 24bpp to 8bpp/grayscale, reducing file size by ~3×. Won't achieve 1bpp but is an immediate improvement for monochrome scans.", "category": "workaround", "confidence": 0.7, "effort": "cost/xs", "validated": "untested"}, {"title": "Feature: add color-depth/grayscale option to SKDocumentPdfMetadata", "description": "Add a new field (e.g., bool Grayscale or enum ImageDepth) to SKDocumentPdfMetadata and the underlying sk_document_pdf_metadata_t C struct. The Skia PDF backend would use this hint to select a lower-depth image encoding path (Gray8 or CCITTFax). Requires changes to the native C API shim and Skia's PDF backend.", "category": "fix", "confidence": 0.65, "effort": "cost/l", "validated": "untested"}, {"title": "Alternative: use a dedicated PDF library for the save step", "description": "Replace the SkiaSharp PDF save step with a library that natively supports CCITT/G4 compression (PDFSharp 6.x, iText7, or Windows WIC PDF). This avoids the color-depth limitation entirely for the final save step.", "category": "alternative", "confidence": 0.9, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Alternative: use a dedicated PDF library for the save step", "recommendedReason": "Highest confidence and immediately actionable. SkiaSharp's canvas model is not designed for round-trip PDF image manipulation; a purpose-built PDF library is the correct tool for lossless 1bpp PDF encoding."}}, "output": {"actionability": {"suggestedAction": "keep-open", "confidence": 0.82, "reason": "Valid feature request with community interest (+3 reactions, author follow-up). The request requires upstream Skia C API changes plus SkiaSharp wrapper updates; keeping open to track the enhancement.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/feature-request, area/SkiaSharp, backend/PDF, tenet/performance labels", "risk": "low", "confidence": 0.92, "labels": ["type/feature-request", "area/SkiaSharp", "backend/PDF", "tenet/performance"]}, {"type": "link-related", "description": "Cross-reference issue #848 (PDF output size, general compression)", "risk": "low", "confidence": 0.88, "linkedIssue": 848}, {"type": "add-comment", "description": "Acknowledge request, explain root cause, provide workarounds", "risk": "medium", "confidence": 0.82, "comment": "Thanks for the detailed description and the pipeline diagram — that makes the issue very clear.\n\n**Root cause:** SkiaSharp's PDF canvas normalises all pixel data through Skia's full-colour rendering pipeline, which does not preserve the original 1bpp depth of the source images. The `SKDocumentPdfMetadata` struct currently has no option to request a lower-depth image encoding.\n\n**Workarounds you can try now:**\n\n1. **Gray8 canvas** — create your drawing surface with `SKColorType.Gray8` and `SKAlphaType.Opaque`. This reduces image data from 24bpp to 8bpp (a 3× saving), though not to 1bpp:\n   ```csharp\n   // Example: draw into a grayscale surface\n   var info = new SKImageInfo(width, height, SKColorType.Gray8, SKAlphaType.Opaque);\n   using var surface = SKSurface.Create(info);\n   // ... draw on surface.Canvas ...\n   ```\n2. **Lower JPEG quality** — set `EncodingQuality` in `SKDocumentPdfMetadata` (e.g. `80`) to apply JPEG compression. This reduces file size but at the cost of sharpness, which you've noted is not acceptable.\n3. **Alternative PDF library** — for a lossless 1bpp/CCITT-G4 PDF save step, a dedicated PDF library (PDFSharp 6.x, iText7, or the Windows WIC PDF APIs) is the right tool. SkiaSharp's canvas model is a general 2D drawing API and isn't designed for lossless PDF round-tripping.\n\nA proper fix would require adding a `Grayscale` (or `MonochromeImageEncoding`) flag to `SKDocumentPdfMetadata` and exposing CCITTFax image embedding in the Skia C API — a non-trivial upstream change. Keeping this open to track the enhancement."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
