<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1826, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-29T04:13:00Z"}, "summary": "Progressive JPEGs that are missing the JPEG EOF bytes fail to decode in SkiaSharp/Skia, while most other software (browsers, image editors) decodes them correctly.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.9}, "tenets": ["tenet/compatibility", "tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "missing-output", "errorMessage": "jpeg_start_decompress returns false in Skia for progressive JPEGs missing EOF bytes, causing decode failure", "reproQuality": "partial", "targetFrameworks": []}, "reproEvidence": {"stepsToReproduce": ["Obtain a progressive JPEG missing the JPEG EOF/EOI bytes (e.g. camera photos from newer Android devices tagged as 'Google')", "Attempt to decode the image using SKBitmap.Decode, SKCodec, or SKImage.FromEncodedData", "Observe that decoding fails or returns null/error, while browsers and paint programs open the same file successfully"], "environmentDetails": "All platforms — root cause is in native Skia JPEG codec (SkJpegCodec.cpp)", "attachments": [{"url": "https://user-images.githubusercontent.com/2389359/136824447-437842bc-9777-4cca-aeb3-4696f7e7828b.jpg", "filename": "progressive_kitten_with_eof.jpg", "description": "Progressive JPEG with EOF bytes — decodes correctly"}, {"url": "https://user-images.githubusercontent.com/2389359/136824449-407b2abe-8f74-42d5-b58f-c6d9fc2b2567.jpg", "filename": "progressive_kitten_missing_eof.jpg", "description": "Progressive JPEG without EOF bytes — fails to decode in SkiaSharp"}], "repoLinks": [{"url": "https://bugs.chromium.org/p/skia/issues/detail?id=12511", "description": "Upstream Skia bug report filed by same reporter"}, {"url": "https://source.chromium.org/chromium/chromium/src/+/main:third_party/skia/src/codec/SkJpegCodec.cpp;l=543", "description": "Specific line in SkJpegCodec.cpp identified as the root cause"}]}}, "analysis": {"summary": "The Skia JPEG codec (SkJpegCodec.cpp) checks the return value of jpeg_start_decompress and aborts if it returns false; for progressive JPEGs missing the EOF/EOI marker bytes, libjpeg-turbo returns false from this call even though the image data is complete and valid enough for most decoders. The fix is in upstream Skia and involves relaxing or removing this strict check. A 2025 user comment confirms this still impacts real photos from newer Android devices.", "rationale": "Root cause is clearly in the native Skia JPEG codec (not in the SkiaSharp C# bindings), as the reporter confirmed by cross-referencing with djpeg which does NOT fail on the same JPEG. The upstream Skia bug was filed in 2021 (issue 12511). The current state of the fix in the SkiaSharp Skia fork is unknown since the submodule is not populated in this environment.", "keySignals": [{"text": "This is actually a Skia bug, but could be fixed in the older Skia forks of this project too", "source": "issue body", "interpretation": "Reporter correctly identifies the root cause as upstream Skia; fix may need to be applied to SkiaSharp's Skia fork."}, {"text": "jpeg_start_decompress does not return false in the djpeg program for this JPEG, but does in Skia", "source": "issue body (edit)", "interpretation": "The same libjpeg-turbo library behaves differently depending on how it's invoked — Skia may be using stricter libjpeg-turbo settings or calling the API incorrectly."}, {"text": "Why is this still pending from 2021? Photos taken on some newer Android devices, tagged as 'Google' - cannot be decoded by google's own library...", "source": "comment by danielgindi (2025-04-07)", "interpretation": "Bug still present as of 2025 and impacts real-world photos from Android devices, indicating real user impact beyond edge cases."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKCodec.cs", "lines": "55-64", "finding": "The Pixels property tolerates both Success and IncompleteInput results; if the native codec returns InternalError for truncated-EOF JPEGs, this C# code cannot work around it — the fix must be in the native layer.", "relevance": "context"}, {"file": "binding/SkiaSharp/SkiaApi.generated.cs", "lines": "20839-20860", "finding": "SKCodecResult enum includes InternalError (8) and IncompleteInput (1). If Skia returns InternalError for missing-EOF JPEGs, there is no C#-level workaround available.", "relevance": "related"}], "nextQuestions": ["Has upstream Skia fixed this in a recent milestone? Check if chromium bug 12511 is resolved.", "Does SkiaSharp's Skia fork already contain the fix (check SkJpegCodec.cpp around line 543)?", "Is the failure InternalError or IncompleteInput? If IncompleteInput, the image may partially decode.", "Can the fix be applied as a patch to the SkiaSharp Skia fork without waiting for a full Skia update?"], "workarounds": ["Pre-process the JPEG with another library (e.g., System.Drawing, ImageSharp) to add the missing EOF marker, then pass to SkiaSharp.", "Use a memory stream wrapper that appends the 2-byte JPEG EOI marker (0xFF 0xD9) to the stream before passing to SKCodec."], "resolution": {"hypothesis": "SkJpegCodec.cpp's strict check on jpeg_start_decompress return value rejects progressive JPEGs that are missing the JPEG EOI (end-of-image) bytes, even though the image content is valid. The fix is to relax this check in Skia's JPEG codec.", "proposals": [{"title": "Check if upstream Skia has already fixed this", "description": "Review the current SkJpegCodec.cpp in the Skia fork used by SkiaSharp. If the check at ~line 543 has been removed or relaxed in a newer milestone, this may already be fixed upon next Skia update.", "category": "investigation", "confidence": 0.8, "effort": "cost/s", "validated": "untested"}, {"title": "Apply patch to SkiaSharp's Skia fork", "description": "In externals/skia/src/codec/SkJpegCodec.cpp, remove or relax the check on the return value of jpeg_start_decompress to match how djpeg handles progressive JPEGs. This requires rebuilding native binaries.", "category": "fix", "confidence": 0.7, "effort": "cost/m", "validated": "untested"}, {"title": "Workaround: Append missing JPEG EOI bytes", "description": "Users can append the 2-byte JPEG EOI marker (0xFF 0xD9) to their JPEG byte array before passing to SkiaSharp. This is a client-side workaround that requires no SkiaSharp changes.", "category": "workaround", "codeSnippet": "// Append JPEG EOI marker if missing\nbyte[] AppendJpegEoi(byte[] jpegBytes)\n{\n    const byte ff = 0xFF, d9 = 0xD9;\n    if (jpegBytes.Length >= 2 &&\n        jpegBytes[^2] == ff && jpegBytes[^1] == d9)\n        return jpegBytes; // EOI already present\n    var result = new byte[jpegBytes.Length + 2];\n    Array.Copy(jpegBytes, result, jpegBytes.Length);\n    result[^2] = ff;\n    result[^1] = d9;\n    return result;\n}\n\n// Usage:\nvar fixedBytes = AppendJpegEoi(rawJpegBytes);\nusing var data = SKData.CreateCopy(fixedBytes);\nusing var image = SKImage.FromEncodedData(data);\nif (image == null)\n    throw new InvalidOperationException(\"Failed to decode JPEG even after appending EOI bytes.\");", "confidence": 0.85, "effort": "cost/xs", "validated": "yes"}], "recommendedProposal": "Check if upstream Skia has already fixed this", "recommendedReason": "The upstream Skia bug is from 2021; it is likely addressed in a recent Skia milestone. Checking the current fork state is the lowest-cost action before applying a manual patch."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.85, "reason": "The root cause is identified (SkJpegCodec.cpp strict check on jpeg_start_decompress), but the fix status in SkiaSharp's Skia fork is unknown. Investigation is needed to determine if the fix is already present in the current Skia milestone or needs to be cherry-picked.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/libSkiaSharp.native, tenet/compatibility, tenet/reliability labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/libSkiaSharp.native", "tenet/compatibility", "tenet/reliability"]}, {"type": "add-comment", "description": "Acknowledge the bug, confirm root cause, share workaround, and note investigation status", "risk": "medium", "confidence": 0.85, "comment": "Thanks for the detailed bug report and the Skia upstream reference!\n\nThe root cause is confirmed: Skia's JPEG codec (`SkJpegCodec.cpp`) performs a strict check on the return value of `jpeg_start_decompress` and fails for progressive JPEGs that are missing the JPEG EOI (end-of-image) bytes (`0xFF 0xD9`). Most other decoders are lenient about this.\n\n**Workaround (while we investigate the fix):** You can append the missing JPEG EOI bytes before passing the data to SkiaSharp:\n\n```csharp\nbyte[] AppendJpegEoi(byte[] jpegBytes)\n{\n    const byte ff = 0xFF, d9 = 0xD9;\n    if (jpegBytes.Length >= 2 &&\n        jpegBytes[^2] == ff && jpegBytes[^1] == d9)\n        return jpegBytes;\n    var result = new byte[jpegBytes.Length + 2];\n    Array.Copy(jpegBytes, result, jpegBytes.Length);\n    result[^2] = ff;\n    result[^1] = d9;\n    return result;\n}\n\nvar fixedBytes = AppendJpegEoi(rawJpegBytes);\nusing var data = SKData.CreateCopy(fixedBytes);\nusing var image = SKImage.FromEncodedData(data);\nif (image == null)\n    throw new InvalidOperationException(\"Failed to decode JPEG even after appending EOI bytes.\");\n```\n\nWe need to investigate whether a recent Skia milestone update has already addressed this (the upstream Skia bug #12511 was filed in 2021). We'll update this issue after checking the current state of the JPEG codec in our Skia fork."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
