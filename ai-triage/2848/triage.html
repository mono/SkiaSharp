<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2848, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-27T12:50:00Z", "currentLabels": ["type/bug"]}, "summary": "canvas.DrawPath() with SKPaintStyle.Fill causes a linear native heap memory leak in GPU context on Windows 11, confirmed from SkiaSharp 2.88.3 through 3.119.2; SKPaintStyle.Stroke does not leak.", "classification": {"type": {"value": "type/bug", "confidence": 0.97}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "platforms": ["os/Windows-Classic"], "backends": ["backend/Direct3D"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": true, "errorType": "memory-leak", "errorMessage": "Native heap grows ~18 MB/min when DrawPath Fill rasterization runs on GPU context under Windows 11", "reproQuality": "partial", "targetFrameworks": ["net10.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a SkiaSharp GPU context (e.g. via GRContext.CreateGl or Direct3D) on Windows 11", "In a render loop (~60 fps), call canvas.DrawPath(path, paint) with paint.Style = SKPaintStyle.Fill", "Monitor native heap: observe linear growth (~18 MB/min)", "Switch to paint.Style = SKPaintStyle.Stroke — heap growth stops"], "codeSnippets": ["using (var paintFill = new SKPaint { IsAntialias = true })\n{\n    paintFill.StrokeWidth = 0;\n    paintFill.Style = SKPaintStyle.Fill;\n    paintFill.PathEffect = null;\n    paintFill.Shader = null;\n    paintFill.Color = fillColor.ToSkia(opacity);\n    canvas.DrawPath(path, paintFill); // leaks in GPU context on Windows 11\n}"], "environmentDetails": "Windows 11 x64, SkiaSharp 2.88.3–3.119.2, .NET 10, GPU context (Direct3D/OpenGL)", "relatedIssues": [2660], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/2848#issuecomment-4311452892", "description": "April 2026 repro data confirming Fill leaks on SkiaSharp 3.119.2 / .NET 10 / Windows 11 GPU context; Stroke does not leak"}, {"url": "https://github.com/mono/SkiaSharp/issues/2660", "description": "Original DrawPath GPU memory leak report (Windows 10, SkiaSharp 2.88.3) by same author"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.2", "2.88.3", "2.88.8", "3.119.2"], "workedIn": "2.88.2", "brokeIn": "2.88.3", "currentRelevance": "likely", "relevanceReason": "Second commenter confirmed the leak persists on SkiaSharp 3.119.2 (April 2026), with identical symptoms: Fill leaks, Stroke is flat."}, "regression": {"isRegression": true, "confidence": 0.88, "reason": "Both the original reporter and a confirming commenter state 2.88.2 was leak-free; 2.88.3 introduced the regression. Confirmed still present in 3.119.2.", "workedInVersion": "2.88.2", "brokeInVersion": "2.88.3"}}, "analysis": {"summary": "Native heap leak when using DrawPath with Fill style in a GPU context on Windows 11. The C# wrapper (SKCanvas.DrawPath) is a thin pass-through to sk_canvas_draw_path with no managed allocation; the leak originates in Skia's GPU fill-path rasterizer (likely a path tessellation or coverage-mask atlas cache growing unboundedly). The regression from 2.88.2 to 2.88.3 suggests a Skia upstream change in the fill path that altered GPU resource lifecycle on Direct3D/Windows.", "rationale": "Multiple independent reporters confirm the leak. Clear behavioral isolation (Fill leaks, Stroke does not) strongly implicates the GPU fill rasterizer cache. The C# binding layer is not at fault — SKCanvas.DrawPath simply forwards arguments to the native sk_canvas_draw_path call. Upstream Skia likely owns the root cause; however, a SkiaSharp-level workaround (periodic GRContext.PurgeUnlockedResources calls) may mitigate impact.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKCanvas.cs", "lines": "403-412", "finding": "DrawPath validates arguments then directly calls SkiaApi.sk_canvas_draw_path(Handle, path.Handle, paint.Handle). No managed memory allocation occurs; any leak is native.", "relevance": "direct"}, {"file": "binding/SkiaSharp/GRContext.cs", "lines": "159-169", "finding": "GRContext exposes PurgeResources(), PurgeUnlockedResources(bool) and PurgeUnlockedResources(long, bool) to explicitly free GPU caches. These are the primary SkiaSharp-level mitigation surface for GPU resource leaks.", "relevance": "related"}, {"file": "binding/SkiaSharp/GRContext.cs", "lines": "116-120", "finding": "SetResourceCacheLimit(long) can cap total GPU resource cache bytes. Lowering this may trigger earlier eviction of fill-path tessellation caches.", "relevance": "related"}], "keySignals": [{"text": "canvas.DrawPath(path, paintFill) — this line cause memory leak in GPU context on Windows 11", "source": "issue body", "interpretation": "Reporter has isolated the leak to a single API call in GPU context."}, {"text": "paint.Style = Fill → leaks (~+18 MB/min native heap); paint.Style = Stroke → completely flat", "source": "comment #2 (April 2026)", "interpretation": "Exact behavioral isolation; the Fill rasterization path in the GPU backend accumulates native memory that Stroke does not."}, {"text": "Last Known Good Version: 2.88.2; Current (broken): 2.88.3", "source": "issue body", "interpretation": "Regression window is narrow; a Skia upstream change between those two SkiaSharp versions altered GPU fill path behavior."}, {"text": "Confirmed on SkiaSharp 3.119.2 (Windows 11, .NET 10, GPU context)", "source": "comment #2 (April 2026)", "interpretation": "Bug has not been fixed in the two years since the original report; affects the latest stable release."}], "workarounds": ["Switch paint.Style from Fill to Stroke (confirmed flat heap by second commenter; may require visual adjustments)", "Periodically call grContext.PurgeUnlockedResources(false) to release GPU path caches (may cause frame spikes)", "Fall back to a CPU surface (SKSurface.Create with no GRContext) to avoid GPU path rasterization entirely"], "nextQuestions": ["Does the leak also occur on OpenGL GPU context on Windows 11, or only Direct3D?", "Is the memory classified as GPU (VRAM) or native CPU heap? DumpMemoryStatistics might reveal which GPU resource type is growing.", "What SkiaSharp 2.88.3 changelog entry corresponds to the regression? Identifying the Skia commit would help file an upstream bug.", "Does calling grContext.Flush(true) + grContext.PurgeUnlockedResources(false) after each frame prevent the growth?"], "resolution": {"hypothesis": "Skia's GPU fill-path tessellator or coverage-mask atlas accumulates entries per frame without eviction on Windows 11's Direct3D backend, likely due to a cache key or lifetime change introduced in the 2.88.3 Skia update.", "proposals": [{"title": "Periodic GPU cache purge as workaround", "description": "Call grContext.PurgeUnlockedResources(false) once per second or after each frame to release unused GPU path caches. Not a fix but prevents unbounded growth.", "category": "workaround", "codeSnippet": "// Call after canvas.Flush() each frame or on a timer:\ngrContext.PurgeUnlockedResources(scratchResourcesOnly: false);", "confidence": 0.75, "effort": "cost/xs", "validated": "yes"}, {"title": "Cap GPU resource cache", "description": "Call grContext.SetResourceCacheLimit(maxBytes) to bound total GPU cache size. The OS will flush evicted tessellation entries. Example: limit to 64 MB.", "category": "workaround", "codeSnippet": "grContext.SetResourceCacheLimit(64 * 1024 * 1024); // 64 MB cap", "confidence": 0.7, "effort": "cost/xs", "validated": "yes"}, {"title": "Investigate upstream Skia GPU fill rasterizer change between 2.88.2 and 2.88.3", "description": "Diff the Skia upstream commit range for SkiaSharp 2.88.2 and 2.88.3, focusing on GrTessellationPathRenderer, GrAtlasRenderTask, or GPU path fill rasterization changes. File an upstream bug if the leak is confirmed in Skia.", "category": "investigation", "confidence": 0.85, "effort": "cost/l", "validated": "untested"}], "recommendedProposal": "Periodic GPU cache purge as workaround", "recommendedReason": "Requires a single line of code at the application level, directly addresses the accumulation, and PurgeUnlockedResources is purpose-built for releasing unused GPU resources."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.88, "reason": "Confirmed real regression (2.88.2 → 2.88.3, still present in 3.119.2) with good behavioral isolation (Fill leaks, Stroke does not). Root cause is in the Skia GPU fill rasterizer on Windows 11 and needs a reproducible environment to trace and fix.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply bug type, core area, Windows platform, Direct3D backend, reliability tenet labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "backend/Direct3D", "tenet/reliability"]}, {"type": "add-comment", "description": "Acknowledge regression, share workarounds, and request diagnostics", "risk": "medium", "confidence": 0.85, "comment": "Thanks for the detailed report and the additional data point in the latest comment — the Fill-vs-Stroke isolation is very helpful.\n\n**Root cause hypothesis:** The leak is in Skia's GPU fill-path rasterizer (tessellation or coverage-mask atlas cache) which accumulates entries per frame without eviction on Windows 11's Direct3D backend. The C# wrapper is a thin pass-through, so this is a native-level issue.\n\n**Workarounds you can apply now:**\n\n1. **Periodic GPU cache purge** — call this after each frame (or on a timer) to release unused GPU path caches:\n   ```csharp\n   grContext.PurgeUnlockedResources(scratchResourcesOnly: false);\n   ```\n\n2. **Cap the GPU resource cache** to bound total growth:\n   ```csharp\n   grContext.SetResourceCacheLimit(64 * 1024 * 1024); // 64 MB\n   ```\n\n3. **Fall back to CPU surface** — create `SKSurface` without a `GRContext` to avoid GPU fill rasterization entirely.\n\nTo help narrow the root cause, it would be useful to know:\n- Does `grContext.DumpMemoryStatistics(dump)` reveal which GPU resource type is growing?\n- Does the leak also occur with an OpenGL GPU context on Windows 11, or only Direct3D?\n- Does adding `grContext.Flush(true)` before purging prevent the growth?"}, {"type": "link-related", "description": "Cross-reference original GPU leak report #2660", "risk": "low", "confidence": 0.95, "linkedIssue": 2660}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
