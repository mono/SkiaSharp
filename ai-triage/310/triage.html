<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 310, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-23T21:28:00Z", "currentLabels": ["type/enhancement", "status/low-priority", "os/Windows-Classic", "area/SkiaSharp.Views"]}, "summary": "SKControl throws ExternalException (GDI+ error) in OnPaint when the control is resized from within the PaintSurface event handler, causing re-entrant painting that attempts to free a still-locked bitmap.", "classification": {"type": {"value": "type/bug", "confidence": 0.88}, "area": {"value": "area/SkiaSharp.Views", "confidence": 0.97}, "platforms": ["os/Windows-Classic"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "exception", "errorMessage": "System.Runtime.InteropServices.ExternalException (0x80004005): A generic error occurred in GDI+.", "stackTrace": "at System.Drawing.Bitmap.UnlockBits(BitmapData bitmapdata)\n   at SkiaSharp.Views.Desktop.SKControl.OnPaint(PaintEventArgs e)\n   at System.Windows.Forms.Control.PaintWithErrorHandling(PaintEventArgs e, Int16 layer)\n   at System.Windows.Forms.Control.WmPaint(Message& m)\n   at System.Windows.Forms.Control.WndProc(Message& m)\n   at System.Windows.Forms.NativeWindow.Callback(IntPtr hWnd, Int32 msg, IntPtr wparam, IntPtr lparam)", "reproQuality": "complete"}, "reproEvidence": {"stepsToReproduce": ["Place an SKControl inside a scrollable container (e.g., DevExpress XtraScrollableControl)", "Scroll down so the bottom of the SKControl is visible but the top is scrolled off-screen", "In the PaintSurface event handler, change the Height of the SKControl to a value that makes it completely off-screen", "Observe ExternalException (GDI+ error) thrown from SKControl.OnPaint"], "environmentDetails": "Windows Forms desktop, SKControl embedded in a scrollable container. Issue is triggered 100% of the time under the described scenario.", "repoLinks": [{"url": "https://devdiv.visualstudio.com/DevDiv/_workitems/edit/735692", "description": "VS internal bug #735692 cross-referenced by reporter"}]}, "versionAnalysis": {"mentionedVersions": [], "currentRelevance": "likely", "relevanceReason": "The OnPaint implementation in SKControl.cs has not changed materially since the issue was filed — it still uses the same LockBits/UnlockBits pattern with no re-entrancy guard."}}, "analysis": {"summary": "Re-entrant OnPaint triggered by user resizing SKControl inside PaintSurface causes the inner paint call to dispose and replace the locked bitmap via FreeBitmap(), leaving the outer OnPaint with a stale BitmapData reference, which then fails at UnlockBits.", "rationale": "The exception originates in SkiaSharp's own OnPaint code path (UnlockBits), not in user code. Although the trigger is the anti-pattern of modifying control size inside PaintSurface, the library does not guard against re-entrant painting. Adding a simple boolean re-entrancy guard in OnPaint would prevent the crash. The maintainer previously left this open as a low-priority enhancement to investigate re-entrancy protection.", "keySignals": [{"text": "System.Runtime.InteropServices.ExternalException (0x80004005): A generic error occurred in GDI+. at System.Drawing.Bitmap.UnlockBits", "source": "issue body", "interpretation": "GDI+ errors from UnlockBits typically occur when the bitmap was disposed or replaced while still locked."}, {"text": "I am changing the SKControl.Height value from within the PaintSurface event, which is obviously triggered from inside the OnPaint override in SKCanvas, which is inside the bitmap lock/unlock.", "source": "comment #1", "interpretation": "Reporter correctly identified that resizing inside PaintSurface triggers a nested OnPaint, creating re-entrancy."}, {"text": "I suspect the XtraScrollableControl has a hook on my SKControl sized event and is manually calling the OnPaint function directly in a certain situation.", "source": "comment #2", "interpretation": "Resize event from a third-party scrollable container triggers a synchronous repaint within the existing paint cycle."}, {"text": "It would be easy enough to handle this situation in the SKControl itself so it doesn't crash, not sure if its worth bothering with though.", "source": "comment #2 (reporter)", "interpretation": "Reporter acknowledges a fix at the library level is possible but left the decision to maintainers."}, {"text": "This issue was the result of the paint operation also resizing the view - possibly invalidating the canvas or causing an infinite loop/stack overflow. This issue serves to act as a note for further investigation.", "source": "comment #5 (maintainer mattleibow, 2018)", "interpretation": "Maintainer confirmed understanding of root cause and deliberately kept open for future investigation."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views.WindowsForms/SKControl.cs", "lines": "26-53", "finding": "OnPaint calls CreateBitmap(), then LockBits(), then OnPaintSurface() (which fires the user's PaintSurface event), then UnlockBits(). There is no re-entrancy guard. If the user resizes the control inside PaintSurface, a nested OnPaint call is triggered, which calls CreateBitmap() → FreeBitmap() → disposes the bitmap currently locked in the outer call. The outer call then tries UnlockBits on the disposed bitmap, causing the GDI+ error.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WindowsForms/SKControl.cs", "lines": "68-81", "finding": "CreateBitmap() calls FreeBitmap() when Width or Height changes, disposing and nulling the bitmap field. This is the mechanism by which the outer LockBits reference becomes dangling during re-entrant painting.", "relevance": "direct"}], "workarounds": ["Do not resize the SKControl (or any parent scrollable container) from within the PaintSurface event handler. Pre-calculate required dimensions before the paint cycle.", "Reset the scroll position of any parent scrollable container to the top before triggering a content-driven resize, ensuring the SKControl remains in the visible area during paint."], "nextQuestions": ["Is the same re-entrancy issue reproducible with the standard WinForms Panel as a parent (without DevExpress XtraScrollableControl)?", "Does adding a simple `_isPainting` boolean guard in OnPaint fully resolve the crash, or are there edge cases with WM_SIZE being processed during paint?"], "resolution": {"hypothesis": "A boolean re-entrancy guard in SKControl.OnPaint would prevent the nested paint call from freeing the locked bitmap while the outer paint is in progress.", "proposals": [{"title": "Add re-entrancy guard to OnPaint", "description": "Track painting state with a private boolean field. If OnPaint is called while already painting, call Invalidate() to schedule a repaint after the current cycle completes and return immediately.", "codeSnippet": "private bool _isPainting;\n\nprotected override void OnPaint(PaintEventArgs e)\n{\n    if (_isPainting)\n    {\n        Invalidate();\n        return;\n    }\n    _isPainting = true;\n    try\n    {\n        // ... existing OnPaint body ...\n    }\n    finally\n    {\n        _isPainting = false;\n    }\n}", "category": "fix", "confidence": 0.82, "effort": "cost/xs", "validated": "untested"}, {"title": "Workaround: perform layout outside PaintSurface", "description": "Move any control resize logic out of the PaintSurface event handler. Calculate required dimensions in a separate method and apply them before triggering an Invalidate(), so that painting always starts with a stable size.", "category": "workaround", "confidence": 0.95, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Add re-entrancy guard to OnPaint", "recommendedReason": "Small, contained fix that makes SKControl resilient to the anti-pattern without requiring users to restructure their code."}}, "output": {"actionability": {"suggestedAction": "keep-open", "confidence": 0.8, "reason": "Root cause is well-understood (re-entrant OnPaint via user resize in PaintSurface). A workaround exists. The library fix is small but requires deliberate design decision by maintainers on how to handle re-entrancy. Issue has been deliberately kept open by maintainer since 2017 for future investigation.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Correct type from enhancement to bug; retain platform and area labels; add reliability tenet", "risk": "low", "confidence": 0.85, "labels": ["type/bug", "area/SkiaSharp.Views", "os/Windows-Classic", "tenet/reliability"]}, {"type": "add-comment", "description": "Summarize root cause and offer re-entrancy guard workaround for users hitting this", "risk": "medium", "confidence": 0.82, "comment": "**Root cause confirmed:** This crash occurs because `SKControl.OnPaint` has no re-entrancy guard. When you resize the control from inside `PaintSurface`, WinForms triggers a synchronous nested `OnPaint` call. The inner call runs `CreateBitmap()` which disposes the bitmap currently locked by the outer call. When the outer call then tries `UnlockBits`, GDI+ throws because the bitmap has been replaced.\n\n**Workaround:** Avoid resizing the control (or any parent container that triggers a synchronous repaint) from inside the `PaintSurface` event. Calculate required dimensions before the paint cycle and apply them outside of painting:\n\n```csharp\n// Do this OUTSIDE of PaintSurface\nif (requiredHeight != skControl.Height)\n    skControl.Height = requiredHeight;\nskControl.Invalidate();\n```\n\n**Potential fix:** Adding a re-entrancy guard in `SKControl.OnPaint` would make the control resilient to this pattern:\n\n```csharp\nprivate bool _isPainting;\n\nprotected override void OnPaint(PaintEventArgs e)\n{\n    if (_isPainting) { Invalidate(); return; }\n    _isPainting = true;\n    try { /* existing body */ }\n    finally { _isPainting = false; }\n}\n```\n\nThis is tracked as a low-priority enhancement."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
