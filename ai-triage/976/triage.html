<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 976, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-25T09:47:47Z"}, "summary": "Memory violations occur when two background threads simultaneously use separate EGL/OpenGL contexts and GRContexts to render GPU bitmaps via DrawPath on UWP, despite each thread having its own independent EGLContext, EGLPbufferSurface, and GRContext.", "classification": {"type": {"value": "type/bug", "confidence": 0.88}, "area": {"value": "area/SkiaSharp", "confidence": 0.82}, "platforms": ["os/Windows-Universal-UWP"], "backends": ["backend/OpenGL"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "crash", "errorMessage": "Memory violations (AccessViolationException) when two GPU rendering background threads are active simultaneously, crash occurs on DrawPath call", "reproQuality": "complete", "targetFrameworks": ["uap10.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a UWPGRContextProvider class that: initialises EGL (eglDisplay, eglConfig, eglPbufferSurface, eglContext) in a background thread, assembles a GRGlInterface using a custom EGL proc loader, creates a GRContext from the interface", "Instantiate one UWPGRContextProvider on one background thread and call CreateGRContext — this works fine", "Instantiate two UWPGRContextProvider objects each on their own independent background thread and call CreateGRContext simultaneously", "Observe memory violation (attempted to read or write protected memory) during DrawPath call on one of the threads"], "environmentDetails": "UWP on Windows, OpenGL/EGL via ANGLE", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/files/3688747/UWPGRContextProvider.txt", "description": "UWPGRContextProvider implementation showing EGL context setup and GRGlInterface assembly per thread"}, {"url": "https://github.com/mono/SkiaSharp/files/3721412/TestMultithreadedGPURendering.zip", "description": "Complete Visual Studio repro project demonstrating the multithreaded GPU rendering failure"}, {"url": "https://skia.googlesource.com/skia/+/20054dca88d578a642905b975656a4d767139d54", "description": "Upstream Skia commit: fix path effects to be thread-safe — possibly related to the DrawPath crash"}, {"url": "https://github.com/mono/SkiaSharp/issues/755", "description": "Related predecessor issue: SystemAccessViolation in single-threaded GPU rendering with GRContext (same reporter)"}]}}, "analysis": {"summary": "Reporter is using the correct EGL per-thread context pattern (each thread owns its own EGLContext + PBuffer + GRContext with distinct IntPtrs), yet memory violations occur during DrawPath when two threads render simultaneously. The reporter links an upstream Skia commit fixing path effects thread-safety, which is the most likely root cause: Skia's path effect code shared global mutable state at the time of this issue. The SkiaSharp C# layer and GRGlInterface assembly code appear correct; the defect is likely in the underlying Skia C++ path rendering.", "rationale": "Classified as type/bug because the reporter correctly implements per-thread EGL contexts per the EGL specification, and still gets memory violations. The crash on DrawPath combined with the upstream Skia path-effects thread-safety fix strongly implicates a Skia-level shared state bug rather than misuse. Area is area/SkiaSharp since the C# GRContext/GRGlInterface wrapping is the entry point; the backend is OpenGL via ANGLE on UWP. A complete repro project is provided, placing reproQuality at complete.", "keySignals": [{"text": "The System.IntPtrs are all different, so there doesn't appear to be any overlaps. But invariably when both threads are running memory violations will occur.", "source": "issue body", "interpretation": "Reporter has correctly isolated EGL contexts per thread — overlapping handles are not the cause. Shared mutable state deeper in Skia is implicated."}, {"text": "The memory exception happens on the DrawPath call.", "source": "comment by pathw0rk3r", "interpretation": "Crash is localized to path rendering, consistent with the path effects thread-safety bug fixed in the linked upstream Skia commit."}, {"text": "there was a bug fix that went into Skia a few months back regarding making path effects thread safe", "source": "comment by pathw0rk3r, linking skia commit 20054dca88d", "interpretation": "Reporter has found the likely root cause: Skia path effects were not thread-safe at the time. Fix exists upstream; question is whether SkiaSharp has consumed it."}, {"text": "I can supply a small Visual Studio project to demonstrate how the failure occurs", "source": "comment by pathw0rk3r", "interpretation": "Repro project was subsequently attached, giving a complete reproduction case."}], "codeInvestigation": [{"file": "binding/SkiaSharp/GRContext.cs", "lines": "36-46", "finding": "GRContext.CreateGl() assembles a GrDirectContext from a GRGlInterface handle. No thread-affinity enforcement or locking. This is intentional — each thread must create its own GRContext. The C# wrapper is correct; thread-safety responsibility is in the Skia C++ layer.", "relevance": "direct"}, {"file": "binding/SkiaSharp/GRGlInterface.cs", "lines": "52-60", "finding": "GRGlInterface.Create(GRGlGetProcedureAddressDelegate) assembles the interface via gr_glinterface_assemble_interface. The delegate-based proc loader pattern matches what the reporter uses with their custom EGL loader. API is used correctly.", "relevance": "direct"}, {"file": "binding/SkiaSharp/GRContext.cs", "lines": "108-114", "finding": "GRContext.AbandonContext() is called on Dispose. Per-thread GRContext disposal appears correct in the binding layer.", "relevance": "context"}], "workarounds": ["Limit GPU rendering to a single background thread and use a queue/semaphore to serialize tile rendering requests — eliminates the concurrent GRContext issue at the cost of parallelism.", "Fall back to CPU rasterization (SKSurface.Create with SKImageInfo, no GRContext) for tiles; CPU surfaces are inherently thread-safe since each has independent memory.", "Check whether the version of SkiaSharp in use has consumed the upstream Skia path-effects thread-safety fix (skia commit 20054dca88d); upgrading to a newer SkiaSharp release may resolve the crash without code changes."], "nextQuestions": ["Has the upstream Skia path-effects thread-safety commit (20054dca88d) been incorporated into the Skia version bundled with the SkiaSharp version the reporter is using?", "Does the crash reproduce on a non-UWP platform (e.g., WPF or WinForms with WGL) to confirm the issue is in Skia core rather than ANGLE?", "Does the crash still reproduce with a newer SkiaSharp release (the issue was filed in 2019; multiple Skia milestone bumps have occurred since)?"], "resolution": {"hypothesis": "The memory violations are caused by Skia path effects sharing global mutable state across GRContexts even when each thread owns its own EGLContext. The upstream fix (skia commit 20054dca88d) addressed this; the reporter needs a SkiaSharp version that includes that Skia revision.", "proposals": [{"title": "Upgrade to a SkiaSharp version that includes the Skia path-effects thread-safety fix", "description": "The reporter identified upstream Skia commit 20054dca88d as the fix. Upgrading to the SkiaSharp NuGet release that incorporates this Skia version should resolve the crash without any code changes.", "category": "fix", "confidence": 0.72, "effort": "cost/xs", "validated": "untested"}, {"title": "Serialize GPU rendering with a per-GRContext lock", "description": "Wrap all Skia GPU calls (including DrawPath) per thread in a lock tied to that thread's GRContext. This is a workaround in case path effects still share state in newer versions.", "category": "workaround", "confidence": 0.65, "effort": "cost/s", "validated": "untested"}, {"title": "Use CPU surface per thread as fallback", "description": "Replace GRContext-backed surfaces with CPU SKSurface per thread. CPU surfaces share no GPU state and are safe to use concurrently. Reduces GPU utilization but eliminates the crash.", "category": "alternative", "confidence": 0.9, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Upgrade to a SkiaSharp version that includes the Skia path-effects thread-safety fix", "recommendedReason": "Zero code changes required. The reporter themselves identified the upstream fix — upgrading SkiaSharp to a release that includes Skia post-20054dca88d is the lowest-effort resolution."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.78, "reason": "Complete repro project provided and upstream Skia fix identified. Needs investigation to confirm the fix is in the current SkiaSharp Skia version and whether the issue is still reproducible.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply bug, SkiaSharp core, UWP, OpenGL, and reliability tenet labels", "risk": "low", "confidence": 0.88, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Universal-UWP", "backend/OpenGL", "tenet/reliability"]}, {"type": "add-comment", "description": "Post analysis noting the upstream Skia path-effects fix and suggest upgrade + workarounds", "risk": "medium", "confidence": 0.78, "comment": "Thanks for the detailed reproduction and for tracking down the upstream Skia commit!\n\nThe crash on `DrawPath` during concurrent rendering is consistent with the path-effects thread-safety issue fixed in Skia at [`20054dca88d`](https://skia.googlesource.com/skia/+/20054dca88d578a642905b975656a4d767139d54). Even with fully independent EGL contexts per thread, Skia path effects were sharing global mutable state before that fix.\n\n**Suggested next steps:**\n1. **Try upgrading SkiaSharp** to the latest available release — Skia has been bumped through multiple milestones since 2019, and this fix should be included in recent versions.\n2. If the crash persists after upgrading, please let us know the new SkiaSharp version and we can investigate further.\n\n**In the meantime**, two workarounds:\n- Serialize all GPU calls for each `GRContext` behind a per-thread lock.\n- Fall back to CPU surfaces (`SKSurface.Create(info)` without a `GRContext`) for concurrent tile rendering — CPU surfaces share no GPU state and are inherently thread-safe.\n\nThe test project you attached is very helpful — thank you!"}, {"type": "link-related", "description": "Cross-reference related predecessor issue #755 (same reporter, same GPU rendering pattern)", "risk": "low", "confidence": 0.95, "linkedIssue": 755}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
