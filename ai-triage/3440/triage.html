<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3440, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-30T01:08:00Z", "currentLabels": ["type/bug", "area/SkiaSharp.Views.Maui", "os/Windows-WinUI", "tenet/reliability"]}, "summary": "MAUI app using SkiaSharp 3.119.1 crashes on certain Windows systems with TypeInitializationException in SkiaSharp.Views.WinUI.Native.PropertySetExtensions when ANGLE GLES context creates a surface.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/SkiaSharp.Views.Maui", "confidence": 0.88}, "platforms": ["os/Windows-WinUI"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "exception", "errorMessage": "TypeInitializationException: The type initializer for 'SkiaSharp.Views.WinUI.Native.PropertySetExtensions' threw an exception. Inner: COMException: Element not found.", "stackTrace": "at IObjectReference PropertySetExtensions.get__objRef_global__SkiaSharp_Views_WinUI_Native_IPropertySetExtensionsStatics()\n  at void PropertySetExtensions.AddSingle(PropertySet propertySet, string key, float value)\n  at void GlesContext.CreateSurface(SwapChainPanel panel, Size? renderSurfaceSize, float? resolutionScale)\n  at void AngleSwapChainPanel.EnsureRenderSurface()\n  at void AngleSwapChainPanel.OnLoaded(object sender, RoutedEventArgs e)", "reproQuality": "partial", "targetFrameworks": ["net9.0-windows10.0.19041"]}, "reproEvidence": {"stepsToReproduce": ["Create a .NET MAUI app using LiveCharts2 with SkiaSharp 3.119.1", "Deploy the app to a Windows 11 system (Lenovo 83C4, Windows 11 26100.7462)", "Navigate to a page containing a LiveCharts CartesianChart", "Observe crash on page load with TypeInitializationException"], "environmentDetails": "SkiaSharp 3.119.1, Windows 11 10.0.26100.7462, Lenovo 83C4, MAUI with LiveCharts2", "relatedIssues": [2948], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/2948", "description": "Similar PropertySetExtensions crash in Microsoft Store certification — closed as environment issue (Store adjusted their setup)"}]}, "versionAnalysis": {"mentionedVersions": ["3.119.1"], "currentRelevance": "likely", "relevanceReason": "GlesContext.CreateSurface with PropertySetExtensions.AddSingle call is present in current codebase with no mitigation for missing WinRT activation factory."}}, "analysis": {"summary": "The crash occurs when ANGLE's WinRT interop class PropertySetExtensions fails to initialize its COM activation factory on certain Windows systems. GlesContext.CreateSurface() unconditionally calls PropertySetExtensions.AddSingle() when a resolutionScale is provided (which AngleSwapChainPanel always does via CompositionScaleX). If the Windows system cannot locate the BaseActivationFactory for the WinRT type in SkiaSharp.Views.WinUI.Native, a TypeInitializationException is thrown. A similar issue (#2948) was seen in Microsoft Store sandbox and self-resolved via environment changes. The root cause — why the activation factory is missing on certain user systems — requires investigation into ANGLE deployment and Windows WinRT registration.", "rationale": "Clear exception stack trace from a real deployment. The failure is in ANGLE's WinRT EGL extension (PropertySetExtensions) used to pass surface creation properties. Related issue #2948 confirms this is a known failure mode. Since it only affects 'certain systems', the trigger condition is environment-specific but the code has no fallback path.", "keySignals": [{"text": "COMException: Element not found at new BaseActivationFactory(string typeNamespace, string typeFullName)", "source": "issue body", "interpretation": "The WinRT activation factory for SkiaSharp.Views.WinUI.Native.PropertySetExtensions cannot be resolved — likely a missing or unregistered WinRT component on the target system."}, {"text": "crashes on certain systems", "source": "issue body", "interpretation": "Not universal — system-dependent issue. Likely related to graphics driver, Windows feature availability, or deployment type."}, {"text": "We have tried both with HA enabled and disabled but the result is the same", "source": "issue body", "interpretation": "Hardware acceleration toggle has no effect — the failure is earlier, at the ANGLE EGL initialization level."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/GlesInterop/GlesContext.cs", "lines": "101-105", "finding": "GlesContext.CreateSurface() calls PropertySetExtensions.AddSingle() when resolutionScale.HasValue is true. There is no try/catch or fallback if the WinRT activation factory fails to load. This means any system that cannot initialize SkiaSharp.Views.WinUI.Native.PropertySetExtensions will crash here.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/AngleSwapChainPanel.cs", "lines": "191-206", "finding": "EnsureRenderSurface() always passes CompositionScaleX (a non-null float) as the resolutionScale parameter to GlesContext.CreateSurface(). This guarantees the PropertySetExtensions.AddSingle() path is always taken for WinUI, making the crash deterministic when the activation factory is unavailable.", "relevance": "direct"}], "nextQuestions": ["What distinguishes 'certain systems' from those that work? (graphics driver version, Windows edition, deployment type — sideloaded vs Store)", "Is the SkiaSharp.Views.WinUI.Native.winmd/dll properly deployed alongside the app on failing systems?", "Does the crash occur on a clean Windows install with no special restrictions?", "Is there a way to catch the TypeInitializationException and fall back to a non-GLES rendering path?"], "resolution": {"hypothesis": "The ANGLE WinRT activation factory for PropertySetExtensions is unavailable on certain Windows configurations, and there is no error handling around this initialization path.", "proposals": [{"title": "Add try/catch around PropertySetExtensions calls in GlesContext", "description": "Wrap the PropertySetExtensions.AddSize and AddSingle calls in try/catch. If the activation factory fails, skip the optional properties and attempt surface creation without them. This degrades gracefully on systems where the WinRT component is unavailable.", "category": "workaround", "confidence": 0.65, "effort": "cost/s", "validated": "untested"}, {"title": "Investigate and document deployment requirements for ANGLE WinRT", "description": "Determine what Windows feature or driver is required for the PropertySetExtensions WinRT component. Document as known limitation and add diagnostic message when activation fails.", "category": "investigation", "confidence": 0.8, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Investigate and document deployment requirements for ANGLE WinRT", "recommendedReason": "The root cause (why the activation factory is missing) must be understood before applying a code fix, to avoid hiding a deployment problem."}}, "output": {"actionability": {"suggestedAction": "needs-info", "confidence": 0.78, "reason": "Stack trace is clear but 'certain systems' condition is unexplained. Need to know what differentiates failing systems — particularly whether the SkiaSharp.Views.WinUI.Native native component is present in the deployed app. Similar issue #2948 was environment-specific.", "suggestedReproPlatform": "windows"}, "missingInfo": ["What differentiates the failing systems from working ones? (hardware, drivers, Windows edition, deployment type)", "Is the app sideloaded, deployed via MSIX, or running from IDE?", "Does the crash occur on a fresh Windows install without any special restrictions?", "Can you check if SkiaSharp.Views.WinUI.Native.dll is present in the deployed app folder on the failing system?"], "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp.Views.Maui, os/Windows-WinUI, tenet/reliability labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp.Views.Maui", "os/Windows-WinUI", "tenet/reliability"]}, {"type": "add-comment", "description": "Ask for more system details to identify what causes the activation factory failure on certain systems", "risk": "medium", "confidence": 0.78, "comment": "Thanks for the detailed stack trace. The crash is in ANGLE's WinRT interop initialization (`PropertySetExtensions`) which is used to configure the OpenGL ES surface resolution scale on Windows.\n\nThis failure (`COMException: Element not found`) means the WinRT activation factory for the native ANGLE component cannot be found on those specific systems. A similar issue was reported in #2948 in a Microsoft Store sandbox environment and resolved by environment changes.\n\nTo help investigate:\n1. Does this happen on **all** systems or specific ones? What's different about the failing machines (OS edition, drivers, deployment method)?\n2. How is the app deployed on the failing systems — MSIX, sideloaded, or running directly from the IDE?\n3. Does `SkiaSharp.Views.WinUI.Native.dll` exist in the deployed app's folder on the failing machine?\n4. Can you try wrapping your chart initialization in a try/catch to see if a graceful fallback is possible?\n\nIn the meantime, you can try setting the `EnableRenderLoop` or checking if disabling ANGLE rendering in LiveCharts2's SkiaSharp provider helps."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
