<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1902, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-21T18:25:48Z"}, "summary": "SKTypeface.FromFamilyName always returns the default font (Noto Mono) in Blazor WASM because Skia's font manager cannot access system fonts in the WASM sandbox; the workaround is to load fonts explicitly via SKTypeface.FromStream or SKTypeface.FromData.", "classification": {"type": {"value": "type/bug", "confidence": 0.82}, "area": {"value": "area/SkiaSharp", "confidence": 0.85}, "platforms": ["os/WASM"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "low", "regressionClaimed": false, "errorType": "wrong-output", "errorMessage": "typeFace.FamilyName always returns 'Noto Mono' instead of the requested family name in WASM", "reproQuality": "complete"}, "reproEvidence": {"stepsToReproduce": ["Create a Blazor WASM app with SkiaSharp.Views.Blazor", "In OnPaintSurface, call SKTypeface.FromFamilyName(\"Tahoma\", SKFontStyle.BoldItalic)", "Print typeFace.FamilyName — observe 'Noto Mono' instead of 'Tahoma'", "Draw text with the typeface — text renders in Noto Mono regardless of requested family"], "environmentDetails": "Blazor WASM, SkiaSharp.Views.Blazor, .NET 6", "relatedIssues": [3391], "repoLinks": []}, "versionAnalysis": {"mentionedVersions": [], "currentRelevance": "likely", "relevanceReason": "WASM font manager limitations are inherent to the WASM platform; they have not been fundamentally addressed in SkiaSharp."}}, "analysis": {"summary": "In WASM (Blazor WebAssembly), Skia's font manager cannot enumerate or load system fonts because the WASM sandbox has no access to browser/OS font directories. SKTypeface.FromFamilyName silently falls back to the default embedded font (Noto Mono) when the requested font is not found. This is expected WASM behavior but confusing for developers used to desktop/server platforms where system fonts are accessible.", "rationale": "Classified as type/bug because the API silently returns a fallback font without any error or warning — a reliability issue that is surprising and inconsistent with behavior on other platforms. The root cause is a WASM sandbox limitation, not a SkiaSharp code defect, making close-as-not-a-bug appropriate. The issue author self-resolved it in the comments using the stream workaround. Related issue #3391 had the same behavior and was closed as completed.", "keySignals": [{"text": "typeFace: Noto Mono", "source": "issue body (console output after FromFamilyName call)", "interpretation": "FromFamilyName silently returns the default WASM font when system fonts are unavailable — no error, no null return."}, {"text": "Skia's font manager is highly limited under wasm so you can't expect a functional font manager. It is better to load fonts explicitly via stream in a sandbox environment.", "source": "comment by Gillibald (CONTRIBUTOR)", "interpretation": "Confirms this is a known WASM platform limitation; loading via stream is the established solution."}, {"text": "The TTF file is added as an embedded resource - The font is loaded with SKTypeface.FromStream, reading the resource with Reflection. Issue resolved", "source": "comment by harveytriana (issue author)", "interpretation": "Author self-resolved by using FromStream with embedded fonts — the standard WASM workaround."}, {"text": "This is a deal killer for using SkiaSharp on WASM if every font needs to be an embedded resource.", "source": "comment by RChrisCoble", "interpretation": "Other users confirm impact; follow-up comment confirms HTTP fetch via JSInterop is also a viable solution."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "60-72", "finding": "FromFamilyName calls sk_typeface_create_from_name via P/Invoke. In WASM, Skia's font manager has no system fonts to search; it silently returns the default typeface (Noto Mono) via GetObject. No null return, no exception — the fallback is completely silent.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "92-113", "finding": "FromStream(Stream stream) wraps the stream in SKManagedStream, then converts it to a native memory stream via ToMemoryStream(). This path bypasses the font manager entirely and works correctly in WASM. Similarly, FromData(SKData data) at lines 115-121 uses native SKData directly, also bypassing font manager.", "relevance": "related"}], "workarounds": ["Embed the .ttf font file as an EmbeddedResource in the project and load with SKTypeface.FromStream(Assembly.GetExecutingAssembly().GetManifestResourceStream(\"MyApp.Fonts.FontName.ttf\"))", "Fetch font bytes via HttpClient.GetByteArrayAsync() and load with SKTypeface.FromData(SKData.CreateCopy(bytes))", "Use a separate assembly containing only font resources loaded on demand via Blazor's lazy assembly loading feature"], "nextQuestions": ["Should SKTypeface.FromFamilyName return null (or throw) when the font manager can find nothing in WASM, rather than silently falling back?", "Is there a feasible way to register browser CSS fonts with Skia's font manager via JSInterop in WASM?"], "resolution": {"hypothesis": "WASM sandbox prevents access to system fonts; Skia silently returns its bundled default (Noto Mono) when the requested font family is unavailable via the font manager.", "proposals": [{"title": "Embed font as resource and load via stream", "description": "Add the .ttf font file as an EmbeddedResource and use SKTypeface.FromStream to load it at runtime. Bypasses the font manager entirely.", "category": "workaround", "codeSnippet": "// Add MyApp.Fonts.Tahoma.ttf as EmbeddedResource in .csproj\nvar assembly = Assembly.GetExecutingAssembly();\nusing var stream = assembly.GetManifestResourceStream(\"MyApp.Fonts.Tahoma.ttf\");\nvar typeface = SKTypeface.FromStream(stream) ?? SKTypeface.Default;\n// Store 'typeface' as a field; dispose it when the component is disposed", "confidence": 0.95, "effort": "cost/xs", "validated": "yes"}, {"title": "Fetch font from web service and load via SKData", "description": "Use HttpClient to download a font file from a web service or CDN and load it with SKTypeface.FromData. Fonts are cached by the browser when served with proper headers.", "category": "workaround", "codeSnippet": "// Inject HttpClient via DI in Blazor\nvar bytes = await httpClient.GetByteArrayAsync(\"https://fonts.example.com/tahoma.ttf\");\nusing var data = SKData.CreateCopy(bytes);\nvar typeface = SKTypeface.FromData(data) ?? SKTypeface.Default;\n// Store 'typeface' as a field; dispose it when the component is disposed", "confidence": 0.85, "effort": "cost/s", "validated": "yes"}], "recommendedProposal": "Embed font as resource and load via stream", "recommendedReason": "Simplest approach, no network requests, works offline, no external CDN dependency. Well-established pattern for WASM apps."}}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.85, "reason": "This is a WASM platform limitation: Skia's font manager cannot access system fonts in the browser sandbox. SKTypeface.FromFamilyName behavior is correct (falls back to available font). The workaround using FromStream/FromData is well-documented in the thread and self-resolved by the issue author. Related issue #3391 was also closed as completed.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp, os/WASM, tenet/reliability labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp", "os/WASM", "tenet/reliability"]}, {"type": "add-comment", "description": "Post explanation of WASM font limitation with corrected workaround code examples", "risk": "high", "confidence": 0.85, "comment": "Thanks for the detailed report! This is a known limitation of the WebAssembly platform. In WASM/Blazor, Skia's font manager has no access to system or browser fonts because the WASM sandbox has no filesystem path to font directories. When `SKTypeface.FromFamilyName` cannot find the requested font, it silently falls back to the default embedded font (Noto Mono).\n\n**Workaround 1: Embed the font as an EmbeddedResource (recommended)**\n\nAdd the `.ttf` file to your project with `<EmbeddedResource>` in your `.csproj`, then:\n\n```csharp\nvar assembly = Assembly.GetExecutingAssembly();\nusing var stream = assembly.GetManifestResourceStream(\"MyApp.Fonts.Tahoma.ttf\");\nvar typeface = SKTypeface.FromStream(stream) ?? SKTypeface.Default;\n// Store 'typeface' as a field; call Dispose() when the component is disposed\n```\n\n**Workaround 2: Fetch from a web service at runtime**\n\n```csharp\n// Inject HttpClient via DI\nvar bytes = await httpClient.GetByteArrayAsync(\"https://fonts.example.com/tahoma.ttf\");\nusing var data = SKData.CreateCopy(bytes);\nvar typeface = SKTypeface.FromData(data) ?? SKTypeface.Default;\n// Store 'typeface' as a field; call Dispose() when the component is disposed\n```\n\nBoth approaches bypass the WASM font manager entirely by loading font binary data directly. This is the standard pattern for custom fonts in WASM apps.\n\nClosing as not-a-bug since this is a fundamental WASM sandbox constraint — the behavior of `FromFamilyName` returning the default font is correct given the runtime environment."}, {"type": "close-issue", "description": "Close as not-a-bug — WASM sandbox limitation, workaround is well-documented", "risk": "medium", "confidence": 0.8, "stateReason": "not_planned"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
