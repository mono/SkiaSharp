<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3612, "repo": "mono/SkiaSharp", "analyzedAt": "2026-07-11T05:20:00Z", "currentLabels": ["type/bug"]}, "summary": "User reports DllNotFoundException for libSkiaSharp on RHEL9-based Docker container due to missing libfontconfig.so.1 dependency; root cause is that SkiaSharp.NativeAssets.Linux (fontconfig-dependent variant) is being loaded instead of the NoDependencies variant, which is a known deployment pattern documented in packages.md.", "classification": {"type": {"value": "type/question", "confidence": 0.85}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.95}, "platforms": ["os/Linux"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "exception", "errorMessage": "Unable to load shared library 'libSkiaSharp' or one of its dependencies. libfontconfig.so.1: cannot open shared object file: No such file or directory", "stackTrace": "System.TypeInitializationException -> System.DllNotFoundException at SkiaSharp.SkiaApi.sk_colortype_get_default_8888() -> SKImageInfo..cctor()", "reproQuality": "complete", "targetFrameworks": ["net10.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a .NET application referencing SkiaSharp 3.116.0 using LiveCharts2", "Deploy to a RHEL9-based Docker container (ubi9/dotnet-100)", "Execute code that creates SKBitmap or otherwise initializes SKImageInfo", "Observe DllNotFoundException with libfontconfig.so.1 as the first missing dependency"], "codeSnippet": "using var bitmap = new SkiaSharp.SKBitmap(width, height);\nusing var canvas = new SkiaSharp.SKCanvas(bitmap);\nusing var image = SkiaSharp.SKImage.FromBitmap(bitmap);\nusing var data = image.Encode(SkiaSharp.SKEncodedImageFormat.Png, 100);\nreturn Convert.ToBase64String(data.ToArray());", "environmentDetails": "RHEL9 Docker (registry.access.redhat.com/ubi9/dotnet-100:9.7-1771893416), SkiaSharp 3.116.0, net10.0", "relatedIssues": [2653], "repoLinks": []}, "versionAnalysis": {"mentionedVersions": ["3.116.0"], "currentRelevance": "likely", "relevanceReason": "The NativeAssets.Linux deployment pattern and fontconfig dependency have not changed across recent releases."}}, "analysis": {"summary": "The DllNotFoundException is caused by libSkiaSharp.so being found but its fontconfig dependency missing in the minimal RHEL9 container. The error pattern (libfontconfig.so.1 as first failure) confirms the fontconfig-dependent variant of libSkiaSharp is being loaded, not the NoDependencies variant. The user reports that adding SkiaSharp.NativeAssets.Linux.NoDependencies 'did not make a difference', which is a known issue when NativeAssets packages are added to a library project instead of the executable (application) project.", "rationale": "The first error in the DllNotFoundException output is 'libfontconfig.so.1: cannot open shared object file' — this means libSkiaSharp.so was located but its dependency fontconfig is missing. This is the exact pattern documented in packages.md Troubleshooting section for SkiaSharp.NativeAssets.Linux (fontconfig variant). The NoDependencies package not helping suggests it was added to a library project rather than the executable project, causing the runtime to still pick up the fontconfig-dependent binary from the core SkiaSharp transitive dependency. The user found a valid workaround (installing fontconfig) which confirms the diagnosis.", "keySignals": [{"text": "libfontconfig.so.1: cannot open shared object file: No such file or directory", "source": "issue body - stack trace", "interpretation": "First error in DllNotFoundException — libSkiaSharp.so was found but depends on fontconfig. This is the NativeAssets.Linux (not NoDependencies) binary being loaded."}, {"text": "I have tried adding the Nuget Packages: SkiaSharp.NativeAssets.Linux, SkiaSharp.NativeAssets.Linux.NoDependencies. But those did not make a difference.", "source": "issue body", "interpretation": "NoDependencies not helping is a classic sign the package was added to a library project, not the executable project, so the correct binary is not deployed."}, {"text": "microdnf install -y fontconfig freetype freetype-devel libpng expat", "source": "issue body - workaround", "interpretation": "Installing fontconfig fixed the problem, confirming the fontconfig-dependent binary is being used. The correct solution for containers is NoDependencies in the executable project."}], "codeInvestigation": [{"file": "binding/SkiaSharp.NativeAssets.Linux/SkiaSharp.NativeAssets.Linux.csproj", "finding": "SkiaSharp.NativeAssets.Linux packages binaries from output/native/linux/{arch} which require fontconfig. These are placed under runtimes/linux-x64/native/ — if this package is transitively included, it wins over NoDependencies.", "relevance": "direct"}, {"file": "binding/SkiaSharp.NativeAssets.Linux.NoDependencies/SkiaSharp.NativeAssets.Linux.NoDependencies.csproj", "finding": "NoDependencies packages binaries from output/native/linuxnodeps/{arch} with no fontconfig dependency. However, if this package is added to a library project rather than the executable project, the runtime won't find it and will fall back to the fontconfig-dependent binary.", "relevance": "direct"}, {"file": "documentation/dev/packages.md", "lines": "175-200", "finding": "The Troubleshooting section explicitly documents: 'libfontconfig.so.1 error means .so was found but has a dependency not installed — switch to NoDependencies'. It also documents that NativeAssets must be in the executable project, not a library project.", "relevance": "context"}], "workarounds": ["Add SkiaSharp.NativeAssets.Linux.NoDependencies to the executable (application) project — not a library project — to ensure the no-dependency binary is deployed", "If fontconfig is acceptable, install it in the container: microdnf install -y fontconfig (as the reporter discovered)", "Check for transitive SkiaSharp.NativeAssets.Linux references in library projects that might conflict with NoDependencies"], "nextQuestions": ["Was SkiaSharp.NativeAssets.Linux.NoDependencies added to the application's .csproj directly, or only to a library project?", "Is there a transitive reference to SkiaSharp.NativeAssets.Linux from LiveCharts2 or another library?"], "resolution": {"hypothesis": "The fontconfig-dependent NativeAssets.Linux binary is deployed because NoDependencies is only referenced in a library project (not the executable), and/or LiveCharts2 has a transitive reference to NativeAssets.Linux.", "proposals": [{"title": "Add NoDependencies to executable project", "description": "Add SkiaSharp.NativeAssets.Linux.NoDependencies as a PackageReference in the application project (the .csproj that produces the executable), not in any library project. This ensures the no-dependency binary is deployed to the output directory.", "category": "workaround", "confidence": 0.92, "effort": "cost/xs", "validated": "untested"}, {"title": "Install fontconfig in container", "description": "Add 'RUN microdnf install -y fontconfig' to the Dockerfile (or equivalent for your base image). This satisfies the fontconfig dependency of SkiaSharp.NativeAssets.Linux. Reporter confirmed this works.", "category": "workaround", "confidence": 0.98, "effort": "cost/xs", "validated": "yes"}], "recommendedProposal": "Add NoDependencies to executable project", "recommendedReason": "Preferred for containers — zero system dependencies beyond glibc. Adding NoDependencies to the correct project is the clean solution. Installing fontconfig works but adds system package overhead."}}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.85, "reason": "This is a known deployment pattern documented in packages.md. The libfontconfig error confirms the fontconfig-dependent binary is being loaded. NoDependencies 'not helping' is a classic sign of wrong project placement. Both workarounds are well-documented. No SkiaSharp bug exists.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Reclassify from type/bug to type/question; add area and platform labels", "risk": "low", "confidence": 0.88, "labels": ["type/question", "area/libSkiaSharp.native", "os/Linux", "tenet/compatibility"]}, {"type": "add-comment", "description": "Explain the deployment pattern and provide the NoDependencies fix", "risk": "medium", "confidence": 0.9, "comment": "Thanks for the detailed report and for sharing your workaround!\n\nThe error `libfontconfig.so.1: cannot open shared object file` as the **first** failure is the key signal: `libSkiaSharp.so` was found, but it's the **fontconfig-dependent** variant (`SkiaSharp.NativeAssets.Linux`), not the no-dependencies variant. That's why installing fontconfig via `microdnf` fixed it.\n\nThe reason `SkiaSharp.NativeAssets.Linux.NoDependencies` didn't help is almost certainly one of these:\n\n1. **Wrong project** — NativeAssets packages must be referenced in the **executable (application) project**, not in a library project. If it's only in a library, the runtime won't deploy that binary to the output directory.\n2. **Conflicting transitive reference** — LiveCharts2 (or another dependency) may transitively reference `SkiaSharp.NativeAssets.Linux`, which overrides `NoDependencies`.\n\n**Recommended fix for Docker containers:**\n```xml\n<!-- In your application .csproj (the one that builds the executable) -->\n<PackageReference Include=\"SkiaSharp.NativeAssets.Linux.NoDependencies\" Version=\"3.116.0\" />\n```\n\nThis variant has **zero** third-party dependencies (only libc/libm/libpthread/libdl) and works in minimal RHEL9 containers without installing fontconfig. You can verify the correct binary is deployed by running `ldd` on `libSkiaSharp.so` in your publish output — the NoDependencies variant shows only glibc entries.\n\nSee the [Linux Package Selection Guide](https://github.com/mono/SkiaSharp/blob/main/documentation/dev/packages.md#linux-package-selection-guide) and [Troubleshooting: Native Loading](https://github.com/mono/SkiaSharp/blob/main/documentation/dev/packages.md#troubleshooting-native-loading) in our docs for details."}, {"type": "close-issue", "description": "Close as answered — known deployment pattern with documented fix", "risk": "medium", "confidence": 0.82, "stateReason": "completed"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
