<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2411, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T19:30:00Z"}, "summary": "Blazor WebAssembly app using SkiaSharp throws DllNotFoundException for libSkiaSharp when deployed to Azure via GitHub Actions with .NET 7.0, while the same app works with .NET 6.0; root cause is missing wasm-tools workload in the CI environment.", "classification": {"type": {"value": "type/bug", "confidence": 0.88}, "area": {"value": "area/SkiaSharp.Views.Blazor", "confidence": 0.85}, "platforms": ["os/WASM"], "tenets": ["tenet/reliability", "tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "exception", "errorMessage": "System.TypeInitializationException: TypeInitialization_Type, SkiaSharp.SKImageInfo ---> System.DllNotFoundException: libSkiaSharp", "reproQuality": "complete", "targetFrameworks": ["net7.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a Blazor WebAssembly client-side app targeting .NET 7.0", "Add SkiaSharp 2.88.3 NuGet package", "Add a Razor component that calls SkiaSharp APIs (SKImageInfo, SKSurface, SKCanvas)", "Deploy via GitHub Actions to Azure App Service (Windows) without installing the wasm-tools workload", "Navigate to the component page — DllNotFoundException: libSkiaSharp is thrown"], "attachments": [{"url": "https://github.com/mono/SkiaSharp/files/10924231/Blazor-GitHub-Actions.zip", "description": "Reproduction project: .NET 6 and .NET 7 Blazor apps with GitHub Actions workflow", "filename": "Blazor-GitHub-Actions.zip"}], "environmentDetails": "SkiaSharp 2.88.3, .NET 7.0, Blazor WebAssembly (client-side), Azure App Service (Windows), GitHub Actions CI/CD", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/2745", "description": "Related: same DllNotFoundException in Blazor WASM .NET 8.0"}, {"url": "https://github.com/mono/SkiaSharp/issues/3422", "description": "Related: same TypeInitialization/DllNotFoundException in Blazor WASM .NET 10"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.3"], "workedIn": "2.88.3 with .NET 6.0", "brokeIn": "2.88.3 with .NET 7.0", "currentRelevance": "likely", "relevanceReason": "Similar issues (2745, 3422) confirm the pattern persists across .NET 8, 9, and 10 when wasm-tools is absent from the CI environment."}, "regression": {"isRegression": true, "confidence": 0.82, "reason": "Same SkiaSharp version (2.88.3) and same code works with .NET 6.0 but fails with .NET 7.0. The .NET 7.0 SDK requires the wasm-tools workload to be installed separately, whereas .NET 6.0 bundled it.", "workedInVersion": "net6.0", "brokeInVersion": "net7.0"}}, "analysis": {"summary": "SkiaSharp.NativeAssets.WebAssembly sets WasmBuildNative=true in its MSBuild targets and registers the static libSkiaSharp.a via NativeFileReference, which requires the .NET wasm-tools workload (Emscripten toolchain) to link the library into dotnet.wasm at build time. GitHub-hosted runners do not have wasm-tools pre-installed for .NET 7.0+. Without it, the NativeFileReference item is either silently skipped or Emscripten is unavailable, resulting in a dotnet.wasm missing the libSkiaSharp symbols — which surfaces as DllNotFoundException at runtime.", "rationale": "The issue is a well-understood CI environment setup problem: .NET 7.0 separated the wasm-tools workload from the base SDK install (unlike .NET 6.0). SkiaSharp.NativeAssets.WebAssembly's targets unconditionally enable WasmBuildNative and add NativeFileReference, both of which require wasm-tools. A community contributor confirmed the fix in March 2026 by adding 'dotnet workload install wasm-tools' to the GitHub Actions workflow.", "keySignals": [{"text": "System.DllNotFoundException: libSkiaSharp at SkiaSharp.SKImageInfo..cctor()", "source": "issue body", "interpretation": "The static libSkiaSharp.a was not linked into dotnet.wasm at build time — WASM runtime cannot resolve the symbol."}, {"text": "When deploy .NET 6.0 works fine without any issue. .NET 7.0 we are facing libSkiaSharp assembly not found issue.", "source": "issue body", "interpretation": "Regression introduced by .NET 7.0 requiring wasm-tools workload to be installed separately."}, {"text": "This issue can be fixed by installing wasm-tools: dotnet workload install wasm-tools", "source": "comment by ingweland (2026-03-21)", "interpretation": "Confirmed fix: add wasm-tools workload installation step to GitHub Actions workflow."}], "codeInvestigation": [{"file": "binding/SkiaSharp.NativeAssets.WebAssembly/buildTransitive/SkiaSharp.targets", "lines": "22-41", "finding": "For Blazor WASM apps (UsingMicrosoftNETSdkBlazorWebAssembly == true), the targets file sets WasmBuildNative=true and adds NativeFileReference for the Emscripten-compiled libSkiaSharp.a — for .NET 7.0 it uses the 3.1.12 Emscripten version. Both require the wasm-tools workload to process NativeFileReference during the WASM native build step.", "relevance": "direct"}, {"file": "binding/SkiaSharp.NativeAssets.WebAssembly/buildTransitive/SkiaSharp.props", "lines": "1-10", "finding": "Sets SkiaSharpStaticLibraryPath pointing to build-time libSkiaSharp.a files packaged in the NuGet. Confirms SkiaSharp ships static libraries for WASM and relies on the Emscripten toolchain (wasm-tools workload) to perform the final link.", "relevance": "direct"}, {"file": "documentation/dev/packages.md", "lines": "95-99", "finding": "Documentation explicitly states: 'WebAssembly uses static linking at compile time. The .a files are passed to the Emscripten linker which embeds them into the final dotnet.wasm binary.' Confirms that missing wasm-tools means the .a file is never linked.", "relevance": "context"}], "workarounds": ["Add 'dotnet workload install wasm-tools' as a step in the GitHub Actions workflow before the build step.", "Use 'SkiaSharp.Views.Blazor' package instead of bare SkiaSharp — it auto-includes SkiaSharp.NativeAssets.WebAssembly and documents the wasm-tools requirement."], "nextQuestions": ["Should SkiaSharp emit a build-time error/warning when wasm-tools is absent and WasmBuildNative=true?", "Can the documentation for SkiaSharp.NativeAssets.WebAssembly be updated to explicitly list 'wasm-tools workload required' as a prerequisite?"], "errorFingerprint": "DllNotFoundException:libSkiaSharp@SKImageInfo..cctor:BlazorWASM", "resolution": {"hypothesis": "The wasm-tools .NET workload is not pre-installed on GitHub-hosted runners for .NET 7.0+. SkiaSharp's WASM targets require this workload to link libSkiaSharp.a into dotnet.wasm. Without it, the native library is absent from the WASM bundle, causing DllNotFoundException at runtime.", "proposals": [{"title": "Install wasm-tools workload in CI", "description": "Add a workflow step to install the wasm-tools workload before building the Blazor WASM app. This enables Emscripten and allows SkiaSharp's NativeFileReference to be linked into dotnet.wasm.", "category": "workaround", "codeSnippet": "- name: Install WASM workload\n  run: dotnet workload install wasm-tools", "confidence": 0.95, "effort": "cost/xs", "validated": "yes"}, {"title": "Use SkiaSharp.Views.Blazor for better setup guidance", "description": "Reference SkiaSharp.Views.Blazor instead of the bare SkiaSharp package. It auto-includes SkiaSharp.NativeAssets.WebAssembly and its NuGet readme documents the wasm-tools requirement, making the setup requirement more discoverable.", "category": "alternative", "confidence": 0.8, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Install wasm-tools workload in CI", "recommendedReason": "Confirmed fix by community contributor. Direct solution with zero SkiaSharp code changes required."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.8, "reason": "The immediate workaround is confirmed (install wasm-tools in CI). However, the pattern has recurred across .NET 7, 8, 9, and 10 in at least three separate issues, suggesting SkiaSharp should either emit a build-time diagnostic when wasm-tools is absent or improve its documentation to make the CI requirement more prominent.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp.Views.Blazor, os/WASM, tenet/reliability, tenet/compatibility labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp.Views.Blazor", "os/WASM", "tenet/reliability", "tenet/compatibility"]}, {"type": "add-comment", "description": "Post confirmed workaround with CI snippet", "risk": "medium", "confidence": 0.92, "comment": "Thanks for the detailed report and the reproduction project.\n\nHere's the fix for your GitHub Actions workflow: add a step to install the `wasm-tools` .NET workload before building.\n\n```yaml\n- name: Install WASM workload\n  run: dotnet workload install wasm-tools\n```\n\nThis workload provides the Emscripten toolchain that SkiaSharp needs to link its native `libSkiaSharp.a` into your `dotnet.wasm` binary at build time. Starting with .NET 7.0, this workload must be installed explicitly — it was bundled with the .NET 6.0 SDK, which is why that version worked without it.\n\nThis fix was confirmed by a community contributor in a recent comment above. If adding that step resolves the issue, please let us know — we're tracking whether to add a build-time diagnostic to catch this missing workload earlier."}, {"type": "link-related", "description": "Cross-reference related issue #2745 (same error in .NET 8.0 Blazor WASM)", "risk": "low", "confidence": 0.9, "linkedIssue": 2745}, {"type": "link-related", "description": "Cross-reference related issue #3422 (same error in .NET 10 Blazor WASM)", "risk": "low", "confidence": 0.9, "linkedIssue": 3422}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
