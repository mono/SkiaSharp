<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2410, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-22T11:43:00Z"}, "summary": "MAUI app on iOS (iPad) crashes with DllNotFoundException for libSkiaSharp.framework when deployed from Windows using Hot Restart; deploying from Mac works fine.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.85}, "platforms": ["os/iOS"], "tenets": ["tenet/reliability"], "partner": "partner/maui"}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "crash", "errorMessage": "@rpath/libSkiaSharp.framework/libSkiaSharp", "stackTrace": "at SkiaSharp.SKPaint..ctor()\n   at MauiApp1_60.MainPage..ctor()", "reproQuality": "partial", "targetFrameworks": ["net6.0-ios"]}, "reproEvidence": {"stepsToReproduce": ["Create a .NET MAUI app targeting iOS", "Add SkiaSharp.Views.Maui.Controls 2.88.3 NuGet package", "Instantiate SKPaint in a page constructor", "Deploy from Visual Studio on Windows to a physical iOS device (using Hot Restart)", "Observe crash: DllNotFoundException for @rpath/libSkiaSharp.framework/libSkiaSharp"], "environmentDetails": "Visual Studio 2022 17.5.0 (Windows 11), MAUI net6.0-ios13.6, iPad 9th Gen iPadOS 16.3.1, SkiaSharp.Views.Maui.Controls 2.88.3", "relatedIssues": [1894, 2437], "repoLinks": []}, "versionAnalysis": {"mentionedVersions": ["2.88.3"], "currentRelevance": "unknown", "relevanceReason": "Issue filed against 2.88.3; current version is newer. Related issue #2437 was closed as completed but no explicit fix commit identified."}}, "analysis": {"summary": "The app crashes on physical iOS device because the native libSkiaSharp.framework is not available at runtime when deploying via Visual Studio Hot Restart on Windows. Hot Restart only bundles managed assemblies, not native frameworks. Deploying via a Mac (remote devices) correctly embeds the framework in the app bundle. The SkiaSharp.NativeAssets.iOS package ships the framework bundle correctly (runtimes/ios/native/libSkiaSharp.framework), and the buildTransitive/SkiaSharp.targets file for iOS is empty (no linker hints provided). The issue is triggered by the Windows-based Hot Restart deployment mechanism, which does not support native framework embedding.", "rationale": "The DllNotFoundException with @rpath prefix is a runtime iOS framework loading failure. The framework IS included in the NuGet package (confirmed by examining SkiaSharp.NativeAssets.iOS.csproj). Multiple users confirm the same failure, always on physical device via Windows deployment, and always resolved by deploying via Mac. This pattern exactly matches the known Hot Restart limitation: it skips the native framework copy step. Related closed issue #2437 (completed) had a community-found workaround via linker flags but no official SkiaSharp fix. This is partially external (Hot Restart limitation in MAUI tooling) but SkiaSharp could potentially mitigate it with linker preservation hints.", "keySignals": [{"text": "'@rpath/libSkiaSharp.framework/libSkiaSharp'. Callstack: at SkiaSharp.SKPaint..ctor()", "source": "issue body", "interpretation": "Classic iOS framework not found at @rpath — the framework was not embedded in the app bundle during deployment."}, {"text": "App crashes only when i try to deploy to iPad. For Android and Windows, it works.", "source": "issue body", "interpretation": "Platform-specific failure limited to physical iOS device deployment — points to deployment mechanism, not SkiaSharp code."}, {"text": "i connect my iPad directly to the Mac, and deploy the app to iOS Remote Devices -> device rather than doing the Hot Reload thingy", "source": "comment #1506543879", "interpretation": "The workaround explicitly bypasses Hot Restart. Hot Restart is the likely root cause."}, {"text": "If you're using a Windows machine and Hot Restart, this is the issue: https://github.com/Mapsui/Mapsui/issues/1872", "source": "comment on #2437", "interpretation": "Community confirms this is a Hot Restart limitation on Windows — same issue reported in other libraries using native frameworks."}, {"text": "Adding <MtouchLink>None</MtouchLink> is a simple way of making it go away", "source": "comment on #2437", "interpretation": "Alternative workaround disabling iOS linker to prevent framework stripping — suggests the linker may also be involved in some configurations."}], "codeInvestigation": [{"file": "binding/SkiaSharp.NativeAssets.iOS/SkiaSharp.NativeAssets.iOS.csproj", "finding": "Framework bundle is correctly packaged at runtimes/ios/native/libSkiaSharp.framework from output/native/ios/. The NuGet package structure is correct.", "relevance": "direct"}, {"file": "binding/SkiaSharp.NativeAssets.iOS/buildTransitive/SkiaSharp.targets", "finding": "The buildTransitive targets file for iOS is completely empty (no content). No linker preservation hints, no NativeReference items, and no MtouchLink configuration are included. This means no workaround is shipped to protect against linker stripping or Hot Restart framework exclusion.", "relevance": "direct"}], "workarounds": ["Deploy to iOS device via a Mac build host (iOS Remote Devices in VS for Windows) instead of using Hot Restart", "Add <MtouchLink>None</MtouchLink> to the iOS section of the MAUI csproj to disable linker (development only, not for release builds)", "Set minimum iOS target framework to net6.0-ios13.6 to match the SkiaSharp NuGet TFM"], "nextQuestions": ["Does the issue reproduce with SkiaSharp 3.x (current version) or only with 2.88.3?", "Does adding a NativeReference to libSkiaSharp.framework in the .csproj prevent the Hot Restart issue?", "Can SkiaSharp add a linker preservation hint (XmlLinkDescription or preserve attribute) to the iOS targets file to prevent framework stripping?"], "resolution": {"hypothesis": "The libSkiaSharp.framework is not being embedded by Hot Restart (Windows-based iOS deployment). SkiaSharp could potentially mitigate this by adding NativeReference or linker preservation hints to its iOS buildTransitive targets, though the root cause is in MAUI tooling.", "proposals": [{"title": "Deploy via Mac (immediate workaround)", "description": "Connect the iOS device to a Mac and use Visual Studio's iOS Remote Devices (pair-to-Mac) deployment instead of Hot Restart. This ensures the full app bundle including native frameworks is built and deployed correctly.", "category": "workaround", "confidence": 0.95, "effort": "cost/xs", "validated": "yes"}, {"title": "Disable iOS linker during development", "description": "Add <MtouchLink>None</MtouchLink> inside the iOS-specific PropertyGroup in the .csproj. This prevents the linker from stripping the native framework reference. Use only during development; for release, configure linker exceptions instead.", "codeSnippet": "<PropertyGroup Condition=\"$(TargetFramework.Contains('-ios'))\">\n  <MtouchLink>None</MtouchLink>\n</PropertyGroup>", "category": "workaround", "confidence": 0.8, "effort": "cost/xs", "validated": "yes"}, {"title": "Add linker preservation hints to SkiaSharp iOS targets", "description": "Populate binding/SkiaSharp.NativeAssets.iOS/buildTransitive/SkiaSharp.targets with a NativeReference or linker XML description to ensure libSkiaSharp.framework is preserved by the linker and included by Hot Restart.", "category": "fix", "confidence": 0.65, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Deploy via Mac (immediate workaround)", "recommendedReason": "Immediately actionable, confirmed working by the original reporter and other commenters. The linker/targets fix requires investigation."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.78, "reason": "Multiple users confirm the crash with clear workaround, but root cause (Hot Restart limitation vs. linker stripping vs. missing NativeReference hints in targets) needs investigation to determine if SkiaSharp can provide a packaging fix.", "suggestedReproPlatform": "macos"}, "actions": [{"type": "update-labels", "description": "Apply bug, native iOS, and MAUI partner labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/libSkiaSharp.native", "os/iOS", "tenet/reliability", "partner/maui"]}, {"type": "add-comment", "description": "Provide workarounds and explain root cause", "risk": "medium", "confidence": 0.82, "comment": "Thank you for the detailed report, and thanks to everyone who has confirmed this issue.\n\nThe crash (`DllNotFoundException: @rpath/libSkiaSharp.framework/libSkiaSharp`) occurs because the native `libSkiaSharp.framework` bundle is **not embedded in the app bundle** when deploying to a physical iOS device via **Visual Studio Hot Restart on Windows**. Hot Restart is a quick-deploy mechanism that skips the full native build/link step, which means native frameworks (`.framework` bundles) are not included.\n\n**Workarounds:**\n\n1. **Deploy via Mac** — Connect your iOS device to a Mac, pair Visual Studio for Windows to the Mac build host, and deploy using *iOS Remote Devices*. This performs a full build and correctly embeds `libSkiaSharp.framework`.\n\n2. **Disable the iOS linker (development only)** — Add this to your `.csproj`:\n   ```xml\n   <PropertyGroup Condition=\"$(TargetFramework.Contains('-ios'))\">\n     <MtouchLink>None</MtouchLink>\n   </PropertyGroup>\n   ```\n   ⚠️ Do not ship release builds with `MtouchLink=None`. For release, configure linker exceptions instead.\n\n3. **Set minimum iOS TFM** — Ensure your project targets `net6.0-ios13.6` or higher (to match the SkiaSharp NuGet TFM).\n\nWe will investigate whether SkiaSharp can add linker preservation hints to its iOS build targets to help with this scenario."}, {"type": "link-related", "description": "Cross-reference related iOS DllNotFoundException issue", "risk": "low", "confidence": 0.9, "linkedIssue": 2437}, {"type": "link-related", "description": "Cross-reference older related iOS deployment issue", "risk": "low", "confidence": 0.85, "linkedIssue": 1894}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
