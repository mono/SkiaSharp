<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 209, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T12:09:05Z", "currentLabels": ["type/bug", "status/help-wanted", "os/Windows-Classic", "os/Linux", "area/SkiaSharp", "tenet/reliability", "triage/triaged"]}, "summary": "AccessViolationException crash when calling SKBitmap.Decode concurrently on multiple threads (IIS/ASP.NET server scenario), affecting multiple SkiaSharp versions across Windows and Linux.", "classification": {"type": {"value": "type/bug", "confidence": 0.97}, "area": {"value": "area/SkiaSharp", "confidence": 0.95}, "platforms": ["os/Windows-Classic", "os/Linux"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "crash", "errorMessage": "System.AccessViolationException: Attempted to read or write protected memory", "stackTrace": "at SkiaSharp.SkiaApi.sk_codec_get_info(IntPtr, SkiaSharp.SKImageInfo ByRef)\n  at SkiaSharp.SKBitmap.Decode(SkiaSharp.SKCodec)\n  at SkiaSharp.SKBitmap.Decode(SkiaSharp.SKStream)", "reproQuality": "complete", "targetFrameworks": ["net40", "net5.0", "net7.0"]}, "reproEvidence": {"stepsToReproduce": ["Run an ASP.NET (IIS) application or a multi-threaded .NET application", "Concurrently call SKBitmap.Decode(stream) or SKBitmap.Decode(bytes) from multiple threads (e.g. 20+ concurrent requests)", "Observe AccessViolationException crashing the process"], "environmentDetails": "IIS / ASP.NET, .NET Framework 4.x and .NET 5/7, SkiaSharp versions 1.56.x, 1.57.x, 2.80.x, 2.88.x", "relatedIssues": [2194], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/2194", "description": "Related: AccessViolationException in finalizer thread via HandleDictionary/PlatformLock"}, {"url": "https://forums.xamarin.com/discussion/87687/usage-in-visual-studio-2015-unit-test-project", "description": "External forum thread confirming concurrent decode crash"}, {"url": "https://security.snyk.io/vuln/SNYK-DOTNET-SKIASHARP-5922114", "description": "Snyk vulnerability reference mentioned by a reporter"}]}, "versionAnalysis": {"mentionedVersions": ["1.56.2", "1.57.0", "2.80.2", "2.80.3", "2.80.4-preview.9", "2.88.0", "2.88.5"], "currentRelevance": "likely", "relevanceReason": "Multiple reporters across many SkiaSharp versions report the same AccessViolationException patterns. The issue remains open. No confirmed fix has landed. The 2.88.x line reintroduced or exposed the crash via HandleDictionary/PlatformLock paths."}}, "analysis": {"summary": "Concurrent calls to SKBitmap.Decode crash the process with AccessViolationException. The crash occurs in multiple call sites: sk_codec_get_info, sk_codec_new_from_stream, sk_pixmap_encode_image, and HandleDictionary.DeregisterHandle. The root cause is likely a combination of (1) the managed stream wrapper (SKManagedStream) using GC-callback delegates that can be collected or invoked concurrently, and (2) the internal HandleDictionary locking (PlatformLock) having a race or reentrancy issue on Windows under STA threading. Maintainer (mattleibow) reproduced the issue with 100 threads in comment #4.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "461-470", "finding": "SKBitmap.Decode(Stream) creates SKCodec.Create(stream) which wraps the managed .NET Stream in SKManagedStream. No synchronization is applied for concurrent calls — each call proceeds independently through native codec path.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKCodec.cs", "lines": "252-261", "finding": "SKCodec.Create(SKStream) calls sk_codec_new_from_stream and then stream.RevokeOwnership(codec). The codec takes native ownership of the stream object. Under concurrent usage, two codecs may race over shared native resources if the image source byte array is shared or if native codec state is thread-local-but-not-isolated.", "relevance": "direct"}, {"file": "binding/SkiaSharp/PlatformLock.cs", "lines": "13-15", "finding": "Code comment explicitly documents: 'On Windows, .NET locks are alertable when using the STA threading model and can lead to re-entrancy and a deadlock on the HandleDictionary lock.' This is the source of the PlatformLock NonAlertableWin32Lock, but the issue persists in multi-threaded server scenarios.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKAbstractManagedStream.cs", "lines": "16-26", "finding": "SKManagedStream registers delegate proxies (read, peek, seek, etc.) as native callbacks. These delegate proxies route native read calls back to the managed .NET Stream. If two concurrent decode operations share or race on the same underlying stream, corruption is possible.", "relevance": "related"}], "keySignals": [{"text": "As soon as I increase the count [of SemaphoreSlim], I start getting System.AccessViolationException errors.", "source": "issue body", "interpretation": "Crash is definitively triggered by concurrent decodes — not memory limits."}, {"text": "System.AccessViolationException at sk_codec_new_from_stream ... at SKBitmap.Decode(System.IO.Stream)", "source": "comment #23", "interpretation": "Crash also occurs inside codec creation, not only in info retrieval — pointing to a stream ownership or native codec init race."}, {"text": "loading the stream into a byte array first, and then decoding it, makes the issue go away", "source": "comment #24", "interpretation": "The workaround eliminates the managed stream lifecycle — strongly implicates SKManagedStream callback delegate lifetime or stream state sharing as the root cause for Stream-based decode paths."}, {"text": "AccessViolationException at HandleDictionary.DeregisterHandle / PlatformLock+NonAlertableWin32Lock.EnterCriticalSection", "source": "issue #2194", "interpretation": "A separate but related crash path — the HandleDictionary itself has concurrency issues, confirmed by the PlatformLock comment in source code."}], "rationale": "This is a confirmed multi-threaded crash bug. Maintainer reproduced it. Multiple users across many versions and platforms confirm it. The AccessViolationException occurs in native memory — either via corrupted codec state from concurrent stream access, or HandleDictionary lock race. A known workaround (byte array instead of stream) mitigates one vector. The bug is not fixed — it remains open with status/help-wanted.", "workarounds": ["Decode from byte array instead of Stream: `SKBitmap.Decode(imageBytes)` — avoids the SKManagedStream delegate lifetime issue", "Limit concurrent decodes to 1 at a time using SemaphoreSlim(1,1) — sacrifices throughput but prevents the crash", "Pre-load stream into byte array: `var ms = new MemoryStream(span.ToArray()); SKBitmap.Decode(ms)` — another way to avoid non-seekable stream wrapping"], "nextQuestions": ["Is the HandleDictionary race still present in the latest SkiaSharp (3.x)?", "Does the crash only occur with Stream-based overloads or also with byte[] overloads under extreme concurrency?", "Is there a thread-safety contract documented for Skia's native codec (SkCodec)?", "Can the SKManagedStream delegates be pinned/protected against concurrent GC finalization?"], "resolution": {"hypothesis": "Two concurrent races: (1) SKManagedStream delegate proxies can be invoked while being GC-collected or while the managed stream is being accessed from another thread; (2) HandleDictionary locking has a race under high-concurrency server scenarios on Windows.", "proposals": [{"title": "Document thread safety and recommend byte-array overload for server scenarios", "description": "Add XML documentation to SKBitmap.Decode(Stream) noting it is not safe to call concurrently with the same stream, and recommend using the byte[] or SKData overload for multi-threaded server use.", "category": "workaround", "confidence": 0.85, "effort": "cost/xs", "validated": "untested"}, {"title": "Investigate and fix HandleDictionary lock race", "description": "Profile the HandleDictionary.DeregisterHandle / PlatformLock path under high concurrency to identify if there is a use-after-free or lock reentrancy path. Fix the race if found.", "category": "fix", "confidence": 0.7, "effort": "cost/l", "validated": "untested"}, {"title": "Add thread-safety test for concurrent SKBitmap.Decode", "description": "Add a stress test that decodes many images concurrently and asserts no AccessViolationException — similar to the 100-thread repro in comment #4.", "category": "investigation", "confidence": 0.8, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Investigate and fix HandleDictionary lock race", "recommendedReason": "The most impactful fix — documented in code comments and confirmed in related issue #2194. The byte-array workaround already exists; the underlying race needs investigation and fixing."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.88, "reason": "Long-standing process-crashing bug reproduced by maintainer and confirmed by many users. Root cause partially understood (stream lifecycle + HandleDictionary race) but not definitively fixed. Needs deeper investigation into native thread safety.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp, os/Windows-Classic, os/Linux, tenet/reliability labels", "risk": "low", "confidence": 0.97, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "os/Linux", "tenet/reliability"]}, {"type": "add-comment", "description": "Provide workaround for server-side users and summarize investigation findings", "risk": "medium", "confidence": 0.88, "comment": "Thanks for reporting this and for the detailed repro. This is a known concurrent-access crash in SkiaSharp's native codec path.\n\n**Workaround (use byte array instead of Stream):**\n```csharp\n// Instead of:\nvar bitmap = SKBitmap.Decode(stream);\n\n// Do this — load bytes first, then decode:\nvar bytes = await httpClient.GetByteArrayAsync(uri);\nvar bitmap = SKBitmap.Decode(bytes);\n```\nThis avoids the `SKManagedStream` delegate lifecycle issue that can cause the crash.\n\n**Root cause:** Two concurrent issues have been identified:\n1. `SKManagedStream` wraps a .NET `Stream` in native callbacks — these can race when two threads access the same codec init path.\n2. `HandleDictionary.DeregisterHandle` has a locking race under high-concurrency scenarios (also see #2194).\n\nWe are tracking this for investigation. Using the byte-array overload of `SKBitmap.Decode` is the recommended workaround for server-side scenarios until a fix lands."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
