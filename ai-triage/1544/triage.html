<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1544, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-29T11:17:00Z"}, "summary": "On macOS with the OpenGL backend, SKSurface's finalizer causes a native segfault in glDeleteBuffers because the GL context is already destroyed by the time the GC finalizer thread runs.", "classification": {"type": {"value": "type/bug", "confidence": 0.97}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "platforms": ["os/macOS"], "backends": ["backend/OpenGL"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "crash", "errorMessage": "Got a segv while executing native code in glDeleteBuffers called from SKSurface finalizer", "stackTrace": "SKNativeObject.Finalize -> SKSurface.Dispose -> SKObject.DisposeNative -> SafeUnRef -> sk_refcnt_safe_unref -> glDeleteBuffers (segfault)", "reproQuality": "complete", "targetFrameworks": ["net472"]}, "reproEvidence": {"stepsToReproduce": ["Create a macOS app using OpenTK + Gtk2 + SkiaSharp GL backend", "Run the application", "Close the window by clicking the red close button", "Observe native segfault in glDeleteBuffers from finalizer thread"], "environmentDetails": "macOS 10.15.5, Mono 6.12.0, SkiaSharp 2.80.2, Visual Studio for Mac", "repoLinks": [{"url": "https://github.com/ylatuya/OpenTKSkiaGtk2", "description": "Minimal GTK2+OpenTK+SkiaSharp repro application"}, {"url": "https://github.com/ylatuya/OpenTKSkiaGtk2/commit/92914af5b298764513d20f5a78c2999c67298b80", "description": "Reporter's workaround commit: explicit disposal before window destruction"}]}, "versionAnalysis": {"mentionedVersions": ["2.80.2"], "currentRelevance": "likely", "relevanceReason": "The SKObject/SKNativeObject finalizer disposal pattern has not fundamentally changed; SKSurface still calls sk_refcnt_safe_unref from DisposeNative which triggers GL cleanup. The core issue — GL resources freed after GL context teardown — is an application lifecycle concern that SkiaSharp does not currently guard against."}}, "analysis": {"summary": "When the window closes, the OpenGL context is torn down first. SKSurface (holding a GPU-backed Skia surface) is not explicitly disposed, so its finalizer runs later on the GC finalizer thread. At that point, the call to sk_refcnt_safe_unref triggers Skia's internal cleanup which calls glDeleteBuffers — but the GL context no longer exists, causing a segfault. The reporter confirmed a workaround: explicitly dispose SKSurface (and GRContext) in the window destroy event before the GL context is torn down.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKObject.cs", "lines": "229-234", "finding": "SKNativeObject.Finalize sets fromFinalizer=true and calls Dispose(false). SKNativeObject.Dispose(bool) calls DisposeNative() when OwnsHandle is true, regardless of whether the GL context is still alive.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKObject.cs", "lines": "94-98", "finding": "SKObject.DisposeNative calls SafeUnRef on ISKReferenceCounted objects (including SKSurface), which invokes sk_refcnt_safe_unref and triggers Skia's native GPU resource cleanup including glDeleteBuffers.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKSurface.cs", "lines": "8-16", "finding": "SKSurface implements ISKReferenceCounted and calls base.Dispose(disposing). There is no guard to skip native cleanup when called from the finalizer thread or when the GL context may no longer be active.", "relevance": "direct"}], "keySignals": [{"text": "glDeleteBuffers called from finalizer_thread via sk_refcnt_safe_unref", "source": "native stack trace in issue body", "interpretation": "Skia's GPU resource cleanup (glDeleteBuffers) is executing on the GC finalizer thread after the GL context was already destroyed when the window closed."}, {"text": "I have found a workaround for the issue which is forcing the disposal of objects in the window destruction", "source": "issue comment by reporter", "interpretation": "Explicit Dispose() before GL context teardown prevents the crash, confirming the root cause is finalizer running after context destruction."}, {"text": "This is probably because the graphics context is already disposed at that moment", "source": "issue comment by reporter", "interpretation": "Reporter correctly identifies the underlying cause: GL context gone before finalizer runs."}], "rationale": "Clear crash with complete native + managed stack trace and a reproducible sample. The root cause is the classic 'GPU resources outlive the GPU context' lifecycle problem: SKSurface holds OpenGL resources; when the window closes the GL context is destroyed first, but SKSurface is not explicitly disposed, so its GC finalizer runs later and attempts to call GL functions on a dead context. This is a type/bug (not user error) because SkiaSharp provides no mechanism to detect this state and crash-safely skip GPU cleanup. The workaround (explicit disposal) is real and documented by the reporter.", "workarounds": ["Explicitly call surface.Dispose(), grContext.Flush(), grContext.Dispose() in the window destroy/close event handler, BEFORE the OpenGL context is torn down.", "Use a try/finally or IDisposable pattern around the render loop to ensure GPU objects are always disposed while the GL context is still active."], "nextQuestions": ["Does the same crash occur on Linux (X11/Wayland) with the OpenGL backend?", "Is GRContext.AbandonContext() a safer way to release GPU resources when the context is being destroyed?", "Can SkiaSharp add a GRContext.MakeCurrent() check or an abandonContext path to prevent GL calls after context teardown?"], "errorFingerprint": "segfault:glDeleteBuffers:sk_refcnt_safe_unref:finalizer_thread:macos:opengl", "resolution": {"hypothesis": "GL-backed SKSurface is not explicitly disposed before the OpenGL context is destroyed; the GC finalizer runs later on a separate thread and calls glDeleteBuffers on a dead context causing a segfault.", "proposals": [{"title": "Explicit disposal before GL context teardown (workaround)", "description": "In the window close/destroy handler, dispose the SKSurface and call GRContext.AbandonContext() or Dispose() while the GL context is still active.", "category": "workaround", "confidence": 0.95, "effort": "cost/xs", "validated": "untested"}, {"title": "Use GRContext.AbandonContext() for safer teardown", "description": "Call grContext.AbandonContext() before destroying the GL context. This tells Skia to abandon all GPU resources without issuing GL calls, preventing the crash even if Dispose is called later.", "category": "workaround", "confidence": 0.85, "effort": "cost/xs", "validated": "untested"}, {"title": "Guard finalizer-path DisposeNative against dead GL contexts", "description": "Investigate adding a fromFinalizer check in SKSurface or SKObject so that when disposed from the finalizer thread, GPU-backed resources attempt AbandonContext instead of full GL cleanup.", "category": "fix", "confidence": 0.55, "effort": "cost/l", "validated": "untested"}], "recommendedProposal": "Use GRContext.AbandonContext() for safer teardown", "recommendedReason": "AbandonContext() is the Skia-recommended way to release a GrContext when the underlying GL context is being destroyed without issuing GL calls. It is safer than trying to guard the finalizer path."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.88, "reason": "Real crash with complete stack trace and reproducible sample. Root cause is clear (finalizer runs after GL context destroyed) but a proper fix in SkiaSharp requires investigation of whether GRContext.AbandonContext() can be surfaced more prominently or the disposal path can be hardened.", "suggestedReproPlatform": "macos"}, "actions": [{"type": "update-labels", "description": "Apply bug, SkiaSharp core, macOS, OpenGL, reliability labels", "risk": "low", "confidence": 0.97, "labels": ["type/bug", "area/SkiaSharp", "os/macOS", "backend/OpenGL", "tenet/reliability"]}, {"type": "add-comment", "description": "Acknowledge the bug, explain root cause, provide workaround with GRContext.AbandonContext()", "risk": "medium", "confidence": 0.88, "comment": "Thanks for the detailed stack trace and the reproduction project!\n\nThis is a known lifecycle issue with GPU-backed surfaces: when the window closes, the OpenGL context is destroyed first, but if `SKSurface` and `GRContext` are not explicitly disposed before that happens, the GC finalizer runs later on a background thread and calls `glDeleteBuffers` on the now-dead GL context — causing the segfault.\n\n**Workaround (confirmed by your own commit):** Explicitly dispose GPU objects in your window destroy handler while the GL context is still active:\n\n```csharp\n// In your window Destroy / OnClosed handler, BEFORE the GL context is torn down:\ngrContext.AbandonContext(); // tells Skia not to issue GL calls\nsurface?.Dispose();\ngrContext?.Dispose();\n```\n\n`GRContext.AbandonContext()` is the Skia-recommended API for exactly this scenario — it releases all GPU resources without issuing any GL calls, making it safe even if the GL context is already gone.\n\nWe should investigate whether SkiaSharp can handle this more gracefully (e.g., calling `AbandonContext` in the finalizer path), but for now explicit disposal is the reliable fix."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
