<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2811, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-30T15:24:14Z", "currentLabels": ["type/bug"]}, "summary": "On .NET MAUI (.NET 9.0 Preview 2) with SkiaSharp 3.0 Preview 2.1, a custom control derived from SKCanvasView that overrides MeasureOverride returns the correct size from that method, but OnSizeAllocated is called with a different (often much smaller or zero) height on Android and iOS.", "classification": {"type": {"value": "type/bug", "confidence": 0.92}, "area": {"value": "area/SkiaSharp.Views.Maui", "confidence": 0.9}, "platforms": ["os/Android", "os/iOS"], "partner": "partner/maui"}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "wrong-output", "reproQuality": "partial", "targetFrameworks": ["net9.0-android", "net9.0-ios"]}, "reproEvidence": {"stepsToReproduce": ["Create a custom control inheriting from SKCanvasView in a MAUI application", "Override MeasureOverride to return a computed Size based on content", "Use the control in a MAUI layout (e.g. StackLayout, Grid)", "Observe that OnSizeAllocated receives a smaller height than returned from MeasureOverride, sometimes 0 on iOS"], "environmentDetails": "SkiaSharp 3.0 Preview 2.1, .NET 9.0 Preview 2, Android 14 (Pixel 6a), iOS 17.3.1 (iPad 11,7), Visual Studio on Windows", "attachments": [{"url": "https://github.com/mono/SkiaSharp/assets/53081197/d8011baa-c326-472d-bdb9-b09b477854b9", "filename": "Screenshot_20240327-234854.png"}, {"url": "https://github.com/mono/SkiaSharp/assets/53081197/4a612cfb-ba86-40d2-86d7-bde23fb6e43d", "filename": "Screenshot_20240327-234739.png"}], "repoLinks": [{"url": "https://github.com/hyvanmielenpelit/GnollHack", "description": "Reporter's project demonstrating the issue (CustomLabel in GnollHackM vs GnollHackX)"}, {"url": "https://github.com/dotnet/maui/issues/4019#issuecomment-1510654509", "description": "MAUI upstream issue with workaround for custom view sizing"}, {"url": "https://github.com/mono/SkiaSharp/issues/2506", "description": "Related issue: MeasureOverride on derived SKCanvasView does not set DesiredSize.Height"}, {"url": "https://github.com/mono/SkiaSharp/issues/3239", "description": "Related issue: InvalidateMeasure doesn't call MeasureOverride after first call"}]}, "versionAnalysis": {"mentionedVersions": ["3.0 Preview 2.1", "2.80.x"], "workedIn": "2.80.x", "brokeIn": "3.0 Preview 2.1", "currentRelevance": "likely", "relevanceReason": "SKCanvasView.cs in MAUI Controls does not override MeasureOverride and the handler does not provide any layout size negotiation, so this gap likely persists in current code."}, "regression": {"isRegression": true, "confidence": 0.8, "reason": "Reporter explicitly states this works correctly in Xamarin.Forms (2.80.x) and breaks in the MAUI (3.0 Preview 2.1) migration. The MAUI handler architecture is entirely different from Xamarin renderers.", "workedInVersion": "2.80.x", "brokeInVersion": "3.0 Preview 2.1"}}, "analysis": {"summary": "SKCanvasView in MAUI does not participate correctly in the MAUI measure/layout pass when subclassed with MeasureOverride. The MAUI Controls SKCanvasView (source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Controls/SKCanvasView.cs) inherits from Microsoft.Maui.Controls.View without overriding any measure or layout methods, and the handler (SKCanvasViewHandler) does not implement MeasureNativeView or any layout size negotiation. As a result, the platform handler's native view size may not reflect the virtual view's desired size, causing OnSizeAllocated to receive wrong dimensions.", "rationale": "The issue clearly describes broken layout behavior (wrong dimensions delivered to OnSizeAllocated) that regressed from Xamarin to MAUI. Screenshots confirm visual truncation. Related issues #2506 and #3239 describe the same root class of problem: SKCanvasView derived views not having their MeasureOverride results honored by the MAUI layout system. The reporter links a MAUI upstream issue and workaround, suggesting this is partly a MAUI/SkiaSharp integration gap.", "keySignals": [{"text": "MeasureOverride calculates the right value, but OnSizeAllocated gets called with the wrong height (and that's how the label in fact looks in practice).", "source": "issue body", "interpretation": "MAUI layout pipeline is not propagating the desired size from MeasureOverride to the allocation phase."}, {"text": "On iOS, the height is even sometimes 0.", "source": "issue body", "interpretation": "iOS appears to have a more severe manifestation, possibly because UIKit native sizing collapses to intrinsic zero if no constraint is provided."}, {"text": "In Xamarin, everything works exactly as intended.", "source": "issue body", "interpretation": "Confirms regression: Xamarin renderer pattern handled custom sizing differently from MAUI handler pattern."}, {"text": "There's a workaround to this in the following Maui issue: https://github.com/dotnet/maui/issues/4019#issuecomment-1510654509", "source": "comment by janne-hmp", "interpretation": "A MAUI-level workaround exists, suggesting the fix involves the interaction between SKCanvasView and MAUI's measure/layout system."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Controls/SKCanvasView.cs", "finding": "SKCanvasView inherits from Microsoft.Maui.Controls.View and does not override MeasureOverride, ArrangeOverride, or any measure/layout related methods. No size negotiation is done at the virtual view level.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Handlers/SKCanvasView/SKCanvasViewHandler.Android.cs", "finding": "Android handler does not override GetDesiredSize, MeasureNativeView, or any method that would relay MeasureOverride results to the native Android view sizing system.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Handlers/SKCanvasView/SKCanvasViewHandler.Apple.cs", "finding": "iOS/Apple handler similarly does not override any measure/layout methods. The platform view is a bare SKCanvasView (UIView subclass) with no intrinsic content size, which would default to zero on iOS unless constrained by Auto Layout.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Handlers/SKCanvasView/SKCanvasViewHandler.cs", "finding": "Handler mapper only maps EnableTouchEvents and IgnorePixelScaling. No size-related mappings or commands exist.", "relevance": "related"}], "workarounds": ["Set HeightRequest (and WidthRequest if needed) explicitly in MeasureOverride after computing the desired size, as demonstrated by the reporter in the linked MAUI issue comment (https://github.com/dotnet/maui/issues/4019#issuecomment-1510654509) and used in related issue #3239.", "Override OnSizeAllocated to force an InvalidateSurface call when size is correct to trigger a repaint at the right dimensions."], "nextQuestions": ["Does this reproduce on current stable SkiaSharp (3.116.x) or is it specific to 3.0 Preview builds?", "Does SKGLView have the same MeasureOverride sizing issue?", "Is this reproducible on Windows Classic (WinUI) with the same derived-view pattern?"], "resolution": {"hypothesis": "The MAUI handler for SKCanvasView does not bridge the virtual view's MeasureOverride result back to the native platform sizing system. On iOS, the native SKCanvasView (UIView) has no intrinsic content size, so AutoLayout collapses it to zero. On Android, the MAUI measure pass doesn't call the virtual view's MeasureOverride when sizing the native Android view.", "proposals": [{"title": "Set HeightRequest/WidthRequest in MeasureOverride", "description": "As a workaround, in the derived class's MeasureOverride, explicitly set this.HeightRequest and this.WidthRequest to the computed dimensions in addition to returning the Size. This forces MAUI to use those values during layout.", "category": "workaround", "confidence": 0.8, "effort": "cost/xs", "validated": "untested"}, {"title": "Investigate MAUI handler MeasureNativeView override", "description": "Investigate whether SKCanvasViewHandler should override GetDesiredSize (MAUI handler method) to call the virtual view's MeasureOverride and return the result, so the MAUI layout system gets correct sizing information.", "category": "investigation", "confidence": 0.7, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Set HeightRequest/WidthRequest in MeasureOverride", "recommendedReason": "Immediately actionable workaround while the root cause in the handler is investigated."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Real regression with screenshots and related issues confirming the root pattern. Workaround exists but root cause in handler layout sizing needs proper investigation.", "suggestedReproPlatform": "macos"}, "actions": [{"type": "update-labels", "description": "Apply bug, MAUI views, Android, iOS, partner/maui labels", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/SkiaSharp.Views.Maui", "os/Android", "os/iOS", "partner/maui"]}, {"type": "link-related", "description": "Cross-reference with related MeasureOverride sizing issue #2506", "risk": "low", "confidence": 0.9, "linkedIssue": 2506}, {"type": "link-related", "description": "Cross-reference with related InvalidateMeasure issue #3239", "risk": "low", "confidence": 0.85, "linkedIssue": 3239}, {"type": "add-comment", "description": "Post response with workaround and analysis", "risk": "medium", "confidence": 0.82, "comment": "Thanks for the detailed report and screenshots!\n\nThis appears to be a known gap in how `SKCanvasView` integrates with MAUI's measure/layout pipeline. When subclassing `SKCanvasView` and overriding `MeasureOverride`, the size you return isn't automatically propagated back to the MAUI layout system's allocation step — this differs from Xamarin.Forms behavior where the renderer pattern handled custom sizing differently.\n\n**Workaround (while we investigate a proper fix):**\n\nIn your `MeasureOverride`, in addition to returning the computed `Size`, explicitly set `HeightRequest` (and `WidthRequest` if needed):\n\n```csharp\nprotected override Size MeasureOverride(double widthConstraint, double heightConstraint)\n{\n    var size = ComputeMyDesiredSize(widthConstraint, heightConstraint);\n    HeightRequest = size.Height;  // <-- add this\n    WidthRequest = size.Width;    // <-- add this if needed\n    return size;\n}\n```\n\nThis approach is also documented in [dotnet/maui#4019](https://github.com/dotnet/maui/issues/4019#issuecomment-1510654509) and used as a workaround in related issue #3239.\n\nRelated issues: #2506, #3239."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
