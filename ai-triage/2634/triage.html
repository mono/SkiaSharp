<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2634, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-25T13:45:00Z"}, "summary": "SKBitmap.Decode called with a Span<byte> and an SKImageInfo with Width=0 and Height=0 causes a native access violation (process crash) in SkiaSharp 2.88.6; the same call returned null in 2.88.5.", "classification": {"type": {"value": "type/bug", "confidence": 0.97}, "area": {"value": "area/SkiaSharp", "confidence": 0.95}, "platforms": ["os/Windows-Classic", "os/Linux"], "tenets": ["tenet/reliability", "tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": true, "errorType": "crash", "errorMessage": "System.AccessViolationException / SIGSEGV during SKBitmap.Decode or SKCodec.GetScaledDimensions", "reproQuality": "complete", "targetFrameworks": ["net6.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a console app targeting .NET 6", "Add SkiaSharp 2.88.6 NuGet package", "Decode a base64-encoded JPEG into a ReadOnlySpan<byte>", "Call SKBitmap.Decode(bytes, new SKImageInfo { AlphaType=Premul, ColorType=Bgra8888 }) — note Width and Height default to 0", "Observe process crash (AccessViolationException / SIGSEGV)"], "environmentDetails": ".NET 6, SkiaSharp 2.88.6, Windows 11 and Ubuntu", "relatedIssues": [2645, 2681], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/2634#issuecomment-1758090955", "description": "Comment: same crash from SKCodec.GetScaledDimensions(0.4f) on Windows, 2.88.6 only"}, {"url": "https://github.com/mono/SkiaSharp/issues/2634#issuecomment-1838523311", "description": "Comment: SIGSEGV on Linux .NET Core 8 docker and Windows, intermittent, links to #2681 and #2645"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.1", "2.88.5", "2.88.6"], "workedIn": "2.88.5", "brokeIn": "2.88.6", "currentRelevance": "likely", "relevanceReason": "Issue is still open, no fix PR found; Span-based overloads introduced in 2.88.6 remain in current codebase."}, "regression": {"isRegression": true, "confidence": 0.97, "reason": "Reporter explicitly tested 2.88.5 vs 2.88.6. Multiple users confirm the same behavior. The Span-based Decode overloads were introduced in 2.88.6.", "workedInVersion": "2.88.5", "brokeInVersion": "2.88.6"}}, "analysis": {"summary": "In 2.88.6, SKBitmap.Decode(byte[], SKImageInfo) was changed to delegate to a new Decode(ReadOnlySpan<byte>, SKImageInfo) overload. That overload uses 'fixed' + SKData.Create(IntPtr, int) (wrapping, not copying) to avoid a data copy. When the caller passes an SKImageInfo with Width=0 and Height=0 (default-initialised), SKBitmap is allocated with a 0-byte pixel buffer, and codec.GetPixels is called with an invalid zero-dimension info, triggering a native access violation. Additionally, a related crash is reported in SKCodec.GetScaledDimensions in 2.88.6, suggesting a broader issue with the native codec handling edge-case inputs introduced in this release.", "rationale": "This is unambiguously a regression bug: it worked in 2.88.5 and crashes in 2.88.6, reproduced by multiple users on Windows and Linux. The root code path is SKBitmap.Decode(ReadOnlySpan<byte>, SKImageInfo), which lacks validation for degenerate (zero-dimension) SKImageInfo. The fix is to validate bitmapInfo dimensions before attempting to decode, mirroring the behaviour of pre-2.88.6 which would return null. Classified as area/SkiaSharp because the issue is in the managed binding layer.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "580-587", "finding": "Decode(ReadOnlySpan<byte>, SKImageInfo) uses 'fixed' to pin the span and SKData.Create (no copy) to wrap the pointer, then calls Decode(codec, bitmapInfo) without validating bitmapInfo dimensions. When Width=0 and Height=0, a 0-byte bitmap is created and the codec is given a null/invalid pixel pointer.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "446-459", "finding": "Decode(SKCodec, SKImageInfo): creates 'new SKBitmap(bitmapInfo)' which succeeds even for 0x0 info, then calls codec.GetPixels with the potentially zero/invalid pixel pointer. No guard against degenerate bitmapInfo.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKCodec.cs", "lines": "119-136", "finding": "GetPixels(SKImageInfo, IntPtr, int, SKCodecOptions) checks for IntPtr.Zero and throws ArgumentNullException — however, for a 0x0 bitmap the native allocator may return a non-null but invalid pointer, bypassing this check and crashing in native code.", "relevance": "related"}, {"file": "binding/SkiaSharp/SKCodec.cs", "lines": "42-47", "finding": "GetScaledDimensions(float) delegates directly to sk_codec_get_scaled_dimensions with no validation; related crash reported in #2645 also regressed from 2.88.5 to 2.88.6, suggesting a common root cause in the native codec.", "relevance": "related"}], "keySignals": [{"text": "the application will die on bitmapNoLongerWorks", "source": "issue body", "interpretation": "Native crash (not a managed exception) during or after the decode attempt."}, {"text": "If you go back to 2.88.5 or earlier, it will continue with bitmapNoLongerWorks as null.", "source": "issue body", "interpretation": "Pre-2.88.6 code returned null gracefully for invalid bitmapInfo; 2.88.6 crashes instead."}, {"text": "SKCodec.GetScaledDimensions(float) ... package 2.88.6 crashes with the error System.AccessViolationException", "source": "issue comment #1758090955 by mpbraithwaite", "interpretation": "Same 2.88.5→2.88.6 regression manifesting in a different SKCodec method, pointing to a native-layer change."}, {"text": "SIGSEGV in Net Core 8 docker image (mcr.microsoft.com/dotnet/aspnet:8.0) as well as Windows", "source": "issue comment #1838523311 by MateuszBogdan", "interpretation": "Crash is cross-platform and cross-runtime, confirming native root cause."}], "nextQuestions": ["Does passing Width>0 and Height>0 but mismatched to the image also crash, or only Width=Height=0?", "Was SKData.Create (wrapping, no copy) introduced in 2.88.6 replacing SKData.CreateCopy?", "Is SKCodec.GetScaledDimensions crash (#2645) the same root cause or a separate native issue?", "Does the crash occur during the Decode call or only at process teardown (finalizer thread)?"], "errorFingerprint": "SKBitmap.Decode+zero-dimension-SKImageInfo+AccessViolation+2.88.6", "resolution": {"hypothesis": "SKBitmap.Decode(SKCodec, SKImageInfo) does not guard against degenerate (zero-dimension) bitmapInfo. When Width=0 or Height=0, the native codec is invoked with an invalid pixel buffer, causing a crash. The fix is to validate bitmapInfo before allocating and decoding.", "proposals": [{"title": "Guard against zero-dimension bitmapInfo in Decode(SKCodec, SKImageInfo)", "description": "Add a check at the top of Decode(SKCodec, SKImageInfo): if bitmapInfo.Width <= 0 or bitmapInfo.Height <= 0, return null immediately, restoring pre-2.88.6 behaviour.", "category": "fix", "codeSnippet": "if (bitmapInfo.Width <= 0 || bitmapInfo.Height <= 0)\n    return null;", "confidence": 0.85, "effort": "cost/xs", "validated": "untested"}, {"title": "Use SKData.CreateCopy instead of SKData.Create in Span-based overloads", "description": "Replace SKData.Create((IntPtr)b, buffer.Length) with SKData.CreateCopy in Decode(ReadOnlySpan<byte>) and Decode(ReadOnlySpan<byte>, SKImageInfo) to eliminate the unsafe pointer-wrapping pattern introduced in 2.88.6. This removes the fixed-block lifetime concern at the cost of one extra copy.", "category": "fix", "confidence": 0.75, "effort": "cost/xs", "validated": "untested"}, {"title": "Workaround: always pass explicit non-zero dimensions", "description": "Until a fix is released, callers should always pass the image's actual dimensions in the SKImageInfo, retrieved first via SKBitmap.DecodeBounds().", "category": "workaround", "codeSnippet": "var info = SKBitmap.DecodeBounds(bytes);\nif (info.IsEmpty) return null;\nvar bitmap = SKBitmap.Decode(bytes, info);", "confidence": 0.9, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Guard against zero-dimension bitmapInfo in Decode(SKCodec, SKImageInfo)", "recommendedReason": "Smallest targeted fix that restores the pre-2.88.6 null-return contract. Does not change memory semantics."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.9, "reason": "Clear regression with complete repro code on Windows and Linux. Root cause hypothesis is strong but exact mechanism (zero-dimension vs fixed-pointer lifetime) needs confirmation via reproduction before fixing.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp, os/Windows, os/Linux, tenet/reliability, tenet/compatibility labels", "risk": "low", "confidence": 0.97, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "os/Linux", "tenet/reliability", "tenet/compatibility"]}, {"type": "link-related", "description": "Link to related issue #2645 (same SKCodec crash, same regression)", "risk": "low", "confidence": 0.85, "linkedIssue": 2645}, {"type": "link-related", "description": "Link to related issue #2681 (AccessViolationException, possibly same root cause)", "risk": "low", "confidence": 0.75, "linkedIssue": 2681}, {"type": "add-comment", "description": "Acknowledge regression, share workaround, request confirmation of zero-dimension theory", "risk": "medium", "confidence": 0.85, "comment": "Thanks for the detailed repro!\n\nThis looks like a regression introduced in 2.88.6 in the `SKBitmap.Decode(ReadOnlySpan<byte>, SKImageInfo)` overload. The crash is likely triggered because the `SKImageInfo` in your repro has `Width = 0` and `Height = 0` (default values — you only set `AlphaType` and `ColorType`). The codec then tries to write pixel data into a zero-size buffer, causing a native access violation.\n\n**Workaround until a fix is released:**\n\n```csharp\n// First get the actual dimensions\nvar imageInfo = SKBitmap.DecodeBounds(bytes);\nif (imageInfo.IsEmpty)\n    return null;\n\n// Then decode with full info (or return null if you expected null)\nvar bitmap = SKBitmap.Decode(bytes, imageInfo);\n```\n\nThis crash also appears to be related to #2645 (SKCodec.GetScaledDimensions crash) — both are regressions in 2.88.6."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
