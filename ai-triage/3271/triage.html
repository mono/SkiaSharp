<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3271, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-23T23:10:00Z", "currentLabels": ["type/bug"]}, "summary": "Text drawn with SKCanvas.DrawText() produces no visible output on AWS Lambda (.NET 8) when using SkiaSharp.NativeAssets.Linux.NoDependencies because no system fonts are available and SKTypeface.FromFamilyName falls back to a default typeface with no glyphs.", "classification": {"type": {"value": "type/bug", "confidence": 0.8}, "area": {"value": "area/SkiaSharp", "confidence": 0.85}, "platforms": ["os/Linux"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "wrong-output", "errorMessage": "Text is not rendered in the output file (no exception thrown)", "reproQuality": "partial", "targetFrameworks": ["net8.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a .NET 8 ASP.NET Core app targeting AWS Lambda", "Add SkiaSharp and SkiaSharp.NativeAssets.Linux.NoDependencies NuGet packages", "Use SKTypeface.FromFamilyName(\"Arial\") and call canvas.DrawText(\"Hello, SkiaSharp!\", 50, 100, paint)", "Deploy to AWS Lambda and invoke the function", "Observe that the output PNG has a white background but no text"], "environmentDetails": "AWS Lambda, .NET 8.0, SkiaSharp 2.88.6 / 2.88.9 / 3.116.1, SkiaSharp.NativeAssets.Linux.NoDependencies", "relatedIssues": [2827], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/2827", "description": "Near-identical issue: Text Missing When Running From AWS Lambda — closed with embedded font workaround"}, {"url": "https://github.com/oxyplot/oxyplot/issues/2145", "description": "OxyPlot reporter linked same root cause: no fonts in .NET 8 Lambda"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.6", "2.88.9", "3.116.1"], "currentRelevance": "likely", "relevanceReason": "The NoDependencies behavior (no fontconfig, no system fonts) has not changed across these versions. The perceived .NET 6 regression is most likely due to the Lambda runtime image changing from Amazon Linux 2 (.NET 6) to Amazon Linux 2023 (.NET 8), which ships fewer system fonts by default."}, "regression": {"isRegression": false, "confidence": 0.75, "reason": "The NoDependencies package is documented as requiring explicit font loading. .NET 6 Lambda ran on Amazon Linux 2 which had some system fonts installed; .NET 8 Lambda runs on Amazon Linux 2023 which has fewer or no system fonts. The SkiaSharp behavior is consistent — the environment changed, not SkiaSharp."}}, "analysis": {"summary": "AWS Lambda's .NET 8 runtime (Amazon Linux 2023) ships no system fonts. SKTypeface.FromFamilyName(\"Arial\") asks Skia to resolve the family name via the system font manager, which returns null or a default no-glyph typeface when no fonts are installed. With NoDependencies (no fontconfig), font enumeration cannot discover system fonts even if they existed. DrawText silently draws nothing because the resolved typeface has no glyphs for the requested text. The fix is to embed a TTF/OTF font as an embedded resource and load it with SKTypeface.FromStream().", "rationale": "This is classified as type/bug because the silent failure (DrawText succeeds with no visible output, no exception) is poor UX for a common scenario. The root cause is the environment (no fonts + NoDependencies) but the failure mode is a SkiaSharp UX gap. The behavior is by-design per documentation but the documentation is not surfaced at the API call site. A related issue #2827 with identical symptoms was closed as 'completed' after the user found the embedded-font workaround — this issue deserves the same guidance.", "keySignals": [{"text": "NuGet: SkiaSharp.NativeAssets.Linux.NoDependencies", "source": "issue body", "interpretation": "NoDependencies explicitly has no fontconfig. System font enumeration is disabled. All fonts must be loaded explicitly via SKTypeface.FromFile/FromStream/FromData."}, {"text": "It works correctly in .NET 6", "source": "issue body", "interpretation": "Amazon Linux 2 (.NET 6 Lambda runtime) ships some fonts (e.g., liberation-fonts); Amazon Linux 2023 (.NET 8) is a minimal OS with no font packages pre-installed."}, {"text": "In .NET 8 on AWS Lambda, no fonts are available by default.", "source": "comment by Rodriguevb", "interpretation": "Confirms the root cause: missing system fonts, not a SkiaSharp version regression."}, {"text": "It still doesn't work. Does anyone have a solution?", "source": "comment by Rodriguevb", "interpretation": "Maintainer suggestion was too vague; reporter needs specific code showing how to embed and load a font."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "60-72", "finding": "FromFamilyName calls sk_typeface_create_from_name. If the family is not found by the Skia font manager, Skia falls back to a default typeface (not null). On a no-fontconfig build with no installed fonts, the fallback typeface has no usable glyphs, so text draws nothing silently.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "92-114", "finding": "SKTypeface.FromStream() and FromData() bypass the font manager entirely and load directly from bytes. These APIs work regardless of fontconfig or system fonts — they are the correct solution for minimal Linux containers.", "relevance": "direct"}, {"file": "documentation/dev/packages.md", "lines": "1-1", "finding": "NoDependencies documentation states: 'No fontconfig, no third-party deps. Designed for minimal containers. Fonts must be loaded explicitly.' This is by-design behavior, but not surfaced as an error at runtime.", "relevance": "context"}], "workarounds": ["Embed a TTF/OTF font file as an EmbeddedResource in the project, then load it with: SKTypeface font = SKTypeface.FromStream(Assembly.GetExecutingAssembly().GetManifestResourceStream(\"YourProject.Fonts.arial.ttf\"));", "Use SKTypeface.FromFile(\"/path/to/font.ttf\") if a font file is available on the Lambda filesystem (e.g., deployed as a Lambda layer)", "Install fonts on the container by switching to SkiaSharp.NativeAssets.Linux (with fontconfig) and adding font packages to the Lambda deployment image"], "nextQuestions": ["Does AWS Lambda support Lambda Layers for font files? This would allow sharing fonts across functions without embedding.", "Would it be useful for SkiaSharp to log a warning when FromFamilyName returns the default typeface due to no fonts available?"], "resolution": {"hypothesis": "The reporter's Lambda environment (AL2023) has no system fonts. The NoDependencies package cannot enumerate fonts. SKTypeface.FromFamilyName(\"Arial\") silently returns a default no-glyph typeface. The fix is to embed a TTF font as a resource and load it explicitly.", "proposals": [{"title": "Embed font as embedded resource", "description": "Add a TTF font file to the project as EmbeddedResource and load it with SKTypeface.FromStream(). This works in all environments with no external dependencies.", "category": "workaround", "codeSnippet": "// 1. Add font to project (e.g., Fonts/arial.ttf) with Build Action = EmbeddedResource\n// 2. Load it at runtime:\nusing var fontStream = Assembly.GetExecutingAssembly()\n    .GetManifestResourceStream(\"YourProject.Fonts.arial.ttf\");\nusing var typeface = SKTypeface.FromStream(fontStream);\n\nusing var paint = new SKPaint\n{\n    Color = SKColors.Black,\n    TextSize = 48,\n    IsAntialias = true,\n    Typeface = typeface\n};\ncanvas.DrawText(\"Hello, SkiaSharp!\", 50, 100, paint);", "confidence": 0.95, "effort": "cost/s", "validated": "yes"}, {"title": "Deploy font via Lambda Layer", "description": "Create a Lambda Layer containing font files (e.g., /opt/fonts/arial.ttf) and load them with SKTypeface.FromFile(). This allows sharing fonts across multiple Lambda functions.", "category": "alternative", "codeSnippet": "using var typeface = SKTypeface.FromFile(\"/opt/fonts/arial.ttf\");", "confidence": 0.85, "effort": "cost/m", "validated": "yes"}], "recommendedProposal": "Embed font as embedded resource", "recommendedReason": "Self-contained, no external dependencies, works identically on all Lambda runtimes. Closely follows the solution documented in the near-duplicate issue #2827."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.8, "reason": "Root cause is clear (no fonts on Lambda + NoDependencies), but the issue is still open and the reporter has not found a working solution. A detailed workaround comment with code and a pointer to the duplicate #2827 should resolve this. Keeping open pending confirmation from reporter.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Add area/SkiaSharp, os/Linux, tenet/compatibility labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp", "os/Linux", "tenet/compatibility"]}, {"type": "link-related", "description": "Cross-reference near-duplicate issue #2827 which has same symptom and workaround", "risk": "low", "confidence": 0.92, "linkedIssue": 2827}, {"type": "add-comment", "description": "Post workaround with embedded font code example", "risk": "medium", "confidence": 0.9, "comment": "## Root Cause\n\nAWS Lambda's .NET 8 runtime (Amazon Linux 2023) ships **no system fonts** by default. When you call `SKTypeface.FromFamilyName(\"Arial\")`, Skia tries to find the font via the system font manager — but with `NoDependencies` (no fontconfig) and no installed fonts, it falls back to a default typeface with no glyphs. `DrawText` then silently draws nothing.\n\nThis is the same issue as #2827. It appeared to work with .NET 6 because the older Amazon Linux 2 runtime shipped some fonts; AL2023 does not.\n\n## Workaround: Embed a Font as a Resource\n\nThe recommended fix is to embed a `.ttf` or `.otf` font directly in your project:\n\n**1. Add the font file to your project** (e.g., `Fonts/arial.ttf`) and set Build Action to `EmbeddedResource` in your `.csproj`:\n\n```xml\n<ItemGroup>\n  <EmbeddedResource Include=\"Fonts\\arial.ttf\" />\n</ItemGroup>\n```\n\n**2. Load it at runtime instead of using `FromFamilyName`:**\n\n```csharp\nusing var fontStream = Assembly.GetExecutingAssembly()\n    .GetManifestResourceStream(\"YourProject.Fonts.arial.ttf\");\nusing var typeface = SKTypeface.FromStream(fontStream);\n\nusing var paint = new SKPaint\n{\n    Color = SKColors.Black,\n    TextSize = 48,\n    IsAntialias = true,\n    Typeface = typeface  // use the explicitly loaded typeface\n};\ncanvas.DrawText(\"Hello, SkiaSharp!\", 50, 100, paint);\n```\n\nReplace `YourProject` with your actual assembly name (use `Assembly.GetExecutingAssembly().GetName().Name` if unsure). You can use any freely-licensed TTF font (e.g., [Liberation Fonts](https://github.com/liberationfonts/liberation-fonts), [Roboto](https://fonts.google.com/specimen/Roboto), or any font from `C:\\Windows\\Fonts` on Windows).\n\n## Why NoDependencies?\n\n`SkiaSharp.NativeAssets.Linux.NoDependencies` is designed for minimal containers with no external dependencies. This means no fontconfig, so system font discovery is disabled — all fonts must be loaded explicitly. See the [package documentation](https://github.com/mono/SkiaSharp/blob/main/documentation/dev/packages.md#linux-package-selection-guide) for details."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
