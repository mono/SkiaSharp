<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3386, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-26T22:05:00Z", "currentLabels": ["type/bug", "os/Linux", "area/libSkiaSharp.native", "tenet/compatibility"]}, "summary": "DllNotFoundException loading libSkiaSharp on Linux Azure Container App deployed via .NET Aspire — fontconfig dependency not available in container, even though NativeAssets.Linux.NoDependencies is referenced; reporter-provided workaround uses custom base image with native deps.", "classification": {"type": {"value": "type/bug", "confidence": 0.9}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.95}, "platforms": ["os/Linux"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "exception", "errorMessage": "System.DllNotFoundException: Unable to load shared library 'libSkiaSharp' or one of its dependencies. libfontconfig.so.1: cannot open shared object file: No such file or directory", "stackTrace": "at SkiaSharp.SkiaApi.sk_managedstream_set_procs -> SKAbstractManagedStream..cctor -> SKManagedStream..ctor -> SKCodec.Create -> SKBitmap.Decode", "reproQuality": "partial", "targetFrameworks": ["net9.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a .NET 9 WebAPI project using SkiaSharp (3.116.0) with SkiaSharp.NativeAssets.Linux.NoDependencies", "Deploy via .NET Aspire to an Azure Container App (Linux container)", "Call any SkiaSharp API that triggers SKAbstractManagedStream initialization", "Observe DllNotFoundException with libfontconfig.so.1 missing"], "environmentDetails": "Azure Container App (Linux), .NET Aspire, net9.0, SkiaSharp 3.116.0, last worked with 2.88.9", "repoLinks": [{"url": "https://github.com/AvantiPoint/aspnet-skia", "description": "Reporter's workaround: custom base Docker image with native deps pre-installed"}, {"url": "https://github.com/mono/SkiaSharp/issues/1341", "description": "Related: same DllNotFoundException pattern on Azure Linux App Service"}, {"url": "https://github.com/mono/SkiaSharp/issues/1999", "description": "Related: NativeAssets.Linux vs NoDependencies conflict in Docker containers"}]}, "versionAnalysis": {"mentionedVersions": ["3.116.0", "2.88.9"], "workedIn": "2.88.9", "brokeIn": "3.116.0", "currentRelevance": "likely", "relevanceReason": "Issue was filed against 3.116.0 (current) with no indication of subsequent fix. Native loading behavior in containers is unchanged."}, "regression": {"isRegression": true, "confidence": 0.6, "reason": "Reporter states 2.88.9 worked and 3.116.0 does not, but the migration to .NET Aspire containerization may have coincided with the upgrade, making this a possible deployment-change false regression.", "workedInVersion": "2.88.9", "brokeInVersion": "3.116.0"}}, "analysis": {"summary": "The libSkiaSharp binary loaded at runtime has a dependency on fontconfig (libfontconfig.so.1), but the container does not have fontconfig installed. Per the packages.md troubleshooting guide, when the first error in a DllNotFoundException chain shows 'libfontconfig.so.1: cannot open', it means a fontconfig-dependent binary WAS found and loaded — specifically from SkiaSharp.NativeAssets.Linux, not SkiaSharp.NativeAssets.Linux.NoDependencies. The reporter references NoDependencies in their csproj, suggesting a transitive SkiaSharp.NativeAssets.Linux reference is being resolved by NuGet and the fontconfig-dependent binary is taking precedence over the NoDependencies variant. .NET Aspire's container publishing model may influence which NativeAssets package wins in RID resolution.", "rationale": "Classified as type/bug because the reporter explicitly references NoDependencies (which should require no fontconfig) yet gets a fontconfig-dependent binary at runtime — indicating a NuGet/MSBuild conflict between the two Linux NativeAssets variants. This is not purely a user error; the behavior where NoDependencies is specified but not honored is unexpected. The tenet/compatibility label is appropriate because it represents a regression between the 2.x and 3.x packaging model that affects container deployments.", "keySignals": [{"text": "libfontconfig.so.1: cannot open shared object file: No such file or directory", "source": "issue log output", "interpretation": "Per packages.md: this is the first error and indicates a fontconfig-dependent binary was found and attempted to load — NOT the NoDependencies variant."}, {"text": "<PackageReference Include=\"SkiaSharp.NativeAssets.Linux.NoDependencies\" />", "source": "issue body (code section)", "interpretation": "Reporter explicitly references NoDependencies, which should not need fontconfig. Getting fontconfig errors means another reference (transitive or from .NET Aspire tooling) is overriding this."}, {"text": "Last Known Good Version of SkiaSharp: 2.88.9", "source": "issue metadata", "interpretation": "Regression marker. Deployment model may have changed with .NET Aspire adoption, complicating pure version attribution."}, {"text": "I switched to SkiaSharp.NativeAssets.Linux [with custom Docker image with native deps]", "source": "comment by reporter (dansiegel)", "interpretation": "Reporter resolved by using the fontconfig-dependent package with a custom base image — a valid workaround, but the underlying conflict with NoDependencies is unresolved."}], "codeInvestigation": [{"file": "binding/SkiaSharp.NativeAssets.Linux/SkiaSharp.NativeAssets.Linux.csproj", "finding": "Packages the glibc and musl libSkiaSharp.so variants that require fontconfig. Uses buildTransitive MSBuild targets controlled by ShouldIncludeNativeSkiaSharp property.", "relevance": "direct"}, {"file": "binding/SkiaSharp.NativeAssets.Linux/buildTransitive/net4/SkiaSharp.targets", "finding": "Copies native .so files to output via Content items. Both NativeAssets.Linux and NativeAssets.Linux.NoDependencies use the same ShouldIncludeNativeSkiaSharp property guard — if both packages resolve, the last-evaluated targets file determines which binary is copied, potentially causing the fontconfig-dependent binary to overwrite the NoDependencies binary.", "relevance": "direct"}, {"file": "documentation/dev/packages.md", "lines": "178-215", "finding": "Explicitly documents this failure pattern: 'libfontconfig.so.1: cannot open' means the NativeAssets.Linux binary was loaded, not NoDependencies. Advises checking for transitive NativeAssets.Linux reference conflicting with NoDependencies. Container deployment checklist recommends NoDependencies for minimal containers.", "relevance": "direct"}], "workarounds": ["Use a custom Docker base image that pre-installs fontconfig and other native dependencies, then use SkiaSharp.NativeAssets.Linux (as the reporter did via ghcr.io/avantipoint/aspnet-skia)", "Investigate transitive dependencies with `dotnet list package --include-transitive` to find what is pulling in SkiaSharp.NativeAssets.Linux and exclude it", "Add explicit MSBuild property to container project: <ShouldIncludeNativeSkiaSharp>False</ShouldIncludeNativeSkiaSharp> then manually reference only the NoDependencies files", "Install fontconfig in the Azure Container App via Dockerfile: RUN apt-get update && apt-get install -y libfontconfig1"], "nextQuestions": ["Which package is pulling in SkiaSharp.NativeAssets.Linux transitively? (`dotnet list package --include-transitive` output)", "Does .NET Aspire's container tooling add any SkiaSharp-related packages or override RID resolution?", "Does removing all SkiaSharp.NativeAssets.* references and only keeping NoDependencies fix the fontconfig error?", "Is the issue specific to Azure Container Apps / Aspire publishing, or does a plain Docker build reproduce it?"], "errorFingerprint": "DllNotFoundException:libSkiaSharp:libfontconfig.so.1:NoDependencies-override", "resolution": {"hypothesis": "A transitive NuGet reference to SkiaSharp.NativeAssets.Linux (fontconfig-dependent) is being resolved alongside SkiaSharp.NativeAssets.Linux.NoDependencies, and because both packages copy libSkiaSharp.so to the same output path using the same MSBuild property, one overrides the other — likely the fontconfig variant wins due to evaluation order.", "proposals": [{"title": "Install fontconfig in container (quick workaround)", "description": "Add fontconfig installation to the Dockerfile or Azure Container App base image. This resolves the missing dependency without changing the NuGet package choice.", "category": "workaround", "codeSnippet": "RUN apt-get update && apt-get install -y libfontconfig1 && rm -rf /var/lib/apt/lists/*", "confidence": 0.9, "effort": "cost/xs", "validated": "yes"}, {"title": "Remove conflicting NativeAssets.Linux transitive reference", "description": "Identify which dependency pulls in SkiaSharp.NativeAssets.Linux and exclude it, keeping only NoDependencies. Run `dotnet list package --include-transitive` to find the conflict.", "category": "investigation", "codeSnippet": "<!-- In the executable project's .csproj -->\n<PackageReference Include=\"SkiaSharp.NativeAssets.Linux\" ExcludeAssets=\"all\" />\n<PackageReference Include=\"SkiaSharp.NativeAssets.Linux.NoDependencies\" />", "confidence": 0.7, "effort": "cost/s", "validated": "untested"}, {"title": "Use custom base image with native dependencies (reporter's workaround)", "description": "Build a custom ASP.NET base image with all required native libraries pre-installed, then use SkiaSharp.NativeAssets.Linux. Reporter published images to ghcr.io/avantipoint/aspnet-skia:9.0 and :10.0.", "category": "workaround", "codeSnippet": "<PropertyGroup>\n  <ContainerBaseImage>ghcr.io/avantipoint/aspnet-skia:9.0</ContainerBaseImage>\n</PropertyGroup>", "confidence": 0.85, "effort": "cost/s", "validated": "yes"}], "recommendedProposal": "Install fontconfig in container (quick workaround)", "recommendedReason": "Simplest one-line fix if fontconfig-dependent binary is being loaded. If NoDependencies is confirmed not to work due to a transitive conflict, the second proposal (exclude conflicting reference) resolves the root cause."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.78, "reason": "Real bug where NoDependencies package is overridden by a transitive NativeAssets.Linux reference in an Aspire container deployment. Root cause (which package causes the conflict and why) needs investigation. Reporter found a workaround but the underlying packaging conflict remains unresolved.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Labels already match classification; confirm type/bug, area/libSkiaSharp.native, os/Linux, tenet/compatibility", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/libSkiaSharp.native", "os/Linux", "tenet/compatibility"]}, {"type": "add-comment", "description": "Acknowledge workaround found by reporter, explain root cause hypothesis, request transitive package info", "risk": "medium", "confidence": 0.78, "comment": "Thanks for the detailed report and for sharing your workaround — that's very helpful!\n\nThe root cause here is that the first error in the chain (`libfontconfig.so.1: cannot open`) means a **fontconfig-dependent** build of `libSkiaSharp` was found and loaded — not the `NoDependencies` variant. This typically happens when both `SkiaSharp.NativeAssets.Linux` and `SkiaSharp.NativeAssets.Linux.NoDependencies` end up in the dependency graph, and the fontconfig-dependent binary wins.\n\nTo investigate further, could you run the following and share the output?\n```\ndotnet list package --include-transitive\n```\nThis will show if something is pulling in `SkiaSharp.NativeAssets.Linux` (the fontconfig variant) transitively.\n\n**Quick workarounds while we investigate:**\n\n1. **Install fontconfig in your container** (if the fontconfig binary keeps winning):\n   ```dockerfile\n   RUN apt-get update && apt-get install -y libfontconfig1 && rm -rf /var/lib/apt/lists/*\n   ```\n\n2. **Exclude the conflicting transitive reference** in your executable project:\n   ```xml\n   <PackageReference Include=\"SkiaSharp.NativeAssets.Linux\" ExcludeAssets=\"all\" />\n   <PackageReference Include=\"SkiaSharp.NativeAssets.Linux.NoDependencies\" />\n   ```\n\n3. **Use the custom base image** you already created (the `ghcr.io/avantipoint/aspnet-skia` images you published are a great solution for others who hit this too).\n\nAlso note that trimming removing `System.Memory.Data` is a separate issue — adding it as a direct reference (as you did) is the correct fix for that."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
