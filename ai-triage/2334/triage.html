<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2334, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T14:56:41Z"}, "summary": "Semi-transparent alpha colors render differently in Blazor WASM (SKCanvasView) compared to WinForms — colors appear darker/washed out in the browser because the raster surface uses SKAlphaType.Opaque, blending against transparent black instead of a visible background.", "classification": {"type": {"value": "type/bug", "confidence": 0.88}, "area": {"value": "area/SkiaSharp.Views.Blazor", "confidence": 0.9}, "platforms": ["os/WASM"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "wrong-output", "errorMessage": "Transparency changes original colours in Chrome — semi-transparent text appears darker/washed out in WASM vs WinForms", "reproQuality": "partial", "targetFrameworks": ["net6.0-wasm"]}, "reproEvidence": {"stepsToReproduce": ["Create a Blazor WebAssembly app using SkiaSharp.Views.Blazor", "Draw text with paint.Color = paint.Color.WithAlpha((byte)(0xFF * 0.5))", "Compare the rendered output in Chrome vs a WinForms app with same drawing code and same background color"], "environmentDetails": "SkiaSharp 2.8.4, Windows 10, Chrome browser", "relatedIssues": [2381], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/2381", "description": "Related: SKCanvasView vs SKGLView alpha rendering difference in WASM — closed as fixed in later release"}]}, "versionAnalysis": {"mentionedVersions": ["2.8.4"], "currentRelevance": "unlikely", "relevanceReason": "Related issue #2381 (identical symptom — alpha rendering difference in Blazor WASM) was closed in December 2023 with the reporter confirming 'addressed in latest release'. The reporter is using the old 2.8.4 version."}, "fixStatus": {"likelyFixed": true, "confidence": 0.7, "reason": "Issue #2381 describes the same alpha rendering difference in Blazor WASM and was closed by the reporter in December 2023 as 'addressed in the latest release'. The original reporter here used v2.8.4 which predates that fix.", "relatedPRs": []}}, "analysis": {"summary": "The Blazor SKCanvasView raster surface is created with SKAlphaType.Opaque (SKCanvasView.razor.cs line 113). When canvas.Clear() is called without a color, the canvas is cleared to transparent black (0,0,0,0). Semi-transparent colors drawn on this surface are composited by Skia against transparent black, producing darker/muted RGB values with alpha=255. When putImageData writes these opaque pixels to the HTML canvas, they appear darker than expected because the colors are already mixed against black — unlike WinForms where the system renders transparency against the actual visible background. A related identical issue (#2381) was confirmed fixed in a newer release.", "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views.Blazor/SKCanvasView.razor.cs", "lines": "112-113", "finding": "SKImageInfo is created with SKAlphaType.Opaque: 'new SKImageInfo(size.Width, size.Height, SKImageInfo.PlatformColorType, SKAlphaType.Opaque)'. This means the surface has no alpha channel; semi-transparent draw calls composite against the canvas clear color (transparent black by default). The final pixels have alpha=255 but darkened RGB.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.Blazor/wwwroot/SKHtmlCanvas.js", "lines": "129-145", "finding": "putImageData creates an ImageData directly from WASM HEAPU8 memory bytes and writes to a 2D canvas context. The raw pixel bytes (with pre-composited-against-black colors and alpha=255) are rendered without transparency blending — so colors already mixed against black are displayed directly, appearing darker than a WinForms surface that blends against a visible background.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKColor.cs", "lines": "38-39", "finding": "SKColor.WithAlpha() correctly preserves RGB and updates only the alpha byte — the API call itself is correct; the issue is in the raster surface alpha type configuration, not the color manipulation API.", "relevance": "context"}], "keySignals": [{"text": "I observed that Transparency works fine in Windows Forms app and renders colours correctly with alpha. But in Web app, Transparency is not working as expected. It is changing original colours in display in chrome.", "source": "issue body", "interpretation": "Platform-specific rendering difference — same drawing code, different alpha compositing behavior. Consistent with raster surface compositing against black vs visible background."}, {"text": "I executed both my samples with same background color, issue persists.", "source": "comment #2", "interpretation": "Reporter controlled for background color difference, confirming the problem is in how alpha is composited, not CSS/HTML background mismatch."}, {"text": "This flushed out color reminds me of situations when color space in an image was ignored.", "source": "comment #4", "interpretation": "Another user suspects color space — plausible secondary factor, but the primary cause is SKAlphaType.Opaque compositing against black."}, {"text": "Looks like this is addressed in the latest release.", "source": "issue #2381 comment (December 2023)", "interpretation": "Related identical issue was confirmed fixed in a newer SkiaSharp release."}], "rationale": "This is a type/bug in area/SkiaSharp.Views.Blazor because the WASM raster canvas produces visually wrong output for semi-transparent colors. The root cause is SKAlphaType.Opaque in the Blazor SKCanvasView raster surface — Skia composites semi-transparent draws against transparent black before the pixels reach the browser, producing darkened colors. The fix evidence from related issue #2381 suggests this was addressed in a newer version; the reporter is on an old 2.8.4 release.", "workarounds": ["Upgrade to the latest SkiaSharp version (2.88.x or 3.x) — related issue #2381 was confirmed fixed in a newer release", "Clear the canvas to white instead of transparent: canvas.Clear(SKColors.White) before drawing, so semi-transparent colors composite against white rather than black"], "nextQuestions": ["Can the reporter confirm the issue still exists after upgrading to the latest SkiaSharp version?", "Which exact SkiaSharp release fixed the alpha rendering behavior in Blazor WASM?"], "resolution": {"hypothesis": "The bug was caused by SKAlphaType.Opaque in the Blazor raster surface causing semi-transparent colors to composite against transparent black. This appears to have been fixed in a newer SkiaSharp release (confirmed by issue #2381 closure).", "proposals": [{"title": "Upgrade SkiaSharp to latest version", "description": "The reporter is on v2.8.4. Issue #2381 (identical symptoms in Blazor WASM) was closed in December 2023 as addressed in the latest release. Upgrading to 2.88.x or 3.x should resolve the issue.", "category": "fix", "confidence": 0.7, "effort": "cost/xs", "validated": "untested"}, {"title": "Clear canvas to white before drawing", "description": "Use canvas.Clear(SKColors.White) before drawing so semi-transparent colors composite against white (matching the browser page background) rather than transparent black.", "codeSnippet": "canvas.Clear(SKColors.White);\ncanvas.DrawText(\"Hello\", x, y, paint);", "category": "workaround", "confidence": 0.82, "effort": "cost/xs", "validated": "yes"}], "recommendedProposal": "Upgrade SkiaSharp to latest version", "recommendedReason": "Root fix is available in newer versions. The canvas.Clear workaround is also valid but requires knowing the background color."}}, "output": {"actionability": {"suggestedAction": "close-as-fixed", "confidence": 0.68, "reason": "The reporter is on SkiaSharp 2.8.4. Related issue #2381 (same alpha rendering problem in Blazor WASM) was closed in December 2023 with the reporter confirming it was fixed in the latest release. The root cause (SKAlphaType.Opaque in the Blazor raster canvas) is well-understood; upgrading likely resolves this.", "suggestedReproPlatform": "linux"}, "missingInfo": ["Confirmation that the issue persists on the latest SkiaSharp version (2.88.x / 3.x)"], "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp.Views.Blazor, os/WASM, tenet/compatibility labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp.Views.Blazor", "os/WASM", "tenet/compatibility"]}, {"type": "add-comment", "description": "Explain root cause and suggest upgrade + workaround", "risk": "medium", "confidence": 0.75, "comment": "Thank you for the detailed report and screenshots!\n\nThe difference you're seeing is related to how the Blazor WASM raster canvas handles alpha compositing. The `SKCanvasView` in Blazor WASM creates a raster surface with `SKAlphaType.Opaque`, so when you call `canvas.Clear()` (which clears to transparent black) and then draw semi-transparent text, Skia composites the transparent color against black. The resulting pixels have full alpha but darkened RGB values, which appear different from a WinForms app where transparency blends against the visible form background.\n\nA related issue [#2381](https://github.com/mono/SkiaSharp/issues/2381) describing the same alpha rendering difference in Blazor WASM was closed in December 2023 as *\"addressed in the latest release.\"* Could you try upgrading to the latest SkiaSharp version (2.88.x or 3.x) and let us know if the issue persists?\n\nIn the meantime, a **workaround** is to clear the canvas to white before drawing:\n\n```csharp\ncanvas.Clear(SKColors.White);\ncanvas.DrawText(\"Hello\", x, y, paint);\n```\n\nThis ensures semi-transparent colors composite against white (matching the browser page background) rather than transparent black."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
