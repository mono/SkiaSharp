<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2983, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-26T10:30:00Z", "currentLabels": ["type/bug"]}, "summary": "Wingdings Symbol-charset glyphs (\\u00FC, \\u0071, \\u00D8) render as empty boxes on Ubuntu Linux while working correctly on Windows, due to Wingdings not being installed by default on Linux and/or Skia not applying the Windows-specific Symbol charset 0xF000 offset remapping that GDI/DirectWrite provides.", "classification": {"type": {"value": "type/bug", "confidence": 0.9}, "area": {"value": "area/SkiaSharp", "confidence": 0.88}, "platforms": ["os/Linux"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "wrong-output", "errorMessage": "Unicode characters rendered as empty rectangle boxes (tofu) on Ubuntu Linux", "reproQuality": "complete", "targetFrameworks": ["net8.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a .NET 8.0 console app on Ubuntu Linux 22.04", "Install SkiaSharp v2.88.8", "Use SKTypeface.FromFamilyName(\"Wingdings\") and draw characters \\u00FC, \\u0071, \\u00D8", "Save as JPEG", "Observe empty boxes instead of Wingdings symbols"], "environmentDetails": "Ubuntu Linux 22.04 VM, .NET 8.0, SkiaSharp 2.88.8", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/838", "description": "Related: text measured differently on Linux vs Windows with Wingdings/Arial fonts"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.8", "3.116.1"], "currentRelevance": "likely", "relevanceReason": "Second commenter confirmed same issue in 3.116.1 even when loading font via FromStream, indicating this is not a version-specific regression but an ongoing cross-platform compatibility issue."}}, "analysis": {"summary": "Wingdings is a Windows-proprietary 'Symbol' charset font not installed by default on Linux. On Windows, GDI/DirectWrite automatically remaps character codes 0x20–0xFF to Unicode Private Use Area codepoints 0xF020–0xF0FF when rendering Symbol fonts, so \\u00FC maps to the Wingdings glyph at 0xF0FC. Skia on Linux does not apply this offset. When the font is also missing from the system, SKTypeface.FromFamilyName silently falls back to the default typeface. The second commenter's confirmation that even FromStream fails points to the Symbol charset remapping as the primary root cause.", "rationale": "Classified as type/bug because the same SkiaSharp API produces different visual output on Windows vs Linux for a font that can be legitimately loaded on both platforms. The platform-specific behavior is in Symbol charset handling inherited from Windows GDI conventions, not replicated by Skia cross-platform. Area is area/SkiaSharp because the rendering path and font resolution go through the core SkiaSharp bindings (SKTypeface, SKFontManager). tenet/compatibility applies because Windows-created applications relying on Wingdings rendering will break when deployed to Linux.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "79-80", "finding": "SKTypeface.FromFamilyName(familyName, style) calls SKFontManager.Default.MatchFamily(familyName, style) ?? Default. If Wingdings is not installed on Linux, MatchFamily returns null and the call silently falls back to SKTypeface.Default (system sans-serif). No warning or null return to the caller.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "77-87", "finding": "MatchFamily(familyName, style) delegates to native sk_fontmgr_match_family_style. There is no Symbol charset remapping (0x0020-0x00FF -> 0xF020-0xF0FF) in the SkiaSharp managed layer. This remapping is a Windows GDI/DirectWrite convention not replicated in Skia on Linux.", "relevance": "direct"}], "keySignals": [{"text": "Typeface = SKTypeface.FromFamilyName(\"Wingdings\")", "source": "issue body", "interpretation": "Relies on system font lookup. Wingdings is a Windows-only font not present on Ubuntu by default. On Linux this silently falls back to the default typeface."}, {"text": "I made sure to load the font via SKTypeface.FromStream(fontStream). This works great on Windows but only produces empty boxes on Ubuntu.", "source": "comment by jbartlau", "interpretation": "Loading Wingdings directly via FromStream still fails on Ubuntu in SkiaSharp 3.116.1. This rules out font-not-found as the sole cause and points to Skia not applying the Symbol charset 0xF000 codepoint offset that Windows does automatically for Symbol fonts."}, {"text": "If you did it in a linux vm, the most likely cause is that you have not installed any emoji capable fonts.", "source": "comment by HinTak", "interpretation": "Partial diagnosis — correctly identifies the missing-font case, but does not address why loading via FromStream also fails (Symbol charset issue)."}], "workarounds": ["Install Wingdings on Linux: copy the font file from a Windows machine to ~/.local/share/fonts/ and run fc-cache -f", "Load the font explicitly via SKTypeface.FromFile(\"/path/to/Wingdings.ttf\") instead of FromFamilyName, ensuring the font is distributed with the application", "Use the Unicode Private Use Area codepoints that the Wingdings font actually stores glyphs at: add 0xF000 to each character code (e.g., \\u00FC becomes (char)(0xF000 + 0x00FC) = \\uF0FC, \\u0071 becomes \\uF071, \\u00D8 becomes \\uF0D8). This is the actual cross-platform approach for Symbol charset fonts with Skia."], "nextQuestions": ["Does loading Wingdings via FromFile/FromStream with PUA codepoints (0xF000 offset) render correctly on Ubuntu?", "Does Skia upstream handle Symbol charset cmap remapping on any platform?", "Is there a way to detect whether a loaded typeface uses Symbol charset so SkiaSharp can document the required codepoint adjustment?"], "resolution": {"hypothesis": "Two issues compound: (1) Wingdings not installed by default on Linux causing silent fallback; (2) Skia cross-platform does not apply Windows GDI's automatic Symbol charset 0xF000 offset remapping, so the same character codes that work on Windows do not find glyphs in the font's cmap on Linux.", "proposals": [{"title": "Use PUA codepoints for Symbol charset fonts", "description": "For Wingdings and other Symbol charset fonts, use Unicode Private Use Area codepoints by adding 0xF000 to each character code. This accesses the actual glyph slots in the font's cmap table and works cross-platform with Skia.", "category": "workaround", "codeSnippet": "// For Wingdings (Symbol charset), add 0xF000 to get PUA codepoints\nstring[] bullets = {\n    ((char)(0xF000 + 0x00FC)).ToString(),  // was \\u00FC\n    ((char)(0xF000 + 0x0071)).ToString(),  // was \\u0071\n    ((char)(0xF000 + 0x00D8)).ToString()   // was \\u00D8\n};\n// Load font explicitly (don't rely on system font lookup)\nvar typeface = SKTypeface.FromFile(\"/path/to/Wingdings.ttf\");\nvar bulletPaint = new SKPaint { Typeface = typeface, TextSize = 30, IsAntialias = true, Color = SKColors.Black };", "confidence": 0.8, "effort": "cost/xs", "validated": "untested"}, {"title": "Document Symbol charset font cross-platform requirements", "description": "Add documentation explaining that Windows Symbol charset fonts (Wingdings, Webdings, Symbol) require loading via FromFile/FromStream and using PUA codepoints (0xF000 offset) for cross-platform compatibility with Skia, since Windows GDI's automatic Symbol charset remapping is not present on Linux/macOS.", "category": "fix", "confidence": 0.85, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Use PUA codepoints for Symbol charset fonts", "recommendedReason": "Addresses both causes: explicitly loading the font file avoids silent fallback, and using PUA codepoints (0xF000 offset) aligns with how Skia's cmap lookup works cross-platform for Symbol charset fonts."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Complete repro provided with screenshots. Second commenter confirms the issue in a newer version even with explicit font loading. Root cause hypothesis (Symbol charset PUA offset) needs reproduction to confirm before closing or fixing.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, area, platform, and tenet labels", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/SkiaSharp", "os/Linux", "tenet/compatibility"]}, {"type": "add-comment", "description": "Explain the two root causes and provide PUA codepoint workaround", "risk": "medium", "confidence": 0.8, "comment": "Thanks for the report and the screenshots.\n\nThere are two compounding issues here:\n\n1. **Wingdings is not installed on Ubuntu by default.** When `SKTypeface.FromFamilyName(\"Wingdings\")` can't find the font, it silently falls back to the system default typeface, which doesn't contain Wingdings glyphs.\n\n2. **Symbol charset fonts require PUA codepoints on Linux.** Wingdings uses a Windows \"Symbol\" charset encoding where glyphs are stored in the font at Unicode Private Use Area codepoints (U+F000–U+F0FF). On Windows, GDI/DirectWrite automatically adds the 0xF000 offset when rendering Symbol fonts, so `\\u00FC` is automatically looked up as `\\uF0FC`. Skia on Linux does not apply this offset — confirmed by the second commenter who still sees empty boxes even after loading the font via `FromStream`.\n\n**Workaround:** Load the font file explicitly and use PUA codepoints:\n\n```csharp\n// Load Wingdings from file (distribute the .ttf with your app)\nvar typeface = SKTypeface.FromFile(\"/path/to/Wingdings.ttf\");\n\n// Use PUA codepoints (add 0xF000 to the character code)\nstring[] bullets = {\n    ((char)(0xF000 + 0x00FC)).ToString(),  // \\u00FC → \\uF0FC\n    ((char)(0xF000 + 0x0071)).ToString(),  // \\u0071 → \\uF071\n    ((char)(0xF000 + 0x00D8)).ToString()   // \\u00D8 → \\uF0D8\n};\n```\n\nCould you try this workaround and confirm whether it resolves the issue on your Ubuntu VM? That will help confirm the root cause before we investigate whether Skia should handle Symbol charset remapping cross-platform."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
