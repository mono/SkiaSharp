<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1490, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-21T22:36:00Z"}, "summary": "AccessViolationException crash in UWP/WinUI SKGLView when navigating to/from a page with DrawInBackground=true, caused by a race condition between the background render thread and EGL context disposal during page unload.", "classification": {"type": {"value": "type/bug", "confidence": 0.97}, "area": {"value": "area/SkiaSharp.Views", "confidence": 0.95}, "platforms": ["os/Windows-Universal-UWP", "os/Windows-WinUI"], "backends": ["backend/OpenGL"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": true, "errorType": "crash", "errorMessage": "System.AccessViolationException: Attempted to read or write protected memory. This is often an indication that other memory is corrupt.", "reproQuality": "complete", "targetFrameworks": ["uap10.0.16299"]}, "reproEvidence": {"stepsToReproduce": ["Create a UWP/Xamarin.Forms app with two pages: one native, one with SKGLView", "Set DrawInBackground = true on the SKGLView", "Navigate forward and back between pages multiple times", "Observe AccessViolationException"], "environmentDetails": "Windows 2004 (OS Build 19041.450), Visual Studio 2019 v16.6.1, UWP SDK 16299", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/files/5182897/MemoryViolationRepro.zip", "description": "Minimal UWP repro project"}, {"url": "https://github.com/mono/SkiaSharp/pull/3291", "description": "PR adding SKAutoCanvasRestore disposal safety — partial mitigation, merged 2025-06-24"}, {"url": "https://github.com/mono/SkiaSharp/issues/706", "description": "Related: SKGLView invalid memory exception when calling InvalidateSurface (closed)"}]}, "versionAnalysis": {"mentionedVersions": ["1.68.0", "1.68.3", "2.80.1"], "workedIn": "1.68.0", "brokeIn": "1.68.3", "currentRelevance": "likely", "relevanceReason": "The AngleSwapChainPanel threading model with DrawInBackground has not been fundamentally fixed; PR #3291 only addressed SKAutoCanvasRestore — the race condition in OnUnloaded vs background render threads remains."}, "regression": {"isRegression": true, "confidence": 0.9, "reason": "Reporter confirms the last known good version is 1.68.0. A commenter (kerego) identified the introducing commit as 8039d0d0bbb135e8013be121cddf8716e7b8ce96. Issue spans 1.68.3 through at least 2.80.1 and persists in v3 WinUI per later comments.", "workedInVersion": "1.68.0", "brokeInVersion": "1.68.3"}}, "analysis": {"summary": "Race condition in AngleSwapChainPanel: when DrawInBackground=true, background render threads (ThreadPool.RunAsync) continue executing RenderFrame/MakeCurrent after OnUnloaded has destroyed the EGL surface and context, causing an access violation in native ANGLE/EGL code. OnUnloaded cancels the render loop worker but does not await its completion before disposing glesContext.", "rationale": "This is a clear threading race condition: the disposal path in OnUnloaded does not synchronize with in-flight background render threads. The bug was introduced in commit 8039d0d and affects both UWP and WinUI. Setting DrawInBackground=false is a confirmed workaround. The issue is still open with active community engagement including a partial fix PR (#3291).", "keySignals": [{"text": "DrawInBackground is set to true ... Navigate forward and back a few times ... App crashes", "source": "issue body", "interpretation": "Crash only manifests on the background-thread render path, confirming a threading/lifecycle race."}, {"text": "the issue was first introduced with commit 8039d0d0bbb135e8013be121cddf8716e7b8ce96 ... after destroying the eglContext it tends to fail on the next call to MakeCurrent()", "source": "comment by kerego", "interpretation": "Precise regression commit identified; MakeCurrent called on a destroyed context = use-after-free."}, {"text": "The exception occurs when ThreadPool.RunAsync(RenderOnce) or ThreadPool.RunAsync(RenderLoop) plan the new AngleSwapChainPanel work on a thread that was already used before", "source": "comment by MartinZikmund", "interpretation": "Thread-pool thread reuse exposes the stale EGL state from the previous context."}, {"text": "Windows hardware-accelerated rendering using double-buffering, while our current disposal logic is for a one-buffer. So when we dispose an object that is still used by another buffer, we get a crash", "source": "comment by taublast", "interpretation": "Root cause framed as double-buffer lifecycle mismatch — disposal occurs while GPU still holds reference."}, {"text": "Setting DrawInBackground = false, fixes the issue, but severely affects performance.", "source": "issue body", "interpretation": "Confirmed workaround; the foreground-thread path serializes rendering and disposal correctly."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/AngleSwapChainPanel.cs", "lines": "137-151", "finding": "OnUnloaded calls UpdateRenderLoop(false) which cancels the IAsyncAction but does NOT await completion. It then immediately calls DestroyRenderSurface() and glesContext.Dispose(). A background thread executing RenderFrame() -> glesContext.MakeCurrent() can race with this disposal.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/AngleSwapChainPanel.cs", "lines": "244-262", "finding": "UpdateRenderLoop(false): calls renderLoopWorker.Cancel() and nulls the reference but does not wait for the in-flight IAsyncAction to complete before returning. The cancel is asynchronous.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/AngleSwapChainPanel.cs", "lines": "213-238", "finding": "RenderFrame() calls glesContext.MakeCurrent() without any disposed/null guard. If the context is destroyed concurrently, this crashes into native EGL code.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/GlesInterop/GlesContext.cs", "lines": "136-142", "finding": "MakeCurrent() calls eglMakeCurrent with stored eglSurface/eglContext. After Cleanup() destroys eglContext and DestroySurface() clears eglSurface, calling MakeCurrent from a still-running thread passes EGL_NO_CONTEXT / EGL_NO_SURFACE which triggers the native crash.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/SKSwapChainPanel.cs", "lines": "57-79", "finding": "OnRenderFrame disposes and recreates renderTarget/surface when IsValid fails. If this runs concurrently with OnDestroyingContext (which also disposes these objects), double-dispose or use-after-free of GRBackendRenderTarget/SKSurface can occur.", "relevance": "related"}], "workarounds": ["Set DrawInBackground = false on the SKGLView/SKSwapChainPanel — confirmed by reporter to fix the crash, but reduces rendering performance.", "Use a custom handler (as posted by taublast in comments) that defers disposal of the SKSurface/renderTarget using a 'trash bag' collection to prevent use-after-free during double-buffer GPU teardown."], "nextQuestions": ["Does the crash reproduce in current SkiaSharp 3.x WinUI builds (PR #3291 merged June 2025)?", "Can OnUnloaded be made to await render thread completion using a CancellationToken + SemaphoreSlim before disposing glesContext?", "Does calling context.Flush() + surface.Flush() before disposal prevent the crash on teardown?"], "resolution": {"hypothesis": "Background render threads started via ThreadPool.RunAsync are not awaited before EGL context/surface disposal in OnUnloaded, causing use-after-free when the thread's next MakeCurrent() call runs against a destroyed context.", "proposals": [{"title": "Set DrawInBackground = false as temporary workaround", "description": "Setting DrawInBackground = false forces rendering on the UI thread, serializing it with disposal. This eliminates the race at the cost of UI thread blocking during rendering.", "category": "workaround", "confidence": 0.98, "effort": "cost/xs", "validated": "yes"}, {"title": "Await render thread completion in OnUnloaded", "description": "Add a CancellationTokenSource and a completion signal (e.g. ManualResetEventSlim) to AngleSwapChainPanel. RenderFrame/RenderLoop set the signal on exit. OnUnloaded cancels and waits on the signal with a timeout before destroying the surface and context.", "category": "fix", "confidence": 0.82, "effort": "cost/m", "validated": "untested"}, {"title": "Deferred disposal (trash-bag pattern)", "description": "Rather than immediately disposing SKSurface and GRBackendRenderTarget in OnDestroyingContext, collect them in a 'trash' list and dispose them at the start of the next RenderFrame call (on the render thread, when it's safe). This is the pattern proposed by taublast in comments.", "category": "fix", "confidence": 0.75, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Set DrawInBackground = false as temporary workaround", "recommendedReason": "Zero code change for users needing immediate relief. The proper fix (awaiting render thread) requires changes to AngleSwapChainPanel and is tracked for a future release."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.88, "reason": "Real crash with a complete repro project, a confirmed regression commit, deep community analysis, and a proposed fix path. Needs investigation to verify current state after PR #3291 and to implement proper thread synchronization in OnUnloaded.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp.Views, os/Windows-Universal-UWP, os/Windows-WinUI, backend/OpenGL, tenet/reliability labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp.Views", "os/Windows-Universal-UWP", "os/Windows-WinUI", "backend/OpenGL", "tenet/reliability"]}, {"type": "add-comment", "description": "Acknowledge regression, confirm workaround, summarize root cause, and ask for repro on latest version", "risk": "medium", "confidence": 0.88, "comment": "Thank you for the detailed report and reproduction project!\n\n**Root cause:** This is a race condition in `AngleSwapChainPanel`. When `DrawInBackground = true`, rendering runs on a background thread pool thread. During page navigation, `OnUnloaded` cancels the render loop and disposes the EGL context/surface — but it does **not** wait for the background render thread to finish. If the thread calls `MakeCurrent()` after the context has been destroyed, the native ANGLE/EGL code crashes with an `AccessViolationException`.\n\n**Immediate workaround:** Setting `DrawInBackground = false` forces rendering on the UI thread, which serializes it with the disposal lifecycle. This eliminates the race condition at the cost of some rendering performance.\n\n**Status:** A partial related fix was merged in PR #3291 (safety checks in `SKAutoCanvasRestore`). The core threading issue in `AngleSwapChainPanel.OnUnloaded` still needs a proper fix (awaiting render thread completion before disposal).\n\nCould you confirm whether you still see this crash on the latest SkiaSharp 3.x release? That would help us understand the current scope of the issue."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
