<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1501, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-28T21:35:00Z"}, "summary": "DrawBitmap decoded from SKCodec is 20-30x slower on UWP (200-300ms) vs .NET Core/.NET Framework (<10ms) with SkiaSharp 2.80.2; reporter found that manually referencing the netstandard2.0 managed DLL restores normal performance, implicating the UWP-specific native or managed code path.", "classification": {"type": {"value": "type/bug", "confidence": 0.93}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.82}, "platforms": ["os/Windows-Universal-UWP"], "backends": ["backend/Raster"], "tenets": ["tenet/performance"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "performance", "errorMessage": "DrawBitmap costs 200-300ms on UWP; same operation takes <10ms on .NET Core/.NET Framework", "reproQuality": "complete", "targetFrameworks": ["uap10.0.18362"]}, "reproEvidence": {"stepsToReproduce": ["Create a UWP project targeting SDK 18362", "Use SKCodec.Create(stream) to decode a PNG", "Draw the decoded bitmap with canvas.DrawBitmap(decodeBitmap, dest)", "Measure time with Stopwatch"], "environmentDetails": "SkiaSharp 2.80.2, UWP SDK 18362, Windows 10, Visual Studio", "repoLinks": [{"url": "https://github.com/h82258652/SKCodecUwpPerformanceRepo", "description": "Reporter's minimal reproduction project"}]}, "versionAnalysis": {"mentionedVersions": ["2.80.2"], "currentRelevance": "unlikely", "relevanceReason": "SkiaSharp 3.x dropped UWP (uap10.0) support entirely; affected users should migrate to WinUI or stay on 2.88.x."}}, "analysis": {"summary": "Performance on UWP is 20-30x worse than .NET Core/Framework for DrawBitmap. The reporter's self-diagnosis (replacing the UWP managed DLL with the netstandard2.0 DLL while keeping the same libSkiaSharp.dll) restores performance, strongly implicating either the UWP-specific native DLL compilation (WACK compliance disabling SIMD) or the UWP TFM managed code path (USE_DELEGATES mode adding per-call dispatch overhead). The most likely root cause is the UWP native library being compiled without SSE/AVX optimizations to comply with Windows App Certification Kit requirements, making per-pixel operations in DrawBitmap dramatically slower.", "rationale": "The reporter's workaround — using the netstandard2.0 managed DLL but keeping the same native DLL directory — directly narrows the cause to the UWP TFM build. DrawBitmap calls SKImage.FromBitmap then DrawImage, both of which involve significant pixel operations inside the native Skia library. A 20-30x performance gap at the same workload is consistent with SIMD being disabled in the UWP native build for WACK compliance. This is classified as type/bug because the behavior significantly deviates from expected cross-platform performance, and area/libSkiaSharp.native because the root cause is in how the native library is compiled for UWP. Issue has low current relevance since SkiaSharp 3.x dropped UWP support.", "keySignals": [{"text": "I download the 2.80.2 nuget package, extra it and then let the UWP project reference the .net standard 2.0 dll (also copy the libSkiaSharp.dll), the performance equals to run on .net core or .net framework.", "source": "comment by reporter", "interpretation": "The performance difference is between the UWP TFM managed DLL and the netstandard2.0 DLL with the same native library — implicates the managed code path (USE_DELEGATES P/Invoke overhead) or UWP native DLL compilation flags."}, {"text": "It cost 200~300 ms on my computer and the .net core and .net framework version, only takes <10 ms.", "source": "issue body", "interpretation": "20-30x performance gap is consistent with disabled SIMD/AVX in UWP native build or high per-call delegate overhead in USE_DELEGATES mode."}, {"text": "Version with issue: 2.80.2 / Last known good version: 2.80.2", "source": "issue body", "interpretation": "Reporter has no known-good version; this may have always been the case for UWP builds. No regression — this is a platform-specific build limitation."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKCanvas.cs", "lines": "577-581", "finding": "DrawBitmap(SKBitmap, SKRect, SKPaint) converts the bitmap to SKImage via SKImage.FromBitmap then calls DrawImage. Both are native calls. No UWP-specific override.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKImage.cs", "lines": "237-244", "finding": "SKImage.FromBitmap calls sk_image_new_from_bitmap via a single P/Invoke. In UWP TFM builds with USE_DELEGATES, this goes through a delegate lookup rather than a direct DllImport call.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SkiaSharp.csproj", "lines": "12-14", "finding": "USE_DELEGATES is defined for net4* TFMs. In SkiaSharp 2.80.2, the UWP TFM (uap10.0) also used USE_DELEGATES. With delegates, every native call dispatches through a Delegate pointer rather than a static DllImport entry point — adds per-call overhead but likely insufficient alone to explain 200ms gap.", "relevance": "related"}, {"file": "binding/Binding.Shared/PlatformConfiguration.cs", "lines": "6-62", "finding": "WINDOWS_UWP conditional compilation confirms UWP has a distinct managed code path. No rendering-related conditional differences found — platform differences are limited to OS detection.", "relevance": "context"}], "workarounds": ["Extract the SkiaSharp NuGet package and reference the netstandard2.0 managed DLL directly (binding/SkiaSharp.dll targeting netstandard2.0) while placing libSkiaSharp.dll in the app output directory. This bypasses the UWP TFM build.", "Migrate the app to WinUI 3 and use SkiaSharp 3.x which ships a properly-optimized Windows native library.", "Stay on SkiaSharp 2.88.x (last 2.x release) which may have improved UWP build flags over 2.80.2."], "nextQuestions": ["Is the performance difference caused by the UWP native library being compiled without SIMD optimizations (WACK compliance), or by USE_DELEGATES delegate dispatch overhead?", "Does the 2.88.x UWP build show the same performance regression?", "What CPU instructions does the libSkiaSharp.dll for UWP support (check PE headers / DUMPBIN /DISASM for SSE/AVX instructions)?"], "resolution": {"hypothesis": "The UWP libSkiaSharp.dll was compiled without SIMD/AVX optimizations for WACK compliance, making per-pixel drawing operations like DrawBitmap 20-30x slower than the Win32/netstandard native library. The managed code path (USE_DELEGATES) adds minor overhead but is unlikely to account for 200ms.", "proposals": [{"title": "Migrate to WinUI 3 / SkiaSharp 3.x", "description": "SkiaSharp 3.x dropped UWP and ships optimized WinUI 3 native libraries. Migration resolves the performance issue.", "category": "alternative", "confidence": 0.9, "effort": "cost/l", "validated": "untested"}, {"title": "Use netstandard2.0 DLL workaround", "description": "Reference the netstandard2.0 SkiaSharp.dll directly and copy the Win32 libSkiaSharp.dll alongside it. Reported by the issue author to restore normal performance.", "category": "workaround", "confidence": 0.85, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Migrate to WinUI 3 / SkiaSharp 3.x", "recommendedReason": "UWP is deprecated by Microsoft and no longer supported in SkiaSharp 3.x. The workaround is fragile and unsupported. Migration is the correct long-term path."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.72, "reason": "Root cause (WACK SIMD restriction vs delegate overhead) is not confirmed by code inspection alone. Issue is from 2020 on a now-unsupported platform (UWP). Current relevance is low, but root cause confirmation would help document the limitation for historical reference.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply bug, native, UWP, performance tenet labels", "risk": "low", "confidence": 0.93, "labels": ["type/bug", "area/libSkiaSharp.native", "os/Windows-Universal-UWP", "tenet/performance"]}, {"type": "add-comment", "description": "Acknowledge the issue, confirm workaround, note that UWP is no longer supported in SkiaSharp 3.x", "risk": "medium", "confidence": 0.8, "comment": "Thank you for the detailed report and the reproduction repository!\n\nThe performance difference you're seeing is consistent with the UWP build of `libSkiaSharp.dll` being compiled without SIMD/AVX CPU optimizations to comply with Windows App Certification Kit (WACK) requirements. This makes per-pixel operations like `DrawBitmap` significantly slower than the Win32 Desktop build.\n\nYour workaround (using the `netstandard2.0` managed DLL with the non-UWP `libSkiaSharp.dll`) works because you're loading the Win32 Desktop native library that has full SIMD optimizations enabled.\n\nFor a more robust workaround: use `SkiaSharp 2.88.x` (the latest 2.x release) which may have improved UWP build settings.\n\nLonger term, **SkiaSharp 3.x has dropped UWP support** in favour of WinUI 3. If migrating is an option, SkiaSharp 3.x ships an optimized Windows native library and this performance issue would not apply."}]}};</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
