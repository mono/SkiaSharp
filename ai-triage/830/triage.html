<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 830, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-22T15:06:47Z", "currentLabels": ["type/question"]}, "summary": "Reporter asks how to enable subpixel (ClearType) text antialiasing on Windows using SkiaSharp WinForms views; the issue evolved to reveal that subpixel rendering regressed in 2.88.x because Skia changed the default PixelGeometry to Unknown, and the views API provides no way to pass SKSurfaceProperties to opt back in.", "classification": {"type": {"value": "type/question", "confidence": 0.8}, "area": {"value": "area/SkiaSharp.Views", "confidence": 0.82}, "platforms": ["os/Windows-Classic"], "tenets": ["tenet/compatibility"]}, "evidence": {"reproEvidence": {"stepsToReproduce": ["Create a WinForms app with SKControl/SKCanvasView", "Set SKPaint.SubpixelText = true and SKFont.Edging = SubpixelAntialias", "Draw text — subpixel (ClearType) rendering does not appear, only grayscale AA"], "environmentDetails": "Windows, SkiaSharp 2.88.x, WinForms SKControl", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/2308", "description": "Follow-up bug: subpixel rendering regressed in 2.88.x vs 2.80.x"}]}, "versionAnalysis": {"mentionedVersions": ["2.80.2", "2.80.3", "2.80.4", "2.88.0-preview", "2.88.3"], "workedIn": "2.80.4", "brokeIn": "2.88.0-preview", "currentRelevance": "likely", "relevanceReason": "The views still create surfaces without SKSurfaceProperties; no fix has been shipped for the missing API to configure PixelGeometry on SKControl/SKElement."}, "regression": {"isRegression": true, "confidence": 0.85, "reason": "Multiple commenters confirmed subpixel rendering worked in 2.80.x and stopped working in 2.88.x. Root cause identified: Skia upstream changed default PixelGeometry from RgbHorizontal to Unknown (https://bugs.chromium.org/p/skia/issues/detail?id=3934).", "workedInVersion": "2.80.4", "brokeInVersion": "2.88.0-preview"}}, "analysis": {"summary": "Subpixel (ClearType) text rendering requires two conditions: (1) SKFont.Edging = SubpixelAntialias, and (2) the surface must be created with SKSurfaceProperties(SKPixelGeometry.RgbHorizontal). The SkiaSharp views (SKControl, SKElement) create surfaces without SKSurfaceProperties, so PixelGeometry defaults to Unknown and subpixel rendering is silently disabled. This was not a problem until 2.88.x when Skia changed the default. A workaround exists (render to an off-screen SKSurface with the correct properties), but the views need a SurfaceProperties property to expose this cleanly.", "rationale": "The original title labels it a question, but the comments reveal it is both a usage question (answered: SKFontEdging.SubpixelAntialias) and an enhancement gap (views don't expose SKSurfaceProperties). The regression noted in 2.88.x is real — caused by an upstream Skia change in PixelGeometry default. Related issue #2308 was closed 'completed' after a workaround was documented, but the views still lack a first-class API for this. Classified type/question because the issue title and body are usage questions and a workaround exists; the views enhancement gap is tracked as a separate observation.", "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views.WindowsForms/SKControl.cs", "lines": "42", "finding": "SKSurface.Create(info, data.Scan0, data.Stride) is called without SKSurfaceProperties — no PixelGeometry is specified, so it defaults to Unknown, disabling subpixel AA", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WPF/SKElement.cs", "lines": "73", "finding": "SKSurface.Create(info, bitmap.BackBuffer, bitmap.BackBufferStride) is called without SKSurfaceProperties — same issue as SKControl; subpixel AA is silently disabled", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFont.cs", "lines": "67-70", "finding": "SKFont.Edging property maps directly to sk_font_get/set_edging — SubpixelAntialias value is correctly exposed and functional", "relevance": "related"}, {"file": "binding/SkiaSharp/SKSurfaceProperties.cs", "lines": "15-23", "finding": "SKSurfaceProperties(SKPixelGeometry) constructor exists and works correctly; the workaround of creating an off-screen surface with this is valid", "relevance": "related"}], "keySignals": [{"text": "SubpixelText = true ... Neither DrawText nor DrawShapedText gave us the subpixel rendering", "source": "issue body", "interpretation": "Reporter used the old SKPaint.SubpixelText API which is now obsolete; the correct approach is SKFont.Edging = SubpixelAntialias plus the correct surface PixelGeometry"}, {"text": "ClearType is only possible on surfaces that don't use premultiplied alpha", "source": "comment by Gillibald", "interpretation": "Early hint at the surface properties requirement; partially correct — the key is PixelGeometry, not just alpha"}, {"text": "The PixelGeometry on created surface is now defaulting to Unknown instead of RgbHorizontal. To bring back the default behaviour the SKSurface ctor must be provided SKSurfaceProperties with SKPixelGeometry.RgbHorizontal", "source": "comment by themcoo on issue #2308", "interpretation": "Root cause identified: Skia upstream change broke the default; workaround is to pass SKSurfaceProperties"}, {"text": "2.80.2: Subpixel displayed ok. 2.88.0-preview.x: Subpixel is NOT displayed ok.", "source": "comment by danipen", "interpretation": "Regression confirmed across multiple SkiaSharp versions"}, {"text": "I don't see a possibility currently to hook up with different pixel geometry", "source": "comment by themcoo on issue #2308", "interpretation": "The views lack a first-class API to configure SKSurfaceProperties/PixelGeometry — an enhancement gap remains"}], "workarounds": ["Use SKFont.Edging = SKFontEdging.SubpixelAntialias (instead of the obsolete SKPaint.SubpixelText)", "Create surfaces manually with new SKSurfaceProperties(SKPixelGeometry.RgbHorizontal) when not using the view controls", "For view controls: render to an off-screen SKSurface created with SKSurfaceProperties(SKPixelGeometry.RgbHorizontal), then blit that surface onto the main canvas"], "nextQuestions": ["Should SKControl/SKElement/SKXamlCanvas expose a SurfaceProperties property to let users configure PixelGeometry?", "Is there a platform-specific way to query the actual display pixel geometry on Windows to set it automatically?"], "resolution": {"hypothesis": "The original question is answered: use SKFontEdging.SubpixelAntialias plus SKSurfaceProperties(SKPixelGeometry.RgbHorizontal). The views don't expose a SurfaceProperties API, so users must work around via off-screen surface.", "proposals": [{"title": "Use SKFont.Edging = SubpixelAntialias with correct surface properties", "description": "Set SKFont.Edging = SKFontEdging.SubpixelAntialias and create surfaces with new SKSurfaceProperties(SKPixelGeometry.RgbHorizontal). When not using a view control, pass this to SKSurface.Create.", "category": "workaround", "codeSnippet": "var font = new SKFont { Edging = SKFontEdging.SubpixelAntialias, Size = 24 };\nvar paint = new SKPaint { Color = SKColors.Black, IsAntialias = true };\n// When creating surfaces manually:\nusing var surface = SKSurface.Create(imageInfo, new SKSurfaceProperties(SKPixelGeometry.RgbHorizontal));\ncanvas.DrawText(\"SkiaSharp\", x, y, font, paint);", "confidence": 0.9, "effort": "cost/xs", "validated": "yes"}, {"title": "Off-screen surface workaround for views", "description": "When using SKControl/SKElement, render to an off-screen SKSurface created with SKSurfaceProperties(SKPixelGeometry.RgbHorizontal), then draw that surface's image onto the event canvas.", "category": "workaround", "codeSnippet": "private void OnPaintSurface(object sender, SKPaintSurfaceEventArgs e)\n{\n    var mainCanvas = e.Surface.Canvas;\n    var info = e.Info;\n    using var offscreen = SKSurface.Create(info, new SKSurfaceProperties(SKPixelGeometry.RgbHorizontal));\n    var font = new SKFont { Edging = SKFontEdging.SubpixelAntialias, Size = 24 };\n    var paint = new SKPaint { Color = SKColors.Black, IsAntialias = true };\n    offscreen.Canvas.Clear(SKColors.White);\n    offscreen.Canvas.DrawText(\"SkiaSharp\", info.Width / 2f, info.Height / 2f, font, paint);\n    offscreen.Canvas.Flush();\n    using var img = offscreen.Snapshot();\n    mainCanvas.DrawImage(img, 0, 0);\n}", "confidence": 0.85, "effort": "cost/s", "validated": "yes"}], "recommendedProposal": "Use SKFont.Edging = SubpixelAntialias with correct surface properties", "recommendedReason": "Simplest approach; only applicable when creating surfaces directly. For view users, the off-screen surface workaround is the only available path until the views expose SurfaceProperties."}}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.78, "reason": "The original question is answered: subpixel rendering requires SKFontEdging.SubpixelAntialias and a surface created with SKPixelGeometry.RgbHorizontal. The behavior change in 2.88.x was upstream Skia design change, not a SkiaSharp bug. A workaround exists. The related enhancement (exposing SurfaceProperties on views) should be tracked as a separate feature request.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Update labels: keep type/question, add area/SkiaSharp.Views, os/Windows-Classic, tenet/compatibility", "risk": "low", "confidence": 0.85, "labels": ["type/question", "area/SkiaSharp.Views", "os/Windows-Classic", "tenet/compatibility"]}, {"type": "add-comment", "description": "Post answer with working code snippet and explanation of PixelGeometry requirement", "risk": "high", "confidence": 0.78, "comment": "Thanks for the question!\n\nEnabling subpixel (ClearType) text rendering in SkiaSharp requires two things:\n\n1. **Set `SKFont.Edging` to `SKFontEdging.SubpixelAntialias`** (the old `SKPaint.SubpixelText` is obsolete and does not do the same thing).\n2. **Create the surface with `SKSurfaceProperties(SKPixelGeometry.RgbHorizontal)`** — since SkiaSharp 2.88.x, Skia changed the default surface `PixelGeometry` to `Unknown`, which silently disables subpixel rendering.\n\n**If you control surface creation** (not using a view control):\n```csharp\nvar font = new SKFont { Edging = SKFontEdging.SubpixelAntialias, Size = 24 };\nvar paint = new SKPaint { Color = SKColors.Black, IsAntialias = true };\nusing var surface = SKSurface.Create(imageInfo, new SKSurfaceProperties(SKPixelGeometry.RgbHorizontal));\nsurface.Canvas.DrawText(\"SkiaSharp\", x, y, font, paint);\n```\n\n**If you are using `SKControl`, `SKElement`, or similar views** (which do not expose `SurfaceProperties`), you can work around this by rendering to an off-screen surface:\n```csharp\nprivate void OnPaintSurface(object sender, SKPaintSurfaceEventArgs e)\n{\n    var info = e.Info;\n    using var offscreen = SKSurface.Create(info, new SKSurfaceProperties(SKPixelGeometry.RgbHorizontal));\n    var font = new SKFont { Edging = SKFontEdging.SubpixelAntialias, Size = 24 };\n    var paint = new SKPaint { Color = SKColors.Black, IsAntialias = true };\n    offscreen.Canvas.Clear(SKColors.White);\n    offscreen.Canvas.DrawText(\"SkiaSharp\", info.Width / 2f, info.Height / 2f, font, paint);\n    offscreen.Canvas.Flush();\n    using var img = offscreen.Snapshot();\n    e.Surface.Canvas.DrawImage(img, 0, 0);\n}\n```\n\nNote: `SKColorType.Bgra8888` is required for subpixel AA on Windows (the default on that platform).\n\nThe upstream change is tracked at https://bugs.chromium.org/p/skia/issues/detail?id=3934. A feature request to expose `SurfaceProperties` on the SkiaSharp views would be a worthwhile enhancement to file separately."}, {"type": "close-issue", "description": "Close as answered — the question is resolved via the comment above", "risk": "medium", "confidence": 0.72, "stateReason": "completed"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
