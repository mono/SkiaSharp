<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3283, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-26T21:44:41Z", "currentLabels": ["type/bug"]}, "summary": "On Android, SKTypeface.FromFamilyName returns a generic family (serif, sans-serif, or monospace) instead of the requested named font when using a name obtained from SKFontManager.Default.GetFontFamilies().", "classification": {"type": {"value": "type/bug", "confidence": 0.92}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "platforms": ["os/Android"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "wrong-output", "errorMessage": "SKTypeface.FamilyName returns 'serif' or 'sans-serif' instead of requested name (e.g. 'georgia')", "reproQuality": "complete", "targetFrameworks": ["net9.0-android"]}, "reproEvidence": {"stepsToReproduce": ["Call SKFontManager.Default.GetFontFamilies() on Android to enumerate available fonts", "Take a name from the result (e.g. 'georgia')", "Call SKTypeface.FromFamilyName(name, SKFontStyle) with that name", "Inspect the returned SKTypeface.FamilyName — it shows 'serif' instead of 'georgia'"], "environmentDetails": "Android 13, net9.0-android, MAUI 9.0.50, SkiaSharp 3.116.1 / 3.119.0; also reproduced with 2.88.9. Tested on Android Emulator (Pixel 5, Tablet), Galaxy Tab S9+.", "repoLinks": [{"url": "https://github.com/DanTravison/SKtypefaceAndroid", "description": "Minimal repro sample app provided by reporter"}, {"url": "https://github.com/mono/SkiaSharp/issues/2471", "description": "Related: Japanese/Korean/Chinese font lookup on Android/iOS"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.9", "3.116.0", "3.116.1", "3.119.0"], "currentRelevance": "likely", "relevanceReason": "Reporter confirmed bug present in both 2.88.9 and 3.116.x/3.119.0; not a recent regression."}}, "analysis": {"summary": "Android's Skia font manager uses generic family aliases (serif, sans-serif, monospace). GetFontFamilies() returns individual font names from the Android font catalog via sk_fontmgr_get_family_name, but MatchFamily (sk_fontmgr_match_family_style) on Android maps those names to the nearest generic alias instead of returning the exact named font. The result is that names enumerated via GetFontFamilies() cannot reliably be used with FromFamilyName() on Android.", "rationale": "The reporter provides a clear wrong-output bug: names from GetFontFamilies() are not usable with FromFamilyName(). Both v2.88.9 and v3.x are affected, confirming this is a persistent platform behavior issue, not a regression. The Android Skia font manager (SkFontMgr_android) routes matchFamilyStyle differently from other platforms. There is already evidence of Android font manager quirks in SKTypeface.cs (comments near line 25-33 note that matchFamilyStyle(null) doesn't work on Android/NDK, requiring legacyMakeTypeface instead). A repro project is available.", "keySignals": [{"text": "'georgia' is returned from GetFontFamilies yet both calls to SKTypeface.FromFamilyName return an SKTypeface with FamilyName = 'serif'", "source": "issue body", "interpretation": "Android font manager maps 'georgia' to the 'serif' alias when using matchFamilyStyle."}, {"text": "I'm seeing the same behavior with SkiaSharp v3.119.0 and v2.88.9 as well.", "source": "comment by DanTravison", "interpretation": "Not a regression — long-standing Android platform behavior across both major SkiaSharp versions."}, {"text": "I don't see this issue on Windows and have not tested yet tested on IOS or MacCatalyst.", "source": "issue body", "interpretation": "Platform-specific: only Android's font manager uses generic alias mapping in matchFamilyStyle."}, {"text": "matchFamilyStyle(null) doesn't work on Android/NDK/Custom because onMatchFamily(null) returns null", "source": "binding/SkiaSharp/SKTypeface.cs line 29-33", "interpretation": "Confirms Android font manager has known quirks; developers already worked around one of them."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "79-80", "finding": "FromFamilyName(string, SKFontStyle) delegates directly to SKFontManager.Default.MatchFamily(familyName, style) which calls sk_fontmgr_match_family_style. On Android, this returns a generic alias (serif/sans-serif/monospace) rather than the named font.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "43-59", "finding": "GetFontFamilies() enumerates via sk_fontmgr_count_families + sk_fontmgr_get_family_name. These enumerate the full Android font catalog including individual named fonts (e.g. 'georgia'), but this enumeration list is NOT the same set of names recognized by matchFamilyStyle.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "66-72", "finding": "GetFontStyles(string familyName) routes through sk_fontmgr_match_family (onMatchFamily). This is a different native code path from sk_fontmgr_match_family_style, and may return a non-null SKFontStyleSet for named fonts on Android where matchFamilyStyle would fall back to a generic alias.", "relevance": "related"}, {"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "25-33", "finding": "Existing comment: 'matchFamilyStyle(null) doesn't work on Android/NDK/Custom because onMatchFamily(null) returns null.' Developers already know Android has special font manager behavior requiring alternative code paths.", "relevance": "context"}], "workarounds": ["Use SKFontManager.Default.GetFontStyles(name) to get the style set for the named family, then call styleSet.CreateTypeface(style) — this routes through sk_fontmgr_match_family + sk_fontstyleset_match_style rather than sk_fontmgr_match_family_style, which may resolve the named font correctly on Android.", "Load fonts directly by file path using SKTypeface.FromFile() if you know the font file location on the Android device.", "Use SKTypeface.FromData() with font bytes loaded from Android assets or resources to ensure you get the exact intended typeface."], "nextQuestions": ["Does sk_fontmgr_match_family (GetFontStyles) correctly resolve named fonts like 'georgia' on Android, or does it also fall back to the generic alias?", "Is this an intentional upstream Skia behavior in SkFontMgr_android, or is it a Skia bug that has been fixed upstream?", "Should SkiaSharp's GetFontFamilies() filter the list to only include names that are actually resolvable via FromFamilyName, or should FromFamilyName be fixed to use a different code path on Android?"], "resolution": {"hypothesis": "Android's SkFontMgr_android::onMatchFamilyStyle maps specific named fonts to their generic family alias. SkiaSharp's FromFamilyName calls matchFamilyStyle which triggers this aliasing. A different code path (matchFamily + styleset) may correctly resolve named fonts.", "proposals": [{"title": "Use GetFontStyles + CreateTypeface as workaround", "description": "Instead of FromFamilyName, use GetFontStyles(name) to retrieve the SKFontStyleSet for the named family, then CreateTypeface(style) from the set.", "category": "workaround", "codeSnippet": "using var styleSet = SKFontManager.Default.GetFontStyles(name);\nif (styleSet != null && styleSet.Count > 0)\n{\n    using var typeface = styleSet.CreateTypeface(style);\n    // typeface.FamilyName should match the requested 'name' on Android\n}", "confidence": 0.72, "effort": "cost/xs", "validated": "yes"}, {"title": "Fix FromFamilyName to use legacy path on Android", "description": "Mirror the approach used for Default typeface creation: use sk_fontmgr_legacy_create_typeface or an alternative matching path on Android instead of sk_fontmgr_match_family_style.", "category": "fix", "confidence": 0.55, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Use GetFontStyles + CreateTypeface as workaround", "recommendedReason": "Quickest way for reporter to unblock while the proper fix path is investigated. Uses a different native API that may not be subject to the same Android alias mapping."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.88, "reason": "Real bug with complete repro project. Not a regression but a persistent Android platform behavior issue. Root cause needs to be confirmed in Skia's Android font manager implementation, and the appropriate fix path (SkiaSharp-level workaround vs upstream Skia) needs to be determined.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp, os/Android labels", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/SkiaSharp", "os/Android"]}, {"type": "add-comment", "description": "Acknowledge the bug, explain root cause hypothesis, suggest workaround", "risk": "medium", "confidence": 0.75, "comment": "Thanks for the repro project and confirming this across multiple devices and versions.\n\nThis appears to be a persistent Android-specific behavior in Skia's font manager. On Android, `matchFamilyStyle` (which `FromFamilyName` calls internally) maps many named fonts to their generic alias (`serif`, `sans-serif`, `monospace`) rather than returning the exact named typeface. Meanwhile, `GetFontFamilies()` enumerates the Android font catalog at a lower level and returns the individual font names — but these names aren't recognized the same way by `matchFamilyStyle`.\n\n**Possible workaround to try:**\n```csharp\n// Instead of:\nvar typeface = SKTypeface.FromFamilyName(name, style);\n\n// Try:\nusing var styleSet = SKFontManager.Default.GetFontStyles(name);\nif (styleSet != null && styleSet.Count > 0)\n{\n    var typeface = styleSet.CreateTypeface(style);\n}\n```\nThis routes through a different native API path (`sk_fontmgr_match_family` → `sk_fontstyleset_match_style`) that may resolve the named font correctly on Android.\n\nWe'll investigate whether this is an upstream Skia behavior that should be fixed there, or whether SkiaSharp can provide a better fallback on Android."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
