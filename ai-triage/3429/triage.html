<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3429, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-28T02:34:23Z", "currentLabels": ["type/bug", "os/Windows-Classic", "tenet/reliability"]}, "summary": "Reporter observes a memory leak in a WPF application when drawing patterns on a high-resolution monitor, but only when using an Nvidia Quadro GPU; the issue is claimed as a regression from 2.88.9 to 3.116.0 and is resolved by forcing software-only WPF rendering.", "classification": {"type": {"value": "type/bug", "confidence": 0.82}, "area": {"value": "area/SkiaSharp.Views", "confidence": 0.75}, "platforms": ["os/Windows-Classic"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "memory-leak", "reproQuality": "partial", "targetFrameworks": []}, "reproEvidence": {"stepsToReproduce": ["Run a WPF application that draws patterns using SkiaSharp on a high-resolution monitor", "Machine must have an Nvidia Quadro GPU", "Observe memory growing over time"], "environmentDetails": "Windows, SkiaSharp 3.116.0, Visual Studio, Nvidia Quadro GPU, high-resolution monitor"}, "versionAnalysis": {"mentionedVersions": ["3.116.0", "2.88.9"], "workedIn": "2.88.9", "brokeIn": "3.116.0", "currentRelevance": "likely", "relevanceReason": "Reporter explicitly names the version they are using (3.116.0) as affected and 2.88.9 as last known good."}, "regression": {"isRegression": true, "confidence": 0.65, "reason": "Reporter explicitly states it worked in 2.88.9 and no longer works in 3.116.0. Version gap is large; without repro code the regression cannot be confirmed.", "workedInVersion": "2.88.9", "brokeInVersion": "3.116.0"}}, "analysis": {"summary": "Memory leak reported in WPF when drawing patterns on high-DPI monitors with Nvidia Quadro GPUs. The leak is resolved by forcing WPF to software-only rendering mode (`RenderOptions.ProcessRenderMode = RenderMode.SoftwareOnly`), which disables WPF's DirectX compositing pipeline. SKElement renders Skia content to a CPU-side WriteableBitmap that WPF's DirectX compositor then blits to the screen; on Nvidia Quadro at high DPI the compositor may not release GPU-side texture resources correctly. Without a code sample or memory profile, the root cause cannot be pinpointed — the leak could also be in user code (undisposed SKShader/SKPaint objects holding patterns).", "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views.WPF/SKElement.cs", "lines": "45-88", "finding": "OnRender creates a WriteableBitmap scaled by DPI (scaleX, scaleY) and creates an SKSurface over its BackBuffer (properly disposed via 'using'). The final DrawImage call hands the bitmap to WPF's DrawingContext for GPU compositing. At high DPI the WriteableBitmap is proportionally larger; WPF's DirectX compositor may keep GPU-side copies of the texture that are not released promptly on Nvidia Quadro drivers.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WPF/SKGLElement.cs", "lines": "127-181", "finding": "SKGLElement uses OpenGL (via OpenTK) and manages a GRContext + GRBackendRenderTarget + SKSurface lifecycle. Release() disposes all of them. If the reporter uses SKGLElement rather than SKElement, the GRContext and render target management is a more direct GPU leak candidate.", "relevance": "related"}, {"file": "binding/SkiaSharp/SKShader.cs", "lines": "1-50", "finding": "SKShader.CreateBitmap and CreateImage are the standard SkiaSharp APIs for drawing tiled patterns. SKShader implements ISKReferenceCounted and must be disposed. If the reporter creates pattern shaders per frame without disposing them, native Skia objects accumulate.", "relevance": "related"}], "keySignals": [{"text": "memory leak issue was encountered on the high resolution monitor", "source": "issue body", "interpretation": "DPI scaling increases the WriteableBitmap pixel size, allocating more GPU texture memory per frame on high-DPI displays."}, {"text": "it only occurred in the Nvidia Quadro series", "source": "issue body", "interpretation": "GPU-driver-specific behavior points to WPF's DirectX compositor or OpenGL driver resource management rather than Skia's CPU rendering path."}, {"text": "We have confirmed that the issue does not occur when we add the code below [RenderMode.SoftwareOnly]", "source": "issue body", "interpretation": "The fix disables WPF's hardware acceleration entirely, bypassing DirectX compositing. This is the strongest signal that the leak is in WPF's GPU compositing layer interacting with the Quadro driver, not in Skia itself."}, {"text": "Last Known Good Version of SkiaSharp: 2.88.9", "source": "issue body", "interpretation": "Claimed regression; the large version gap (2.88.9 → 3.116.0) means many subsystems changed and the root cause cannot be isolated without a minimal repro."}], "workarounds": ["Set `RenderOptions.ProcessRenderMode = RenderMode.SoftwareOnly` in `OnStartup` to disable WPF hardware acceleration (reported to work by reporter, but has a performance cost).", "If using `SKGLElement`, switch to `SKElement` to use the CPU-side WriteableBitmap path and avoid OpenGL entirely.", "Ensure all `SKShader`, `SKPaint`, and `SKBitmap` objects used for patterns are properly disposed (e.g., with `using`) to prevent unmanaged object accumulation."], "rationale": "Classified as type/bug because the reporter describes a memory leak that degrades the application over time. Area is area/SkiaSharp.Views because the WPF view layer is where the GPU interaction occurs. Severity is medium because a workaround exists (SoftwareOnly mode) even though it carries a performance penalty that makes it unsuitable for the reporter. Action is needs-info because no repro code, no memory profile, and no identification of which control (SKElement vs SKGLElement) is used — without these the bug cannot be reproduced or fixed.", "nextQuestions": ["Is the application using SKElement (CPU/WriteableBitmap) or SKGLElement (OpenGL)?", "What does 'drawing patterns' mean in the reporter's code — are they using SKShader.CreateBitmap/CreateImage, or something else?", "Can the reporter provide a minimal C# repro project or code snippet?", "What is the Windows version and display DPI scaling percentage?", "Does the leak occur with a plain SKElement paint handler that draws a solid rectangle (no patterns), or only when using patterned shaders?"], "resolution": {"hypothesis": "The memory leak is most likely caused by WPF's DirectX compositor allocating GPU textures for each WriteableBitmap update and not releasing them promptly on Nvidia Quadro drivers at high DPI. A secondary possibility is that the reporter's pattern-drawing code does not dispose SKShader/SKPaint objects per frame.", "proposals": [{"title": "Ask reporter for minimal repro + memory profile", "description": "Request a minimal C# WPF project that reproduces the leak, along with which control is used (SKElement vs SKGLElement), Windows version, DPI scaling, and a memory profiler snapshot showing what is growing.", "category": "investigation", "confidence": 0.9, "effort": "cost/xs", "validated": "untested"}, {"title": "Dispose pattern shaders per frame", "description": "If the reporter creates SKShader or SKPaint objects on every OnPaintSurface call, wrapping them in 'using' blocks ensures native objects are released immediately instead of waiting for the GC.", "category": "workaround", "codeSnippet": "private void OnPaintSurface(object sender, SKPaintSurfaceEventArgs e)\n{\n    var canvas = e.Surface.Canvas;\n    canvas.Clear(SKColors.White);\n\n    // Dispose shader and paint after each use\n    using var patternBitmap = CreatePatternBitmap();\n    using var shader = SKShader.CreateBitmap(patternBitmap, SKShaderTileMode.Repeat, SKShaderTileMode.Repeat);\n    using var paint = new SKPaint { Shader = shader };\n    canvas.DrawRect(e.Info.Rect, paint);\n}", "confidence": 0.7, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Ask reporter for minimal repro + memory profile", "recommendedReason": "Root cause cannot be determined from the current issue description. A minimal repro is required before any fix can be implemented."}}, "output": {"actionability": {"suggestedAction": "needs-info", "confidence": 0.88, "reason": "The issue describes a memory leak but provides no code sample, no memory profiler output, and does not identify which SkiaSharp WPF control is in use. Without a minimal repro the bug cannot be confirmed or reproduced.", "suggestedReproPlatform": "windows"}, "missingInfo": ["Which SkiaSharp WPF control is used: SKElement or SKGLElement?", "Code snippet or minimal project showing how patterns are drawn", "Windows version and DPI scaling percentage", "Memory profiler output or task manager screenshot showing the growth", "Does the leak occur without patterns (e.g., drawing a solid fill)?"], "actions": [{"type": "update-labels", "description": "Apply bug, WPF area, Windows-Classic, reliability labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp.Views", "os/Windows-Classic", "tenet/reliability"]}, {"type": "add-comment", "description": "Request minimal repro and clarifying information from reporter", "risk": "medium", "confidence": 0.88, "comment": "Thanks for the report and for identifying the workaround!\n\nTo help investigate this memory leak, could you provide:\n\n1. **Which control are you using?** `SKElement` (CPU rendering) or `SKGLElement` (OpenGL rendering)?\n2. **A minimal code snippet** showing how you draw your patterns — specifically the `PaintSurface` handler and how the `SKShader`/`SKPaint` objects are created.\n3. **Windows version** and the display scaling percentage (e.g., 150%, 200%).\n4. **A memory profile or Task Manager screenshot** showing how memory grows over time.\n\nAlso, as an immediate workaround to try before we identify the root cause:\n- Make sure any `SKShader`, `SKPaint`, or `SKBitmap` objects used for patterns are wrapped in `using` blocks so they are disposed immediately rather than waiting for the garbage collector.\n\nThis information will help us determine whether the leak is in SkiaSharp's WPF rendering layer or in WPF's DirectX compositor interacting with the Quadro driver."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
