<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2653, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T14:20:00Z", "currentLabels": ["type/bug", "os/Linux", "area/libSkiaSharp.native", "status/needs-attention", "tenet/reliability", "triage/triaged"]}, "summary": "On Alpine Linux (musl) in a Docker container, SkiaSharp 2.88.6 fails to load libSkiaSharp.so at runtime with a confusing 'liblibSkiaSharp' error; multiple users across versions (including a potential regression in 3.116.0 where linux-musl-x64 is missing from publish output) report the same failure.", "classification": {"type": {"value": "type/bug", "confidence": 0.92}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.95}, "platforms": ["os/Linux"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "exception", "errorMessage": "Unable to load shared library 'libSkiaSharp' or one of its dependencies. Error loading shared library liblibSkiaSharp: No such file or directory", "stackTrace": "at SkiaSharp.SkiaApi.sk_managedstream_set_procs(SKManagedStreamDelegates procs)\nat SkiaSharp.SKAbstractManagedStream..cctor()\nat SkiaSharp.SKAbstractManagedStream..ctor(Boolean owns)\nat SkiaSharp.SKManagedStream..ctor(Stream managedStream, Boolean disposeManagedStream)\nat SkiaSharp.SKBitmap.Decode(Stream stream)", "reproQuality": "partial", "targetFrameworks": ["net7.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a .NET Core 7.0 app using SkiaSharp.NativeAssets.Linux 2.88.6", "Run the app in an Alpine Linux Docker container (linux-musl-x64)", "Call SKBitmap.Decode(stream) or any SkiaSharp API that loads the native library", "Observe DllNotFoundException with 'liblibSkiaSharp' in the error output"], "environmentDetails": ".NET 7.0, Alpine Linux (musl), Docker, SkiaSharp 2.88.6, SkiaSharp.NativeAssets.Linux", "relatedIssues": [2215, 453], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/2215", "description": "Related: Alpine Linux DllNotFoundException with NoDependencies 2.88.0 (closed)"}, {"url": "https://github.com/mono/SkiaSharp/issues/2653#issuecomment-2561032188", "description": "3.116.0 regression: linux-musl-x64 not published in dotnet publish output"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.6", "2.88.8", "2.88.9", "3.116.0"], "currentRelevance": "likely", "relevanceReason": "Issue is still open as of April 2026 with recent comments about 3.116.0 regression; multiple versions affected"}}, "analysis": {"summary": "Native library loading fails on Alpine Linux because the NativeAssets.Linux package (with fontconfig dependency) is used instead of NativeAssets.Linux.NoDependencies, or fontconfig is not installed in the container. The confusing 'liblibSkiaSharp' error is a .NET runtime diagnostic artifact — when dlopen searches fallback paths it constructs the filename as 'lib' + 'libSkiaSharp', producing 'liblibSkiaSharp'. For 3.116.0+ there is a separate reported regression where dotnet publish omits linux-musl-x64 from the output directory.", "rationale": "The stack trace and error log clearly show DllNotFoundException — the native .so was not found at runtime. The 'liblibSkiaSharp' pattern is documented in packages.md as a fallback-path artifact. The root cause for 2.88.x is almost always wrong package selection (Linux vs NoDependencies) or missing fontconfig. The 3.116.0 regression (missing musl publish output) is a separate potential packaging issue that warrants investigation.", "codeInvestigation": [{"file": "binding/SkiaSharp/SkiaApi.cs", "lines": "12", "finding": "P/Invoke constant SKIA = 'libSkiaSharp'. On Linux, when .NET's native library resolver probes fallback paths, it constructs 'lib' + 'libSkiaSharp' = 'liblibSkiaSharp' as the filename — explaining the confusing error message. This is expected .NET runtime behavior, not a SkiaSharp naming bug.", "relevance": "direct"}, {"file": "binding/SkiaSharp.NativeAssets.Linux.NoDependencies/buildTransitive/net4/SkiaSharp.targets", "lines": "32-50", "finding": "NoDependencies targets include linux-musl-x64 runtime files (libSkiaSharp*.so). If the reporter used NativeAssets.Linux (not NoDependencies), fontconfig is required on Alpine. The targets file confirms both packages include musl variants for 2.88.x.", "relevance": "direct"}, {"file": "documentation/dev/packages.md", "lines": "177-215", "finding": "The packages.md troubleshooting section documents this exact error pattern: 'liblibSkiaSharp' is a known fallback-path artifact from the .NET runtime loader. Fix is always NativeAssets.Linux.NoDependencies for minimal/Alpine containers, or installing fontconfig for the full variant.", "relevance": "context"}], "keySignals": [{"text": "Error loading shared library /app/runtimes/linux-musl-x64/native/liblibSkiaSharp: No such file or directory", "source": "issue body — log output", "interpretation": ".NET fallback probe generated 'liblibSkiaSharp' as filename; the actual file libSkiaSharp.so is in that directory but is not being found — indicates the runtime cannot load it (likely wrong package or missing fontconfig dependency)"}, {"text": "I've installed the package SkiaSharp.NativeAssets.Linux in my project", "source": "issue body", "interpretation": "Reporter used NativeAssets.Linux (requires fontconfig) not NoDependencies — on Alpine without fontconfig this will fail to load"}, {"text": "SkiaSharp.NativeAssets.Linux.NoDependencies version 2.88.6, along with the base skiasharp 2.88.6 worked fine for me", "source": "comment #1804674889 by hsellentin", "interpretation": "Confirms switching to NoDependencies resolves the issue for the 2.88.6 case on Alpine"}, {"text": "no runtime libraries for linux-musl-x64 are published [in 3.116.0]", "source": "comment #2561032188 by Ghostbird", "interpretation": "Potential packaging regression in 3.116.0 where linux-musl-x64 native assets are omitted from dotnet publish output"}], "workarounds": ["Replace SkiaSharp.NativeAssets.Linux with SkiaSharp.NativeAssets.Linux.NoDependencies in the executable project's PackageReference", "If sticking with NativeAssets.Linux, install fontconfig: RUN apt-get install -y libfontconfig1 (Debian/Ubuntu) or apk add fontconfig (Alpine)", "Ensure NativeAssets package is in the executable project (not only a library project)", "Use 'dotnet publish -r linux-musl-x64' to force correct RID selection on Alpine"], "nextQuestions": ["Is the 3.116.0 regression (missing linux-musl-x64 in publish output) reproducible with a minimal Dockerfile?", "Does Ghostbird's issue affect NoDependencies as well or only NativeAssets.Linux?", "What base image is being used — is it using glibc or musl (Alpine)?"], "resolution": {"hypothesis": "For 2.88.x: reporter used NativeAssets.Linux on Alpine without fontconfig installed — switching to NoDependencies or adding fontconfig resolves it. For 3.116.0+: potential packaging regression where linux-musl-x64 native binaries are not published by dotnet publish.", "proposals": [{"title": "Switch to NoDependencies package", "description": "Replace SkiaSharp.NativeAssets.Linux with SkiaSharp.NativeAssets.Linux.NoDependencies in the application project. This package has no external dependencies and includes both glibc and musl variants — designed for Alpine and minimal containers.", "category": "workaround", "codeSnippet": "<PackageReference Include=\"SkiaSharp.NativeAssets.Linux.NoDependencies\" Version=\"2.88.6\" />", "confidence": 0.92, "effort": "cost/xs", "validated": "yes"}, {"title": "Install fontconfig in Dockerfile", "description": "Keep NativeAssets.Linux but add fontconfig to the container. Useful when system font enumeration is needed.", "category": "workaround", "codeSnippet": "RUN apk add --no-cache fontconfig", "confidence": 0.85, "effort": "cost/xs", "validated": "yes"}, {"title": "Investigate 3.116.0 musl publish regression", "description": "Reproduce Ghostbird's report: create a minimal Dockerfile using dotnet publish targeting linux-musl-x64 with SkiaSharp 3.116.0 and verify whether linux-musl-x64 native assets are included in publish output.", "category": "investigation", "confidence": 0.7, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Switch to NoDependencies package", "recommendedReason": "Addresses the root cause for the majority of reporters (Alpine/musl containers) with minimal effort. Documented as the correct package for this scenario in packages.md."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.8, "reason": "The 2.88.x case has clear workarounds (NoDependencies or fontconfig), but the 3.116.0 report of missing linux-musl-x64 publish output is a potential packaging regression that needs verification. Issue has 44 comments and 9 upvotes indicating broad impact.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply correct labels — type/bug, area/libSkiaSharp.native, os/Linux, tenet/reliability (already present)", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/libSkiaSharp.native", "os/Linux", "tenet/reliability"]}, {"type": "add-comment", "description": "Post a comment explaining the liblibSkiaSharp error pattern, the fix (NoDependencies), and ask for a repro for the 3.116 regression", "risk": "medium", "confidence": 0.85, "comment": "Thanks for the report and to everyone who has added context in the comments!\n\nThe `liblibSkiaSharp` error is a diagnostic artifact from the .NET runtime loader — when it probes fallback paths it constructs the filename as `lib` + `libSkiaSharp`, producing `liblibSkiaSharp`. The underlying issue is that the native `libSkiaSharp.so` cannot be loaded.\n\n**For most Alpine/musl Docker containers (2.88.x):**\nSwitch from `SkiaSharp.NativeAssets.Linux` to `SkiaSharp.NativeAssets.Linux.NoDependencies`. The `NoDependencies` variant has zero external dependencies and includes musl variants:\n```xml\n<PackageReference Include=\"SkiaSharp.NativeAssets.Linux.NoDependencies\" Version=\"2.88.6\" />\n```\n\nIf you need system font enumeration, keep `NativeAssets.Linux` but install fontconfig:\n```dockerfile\nRUN apk add --no-cache fontconfig   # Alpine\n# or: RUN apt-get install -y libfontconfig1   # Debian/Ubuntu\n```\nAlso ensure the NativeAssets package is referenced in the **executable** project, not only a library project.\n\n**For 3.116.0 (linux-musl-x64 missing from publish output):**\n@Ghostbird — could you share a minimal Dockerfile or reproduction repository? This looks like it may be a separate packaging regression and I want to verify it."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
