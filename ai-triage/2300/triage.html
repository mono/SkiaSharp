<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2300, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T16:05:00Z", "currentLabels": ["type/bug", "os/Windows-Classic", "area/libSkiaSharp.native", "backend/Raster", "tenet/reliability", "triage/triaged"]}, "summary": "Indexed (palette-based) PNG images are corrupted and produce non-deterministic output after decode+encode using SKBitmap.Decode()/Encode() — a regression since 2.80.0 caused by a bug in Skia's PNG indexed-color codec.", "classification": {"type": {"value": "type/bug", "confidence": 0.97}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.92}, "platforms": ["os/Windows-Classic"], "backends": ["backend/Raster"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "wrong-output", "errorMessage": "Result PNG image is broken/corrupted; image pixels differ on each run", "reproQuality": "complete", "targetFrameworks": ["net6.0"]}, "reproEvidence": {"stepsToReproduce": ["Create an indexed (palette-based) PNG image", "Call SKBitmap.Decode(\"sourceImage.png\")", "Call bitmap.Encode(fileStream, SKEncodedImageFormat.Png, 100)", "Observe that destImage.png has corrupted/wrong colors", "Run multiple times to observe non-deterministic output"], "environmentDetails": "SkiaSharp 2.88.3, .NET 6, Windows 10", "repoLinks": [{"url": "https://github.com/google/skia/commit/983ae8625b05737e7528fac074030d11e225961d", "description": "Upstream Skia fix for indexed PNG codec issue identified by community member"}, {"url": "https://github.com/mono/skia/pull/98", "description": "PR to cherry-pick the upstream fix into mono/skia (SkiaSharp's Skia fork)"}], "codeSnippets": ["using (SKBitmap b = SKBitmap.Decode(\"sourceImage.png\"))\n{\n    using (FileStream fs = new FileStream(\"destImage.png\", FileMode.Create))\n    {\n        b.Encode(fs, SKEncodedImageFormat.Png, 100);\n    }\n}"], "screenshots": [{"url": "https://user-images.githubusercontent.com/6427581/199411942-d8993e91-7444-41f3-af41-d8b802f35991.png", "description": "Source indexed PNG image"}, {"url": "https://user-images.githubusercontent.com/6427581/199412014-ac8c1aa3-3dcc-4bb3-abc5-7223f3ed5475.png", "description": "Corrupt output after SKBitmap.Decode+Encode"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.3", "2.80.0"], "brokeIn": "2.80.0", "currentRelevance": "unknown", "relevanceReason": "Issue was reported with 2.88.3; the upstream Skia fix was identified but it is unknown whether the fix was merged into the mono/skia fork used by SkiaSharp 3.x."}, "regression": {"isRegression": true, "confidence": 0.9, "reason": "Community member @themcoo confirmed regression started with 2.80.0 and previous versions handled indexed images correctly. The upstream Skia fix (commit 983ae8625b) resolves the issue.", "brokeInVersion": "2.80.0"}}, "analysis": {"summary": "The PNG codec in native Skia (libSkiaSharp) mishandles indexed/palette-based PNG images during decode, resulting in corrupt pixel data and non-deterministic output on re-encode. This is a regression introduced in the Skia version bundled with SkiaSharp 2.80.0. Upstream Skia fixed this in commit 983ae8625b05737e7528fac074030d11e225961d; a PR (mono/skia#98) was created to bring the fix into SkiaSharp's Skia fork, but its merge status is unknown.", "rationale": "Clear wrong-output bug with complete minimal repro and regression confirmation. Root cause was independently identified by a community contributor tracing the issue to upstream Skia's indexed PNG color handling. The bug is in the native C++ layer (Skia's PNG codec), making area/libSkiaSharp.native the correct area. The behavior is non-deterministic (image changes per run), pointing to uninitialized memory or palette-index confusion in the codec. A workaround exists by converting the bitmap color type before encoding.", "keySignals": [{"text": "The result image changes when you try my sample code for several times", "source": "issue body", "interpretation": "Non-deterministic output strongly suggests uninitialized memory or stale palette data in the native PNG codec path."}, {"text": "This started with 2.80.0. Previous versions were handling this correctly.", "source": "comment by @themcoo", "interpretation": "Confirmed regression — root cause is in a change made to the native Skia build between 2.x versions."}, {"text": "I found the issue and fix in google/skia repo: https://github.com/google/skia/commit/983ae8625b05737e7528fac074030d11e225961d", "source": "comment by @themcoo", "interpretation": "Root cause precisely identified in upstream Skia. Cherry-picking the fix confirmed it resolves the issue."}, {"text": "When I cherry-picked this change and rebuilt the libskiasharp.dll your image is decoded/encoded fine.", "source": "comment by @themcoo", "interpretation": "Fix confirmed to work. Resolution path is to incorporate the upstream commit into mono/skia."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "434-458", "finding": "SKBitmap.Decode(SKCodec) reads codec.Info, then calls codec.GetPixels(bitmapInfo, bitmap.GetPixels()). For indexed PNGs, the codec.Info will reflect the indexed color type; any bug in the native SkPngCodec's handling of the palette maps directly to corrupt pixels returned here.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "165-172", "finding": "SKBitmap.Copy(SKColorType colorType) exists and calls CopyTo() which re-renders pixel data via SKPixmap — converting from indexed to Rgba8888 bypasses the buggy codec path entirely and provides a valid workaround.", "relevance": "related"}, {"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "738-742", "finding": "SKBitmap.Encode(Stream dst, SKEncodedImageFormat format, int quality) is the encode path used in the repro. No issue in the C# wrapper layer itself; corruption originates from the previously decoded native pixels.", "relevance": "context"}], "workarounds": ["Convert the decoded bitmap to Rgba8888 color type before encoding using bitmap.Copy(SKColorType.Rgba8888). This bypasses the indexed-color codec path that contains the bug."], "nextQuestions": ["Was mono/skia PR #98 merged? If so, which SkiaSharp version includes the fix?", "Does the issue reproduce with SkiaSharp 3.x (e.g., 3.119.3)? The upstream Skia milestone update may have incorporated the fix.", "Is the corruption cross-platform (Linux, macOS) or only Windows?"], "resolution": {"hypothesis": "Skia's PNG codec (SkPngCodec) incorrectly handles the palette/index lookup for indexed PNG images during decode, writing corrupt or uninitialized palette data into the pixel buffer. The upstream fix (commit 983ae8625b) corrects this.", "proposals": [{"title": "Workaround: convert color type before encoding", "description": "Convert the decoded bitmap to Rgba8888 before encoding to avoid the indexed color codec path.", "category": "workaround", "codeSnippet": "using (SKBitmap indexed = SKBitmap.Decode(\"sourceImage.png\"))\n{\n    using var converted = indexed.Copy(SKColorType.Rgba8888);\n    using var fs = new FileStream(\"destImage.png\", FileMode.Create);\n    converted.Encode(fs, SKEncodedImageFormat.Png, 100);\n}", "confidence": 0.9, "effort": "cost/xs", "validated": "yes"}, {"title": "Fix: merge upstream Skia commit 983ae8625b into mono/skia", "description": "Cherry-pick or include google/skia commit 983ae8625b05737e7528fac074030d11e225961d in the mono/skia fork to fix the native PNG codec. A PR (mono/skia#98) was already created for this.", "category": "fix", "confidence": 0.92, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Workaround: convert color type before encoding", "recommendedReason": "Immediately actionable for affected users. The native fix requires the maintainer to verify and merge mono/skia#98 (or confirm it was included in a later Skia milestone update)."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Root cause is confirmed in the native Skia PNG codec. A community-provided upstream fix exists (commit 983ae8625b, PR mono/skia#98). Needs investigation to confirm whether the fix was incorporated in SkiaSharp 3.x. If already fixed, should close-as-fixed; otherwise the native fix needs to be merged.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/libSkiaSharp.native, os/Windows-Classic, backend/Raster, tenet/reliability labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/libSkiaSharp.native", "os/Windows-Classic", "backend/Raster", "tenet/reliability"]}, {"type": "add-comment", "description": "Post analysis with confirmed workaround and status of upstream fix", "risk": "medium", "confidence": 0.88, "comment": "Thanks for the detailed report, and to @themcoo for the excellent investigation!\n\n**Root cause:** This is a bug in Skia's native PNG codec when handling indexed (palette-based) PNG images. The upstream fix is at [google/skia commit 983ae8625b](https://github.com/google/skia/commit/983ae8625b05737e7528fac074030d11e225961d), and a PR (mono/skia#98) was opened to bring this into SkiaSharp's Skia fork.\n\n**Workaround (available now):** Convert the bitmap color type to `Rgba8888` before encoding to bypass the buggy indexed codec path:\n\n```csharp\nusing (SKBitmap indexed = SKBitmap.Decode(\"sourceImage.png\"))\n{\n    using var converted = indexed.Copy(SKColorType.Rgba8888);\n    using var fs = new FileStream(\"destImage.png\", FileMode.Create);\n    converted.Encode(fs, SKEncodedImageFormat.Png, 100);\n}\n```\n\nWe'll investigate whether this fix was included in SkiaSharp 3.x (via a Skia milestone update) or still needs to be merged."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
