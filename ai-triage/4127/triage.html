<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 4127, "repo": "mono/SkiaSharp", "analyzedAt": "2026-06-10T05:44:59Z"}, "summary": "On the net48 test leg, managed SKObject wrappers intermittently crash with AccessViolationException because the GC can finalize a wrapper (and free its native object) while an in-flight P/Invoke is still using the same handle. The reporter provides full page-heap and cdb evidence for two concrete cases (SKPath.PointCount and Skottie.Animation.Version), rules out managed refcount bugs via three independent checks, and proposes a structural fix: back SKObject's handle with a SafeHandle so the P/Invoke marshaller pins the handle for the duration of every native call.", "classification": {"type": {"value": "type/bug", "confidence": 0.98}, "area": {"value": "area/SkiaSharp", "confidence": 0.97}, "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "crash", "errorMessage": "AccessViolationException — native code dereferences freed memory after managed wrapper is GC-finalized mid-P/Invoke", "reproQuality": "complete", "targetFrameworks": ["net48"]}, "reproEvidence": {"stepsToReproduce": ["Run the full SkiaSharp test suite on net48 with parallel test execution (GC pressure)", "Observe intermittent AccessViolationException at various native call sites (e.g., SKPath.PointCount → sk_path_count_points, Skottie.Animation.Version → skottie_animation_get_version)", "Crash is non-deterministic per-site but near-deterministic overall under PR #4080 lifecycle rework"], "environmentDetails": "net48, concurrent GC, full parallel test run. PR #4080 lifecycle rework amplifies GC/finalization pressure making the race near-deterministic.", "relatedIssues": [4080]}, "versionAnalysis": {"mentionedVersions": [], "currentRelevance": "likely", "relevanceReason": "SKNativeObject still stores its handle as a raw IntPtr with no GC-rooting across P/Invoke calls. The race is present in current code and the partial GC.KeepAlive mitigation from PR #4080 covers only specific call sites."}}, "analysis": {"summary": "SKNativeObject backs its native handle as a raw IntPtr. After a P/Invoke reads Handle and enters native code, the GC is free to collect and finalize 'this', which calls DisposeNative/SafeUnRef and frees the native object — a use-after-free while native code is still executing. The reporter rules out managed refcount bugs via page-heap, a net-owned-ref ledger, and serialized-threading tests. The structural fix (backing with SafeHandle) has been prototyped, confirmed to close the class, and measured at ~10–20 ns overhead per handle argument.", "rationale": "Classified type/bug because this produces crashes (AccessViolationException) caused by broken lifetime management in SKNativeObject. Classified area/SkiaSharp because the root cause is in SKNativeObject/SKObject in binding/SkiaSharp/SKObject.cs. Tenet reliability because this is an intermittent crash during normal test execution. No platform label because the race is present on all runtimes — net48 concurrent GC simply makes it observable; the same class exists on net10. suggestedAction is ready-to-fix because the root cause is thoroughly understood, the fix is validated by a prototype, and the implementation scope is well-defined.", "keySignals": [{"text": "nothing keeps `this` (or wrapper arguments) rooted for the duration of the native call", "source": "issue body", "interpretation": "Classic use-after-free: IntPtr P/Invoke does not root the managed object, GC is free to finalize it mid-call."}, {"text": "a managed net-owned-ref ledger logged zero over-releases across a full crashing run", "source": "issue body", "interpretation": "Confirms this is NOT a managed refcount bug — it is purely a GC finalization timing race."}, {"text": "SafeHandle closes the `this`-collection class structurally, with zero per-call-site work", "source": "comment by ramezgerges", "interpretation": "The reporter prototyped and validated the fix on both net48 and net10."}, {"text": "Per-call overhead ~10–20 ns (DangerousAddRef/Release, per handle argument)", "source": "comment by ramezgerges", "interpretation": "Acceptable overhead for draw calls; measurable for trivial getters in tight loops — warrants benchmarking before full rollout."}, {"text": "per-site GC.KeepAlive is whack-a-mole: any of the hundreds of instance native calls whose `this` goes unrooted can still crash", "source": "issue body", "interpretation": "The existing partial mitigation cannot be made exhaustive or verifiable — structural fix is required."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKObject.cs", "lines": "229-233", "finding": "SKNativeObject finalizer calls Dispose(false), which at line 269-271 calls DisposeNative() if Handle != IntPtr.Zero && OwnsHandle. This can race with an in-flight P/Invoke that already read Handle before the finalizer ran.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKObject.cs", "lines": "94-98", "finding": "SKObject.DisposeNative() calls SafeUnRef(), which decrements the native refcount and may free the native object — the dangerous operation that races with an in-flight P/Invoke.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKObject.cs", "lines": "236-237", "finding": "Handle is a plain IntPtr virtual property on SKNativeObject with no runtime-level GC-rooting, thread-safety, or lifetime protection.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKData.cs", "lines": "239,285", "finding": "GC.KeepAlive(this) added at specific call sites — demonstrates the partial per-site mitigation approach from PR #4080 and its whack-a-mole nature.", "relevance": "related"}, {"file": "binding/SkiaSharp/SKImage.cs", "lines": "496,512", "finding": "GC.KeepAlive(this) in SKImage — same partial mitigation pattern; covers only specific sites, not all instance P/Invoke calls.", "relevance": "related"}], "nextQuestions": ["What is the perf impact on a real draw-heavy end-to-end benchmark vs the micro-benchmark (20M calls of sk_data_get_size)?", "How should the public IntPtr SKObject.Handle be maintained for ABI compatibility while switching the internal backing to SafeHandle?", "Does the interop generator (pwsh ./utils/generate.ps1) need structural changes to emit SafeHandle parameter/return types in SkiaApi.generated.cs?", "Are there P/Invoke call sites that bypass SkiaApi.generated.cs and use raw IntPtr, which would remain unprotected?", "Should high-frequency trivial getters (Width, PointCount) be kept on a fast path to bound the per-call overhead?"], "resolution": {"hypothesis": "The fix is to back SKNativeObject's handle with a typed SafeHandle subclass per native type. The P/Invoke marshaller will then call DangerousAddRef/DangerousRelease around every native call, automatically keeping the handle alive for the call's duration and eliminating the GC race across all call sites.", "proposals": [{"title": "Back SKObject handle with SafeHandle (structural fix)", "description": "Create per-native-type SafeHandle subclasses whose ReleaseHandle maps to the correct teardown (sk_*_unref for ref-counted, sk_*_delete for owned, no-op for borrowed/owns:false). Update the interop generator to emit SafeHandle parameter/return types in SkiaApi.generated.cs instead of IntPtr. Maintain public IntPtr SKObject.Handle for ABI compatibility via a thin wrapper over the SafeHandle's DangerousGetHandle.", "category": "fix", "confidence": 0.92, "effort": "cost/xl", "validated": "yes"}, {"title": "Comprehensive GC.KeepAlive audit (interim workaround)", "description": "Audit all instance native call sites across binding/SkiaSharp/ and add GC.KeepAlive(this) at the end of every method that passes Handle or an argument's Handle to a P/Invoke. This extends the PR #4080 partial coverage to complete coverage as an interim measure until the SafeHandle structural fix lands.", "category": "workaround", "confidence": 0.65, "effort": "cost/l", "validated": "untested"}], "recommendedProposal": "Back SKObject handle with SafeHandle (structural fix)", "recommendedReason": "Closes the entire use-after-free class at the root with zero per-call-site work. Prototype confirms correctness on both net48 and net10. The GC.KeepAlive approach is incomplete by construction and cannot be exhaustively verified."}}, "output": {"actionability": {"suggestedAction": "ready-to-fix", "confidence": 0.9, "reason": "Root cause is thoroughly diagnosed (page-heap + cdb + three independent ruling-out experiments). Fix is well-defined (SafeHandle) and validated by a working prototype. Implementation is substantial (generator changes + per-type SafeHandle subclasses) but the path is unambiguous.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, core SkiaSharp, and reliability tenet labels", "risk": "low", "confidence": 0.97, "labels": ["type/bug", "area/SkiaSharp", "tenet/reliability"]}, {"type": "add-comment", "description": "Acknowledge the thorough diagnosis, confirm the bug is real, validate the SafeHandle approach, and outline the implementation work items", "risk": "medium", "confidence": 0.88, "comment": "Thanks for the exceptionally thorough diagnosis and for prototyping the SafeHandle fix @ramezgerges! The evidence is conclusive — this is a real use-after-free class rooted in the raw IntPtr P/Invoke model, and it cannot be closed exhaustively by per-site `GC.KeepAlive`.\n\nThe SafeHandle approach is the right structural fix and the prototype confirms it closes the entire class with acceptable overhead (~10–20 ns/handle argument). Before a full implementation, a few things to nail down:\n\n1. **ABI compatibility**: `SKObject.Handle` is a public `IntPtr` — needs a compatibility story (e.g., thin-wrap `SafeHandle.DangerousGetHandle()`).\n2. **Generator support**: Confirm that `pwsh ./utils/generate.ps1` can emit `SafeHandle` parameter/return types in `SkiaApi.generated.cs`, or scope the generator changes needed.\n3. **Ownership mapping**: Enumerate which native types are ref-counted (`sk_*_unref`), owned-delete (`sk_*_delete`), and borrowed (`owns: false`) for the `ReleaseHandle` per-type mapping.\n4. **End-to-end benchmark**: Run a real draw-heavy benchmark before/after to confirm the ~10–20 ns micro-overhead is acceptable at the application level.\n\nPR #4080's `GC.KeepAlive` additions remain a valid interim mitigation; this issue tracks the structural fix."}, {"type": "link-related", "description": "Cross-reference PR #4080 which contains the partial GC.KeepAlive mitigation and amplified the GC pressure", "risk": "low", "confidence": 0.97, "linkedIssue": 4080}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
