<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 798, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-25T18:46:12Z", "currentLabels": ["type/question"]}, "summary": "Reporter asks why SKGLView has poor performance on Android compared to iOS when rendering paths with 10,000+ points during pan/zoom interactions, providing a sample project for reference.", "classification": {"type": {"value": "type/question", "confidence": 0.92}, "area": {"value": "area/SkiaSharp.Views", "confidence": 0.85}, "platforms": ["os/Android", "os/iOS"], "backends": ["backend/OpenGL"], "tenets": ["tenet/performance"]}, "evidence": {"reproEvidence": {"stepsToReproduce": ["Create a custom SKGLView supporting pan and zoom", "Render paths containing 10,000+ points", "Test on Android device (Pixel or Nexus 5X)", "Compare to iOS where performance is significantly better"], "environmentDetails": "Android devices: Pixel and Nexus 5X (both Qualcomm Adreno GPU). No SkiaSharp version specified.", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/files/2901551/SkiaPanAndZoom.zip", "description": "Sample project SkiaPanAndZoom.zip demonstrating custom pan/zoom SKGLView"}]}}, "analysis": {"summary": "The performance gap between iOS and Android for SKGLView is largely architectural: iOS GLKView integrates with Core Animation for low-latency compositing while Android GLSurfaceView requires additional compositing overhead via SurfaceFlinger. Additionally, re-tessellating 10,000+ point paths on every frame during pan is inherently expensive regardless of whether GL or CPU rendering is used.", "rationale": "The reporter explicitly asks 'have I missed something' and requests profiling advice — this is a usage/performance question, not a bug report. The iOS SKGLView source shows 4x MSAA enabled via GLKView, while Android SKGLSurfaceView uses a plain GLSurfaceView with no multisampling. The performance difference is architectural. Missing SkiaSharp version and Android API level prevent confirming whether newer releases addressed any related improvements.", "keySignals": [{"text": "I expect the performance to be much better than the SKCanvasView - and it is on iOS, but not on Android.", "source": "issue body", "interpretation": "GL rendering helps on iOS but not Android — points to platform-specific GPU architecture differences rather than SkiaSharp API misuse."}, {"text": "Currently, I have a control that derives from SKCanvasView and one that derives from SKGLView (SKGLZoomView). The example uses by default the SKGLView.", "source": "comment by APopatanasov", "interpretation": "Reporter confirmed they ARE using SKGLView on Android — the GL rendering path is being exercised correctly."}, {"text": "paths that contain a great amount of points (more than 10000)", "source": "issue body", "interpretation": "10,000+ points per path rendered per-frame during pan is high CPU/GPU load. Path tessellation cost scales with point count and is not automatically optimized by the GL backend."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views/Platform/Android/SKGLSurfaceView.cs", "lines": "25-30", "finding": "Android SKGLSurfaceView initializes with SetEGLContextClientVersion(2) and SetEGLConfigChooser(8,8,8,8,0,8) — depth buffer is 0, no multisampling configured. Uses GLSurfaceView, a separate Android Surface that requires SurfaceFlinger compositing on every frame.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views/Platform/iOS/SKGLView.cs", "lines": "86-101", "finding": "iOS SKGLView initializes with DrawableMultisample = GLKViewDrawableMultisample.Sample4x (4x MSAA) and uses GLKView which integrates directly with Core Animation layers — frames are composited with near-zero overhead compared to Android's SurfaceFlinger pipeline.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views/Platform/Android/SKGLSurfaceViewRenderer.cs", "lines": "32-87", "finding": "OnDrawFrame clears all buffers (color+depth+stencil) every frame and performs full path re-tessellation via Skia on each call. No dirty-region tracking or path caching is built into the renderer. Two flush calls (canvas.Flush + context.Flush) are issued per frame.", "relevance": "related"}], "workarounds": ["Cache rendered paths to an off-screen SKSurface/SKBitmap during pan start, draw the cached bitmap with a transform during pan, and re-render full detail on gesture end", "Pre-process paths using a point decimation algorithm (e.g., Ramer-Douglas-Peucker) to reduce 10,000+ points to under 1,000 without significant visual difference at typical zoom levels", "Throttle Invalidate() calls with a frame-rate limiter or only redraw when the transform delta exceeds a minimum threshold", "Use SKGLTextureView instead of SKGLSurfaceView on Android — TextureView allows partial updates and compositing within the View hierarchy, which can reduce overhead for some use cases"], "nextQuestions": ["Which SkiaSharp NuGet package version is being used?", "What is the Xamarin.Android / .NET for Android version and Android API level of test devices?", "Is the lag during active panning gestures or also when the view is stationary after panning stops?", "Is the full path always redrawn on every frame, or only when the transform changes?"], "resolution": {"hypothesis": "Android GL performance lags iOS due to architectural differences (GLSurfaceView compositing overhead vs GLKView Core Animation integration) combined with the high cost of re-tessellating 10,000+ point paths on every frame. Path caching during pan is the most impactful optimization.", "proposals": [{"title": "Cache path to off-screen surface during pan", "description": "Render the full high-detail path to an off-screen SKSurface once when pan starts. During active pan/zoom, draw the cached surface with the current transform instead of re-tessellating all paths every frame. Trigger a full re-render only when the gesture ends or zoom level changes significantly.", "category": "workaround", "confidence": 0.85, "effort": "cost/m", "validated": "untested"}, {"title": "Reduce path point count with Douglas-Peucker decimation", "description": "Pre-process paths before adding to SKPath using a point decimation algorithm. 10,000+ points is often reducible to <1,000 points with no perceptible visual difference at typical zoom levels. Apply more aggressive decimation at lower zoom levels.", "category": "workaround", "confidence": 0.8, "effort": "cost/s", "validated": "untested"}, {"title": "Throttle frame invalidation rate", "description": "Avoid calling Invalidate() on every touch event. Cap rendering to ~30fps using a timer or invalidate only when the cumulative transform delta exceeds a minimum threshold.", "category": "workaround", "confidence": 0.75, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Cache path to off-screen surface during pan", "recommendedReason": "Highest-impact optimization for pan/zoom: eliminates per-frame path re-tessellation by trading one expensive draw for one cheap bitmap blit per frame during the gesture."}}, "output": {"actionability": {"suggestedAction": "needs-info", "confidence": 0.75, "reason": "Performance question missing SkiaSharp version and Android API level. Architectural explanation and workarounds can be provided, but version info would help confirm whether newer releases address any related improvements.", "suggestedReproPlatform": "linux"}, "missingInfo": ["SkiaSharp NuGet package version", "Xamarin.Android or .NET for Android version", "Android API level of test devices", "Whether lag occurs during active panning or also when the view is stationary"], "actions": [{"type": "update-labels", "description": "Apply question, views, Android, iOS, OpenGL, and performance labels", "risk": "low", "confidence": 0.9, "labels": ["type/question", "area/SkiaSharp.Views", "os/Android", "os/iOS", "backend/OpenGL", "tenet/performance"]}, {"type": "add-comment", "description": "Post explanation of Android vs iOS GL performance architectural differences and suggest workarounds, while requesting missing version info", "risk": "medium", "confidence": 0.75, "comment": "Thanks for the detailed report and sample project!\n\nThe performance difference between Android and iOS for `SKGLView` is largely architectural:\n\n1. **iOS `GLKView`** integrates directly with Core Animation layers, so rendered frames are composited with near-zero overhead. The iOS `SKGLView` also enables 4× MSAA which is highly optimized on Apple GPUs.\n2. **Android `GLSurfaceView`** renders to a separate `Surface` that Android's SurfaceFlinger must composite on every frame — this adds measurable latency compared to iOS, especially during scrolling/panning.\n3. **Path tessellation cost** scales with point count. Re-tessellating 10,000+ points per frame is expensive on any platform, and Android GPUs (Adreno on Pixel/Nexus 5X) have different tessellation performance characteristics than Apple Silicon.\n\n**Suggested optimizations:**\n\n- **Cache during pan**: Render the full detail to an off-screen `SKSurface` once when the gesture starts. During active pan/zoom, draw the cached surface with the current transform instead of re-tessellating all paths on every frame. Re-render at full quality when the gesture ends.\n- **Reduce path complexity**: Pre-process paths using a point decimation algorithm (e.g., Ramer-Douglas-Peucker). 10,000+ points is often reducible to fewer than 1,000 with no perceptible visual difference at normal zoom levels.\n- **Throttle invalidation**: Only call `Invalidate()` when the transform delta exceeds a minimum threshold rather than on every touch event.\n\nCould you also share:\n- Your SkiaSharp NuGet package version?\n- Your Xamarin.Android version and the Android API level of your test devices?\n- Whether the lag occurs during active panning or also when the view is stationary after panning stops?"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
