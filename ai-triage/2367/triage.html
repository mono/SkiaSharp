<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2367, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-23T12:53:00Z"}, "summary": "On MacCatalyst, SKCanvasView with EnableTouchEvents=true captures mouse input and does not release it after a press/move/release sequence when the Touch event handler sets e.Handled=true, blocking touch events to sibling controls.", "classification": {"type": {"value": "type/bug", "confidence": 0.97}, "area": {"value": "area/SkiaSharp.Views.Maui", "confidence": 0.95}, "platforms": ["os/macOS"], "tenets": ["tenet/reliability"], "partner": "partner/maui"}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "platform-specific", "reproQuality": "complete", "targetFrameworks": ["net-maccatalyst"]}, "reproEvidence": {"stepsToReproduce": ["Create a MAUI app with a Button and SKCanvasView in a VerticalStackLayout", "Set EnableTouchEvents=true on the SKCanvasView", "Handle the Touch event and set e.Handled = true", "Run on MacCatalyst", "Mouse down, move, then release inside the SKCanvasView", "Click the Button — it does not fire its Clicked event"], "environmentDetails": "macOS 12.6, SkiaSharp 2.88.3, Visual Studio for Mac / VS Code, MacCatalyst", "repoLinks": [{"url": "https://github.com/telerik/ms-samples/tree/main/Maui/SKCanvasViewTouchCaptured_MacCatalyst", "description": "Minimal MAUI repro project from reporter"}, {"url": "https://user-images.githubusercontent.com/61967449/214117627-a77342c7-ebde-433d-8d00-4ead0c74ad28.mov", "description": "Screen recording demonstrating the capture bug"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.3", "2.88.6"], "currentRelevance": "likely", "relevanceReason": "The SKTouchHandler code path in Platform/Apple/SKTouchHandler.cs has not been changed to set UIGestureRecognizerState.Recognized after TouchesEnded — the root cause identified in comments remains present in the current code."}}, "analysis": {"summary": "SKTouchHandler (a UIGestureRecognizer subclass on Apple platforms) never sets its State to Recognized after TouchesEnded, so UIKit retains mouse capture even after the user releases the button, preventing sibling controls from receiving events.", "rationale": "The bug is clearly reproduced with a minimal app, confirmed by multiple users, and the root cause is identifiable directly in source code. SKTouchHandler extends UIGestureRecognizer but never transitions its State to Recognized after handling a complete touch sequence (Pressed → Moved → Released). UIKit's gesture recognizer state machine requires this transition to release input capture. This is MacCatalyst-specific because mouse input routing via UIGestureRecognizer is more strict about state transitions on Mac Catalyst than on touch-only iOS.", "keySignals": [{"text": "Mouse down, then move, then up in the SKCanvasView. Then click the Button - the Button is not clicked.", "source": "issue body", "interpretation": "Classic symptom of a UIGestureRecognizer retaining mouse capture because its state machine was not completed."}, {"text": "In SKTouchHandler.TouchesEnded, FireEvent is called for each subscriber but the UIGestureRecognizer.State is left unchanged. I changed the logic to set State to Recognized if any subscriber sets TouchEventArgs.Handled to true.", "source": "comment by DanTravison (#1845661121)", "interpretation": "Community member isolated the root cause and confirmed the fix with a custom UIGestureRecognizer."}, {"text": "it appears the capture remains in place until I switch away, click on the apps window header, or wait for a while", "source": "comment by DanTravison (#1832414576)", "interpretation": "Confirms the gesture recognizer is holding capture; external events that cancel gesture tracking release it."}, {"text": "When I click the mouse button, I receive a Pressed event and set e.Handled to true. As long as I keep the mouse pointer within the application's Window, the capture is NOT released when the mouse button is released.", "source": "comment by DanTravison (#1833990907)", "interpretation": "Narrows the trigger to: Handled=true on Pressed + mouse pointer stays within window = capture not released."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Platform/Apple/SKTouchHandler.cs", "lines": "77-85", "finding": "TouchesEnded calls FireEvent for each touch but never sets this.State = UIGestureRecognizerState.Recognized (or Ended). The UIGestureRecognizer state machine is never explicitly completed, leaving the recognizer in an ambiguous state that retains mouse capture on MacCatalyst.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Platform/Apple/SKTouchHandler.cs", "lines": "54-65", "finding": "TouchesBegan calls IgnoreTouch when FireEvent returns false (i.e., not handled), but TouchesEnded has no equivalent logic to finalize the gesture recognizer state when handled=true.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Platform/Apple/SKTouchHandlerProxy.cs", "lines": "1-55", "finding": "SKTouchHandlerProxy creates and manages SKTouchHandler via SetEnabled; does not intercept or supplement the gesture state machine — the fix must be in SKTouchHandler itself.", "relevance": "related"}], "workarounds": ["Replace SKCanvasView touch handling by subclassing the platform handler and injecting a custom UIGestureRecognizer (modeled on SKTouchHandler) that sets State = UIGestureRecognizerState.Recognized in TouchesEnded when any handler sets e.Handled = true. Community member DanTravison confirmed this resolves the issue."], "nextQuestions": ["Does the same bug affect SKGLView on MacCatalyst?", "Is the fix safe to apply to iOS and tvOS as well, or only MacCatalyst?", "Should State be set to Recognized unconditionally in TouchesEnded, or only when Handled=true?"], "resolution": {"hypothesis": "Setting UIGestureRecognizer.State to Recognized inside TouchesEnded (when at least one subscriber sets Handled=true) will release mouse capture and allow sibling controls to receive events normally.", "proposals": [{"title": "Set State = Recognized in TouchesEnded when handled", "description": "In SKTouchHandler.TouchesEnded, after calling FireEvent for all touches, if any touch was handled (FireEvent returned true), set this.State = UIGestureRecognizerState.Recognized to complete the gesture recognizer state machine and release mouse capture.", "category": "fix", "confidence": 0.88, "effort": "cost/xs", "validated": "untested"}, {"title": "Inject custom UIGestureRecognizer via HandlerChanged workaround", "description": "As a short-term workaround, create a custom UIGestureRecognizer subclass that replicates SKTouchHandler but correctly sets State = Recognized on TouchesEnded. Inject it via the platform handler's HandlerChanged callback. This avoids changing the library but requires platform-specific MAUI code from the consumer.", "category": "workaround", "confidence": 0.8, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Set State = Recognized in TouchesEnded when handled", "recommendedReason": "Minimal, targeted fix in the correct location. Confirmed by community analysis to be the root cause. Low risk as it only affects the gesture recognizer lifecycle, not the touch event data itself."}}, "output": {"actionability": {"suggestedAction": "ready-to-fix", "confidence": 0.87, "reason": "Root cause is clearly identified in source (SKTouchHandler.TouchesEnded not setting UIGestureRecognizerState.Recognized), confirmed by community member who implemented the fix. The code change is minimal and the fix path is known.", "suggestedReproPlatform": "macos"}, "actions": [{"type": "update-labels", "description": "Apply bug, MAUI views area, macOS platform, reliability tenet, and MAUI partner labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp.Views.Maui", "os/macOS", "tenet/reliability", "partner/maui"]}, {"type": "add-comment", "description": "Acknowledge root cause, thank community member for investigation, provide workaround and fix direction", "risk": "medium", "confidence": 0.87, "comment": "Thank you for the detailed report and to @DanTravison for narrowing down the root cause.\n\nThe issue is in `SKTouchHandler.TouchesEnded` — after firing the touch event, the `UIGestureRecognizer.State` is never set to `Recognized`. On Mac Catalyst, UIKit requires this state transition to release mouse capture after a complete press/move/release sequence. Without it, the recognizer holds onto the input stream indefinitely.\n\n**Workaround (until this is fixed in the library):**\nYou can replace the default touch handler by injecting a custom `UIGestureRecognizer` through the MAUI platform handler's `HandlerChanged` callback. The custom recognizer should mirror `SKTouchHandler` but add `this.State = UIGestureRecognizerState.Recognized;` at the end of `TouchesEnded` when any subscriber sets `e.Handled = true`. @DanTravison confirmed this resolves the issue.\n\n**Fix direction:**\nAdd `this.State = UIGestureRecognizerState.Recognized;` in `SKTouchHandler.TouchesEnded` when the handled flag is true, completing the gesture recognizer state machine."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
