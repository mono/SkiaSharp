<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 4303, "repo": "mono/SkiaSharp", "analyzedAt": "2026-07-10T05:35:00Z", "currentLabels": ["type/bug"]}, "summary": "SKTypeface.FromFamilyName and SKFontManager.Default return empty/non-functional results on Linux after PR #3730 changed default font manager creation from sk_fontmgr_ref_default to sk_fontmgr_create_default, breaking font family resolution and causing downstream ArgumentNullException in SKShaper.", "classification": {"type": {"value": "type/bug", "confidence": 0.97}, "area": {"value": "area/SkiaSharp", "confidence": 0.93}, "platforms": ["os/Linux"], "tenets": ["tenet/reliability", "tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": true, "errorType": "exception", "errorMessage": "System.ArgumentNullException : Value cannot be null. (Parameter 'asset')", "stackTrace": "at SkiaSharp.HarfBuzz.BlobExtensions.ToHarfBuzzBlob(SKStreamAsset asset)\nat SkiaSharp.HarfBuzz.SKShaper..ctor(SKTypeface typeface)", "reproQuality": "partial", "targetFrameworks": ["net9.0"]}, "reproEvidence": {"stepsToReproduce": ["Run on Linux (including WSL) with system fonts installed under /usr/share/fonts/", "Call SKTypeface.FromFamilyName(\"Arial\") — or any family name", "Observe IsEmpty = True in SkiaSharp 4.150.0", "Observe SKFontManager.Default.FontFamilyCount == 1 with empty family name", "Compare with 3.119.4 where FromFamilyName(\"Arial\") returns DejaVu Sans Mono as a fallback"], "environmentDetails": "Linux / WSL, Visual Studio (Windows for IDE), SkiaSharp 4.148.0 and 4.150.0", "relatedIssues": [3693], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/pull/3730", "description": "PR #3730: Fix #3693 — moved default typeface resolution to managed layer, changed sk_fontmgr_ref_default to sk_fontmgr_create_default"}, {"url": "https://github.com/mono/skia/pull/195", "description": "Companion native Skia PR that changed the C API for font manager creation"}]}, "versionAnalysis": {"mentionedVersions": ["3.119.4", "4.148.0", "4.150.0"], "workedIn": "3.119.4", "brokeIn": "4.148.0", "currentRelevance": "likely", "relevanceReason": "The change was introduced by PR #3730 merged for 4.147.0-preview.1 and the issue persists in 4.150.0 (current). Code confirms the new path using sk_fontmgr_create_default is still in place."}, "regression": {"isRegression": true, "confidence": 0.97, "reason": "PR #3730 explicitly changed font manager initialization from sk_fontmgr_ref_default (Skia global singleton that properly discovers system fonts on Linux via fontconfig) to sk_fontmgr_create_default (fresh allocation whose behavior on Linux may differ). The reporter identifies PR #3730 as the cause and confirms 3.119.4 works correctly.", "workedInVersion": "3.119.4", "brokeInVersion": "4.148.0"}}, "analysis": {"summary": "SKFontManager.Default is created via sk_fontmgr_create_default (introduced in PR #3730 to fix an Android 16 SIGSEGV) but on Linux this call returns a font manager that does not discover system fonts — FontFamilyCount returns 1 with an empty family name. Consequently, MatchFamily returns null for any family name, FromFamilyName falls back to SKTypeface.Default, but Default itself is created via sk_fontmgr_legacy_create_typeface(Default.Handle, null, Normal) which also fails (returns IntPtr.Zero) on this broken font manager, so Default resolves to SKTypeface.Empty. The empty typeface then propagates downstream into SKShaper causing ArgumentNullException.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "75-76", "finding": "FromFamilyName(familyName, style) delegates to SKFontManager.Default.MatchFamily(familyName, style) ?? Default. If both MatchFamily and Default return Empty, the caller receives an empty typeface.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "36-43", "finding": "SKTypeface.Default uses sk_fontmgr_legacy_create_typeface(SKFontManager.Default.Handle, IntPtr.Zero, Normal.Handle). If SKFontManager.Default is a non-functional/empty manager, this returns IntPtr.Zero and Default resolves to SKTypeface.Empty.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "27-29", "finding": "SKFontManager.Default is initialized with sk_fontmgr_create_default(). This replaces the old sk_fontmgr_ref_default (which reused the Skia-global singleton). On Linux the new allocator may not enumerate system fonts via fontconfig the same way as the old global singleton.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "78-89", "finding": "MatchFamily calls sk_fontmgr_match_family_style via GetDisposeProtectedObject — returns null SKTypeface when handle is zero, which is the expected case for unrecognized family names when the font manager has no fonts.", "relevance": "related"}], "keySignals": [{"text": "SKFontManager.FontFamilyCount return 1, but SKFontManager.GetFontFamilies() return empty data (\"No message provided\" on ToString())", "source": "issue body", "interpretation": "Font manager is returning 1 family but the family name itself is empty, indicating the font manager loaded but found no named font families — fontconfig integration broken"}, {"text": "In 3.119.4 method return exists font on any familyName (correct or not). In 4.150.0 method return \"something\" empty, not null.", "source": "issue body", "interpretation": "Old behavior: SKTypeface.FromFamilyName with any name returned a usable fallback font. New behavior: returns SKTypeface.Empty (IsEmpty=True) which is a zero-glyph empty typeface"}, {"text": "Problem changes: #3730", "source": "issue body", "interpretation": "Reporter correctly identified PR #3730 as the regression source — the managed font manager refactor"}, {"text": "SKFontManager.Default.FontFamilyCount = 1, The single family name is empty (\"\"), Text does not render when relying on default/family-based font resolution", "source": "comment by jswolf19", "interpretation": "Second reporter confirms same symptoms in 4.148.0 on Linux container environment"}, {"text": "Method SKTypeface.FromFile working good if set full path to font", "source": "issue body", "interpretation": "CreateTypeface path still works — only family-name lookup and default resolution are broken. Confirms issue is in font manager enumeration/matching, not native binary loading"}], "rationale": "Classified as type/bug with high severity because PR #3730 introduced a regression on Linux where the new sk_fontmgr_create_default call produces a non-functional font manager that fails to discover system fonts. The old sk_fontmgr_ref_default (a reference-counted alias to Skia's global default singleton) correctly used fontconfig; the new fresh allocation apparently does not in some Linux configurations. The bug affects all Linux users relying on font-family-name resolution and causes downstream exceptions in SKShaper. Severity is high because: (1) it's a core text rendering API, (2) both reporters are affected without unusual configurations, and (3) workaround requires changing all call sites to use FromFile with absolute paths.", "workarounds": ["Use SKTypeface.FromFile(\"/full/path/to/font.ttf\") instead of SKTypeface.FromFamilyName() — requires knowing the absolute path to the font file", "Use SKFontManager.CreateCustomManager() and manually add font directories if supported", "On Linux, enumerate fonts with fc-list and build a name→path mapping, then load via FromFile"], "nextQuestions": ["Does sk_fontmgr_create_default in the native library behave differently from sk_fontmgr_ref_default on Linux — specifically regarding fontconfig initialization?", "Does the issue reproduce in a Docker container with standard fonts installed (to isolate WSL-specific behavior)?", "Does adding a call to fc-cache before creating the font manager affect the count?", "Was sk_fontmgr_create_default correctly implemented in mono/skia#195 to match the prior behavior of the global Skia default manager?"], "errorFingerprint": "SKFontManager.Default::sk_fontmgr_create_default::linux-no-fonts", "resolution": {"hypothesis": "sk_fontmgr_create_default in the companion mono/skia#195 change does not properly initialize fontconfig on Linux, returning a font manager with no families. The fix likely involves ensuring sk_fontmgr_create_default invokes the same fontconfig/system-fonts initialization path as the former Skia global singleton (formerly exposed via sk_fontmgr_ref_default).", "proposals": [{"title": "Investigate native sk_fontmgr_create_default on Linux", "category": "investigation", "description": "Reproduce on Linux, confirm FontFamilyCount==1 with empty name, then trace whether the Skia C++ SkFontMgr_New_Custom_Empty or SkFontMgr_New_FontConfig is being invoked by sk_fontmgr_create_default. Compare with the old path.", "effort": "cost/m", "validated": "untested"}, {"title": "Workaround: use FromFile with absolute font path", "category": "workaround", "description": "Until fixed, callers can use SKTypeface.FromFile(\"/usr/share/fonts/truetype/ubuntu/Ubuntu-R.ttf\") to load a specific font. A helper that enumerates /usr/share/fonts/ via fc-list can build a name-to-path dictionary.", "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Investigate native sk_fontmgr_create_default on Linux", "recommendedReason": "The workaround is disruptive (requires absolute paths and knowledge of font locations). The root cause is a native layer regression that should be fixed at the source."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.93, "reason": "The regression is clearly identified and reproducible on Linux. The root cause points to the native sk_fontmgr_create_default not properly initializing fontconfig on Linux. Needs native investigation and a targeted fix in the mono/skia companion code.", "suggestedReproPlatform": "linux"}, "missingInfo": ["Minimal reproducible project or exact .NET target framework / distro version", "Confirmation whether the issue is Docker-container-specific or all Linux"], "actions": [{"type": "update-labels", "description": "Apply classification labels", "risk": "low", "confidence": 0.97, "labels": ["type/bug", "area/SkiaSharp", "os/Linux", "tenet/reliability", "tenet/compatibility"]}, {"type": "add-comment", "description": "Acknowledge regression, confirm root cause hypothesis, provide workaround", "risk": "medium", "confidence": 0.88, "comment": "Thank you for the detailed report and for pinpointing PR #3730 as the regression source.\n\nThis is a confirmed regression on Linux. The change in #3730 moved `SKFontManager.Default` from using `sk_fontmgr_ref_default` (the Skia-global singleton that properly initializes fontconfig on Linux) to `sk_fontmgr_create_default` (a fresh allocation). On Linux, this new allocation appears to return a font manager that discovers only 1 family with an empty name — fontconfig integration isn't being invoked correctly in the new native code path.\n\nBecause `SKFontManager.Default` is broken, `SKTypeface.Default` (which relies on it) also resolves to `SKTypeface.Empty`, and `SKTypeface.FromFamilyName()` returns an empty typeface instead of a platform fallback.\n\n**Workaround (until fixed):**\n\nUse `SKTypeface.FromFile()` with the absolute path to the font:\n```csharp\n// Instead of:\nvar typeface = SKTypeface.FromFamilyName(\"Arial\");\n\n// Use:\nvar typeface = SKTypeface.FromFile(\"/usr/share/fonts/truetype/ubuntu/Ubuntu-R.ttf\");\n```\n\nYou can discover available font paths on Linux using `fc-list` in a terminal.\n\nWe will investigate the `sk_fontmgr_create_default` implementation in the native layer to ensure it correctly initializes fontconfig."}, {"type": "link-related", "description": "Link to the PR that introduced the regression", "risk": "low", "confidence": 0.98, "linkedIssue": 3730}, {"type": "link-related", "description": "Link to the original Android bug that PR #3730 was fixing", "risk": "low", "confidence": 0.95, "linkedIssue": 3693}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
