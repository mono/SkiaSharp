<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2147, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-22T11:16:00Z"}, "summary": "SKTextBlob.CreatePositioned throws MissingMethodException on iOS (Xamarin.Forms) due to a System.Memory version mismatch caused by SkiaSharp's netstandard2.0 dependency resolving ReadOnlySpan<T> from a different assembly than the iOS runtime provides.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/SkiaSharp", "confidence": 0.92}, "platforms": ["os/iOS"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "exception", "errorMessage": "System.MissingMethodException: Method not found: SkiaSharp.SKTextBlob SkiaSharp.SKTextBlob.CreatePositioned", "reproQuality": "partial", "targetFrameworks": ["netstandard2.0"]}, "reproEvidence": {"codeSnippets": ["SKTextBlob.CreatePositioned(\"aaaa\", new SKFont(SKTypeface.CreateDefault()), new ReadOnlySpan<SKPoint>(new SKPoint[]{ SKPoint.Empty }));"], "repoLinks": [{"url": "https://github.com/wieslawsoltes/Svg.Skia/issues/125", "description": "Downstream issue caused by the same System.Memory mismatch in Svg.Skia."}]}, "versionAnalysis": {"mentionedVersions": ["2.88.0", "2.88.1", "2.88.3"], "currentRelevance": "likely", "relevanceReason": "The System.Memory version mismatch is a structural issue in how SkiaSharp's netstandard2.0 TFM brings in System.Memory 4.6.3, which persists until SkiaSharp ships platform-specific TFMs (net8.0-ios, etc.) that don't need the System.Memory polyfill."}}, "analysis": {"summary": "On Xamarin.Forms iOS, SkiaSharp resolves to its netstandard2.0 assembly, which has a PackageReference to System.Memory 4.6.3 (confirmed in binding/Directory.Build.targets). This causes the ReadOnlySpan<T> type identity used in SKTextBlob.CreatePositioned to differ from the ReadOnlySpan<T> the Mono/Xamarin iOS runtime exposes at runtime, resulting in a MissingMethodException. Android and Windows work because their runtimes resolve the mismatch differently or use different TFMs. A well-known MSBuild workaround (strip the conflicting System.Memory reference in the iOS .csproj) resolves the issue.", "codeInvestigation": [{"file": "binding/Directory.Build.targets", "finding": "System.Memory 4.6.3 is added as a PackageReference for netstandard2.0 and net4x TFMs. This is the source of the ReadOnlySpan type identity mismatch on iOS.", "relevance": "direct", "lines": "3-4"}, {"file": "binding/SkiaSharp/SKTextBlob.cs", "finding": "SKTextBlob.CreatePositioned(string, SKFont, ReadOnlySpan<SKPoint>) is a public API taking ReadOnlySpan<T> from System.Memory when compiled under netstandard2.0. On iOS, the runtime's ReadOnlySpan type comes from a different assembly, causing the MissingMethodException at the call site.", "relevance": "direct", "lines": "107-108"}], "keySignals": [{"text": "the root cause of this is the fact that SkiaSharp in .NET Standard 2.0 references System.Memory in a different version and that version mismatch causes issues with ReadOnlySpan", "source": "comment by MartinZikmund (Uno Platform contributor), https://github.com/mono/SkiaSharp/issues/2147#issuecomment-1424649999", "interpretation": "Authoritative identification of root cause by a platform contributor who encountered and solved this issue for Uno Platform."}, {"text": "I'm facing the same issue with 2.88.1", "source": "comment by cschwarz", "interpretation": "Bug persists across minor releases."}, {"text": "Me too using 2.88.3. Is anyone looking into it?", "source": "comment by JohnBot2013", "interpretation": "Bug persists across minor releases, multiple users affected."}, {"text": "Appears to be causing https://github.com/wieslawsoltes/Svg.Skia/issues/125", "source": "comment by charlesroddie", "interpretation": "The bug has downstream impact on other libraries (Svg.Skia)."}], "rationale": "Classified as type/bug because calling a public API throws MissingMethodException at runtime on iOS—this is not expected behavior. Area is area/SkiaSharp because the root cause is in the core library's netstandard2.0 System.Memory dependency. Platform is os/iOS because Android and Windows are unaffected. Severity is high because it blocks any iOS Xamarin.Forms user who calls SKTextBlob.CreatePositioned (or any other API taking ReadOnlySpan<T>), though a workaround exists. A workaround MSBuild targets snippet has been verified by multiple users in the comments.", "workarounds": ["Add the following MSBuild targets to the iOS .csproj to strip the conflicting System.Memory reference:\n\n```xml\n<Target Name=\"VSMac_RemoveSystemMemory\" BeforeTargets=\"ResolveAssemblyReferences\">\n  <ItemGroup>\n    <_ReferenceToRemove Include=\"@(Reference)\" Condition=\"'%(Reference.Identity)'=='System.Memory'\" />\n    <Reference Remove=\"@(_ReferenceToRemove)\" />\n    <Reference Include=\"System.Memory\" />\n  </ItemGroup>\n</Target>\n\n<Target Name=\"VS_RemoveSystemMemory\" BeforeTargets=\"FindReferenceAssembliesForReferences\">\n  <ItemGroup>\n    <_ReferencePathToRemove Include=\"@(ReferencePath)\" Condition=\"'%(ReferencePath.NuGetPackageId)'=='System.Memory'\" />\n    <ReferencePath Remove=\"@(_ReferencePathToRemove)\" />\n  </ItemGroup>\n</Target>\n```"], "nextQuestions": ["Does this issue affect SkiaSharp 3.x (which ships platform-specific TFMs like net8.0-ios) or only 2.x?", "Are any other ReadOnlySpan<T> APIs in SkiaSharp affected by the same mismatch on iOS?", "Should SkiaSharp 2.x ship an updated NuGet .targets file that applies the System.Memory fix automatically for iOS consumers?"], "resolution": {"hypothesis": "The System.Memory 4.6.3 package pulled in by the netstandard2.0 TFM causes a ReadOnlySpan<T> type identity conflict on iOS/Xamarin. The fix is either to update the SkiaSharp NuGet package to automatically strip the conflicting System.Memory reference on iOS builds (via MSBuild targets shipped in the package), or to migrate to platform-specific TFMs in SkiaSharp 3.x that don't require the System.Memory polyfill.", "proposals": [{"title": "Add MSBuild targets to iOS .csproj to strip conflicting System.Memory", "description": "Apply the workaround documented by MartinZikmund in the issue comments: add two MSBuild targets that remove the conflicting System.Memory NuGet reference before assembly resolution, forcing the iOS runtime's built-in ReadOnlySpan<T>.", "category": "workaround", "effort": "cost/xs", "validated": "yes", "codeSnippet": "<Target Name=\"VSMac_RemoveSystemMemory\" BeforeTargets=\"ResolveAssemblyReferences\">\n  <ItemGroup>\n    <_ReferenceToRemove Include=\"@(Reference)\" Condition=\"'%(Reference.Identity)'=='System.Memory'\" />\n    <Reference Remove=\"@(_ReferenceToRemove)\" />\n    <Reference Include=\"System.Memory\" />\n  </ItemGroup>\n</Target>\n\n<Target Name=\"VS_RemoveSystemMemory\" BeforeTargets=\"FindReferenceAssembliesForReferences\">\n  <ItemGroup>\n    <_ReferencePathToRemove Include=\"@(ReferencePath)\" Condition=\"'%(ReferencePath.NuGetPackageId)'=='System.Memory'\" />\n    <ReferencePath Remove=\"@(_ReferencePathToRemove)\" />\n  </ItemGroup>\n</Target>"}, {"title": "Ship MSBuild targets in SkiaSharp NuGet package to auto-fix System.Memory on iOS", "description": "Add a .targets file to the SkiaSharp NuGet package that automatically applies the System.Memory stripping logic for iOS Xamarin consumers, so users don't need to manually add the workaround.", "category": "fix", "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "workaround-1", "recommendedReason": "Multiple users confirmed the workaround is effective. The fix-1 proposal would require packaging changes and is better suited for a future release."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Root cause is well-established (System.Memory version mismatch in netstandard2.0 TFM), a workaround exists and is confirmed by multiple users, but a proper fix (either in-package MSBuild targets or platform TFM migration in 3.x) needs investigation to scope and implement.", "suggestedReproPlatform": "macos"}, "actions": [{"type": "update-labels", "description": "Apply classification labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp", "os/iOS", "tenet/compatibility"]}, {"type": "add-comment", "description": "Share confirmed workaround and root cause analysis", "risk": "medium", "confidence": 0.88, "comment": "## Root Cause\n\nThis is caused by a **`System.Memory` version mismatch** in the `netstandard2.0` build of SkiaSharp. When SkiaSharp is resolved as `netstandard2.0` (as in Xamarin.Forms iOS), it brings in `System.Memory 4.6.3` as a dependency. This causes `ReadOnlySpan<T>` to resolve to a different type identity than the one the iOS Mono runtime exposes, leading to `MissingMethodException` at the call site.\n\n## Workaround\n\nAdd the following MSBuild targets to your iOS `.csproj` file:\n\n```xml\n<Target Name=\"VSMac_RemoveSystemMemory\" BeforeTargets=\"ResolveAssemblyReferences\">\n  <ItemGroup>\n    <_ReferenceToRemove Include=\"@(Reference)\" Condition=\"'%(Reference.Identity)'=='System.Memory'\" />\n    <Reference Remove=\"@(_ReferenceToRemove)\" />\n    <Reference Include=\"System.Memory\" />\n  </ItemGroup>\n</Target>\n\n<Target Name=\"VS_RemoveSystemMemory\" BeforeTargets=\"FindReferenceAssembliesForReferences\">\n  <ItemGroup>\n    <_ReferencePathToRemove Include=\"@(ReferencePath)\" Condition=\"'%(ReferencePath.NuGetPackageId)'=='System.Memory'\" />\n    <ReferencePath Remove=\"@(_ReferencePathToRemove)\" />\n  </ItemGroup>\n</Target>\n```\n\nThis workaround has been confirmed by multiple users (including the Uno Platform team). Note: this also affects other SkiaSharp APIs that take `ReadOnlySpan<T>` parameters.\n\n> **Note for SkiaSharp 3.x users:** If you are targeting `net8.0-ios` or later, this issue should not occur as SkiaSharp 3.x ships platform-specific TFMs that do not require the `System.Memory` polyfill."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
