<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1238, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-21T20:23:25Z"}, "summary": "PNG files encoded from a linear color space (RgbaF16/sRGB-linear) appear too dark in most Windows image viewers (IrfanView, Paint, Photo Viewer, Paint.NET) after a Skia version upgrade, while modern browsers render them correctly.", "classification": {"type": {"value": "type/bug", "confidence": 0.88}, "area": {"value": "area/SkiaSharp", "confidence": 0.82}, "platforms": ["os/Windows-Classic"], "backends": ["backend/Raster"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": true, "errorType": "wrong-output", "errorMessage": "HRESULT: [0x800707DB], Message: The specified color profile is invalid.", "reproQuality": "complete"}, "reproEvidence": {"stepsToReproduce": ["Create an SKImageInfo with RgbaF16 color type and SKColorSpace.CreateSrgbLinear()", "Create a bitmap and draw to it with a solid color (e.g. purple)", "Encode to PNG using bitmap.PeekPixels().Encode(new SKPngEncoderOptions())", "Open the PNG in Windows image viewers (IrfanView, Paint, Photo Viewer, Paint.NET)"], "environmentDetails": "Windows Classic, SkiaSharp dev/update-skia branch (commit 1590d7e1e815), regression from 1.68.2-preview.60", "repoLinks": [{"url": "https://groups.google.com/forum/#!topic/skia-discuss/b8JtsaOw7_o", "description": "Upstream Skia mailing list discussion about the color profile change"}]}, "versionAnalysis": {"mentionedVersions": ["1.68.2-preview.60", "1590d7e1e815 (dev/update-skia)"], "workedIn": "1.68.2-preview.60", "brokeIn": "dev/update-skia branch (commit 1590d7e1e815)", "currentRelevance": "likely", "relevanceReason": "The PNG encoder still embeds ICC profiles for linear color spaces in current Skia versions; WIC's limited ICC support for linear color spaces has not changed."}, "regression": {"isRegression": true, "confidence": 0.9, "reason": "Reporter explicitly confirms the same code produced correct output in 1.68.2-preview.60 but produces too-dark PNG in the updated Skia branch.", "workedInVersion": "1.68.2-preview.60", "brokeInVersion": "dev/update-skia (commit 1590d7e1e815)"}}, "analysis": {"summary": "The updated Skia version started embedding a full ICC profile for the linear sRGB color space in PNG output. Windows image viewers using WIC cannot parse this embedded linear ICC profile (reporting 'The specified color profile is invalid'), so they ignore it and render the linear data without gamma correction, making colors appear too dark. Modern browsers correctly apply the color space transform using the embedded profile.", "rationale": "This is a compatibility regression caused by an upstream Skia behavior change in PNG encoding. New Skia embeds a correct-but-WIC-incompatible ICC profile for linear sRGB color spaces. The reporter and maintainer investigated this together and confirmed WIC throws an error on the embedded profile. A workaround exists (convert to sRGB first), and the issue was posted to the Skia mailing list, suggesting this is upstream-driven.", "codeInvestigation": [{"file": "binding/SkiaSharp/Definitions.cs", "lines": "521-543", "finding": "SKPngEncoderOptions has fICCProfile and fICCProfileDescription fields. The Default constructor leaves these unset (default), meaning Skia auto-embeds the ICC profile based on the pixmap's color space. There is no option to suppress ICC profile embedding.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKPixmap.cs", "lines": "294-312", "finding": "Encode(SKPngEncoderOptions) passes options directly to the C API sk_pngencoder_encode. No color conversion occurs at the SkiaSharp layer before encoding.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKImageInfo.cs", "lines": "151-157", "finding": "SKImageInfo.WithColorSpace(SKColorSpace) exists and can be used to create a new image info with sRGB color space, enabling the workaround of copying pixel data to sRGB before encoding.", "relevance": "related"}, {"file": "binding/SkiaSharp/SKColorSpace.cs", "lines": "68-74", "finding": "SKColorSpace.CreateSrgb() and CreateSrgbLinear() are available as static methods returning cached instances. The fix/workaround is to target sRGB for PNG output.", "relevance": "context"}], "keySignals": [{"text": "HRESULT: [0x800707DB], Message: The specified color profile is invalid.", "source": "comment #617715987", "interpretation": "Windows WIC fails to parse the embedded ICC profile for linear sRGB, confirming the root cause. WIC ignores the profile and renders linear data without gamma correction."}, {"text": "copying the PNG to a F16 sRGB bitmap and then saving also works", "source": "comment #616081458", "interpretation": "Converting to sRGB color space before encoding avoids embedding an incompatible ICC profile. Reporter confirmed the workaround works."}, {"text": "Note that the colors are correctly displayed in modern browsers", "source": "issue body", "interpretation": "The embedded ICC profile is valid per the PNG spec. Modern browsers correctly apply the color space transform, confirming the PNG data is correct — only WIC-based viewers fail."}, {"text": "JPEG and WebP seem to work", "source": "comment #616081458", "interpretation": "Other image formats are not affected, isolating the issue to PNG ICC profile embedding."}], "workarounds": ["Convert the bitmap to sRGB color space before encoding: create a new SKBitmap with imageInfo.WithColorSpace(SKColorSpace.CreateSrgb()) and draw the original into it, then encode the sRGB bitmap to PNG."], "nextQuestions": ["Is this issue still reproducible in current SkiaSharp 3.x releases (not just dev/update-skia from 2020)?", "Did the Skia mailing list discussion result in any upstream fix or recommended configuration?", "Can SKPngEncoderOptions be extended to allow suppressing ICC profile embedding for compatibility?"], "errorFingerprint": "PNG/linear-ICC/WIC-invalid-profile", "resolution": {"hypothesis": "New Skia embeds a linear sRGB ICC profile in PNG output; Windows WIC fails to parse it, treats image as uncorrected linear data, and displays colors too dark.", "proposals": [{"title": "Convert to sRGB before encoding", "description": "Copy the pixmap into a new bitmap with sRGB color space before encoding to PNG. Skia performs the correct linear-to-sRGB gamma conversion. The resulting PNG will use a standard sRGB profile understood by all viewers.", "category": "workaround", "codeSnippet": "// Convert linear bitmap to sRGB before PNG encoding\nvar srgbInfo = imageInfo.WithColorSpace(SKColorSpace.CreateSrgb());\nusing var srgbBitmap = new SKBitmap(srgbInfo);\nusing var srgbCanvas = new SKCanvas(srgbBitmap);\nsrgbCanvas.DrawBitmap(bitmap, 0, 0);\nusing var data = srgbBitmap.PeekPixels().Encode(new SKPngEncoderOptions());\nusing var stream = File.Create(\"output.png\");\ndata.SaveTo(stream);", "confidence": 0.9, "effort": "cost/s", "validated": "yes"}, {"title": "Investigate adding ICC profile suppression option to SKPngEncoderOptions", "description": "Investigate whether Skia's C API allows disabling ICC profile embedding, and expose this as an option in SKPngEncoderOptions. This would allow callers to opt out of embedding profiles for compatibility.", "category": "investigation", "confidence": 0.6, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Convert to sRGB before encoding", "recommendedReason": "Reporter confirmed this approach works. Converting to sRGB is the correct approach for images destined for wide display compatibility. Requires minimal code change."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.78, "reason": "Confirmed regression with complete repro code. Workaround exists but no proper fix has been applied. Needs verification in current SkiaSharp 3.x and investigation into whether ICC profile embedding can be configured.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp, os/Windows-Classic, backend/Raster, tenet/compatibility labels", "risk": "low", "confidence": 0.88, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "backend/Raster", "tenet/compatibility"]}, {"type": "add-comment", "description": "Post analysis and confirmed workaround", "risk": "medium", "confidence": 0.8, "comment": "Thanks for the thorough investigation!\n\nThe root cause is that the updated Skia now embeds a full ICC profile for the linear sRGB color space in PNG output. Windows image viewers using WIC cannot parse this ICC profile (it reports `The specified color profile is invalid`), so they ignore it and render the linear pixel data without gamma correction — which is why images appear too dark. Modern browsers (and GIMP) handle it correctly.\n\n**Workaround** — convert to sRGB color space before encoding to PNG:\n\n```csharp\nvar srgbInfo = imageInfo.WithColorSpace(SKColorSpace.CreateSrgb());\nusing var srgbBitmap = new SKBitmap(srgbInfo);\nusing var srgbCanvas = new SKCanvas(srgbBitmap);\nsrgbCanvas.DrawBitmap(bitmap, 0, 0);\nusing var data = srgbBitmap.PeekPixels().Encode(new SKPngEncoderOptions());\nusing var stream = File.Create(\"output.png\");\ndata.SaveTo(stream);\n```\n\nThis allows Skia to apply the correct linear→sRGB gamma conversion, and the resulting PNG will use the standard sRGB profile that all viewers understand. We'll investigate whether we can add an option to suppress ICC profile embedding in `SKPngEncoderOptions` for cases like this."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
