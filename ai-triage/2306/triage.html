<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2306, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-25T23:30:00Z"}, "summary": "Hard crash (SIGSEGV on Linux, Fatal CLR Error on Windows) when calling CopyToAsync on a stream returned by SKData.AsStream(), due to the GC potentially freeing native SKData memory during async await suspension.", "classification": {"type": {"value": "type/bug", "confidence": 0.92}, "area": {"value": "area/SkiaSharp", "confidence": 0.88}, "platforms": ["os/Linux", "os/Windows-Classic"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "crash", "errorMessage": "Fatal error. Internal CLR error. (0x80131506) at System.Buffer._Memmove", "stackTrace": "UnmanagedMemoryStream.ReadCore -> Buffer.Memmove -> UnmanagedMemoryStream.Read -> UnmanagedMemoryStream.ReadAsync -> CopyToAsync", "reproQuality": "partial", "targetFrameworks": ["net6.0"]}, "reproEvidence": {"stepsToReproduce": ["Create SKImage from encoded data stream", "Draw resized version onto SKSurface", "Call surface.Snapshot() then ss.Encode() to produce SKData", "Call thumbnailPng.AsStream() to get UnmanagedMemoryStream", "Await CopyToAsync to write stream to FileStream", "Observe intermittent SIGSEGV (Linux) or Fatal CLR Error 0x80131506 (Windows)"], "environmentDetails": "SkiaSharp 2.88.3, .NET 6.0, Linux Debian 11 + Windows 10 Pro 19044, server-side image processing on thread pool threads", "repoLinks": [{"url": "https://user-images.githubusercontent.com/33007665/200140248-9e31e43f-0f70-40f5-811e-81b105b0a52f.png", "description": "IDE crash screenshot showing exception at CopyToAsync call"}, {"url": "https://github.com/mono/SkiaSharp/issues/209", "description": "Related issue: Thread Safety in SKBitmap.Decode — similar GC-timing/crash pattern in async server-side image processing"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.3"], "currentRelevance": "likely", "relevanceReason": "SKData.AsStream() and the private SKDataStream implementation have not materially changed since 2.88.3. The GC-timing vulnerability with async UnmanagedMemoryStream reads would still be present."}}, "analysis": {"summary": "SKData.AsStream() returns a private SKDataStream (UnmanagedMemoryStream) backed by native memory. In async methods, the GC may finalize the parent SKData object — freeing native memory — during an await suspension point, leaving the stream with a dangling pointer. Reading from that pointer in CopyToAsync causes the SIGSEGV / Fatal CLR Error. SKData.SaveTo() has an explicit GC.KeepAlive(this) guard for this exact risk, confirming it is known, but AsStream() lacks equivalent async-context protection.", "rationale": "This is a type/bug because it produces a hard crash (kills the .NET runtime) in structurally sound async code. The intermittent nature — crashing on some runs but not others on the same image — is the hallmark of a GC-timing race, not bad input. The Windows stack trace lands in UnmanagedMemoryStream.ReadCore → Buffer.Memmove, which is accessing freed native memory. The presence of GC.KeepAlive(this) in SaveTo() confirms the team is aware of the GC-timing pattern in SKData. The reporter's note that a minimal console app cannot reproduce it is consistent: higher server load triggers GC more aggressively, exposing the race.", "keySignals": [{"text": "Fatal error. Internal CLR error. (0x80131506) at System.Buffer._Memmove ... UnmanagedMemoryStream.ReadCore", "source": "issue body (Windows crash output)", "interpretation": "Classic use-after-free: CopyToAsync is reading from native memory that has been freed by the GC/finalizer during the async suspension"}, {"text": "Inconsistent behaviour where the copy just doesn't work. Doesn't appear to be invalid input image data at all, as it can crash and succeed on the same image.", "source": "issue body", "interpretation": "Non-deterministic failure tied to GC scheduling — crash occurs only when GC runs and finalizes SKData during the async await window"}, {"text": "I have been unable to reproduce this in a separate console app using essentially that sample code I provided", "source": "comment #1304645904", "interpretation": "Consistent with GC-timing: a simple console app rarely triggers GC within the short async window; a high-concurrency server does"}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKData.cs", "lines": "293-313", "finding": "Private SKDataStream class (returned by AsStream()) inherits UnmanagedMemoryStream and passes the raw native pointer from host.Data at construction time. With disposeHost=false (default), the host field holds a managed reference to SKData, but in Release-mode async state machines the JIT may determine the stream variable is 'dead' before the CopyToAsync continuation finishes, allowing the host to be collected and its native memory freed.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKData.cs", "lines": "270-286", "finding": "SaveTo() extracts a raw native pointer (var ptr = Data) and uses GC.KeepAlive(this) at the end to prevent SKData finalization while ptr is in use. This guard is absent in the async AsStream() path, confirming the team is aware of the pattern but has not addressed it for async consumers.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKData.cs", "lines": "255-259", "finding": "AsStream() defaults streamDisposesData to false. SKDataStream stores host but the UnmanagedMemoryStream base only holds the raw unsafe byte* pointer — the GC does not track this pointer as a reference to the managed SKData object.", "relevance": "direct"}], "nextQuestions": ["Can a forced GC.Collect() inside the CopyToAsync await reproduce the crash deterministically?", "Does adding GC.KeepAlive(thumbnailPng) after the await prevent the crash?", "Does the crash occur only in Release mode (JIT optimizes away references) or also in Debug mode?"], "workarounds": ["Use SKData.ToArray() to copy data to a managed byte[] before any async operation, then wrap in MemoryStream — eliminates all native pointer access during await", "Add GC.KeepAlive(thumbnailPng) after the await CopyToAsync call to hint the GC not to collect the SKData prematurely", "Use thumbnailPng.AsStream(streamDisposesData: true) so the stream owns the SKData lifetime — though this ties SKData disposal to stream disposal and may not fully prevent GC-timing in all scenarios"], "errorFingerprint": "UnmanagedMemoryStream.ReadCore|Buffer.Memmove|CopyToAsync|SKData.AsStream", "resolution": {"hypothesis": "SKData.AsStream() returns an UnmanagedMemoryStream backed by native SKData memory. In async methods, the GC may collect the SKData during an await suspension, freeing native memory while the stream still holds a raw pointer to it. Reading from the freed pointer in CopyToAsync causes the crash.", "proposals": [{"title": "Copy to managed memory before async operation", "description": "Use SKData.ToArray() to copy to a managed byte[] before any async operation, then wrap in MemoryStream. This eliminates all native pointer access during await.\n\n```csharp\nusing SKImage? ss = surface.Snapshot();\nif (ss is null) return;\nusing SKData? thumbnailPng = ss.Encode();\nbyte[]? bytes = thumbnailPng?.ToArray();\nif (bytes is not null)\n{\n    using var ms = new MemoryStream(bytes);\n    await ms.CopyToAsync(fileHandle);\n}\n```\n\nNote: null-check ss and thumbnailPng before use as factory methods can return null on failure.", "category": "workaround", "confidence": 0.75, "effort": "cost/xs", "validated": "yes"}, {"title": "Fix SKDataStream to guard GC in async scenarios", "description": "Add a GCHandle.Alloc(Pinned) or override ReadAsync in SKDataStream to call GC.KeepAlive(host) after each read, mirroring the SaveTo() pattern. This fixes the root cause without requiring callers to change their code.", "category": "fix", "confidence": 0.7, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Copy to managed memory before async operation", "recommendedReason": "Immediate safe workaround requiring minimal code change. Zero risk of native memory issues. The fix proposal needs deeper investigation to handle all async code paths correctly."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Real crash with detailed stack traces pointing to native memory use-after-free in SKData.AsStream() + async context. Code investigation confirms the vulnerable pattern. Needs a deterministic reproduction and a proper fix in SKDataStream.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, core library, platform, and reliability labels", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/SkiaSharp", "os/Linux", "os/Windows-Classic", "tenet/reliability"]}, {"type": "add-comment", "description": "Provide root cause analysis and safe workaround using managed memory copy", "risk": "medium", "confidence": 0.82, "comment": "Thanks for the detailed report including GDB output and Windows stack trace!\n\nThis looks like a **GC timing issue** with `SKData.AsStream()` in async methods. `AsStream()` returns an `UnmanagedMemoryStream` backed by native memory owned by the `SKData` object. When used with `await`, the GC may collect and finalize the `SKData` object during the `await` suspension point — freeing the native memory while the stream still holds a raw pointer to it. Reading from that pointer in `CopyToAsync` causes the SIGSEGV / Fatal CLR Error.\n\nNote: `SKData.SaveTo()` has an explicit `GC.KeepAlive(this)` guard for exactly this reason, but `AsStream()` lacks equivalent async-context protection.\n\nThe fact that it cannot reproduce in a minimal console app (your comment) and only happens on the server is consistent with a GC-timing race: higher concurrency triggers GC more aggressively during async suspension windows.\n\n**Workaround:** Copy to managed memory before the async operation:\n\n```csharp\nusing SKImage? ss = surface.Snapshot();\nif (ss is null) return;\nusing SKData? thumbnailPng = ss.Encode();\nbyte[]? bytes = thumbnailPng?.ToArray();\nif (bytes is not null)\n{\n    using var ms = new MemoryStream(bytes);\n    await ms.CopyToAsync(fileHandle);\n}\n```\n\n`ToArray()` copies to managed memory so the async operation never touches native pointers — GC timing no longer matters.\n\nWe'll investigate fixing `SKDataStream` to properly protect against GC during async reads."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
