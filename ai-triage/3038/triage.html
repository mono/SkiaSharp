<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3038, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-23T15:09:25Z", "currentLabels": ["type/bug"]}, "summary": "libHarfBuzzSharp.so on Linux causes SIGSEGV when loaded alongside GtkSharp (or any library using RTLD_GLOBAL) because the ELF global symbol namespace causes internal hb_* calls inside libHarfBuzzSharp to resolve to the system libharfbuzz.so.0 instead; the RTLD_DEEPBIND workaround from PR #2247 is only active for netfx builds and is absent in .NET 6+ builds.", "classification": {"type": {"value": "type/bug", "confidence": 0.97}, "area": {"value": "area/libHarfBuzzSharp.native", "confidence": 0.95}, "platforms": ["os/Linux"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": true, "errorType": "crash", "errorMessage": "SIGSEGV in libHarfBuzzSharp.so internal hb_* call resolved to system libharfbuzz.so.0", "reproQuality": "complete", "targetFrameworks": ["net8.0", "net6.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a .NET 6+ console app on Linux", "Reference both GtkSharp and HarfBuzzSharp NuGet packages", "Call Gtk.Application.Init() to trigger loading of libgtk.so.3 with RTLD_GLOBAL (which pulls in system libharfbuzz.so.0 into the global ELF namespace)", "Create a HarfBuzzSharp.Font and call TryGetGlyph", "Observe SIGSEGV"], "environmentDetails": "Linux, .NET 6+, GtkSharp, system libharfbuzz.so.0 present", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/pull/2247", "description": "Original fix: added RTLD_DEEPBIND to LibraryLoader.Linux.dlopen — only active for netfx USE_DELEGATES builds"}, {"url": "https://github.com/mono/SkiaSharp/pull/2917", "description": "Related PR by @maxkatz6 referenced in discussion (may affect net6+ native loading path)"}, {"url": "https://github.com/GtkSharp/GtkSharp/issues/443", "description": "GtkSharp uses RTLD_GLOBAL when loading libgtk.so.3, causing system harfbuzz to pollute global ELF namespace"}], "codeSnippets": ["Gtk.Application.Init();\nvar font = new HarfBuzzSharp.Font(new Face((_, _) => null));\nfont.TryGetGlyph(65, out _);"]}, "versionAnalysis": {"mentionedVersions": ["2.88.x"], "currentRelevance": "likely", "relevanceReason": "The netfx RTLD_DEEPBIND path in LibraryLoader.cs still exists but is guarded by USE_DELEGATES which is only defined for net4* TFMs. No equivalent protection exists for .NET 6+."}, "regression": {"isRegression": true, "confidence": 0.92, "reason": "Bug was fixed in PR #2247 via RTLD_DEEPBIND, but that fix only works for netfx. When .NET 6+ support was added and the library loading was migrated away from USE_DELEGATES/LibraryLoader to [DllImport]/[LibraryImport], the RTLD_DEEPBIND protection was lost.", "workedInVersion": "netfx builds (RTLD_DEEPBIND active)"}}, "analysis": {"summary": "The root cause is that libHarfBuzzSharp.so exports all hb_* symbols globally (via --version-script with 'global: hb_*; local: *;') and the Linux ELF loader allows globally-loaded libraries (RTLD_GLOBAL) to override these symbols in libHarfBuzzSharp's own internal calls. The fix (RTLD_DEEPBIND when loading libHarfBuzzSharp) was present for netfx via LibraryLoader but was not ported to .NET 6+. Two native-side fixes are proposed: compile with -Bsymbolic/-Bsymbolic-functions to force local symbol resolution, or rename all exported symbols with a unique prefix.", "rationale": "Classified as type/bug in area/libHarfBuzzSharp.native because the crash occurs due to the native .so being built without protection against ELF global symbol hijacking. The regression is in the .NET 6+ code path not applying RTLD_DEEPBIND. Severity is high: crash (SIGSEGV) on a common Linux scenario (desktop apps using GTK), with a known but glibc-only user-space workaround.", "codeInvestigation": [{"file": "binding/Binding.Shared/LibraryLoader.cs", "lines": "209-221", "finding": "Linux.dlopen passes RTLD_DEEPBIND flag when loading shared libraries. This prevents ELF symbol hijacking by ensuring libHarfBuzzSharp resolves its own hb_* calls internally. However this code is inside '#if USE_DELEGATES || USE_LIBRARY_LOADER' which is only defined for net4* targets (HarfBuzzSharp.csproj: DefineConstants USE_DELEGATES for net4*).", "relevance": "direct"}, {"file": "binding/HarfBuzzSharp/HarfBuzzSharp.csproj", "lines": "12-14", "finding": "USE_DELEGATES is only defined when TargetFramework starts with 'net4'. For .NET 6+ there is no USE_LIBRARY_LOADER either, so LibraryLoader (and RTLD_DEEPBIND) is never used.", "relevance": "direct"}, {"file": "native/linux/libHarfBuzzSharp/libHarfBuzzSharp.map", "lines": "1-6", "finding": "The ELF version script exports 'hb_*' as global and hides everything else as local. This means all public HarfBuzz API symbols are globally visible and can be overridden by any RTLD_GLOBAL-loaded library that exports symbols with the same names.", "relevance": "direct"}, {"file": "native/linux/build.cake", "lines": "Task libHarfBuzzSharp section", "finding": "extra_ldflags includes '--version-script' but NOT '-Bsymbolic' or '-Bsymbolic-functions'. Adding -Bsymbolic-functions would force internal function calls within libHarfBuzzSharp to always resolve to the library's own definitions, even when a same-named symbol exists in the global namespace.", "relevance": "direct"}], "keySignals": [{"text": "LibraryLoader is only used for netfx builds, net6.0 build doesn't contain it anymore.", "source": "issue body", "interpretation": "Reporter correctly identifies that the RTLD_DEEPBIND fix from PR #2247 is not active for .NET 6+ builds, making the regression specific to modern .NET."}, {"text": "Linux shared library loader overrides all calls to Bar in libA.so to use Bar from libB.so", "source": "comment by kekekeks", "interpretation": "Precise technical explanation of ELF global namespace symbol hijacking — internal calls within libHarfBuzzSharp get re-routed to the system libharfbuzz.so.0."}, {"text": "GtkSharp uses RTLD_GLOBAL flag when loading libgtk.so.3", "source": "comment by kekekeks", "interpretation": "The trigger is GtkSharp's use of RTLD_GLOBAL, which exposes system libharfbuzz into the global namespace. Any other library using RTLD_GLOBAL that pulls in system harfbuzz would also trigger the issue."}, {"text": "The workaround I'm currently using is to load libHarfBuzzSharp.so with NativeLibrary API, extract the path via dlinfo+RTLD_DI_ORIGIN, unload, load again with RTLD_DEEPBIND", "source": "comment by kekekeks", "interpretation": "User has a glibc-only workaround. The two proposed native fixes are: (1) -Bsymbolic linker flag, (2) unique symbol prefix."}], "workarounds": ["Load libHarfBuzzSharp.so manually via NativeLibrary API: find its path via dlinfo+RTLD_DI_ORIGIN, unload, reload with RTLD_DEEPBIND using a custom DllImportResolver. Works on glibc-based Linux only.", "Ensure libgtk.so.3 or other GTK-pulling libraries are loaded WITHOUT RTLD_GLOBAL before initializing HarfBuzzSharp (not always possible due to GtkSharp's internal behavior)."], "nextQuestions": ["Can -Bsymbolic-functions be added to the Linux native build for libHarfBuzzSharp without breaking other scenarios?", "Does the same issue affect libSkiaSharp.so (which also bundles HarfBuzz internally)?", "Is the issue reproducible on musl libc (Alpine) or only glibc?", "Would a NativeLibrary.SetDllImportResolver approach work for .NET 6+ to apply RTLD_DEEPBIND at load time?"], "resolution": {"hypothesis": "libHarfBuzzSharp.so needs to be linked with -Bsymbolic-functions so that internal HarfBuzz function calls always resolve locally, preventing the ELF global namespace from hijacking them.", "proposals": [{"title": "Add -Bsymbolic-functions to Linux libHarfBuzzSharp linker flags", "description": "In native/linux/build.cake, add '-Wl,-Bsymbolic-functions' to extra_ldflags for the libHarfBuzzSharp target. This forces all internal function call references within the .so to resolve to its own definitions, even if a same-named symbol is present in the global ELF namespace via RTLD_GLOBAL.", "category": "fix", "confidence": 0.8, "effort": "cost/s", "validated": "untested"}, {"title": "Apply RTLD_DEEPBIND in .NET 6+ via NativeLibrary.SetDllImportResolver", "description": "Register a DllImportResolver for the HarfBuzzSharp assembly that uses dlopen with RTLD_DEEPBIND on Linux. This would restore the protection that existed in LibraryLoader for netfx, now via the standard .NET 6+ API.", "category": "fix", "confidence": 0.7, "effort": "cost/m", "validated": "untested"}, {"title": "Prefix all exported symbols with HBSharp_ or similar", "description": "Rename every exported symbol in the libHarfBuzzSharp C API shim to use a unique prefix, eliminating any possibility of name collision with the system libharfbuzz.", "category": "fix", "confidence": 0.95, "effort": "cost/xl", "validated": "untested"}], "recommendedProposal": "Add -Bsymbolic-functions to Linux libHarfBuzzSharp linker flags", "recommendedReason": "Minimal change to the native build, directly addresses the ELF symbol hijacking at the library level. Should be tested to confirm it does not break any existing functionality."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.88, "reason": "Clear regression with a known root cause and viable fix path. The -Bsymbolic-functions approach needs to be tested on a Linux build to confirm it resolves the SIGSEGV without side effects before committing to the fix.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, native HarfBuzz area, Linux platform, and reliability tenet labels", "risk": "low", "confidence": 0.97, "labels": ["type/bug", "area/libHarfBuzzSharp.native", "os/Linux", "tenet/reliability"]}, {"type": "add-comment", "description": "Acknowledge the regression, explain the root cause, outline the two fix paths, and ask if reporter can test -Bsymbolic-functions", "risk": "medium", "confidence": 0.88, "comment": "Thanks for the detailed analysis! You've correctly identified the root cause:\n\n**Root cause:** `libHarfBuzzSharp.so` exports all `hb_*` symbols globally (via `--version-script`). When GtkSharp loads `libgtk.so.3` with `RTLD_GLOBAL`, the system `libharfbuzz.so.0` is injected into the global ELF namespace, and the dynamic linker re-routes `libHarfBuzzSharp`'s internal `hb_*` calls to the system library — causing the SIGSEGV.\n\nThe `RTLD_DEEPBIND` fix from PR #2247 only applies to `netfx` builds (via `USE_DELEGATES`/`LibraryLoader`). For .NET 6+, `[DllImport]`/`[LibraryImport]` is used directly and the protection is absent.\n\n**Two viable native-side fixes:**\n1. **`-Bsymbolic-functions`** linker flag — forces internal function references in `libHarfBuzzSharp.so` to always resolve locally. This is a small change to the Linux build script.\n2. **Symbol prefix** — rename all exported `hb_*` symbols to a unique prefix (e.g., `HBSharp_`). High confidence but significant effort.\n\nWe're leaning toward option 1 as the minimal fix. Are you able to build `libHarfBuzzSharp.so` with `-Bsymbolic-functions` and confirm it resolves the SIGSEGV in your repro scenario?"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
