<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 607, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T12:30:00Z", "currentLabels": ["type/bug", "type/enhancement", "os/iOS", "os/Android", "area/SkiaSharp.Views", "type/feature-request", "area/SkiaSharp.Views.Maui", "tenet/compatibility", "tenet/reliability", "triage/triaged"]}, "summary": "SKTouchAction.Entered and SKTouchAction.Exited events are never fired on iOS and Android; these actions exist in the SKTouchAction enum and are dispatched by the Windows platform handler but the iOS and Android handlers have no mechanism to synthesize them, creating a platform parity gap.", "classification": {"type": {"value": "type/bug", "confidence": 0.87}, "area": {"value": "area/SkiaSharp.Views.Maui", "confidence": 0.9}, "platforms": ["os/iOS", "os/Android"], "tenets": ["tenet/compatibility", "tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "missing-output", "reproQuality": "partial", "targetFrameworks": ["net8.0-ios", "net8.0-android"]}, "reproEvidence": {"stepsToReproduce": ["Create a SkiaSharp.Views.Maui app with touch events enabled on iOS or Android", "Handle the Touch event and listen for SKTouchAction.Entered or SKTouchAction.Exited", "Touch the view and drag the finger outside its bounds or re-enter", "Observe that Entered and Exited are never raised on iOS or Android (they are on Windows)"], "environmentDetails": "iOS / Android, SkiaSharp.Views.Maui, all versions", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/607#issuecomment-411721040", "description": "Reporter's workaround with bounds tracking and scale-factor hack"}]}, "versionAnalysis": {"mentionedVersions": [], "currentRelevance": "likely", "relevanceReason": "Code inspection of the current MAUI Android and iOS SKTouchHandler confirms no Entered/Exited synthesis is present; the issue persists."}}, "analysis": {"summary": "The SKTouchAction enum defines Entered and Exited values; the Windows handler wires PointerEntered/PointerExited OS events to them, but the Android handler (MotionEvent switch) and iOS handler (UIGestureRecognizer overrides) have no equivalent. Because mobile OSes do not raise native enter/exit events, these must be synthesized by tracking touch position relative to view bounds during Move events. Tizen already synthesizes Exited via PointStateType.Leave. The fix path is clear but requires per-platform state tracking.", "rationale": "Platform parity gap: SKTouchAction.Entered and Exited exist in the public API and are dispatched on Windows (via native OS events) but silently dropped on iOS and Android. Per the label taxonomy this qualifies as type/bug. The reporter provided a working pseudocode algorithm and a user-space workaround with a known coordinate-scaling caveat. Maintainer acknowledged in 2018 the feature would be addressed.", "codeInvestigation": [{"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Platform/Windows/SKTouchHandler.cs", "lines": "29-43", "finding": "Windows handler subscribes to PointerEntered and PointerExited native events and maps them to SKTouchAction.Entered and SKTouchAction.Exited via CommonHandler. This is the only platform where these actions are dispatched.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Platform/Android/SKTouchHandler.cs", "lines": "63-109", "finding": "Android handler switches on MotionEventActions (Down, Move, Up, Cancel). There is no case for Entered or Exited. The Move branch iterates pointers and fires SKTouchAction.Moved only, with no bounds check.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Platform/Apple/SKTouchHandler.cs", "lines": "54-95", "finding": "iOS handler overrides UIGestureRecognizer callbacks (TouchesBegan, TouchesMoved, TouchesEnded, TouchesCancelled). No override dispatches SKTouchAction.Entered or Exited; TouchesMoved only fires SKTouchAction.Moved.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Platform/Tizen/SKTouchHandler.cs", "lines": "65-73", "finding": "Tizen handler maps PointStateType.Leave to SKTouchAction.Exited but has no mapping for Entered (no PointStateType.Enter equivalent used). Partial parity only.", "relevance": "related"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/SKTouchEventArgs.cs", "lines": "60-69", "finding": "SKTouchAction enum defines: Entered, Pressed, Moved, Released, Cancelled, Exited, WheelChanged. All seven values are in the public API; only Windows fires Entered and Exited.", "relevance": "context"}], "keySignals": [{"text": "Currently iOS is implemented only on UWP (because it is connected as a passthrough), but it would be useful to have this functionality connected on iOS/Android", "source": "issue body", "interpretation": "Reporter correctly identifies that Windows uses native passthrough while iOS/Android need synthesis from move events."}, {"text": "it was the expected case on iOS/Android (which required looking through the code here)", "source": "comment #2 (reporter)", "interpretation": "Discoverability problem: the gap is not documented and users reasonably expect parity from a cross-platform API."}, {"text": "This is something that we will be looking at in the future.", "source": "comment #4 (maintainer mattleibow)", "interpretation": "Maintainer acknowledged the request in 2018; the issue is accepted work, not contested."}], "workarounds": ["Track a per-touch-id boolean IsInside flag; on SKTouchAction.Pressed set it to true; on SKTouchAction.Moved compare e.Location to the view Bounds and fire a synthesized Entered or Exited by re-raising your own event.", "Reporter noted the raw e.Location is in view-local pixel space and Bounds may need a device-pixel scaling factor (~2x on Retina/HiDPI) when comparing."], "nextQuestions": ["Should the Android implementation also handle MotionEventActions.HoverEnter/HoverExit for mouse/stylus pointers on Android (which do have native enter/exit events)?", "Should Entered fire on Pressed (touch started inside view) to match Windows behavior where entering with touch already down can happen?", "Does the iOS UIGestureRecognizer approach allow detecting re-entry after the finger left the view bounds, or is a different mechanism needed?"], "resolution": {"hypothesis": "Both Android and iOS need per-pointer state (inside/outside) tracked in their SKTouchHandler, and the Move event loop must check position against view bounds to synthesize and fire Entered/Exited transitions.", "proposals": [{"title": "Synthesize Entered/Exited in Android SKTouchHandler", "description": "Add a per-pointer Dictionary<int, bool> isInsideMap to the Android handler. On Down set isInside=true. On Move, after computing coords, compare to view.Width/Height (in same pixel space as scalePixels output). Fire Entered or Exited when the inside state changes. On Up/Cancel remove the pointer from the map.", "category": "fix", "confidence": 0.8, "effort": "cost/s", "validated": "untested"}, {"title": "Synthesize Entered/Exited in iOS SKTouchHandler", "description": "Add a per-touch NSMapTable or Dictionary tracking inside state. In TouchesMoved check touch.LocationInView(View) against View.Bounds and fire extra FireEvent calls for Entered/Exited before the normal Moved event when boundary transitions occur.", "category": "fix", "confidence": 0.78, "effort": "cost/s", "validated": "untested"}, {"title": "User-space workaround using current API", "description": "Handle SKTouchAction.Pressed/Moved/Released manually and synthesize Entered/Exited by comparing e.Location to the SkiaSharp canvas bounds. See reporter's workaround in comments; apply appropriate device-pixel scaling (e.g. 2× on Retina) when comparing to Bounds.", "category": "workaround", "confidence": 0.85, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Synthesize Entered/Exited in Android SKTouchHandler", "recommendedReason": "Android bounds tracking is more straightforward and the View provides the hit-test geometry in the same coordinate space as MotionEvent. iOS requires similar work in parallel."}}, "output": {"actionability": {"suggestedAction": "keep-open", "confidence": 0.82, "reason": "Valid platform parity bug; fix path is clear (synthesize Entered/Exited from Move events with bounds tracking) but requires per-platform implementation work. A user-space workaround exists. Maintainer acknowledged in 2018; issue should remain open until implemented.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Correct labels: use single type/bug (remove duplicate type labels), set area/SkiaSharp.Views.Maui, keep os/iOS + os/Android and tenets", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp.Views.Maui", "os/iOS", "os/Android", "tenet/compatibility", "tenet/reliability"]}, {"type": "add-comment", "description": "Acknowledge the gap, confirm code investigation findings, share the workaround with the coordinate-scaling caveat noted", "risk": "medium", "confidence": 0.82, "comment": "Thanks for the detailed report and for sharing your workaround.\n\nCode investigation confirms the issue: the Windows handler wires the native `PointerEntered`/`PointerExited` OS events directly to `SKTouchAction.Entered`/`SKTouchAction.Exited`, but the Android and iOS handlers have no equivalent native events — these would need to be **synthesized** by tracking whether each touch pointer is inside or outside the view bounds during `Moved` events.\n\n**User-space workaround (while this is open):**\n\nTrack an `isInside` flag per touch ID and compute it from `e.Location` relative to the view bounds. Note that on Retina/HiDPI displays the raw `e.Location` is in view-pixel space, so you may need to scale the comparison (the `~2×` factor the reporter noted):\n\n```csharp\nprivate readonly Dictionary<long, bool> _isInsideByTouchId = new();\n\nvoid OnTouch(object sender, SKTouchEventArgs e)\n{\n    var view = (SKCanvasView)sender;\n    var bounds = new SKRect(0, 0, view.CanvasSize.Width, view.CanvasSize.Height);\n    var inBounds = bounds.Contains(e.Location);\n\n    switch (e.ActionType)\n    {\n        case SKTouchAction.Pressed:\n            _isInsideByTouchId[e.Id] = true;\n            break;\n        case SKTouchAction.Moved:\n            if (_isInsideByTouchId.TryGetValue(e.Id, out var wasInside))\n            {\n                if (!wasInside && inBounds)\n                {\n                    _isInsideByTouchId[e.Id] = true;\n                    HandleAction(SKTouchAction.Entered, e);\n                }\n                else if (wasInside && !inBounds)\n                {\n                    _isInsideByTouchId[e.Id] = false;\n                    HandleAction(SKTouchAction.Exited, e);\n                }\n            }\n            break;\n        case SKTouchAction.Released:\n        case SKTouchAction.Cancelled:\n            _isInsideByTouchId.Remove(e.Id);\n            break;\n    }\n    e.Handled = true;\n}\n```\n\nA proper fix in the library would add this bounds-tracking logic directly to the Android (`SKTouchHandler.OnTouch` Move branch) and iOS (`SKTouchHandler.TouchesMoved`) handlers. PRs welcome!"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
