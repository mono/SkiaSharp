<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 736, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-27T06:16:00Z", "currentLabels": ["type/bug", "type/enhancement", "os/macOS", "area/SkiaSharp.Views", "area/Build", "status/blocked"]}, "summary": "SkiaSharp.Views.Mac namespace is not resolved when a macOS Cocoa project targets Xamarin.Mac Full framework instead of Xamarin.Mac Modern, because NuGet incorrectly selects the .NET framework TFM instead of the Xamarin.Mac TFM.", "classification": {"type": {"value": "type/bug", "confidence": 0.92}, "area": {"value": "area/Build", "confidence": 0.88}, "platforms": ["os/macOS"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "build-error", "errorMessage": "The type or namespace name 'Mac' does not exist in the namespace 'SkiaSharp.Views'", "reproQuality": "partial", "targetFrameworks": ["XamarinMac-Full"]}, "reproEvidence": {"stepsToReproduce": ["Create a Cocoa project in Visual Studio for Mac", "Add SkiaSharp and SkiaSharp.Views NuGet packages (defaults to Xamarin.Mac Modern)", "Edit project General settings and change target framework to Xamarin.Mac Full", "Re-add NuGet packages or rebuild", "Observe: 'using SkiaSharp.Views.Mac;' fails with namespace not found error"], "environmentDetails": "macOS 10.14, Visual Studio for Mac, SkiaSharp v1.68, Xamarin.Mac Full framework", "relatedIssues": [1583], "repoLinks": [{"url": "https://github.com/NuGet/NuGet.Client/pull/2572", "description": "NuGet PR to fix TFM resolution for Xamarin.Mac Full apps"}, {"url": "https://devdiv.visualstudio.com/DevDiv/_workitems/edit/753282", "description": "Visual Studio bug report for the same issue"}, {"url": "https://github.com/mono/SkiaSharp/issues/1583", "description": "Related issue: same Xamarin.Mac Full compilation error reported later"}]}, "versionAnalysis": {"mentionedVersions": ["1.68"], "currentRelevance": "unlikely", "relevanceReason": "SkiaSharp now uses modern .NET TFMs (net8.0-macos, net9.0-macos). Xamarin.Mac Classic/Full framework is deprecated. The NuGet TFM resolution issue for the legacy Xamarin.Mac Full TFM is no longer relevant to current SkiaSharp versions."}}, "analysis": {"summary": "NuGet package resolution fails for Xamarin.Mac Full framework apps because NuGet treats them as .NET Framework apps instead of Xamarin.Mac apps, resulting in the wrong assembly being selected. The root cause is in the NuGet client, not SkiaSharp. Maintainer provided workarounds and filed a NuGet PR. Xamarin.Mac Classic/Full is now deprecated; modern SkiaSharp targets net*-macos via .NET MAUI.", "rationale": "The bug is real but its root cause is entirely in the NuGet client (wrong TFM selection for Xamarin.Mac Full projects). The maintainer confirmed this and pointed to NuGet/NuGet.Client#2572. Since then, Xamarin.Mac Classic/Full has been deprecated by Microsoft in favor of .NET MAUI + net*-macos TFMs, making this issue obsolete for current SkiaSharp versions. Closing as external is appropriate since the fix was in the NuGet toolchain and the platform itself is now deprecated.", "keySignals": [{"text": "when I edit the project, General, and change 'target framework' to 'Xamarin.Mac Full', then it can't find namespace SkiaSharp.Views.Mac", "source": "issue body", "interpretation": "Problem is specifically triggered by switching from Xamarin.Mac Modern to Xamarin.Mac Full, pointing to a TFM resolution difference."}, {"text": "The reason this bug shows is that when you select the full framework option, the app actually 'transitions' from a 'mac app' to a '.net framework app' and NuGet does not know that this particular app is actually both a 'mac app' AND a 'framework app'.", "source": "maintainer comment (mattleibow)", "interpretation": "Root cause confirmed by maintainer — NuGet TFM resolution bug, not a SkiaSharp code issue."}, {"text": "There has been an issue that has been opened, closed, reopened and eventually locked with a few PRs. But, not to be outdone, I have created a new PR that hopefully gets this in: https://github.com/NuGet/NuGet.Client/pull/2572", "source": "maintainer comment (mattleibow)", "interpretation": "The fix was tracked in the NuGet client repository, not SkiaSharp."}, {"text": "you can add <MigrateToNewXMIdentifier>true</MigrateToNewXMIdentifier> in your project", "source": "maintainer comment (mattleibow)", "interpretation": "A newer workaround was identified via the NuGet PR discussion."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views/SkiaSharp.Views.csproj", "lines": "16-19", "finding": "The SkiaSharp.Views project defines RootNamespace=SkiaSharp.Views.Mac and AssemblyName=SkiaSharp.Views.Mac only for TargetFramework containing '-macos' (modern .NET TFM). There is no legacy Xamarin.Mac Classic/Full TFM target in the current codebase.", "relevance": "direct"}, {"file": "scripts/cake/UtilsManaged.cake", "finding": "Build utilities contain a branch for 'xamarinmac' and 'xamarin.mac' TFM prefixes alongside modern 'net*-macos' TFMs, indicating the transition from legacy Xamarin.Mac to modern .NET has been accommodated at the build level.", "relevance": "related"}], "workarounds": ["Use packages.config instead of PackageReference and manually set the HintPath to the Xamarin.Mac version of SkiaSharp.Views.Mac.dll", "Don't reference the SkiaSharp.Views NuGet package; manually add a project reference to SkiaSharp.Views.Mac.dll", "Add <MigrateToNewXMIdentifier>true</MigrateToNewXMIdentifier> to the .csproj to make NuGet recognize the project as a Xamarin.Mac app (not a .NET framework app)", "Migrate to modern .NET (net8.0-macos / net9.0-macos) using .NET MAUI or native macOS project — SkiaSharp fully supports modern macOS targets"], "nextQuestions": ["Is the reporter using Xamarin.Mac legacy? If so, they should migrate to .NET MAUI or net*-macos.", "Has the NuGet PR #2572 been merged and does it resolve the issue for Xamarin.Mac Full projects?"], "resolution": {"hypothesis": "NuGet's TFM selection logic for Xamarin.Mac Full projects was broken — it chose the .NET Framework TFM instead of the Xamarin.Mac TFM. The underlying platform (Xamarin.Mac Classic/Full) is now deprecated.", "proposals": [{"title": "Apply MigrateToNewXMIdentifier workaround", "description": "Add <MigrateToNewXMIdentifier>true</MigrateToNewXMIdentifier> to the .csproj file to make NuGet correctly identify the project as a Xamarin.Mac app rather than a .NET Framework app.", "category": "workaround", "confidence": 0.75, "effort": "cost/xs", "validated": "untested"}, {"title": "Migrate to modern .NET macOS target", "description": "Migrate from Xamarin.Mac Full framework to net8.0-macos (or later). SkiaSharp.Views fully supports modern macOS TFMs and this is the recommended path now that Xamarin.Mac is deprecated.", "category": "alternative", "confidence": 0.95, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Migrate to modern .NET macOS target", "recommendedReason": "Xamarin.Mac Classic/Full is deprecated by Microsoft. The modern path (net8.0-macos) is fully supported by SkiaSharp and avoids the NuGet TFM resolution issue entirely."}}, "output": {"actionability": {"suggestedAction": "close-as-external", "confidence": 0.82, "reason": "Root cause is in NuGet TFM resolution for Xamarin.Mac Full projects, not in SkiaSharp. The underlying platform (Xamarin.Mac Classic/Full) is now deprecated by Microsoft. Maintainer has provided workarounds and the modern path (net*-macos) is fully supported.", "suggestedReproPlatform": "macos"}, "actions": [{"type": "update-labels", "description": "Correct labels: remove duplicate type label, apply single type/bug and area/Build", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/Build", "os/macOS", "tenet/compatibility"]}, {"type": "add-comment", "description": "Post explanation with workarounds and migration guidance, recommending closure", "risk": "high", "confidence": 0.82, "comment": "Thank you for the report! The root cause of this issue is in the NuGet client's TFM resolution for Xamarin.Mac Full projects — when switching to Full framework, NuGet treats the project as a .NET Framework app rather than a Xamarin.Mac app, causing it to pick the wrong assembly.\n\nFor immediate workarounds:\n1. Add `<MigrateToNewXMIdentifier>true</MigrateToNewXMIdentifier>` to your `.csproj` — this tells NuGet to correctly identify your project as a Xamarin.Mac app.\n2. Alternatively, use `packages.config` and manually set the `HintPath` to the Xamarin.Mac version of `SkiaSharp.Views.Mac.dll`.\n\nHowever, the recommended long-term path is to **migrate to modern .NET** (e.g., `net8.0-macos`). Xamarin.Mac Classic/Full is now deprecated by Microsoft in favor of .NET MAUI and .NET for macOS. SkiaSharp fully supports `net8.0-macos` and later, and the `SkiaSharp.Views.Mac` namespace works correctly under modern .NET TFMs.\n\nSince the root cause is in external NuGet tooling and the underlying Xamarin.Mac Classic/Full platform is deprecated, we're going to close this issue. Please migrate to modern .NET macOS targets — if you encounter any issues there, please open a new issue!"}, {"type": "link-related", "description": "Cross-reference related issue #1583 (same Xamarin.Mac Full compilation error)", "risk": "low", "confidence": 0.95, "linkedIssue": 1583}, {"type": "close-issue", "description": "Close as external — root cause in NuGet tooling, platform deprecated", "risk": "medium", "confidence": 0.8, "stateReason": "not_planned"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
