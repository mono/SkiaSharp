<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1181, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-21T22:57:39Z"}, "summary": "SKTypeface.Default.FamilyName returns null and SKTypeface.FromFamilyName(\"Sans\") returns null on some Linux configurations (snap containers, certain distros like Manjaro/Debian/CentOS, and non-C locales such as LANG=ja_JP.UTF-8), while SKTypeface.FromFile() still works correctly.", "classification": {"type": {"value": "type/bug", "confidence": 0.92}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.82}, "platforms": ["os/Linux"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "wrong-output", "errorMessage": "SKTypeface.Default.FamilyName returns null; SKTypeface.FromFamilyName(\"Sans\") returns null", "reproQuality": "partial", "targetFrameworks": []}, "reproEvidence": {"stepsToReproduce": ["Run a .NET application using SkiaSharp on Linux inside a snap container OR on Manjaro/CentOS/Debian 10 with certain fontconfig configurations", "Call SKTypeface.Default.FamilyName", "Observe null is returned", "Call SKTypeface.FromFamilyName(\"Sans\")", "Observe null is returned"], "environmentDetails": "Linux (Manjaro, CentOS 7, Debian 10), snap packages, also LANG=ja_JP.UTF-8 locale. fc-match CLI works, fonts are installed on the system.", "repoLinks": [{"url": "https://github.com/AvaloniaUI/Avalonia/issues/3679", "description": "Avalonia snap package repro - reproducible on any machine"}, {"url": "https://github.com/AvaloniaUI/Avalonia/issues/3694", "description": "CentOS 7 repro"}, {"url": "https://github.com/AvaloniaUI/Avalonia/issues/3701", "description": "Additional repro case"}]}, "versionAnalysis": {"mentionedVersions": [], "currentRelevance": "likely", "relevanceReason": "The fontconfig-based font manager code path has not changed structurally; a 2022 comment confirms the issue still occurs on non-C locales."}}, "analysis": {"summary": "The native libSkiaSharp on Linux uses fontconfig for font enumeration and name-based matching. In some environments (snap containers with restricted font directory access, certain Linux distros, or non-C locales like LANG=ja_JP.UTF-8), fontconfig's matching returns null even when fonts are installed. SKTypeface.FromFile() succeeds because it bypasses fontconfig entirely and loads a font directly from disk. Setting LANG=C fixes the issue in the locale case, suggesting fontconfig's FcFontMatch behaves differently with Unicode locale settings.", "rationale": "This is clearly a bug: fc-match CLI finds fonts, fonts are installed, but SkiaSharp's native fontconfig integration fails to enumerate or match them. The C# wrapper correctly calls the native API; the fault lies in the native fontconfig integration. Classified as libSkiaSharp.native because the fix requires changes to how the native Skia font manager interacts with fontconfig, or how libSkiaSharp is built/configured. The medium severity reflects that SKTypeface.FromFile() works as a workaround.", "keySignals": [{"text": "SKTypeface.Default.FamilyName returns null; SKTypeface.FromFamilyName(\"Sans\") returns null", "source": "issue body", "interpretation": "Font name matching via fontconfig returns null in the native layer, not a C# wrapper issue."}, {"text": "Fonts are loadable via SKTypeface.FromFile. fc-match command line utility is able to locate the font that corresponds to the \"Sans\" name.", "source": "comment by kekekeks", "interpretation": "Fonts exist and fontconfig CLI works — the issue is specific to SkiaSharp's internal fontconfig usage."}, {"text": "SKTypeface.Default.FamilyName returns null for me when using japanese (LANG=ja_JP.UTF-8). Setting LANG to C solves the problem.", "source": "comment by KiruyaMomochi", "interpretation": "Strong signal that fontconfig locale handling is the root cause, not just snap/container restrictions."}, {"text": "Maybe newer Fontconfig has changed in a way that breaks the SKFontmanagerImpl", "source": "comment by Gillibald", "interpretation": "Fontconfig API or behavior change in newer versions may have broken font matching in the native Skia implementation."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "15-22", "finding": "defaultTypeface is initialized from SkiaApi.sk_typeface_ref_default(); if the native default typeface has no family name (fontconfig returned empty), FamilyName will be null. The static constructor has no null-guard or fallback.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "60-72", "finding": "FromFamilyName(string, SKFontStyle) calls sk_typeface_create_from_name which delegates to the native fontconfig-based font manager. Returns null (via GetObject on null handle) when fontconfig matching fails.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "13-23", "finding": "SKFontManager.Default is initialized from sk_fontmgr_ref_default(). On Linux, this uses fontconfig. FontFamilyCount can be 0 if fontconfig can't enumerate fonts (e.g., in snap container without font access).", "relevance": "related"}, {"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "81-90", "finding": "SKTypeface.FromFile bypasses fontconfig entirely by loading directly from disk path — explains why FromFile works while FromFamilyName does not.", "relevance": "related"}], "workarounds": ["Use SKTypeface.FromFile(\"/path/to/font.ttf\") to load fonts directly by path, bypassing fontconfig entirely.", "Set environment variable LANG=C before running the application when the issue is locale-related.", "For snap packages: add 'plugs: [home, desktop]' or 'layout:' to the snapcraft.yaml to grant access to system font directories.", "Embed fonts as resources and load them via SKTypeface.FromData(SKData.CreateCopy(fontBytes)) for fully portable font loading."], "nextQuestions": ["Does SKFontManager.Default.FontFamilyCount return 0 on the affected machines?", "Does the issue reproduce with the standard fontconfig-linked libSkiaSharp, or also with NoDependencies (which has its own bundled font handling)?", "Is this a fontconfig version compatibility issue in the Skia C++ code (SkFontMgr_fontconfig)?", "Does the fix need to be in the Skia native code (upstream fontconfig manager) or can a C# wrapper mitigation help (e.g., falling back to a built-in font)?"], "resolution": {"hypothesis": "On some Linux environments, fontconfig's FcFontMatch returns null or empty results due to: (a) sandbox restrictions preventing access to /etc/fonts or font directories, (b) locale-dependent behavior (LANG=ja_JP.UTF-8) where fontconfig fails to match family names, or (c) API changes in newer fontconfig versions that break Skia's native SkFontMgr_fontconfig implementation.", "proposals": [{"title": "Load font from file as workaround", "description": "Use SKTypeface.FromFile to load a specific system font by path. This bypasses fontconfig entirely.", "category": "workaround", "codeSnippet": "// Workaround: load a known system font by path\nvar typeface = SKTypeface.FromFile(\"/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf\");\n// or search common paths\nvar paths = new[] {\n    \"/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf\",\n    \"/usr/share/fonts/TTF/DejaVuSans.ttf\",\n    \"/usr/share/fonts/dejavu/DejaVuSans.ttf\"\n};\nvar typeface = paths.Select(SKTypeface.FromFile).FirstOrDefault(t => t != null);", "confidence": 0.9, "effort": "cost/xs", "validated": "untested"}, {"title": "Embed and load font from resources", "description": "Bundle a font file as an embedded resource and load it via SKTypeface.FromData for fully portable behavior.", "category": "alternative", "codeSnippet": "// Add font as EmbeddedResource in .csproj, then:\nusing var stream = Assembly.GetExecutingAssembly()\n    .GetManifestResourceStream(\"MyApp.Fonts.OpenSans-Regular.ttf\");\nusing var data = SKData.Create(stream);\nvar typeface = SKTypeface.FromData(data);", "confidence": 0.95, "effort": "cost/s", "validated": "untested"}, {"title": "Set LANG=C as environment variable", "description": "For locale-specific cases: set LANG=C before starting the process. This resolves the fontconfig locale interaction.", "category": "workaround", "confidence": 0.75, "effort": "cost/xs", "validated": "untested"}, {"title": "Investigate Skia native fontconfig manager", "description": "Review the native SkFontMgr_fontconfig implementation in the Skia submodule and check for fontconfig API compatibility issues or locale handling bugs.", "category": "investigation", "confidence": 0.7, "effort": "cost/l", "validated": "untested"}], "recommendedProposal": "Embed and load font from resources", "recommendedReason": "The most portable and reliable workaround. Not dependent on system font paths or fontconfig working correctly. The FromFile approach is simpler for cases where system fonts are known."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Bug is real and confirmed across multiple reporters and environments (snap, Manjaro, CentOS 7, Debian 10, locale issue). Root cause is unclear — could be fontconfig version incompatibility, locale handling, or sandbox font directory access. Needs deeper investigation of the native Skia fontconfig manager code.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, native, and linux labels", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/libSkiaSharp.native", "os/Linux", "tenet/reliability"]}, {"type": "add-comment", "description": "Post analysis with workarounds and diagnostic instructions", "risk": "medium", "confidence": 0.82, "comment": "Thanks for the detailed reports! This is a confirmed bug in SkiaSharp's fontconfig integration on Linux — fontconfig CLI (`fc-match`) works, but SkiaSharp's internal font matching fails in certain environments.\n\n**Confirmed affected environments:**\n- Snap packages (reproducible on any machine)\n- Manjaro Linux (non-snap, some setups)\n- CentOS 7, Debian 10\n- Non-C locales: `LANG=ja_JP.UTF-8` (setting `LANG=C` fixes it)\n\n**Root cause hypothesis:** The native Skia fontconfig manager (`SkFontMgr_fontconfig`) may be failing due to fontconfig version compatibility, locale-dependent font matching, or sandbox restrictions on font directory access.\n\n**Workarounds you can use now:**\n\n1. Load fonts by file path directly (bypasses fontconfig):\n```csharp\nvar typeface = SKTypeface.FromFile(\"/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf\");\n```\n\n2. Embed a font as an assembly resource (most portable):\n```csharp\nusing var stream = Assembly.GetExecutingAssembly()\n    .GetManifestResourceStream(\"MyApp.Fonts.OpenSans-Regular.ttf\");\nusing var data = SKData.Create(stream);\nvar typeface = SKTypeface.FromData(data);\n```\n\n3. If locale is the trigger: set `LANG=C` before starting your app.\n\n**Diagnostic:** Can you run `SKFontManager.Default.FontFamilyCount` and share the result? If it returns 0, fontconfig cannot enumerate any fonts at all. This helps narrow down whether it's an enumeration or matching issue."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
