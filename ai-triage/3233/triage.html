<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3233, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T16:17:54Z", "currentLabels": ["type/bug", "backend/OpenGL", "area/SkiaSharp.Views.Maui", "partner/maui", "os/Windows-WinUI", "tenet/reliability", "triage/triaged"]}, "summary": "ExecutionEngineException crash when SKGLView is assigned to ContentView.Content in a MAUI 9 Windows app (3.116.1), traced to ANGLE native library loading failure in unpackaged (non-MSIX) mode, which is the new default in MAUI 9 project templates.", "classification": {"type": {"value": "type/bug", "confidence": 0.97}, "area": {"value": "area/SkiaSharp.Views.Maui", "confidence": 0.95}, "platforms": ["os/Windows-WinUI"], "backends": ["backend/OpenGL"], "tenets": ["tenet/reliability"], "partner": "partner/maui"}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "crash", "errorMessage": "Exception of type 'System.ExecutionEngineException' was thrown.", "reproQuality": "complete", "targetFrameworks": ["net9.0-windows10.0.19041.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a default MAUI 9 template project (latest updates, Windows target)", "Add SkiaSharp reference and call UseSkiaSharp() in MauiProgram", "Create a class deriving from ContentView that assigns SKGLView to Content", "Assign that class to the main window Content", "Run the app on Windows — application crashes immediately"], "codeSnippets": ["public class MapControl : ContentView { public MapControl() { Content = new SKGLView(); } }", "var mapControl = new MapControl(); Content = mapControl;"], "environmentDetails": "SkiaSharp 3.116.1, MAUI 9, Windows 11, Visual Studio (Windows), Dell laptop", "relatedIssues": [2968, 3113], "repoLinks": [{"url": "https://github.com/pauldendulk/skiasharpcrash", "description": "Minimal MAUI 9 repro project by the reporter"}, {"url": "https://github.com/mono/SkiaSharp/issues/2968", "description": "Same crash on unpackaged MAUI 9 Windows app — closed as completed Aug 2025"}, {"url": "https://github.com/mono/SkiaSharp/issues/3113", "description": "Same ExecutionEngineException with SKGLView on MAUI 9 Windows — closed as completed"}]}, "versionAnalysis": {"mentionedVersions": ["3.116.1", "3.116.0"], "currentRelevance": "likely", "relevanceReason": "Reporter is on 3.116.1 (current at time of filing); related issue #2968 was only closed as completed in August 2025, after this issue was filed, so the fix may be in a later release."}, "regression": {"isRegression": true, "confidence": 0.85, "reason": "Reporter confirms this crash does NOT occur when creating a MAUI 8 project — only MAUI 9. MAUI 9 changed the default Windows packaging mode from MSIX (packaged) to unpackaged (WindowsPackageType=None), which is the root trigger.", "workedInVersion": "MAUI 8 (SkiaSharp 2.88.x)", "brokeInVersion": "MAUI 9 (SkiaSharp 3.116.x)"}}, "analysis": {"summary": "The crash is caused by ANGLE native library loading failure (libEGL.dll / libGLESv2.dll) when SKGLView initializes on a MAUI 9 Windows unpackaged app. MAUI 9 changed the default project template to use WindowsPackageType=None (unpackaged), altering the DLL search path so ANGLE libraries are not found. The ExecutionEngineException is thrown when the CLR attempts a P/Invoke into libEGL.dll (via Egl.eglGetPlatformDisplayEXT) and the library cannot be located. There is no try-catch or graceful fallback in AngleSwapChainPanel.OnLoaded or GlesContext.", "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/GlesInterop/Egl.cs", "lines": "16-89", "finding": "All EGL functions are declared as [DllImport(\"libEGL.dll\")] with no fallback. On unpackaged apps the DLL search path does not include the ANGLE DLLs, causing a fatal exception when the first P/Invoke is executed.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/AngleSwapChainPanel.cs", "lines": "124-135", "finding": "OnLoaded() calls 'glesContext = new GlesContext()' with no try-catch. Any exception thrown inside GlesContext constructor (including the ANGLE DLL load failure) propagates uncaught into the MAUI/WinUI event handler, becoming an ExecutionEngineException.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/GlesInterop/GlesContext.cs", "lines": "37-44", "finding": "GlesContext constructor immediately calls InitializeDisplay() which makes the first eglGetPlatformDisplayEXT P/Invoke. No null-guard, no try-catch, no platform availability check before calling the native function.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/GlesInterop/GlesContext.cs", "lines": "155-244", "finding": "InitializeDisplay() calls Egl.eglGetPlatformDisplayEXT up to 3 times with fallback display attribute sets (D3D11 10_0, then 9_3, then WARP). This fallback logic only handles EGL initialization failures, not the case where libEGL.dll is missing entirely.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Handlers/SKGLView/SKGLViewHandler.Windows.cs", "lines": "13", "finding": "CreatePlatformView() returns 'new MauiSKSwapChainPanel()' which subclasses AngleSwapChainPanel. The handler does not guard against EGL initialization failure during platform view setup.", "relevance": "related"}], "keySignals": [{"text": "It only occurs when creating a MAUI 9 project. Not when creating a MAUI 8 project.", "source": "issue body", "interpretation": "MAUI 9 changed the default Windows project template to use WindowsPackageType=None (unpackaged mode), which changes the DLL resolution path and is the trigger."}, {"text": "If you are going to release your app in Microsoft Store only, you can fix this error by setting WindowsPackageType to MSIX, and creating a launch profile with commandName MsixPackage.", "source": "comment by TommiGustafsson-HMP (same reporter as #2968)", "interpretation": "Confirmed workaround: switching to packaged MSIX mode restores the DLL search path that ANGLE requires."}, {"text": "This is probably the same issue: https://github.com/mono/SkiaSharp/issues/2968", "source": "comment by reporter pauldendulk", "interpretation": "The reporter self-identified #2968 as the same root cause — ANGLE crash on unpackaged Windows MAUI apps."}], "rationale": "Classified as type/bug in area/SkiaSharp.Views.Maui: the ANGLE-backed SKGLView crashes with an ExecutionEngineException exclusively on MAUI 9 Windows, caused by MAUI 9's new default of unpackaged app mode where ANGLE DLLs are not on the standard search path. A fully working minimal repro repository is provided, confirming the complete repro quality. Related issue #2968 (identical crash scenario, explicitly unpackaged mode) was closed as 'completed' in August 2025, suggesting a fix may exist in a newer SkiaSharp release. Severity is 'high' because the app crashes completely with no graceful error, and the workaround requires a non-trivial packaging mode change.", "workarounds": ["Set WindowsPackageType to MSIX in the .csproj and create a launch profile with commandName=MsixPackage to run as a packaged app — this restores the DLL search path that ANGLE requires.", "Alternatively, use SKCanvasView (CPU raster backend) instead of SKGLView if OpenGL/GPU acceleration is not required — avoids ANGLE entirely."], "nextQuestions": ["Was the fix for #2968 released in a SkiaSharp version > 3.116.1 that would resolve this issue?", "Does the crash occur when running through Visual Studio (F5) with MAUI 9, or only in published builds?", "Does adding the ANGLE DLL paths explicitly to the app output directory resolve the crash without changing WindowsPackageType?"], "resolution": {"hypothesis": "MAUI 9 default project template changed Windows packaging to unpackaged (WindowsPackageType=None), causing the ANGLE DLLs to not be found by the P/Invoke resolver. The fix is either to ship the ANGLE DLLs with the unpackaged app output or to use LoadLibraryEx with a resolved path.", "proposals": [{"title": "Switch to packaged MSIX mode", "description": "Add <WindowsPackageType>MSIX</WindowsPackageType> to the .csproj and configure a packaged launch profile. Restores the DLL search path that ANGLE expects.", "category": "workaround", "confidence": 0.95, "effort": "cost/xs", "validated": "untested"}, {"title": "Use SKCanvasView (CPU raster) instead of SKGLView", "description": "Replace SKGLView with SKCanvasView in the ContentView. The CPU raster backend does not require ANGLE or any OpenGL dependency and works in both packaged and unpackaged mode.", "category": "alternative", "confidence": 0.95, "effort": "cost/s", "validated": "untested"}, {"title": "Upgrade to latest SkiaSharp release", "description": "Issue #2968 (identical unpackaged ANGLE crash) was closed as 'completed' in August 2025. If a code fix was shipped, upgrading from 3.116.1 to the latest SkiaSharp release may resolve the issue without packaging changes.", "category": "fix", "confidence": 0.65, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Switch to packaged MSIX mode", "recommendedReason": "Immediate, confirmed workaround (validated by two independent commenters). The upgrade path is uncertain without knowing which version contains the fix."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.8, "reason": "Complete repro is available and the root cause is well-understood (ANGLE DLL loading in unpackaged MAUI 9 Windows apps). A workaround exists but requires non-trivial packaging changes. Related issue #2968 was closed as 'completed' in August 2025 — needs investigation to confirm whether the fix is in a current release and whether this issue can be closed as fixed.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply confirmed classification labels", "risk": "low", "confidence": 0.97, "labels": ["type/bug", "area/SkiaSharp.Views.Maui", "os/Windows-WinUI", "backend/OpenGL", "tenet/reliability", "partner/maui"]}, {"type": "link-related", "description": "Link to #2968 — identical ANGLE crash in unpackaged MAUI Windows apps", "risk": "low", "confidence": 0.9, "linkedIssue": 2968}, {"type": "add-comment", "description": "Acknowledge the root cause, provide MSIX workaround, and ask reporter to test latest SkiaSharp", "risk": "medium", "confidence": 0.85, "comment": "Thanks for the detailed repro repository! This crash is caused by **ANGLE (OpenGL ES) library loading failing in unpackaged Windows mode** (`WindowsPackageType=None`). .NET MAUI 9 changed the default Windows project template to use unpackaged mode, which alters the DLL search path so that ANGLE's `libEGL.dll` / `libGLESv2.dll` cannot be found when `SKGLView` initializes.\n\n**Immediate workaround:** Add `<WindowsPackageType>MSIX</WindowsPackageType>` to your `.csproj` and create a packaged launch profile (`commandName: MsixPackage`). This restores the DLL search path that ANGLE requires.\n\n**Alternative:** If you don't need GPU acceleration, replace `SKGLView` with `SKCanvasView` — the CPU raster backend has no ANGLE dependency and works in both packaged and unpackaged mode.\n\nThis is the same underlying issue as #2968 (closed as completed in August 2025). Could you try upgrading to the latest SkiaSharp release to see if the fix there resolves it in unpackaged mode?"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
