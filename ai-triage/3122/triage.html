<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3122, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-23T05:20:00Z", "currentLabels": ["type/bug"]}, "summary": "On x86 Windows, text drawn with DrawText(string, float, float, SKFont, SKPaint) becomes corrupted or disappears after a few invalidations in SkiaSharp 3.116.x, a regression from 2.88.x; the root cause is that the overload reads paint.TextAlign from native code via sk_compatpaint_get_text_align, which returns a garbage/non-zero value on x86 causing wrong x-offset calculations.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "platforms": ["os/Windows-Classic"], "tenets": ["tenet/compatibility", "tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": true, "errorType": "wrong-output", "errorMessage": "Text disappears or moves to wrong position after a few invalidations on x86 profile only", "reproQuality": "complete", "targetFrameworks": ["net8.0-windows", "net9.0-windows"]}, "reproEvidence": {"stepsToReproduce": ["Create a WinForms or WPF app targeting x86 with SkiaSharp 3.116.0 or later", "In SKPaintSurface handler, call canvas.DrawText(\"text\", x, y, font, paint) in a loop triggered by mouse movement", "Move the mouse cursor rapidly over the control", "Observe that text disappears or moves to wrong position after a few invalidations", "Switch to AnyCPU or x64 profile — the issue does not occur"], "environmentDetails": "Windows, Visual Studio, x86 profile, SkiaSharp 3.116.x; also reproduced with Mapsui.Wpf 5.0.0-beta.7", "repoLinks": [{"url": "https://github.com/user-attachments/files/18306621/appSkiaSharpTest.zip", "description": "Minimal WinForms repro project attached to issue comment"}, {"url": "https://github.com/user-attachments/assets/170c68a2-5112-4815-9b1c-8b2a049e4412", "description": "Video demonstrating the font disappearance bug on x86"}, {"url": "https://github.com/user-attachments/assets/c5a21ea8-b097-4aec-bec5-d38d86699396", "description": "Screenshot: x64 rendering (correct)"}, {"url": "https://github.com/user-attachments/assets/0085ab14-d3b9-400e-b7e0-fc933e6efe03", "description": "Screenshot: x86 rendering (corrupted)"}]}, "versionAnalysis": {"mentionedVersions": ["3.116.0", "3.116.1", "2.88.9"], "workedIn": "2.88.9", "brokeIn": "3.116.0", "currentRelevance": "likely", "relevanceReason": "The DrawText overloads that call paint.TextAlign internally still exist with TODO comments in current main"}, "regression": {"isRegression": true, "confidence": 0.95, "reason": "OP explicitly states it worked in 2.88.9 and broke in 3.116.x. Community members confirmed same regression.", "workedInVersion": "2.88.9", "brokeInVersion": "3.116.0"}}, "analysis": {"summary": "The DrawText(string, float, float, SKFont, SKPaint) overload delegates to DrawText(string, float, float, SKTextAlign, SKFont, SKPaint) using paint.TextAlign. On x86 Windows, the native P/Invoke call sk_compatpaint_get_text_align returns a non-zero (non-Left) value, causing the x-offset to be incorrectly adjusted on every call. The fix is for these overloads to use SKTextAlign.Left instead of paint.TextAlign, as indicated by an existing TODO comment in the source.", "rationale": "Multiple affected users, a repro project is available, and a community member already isolated the root cause: the DrawText(font) overloads that should ignore TextAlign are reading it from native code, returning garbage on x86. The TODO comment in SKCanvas.cs line 635 acknowledges this should be replaced with SKTextAlign.Left.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKCanvas.cs", "lines": "634-637", "finding": "DrawText(string, float, float, SKFont, SKPaint) calls DrawText(text, x, y, paint.TextAlign, font, paint) with a #pragma warning suppress and a TODO comment: 'replace paint.TextAlign with SKTextAlign.Left'. This means the overload that takes an explicit SKFont still reads the deprecated TextAlign from native code, which returns incorrect values on x86.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKCanvas.cs", "lines": "626-629", "finding": "DrawText(string, SKPoint, SKFont, SKPaint) has the same pattern — uses paint.TextAlign with a pragma suppression and TODO comment instead of defaulting to SKTextAlign.Left.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKCanvas.cs", "lines": "639-660", "finding": "In DrawText(string, float, float, SKTextAlign, SKFont, SKPaint), if textAlign != Left, it calls font.MeasureText(text) and adjusts x. If paint.TextAlign returns a garbage non-zero value on x86, this causes the text to be drawn at the wrong position on every invalidation.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKPaint.cs", "lines": "229-233", "finding": "SKPaint.TextAlign is marked [Obsolete] and reads from native sk_compatpaint_get_text_align. The native call on x86 may return a non-zero/garbage value, causing the wrong alignment to be applied.", "relevance": "related"}], "keySignals": [{"text": "After a few invalidations, the text is no longer drawn correctly", "source": "issue comment by maiad", "interpretation": "Progressive corruption on repeated draw calls — consistent with an x offset being accumulated incorrectly"}, {"text": "Stepping through the code showed that the DrawText method is using the obsolete SKPaint.TextAlign, when I replaced this with SKTextAlign left this solved the problem in release mode", "source": "issue comment by pauldendulk", "interpretation": "Root cause confirmed by community investigation — using the non-TextAlign overload is the workaround"}, {"text": "there is a suppression of the warning, which suggests it was not made obsolete for a reason", "source": "issue comment by pauldendulk", "interpretation": "The TODO comment and pragma suppress in SKCanvas.cs acknowledge the problem but the fix has not been implemented yet"}, {"text": "The bug only shows using x86 and only on two of three machines", "source": "issue comment by pauldendulk", "interpretation": "x86-specific calling convention or data alignment issue in native P/Invoke causing incorrect enum value to be read"}], "workarounds": ["Use DrawText(text, x, y, SKTextAlign.Left, font, paint) instead of DrawText(text, x, y, font, paint)", "Explicitly set paint.TextAlign = SKTextAlign.Left before calling DrawText with the font overload (deprecated but works around the native read issue)"], "nextQuestions": ["Does the same x86 corruption affect DrawTextOnPath overloads that also use paint.TextAlign?", "Is the native sk_compatpaint_get_text_align returning garbage specifically on x86 due to struct alignment or calling convention differences?", "Can the fix (replacing paint.TextAlign with SKTextAlign.Left in the non-obsolete overloads) be implemented without a breaking change?"], "resolution": {"hypothesis": "The non-obsolete DrawText overloads that accept an explicit SKFont are incorrectly reading paint.TextAlign from native code via P/Invoke, which returns a garbage non-zero value on x86, causing the text position to be offset on every draw call.", "proposals": [{"title": "Replace paint.TextAlign with SKTextAlign.Left in the non-obsolete DrawText overloads", "description": "Remove the #pragma warning suppress blocks in SKCanvas.cs and replace `paint.TextAlign` with `SKTextAlign.Left` for the DrawText and DrawTextOnPath overloads that already accept an explicit SKFont. The TODO comments in the code already document this intent.", "codeSnippet": "// Change line 634-637 in SKCanvas.cs from:\npublic void DrawText (string text, float x, float y, SKFont font, SKPaint paint) =>\n    DrawText (text, x, y, paint.TextAlign, font, paint);\n\n// To:\npublic void DrawText (string text, float x, float y, SKFont font, SKPaint paint) =>\n    DrawText (text, x, y, SKTextAlign.Left, font, paint);", "category": "fix", "confidence": 0.9, "effort": "cost/xs", "validated": "yes"}, {"title": "Use the explicit SKTextAlign overload as workaround", "description": "Call DrawText with explicit SKTextAlign.Left to bypass the native paint.TextAlign read on x86.", "codeSnippet": "// Instead of:\ne.Surface.Canvas.DrawText(\"Hallo from skia !\", 100, 100, font, p);\n\n// Use:\ne.Surface.Canvas.DrawText(\"Hallo from skia !\", 100, 100, SKTextAlign.Left, font, p);", "category": "workaround", "confidence": 0.95, "effort": "cost/xs", "validated": "yes"}], "recommendedProposal": "Replace paint.TextAlign with SKTextAlign.Left in the non-obsolete DrawText overloads", "recommendedReason": "Simple one-line fix that resolves the root cause. The TODO comments already acknowledge this is the intended fix."}}, "output": {"actionability": {"suggestedAction": "ready-to-fix", "confidence": 0.88, "reason": "Root cause is clear: non-obsolete DrawText(SKFont) overloads incorrectly read paint.TextAlign from native code. The fix is known (replace with SKTextAlign.Left per existing TODO comments), a repro is available, and a workaround has been confirmed by the community.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply bug classification, Windows platform, and SkiaSharp area labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "tenet/compatibility", "tenet/reliability"]}, {"type": "add-comment", "description": "Post analysis with workaround and root cause explanation", "risk": "medium", "confidence": 0.88, "comment": "Thanks for the detailed report and for providing a repro!\n\n**Root cause identified** (credit to @pauldendulk for the investigation):\n\nThe `DrawText(string, float, float, SKFont, SKPaint)` overload internally calls the deprecated `paint.TextAlign` via a native P/Invoke (`sk_compatpaint_get_text_align`). On x86 Windows, this native call returns a garbage non-zero value instead of `SKTextAlign.Left`, causing the text x-position to be incorrectly offset on every draw call. On x64, the native call happens to return `0` (Left), so the bug doesn't manifest.\n\nThere is already a `TODO` comment in `SKCanvas.cs` acknowledging this should be replaced with `SKTextAlign.Left`.\n\n**Workaround** (confirmed working):\n\n```csharp\n// Instead of:\ncanvas.DrawText(\"Hallo from skia !\", 100, 100, font, paint);\n\n// Use the explicit alignment overload:\ncanvas.DrawText(\"Hallo from skia !\", 100, 100, SKTextAlign.Left, font, paint);\n```\n\n**Fix:** Remove the `#pragma warning` blocks in `SKCanvas.cs` and replace `paint.TextAlign` with `SKTextAlign.Left` in the non-obsolete `DrawText` and `DrawTextOnPath` overloads that accept an explicit `SKFont`."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
