<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 752, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-22T16:38:58Z", "currentLabels": ["status/needs-attention"]}, "summary": "SKPaint.MeasureText returns different numeric values on Windows vs Linux when measuring the same string with a Calibri Bold font at size 19, due to platform-specific font manager resolution and shaping backend differences.", "classification": {"type": {"value": "type/bug", "confidence": 0.72}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "platforms": ["os/Windows-Classic", "os/Linux"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "low", "regressionClaimed": false, "errorType": "wrong-output", "errorMessage": "Windows: 228.213379 vs Linux: 231 width for same text", "reproQuality": "complete", "targetFrameworks": ["net471"]}, "reproEvidence": {"stepsToReproduce": ["Create SKPaint with Calibri Bold typeface loaded via SKTypeface.FromFamilyName", "Set TextSize = 19 and IsAntialias = true", "Call paint.MeasureText(\"Progressive Report Template\", ref rect)", "Compare result on Windows vs Linux"], "codeSnippets": ["SKPaint paint = new SKPaint();\npaint.Typeface = SKTypeface.FromFamilyName(\"Calibri\", SKTypefaceStyle.Bold);\npaint.IsAntialias = true;\npaint.TextSize = 19;\nSKRect rect = new SKRect();\nfloat width = paint.MeasureText(\"Progressive Report Template\", ref rect);"], "environmentDetails": "SkiaSharp 1.59.3, Visual Studio, Windows vs Linux container", "relatedIssues": [707], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/files/2748183/Calibri.zip", "description": "Calibri font file used in the repro"}, {"url": "https://github.com/markusrt/SkiaSharpMeasureText", "description": "Community test repo (2025) showing font measurement differences persist even when loading font via stream"}]}, "versionAnalysis": {"mentionedVersions": ["1.59.3"], "currentRelevance": "likely", "relevanceReason": "Recent comments from 2024-2025 confirm the issue persists in newer versions. The underlying platform font manager and shaping architecture has not changed."}}, "analysis": {"summary": "SKPaint.MeasureText (now delegating to SKFont.MeasureText) produces different results on Windows vs Linux because: (1) SKTypeface.FromFamilyName calls sk_typeface_create_from_name which queries the OS font manager — DirectWrite on Windows vs FontConfig on Linux — potentially resolving to a different actual font file even when both have Calibri installed; (2) even with the same font loaded from a stream, different shaping backends (DirectWrite vs FreeType) produce slightly different glyph advance metrics. This is expected cross-platform behavior, not a SkiaSharp defect.", "rationale": "The issue describes a cross-platform measurement discrepancy rooted in platform-specific font resolution and shaping. SKTypeface.FromFamilyName uses sk_typeface_create_from_name which delegates to the OS font manager, and SKPaint.MeasureText (deprecated) delegates to SKFont.MeasureText which calls into the native Skia text measurement path. Community comments and maintainer responses confirm this is by-design behavior. A 2025 community investigation (markusrt) showed differences persist even with font loaded via stream, confirming the shaping backend is involved. The workaround (load from stream + use HarfBuzz shaping) is documented in the comments.", "keySignals": [{"text": "Values returned by measureText in linux container and in windows are not same.", "source": "issue body", "interpretation": "Cross-platform measurement divergence due to different font stacks."}, {"text": "FromFamilyName asks the current font manager for a typeface that is matching the name. This will be an installed font and it can be any font that relates to the specified name. On Linux this can be an alias.", "source": "comment by Gillibald (2024-10-30)", "interpretation": "Confirms root cause: platform font manager resolution differs, and Linux FontConfig may return an alias or different metric."}, {"text": "To be sure to get the same rendering on all platforms you need to load a typeface via stream.", "source": "comment by Gillibald (2024-10-30)", "interpretation": "Establishes the known workaround for consistent font selection across platforms."}, {"text": "Font loaded via Resource - Tests on fonts show that the expected font is used both on Windows and Linux - Difference in calculation is always on width", "source": "comment by markusrt (2025-08-04)", "interpretation": "Even with same font file loaded via stream, width measurement differs — confirms shaping engine difference is the underlying cause."}, {"text": "My two-cents is that this is the expected outcome. The font rendering backend is platform dependent.", "source": "comment by molesmoke (2025-08-04)", "interpretation": "Community consensus supports close-as-not-a-bug."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "60-72", "finding": "FromFamilyName(string, SKFontStyle) calls sk_typeface_create_from_name via SkiaApi, which delegates to the platform font manager. On Windows this is DirectWrite; on Linux it is FontConfig. The same family name can resolve to different font files or metrics tables on each platform.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKPaint.cs", "finding": "SKPaint.MeasureText is marked [Obsolete] and delegates to SKFont.MeasureText(). The measurement path itself is not platform-specific in the C# wrapper — divergence originates in the native Skia layer's interaction with platform shaping backends.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFont.cs", "finding": "SKFont.MeasureText delegates to the native sk_font_measure_text C API, which internally uses the platform shaping engine (DirectWrite on Windows, FreeType/HarfBuzz on Linux) for glyph advance metrics.", "relevance": "related"}], "workarounds": ["Load the typeface from a stream or file instead of by family name: var tf = SKTypeface.FromStream(stream); This ensures the same font data is used across platforms, though shaping metrics may still differ slightly between DirectWrite and FreeType.", "Use HarfBuzz (via SkiaSharp.HarfBuzz or RichTextKit) for cross-platform text shaping, which provides consistent glyph advances regardless of the OS font stack.", "Accept platform-specific measurement variance and use relative/flexible layouts instead of hardcoded pixel measurements."], "resolution": {"hypothesis": "The measurement difference is caused by (1) different font manager resolution via FromFamilyName on Windows (DirectWrite) vs Linux (FontConfig), and (2) different low-level glyph advance calculations in the platform shaping backends. This is expected cross-platform behavior.", "proposals": [{"title": "Load typeface from stream/file for consistent font selection", "description": "Replace SKTypeface.FromFamilyName with SKTypeface.FromStream() or SKTypeface.FromFile() to guarantee the same font data is used on all platforms. This removes the platform font manager variable.", "category": "workaround", "confidence": 0.85, "effort": "cost/xs", "validated": "untested"}, {"title": "Use HarfBuzz for cross-platform text shaping", "description": "Use SkiaSharp.HarfBuzz or RichTextKit for text measurement. HarfBuzz provides consistent shaping results independent of the OS font stack.", "category": "alternative", "confidence": 0.8, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Load typeface from stream/file for consistent font selection", "recommendedReason": "Smallest change for the user, addresses the font resolution variable. If metrics still differ slightly after this, the HarfBuzz approach resolves the shaping backend variable too."}, "nextQuestions": ["Does measurement still differ after loading the exact same font file via SKTypeface.FromStream on both platforms?", "Does HarfBuzz text shaping produce identical glyph advances on Windows and Linux with the same font file?"]}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.78, "reason": "Cross-platform font measurement differences are expected due to platform-specific font manager resolution (DirectWrite vs FontConfig) and shaping backend differences. Maintainer and community comments confirm this is by-design. Workaround is documented. The behavior is not a SkiaSharp defect.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp, os/Windows-Classic, os/Linux, tenet/compatibility labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "os/Linux", "tenet/compatibility"]}, {"type": "add-comment", "description": "Post explanation of root cause and workarounds, then close as not-a-bug", "risk": "high", "confidence": 0.78, "comment": "Thank you for the detailed report and the font files. After investigating the code and community follow-ups, this measurement difference is expected cross-platform behavior:\n\n**Root cause:**\n1. `SKTypeface.FromFamilyName(\"Calibri\", ...)` calls into the OS font manager — **DirectWrite on Windows** and **FontConfig on Linux**. Even with the same Calibri font installed, each platform may resolve it differently.\n2. Even when the same font data is loaded from a stream (as confirmed by follow-up testing in 2025), the low-level glyph advance metrics are computed by **platform shaping backends** (DirectWrite on Windows vs FreeType/HarfBuzz on Linux) which can produce slightly different results.\n\n**Workarounds:**\n\n1. **Load from stream for consistent font selection** — embed the font as a resource and use `SKTypeface.FromStream()` to bypass the OS font manager:\n   ```csharp\n   using var stream = Assembly.GetExecutingAssembly().GetManifestResourceStream(\"YourApp.Calibri.ttf\");\n   using var tf = SKTypeface.FromStream(stream);\n   paint.Typeface = tf;\n   ```\n   Note: shaping backend differences may still cause minor metric variations.\n\n2. **Use HarfBuzz or RichTextKit for cross-platform text shaping** — [RichTextKit](https://github.com/toptensoftware/RichTextKit) uses HarfBuzz under the hood and provides consistent shaping results across platforms.\n\n3. **Design for metric variance** — if pixel-perfect cross-platform layout consistency is required, use flexible/relative layouts rather than hardcoded measurements.\n\nSince SkiaSharp delegates to platform shaping for text metrics, there is no fix possible at the SkiaSharp layer. Closing as not-a-bug."}, {"type": "close-issue", "description": "Close as not a bug — platform-specific font shaping behavior", "risk": "medium", "confidence": 0.78, "stateReason": "not_planned"}, {"type": "link-related", "description": "Cross-reference related issue #707 — same cross-platform MeasureText discrepancy", "risk": "low", "confidence": 0.95, "linkedIssue": 707}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
