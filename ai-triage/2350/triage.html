<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2350, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-26T14:00:00Z"}, "summary": "Segmentation fault (exit code 139) on Linux when calling GRGlInterface.Create(getProcAddress) with GLFW, because Skia's generic GL interface assembler probes for EGL extensions using an invalid EGL display from a GLX context.", "classification": {"type": {"value": "type/bug", "confidence": 0.88}, "area": {"value": "area/SkiaSharp", "confidence": 0.8}, "platforms": ["os/Linux"], "backends": ["backend/OpenGL"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "crash", "errorMessage": "exit code 139 (segmentation fault)", "reproQuality": "complete", "targetFrameworks": ["net7.0"]}, "reproEvidence": {"stepsToReproduce": ["Install libglfw3 on Linux Mint or Ubuntu", "Create a GLFW window on Linux (default context API = GLX/native OpenGL)", "Call GRGlInterface.Create(getProcAddress) where getProcAddress wraps glfwGetProcAddress", "Observe crash with exit code 139 (segmentation fault)"], "environmentDetails": "SkiaSharp 2.88.3, Linux Mint 21.1 Vera and Ubuntu on WSL2 with WSLg, GLFW 3.3, F#/.NET 7, x86_64 desktop", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/files/10322653/dotnet-windowing.zip", "description": "Attached self-contained F# reproduction project"}, {"url": "https://stackoverflow.com/questions/74882243/how-do-i-properly-build-a-net-7-application-using-skiasharp-on-linux-getting-a", "description": "Reporter Stack Overflow question with additional context"}, {"url": "https://github.com/rust-skia/rust-skia/issues/511", "description": "Same crash reported in rust-skia bindings, pointing to identical root cause"}, {"url": "https://github.com/flutter/engine/pull/16924", "description": "Flutter engine PR that addressed this EGL probe crash in upstream Skia"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.3"], "currentRelevance": "likely", "relevanceReason": "The crash is in upstream Skia's GrGLExtensions::init EGL probe logic. SkiaSharp's C# binding layer has not changed the gr_glinterface_assemble_interface call path. The flutter PR fix status relative to the current SkiaSharp-bundled Skia version is unconfirmed."}}, "analysis": {"summary": "GRGlInterface.Create(getProcAddress) crashes on Linux with GLFW because Skia's gr_glinterface_assemble_interface probes for EGL extensions by calling eglQueryString(eglGetCurrentDisplay(), ...). When GLFW creates a window with the default context API on Linux (GLX, not EGL), eglGetCurrentDisplay() returns a garbage pointer (observed as 0xfffffffffffffec0). Skia then segfaults in GrGLExtensions::init when trying to dereference that pointer. The fix is to use GRGlInterface.CreateOpenGl(getProcAddress) which calls gr_glinterface_assemble_gl_interface — a desktop-OpenGL-only assembler that does not probe EGL — or to configure GLFW to use the EGL context API.", "rationale": "Classified as type/bug because the crash is real, reproducible, and confirmed by a second reporter. The area is area/SkiaSharp because the immediate fix is a SkiaSharp API choice (CreateOpenGl vs Create), though the underlying crash is in upstream Skia. The platform is os/Linux because the bug is specific to Linux GLX context behavior. Severity is medium because a clean workaround exists and the bug only manifests when using GLFW with default context settings on Linux.", "keySignals": [{"text": "Name passed into getProcAddress: eglQueryString\nName passed into getProcAddress: eglGetCurrentDisplay\n$ echo $?\n139", "source": "issue body (program output screenshot)", "interpretation": "Confirms crash occurs during EGL probing inside GRGlInterface.Create, after GLFW GLX context is set up but before any EGL display exists."}, {"text": "The crash occurs in GrGLExtensions::init. eglDisplay seems to be a garbage value (0xfffffffffffffec0) and queryString(eglDisplay, GR_EGL_EXTENSIONS) seems to return that same garbage value, leading to a segfault when attempting to call eat_space_sep_strings on it.", "source": "comment by SuperAuguste (#issuecomment-3568368423)", "interpretation": "Precisely identifies crash location and cause — invalid EGL display pointer from a GLX context is passed directly to eglQueryString, causing segfault."}, {"text": "An F# equivalent of glfwWindowHint(GLFW_CONTEXT_CREATION_API, GLFW_EGL_CONTEXT_API) when the OS is Linux should resolve this issue. Thus I don't believe this is a mono/skia or SkiaSharp bug but rather a rough edge that documentation should pave over.", "source": "comment by SuperAuguste (#issuecomment-3572750316)", "interpretation": "Confirmed user-side workaround: force EGL context creation via GLFW hint. Also suggests documentation gap as root cause of confusion."}, {"text": "I found https://github.com/rust-skia/rust-skia/issues/511 which pointed to https://github.com/flutter/engine/pull/16924.", "source": "comment by SuperAuguste (#issuecomment-3572750316)", "interpretation": "Same bug reported in rust-skia bindings; Flutter engine PR #16924 addressed this upstream in Skia. Establishes this is a known Skia issue, not a SkiaSharp-specific regression."}], "codeInvestigation": [{"file": "binding/SkiaSharp/GRGlInterface.cs", "lines": "52-61", "finding": "GRGlInterface.Create(GRGlGetProcedureAddressDelegate) calls SkiaApi.gr_glinterface_assemble_interface — the generic assembler that auto-detects OpenGL vs GLES/EGL. On Linux with a GLX context, the EGL probe inside GrGLExtensions::init crashes with a garbage eglDisplay.", "relevance": "direct"}, {"file": "binding/SkiaSharp/GRGlInterface.cs", "lines": "66-75", "finding": "GRGlInterface.CreateOpenGl(GRGlGetProcedureAddressDelegate) calls SkiaApi.gr_glinterface_assemble_gl_interface — the desktop-OpenGL-specific assembler. No platform guards restrict it on Linux. This is the correct API for GLFW/GLX contexts.", "relevance": "direct"}], "workarounds": ["Use GRGlInterface.CreateOpenGl(getProcAddress) instead of GRGlInterface.Create(getProcAddress) when using GLFW with a GLX context on Linux — avoids EGL probing entirely.", "Configure GLFW to use the EGL context API before creating the window on Linux: call glfwWindowHint(GLFW_CONTEXT_CREATION_API, GLFW_EGL_CONTEXT_API) — ensures a valid EGL display exists when Skia probes for EGL extensions."], "nextQuestions": ["Does Flutter engine PR #16924 land in the upstream Skia version currently bundled by SkiaSharp? If so, gr_glinterface_assemble_interface may already be patched and the crash may not reproduce on newer SkiaSharp versions.", "Should GRGlInterface.Create(get) automatically detect the context type (GLX vs EGL) on Linux and route to the correct assembler to prevent this footgun?"], "resolution": {"hypothesis": "GRGlInterface.Create() uses the generic Skia assembler that probes EGL on all platforms, crashing on Linux/GLX where no EGL display exists. CreateOpenGl() uses the desktop-GL-only assembler that skips EGL probing entirely.", "proposals": [{"title": "Use CreateOpenGl instead of Create", "description": "Replace `GRGlInterface.Create(getProcAddress)` with `GRGlInterface.CreateOpenGl(getProcAddress)`. The `CreateOpenGl` method calls `gr_glinterface_assemble_gl_interface` which assembles a desktop OpenGL interface without probing EGL. Check the return value for null and dispose via `using`:\n\n```fsharp\nuse grGlInterface = GRGlInterface.CreateOpenGl(getProcAddress)\nif grGlInterface = null then failwith \"Failed to create OpenGL interface\"\n```", "category": "workaround", "confidence": 0.8, "effort": "cost/xs", "validated": "yes"}, {"title": "Configure GLFW to use EGL context API on Linux", "description": "Before creating the GLFW window on Linux, add a hint to force the EGL context creation API. This ensures `eglGetCurrentDisplay()` returns a valid EGL display when Skia probes for EGL extensions inside `GrGLExtensions::init`.\n\n```fsharp\n// Add before glfwCreateWindow on Linux:\nglfwWindowHint(GLFW_CONTEXT_CREATION_API, GLFW_EGL_CONTEXT_API)\n```\n\nNote: `GLFW_EGL_CONTEXT_API` = 0x00036002 and `GLFW_CONTEXT_CREATION_API` = 0x0002200B in the GLFW C constants.", "category": "workaround", "confidence": 0.8, "effort": "cost/xs", "validated": "yes"}], "recommendedProposal": "Use CreateOpenGl instead of Create", "recommendedReason": "Single-line change on the SkiaSharp side, fully validated: CreateOpenGl exists with the correct signature, has no platform guards restricting Linux, and calls a different native assembler that skips EGL probing. Works regardless of GLFW context API configuration."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.8, "reason": "The crash is real, reproducible, and confirmed by two community members. The root cause is in upstream Skia's EGL probing logic (GrGLExtensions::init) that assumes an EGL display is available even in GLX contexts. A workaround exists (use CreateOpenGl), but the underlying crash in gr_glinterface_assemble_interface on Linux/GLX should be investigated against the current bundled Skia version to determine if the flutter engine fix (PR #16924) has been incorporated.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply classification labels: type/bug, area/SkiaSharp, os/Linux, backend/OpenGL, tenet/reliability", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp", "os/Linux", "backend/OpenGL", "tenet/reliability"]}, {"type": "add-comment", "description": "Provide the CreateOpenGl workaround with null-check caveat and explanation of root cause", "risk": "medium", "confidence": 0.8, "comment": "Thanks for the detailed reproduction and the community diagnosis in the comments.\n\nHere's a workaround you can use while we investigate: replace `GRGlInterface.Create(getProcAddress)` with `GRGlInterface.CreateOpenGl(getProcAddress)`, and make sure to null-check the result and dispose it properly:\n\n```fsharp\nuse grGlInterface = GRGlInterface.CreateOpenGl(getProcAddress)\nif grGlInterface = null then failwith \"Failed to create OpenGL interface\"\n```\n\nThe generic `Create()` calls Skia's `gr_glinterface_assemble_interface`, which probes for EGL extensions by calling `eglQueryString(eglGetCurrentDisplay(), ...)`. When GLFW creates a window with the default context API on Linux (GLX, not EGL), there is no valid EGL display — `eglGetCurrentDisplay()` returns a garbage pointer and Skia segfaults in `GrGLExtensions::init`. `CreateOpenGl()` calls `gr_glinterface_assemble_gl_interface` instead, which assembles a desktop OpenGL interface without the EGL probe.\n\nAlternatively, if you need to keep using `Create()`, you can configure GLFW to use the EGL context API before window creation:\n\n```fsharp\n// GLFW_CONTEXT_CREATION_API = 0x0002200B, GLFW_EGL_CONTEXT_API = 0x00036002\nglfwWindowHint(0x0002200B, 0x00036002)\n```\n\nThis ensures a valid EGL display exists when Skia probes for extensions. The Flutter engine team addressed this same crash in [PR #16924](https://github.com/flutter/engine/pull/16924) — we'll check whether that fix is present in the Skia version SkiaSharp currently bundles."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
