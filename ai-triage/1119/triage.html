<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1119, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-25T09:30:00Z"}, "summary": "User asks how to derive the font family name from a font full name (e.g., 'FrutigerNext LT Regular') in order to use SKTypeface.FromFamilyName(), which returns the default typeface when given a full font name instead of the family name.", "classification": {"type": {"value": "type/question", "confidence": 0.95}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}}, "evidence": {"reproEvidence": {"stepsToReproduce": ["Call SKTypeface.FromFamilyName('FrutigerNext LT Regular') with the full font name", "Observe that the default typeface (not the intended font) is returned"], "relatedIssues": [762]}}, "analysis": {"summary": "The user is confusing font full names (e.g., 'FrutigerNext LT Regular') with font family names (e.g., 'FrutigerNext LT'). SKTypeface.FromFamilyName() requires the family name component, not the full name. The family name can be found programmatically by enumerating SKFontManager.Default.FontFamilies, then using SKFontStyleSet.GetStyleName() to match the style portion.", "rationale": "This is a usage question about Skia's font model. No broken behavior exists — Skia correctly uses a family+style model, not full font names. The contributor comment in the thread already partially answered it. The required API exists (SKFontManager, SKFontStyleSet) and is publicly accessible.", "keySignals": [{"text": "Skia sharp is returning default font", "source": "issue body", "interpretation": "User is passing the full font name instead of the family name, causing SKTypeface to fall back to the default typeface."}, {"text": "how can i get the correct font family name correctly for different fonts", "source": "issue body", "interpretation": "Core question: how to derive the family name component from a full font name string."}, {"text": "I cannot use load by stream in my case, where i get input only as font name", "source": "comment by reporter", "interpretation": "Reporter only has font name strings available, not file paths or streams."}, {"text": "SKTypeface.FromFamilyName() uses the font manager to resolve fonts. So the moment you install your fonts on the system FromFamilyName should work", "source": "comment by contributor Gillibald", "interpretation": "Partial answer: family name must match system-installed family name, not full/PostScript name."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "55-71", "finding": "SKTypeface.FromFamilyName() accepts a family name string and calls sk_typeface_create_from_name. If no installed font matches the family name, Skia silently returns a fallback typeface rather than null. There is no overload that accepts a full font name.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontManager.cs", "lines": "43-72", "finding": "SKFontManager.Default.FontFamilies enumerates all system-installed font family names (IEnumerable<string>). GetFontStyles(string familyName) returns an SKFontStyleSet containing all typefaces for that family.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKFontStyleSet.cs", "lines": "28-45", "finding": "SKFontStyleSet.GetStyleName(int index) returns the style name string (e.g., 'Regular', 'Bold', 'Heavy') for each typeface in the set. CreateTypeface(int index) materialises the typeface. This pair enables mapping full-name strings to typefaces without file access.", "relevance": "related"}], "workarounds": ["Use SKTypeface.FromFamilyName('FrutigerNext LT', SKFontStyle.Normal) for regular — pass the family name only, not the full name", "Enumerate SKFontManager.Default.FontFamilies and match by concatenating familyName + ' ' + GetStyleName(i) to find the typeface for a given full name", "Load font from file or stream (SKTypeface.FromFile / SKTypeface.FromStream) and then read its .FamilyName property to discover the correct family name"], "nextQuestions": ["Are the FrutigerNext fonts installed on the target system, or do they need to be embedded/loaded from files?", "What platform is the target — mobile platforms require fonts to be bundled, not just system-installed."], "resolution": {"hypothesis": "The user needs to separate the family name from the style suffix in the font full name, then pass only the family name to FromFamilyName() with an appropriate SKFontStyle — or enumerate font families to find a match.", "proposals": [{"title": "Use family name with style parameter", "description": "Strip the style suffix from the full font name and pass the family name to FromFamilyName() with the appropriate SKFontStyle weight.", "category": "fix", "codeSnippet": "// 'FrutigerNext LT Regular' → family='FrutigerNext LT', style=Normal\nusing var typeface = SKTypeface.FromFamilyName(\"FrutigerNext LT\", SKFontStyle.Normal);\n\n// 'FrutigerNext LT Heavy' → family='FrutigerNext LT', weight=900\nusing var heavy = SKTypeface.FromFamilyName(\"FrutigerNext LT\", new SKFontStyle(900, 5, SKFontStyleSlant.Upright));\n\n// Check if the requested font was actually matched (Skia silently returns a fallback)\nif (typeface?.FamilyName != \"FrutigerNext LT\")\n    throw new InvalidOperationException(\"Font not installed on this system.\");", "confidence": 0.85, "effort": "cost/xs", "validated": "yes"}, {"title": "Resolve full font name to typeface by enumeration", "description": "Enumerate all installed font families and style names to find the typeface whose family+style matches the given full font name. Works without knowing the split point in advance.", "category": "workaround", "codeSnippet": "SKTypeface FindTypefaceByFullName(string fullFontName)\n{\n    var fm = SKFontManager.Default;\n    foreach (var familyName in fm.FontFamilies)\n    {\n        using var styleSet = fm.GetFontStyles(familyName);\n        for (int i = 0; i < styleSet.Count; i++)\n        {\n            var styleName = styleSet.GetStyleName(i);\n            if (styleName == null) continue;\n            if (string.Equals($\"{familyName} {styleName}\", fullFontName,\n                    StringComparison.OrdinalIgnoreCase))\n            {\n                var tf = styleSet.CreateTypeface(i);\n                if (tf != null) return tf;\n            }\n        }\n    }\n    return null; // Font not installed on this system\n}\n\n// Usage:\nvar typeface = FindTypefaceByFullName(\"FrutigerNext LT Regular\");\n// Note: fonts must be installed on the system (or pre-registered via SKFontManager).\n// Not supported on WASM; mobile platforms require fonts to be embedded in the app bundle.", "confidence": 0.8, "effort": "cost/s", "validated": "yes"}], "recommendedProposal": "Use family name with style parameter", "recommendedReason": "Simplest approach when the family name is known. Full font names follow a consistent 'FamilyName StyleName' pattern, so splitting the last word gives the style."}}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.85, "reason": "Usage question about Skia's font model. API works as designed — it uses family names, not full/PostScript names. The answer is derivable from SKFontManager and SKFontStyleSet APIs. A contributor already partially answered in comments.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply type/question and area/SkiaSharp labels", "risk": "low", "confidence": 0.95, "labels": ["type/question", "area/SkiaSharp"]}, {"type": "add-comment", "description": "Post answer explaining font family vs full name distinction with working code examples and platform caveats", "risk": "medium", "confidence": 0.83, "comment": "Hi @Jack-Paul,\n\nThe key distinction in Skia's font model is between a **font family name** (e.g., `FrutigerNext LT`) and a **full font name** (e.g., `FrutigerNext LT Regular`). `SKTypeface.FromFamilyName()` expects only the family name portion, with the style (weight/slant) supplied separately via `SKFontStyle`.\n\n**Option 1 — If you know the family and style:**\n\n```csharp\n// 'FrutigerNext LT Regular'\nusing var typeface = SKTypeface.FromFamilyName(\"FrutigerNext LT\", SKFontStyle.Normal);\n\n// 'FrutigerNext LT Heavy' (weight 900)\nusing var heavy = SKTypeface.FromFamilyName(\"FrutigerNext LT\",\n    new SKFontStyle(900, 5, SKFontStyleSlant.Upright));\n\n// Important: Skia returns a fallback font silently if the family isn't found.\n// Check that the result matches what you requested:\nif (typeface?.FamilyName != \"FrutigerNext LT\")\n    throw new InvalidOperationException(\"Font not installed on this system.\");\n```\n\n**Option 2 — Resolve any full font name generically (family name unknown):**\n\n```csharp\nSKTypeface FindTypefaceByFullName(string fullFontName)\n{\n    var fm = SKFontManager.Default;\n    foreach (var familyName in fm.FontFamilies)\n    {\n        using var styleSet = fm.GetFontStyles(familyName);\n        for (int i = 0; i < styleSet.Count; i++)\n        {\n            var styleName = styleSet.GetStyleName(i);\n            if (styleName == null) continue;\n            if (string.Equals($\"{familyName} {styleName}\", fullFontName,\n                    StringComparison.OrdinalIgnoreCase))\n            {\n                var tf = styleSet.CreateTypeface(i);\n                if (tf != null) return tf;\n            }\n        }\n    }\n    return null; // font not found\n}\n\n// Usage:\nvar typeface = FindTypefaceByFullName(\"FrutigerNext LT Regular\");\n```\n\n**Important platform notes:**\n- Fonts must be **installed on the system** (Windows/macOS/Linux) for `FontFamilies` enumeration to see them.\n- On **Android/iOS**, system fonts are limited — custom fonts must be embedded in the app bundle and loaded via `SKTypeface.FromStream()` or `SKTypeface.FromFile()`.\n- **WASM** does not support runtime font enumeration — fonts must be embedded at build time.\n- On **Linux**, `fontconfig` must be installed and the font cache updated (`fc-cache -fv`) for custom fonts to be visible."}, {"type": "close-issue", "description": "Close as answered — usage question with documented API solution", "risk": "medium", "confidence": 0.85, "stateReason": "completed"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
