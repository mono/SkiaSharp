<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 923, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-25T00:59:12Z"}, "summary": "SKBitmap.Resize appears to rotate a JPEG image 180 degrees for images whose EXIF orientation tag indicates BottomRight (180° rotation), because SKBitmap.Decode does not auto-apply EXIF orientation metadata.", "classification": {"type": {"value": "type/bug", "confidence": 0.85}, "area": {"value": "area/SkiaSharp", "confidence": 0.92}, "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "wrong-output", "errorMessage": "Image resized and rotated 180 degrees for specific JPEG files", "reproQuality": "partial", "targetFrameworks": ["netcoreapp", "net6.0"]}, "reproEvidence": {"stepsToReproduce": ["Take a JPEG photo whose EXIF orientation tag is BottomRight (3) or similar non-TopLeft value", "Decode with SKBitmap.Decode(stream)", "Call original.Resize(new SKImageInfo(width, height, ...), SKFilterQuality.High)", "Encode result and observe the image is rotated 180° from expected"], "environmentDetails": "SkiaSharp 1.68.0 / 2.80.3, .NET Core / net6.0, Visual Studio 2017", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/1517", "description": "Related issue #1517: SkEncodedOrigin wrong for one JPEG — SKCodec.EncodedOrigin not respected by Decode"}]}, "versionAnalysis": {"mentionedVersions": ["1.68.0", "2.80.3"], "currentRelevance": "likely", "relevanceReason": "SKBitmap.Decode still does not apply EXIF orientation automatically; the API surface is unchanged."}}, "analysis": {"summary": "SKBitmap.Decode (via SKCodec.GetPixels) decodes raw pixel data without applying the EXIF orientation transformation stored in the JPEG file. Resize then operates on these raw pixels, producing output that appears rotated relative to what viewers which auto-apply EXIF orientation display. The rotation is not introduced by Resize; it is already present in the decoded bitmap. The API exposes SKCodec.EncodedOrigin so callers can apply the transformation manually, but this is not documented prominently and is counterintuitive.", "rationale": "Multiple reporters across multiple versions describe the same unexpected rotation. The behavior is by-design (Skia does not auto-orient), but is a common usability trap. Classified as type/bug with close-as-not-a-bug because the behavior is correct but highly surprising, and a clear workaround using SKCodec.EncodedOrigin exists.", "keySignals": [{"text": "resizing and rotating to 180 degree as well", "source": "issue body", "interpretation": "The JPEG has EXIF orientation = BottomRight (3), meaning the pixels are stored upside-down. SKBitmap.Decode returns raw unoriented pixels."}, {"text": "If I save as same image as .PNG, Now I can resize this PNG without issue", "source": "comment by reporter", "interpretation": "PNG format does not carry EXIF orientation metadata. When the JPEG is re-encoded as PNG via SkiaSharp, the raw pixel data is preserved; the viewer no longer auto-rotates based on EXIF, so it appears correct."}, {"text": "I can reproduce this with all images with portrait orientation. Images with Landscape orientation remain correctly aligned.", "source": "comment by handcraftedsource", "interpretation": "Confirms the root cause: portrait photos are typically shot with camera physically rotated, stored with EXIF orientation = RightTop (6) or BottomRight (3)."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKBitmap.cs", "finding": "SKBitmap.Decode(SKCodec codec) calls codec.GetPixels(bitmapInfo, bitmap.GetPixels()), which decodes raw pixel data as stored in the file without applying the EXIF/encoded origin transformation. No orientation adjustment is performed.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKCodec.cs", "finding": "SKCodec.EncodedOrigin property exposes sk_codec_get_origin(), providing the EXIF orientation value (TopLeft=1 through LeftBottom=8). This is available to callers but is not used by SKBitmap.Decode or Resize.", "relevance": "related"}, {"file": "binding/SkiaSharp/SKBitmap.cs", "finding": "SKBitmap.Resize(SKImageInfo info, SKSamplingOptions sampling) performs a pure pixel-level scale using sk_bitmap_resize. It does not read or apply orientation metadata — the rotation artifact comes from the pre-existing orientation in the decoded pixel data.", "relevance": "direct"}], "workarounds": ["Use SKCodec directly: check codec.EncodedOrigin after decoding and apply the corresponding transformation matrix using SKCanvas.DrawBitmap with an SKMatrix before resizing.", "After decoding with SKBitmap.Decode(stream), use SKCodec to get the orientation, then apply a canvas transformation to produce a correctly-oriented intermediate bitmap before resizing."], "nextQuestions": ["Should SKBitmap.Decode gain an overload or flag to auto-apply EXIF orientation?", "Is there an existing utility in SkiaSharp to apply SKEncodedOrigin transformations to a bitmap?"], "resolution": {"hypothesis": "The JPEG file has an EXIF orientation tag (BottomRight = 180°). SKBitmap.Decode returns raw unoriented pixels. The caller must manually apply the orientation using SKCodec.EncodedOrigin before resize.", "proposals": [{"title": "Apply EXIF orientation manually after decode", "description": "Use SKCodec to decode and retrieve orientation, then draw onto a correctly-sized canvas with the appropriate transform before resizing.", "category": "workaround", "codeSnippet": "using var codec = SKCodec.Create(stream);\nvar info = codec.Info;\nvar origin = codec.EncodedOrigin;\n\nusing var bitmap = SKBitmap.Decode(codec);\n\n// If origin is not TopLeft, apply the orientation transform\nSKBitmap oriented = bitmap;\nif (origin != SKEncodedOrigin.TopLeft) {\n    bool swapDimensions = origin == SKEncodedOrigin.LeftTop ||\n                          origin == SKEncodedOrigin.RightTop ||\n                          origin == SKEncodedOrigin.RightBottom ||\n                          origin == SKEncodedOrigin.LeftBottom;\n    int w = swapDimensions ? bitmap.Height : bitmap.Width;\n    int h = swapDimensions ? bitmap.Width : bitmap.Height;\n    oriented = new SKBitmap(w, h);\n    using var canvas = new SKCanvas(oriented);\n    canvas.Clear();\n    // SKMatrix.CreateRotationDegrees based on origin value\n    // origin 3 (BottomRight) = 180 degrees\n    var matrix = SKMatrix.CreateRotationDegrees(\n        origin == SKEncodedOrigin.BottomRight ? 180f :\n        origin == SKEncodedOrigin.RightTop ? 90f :\n        origin == SKEncodedOrigin.LeftBottom ? 270f : 0f,\n        bitmap.Width / 2f, bitmap.Height / 2f);\n    canvas.SetMatrix(matrix);\n    canvas.DrawBitmap(bitmap, 0, 0);\n}\n\nusing var resized = oriented.Resize(new SKImageInfo(targetWidth, targetHeight), SKSamplingOptions.Default);\n// encode and return resized", "confidence": 0.78, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Apply EXIF orientation manually after decode", "recommendedReason": "Direct fix available with existing API surface (SKCodec.EncodedOrigin). No library changes needed."}}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.8, "reason": "SKBitmap.Decode intentionally does not auto-apply EXIF orientation; this is by-design Skia behavior. The orientation is exposed via SKCodec.EncodedOrigin for callers to handle. The behavior is surprising but correct.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug and SkiaSharp core labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp", "tenet/compatibility"]}, {"type": "add-comment", "description": "Explain EXIF orientation is by-design and provide workaround using SKCodec.EncodedOrigin", "risk": "high", "confidence": 0.82, "comment": "Thank you for the report! The rotation you're seeing is not caused by `SKBitmap.Resize` itself — it comes from how JPEG files store images with an EXIF orientation tag.\n\n**Root Cause:** `SKBitmap.Decode` returns raw pixel data exactly as stored in the JPEG file, without applying the EXIF orientation transformation. For portrait photos taken with most cameras, the image pixels are stored rotated (e.g., 180° for `BottomRight` orientation), and the EXIF tag tells viewers to rotate before displaying. SkiaSharp intentionally does not auto-apply this rotation — you need to apply it yourself.\n\n**Workaround:** Use `SKCodec` directly to read the orientation and apply the correct transformation:\n\n```csharp\nusing var codec = SKCodec.Create(stream);\nvar origin = codec.EncodedOrigin; // Check this value\nusing var bitmap = SKBitmap.Decode(codec);\n\n// If origin != SKEncodedOrigin.TopLeft, apply transform before resizing\n// e.g., for origin == SKEncodedOrigin.BottomRight (180°):\n// Draw onto a new canvas with a 180° rotation matrix\n```\n\nThe `SKEncodedOrigin` enum values map to EXIF orientation tags. You can create an `SKCanvas` with the appropriate `SKMatrix.CreateRotationDegrees(...)` to produce a correctly-oriented bitmap before resizing.\n\nThe fact that saving as PNG 'fixes' the issue is because PNG does not store EXIF orientation metadata, so viewing software doesn't auto-rotate it — the raw pixel layout is used directly.\n\nThis behavior may be improved with a helper API in a future release. For now, please use `SKCodec.EncodedOrigin` to handle orientation manually."}, {"type": "close-issue", "description": "Close as not a bug — behavior is by-design", "risk": "medium", "confidence": 0.75, "stateReason": "not_planned"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
