<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 4181, "repo": "mono/SkiaSharp", "analyzedAt": "2026-06-25T05:40:00Z", "currentLabels": ["type/feature-request"]}, "summary": "SKObject.OwnedObjects and KeepAliveObjects use ConcurrentDictionary with default capacity 31, causing ~31 heap allocations per SKObject instance on first access to owned-child tracking — noticeable in hot paths like SKSurface.Canvas in Avalonia render loops.", "classification": {"type": {"value": "type/enhancement", "confidence": 0.9}, "area": {"value": "area/SkiaSharp", "confidence": 0.95}, "tenets": ["tenet/performance"]}, "evidence": {"reproEvidence": {"screenshots": [{"url": "https://github.com/user-attachments/assets/9b8923da-fba7-41d5-90d2-ec570938adaa", "description": "Profiler screenshot showing 31 object allocations per SKSurface.Canvas call, traced to ConcurrentDictionary bucket initialization"}], "environmentDetails": "Avalonia app with SkiaSharp, .NET runtime ConcurrentDictionary DEFAULT_CAPACITY = 31", "repoLinks": [{"url": "https://github.com/microsoft/referencesource/blob/ec9fa9ae770d522a5b5f0607898044b7478574a3/mscorlib/system/collections/Concurrent/ConcurrentDictionary.cs#L122", "description": "ConcurrentDictionary DEFAULT_CAPACITY = 31"}, {"url": "https://github.com/microsoft/referencesource/blob/ec9fa9ae770d522a5b5f0607898044b7478574a3/mscorlib/system/collections/Concurrent/ConcurrentDictionary.cs#L341-L345", "description": "ConcurrentDictionary internal allocation site for 31 buckets"}, {"url": "https://github.com/mono/SkiaSharp/issues/1205", "description": "Related: request to expose SkiaApi for perf-sensitive callers who want to bypass SKObject overhead entirely"}]}}, "analysis": {"summary": "SKObject.OwnedObjects and KeepAliveObjects are lazily-initialized ConcurrentDictionary<IntPtr, SKObject> fields with no explicit initial capacity, causing the .NET runtime to allocate 31 bucket slots on first dictionary creation. Each SKObject that owns children (e.g., every SKSurface that returns Canvas) pays this allocation cost once at first OwnedObjects access. Passing concurrencyLevel:1 and capacity:1 would reduce the initial allocation to a single bucket and is a straightforward code change.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKObject.cs", "lines": "14-26", "finding": "OwnedObjects property lazy-creates new ConcurrentDictionary<IntPtr, SKObject>() with no explicit capacity or concurrencyLevel, defaulting to 31 internal bucket slots. The lock-double-check pattern is correct but the dictionary allocation itself is oversized for its typical use (usually 0–2 owned children).", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKObject.cs", "lines": "28-37", "finding": "KeepAliveObjects has the identical issue: lazy-creates ConcurrentDictionary with default capacity 31. Same fix applies.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKObject.cs", "lines": "160-168", "finding": "OwnedBy() is called with every owned-child registration (e.g., SKSurface.Canvas). It accesses owner.OwnedObjects[child.Handle], triggering lazy dictionary creation on first call per SKObject instance.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKSurface.cs", "lines": "291-295", "finding": "SKSurface.Canvas property calls OwnedBy(SKCanvas.GetObject(...), this) on every access. This is the specific hot path identified by the reporter in their Avalonia profiler run.", "relevance": "related"}], "keySignals": [{"text": "31 object allocations for each call [to SKSurface.Canvas] ... tracked down to .NET default DEFAULT_CAPACITY = 31", "source": "issue body", "interpretation": "Reporter profiled a real allocation and traced it to ConcurrentDictionary initialization. The 31 objects match the documented default capacity exactly."}, {"text": "Adjust default capacity, by SkiaSharp defining capacity at ctor call, to something reasonable for this use case e.g. 1 perhaps even.", "source": "issue body", "interpretation": "The proposed fix is specific and actionable: pass concurrencyLevel and capacity to ConcurrentDictionary ctor."}, {"text": "we are trying to get that down. Any identification and analysis would help.", "source": "maintainer comment (mattleibow)", "interpretation": "Maintainer actively prioritizes allocation reduction and welcomes this kind of analysis — positive signal for accepting a fix PR."}], "rationale": "This is a type/enhancement because the OwnedObjects tracking mechanism works correctly but is implemented with suboptimal ConcurrentDictionary defaults. The .NET runtime allocates 31 internal bucket slots on ConcurrentDictionary construction regardless of how many entries will actually be stored. SKObject-derived types typically own 0–2 children, making capacity=1 appropriate. The fix (pass concurrencyLevel:1, capacity:1 to the ConcurrentDictionary constructor) is a well-understood, low-risk change. The maintainer has already engaged positively on the general performance concern.", "workarounds": ["Cache the SKSurface.Canvas reference in a local variable or field rather than calling the property every frame — the OwnedObjects allocation only occurs on first access per SKSurface instance, so repeated calls to Canvas on the same surface are cheap after the first.", "For extreme performance requirements, cast Handle to IntPtr and use SkiaApi (internal) directly — see issue #1205 for discussion of exposing SkiaApi publicly."], "nextQuestions": ["Is ConcurrentDictionary even necessary here, or could a simpler Dictionary<IntPtr, SKObject> guarded by the existing `locker` field suffice? The lock pattern already exists in OwnedObjects getter.", "Are there thread-safety guarantees that require concurrent dictionary reads (without the outer lock) for OwnedObjects/KeepAliveObjects after creation?", "Would passing concurrencyLevel:1 alone (without reducing capacity) satisfy .NET performance guidelines, or is a full data-structure review warranted?"], "resolution": {"hypothesis": "Passing concurrencyLevel:1, capacity:1 to the ConcurrentDictionary constructor in both OwnedObjects and KeepAliveObjects property getters will reduce per-SKObject allocation from ~31 slots to 1 slot, eliminating the profiled allocation spike.", "proposals": [{"title": "Pass initial capacity=1 to ConcurrentDictionary", "description": "In both OwnedObjects and KeepAliveObjects lazy-init blocks, change the constructor call to new ConcurrentDictionary<IntPtr, SKObject>(concurrencyLevel: 1, capacity: 1). This reduces initial bucket allocation from 31 to 1 for the common case where each SKObject owns very few children.", "category": "fix", "codeSnippet": "ownedObjects ??= new ConcurrentDictionary<IntPtr, SKObject>(concurrencyLevel: 1, capacity: 1);", "confidence": 0.9, "effort": "cost/xs", "validated": "yes"}, {"title": "Replace ConcurrentDictionary with Dictionary + locker", "description": "Since SKObject already has a `locker` object field used in the lazy-init, OwnedObjects and KeepAliveObjects could be plain Dictionary<IntPtr, SKObject> guarded by that same lock on writes. Reads during iteration (DisposeManaged) are always single-threaded at disposal time. This would eliminate ConcurrentDictionary overhead entirely.", "category": "alternative", "confidence": 0.65, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Pass initial capacity=1 to ConcurrentDictionary", "recommendedReason": "Smallest possible change, immediately verifiable, no behavioral risk, and directly addresses the profiled allocation. The concurrencyLevel:1 hint also reduces lock striping overhead for the common single-threaded use case."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.85, "reason": "Well-identified performance issue with a clear, low-risk fix path. Maintainer has engaged positively. Needs a PR to implement and benchmark the change. The deeper alternative (replacing ConcurrentDictionary entirely) deserves a design discussion before committing to it.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Correct type to enhancement (not feature-request), add performance tenet", "risk": "low", "confidence": 0.9, "labels": ["type/enhancement", "area/SkiaSharp", "tenet/performance"]}, {"type": "add-comment", "description": "Acknowledge the finding, confirm the code path, outline the fix and invite a PR", "risk": "medium", "confidence": 0.85, "comment": "Thanks for the detailed profiler analysis @nietras! The root cause is confirmed: `SKObject.OwnedObjects` and `KeepAliveObjects` lazily create a `ConcurrentDictionary<IntPtr, SKObject>` with default capacity (31 internal buckets) even though most `SKObject` instances own only 1–2 children.\n\nThe fix is straightforward — pass `concurrencyLevel: 1, capacity: 1` to the `ConcurrentDictionary` constructor in both lazy-init blocks in `SKObject.cs`:\n\n```csharp\nownedObjects ??= new ConcurrentDictionary<IntPtr, SKObject>(concurrencyLevel: 1, capacity: 1);\nkeepAliveObjects ??= new ConcurrentDictionary<IntPtr, SKObject>(concurrencyLevel: 1, capacity: 1);\n```\n\nA longer-term alternative would be to replace `ConcurrentDictionary` with a plain `Dictionary` guarded by the existing `locker` field, since all write paths already acquire a lock.\n\n**Workaround for now:** Cache the `Canvas` reference in a local variable rather than calling `SKSurface.Canvas` each frame — the allocation only happens once per `SKSurface` instance (on first access), so repeated calls within the same frame are cheap after the first.\n\nA PR implementing the `capacity: 1` fix would be very welcome!"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
