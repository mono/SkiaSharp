<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1320, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T11:18:58Z"}, "summary": "On .NET Framework 4.8 with SkiaSharp 1.68.3, calling SKPixmap.Encode() throws System.IO.FileLoadException because SkiaSharp was compiled against System.Buffers 4.0.2.0 but the runtime finds a different version (4.0.3.0+), caused by .NET Framework strict assembly version binding.", "classification": {"type": {"value": "type/bug", "confidence": 0.92}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "platforms": ["os/Windows-Classic"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "exception", "errorMessage": "System.IO.FileLoadException: Could not load file or assembly 'System.Buffers, Version=4.0.2.0, Culture=neutral, PublicKeyToken=cc7b13ffcd2ddd51' or one of its dependencies. The located assembly's manifest definition does not match the assembly reference.", "stackTrace": "at SkiaSharp.SKManagedWStream.OnWrite(IntPtr buffer, IntPtr size)\n   at SkiaSharp.SKAbstractManagedWStream.WriteInternal(IntPtr s, Void* context, Void* buffer, IntPtr size)\n   at SkiaSharp.SkiaApi.sk_jpegencoder_encode(IntPtr dst, IntPtr src, SKJpegEncoderOptions* options)\n   at SkiaSharp.SKPixmap.Encode(SKWStream dst, SKJpegEncoderOptions options)", "reproQuality": "partial", "targetFrameworks": ["net48"]}, "reproEvidence": {"stepsToReproduce": ["Create a .NET 4.8 unit test project", "Reference SkiaSharp 1.68.3 and SixLabors.ImageSharp (which pulls System.Buffers 4.0.3.0)", "Call SKPixmap.Encode() saving as JPEG or PNG", "Observe System.IO.FileLoadException for System.Buffers Version=4.0.2.0"], "environmentDetails": ".NET Framework 4.8, Windows 10 2004, Visual Studio 2019, SkiaSharp 1.68.3", "repoLinks": [{"url": "https://github.com/dotnet/runtime/issues/27117", "description": "Upstream dotnet/runtime issue about System.Buffers version conflicts on .NET Framework"}]}, "versionAnalysis": {"mentionedVersions": ["1.68.3"], "currentRelevance": "unknown", "relevanceReason": "Issue filed against 1.68.3 (2020). Current codebase still uses ArrayPool<T> from System.Buffers in Util.cs and SKManagedWStream.cs, but the SkiaSharp.csproj no longer has an explicit System.Buffers PackageReference. Unclear whether the NuGet package metadata still locks to a specific version."}}, "analysis": {"summary": "SkiaSharp 1.68.3's NuGet package encoded a hard dependency on System.Buffers 4.0.2.0 in its assembly references. On .NET Framework, the CLR checks assembly identity strictly and rejects 4.0.3.0 as a substitute unless assembly binding redirects are configured. The reporter's project had SixLabors.ImageSharp pulling in System.Buffers 4.0.3.0, causing the mismatch at runtime when SKManagedWStream.OnWrite tried to use ArrayPool<T>.", "rationale": "Stack trace clearly points to SKManagedWStream.OnWrite failing at load time due to a .NET Framework assembly version mismatch, not a logic error. The HRESULT 0x80131040 (COR_E_FILELOAD / FUSLOGVW manifest mismatch) is characteristic of this class of problem. The current codebase still uses System.Buffers in the same code path (Util.cs/ArrayPool<T>.Shared.Rent), so the issue may still affect .NET Framework consumers if the NuGet package metadata has not been updated.", "keySignals": [{"text": "System.IO.FileLoadException: Could not load file or assembly 'System.Buffers, Version=4.0.2.0' ... manifest definition does not match the assembly reference", "source": "issue body", "interpretation": ".NET Framework CLR found System.Buffers with a different assembly version than SkiaSharp was compiled against. Binding redirects would normally fix this but apparently did not take effect."}, {"text": "the System.Buffers assembly in my build directory has assembly version 4.0.3.0, so it is very strange that this minor revision is not picked up automatically", "source": "comment by ziriax", "interpretation": "Confirms the mismatch direction: user has 4.0.3.0, SkiaSharp embedded ref to 4.0.2.0. Unlike .NET Core, .NET Framework does not auto-redirect minor assembly versions."}, {"text": "My issue turned out to be a corrupted dll in my NuGet cache... I had to remove the NuGet package, delete all bin folders, delete NuGet Cache. Then re-add buffers 4.5.1. It finally worked.", "source": "comment by erebuswolf (2023)", "interpretation": "A separate root cause — corrupted cache — mimics the same error. Suggests issue body and later comments describe distinct problems with the same symptom."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKManagedWStream.cs", "lines": "4,45-55", "finding": "File imports System.Buffers (line 4) and uses Utils.RentArray<byte>(count) in OnWrite — this is the exact method in the reporter's stack trace. The ArrayPool<T> call will fail if System.Buffers assembly cannot be loaded.", "relevance": "direct"}, {"file": "binding/SkiaSharp/Util.cs", "lines": "4,77-103", "finding": "RentedArray<T> struct directly calls ArrayPool<T>.Shared.Rent(length) and ArrayPool<T>.Shared.Return(Array). System.Buffers is a required assembly for this code path. The csproj does NOT list System.Buffers as an explicit PackageReference, meaning in current SkiaSharp it likely arrives as a transitive dependency.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SkiaSharp.csproj", "finding": "No explicit PackageReference for System.Buffers found. The project uses $(AllTargetFrameworks) and has net4x-specific conditions. Without an explicit System.Buffers reference, newer NuGet resolution may handle version selection differently than 1.68.3.", "relevance": "related"}], "workarounds": ["Add AppDomain.CurrentDomain.AssemblyResolve handler to redirect System.Buffers 4.0.2.0 requests to the installed version (provided by reporter).", "Add or correct assembly binding redirects in App.config/packages.config for System.Buffers to cover the range up to 4.0.3.0 or higher.", "Clear the NuGet cache (`%USERPROFILE%\\.nuget\\packages\\system.buffers`) and reinstall System.Buffers 4.5.1 explicitly in the project."], "nextQuestions": ["Does this error still occur with current SkiaSharp (2.88.x or 3.x) on .NET Framework 4.8?", "Does the SkiaSharp NuGet package still emit a System.Buffers version-pinned dependency in its nuspec for .NET Framework targets?", "Does adding an explicit <PackageReference Include='System.Buffers' Version='4.5.1'/> to the project resolve the issue without the AssemblyResolve hack?"], "resolution": {"hypothesis": "SkiaSharp 1.68.3's NuGet package encoded System.Buffers 4.0.2.0 in its dependency metadata, and no binding redirect was generated to handle the version difference. Current SkiaSharp may have improved handling through updated NuGet metadata or transitive resolution.", "proposals": [{"title": "AssemblyResolve workaround (immediate)", "description": "Register an AppDomain.AssemblyResolve handler that redirects System.Buffers 4.0.2.0 requests to the installed version. This is the reporter's own confirmed workaround.", "category": "workaround", "codeSnippet": "AppDomain.CurrentDomain.AssemblyResolve += (sender, args) =>\n{\n    switch (args.Name)\n    {\n        case \"System.Buffers, Version=4.0.2.0, Culture=neutral, PublicKeyToken=cc7b13ffcd2ddd51\":\n            return typeof(System.Buffers.ArrayPool<>).Assembly;\n        default:\n            return null;\n    }\n};", "confidence": 0.9, "effort": "cost/xs", "validated": "yes"}, {"title": "Explicit System.Buffers package reference", "description": "Add System.Buffers 4.5.1 as a direct PackageReference in the consuming project. This forces NuGet to resolve the highest version and should generate the correct binding redirects.", "category": "workaround", "codeSnippet": "<PackageReference Include=\"System.Buffers\" Version=\"4.5.1\" />", "confidence": 0.75, "effort": "cost/xs", "validated": "untested"}, {"title": "Investigate whether current SkiaSharp still requires version-pinned System.Buffers", "description": "Examine the generated NuGet .nupkg for the .NET Framework target to confirm whether System.Buffers is listed as a versioned dependency. If so, update the NuGet metadata to allow a range (e.g., [4.0.1,)) instead of an exact version.", "category": "investigation", "confidence": 0.7, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "AssemblyResolve workaround (immediate)", "recommendedReason": "Confirmed working by the original reporter. The investigation proposal is worth pursuing to determine if the underlying issue is fixed in newer SkiaSharp."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.78, "reason": "The issue is clearly reproducible in 1.68.3 and a workaround exists. However, the issue is from 2020 and current SkiaSharp has changed its dependency structure. Repro against current version (3.x) is needed to determine if the root cause still exists.", "suggestedReproPlatform": "windows"}, "missingInfo": ["Standalone minimal repro project (reporter acknowledged this was not ready yet)", "Confirmation whether the issue reproduces with current SkiaSharp (2.88.x / 3.x) on .NET Framework 4.8"], "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp, os/Windows-Classic, tenet/compatibility", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "tenet/compatibility"]}, {"type": "add-comment", "description": "Acknowledge the issue, provide confirmed workaround, ask for repro against current version", "risk": "medium", "confidence": 0.78, "comment": "Thanks for the detailed report and for providing the `AssemblyResolve` workaround.\n\nThis is a classic .NET Framework assembly binding issue: SkiaSharp 1.68.3 was compiled against `System.Buffers 4.0.2.0` and the CLR won't automatically redirect to `4.0.3.0`.\n\n**Confirmed workaround (from issue body):** Register an `AssemblyResolve` handler as shown.\n\n**Alternative — add an explicit package reference:**\n```xml\n<PackageReference Include=\"System.Buffers\" Version=\"4.5.1\" />\n```\nThis forces NuGet to select a higher version and should generate the correct binding redirects in `app.config`.\n\nSince this was filed against 1.68.3, could you or anyone on this thread confirm whether the issue still reproduces with the current SkiaSharp (3.x) on .NET Framework 4.8? That would help us determine whether a fix is still needed in the NuGet package metadata."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
