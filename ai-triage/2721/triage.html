<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2721, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-22T01:10:00Z", "currentLabels": ["type/bug", "status/help-wanted"]}, "summary": "ArgumentException 'Cannot pass a GCHandle across AppDomains' thrown randomly when using SKData.Create(Stream) in an ASP.NET MVC app hosted under IIS with multiple sites sharing one application pool and .NET Framework 4.8.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "platforms": ["os/Windows-Classic"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": true, "errorType": "exception", "errorMessage": "System.ArgumentException: Cannot pass a GCHandle across AppDomains. Parameter name: handle", "stackTrace": "SkiaSharp.SKAbstractManagedStream.DisposeNative() in SKAbstractManagedStream.cs:52\nSkiaSharp.SKNativeObject.Dispose(Boolean disposing) in SKObject.cs:287\nSkiaSharp.SKManagedStream.Dispose(Boolean disposing) in SKManagedStream.cs:53\nSkiaSharp.SKNativeObject.Dispose() in SKObject.cs:298\nSkiaSharp.SKData.Create(Stream stream, Int64 length) in SKData.cs:141", "reproQuality": "complete", "targetFrameworks": ["net48"]}, "reproEvidence": {"stepsToReproduce": ["Set up IIS with multiple sites sharing a single application pool on .NET Framework 4.8", "Deploy ASP.NET MVC app that calls SKData.Create(fileStream) in a controller action", "Browse both sites simultaneously — exception occurs randomly"], "environmentDetails": "Windows 11 Enterprise 23H2, Visual Studio 2022, SkiaSharp 2.88.7, .NET Framework 4.8, IIS with multiple sites under one application pool", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/files/13989281/MVCSample.zip", "description": "Minimal reproduction MVC project provided by reporter"}], "codeSnippets": ["using (SKData skImgData = SKData.Create(imageData))\n{\n    skImgData.SaveTo(outputStream);\n}"]}, "versionAnalysis": {"mentionedVersions": ["2.88.2", "2.88.3", "2.88.7"], "workedIn": "2.88.2", "brokeIn": "2.88.3", "currentRelevance": "likely", "relevanceReason": "The GCHandle-based delegate proxying pattern in SKAbstractManagedStream is still present in the current codebase and the underlying .NET Framework AppDomain isolation constraint has not changed."}, "regression": {"isRegression": true, "confidence": 0.8, "reason": "Reporter explicitly states it worked in 2.88.2 and broke in 2.88.3. Multiple commenters confirm the same failure across versions up to 2.88.7.", "workedInVersion": "2.88.2", "brokeInVersion": "2.88.3"}}, "analysis": {"summary": "SKAbstractManagedStream stores a GCHandle (via DelegateProxies.CreateUserData) as an opaque IntPtr context pointer passed to native Skia. When the native destroy callback fires, SKManagedStreamDestroyProxyImplementation calls GCHandle.FromIntPtr(context) to recover the managed object. In IIS multi-site/single-pool configurations, .NET Framework creates a separate AppDomain per site, so the GCHandle created in AppDomain A is dereferenced from AppDomain B, violating .NET's AppDomain isolation rules and throwing ArgumentException.", "rationale": "This is a real bug specific to .NET Framework multi-AppDomain hosting (IIS multi-site, single pool). It is NOT a usage error — the reporter's code is standard and correct. The root cause is that GCHandle.FromIntPtr fails when called from a different AppDomain than the one that called GCHandle.Alloc. This constraint does not exist in .NET Core / .NET 5+ which do not support multiple AppDomains. The regression from 2.88.2 likely corresponds to a change in how DelegateProxies.CreateUserData allocates or passes GCHandles.", "keySignals": [{"text": "Cannot pass a GCHandle across AppDomains. Parameter name: handle", "source": "issue body stack trace", "interpretation": "GCHandle.FromIntPtr called from a different AppDomain than the one that allocated it."}, {"text": "multiple sites(Use same folder for all the sites) in the local IIS Server under one application pool", "source": "issue body", "interpretation": ".NET Framework assigns each IIS site its own AppDomain when sharing a pool, triggering the cross-AppDomain GCHandle violation."}, {"text": "Last Known Good Version: 2.88.2", "source": "issue body", "interpretation": "Something changed in the GCHandle or delegate proxy wiring between 2.88.2 and 2.88.3 that introduced or exposed this problem."}, {"text": "SkiaSharp is using GCHandles to get direct access to memory", "source": "comment by mattleibow", "interpretation": "Maintainer confirms GCHandle usage is the root mechanism. A fix or workaround must address the cross-AppDomain constraint."}], "codeInvestigation": [{"file": "binding/Binding.Shared/DelegateProxies.shared.cs", "lines": "29-39", "finding": "DelegateProxies.Create() calls GCHandle.Alloc(managedDel) and stores the handle as an IntPtr. GCHandle.Alloc on .NET Framework is AppDomain-bound; the IntPtr cannot be passed back via GCHandle.FromIntPtr from a different AppDomain.", "relevance": "direct"}, {"file": "binding/SkiaSharp/DelegateProxies.stream.cs", "lines": "39-47", "finding": "SKManagedStreamDestroyProxyImplementation calls GetUserData<SKAbstractManagedStream>((IntPtr)context, out var gch) then gch.Free(). GetUserData calls GCHandle.FromIntPtr(contextPtr) which throws 'Cannot pass a GCHandle across AppDomains' when executed from a different AppDomain than the one where the GCHandle was allocated.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKAbstractManagedStream.cs", "lines": "39-43", "finding": "Constructor calls DelegateProxies.CreateUserData(this, true) which allocates the cross-AppDomain-incompatible GCHandle and passes it as the context pointer to the native managed stream.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKData.cs", "lines": "109-150", "finding": "SKData.Create(Stream) and its length-specific overloads all create a transient SKManagedStream internally and call using(...) to dispose it. This is the exact code path in the reporter's stack trace, where Dispose calls DisposeNative -> sk_managedstream_destroy -> fDestroy callback -> GCHandle.FromIntPtr.", "relevance": "direct"}], "workarounds": ["Read the stream to a byte[] first and use SKData.CreateCopy(byte[]) — this bypasses SKManagedStream and GCHandle allocation entirely.", "Configure each IIS site to use its own dedicated application pool instead of sharing one — prevents cross-AppDomain GCHandle access."], "nextQuestions": ["What changed in SKAbstractManagedStream or DelegateProxies between 2.88.2 and 2.88.3 that introduced the regression?", "Does the issue affect .NET Framework 4.8 only, or also older target frameworks?", "Could the GCHandle allocation be made AppDomain-aware using AppDomain.CurrentDomain identity checks or by marshaling through the target AppDomain?"], "resolution": {"hypothesis": "GCHandle.Alloc and GCHandle.FromIntPtr are AppDomain-bound in .NET Framework. The fix must either avoid GCHandles in the managed stream callback path or add a guard that detects and handles cross-AppDomain access.", "proposals": [{"title": "Workaround: use byte array instead of stream", "description": "Read the input stream to a byte[] before calling SkiaSharp APIs. SKData.CreateCopy(byte[]) uses no managed stream wrapper and no GCHandle, so it is safe in multi-AppDomain IIS setups.", "category": "workaround", "codeSnippet": "byte[] imageBytes;\nusing (var ms = new MemoryStream())\n{\n    imageData.CopyTo(ms);\n    imageBytes = ms.ToArray();\n}\nusing (SKData skImgData = SKData.CreateCopy(imageBytes))\n{\n    skImgData.SaveTo(outputStream);\n}", "confidence": 0.95, "effort": "cost/xs", "validated": "yes"}, {"title": "Fix: add AppDomain guard in GetUserData / gch.Free", "description": "Before calling GCHandle.FromIntPtr, check whether the current AppDomain matches the allocating AppDomain. If not, skip the free (accept a handle leak) or marshal the free back to the correct AppDomain. This is only needed on .NET Framework; .NET 5+ is unaffected.", "category": "fix", "confidence": 0.55, "effort": "cost/m", "validated": "untested"}, {"title": "Fix: replace GCHandle with a ConcurrentDictionary keyed by IntPtr", "description": "Store managed objects in a static ConcurrentDictionary<IntPtr, WeakReference> instead of GCHandles. This is AppDomain-transparent since the dictionary is in a shared AppDomain or accessed through a static field. Requires generating a unique stable IntPtr key per instance.", "category": "fix", "confidence": 0.5, "effort": "cost/l", "validated": "untested"}], "recommendedProposal": "Workaround: use byte array instead of stream", "recommendedReason": "Immediately actionable by the reporter with no SkiaSharp changes required and full confidence. The architectural fix should also be investigated but requires deeper design work."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.85, "reason": "Real bug with complete repro, clear root cause (cross-AppDomain GCHandle), and a confirmed workaround. Root cause of the 2.88.2→2.88.3 regression needs to be identified before a proper fix can be implemented.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp, os/Windows-Classic, tenet/reliability labels", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "tenet/reliability"]}, {"type": "add-comment", "description": "Explain root cause and provide byte-array workaround", "risk": "medium", "confidence": 0.9, "comment": "Thanks for the detailed report and reproduction sample.\n\n**Root cause:** SkiaSharp uses `GCHandle.Alloc` to store a reference to the managed stream object and passes the resulting `IntPtr` to native Skia code as a callback context. When the native destroy callback fires, it calls `GCHandle.FromIntPtr` to recover the managed object. On .NET Framework, `GCHandle` is AppDomain-bound — a handle allocated in AppDomain A cannot be resolved from AppDomain B. When IIS hosts multiple sites in a single application pool, .NET Framework creates a separate AppDomain per site, so the callback can arrive from a different AppDomain than the one that allocated the handle, causing the `ArgumentException`.\n\n**Workaround (immediate):** Avoid passing a `Stream` directly to `SKData.Create`. Instead, read the stream to a `byte[]` first and use `SKData.CreateCopy`, which does not create a managed stream wrapper and therefore does not allocate any `GCHandle`:\n\n```csharp\nbyte[] imageBytes;\nusing (var ms = new MemoryStream())\n{\n    imageData.CopyTo(ms);\n    imageBytes = ms.ToArray();\n}\nusing (SKData skImgData = SKData.CreateCopy(imageBytes))\n{\n    skImgData.SaveTo(outputStream);\n}\n```\n\n**Alternative configuration workaround:** Configure each IIS site to use its own dedicated application pool. This prevents multiple AppDomains from sharing the same native module and eliminates the cross-domain GCHandle access.\n\nWe'll investigate the regression from 2.88.2 to 2.88.3 to understand what changed and whether a proper fix can be made in the library. Note that this issue is specific to .NET Framework — .NET 5+ does not support multiple AppDomains and is unaffected."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
