<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3040, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T14:36:49Z", "currentLabels": ["type/bug", "type/question", "os/Windows-Classic", "area/libSkiaSharp.native", "status/needs-attention", "triage/triaged"]}, "summary": "User is calling C# SkiaSharp code from Python via pythonnet (clr), getting DllNotFoundException for libSkiaSharp because the native Win32 DLL is not on Windows' DLL search path when running under Python — a deployment/configuration issue specific to the pythonnet scenario.", "classification": {"type": {"value": "type/question", "confidence": 0.78}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.9}, "platforms": ["os/Windows-Classic"]}, "evidence": {"reproEvidence": {"stepsToReproduce": ["Create a .NET Standard 2.0 library using SkiaSharp 2.88.8", "Load managed DLLs from .nuget packages folder via pythonnet clr.AddReference()", "Attempt to call SkiaSharp API from Python", "DllNotFoundException is thrown for libSkiaSharp"], "codeSnippets": ["clr.AddReference(skiasharp_dll)  # loads SkiaSharp.dll from lib/netstandard2.0 - no native binary", "DllNotFoundException: Unable to load DLL 'libSkiaSharp': The specified module could not be found. (Exception from HRESULT: 0x8007007E)"], "environmentDetails": "Windows, Python 3.9 + pythonnet (clr), SkiaSharp 2.88.8, .NET Standard 2.0, Visual Studio Code", "repoLinks": [{"url": "https://github.com/user-attachments/files/17703961/PythonWrapper.zip", "description": "Zip file with .NET application and Python code uploaded by reporter"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.8", "6.88.6"], "currentRelevance": "likely", "relevanceReason": "The issue is about native asset deployment, not a SkiaSharp API change. The 6.88.6 'Last Known Good' is deprecated and likely worked by coincidence — possibly Python's environment happened to have libSkiaSharp.dll on its PATH from another installation."}}, "analysis": {"summary": "The user is loading SkiaSharp managed assemblies from the .nuget packages cache using pythonnet, but the native libSkiaSharp.dll is not in the lib/netstandard2.0 folder — it lives under runtimes/win-x64/native/ in the NuGet package. When running through Python, Windows DLL search order applies (process directory, PATH, current directory, system dirs), and libSkiaSharp.dll must be in one of those locations. The user tried placing the DLL next to their managed DLLs but failed; this likely means an architecture mismatch (32-bit Python loading 64-bit DLL) or VC++ runtime missing, or incorrect directory.", "rationale": "This is a usage/configuration question — SkiaSharp itself is not broken. P/Invoke on Windows uses Windows DLL search order, which doesn't automatically discover files inside NuGet package subfolders. Pythonnet bypasses the normal .NET publish pipeline that would copy native assets. Classified as type/question because the behavior is by-design; the root cause is an environment deployment gap in the pythonnet workflow.", "codeInvestigation": [{"file": "binding/SkiaSharp/SkiaApi.cs", "lines": "12", "finding": "DllImport constant is 'libSkiaSharp' which on Windows resolves to libSkiaSharp.dll via Windows DLL search order (process directory, PATH, current directory, system dirs). pythonnet does not alter this search path, so the DLL must be explicitly placed in a discoverable location.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SkiaSharpVersion.cs", "lines": "22-30", "finding": "sk_version_get_milestone() is called in SkiaSharpVersion.Native property, which is invoked from SKObject..cctor() — matches the stack trace exactly (SKObject type initializer fails with DllNotFoundException on the first P/Invoke call).", "relevance": "direct"}], "keySignals": [{"text": "Unable to load DLL 'libSkiaSharp': The specified module could not be found. (Exception from HRESULT: 0x8007007E)", "source": "issue body — error log", "interpretation": "Windows error 0x8007007E (ERROR_MOD_NOT_FOUND) means the DLL file was not found on any of the Windows DLL search paths. This is a deployment issue, not a SkiaSharp defect."}, {"text": "You are loading the managed (.NET) dlls, but have not made sure the native parts are able to be found. You can't reference them directly via the CLR, but if they are in the same folder as the managed dlls, they should be found", "source": "maintainer comment (mattleibow)", "interpretation": "Maintainer correctly identified the root cause: managed DLLs load fine but native libSkiaSharp.dll is missing from discovery paths."}, {"text": "We are still getting the exception after including the native libSkiaSharp.dll", "source": "comment by DharanyaSakthivel-SF4210", "interpretation": "User placed the native DLL but it still fails. Possible causes: architecture mismatch (Python x86 vs Win32 x64 DLL), wrong directory, or missing VC++ redistributable."}, {"text": "Last Known Good Version of SkiaSharp: 6.88.6 (Deprecated)", "source": "issue body", "interpretation": "Not a true regression — 6.88.6 is very old and likely worked due to libSkiaSharp.dll being present on PATH from prior installation or different binary naming."}], "workarounds": ["Publish the .NET app with dotnet publish and use all DLLs from the publish output folder; this copies libSkiaSharp.dll alongside managed assemblies", "Copy libSkiaSharp.dll (from SkiaSharp.NativeAssets.Win32 NuGet, runtimes/win-x64/native/ subfolder) to the same directory as the Python script", "Add the directory containing libSkiaSharp.dll to the Windows PATH environment variable before running Python", "Use Python 64-bit if copying the x64 DLL; or use the x86 DLL if using 32-bit Python (architecture must match)"], "nextQuestions": ["What is the architecture of the Python installation (32-bit vs 64-bit)?", "Exactly which directory did the user copy libSkiaSharp.dll to when it still failed?", "Is the VC++ 2019/2022 redistributable installed on the Windows machine?", "What is the Python working directory when running the script?"], "resolution": {"hypothesis": "The native libSkiaSharp.dll cannot be found by Windows DLL loader because: (a) it's not in the Python process directory or PATH, OR (b) architecture mismatch between Python bitness and the DLL bitness, OR (c) VC++ redistributable is missing.", "proposals": [{"title": "Copy DLL to Python script directory (architecture-matched)", "description": "From SkiaSharp.NativeAssets.Win32 NuGet package, copy the correct libSkiaSharp.dll (x64 for 64-bit Python, x86 for 32-bit Python) to the same directory as the Python script. The DLL is under runtimes/win-x64/native/libSkiaSharp.dll (for x64) or runtimes/win-x86/native/libSkiaSharp.dll (for x86).", "category": "workaround", "confidence": 0.8, "effort": "cost/xs", "validated": "untested"}, {"title": "Use dotnet publish and load from publish output", "description": "Create a .NET 8.0 (not netstandard2.0) console or class library project, add SkiaSharp with proper NativeAssets reference, publish with dotnet publish, then point pythonnet to the published output directory. All native assets will be co-located.", "category": "fix", "confidence": 0.85, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Copy DLL to Python script directory (architecture-matched)", "recommendedReason": "Simplest immediate fix. Requires verifying Python bitness matches DLL architecture, which is also the most likely reason it failed after the user's first attempt."}}, "output": {"actionability": {"suggestedAction": "needs-info", "confidence": 0.8, "reason": "The maintainer's guidance was correct but the user still fails after placing the DLL. To diagnose further we need to know the Python architecture (32-bit vs 64-bit) and exactly where the DLL was placed. The architecture mismatch is the most likely cause of continued failure.", "suggestedReproPlatform": "windows"}, "missingInfo": ["Python installation architecture: is the Python interpreter 32-bit (x86) or 64-bit (x64)?", "Exact directory path where libSkiaSharp.dll was copied when the failure persisted", "Whether VC++ 2019 or 2022 redistributable is installed", "Which subfolder of the NuGet package was the DLL taken from (runtimes/win-x64/ vs runtimes/win-x86/)"], "actions": [{"type": "update-labels", "description": "Correct labels: remove duplicate type/bug (this is a question/usage issue), keep type/question and area/libSkiaSharp.native and os/Windows-Classic", "risk": "low", "confidence": 0.78, "labels": ["type/question", "area/libSkiaSharp.native", "os/Windows-Classic"]}, {"type": "add-comment", "description": "Ask reporter for Python architecture details and explain architecture mismatch as likely cause", "risk": "medium", "confidence": 0.8, "comment": "Thanks for providing the sample zip! To help diagnose why it still fails after placing `libSkiaSharp.dll`, we need a few more details:\n\n1. **Python architecture**: Are you running 32-bit (x86) or 64-bit (x64) Python? You can check with: `python -c \"import struct; print(struct.calcsize('P') * 8, 'bit')\"`\n2. **Which DLL did you copy**: From the `SkiaSharp.NativeAssets.Win32` NuGet package, there are architecture-specific DLLs:\n   - `runtimes/win-x64/native/libSkiaSharp.dll` — for 64-bit Python\n   - `runtimes/win-x86/native/libSkiaSharp.dll` — for 32-bit Python\n3. **Where did you copy it**: The DLL must be in the same directory as your Python script, or in a directory listed in your system `PATH`.\n\nThe most common cause of continued failure after placing the DLL is an **architecture mismatch** — 64-bit Python cannot load a 32-bit DLL and vice versa. Make sure the DLL matches your Python bitness.\n\nAlso, make sure the [VC++ 2019 or 2022 Redistributable](https://learn.microsoft.com/en-us/cpp/windows/latest-supported-vc-redist) is installed, as `libSkiaSharp.dll` depends on it."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
