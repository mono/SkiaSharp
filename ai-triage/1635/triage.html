<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1635, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-23T19:17:37Z"}, "summary": "SkiaSharp 2.80.3-preview.40 crashes in AWS Lambda with 'undefined symbol: FcConfigGetSysRoot' because the standard SkiaSharp.NativeAssets.Linux package requires fontconfig which is not installed in the Lambda environment; fixed by switching to SkiaSharp.NativeAssets.Linux.NoDependencies.", "classification": {"type": {"value": "type/bug", "confidence": 0.82}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.92}, "platforms": ["os/Linux"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": true, "errorType": "crash", "errorMessage": "dotnet: symbol lookup error: /var/task/libSkiaSharp.so: undefined symbol: FcConfigGetSysRoot", "reproQuality": "complete", "targetFrameworks": ["netcoreapp2.1"]}, "reproEvidence": {"stepsToReproduce": ["Create an AWS Lambda function targeting ASP.NET Core 2.1", "Add SkiaSharp 2.80.3-preview.40 and SkiaSharp.NativeAssets.Linux 2.80.3-preview.40", "Use SKSurface/SKCanvas to draw and encode an image", "Deploy and invoke the function — observe crash in CloudWatch Logs"], "environmentDetails": "AWS Lambda, .NET Core 2.1, SkiaSharp 2.80.3-preview.40, SkiaSharp.NativeAssets.Linux 2.80.3-preview.40", "relatedIssues": [964, 833], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/1635#issuecomment-798896169", "description": "Maintainer suggests NoDependencies package"}, {"url": "https://github.com/mono/SkiaSharp/issues/1635#issuecomment-802542634", "description": "Reporter confirms NoDependencies resolves the issue"}]}, "versionAnalysis": {"mentionedVersions": ["2.80.3-preview.40", "1.68.3"], "workedIn": "1.68.3", "brokeIn": "2.80.3-preview.40", "currentRelevance": "unlikely", "relevanceReason": "Reporter confirmed the issue is resolved by using SkiaSharp.NativeAssets.Linux.NoDependencies. The workaround is now documented in packages.md."}, "regression": {"isRegression": true, "confidence": 0.75, "reason": "SkiaSharp 1.68.3 worked on AWS Lambda; 2.80.x added fontconfig as a runtime dependency in the standard Linux native assets package. The NoDependencies variant was introduced to handle this split.", "workedInVersion": "1.68.3", "brokeInVersion": "2.80.3-preview.40"}, "fixStatus": {"likelyFixed": true, "confidence": 0.95, "reason": "Reporter confirmed issue resolved by switching to SkiaSharp.NativeAssets.Linux.NoDependencies v2.80.2. This package intentionally excludes the fontconfig dependency."}}, "analysis": {"summary": "The SkiaSharp.NativeAssets.Linux package is dynamically linked against fontconfig (libfontconfig.so.1) for system font discovery. AWS Lambda's minimal Linux environment does not include fontconfig, causing a symbol lookup failure on startup. The NoDependencies variant of the package builds libSkiaSharp.so without the fontconfig linkage and is designed exactly for minimal/serverless containers. The reporter resolved this by switching packages. A separate concern raised in comments — SKTypeface.Default returning an empty FamilyName and MeasureText returning 0 in .NET Core 3.1 with NoDependencies — is expected: without fontconfig or system fonts, no font families are discovered. Explicit font loading via SKTypeface.FromFile/FromData is required.", "rationale": "Bug classification is warranted because the behavior changed between 1.68.3 and 2.80.x due to fontconfig being added as a dynamic dependency. close-as-not-a-bug is appropriate because: (1) the NoDependencies package resolves it, (2) the reporter confirmed the fix, (3) the behavior is intentional and documented. The codeInvestigation confirms the build is intentionally split into two variants.", "codeInvestigation": [{"file": "binding/SkiaSharp.NativeAssets.Linux.NoDependencies/SkiaSharp.NativeAssets.Linux.NoDependencies.csproj", "finding": "Package notes explicitly state that fontconfig is an excluded dependency and the NoDependencies variant only requires libc/libm/libpthread/libdl. This package is designed for minimal container environments.", "relevance": "direct"}, {"file": "native/linux/build.cake", "lines": "98", "finding": "The bionic (NoDependencies) build variant passes skia_use_fontconfig=false to the Skia build system, confirming fontconfig is intentionally excluded.", "relevance": "direct"}, {"file": "documentation/dev/packages.md", "lines": "86-87", "finding": "documentation/dev/packages.md explicitly documents that SkiaSharp.NativeAssets.Linux 'Requires fontconfig (libfontconfig.so.1) for system font enumeration' and that the NoDependencies variant is 'Designed for minimal containers'. AWS Lambda falls squarely in this category.", "relevance": "context"}], "keySignals": [{"text": "dotnet: symbol lookup error: /var/task/libSkiaSharp.so: undefined symbol: FcConfigGetSysRoot", "source": "issue body (CloudWatch screenshot)", "interpretation": "The standard libSkiaSharp.so is dynamically linked against fontconfig; FcConfigGetSysRoot is a fontconfig API. AWS Lambda has no fontconfig installed."}, {"text": "Seems like regression in latest", "source": "issue body", "interpretation": "In 1.68.x, SkiaSharp.NativeAssets.Linux did not require fontconfig. Starting in 2.x, the standard package was linked against fontconfig for better system font support, and the NoDependencies variant was introduced for minimal environments."}, {"text": "I have removed SkiaSharp.NativeAssets.Linux from my project. Then installed Sharp.NativeAssets.Linux.NoDependencies v2.80.2. Now working fine.", "source": "comment by reporter", "interpretation": "Confirmed workaround. The NoDependencies package resolves the AWS Lambda crash."}, {"text": "FamilyName returns empty string and MeasureText returns 0 in .NET Core 3.1", "source": "comment by RamarajMarimuthu", "interpretation": "Separate concern: without system fonts and no fontconfig, SKTypeface.Default has no font family. Fonts must be explicitly loaded in minimal container environments."}], "workarounds": ["Replace SkiaSharp.NativeAssets.Linux with SkiaSharp.NativeAssets.Linux.NoDependencies", "For text rendering after switching to NoDependencies, load fonts explicitly using SKTypeface.FromFile() or SKTypeface.FromData() since system fonts are not available in AWS Lambda"], "nextQuestions": ["The secondary question about SKTypeface.Default returning empty FamilyName in .NET 3.1 with NoDependencies — is this a .NET runtime version difference or expected behavior in all versions?", "Should there be a documentation note or NuGet package description hint pointing Lambda/container users to NoDependencies?"], "resolution": {"hypothesis": "The standard SkiaSharp.NativeAssets.Linux package has a runtime dependency on fontconfig which is absent in AWS Lambda. The NoDependencies variant was created for exactly this scenario.", "proposals": [{"title": "Switch to NoDependencies package", "description": "Replace SkiaSharp.NativeAssets.Linux with SkiaSharp.NativeAssets.Linux.NoDependencies in the application project. For text/font operations, load fonts explicitly using SKTypeface.FromFile() or SKTypeface.FromData().", "category": "workaround", "confidence": 0.98, "effort": "cost/xs", "validated": "yes"}, {"title": "Install fontconfig in Lambda layer", "description": "Add a Lambda layer that includes fontconfig (libfontconfig.so.1) so the standard package can load. This is more complex and not recommended for minimal serverless deployments.", "category": "alternative", "confidence": 0.8, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Switch to NoDependencies package", "recommendedReason": "Confirmed working by reporter. Minimal effort, zero external dependencies, and aligns with AWS Lambda's minimal execution environment."}}, "output": {"actionability": {"suggestedAction": "close-as-not-a-bug", "confidence": 0.9, "reason": "The crash is caused by using SkiaSharp.NativeAssets.Linux (which requires fontconfig) in an environment without fontconfig. The NoDependencies variant resolves the issue, as confirmed by the reporter. This is documented behavior.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, native Linux, and compatibility labels", "risk": "low", "confidence": 0.92, "labels": ["type/bug", "area/libSkiaSharp.native", "os/Linux", "tenet/compatibility"]}, {"type": "add-comment", "description": "Explain root cause and provide confirmed workaround, address secondary font issue", "risk": "medium", "confidence": 0.9, "comment": "Thanks for the detailed report and for following up with the fix!\n\nThe root cause is that `SkiaSharp.NativeAssets.Linux` is dynamically linked against **fontconfig** (`libfontconfig.so.1`) for system font enumeration. AWS Lambda's minimal environment does not include fontconfig, causing the `FcConfigGetSysRoot` symbol lookup failure.\n\nIn SkiaSharp 1.x the standard Linux package did not require fontconfig; starting in 2.x fontconfig was added for improved font support, and the `SkiaSharp.NativeAssets.Linux.NoDependencies` package was introduced for minimal/serverless environments.\n\n**Confirmed fix:** Replace `SkiaSharp.NativeAssets.Linux` with **`SkiaSharp.NativeAssets.Linux.NoDependencies`** — this build excludes all third-party dependencies (only requires libc/libm/libpthread/libdl).\n\n**Note on `MeasureText` returning 0 / empty `SKTypeface.Default.FamilyName` in .NET Core 3.1:** When using NoDependencies in a container without any system fonts, `SKFontManager` finds no font families, so `SKTypeface.Default` has no underlying typeface. To measure or render text, load a font explicitly:\n```csharp\nusing var typeface = SKTypeface.FromFile(\"/path/to/your-font.ttf\");\nusing var paint = new SKPaint { Typeface = typeface };\nfloat width = paint.MeasureText(\"Simple\");\n```\nYou can embed a font as an embedded resource and load it via `SKTypeface.FromData(SKData.CreateCopy(bytes))`.\n\nClosing as by-design — the `NoDependencies` package is the supported solution for Lambda/container deployments."}, {"type": "close-issue", "description": "Close as not a bug — resolved by NoDependencies package", "risk": "medium", "confidence": 0.88, "stateReason": "not_planned"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
