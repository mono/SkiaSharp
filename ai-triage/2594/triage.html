<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2594, "repo": "mono/SkiaSharp", "analyzedAt": "2026-05-04T21:42:58Z", "currentLabels": ["type/bug"]}, "summary": "Font rendering quality is visibly worse on Linux Docker (SkiaSharp 2.88.3) than on Windows when using Neodynamic thermal label library with NativePrinterFont aliases, producing degraded text glyphs in the output image.", "classification": {"type": {"value": "type/bug", "confidence": 0.82}, "area": {"value": "area/SkiaSharp", "confidence": 0.8}, "platforms": ["os/Linux"], "backends": ["backend/Raster"], "tenets": ["tenet/compatibility"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "wrong-output", "errorMessage": "Font glyphs rendered with lower quality on Linux Docker vs Windows", "reproQuality": "partial", "targetFrameworks": ["net6.0"]}, "reproEvidence": {"stepsToReproduce": ["Run microservice using Neodynamic thermal label library on Windows — labels render correctly", "Run same microservice in Docker Linux container — text appears degraded/lower quality", "Compare output images: Windows version shows sharp font rendering; Linux version shows degraded rendering"], "environmentDetails": "SkiaSharp 2.88.3, Visual Studio (Windows IDE), Linux Docker container", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/1131", "description": "Related: Can't draw text using default typeface on Linux (fontconfig/NoDependencies issue)"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.3"], "currentRelevance": "likely", "relevanceReason": "Font rendering on Linux is determined by which NativeAssets package is used and whether fontconfig is available. This has not fundamentally changed since 2.88.3."}}, "analysis": {"summary": "Rendering quality difference between Windows and Linux Docker for text using 'NativePrinterFontA/B' aliases. These are Neodynamic-internal font references that SkiaSharp resolves differently on each platform: Windows uses DirectWrite with system fonts and font hinting; Linux without fontconfig (NoDependencies package) falls back to Skia's built-in minimal font with no hinting, producing coarser glyph rendering. The root cause is likely either (1) missing fontconfig support in the Linux NativeAssets package used, or (2) inherent cross-platform rendering differences in Skia's font rendering backends (DirectWrite on Windows vs FreeType on Linux).", "rationale": "Reporter provides screenshot showing visual rendering difference (not a crash or exception). The issue is clearly wrong/degraded output. The 'NativePrinterFontA/B' are Neodynamic's own font aliases for Zebra printer protocol fonts — they're not real system fonts. On Linux without fontconfig, Skia cannot enumerate system fonts and falls back to built-in fonts, producing poor rendering. This is a known Linux font rendering pattern in SkiaSharp. Classified as type/bug because the API contract (consistent rendering) is not met, and area/SkiaSharp because it's the core text rendering layer.", "keySignals": [{"text": "why under Linux the rendering seems to not be as good as under Windows it's something outside our scope. The rendering part is performed by the SkiaSharp dependency.", "source": "issue body — Neodynamic vendor response", "interpretation": "Vendor confirms SkiaSharp is responsible for the actual rendering difference. Font glyphs are the same; quality difference is in the rendering layer."}, {"text": "Font=\"NativePrinterFontA,1,Point,,,False,90,,CP850\"", "source": "issue body — ThermalLabel template XML", "interpretation": "NativePrinterFontA/B are Zebra ZPL protocol font aliases, not real system fonts. Neodynamic likely substitutes these with a system font. On Linux without fontconfig, the substitution may fail or produce a low-quality fallback."}, {"text": "running microservice in docker Linux environment", "source": "issue body", "interpretation": "Docker Linux containers typically use NoDependencies package (no fontconfig), which affects font enumeration and rendering quality."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKTypeface.cs", "lines": "29-33", "finding": "Default typeface resolution uses sk_fontmgr_legacy_create_typeface with null family name. On Linux without fontconfig (NoDependencies package), SKFontManager cannot enumerate system fonts and falls back to Skia's built-in empty/minimal typeface. This produces visible rendering quality differences compared to Windows (DirectWrite).", "relevance": "direct"}, {"file": "documentation/dev/packages.md", "lines": "86-87", "finding": "NativeAssets.Linux.NoDependencies has 'no fontconfig, no third-party deps — Fonts must be loaded explicitly.' This is the recommended Docker package but it explicitly lacks fontconfig, which is required for system font enumeration. Without fontconfig, unknown font aliases like NativePrinterFontA fall back to a built-in font with no hinting.", "relevance": "direct"}], "workarounds": ["If using SkiaSharp.NativeAssets.Linux.NoDependencies, switch to SkiaSharp.NativeAssets.Linux and install libfontconfig1 in the Docker image (apt-get install -y libfontconfig1). This enables proper font enumeration and improves rendering quality.", "Install fonts that match the substitution target on Linux (e.g., apt-get install -y fonts-liberation fonts-dejavu) to improve font fallback quality.", "Contact Neodynamic to ask which actual SKTypeface/font name is being passed to SkiaSharp for NativePrinterFontA/B — then embed that font explicitly in the Docker image."], "nextQuestions": ["Which SkiaSharp Linux NativeAssets package is being used? (NativeAssets.Linux vs NativeAssets.Linux.NoDependencies)", "What is the Docker base image (mcr.microsoft.com/dotnet/aspnet, Alpine, etc.)?", "Is libfontconfig1 installed in the Docker container?", "What actual font name/file does Neodynamic use for NativePrinterFontA/B on Windows?"], "resolution": {"hypothesis": "Linux Docker container likely uses NoDependencies package (no fontconfig), causing font fallback to Skia's built-in minimal typeface for unknown 'NativePrinterFontA/B' font aliases. On Windows, DirectWrite resolves these to a system font with proper hinting.", "proposals": [{"title": "Switch to NativeAssets.Linux with fontconfig", "description": "Change the Linux NativeAssets package from NoDependencies to SkiaSharp.NativeAssets.Linux, and add libfontconfig1 to the Docker image. This enables proper system font enumeration, which improves fallback quality for unrecognized font names.", "category": "workaround", "confidence": 0.75, "effort": "cost/xs", "validated": "untested"}, {"title": "Install fonts in Docker image", "description": "Install common font packages in the Docker image (e.g., apt-get install -y fonts-liberation fonts-dejavu-core). Even with NoDependencies, if font files are present in standard locations and fontconfig is available, font substitution quality improves.", "category": "workaround", "confidence": 0.65, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Switch to NativeAssets.Linux with fontconfig", "recommendedReason": "Most likely root cause is absence of fontconfig causing poor font fallback. Switching packages is a low-effort change that directly addresses the likely root cause."}}, "output": {"actionability": {"suggestedAction": "needs-info", "confidence": 0.78, "reason": "Issue reports a real rendering difference with a screenshot, but critical information is missing: which Linux NativeAssets package is used, whether fontconfig is installed, and what the Docker base image is. The issue is routed through a third-party library (Neodynamic), making it difficult to confirm SkiaSharp is the actual root cause without more info.", "suggestedReproPlatform": "linux"}, "missingInfo": ["Which SkiaSharp Linux NativeAssets package is used: NativeAssets.Linux or NativeAssets.Linux.NoDependencies?", "Docker base image name and version", "Is libfontconfig1 installed in the container?", "Direct minimal SkiaSharp repro code (without Neodynamic) showing the rendering difference"], "actions": [{"type": "update-labels", "description": "Apply bug, SkiaSharp, Linux labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp", "os/Linux", "tenet/compatibility"]}, {"type": "add-comment", "description": "Request missing info and suggest fontconfig workaround", "risk": "medium", "confidence": 0.78, "comment": "Thanks for the report and the screenshot — the rendering difference is clearly visible.\n\nFont rendering quality on Linux depends heavily on which SkiaSharp native package is deployed. Could you share:\n\n1. **Which Linux NativeAssets package** are you using? (`SkiaSharp.NativeAssets.Linux` or `SkiaSharp.NativeAssets.Linux.NoDependencies`)\n2. **Docker base image** (e.g., `mcr.microsoft.com/dotnet/aspnet:6.0`, Alpine, etc.)\n3. **Is `libfontconfig1` installed** in the container?\n\n**Likely workaround to try:**\n\nIf you're using `SkiaSharp.NativeAssets.Linux.NoDependencies` (common in minimal containers), it has **no fontconfig support**, which means SkiaSharp cannot enumerate system fonts. Unknown font names like `NativePrinterFontA` may fall back to a built-in minimal typeface with no hinting, causing the degraded rendering you see.\n\nTry switching to `SkiaSharp.NativeAssets.Linux` and adding `libfontconfig1` to your Docker image:\n\n```dockerfile\nRUN apt-get update && apt-get install -y libfontconfig1 fonts-liberation\n```\n\nThis enables proper font enumeration and should improve rendering quality."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
