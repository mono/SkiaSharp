<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 1223, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-23T17:44:06Z"}, "summary": "Reporter experiences an AccessViolationException when drawing polygons and text concurrently using DrawPath and DrawTextOnPath across multiple threads in release mode on SkiaSharp 1.68.", "classification": {"type": {"value": "type/bug", "confidence": 0.88}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "crash", "errorMessage": "Access violation exception when calling DrawPath/DrawTextOnPath in multithreaded release build", "reproQuality": "none", "targetFrameworks": []}, "reproEvidence": {"stepsToReproduce": ["Use SkiaSharp 1.68 in a multithreaded application", "Create SKPath objects and draw them using DrawPath in multiple threads simultaneously", "Mix polygon drawing (DrawPath) and text-on-path drawing (DrawTextOnPath) in the same concurrent workload", "Run in Release configuration (not Debug)", "Observe AccessViolationException — more likely with dense data"], "environmentDetails": "SkiaSharp 1.68, release mode, multithreaded polygon + text drawing", "relatedIssues": [1220], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/1220", "description": "Related multithreaded GC crash with SKShaper/SKTypeface — fixed in v1.68.2"}]}, "versionAnalysis": {"mentionedVersions": ["1.68"], "currentRelevance": "unlikely", "relevanceReason": "Maintainer attributed the crash class to GC collections. Companion issue #1220 (same symptom class) was fixed in v1.68.2. Current codebase is significantly newer (v3.x era) and has GC.KeepAlive guards in several areas."}, "fixStatus": {"likelyFixed": true, "confidence": 0.72, "reason": "Maintainer explicitly linked to #1220 as the likely culprit. Issue #1220 was closed as completed in milestone v1.68.2. Maintainer suggested preview.55 had the fix. Reporter never confirmed outcome.", "relatedPRs": [], "fixedInVersion": "1.68.2"}}, "analysis": {"summary": "Access violation from GC prematurely collecting SkiaSharp objects (SKTypeface, SKPath, SKPaint) while they are still referenced by in-flight native calls in a multithreaded, release-optimized build. Maintainer linked this to issue #1220 (same crash class), which was fixed in v1.68.2 by adding GC lifecycle guards.", "rationale": "Reporter describes a hard crash (access violation) only in release mode — the classic .NET JIT optimizer allowing the GC to finalize objects whose managed handles were extracted before the native call completed. Maintainer corroborated: 'often due to some GC collections — I believe we have the general cases fixed in the new previews.' Related issue #1220 with identical symptom pattern (multithreaded, typeface handle nulled mid-call) was closed as fixed in v1.68.2. Reporter was on 1.68 and never confirmed whether updating resolved it.", "codeInvestigation": [{"file": "binding/SkiaSharp/SKCanvas.cs", "lines": "405-412", "finding": "DrawPath extracts path.Handle and paint.Handle directly and passes them to the native call. No GC.KeepAlive guard. In release mode with aggressive JIT, the GC can consider the parameter objects dead after their .Handle property is read. Contrast: SKData, SKImage, and SKBitmap all have explicit GC.KeepAlive guards in similar patterns.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKObject.cs", "lines": "259-276", "finding": "Dispose(bool) sets Handle = IntPtr.Zero after releasing native memory. If a GC finalizer runs concurrently while a native call holds the pointer value, the pointer value is already passed but the finalizer can free the underlying memory, causing the access violation.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKData.cs", "lines": "167-191", "finding": "SKData uses GC.KeepAlive(stream) explicitly to prevent premature GC collection of managed objects passed to native code — confirms this is a known pattern in the codebase and the fix class for #1220.", "relevance": "related"}, {"file": "binding/SkiaSharp/SKCanvas.cs", "lines": "697-716", "finding": "DrawTextOnPath (the API the reporter also mentions) internally calls DrawPath, so it shares the same potential GC vulnerability for the path and font objects.", "relevance": "related"}], "keySignals": [{"text": "I use Draw path to draw polygons with multithreading... I get an access violation exception. This only happens in release and not in debug.", "source": "issue body", "interpretation": "Release-only crash is the defining signal for GC optimizer interaction — debug builds disable many JIT optimizations that allow object liveness to be shortened."}, {"text": "We have noticed a few of these - often due to some GC collections. I believe we have the general cases fixed in the new previews.", "source": "comment by mattleibow", "interpretation": "Maintainer confirms root cause class (GC) and implies fix in 1.68.2-preview."}, {"text": "The text... Might be https://github.com/mono/SkiaSharp/issues/1220", "source": "comment by mattleibow", "interpretation": "Maintainer directly links this to #1220 (multithreaded GC crash with SKTypeface), which was fixed in v1.68.2."}, {"text": "It is quite difficult to produce a minimal case, as it is data specific.", "source": "comment by reporter", "interpretation": "No minimal repro available — makes verification impossible without reporter confirming the fix."}], "workarounds": ["Upgrade to SkiaSharp 1.68.2 or later where GC lifecycle fixes were applied.", "Ensure each thread creates and disposes its own SKCanvas, SKPath, and SKPaint objects independently — never share mutable SkiaSharp objects across threads.", "Hold explicit references to all SkiaSharp objects for the lifetime of the native operation (avoid letting objects go out of scope before the drawing call returns).", "In extreme cases, wrap drawing loops with GC.KeepAlive(path) and GC.KeepAlive(paint) after each DrawPath call as a local guard."], "nextQuestions": ["Did the reporter verify whether 1.68.2 or later resolved the crash?", "Is the crash still reproducible on current SkiaSharp (v2.x/v3.x)?", "Were any objects being shared across threads (e.g., a shared SKPaint or SKPath), or was each thread truly independent?"], "resolution": {"hypothesis": "GC collected SKPath or SKPaint objects mid-draw in a multithreaded release build. The 1.68.2 GC lifecycle fixes (same fix that resolved #1220) likely addressed the general case.", "proposals": [{"title": "Confirm resolution via 1.68.2+", "description": "Ask the reporter to confirm whether upgrading to SkiaSharp 1.68.2 or later resolved the crash. Current codebase is v3.x and well past the fix.", "category": "investigation", "confidence": 0.72, "effort": "cost/xs", "validated": "untested"}, {"title": "Workaround: thread-local SkiaSharp objects", "description": "Each thread must own and manage its own SKCanvas, SKPath, SKPaint, and SKFont objects. Do not share mutable SkiaSharp objects across threads.", "category": "workaround", "confidence": 0.9, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Confirm resolution via 1.68.2+", "recommendedReason": "Maintainer already pointed at the fix in preview builds. Highest-value action is confirming the reporter is unblocked."}}, "output": {"actionability": {"suggestedAction": "needs-info", "confidence": 0.75, "reason": "Maintainer linked the crash to GC issue #1220 (fixed in v1.68.2) and suggested a preview build. Reporter never confirmed whether the fix resolved it. Ask the reporter to verify on current release before closing.", "suggestedReproPlatform": "linux"}, "missingInfo": ["Confirmation that SkiaSharp 1.68.2+ (or current v2/v3 release) still exhibits the crash", "Whether objects were being shared across threads or each thread had its own independent objects", "Stack trace or crash log from the access violation"], "actions": [{"type": "update-labels", "description": "Apply bug, core SkiaSharp, and reliability tenet labels", "risk": "low", "confidence": 0.9, "labels": ["type/bug", "area/SkiaSharp", "tenet/reliability"]}, {"type": "add-comment", "description": "Ask reporter to confirm whether the 1.68.2 GC fix resolved their issue, and provide threading guidance", "risk": "medium", "confidence": 0.75, "comment": "Thanks for the report! The symptoms here (release-only crash during multithreaded drawing) match a class of GC lifetime bugs that were addressed in **SkiaSharp 1.68.2** — see the related fix in #1220.\n\nCould you confirm:\n1. Did upgrading to 1.68.2 (or any later version) resolve the crash for you?\n2. Are each of your threads creating their own independent `SKCanvas`, `SKPath`, and `SKPaint` objects, or are any of these shared between threads?\n\nAs a general threading rule: **SkiaSharp objects are not thread-safe**. Each thread must own and manage its own drawing objects. Sharing a `SKPaint` or `SKPath` across threads without synchronization can cause exactly this kind of crash.\n\nIf the issue still occurs on a current release (v2.x or v3.x), please share a stack trace or minimal repro so we can investigate further."}, {"type": "link-related", "description": "Cross-reference the related GC fix issue #1220", "risk": "low", "confidence": 0.92, "linkedIssue": 1220}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
