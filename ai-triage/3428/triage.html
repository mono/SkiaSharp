<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3428, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-26T23:03:27Z", "currentLabels": ["type/bug", "os/iOS", "area/SkiaSharp.Views.Maui", "tenet/reliability"]}, "summary": "SKGLView fails to render on iOS under .NET 10 MAUI with 'Failed to bind EAGLDrawable' errors, resulting in a white canvas; worked in SkiaSharp 2.88.9 / .NET 9.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/SkiaSharp.Views.Maui", "confidence": 0.92}, "platforms": ["os/iOS"], "backends": ["backend/OpenGL"], "tenets": ["tenet/reliability", "tenet/compatibility"], "partner": "partner/maui"}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": true, "errorType": "wrong-output", "errorMessage": "Failed to bind EAGLDrawable: <CAEAGLLayer: 0x600001767a40> to GL_RENDERBUFFER 1 / Failed to make complete multisample framebuffer object 8cd6 / Failed to make complete framebuffer object 8cd6", "reproQuality": "partial", "targetFrameworks": ["net10.0-ios"]}, "reproEvidence": {"stepsToReproduce": ["Create a MAUI app using SKGLView (or the Mapsui MapControl which uses SKGLView internally)", "Run on iOS device or simulator targeting .NET 10", "Observe white canvas and 'Failed to bind EAGLDrawable' errors in log"], "environmentDetails": "SkiaSharp 3.116.0, MAUI, .NET 10, iOS, Visual Studio for macOS", "repoLinks": [{"url": "https://github.com/Mapsui/Mapsui/blob/main/Mapsui.UI.Maui/MapControl.cs", "description": "Mapsui MapControl using SKGLView and SKCanvasView on MAUI"}, {"url": "https://github.com/mono/SkiaSharp/issues/646", "description": "Related older Xamarin.Forms issue with same EAGLDrawable error on SKGLView iOS (#646, closed)"}], "relatedIssues": [646, 2840]}, "versionAnalysis": {"mentionedVersions": ["3.116.0", "2.88.9"], "workedIn": "2.88.9", "brokeIn": "3.116.0", "currentRelevance": "likely", "relevanceReason": "Issue specifically tied to .NET 10 target; same code reportedly works on .NET 9 with SkiaSharp 3.116.0."}, "regression": {"isRegression": true, "confidence": 0.85, "reason": "Reporter explicitly states this worked in SkiaSharp 2.88.9 and .NET 9, but is broken in SkiaSharp 3.116.0 on .NET 10. The EAGLDrawable/OpenGL ES path is the same but .NET 10 Apple platform SDK may have tightened restrictions on the deprecated EAGL API.", "workedInVersion": "2.88.9", "brokeInVersion": "3.116.0"}}, "analysis": {"summary": "The iOS SKGLView implementation in SkiaSharp.Views uses GLKView and OpenGL ES (EAGLContext), which Apple deprecated in iOS 12 and is marked [ObsoletedOSPlatform(\"ios12.0\")] in the codebase. Under .NET 10, Apple's further removal/restriction of OpenGL ES causes the EAGLDrawable binding to fail, producing a white canvas. The fix requires either migrating the iOS GL view to Metal (MTKView) or guiding users to use SKCanvasView instead.", "rationale": "Classification as type/bug because a supported API (SKGLView) regresses between .NET versions on iOS. area/SkiaSharp.Views.Maui because the reporter's entry point is through the MAUI SKGLView handler on iOS. Backend is backend/OpenGL because the failure is in the EAGL/OpenGL ES rendering path. Severity is high because the GL view silently renders nothing — users get a white screen with no exception thrown.", "keySignals": [{"text": "Failed to bind EAGLDrawable: <CAEAGLLayer: 0x600001767a40> to GL_RENDERBUFFER 1", "source": "comment by charlenni", "interpretation": "OpenGL ES framebuffer setup is failing — Apple EAGL is not correctly binding the drawable layer, likely due to .NET 10 iOS SDK restriction on the deprecated OpenGL ES API."}, {"text": "not in .NET 9", "source": "issue body", "interpretation": "Regression is .NET 10 specific — points to an Apple/dotnet platform SDK change, not a SkiaSharp source change."}, {"text": "Last Known Good Version of SkiaSharp: 2.88.9", "source": "issue template", "interpretation": "The reporter treats this as a SkiaSharp 3.x regression; may be exacerbated by MAUI migration to .NET 10."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views/Platform/iOS/SKGLView.cs", "lines": "23-25", "finding": "SKGLView is annotated [ObsoletedOSPlatform(\"ios12.0\", \"Use 'Metal' instead.\")] and uses GLKView + EAGLContext (OpenGL ES 2). This is the path that triggers the failing EAGLDrawable binding on .NET 10 iOS.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views/Platform/iOS/SKGLView.cs", "lines": "94-102", "finding": "Initialize() creates an EAGLContext with OpenGLES2, sets DrawableMultisample to Sample4x, and wires the GLKView Delegate. The multisample framebuffer (8cd6 = GL_FRAMEBUFFER_INCOMPLETE_MULTISAMPLE) reported in the error log directly corresponds to the multisample setup here.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views.Maui/SkiaSharp.Views.Maui.Core/Handlers/SKGLView/SKGLViewHandler.iOS.cs", "lines": "1-30", "finding": "The MAUI iOS SKGLViewHandler wraps SkiaSharp.Views.iOS.SKGLView (the GLKit-based view) in a MauiSKGLView subclass. No Metal fallback path exists — if the GLKit-based SKGLView fails, there is no fallback.", "relevance": "direct"}], "nextQuestions": ["Is .NET 10 actually removing GLKit/OpenGL ES APIs or just tightening runtime restrictions on CAEAGLLayer?", "Does SKCanvasView render correctly on the same .NET 10 iOS environment (to confirm it's GL-specific)?", "Is there a Metal-based SKGLView for iOS that could serve as a replacement in MAUI?"], "workarounds": ["Switch from SKGLView to SKCanvasView in MAUI — SKCanvasView uses the Raster backend and does not depend on OpenGL ES or EAGLDrawable, so it works on all iOS versions including .NET 10.", "If GPU-accelerated rendering is required, consider using a custom Metal view (SKMetalView is available in SkiaSharp.Views for iOS) instead of SKGLView."], "resolution": {"hypothesis": "Apple deprecated OpenGL ES (GLKView/EAGLContext) in iOS 12 and .NET 10 iOS SDK further restricts or disables EAGLDrawable layer binding, causing the multisample framebuffer creation to fail silently and produce a white canvas.", "proposals": [{"title": "Migrate iOS SKGLView from GLKView/EAGL to Metal (MTKView)", "description": "Implement a Metal-backed rendering path for the iOS SKGLView to replace the deprecated GLKView/EAGLContext path. Apple's deprecation guidance recommends Metal as the successor. This would fix the issue at the source.", "category": "fix", "confidence": 0.7, "effort": "cost/l", "validated": "untested"}, {"title": "Use SKCanvasView as a workaround", "description": "For users hitting this issue, switching from SKGLView to SKCanvasView avoids the OpenGL ES path entirely. SKCanvasView uses the Raster backend (CPU rendering) and works on all iOS versions.", "category": "workaround", "confidence": 0.9, "effort": "cost/s", "validated": "untested"}], "recommendedProposal": "Use SKCanvasView as a workaround", "recommendedReason": "Immediate unblocking workaround for affected users while the longer-term Metal migration is planned. The Metal migration is correct but requires significant effort."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.85, "reason": "Real bug with log evidence showing OpenGL ES failure on .NET 10 iOS. The root cause (deprecated EAGLDrawable) is identified but needs confirmation against .NET 10 SDK release notes and a Metal migration path.", "suggestedReproPlatform": "macos"}, "missingInfo": ["Exact iOS OS version and device/simulator model", "Whether SKCanvasView renders correctly on same .NET 10 setup (to isolate GL path)", "Whether the issue also occurs on .NET 10 iOS simulator (not just device)"], "actions": [{"type": "update-labels", "description": "Apply type/bug, area/SkiaSharp.Views.Maui, os/iOS, backend/OpenGL, tenet/reliability, tenet/compatibility, partner/maui", "risk": "low", "confidence": 0.93, "labels": ["type/bug", "area/SkiaSharp.Views.Maui", "os/iOS", "backend/OpenGL", "tenet/reliability", "tenet/compatibility", "partner/maui"]}, {"type": "add-comment", "description": "Acknowledge the issue, explain the OpenGL ES deprecation context, and provide the SKCanvasView workaround", "risk": "medium", "confidence": 0.85, "comment": "Thanks for the detailed report and the additional log output!\n\nThe errors `Failed to bind EAGLDrawable` and `Failed to make complete framebuffer object 8cd6` indicate that OpenGL ES (via `GLKView`/`EAGLContext`) is failing to set up the multisample framebuffer on your .NET 10 iOS environment. `SKGLView` on iOS is built on `GLKView`, which Apple deprecated starting in iOS 12.0 — SkiaSharp's iOS `SKGLView` itself is marked `[ObsoletedOSPlatform(\"ios12.0\")]`. It appears .NET 10 further restricts this deprecated path.\n\n**Workaround:** Switch from `SKGLView` to `SKCanvasView` in your MAUI app. `SKCanvasView` uses the Raster (CPU) backend and does not depend on OpenGL ES, so it works reliably on all iOS versions including .NET 10. The performance difference may be acceptable for map rendering.\n\nWe are investigating a Metal-backed rendering path for the iOS GL view as a longer-term fix.\n\nCould you also confirm:\n1. Which iOS OS version and device/simulator you are running on?\n2. Does `SKCanvasView` render correctly in your .NET 10 setup?"}, {"type": "link-related", "description": "Link related older EAGLDrawable issue #646", "risk": "low", "confidence": 0.8, "linkedIssue": 646}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
