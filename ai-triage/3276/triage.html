<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3276, "repo": "mono/SkiaSharp", "analyzedAt": "2026-05-06T21:35:00Z", "currentLabels": ["type/bug"]}, "summary": "Reporter encounters a native libSkiaSharp version compatibility exception when deploying a Blazor/XAF app with DevExpress.Drawing.Skia 24.2.6 and SkiaSharp 3.119.0 on Azure App Service (Linux). The app works on Windows and in a sibling Worker project that doesn't use DevExpress.", "classification": {"type": {"value": "type/bug", "confidence": 0.85}, "area": {"value": "area/libSkiaSharp.native", "confidence": 0.88}, "platforms": ["os/Linux"], "tenets": ["tenet/compatibility", "tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": true, "errorType": "exception", "errorMessage": "native libSkiaSharp library version exception (exact message in screenshot, not provided as text)", "reproQuality": "partial", "targetFrameworks": ["net8.0"]}, "reproEvidence": {"stepsToReproduce": ["Create a Blazor/XAF project with DevExpress.Blazor 24.2.6 and DevExpress.Drawing.Skia 24.2.6", "Add SkiaSharp 3.119.0 + SkiaSharp.NativeAssets.Linux.NoDependencies 3.119.0 in a shared Core library", "Deploy to Azure App Service running Linux", "Observe runtime exception in the browser console"], "environmentDetails": "Azure App Service on Linux, SkiaSharp 3.119.0, DevExpress.Drawing.Skia 24.2.6, Visual Studio on Windows (local dev)", "relatedIssues": [2653, 1341], "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/2653", "description": "Related: Linux native library loading issues"}, {"url": "https://github.com/mono/SkiaSharp/issues/1341", "description": "Historical: Unable to load libSkiaSharp on Azure App Service Linux"}]}, "versionAnalysis": {"mentionedVersions": ["3.119.0", "2.88.9"], "workedIn": "2.88.9", "currentRelevance": "likely", "relevanceReason": "SkiaSharp 3.x introduced a major ABI break and a native version compatibility check. DevExpress.Drawing.Skia 24.2.6 was likely built against SkiaSharp 2.88.x and ships a 2.88.x native libSkiaSharp.so on Linux, which conflicts with the 3.119.0 managed bindings."}, "regression": {"isRegression": true, "confidence": 0.8, "reason": "Reporter explicitly states it worked with 2.88.9 and broke after upgrading to 3.119.0. The SkiaSharp 3.x series has an incompatible native ABI compared to 2.88.x.", "workedInVersion": "2.88.9", "brokeInVersion": "3.119.0"}}, "analysis": {"summary": "DevExpress.Drawing.Skia 24.2.6 was built against SkiaSharp 2.88.x and likely ships its own libSkiaSharp.so native binary for that version. On Linux, the dynamic linker loads whichever libSkiaSharp.so it finds first; if DevExpress's 2.88.x native binary wins the race, SkiaSharp's static constructor calls SkiaSharpVersion.CheckNativeLibraryCompatible() which throws InvalidOperationException because the native version (2.88.x) is outside the supported range for the 3.119.0 managed bindings. On Windows, DLL loading order differs and the SkiaSharp 3.119.0 native DLL wins, so no conflict occurs.", "rationale": "The error is clearly a third-party version conflict: DevExpress.Drawing.Skia is a DevExpress product that has its own SkiaSharp dependency. SkiaSharp 3.x introduced a breaking ABI change (milestone version bumped from 88 to 119) and `SkiaSharpVersion.CheckNativeLibraryCompatible()` enforces this via an `InvalidOperationException`. The fix requires DevExpress to update DevExpress.Drawing.Skia to target SkiaSharp 3.x. SkiaSharp itself cannot resolve this conflict. Classified as `close-as-external` because the root cause is outside SkiaSharp.", "keySignals": [{"text": "DevExpress.Blazor 24.2.6 + DevExpress.Drawing.Skia 24.2.6", "source": "issue body", "interpretation": "DevExpress.Drawing.Skia is a third-party wrapper around SkiaSharp that may bundle its own native binary."}, {"text": "The Worker project is working fine in the same environment", "source": "issue body", "interpretation": "The Worker project has no DevExpress dependency. This isolates the cause to the DevExpress-related packages."}, {"text": "Last Known Good Version: 2.88.9", "source": "issue body", "interpretation": "The breakage aligns exactly with the SkiaSharp 3.x major version bump, which introduced ABI incompatibility."}, {"text": "SkiaSharp.NativeAssets.Linux.NoDependencies in Core project (library, not executable)", "source": "issue body", "interpretation": "NativeAssets should be in the executable project, not a library. This may also contribute to wrong binary deployment."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SkiaSharpVersion.cs", "lines": "35-67", "finding": "CheckNativeLibraryCompatible() is called from SKObject static constructor. It reads the native library's milestone/increment via sk_version_get_milestone() and compares to VersionConstants (3.119). If DevExpress ships a 2.88.x libSkiaSharp.so and it gets loaded first, this throws InvalidOperationException with message 'The version of the native libSkiaSharp library (X.Y) is incompatible with this version of SkiaSharp.'", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKObject.cs", "lines": "39-49", "finding": "SKObject static constructor calls SkiaSharpVersion.CheckNativeLibraryCompatible(true) — this is the throw site for the version mismatch exception.", "relevance": "direct"}, {"file": "documentation/dev/packages.md", "lines": "138-145", "finding": "NativeAssets packages must be in the executable project, not a library. Reporter has NativeAssets.Linux.NoDependencies in Core (a library project). This means the correct 3.119.0 native binary may not be deployed, allowing DevExpress's bundled binary to be loaded instead.", "relevance": "related"}], "workarounds": ["Move SkiaSharp.NativeAssets.Linux.NoDependencies 3.119.0 from the Core library project to the Dashboard executable project", "Contact DevExpress support to request a DevExpress.Drawing.Skia version that supports SkiaSharp 3.x", "Pin SkiaSharp to 2.88.9 to match DevExpress.Drawing.Skia's expected version (not recommended long-term)"], "nextQuestions": ["What is the exact exception text from the screenshot?", "Does DevExpress.Drawing.Skia 24.2.6 declare a SkiaSharp version dependency in its nuspec?", "Which NuGet-resolved version of SkiaSharp does the Dashboard project use after DevExpress is included?"], "resolution": {"hypothesis": "DevExpress.Drawing.Skia ships or depends on a SkiaSharp 2.88.x native binary; on Linux this conflicts with SkiaSharp 3.119.0 managed bindings triggering the native version check. Compounding issue: NativeAssets package is in a library project instead of the executable.", "proposals": [{"title": "Move NativeAssets to executable project", "description": "Move SkiaSharp.NativeAssets.Linux.NoDependencies from the Core class library to the Dashboard executable project so the 3.119.0 native binary is correctly deployed alongside the app.", "category": "workaround", "confidence": 0.7, "effort": "cost/xs", "validated": "untested"}, {"title": "Contact DevExpress to update their SkiaSharp dependency", "description": "The permanent fix requires DevExpress to release a version of DevExpress.Drawing.Skia that targets SkiaSharp 3.x. File a support ticket with DevExpress referencing the SkiaSharp 3.x migration.", "category": "alternative", "confidence": 0.9, "effort": "cost/m", "validated": "untested"}, {"title": "Pin SkiaSharp to 2.88.9", "description": "Downgrade SkiaSharp and NativeAssets to 2.88.9 to match DevExpress.Drawing.Skia's expected version. Use SkiaSharp.NativeAssets.Linux.NoDependencies 2.88.9 in the executable project.", "category": "workaround", "confidence": 0.8, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Contact DevExpress to update their SkiaSharp dependency", "recommendedReason": "The root cause is in DevExpress.Drawing.Skia. The workarounds are temporary; only DevExpress updating their package provides a clean long-term solution."}}, "output": {"actionability": {"suggestedAction": "close-as-external", "confidence": 0.82, "reason": "Root cause is DevExpress.Drawing.Skia bundling an incompatible SkiaSharp 2.88.x native library. SkiaSharp cannot resolve this conflict — DevExpress must update their package to target SkiaSharp 3.x. The reporter can work around by pinning SkiaSharp 2.88.9 or moving NativeAssets to the executable project.", "suggestedReproPlatform": "linux"}, "missingInfo": ["Exact error message text (only provided as screenshot)", "SkiaSharp version that DevExpress.Drawing.Skia 24.2.6 depends on (from nuspec)"], "actions": [{"type": "update-labels", "description": "Apply bug, native, linux, compatibility labels", "risk": "low", "confidence": 0.88, "labels": ["type/bug", "area/libSkiaSharp.native", "os/Linux", "tenet/compatibility", "tenet/reliability"]}, {"type": "add-comment", "description": "Explain the version conflict, suggest workarounds, and direct reporter to DevExpress", "risk": "medium", "confidence": 0.82, "comment": "Thanks for the detailed report.\n\nThe root cause is a version conflict between `DevExpress.Drawing.Skia 24.2.6` and `SkiaSharp 3.119.0`. DevExpress.Drawing.Skia was built against SkiaSharp 2.88.x and likely ships (or expects) a 2.88.x native `libSkiaSharp.so`. On Linux, if that 2.88.x native binary gets loaded, SkiaSharp 3.119.0's managed code immediately throws because the version check in `SkiaSharpVersion.CheckNativeLibraryCompatible()` detects a native/managed version mismatch.\n\nA few things you can try while waiting for DevExpress to release a SkiaSharp 3.x compatible build:\n\n**Workaround 1 — Move NativeAssets to the executable project:**\n\nThe `SkiaSharp.NativeAssets.Linux.NoDependencies` reference should be in the **Dashboard** executable project, not in the `Core` library. When it's in a library, the native binary may not get deployed correctly:\n\n```xml\n<!-- Dashboard.csproj (executable) -->\n<PackageReference Include=\"SkiaSharp.NativeAssets.Linux.NoDependencies\" Version=\"3.119.0\" />\n\n<!-- Remove from Core.csproj -->\n```\n\n**Workaround 2 — Pin SkiaSharp to 2.88.9 to match DevExpress:**\n\n```xml\n<PackageReference Include=\"SkiaSharp\" Version=\"2.88.9\" />\n<PackageReference Include=\"SkiaSharp.NativeAssets.Linux.NoDependencies\" Version=\"2.88.9\" />\n```\n\nThe permanent fix requires DevExpress to update `DevExpress.Drawing.Skia` to target SkiaSharp 3.x. We recommend filing a support ticket with DevExpress referencing the [SkiaSharp 3.x migration](https://github.com/mono/SkiaSharp/releases).\n\nCould you confirm whether moving the NativeAssets package to the Dashboard executable project changes anything? That will help confirm which binary is being loaded."}, {"type": "close-issue", "description": "Close as external — root cause is in DevExpress.Drawing.Skia", "risk": "high", "confidence": 0.75, "stateReason": "not_planned"}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
