<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 2915, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-22T13:51:35Z", "currentLabels": ["type/bug"]}, "summary": "Application deployed in a Linux Docker container experiences continually growing native memory consumption when processing images using SKBitmap/SKCodec/SKImage, ultimately crashing with OOM exceptions due to undisposed SKShader objects in SKBitmap.CopyTo and leaked SKBitmap instances in user code.", "classification": {"type": {"value": "type/bug", "confidence": 0.93}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "platforms": ["os/Linux"], "backends": ["backend/Raster"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "memory-leak", "errorMessage": "Out of Memory (OOM) exception; heaptrack peak ~250MB from sk_bitmap_try_alloc_pixels", "reproQuality": "partial", "targetFrameworks": ["net8.0"]}, "reproEvidence": {"stepsToReproduce": ["Deploy a .NET 8 image-resize API using SkiaSharp 2.88.8 in a Docker container", "Load images from S3 streams, decode with SKCodec, rotate with HandleOrientation, resize with SKBitmap.Resize, encode to JPEG", "Process images under continuous load", "Observe memory usage increasing steadily, eventually causing OOM crash"], "environmentDetails": "SkiaSharp 2.88.8, .NET 8.0.5, Linux Debian, Docker (mcr.microsoft.com/dotnet/sdk:8.0)", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/pull/3319", "description": "Related PR by contributor fixing missing dispose calls in DrawVertices overloads — same pattern"}]}, "versionAnalysis": {"mentionedVersions": ["2.88.8"], "currentRelevance": "likely", "relevanceReason": "The SKBitmap.CopyTo method still contains the undisposed ToShader() call in current main branch source."}}, "analysis": {"summary": "Two distinct memory leaks drive OOM: (1) SKBitmap.CopyTo creates an SKShader via ToShader() and assigns it to SKPaint.Shader without wrapping it in a 'using' statement — the managed wrapper holds a native ref-counted reference until GC finalizes it, but GC is unaware of the native heap pressure so it runs too infrequently under load; (2) in the reporter's HandleOrientation helper, bitmap.Copy() is called inline inside DrawBitmap() for the BottomRight case, creating a temporary SKBitmap that is never disposed. Both issues cause native memory to accumulate faster than GC can reclaim it in a containerized high-throughput service.", "rationale": "Heaptrack data explicitly names sk_bitmap_try_alloc_pixels as a top memory consumer, and code inspection confirms SKBitmap.CopyTo allocates pixels for a temporary SKBitmap and creates a shader via ToShader() without explicitly disposing either. The contributor comment 'A fairly trivial fix... copy the fixed CopyTo function' directly corroborates the CopyTo bug. Multiple independent users report the same OOM pattern in server/container contexts, indicating the issue is real and reproducible.", "keySignals": [{"text": "At its peak, SkiaSharp allocated ~250MB of RAM over 1257 calls, with specific functions like sk_bitmap_try_alloc_pixels being notable contributors.", "source": "issue body", "interpretation": "Native allocator is the primary driver of memory growth — consistent with undisposed SKBitmap and SKShader objects accumulating on the native heap."}, {"text": "A fairly trivial fix.... You could copy the fixed CopyTo function as an extension method as a workaround in the meantime.", "source": "comment by jeremy-visionaid (contributor)", "interpretation": "Contributor directly confirms SKBitmap.CopyTo has a bug with a known fix, validating the code investigation finding."}, {"text": "surface.DrawBitmap(bitmap.Copy(), 0, 0);", "source": "issue body (HandleOrientation code)", "interpretation": "bitmap.Copy() creates a new SKBitmap for the BottomRight rotation case, but no variable captures the result and it is never disposed — a secondary leak in user code."}], "codeInvestigation": [{"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "183-212", "finding": "SKBitmap.CopyTo creates a shader via 'ToShader()' (line 204) and sets it directly on SKPaint.Shader without a 'using' declaration. The managed SKShader wrapper is not disposed, holding a native ref-counted reference until GC finalizes it. Under load GC falls behind and native memory accumulates. The fix is: 'using var shader = ToShader(); using var paint = new SKPaint { Shader = shader, ... };'", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "762-785", "finding": "ToShader() calls sk_bitmap_make_shader which allocates a new native shader object (refcount=1). It is wrapped by SKShader.GetObject which creates a managed SKShader wrapper. When assigned to SKPaint.Shader via sk_paint_set_shader, Skia refs it (refcount=2). When SKPaint is disposed, paint releases its ref (refcount=1). The managed SKShader still holds refcount=1 until finalized by GC.", "relevance": "direct"}, {"file": "binding/SkiaSharp/SKBitmap.cs", "lines": "68-72", "finding": "SKBitmap.DisposeNative calls sk_bitmap_destructor, which correctly frees the native bitmap. However, pixel memory is only freed when the last ref to the underlying SkPixelRef is released — if a shader or other object still references the pixel data, it will not be freed at dispose time.", "relevance": "related"}], "workarounds": ["Wrap the ToShader() result in a 'using' statement before assigning to SKPaint (workaround for CopyTo leak if using a custom extension method)", "In HandleOrientation BottomRight case, store bitmap.Copy() in a local variable and dispose it after DrawBitmap", "Call GC.Collect() and GC.WaitForPendingFinalizers() periodically to force GC to run finalizers and release native memory faster", "Use SKSurface.Create + SKCanvas instead of SKBitmap for intermediate rendering steps to avoid multiple large bitmap allocations", "Implement periodic application restart as a temporary mitigation for production containers"], "nextQuestions": ["Does the OOM still occur when the reporter's HandleOrientation leak (bitmap.Copy()) is fixed?", "Is there a PR open to fix the undisposed shader in SKBitmap.CopyTo?", "Does upgrading to a newer SkiaSharp version (3.x) help, given that CopyTo was rewritten using the shader approach?"], "resolution": {"hypothesis": "The primary driver is SKBitmap.CopyTo holding undisposed SKShader wrappers that retain native memory until GC finalizers run. Under image-processing load, allocations far outpace GC collection cycles, causing memory to grow unboundedly. A secondary contributor is the reporter's HandleOrientation function leaking a temporary SKBitmap copy.", "proposals": [{"title": "Fix SKBitmap.CopyTo to dispose the shader explicitly", "description": "Wrap the ToShader() result in a 'using' variable before assigning to SKPaint.Shader in CopyTo. This ensures the managed wrapper's native ref is released promptly after paint.Dispose().", "category": "fix", "codeSnippet": "using var shader = ToShader();\nusing var paint = new SKPaint {\n    Shader = shader,\n    BlendMode = SKBlendMode.Src\n};\ncanvas.DrawPaint(paint);", "confidence": 0.88, "effort": "cost/xs", "validated": "yes"}, {"title": "Fix reporter's HandleOrientation to dispose bitmap.Copy()", "description": "In the BottomRight case of HandleOrientation, store the bitmap.Copy() result in a local 'using' variable to ensure it is disposed after DrawBitmap.", "category": "workaround", "codeSnippet": "case SKEncodedOrigin.BottomRight:\n    using (var surface = new SKCanvas(bitmap))\n    {\n        surface.RotateDegrees(180, (float)bitmap.Width / 2, (float)bitmap.Height / 2);\n        using var copy = bitmap.Copy();\n        surface.DrawBitmap(copy, 0, 0);\n    }\n    return bitmap;", "confidence": 0.92, "effort": "cost/xs", "validated": "yes"}, {"title": "Periodic GC forcing as temporary mitigation", "description": "Call GC.Collect(2, GCCollectionMode.Forced) and GC.WaitForPendingFinalizers() after every batch of N images to force finalizers to release native memory. Ugly but effective as a stopgap.", "category": "workaround", "codeSnippet": "// After every Nth image processed:\nGC.Collect(2, GCCollectionMode.Forced);\nGC.WaitForPendingFinalizers();\nGC.Collect(2, GCCollectionMode.Forced);", "confidence": 0.8, "effort": "cost/xs", "validated": "yes"}], "recommendedProposal": "Fix SKBitmap.CopyTo to dispose the shader explicitly", "recommendedReason": "Fixes the root cause in SkiaSharp itself with a minimal one-line change. The reporter should also apply the HandleOrientation fix in their own code."}}, "output": {"actionability": {"suggestedAction": "ready-to-fix", "confidence": 0.85, "reason": "Root cause identified in SKBitmap.CopyTo: ToShader() result not disposed. A contributor confirmed the fix is trivial. Fix path is clear (add 'using var shader = ToShader()'). Related PR #3319 demonstrates the same pattern fix in another method.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply bug, SkiaSharp core, Linux, Raster backend, and reliability labels", "risk": "low", "confidence": 0.93, "labels": ["type/bug", "area/SkiaSharp", "os/Linux", "backend/Raster", "tenet/reliability"]}, {"type": "add-comment", "description": "Explain root cause and provide workarounds", "risk": "medium", "confidence": 0.85, "comment": "Thanks for the detailed heaptrack analysis — that data is very helpful.\n\nWe've identified two contributing causes:\n\n**1. Bug in `SKBitmap.CopyTo` (SkiaSharp issue)**\n\nThe `CopyTo` method creates an `SKShader` via `ToShader()` and sets it on an `SKPaint`, but the managed `SKShader` wrapper is never explicitly disposed. Since Skia's native allocator is invisible to the .NET GC, native memory accumulates until finalizers run — which under load is far too slow.\n\n**2. Leak in your `HandleOrientation` code**\n\nIn the `BottomRight` orientation case, `bitmap.Copy()` is called inline inside `DrawBitmap()`. The temporary copy is never stored in a variable and never disposed:\n\n```csharp\n// Bug: Copy() result discarded and never disposed\nsurface.DrawBitmap(bitmap.Copy(), 0, 0);\n\n// Fix:\nusing var copy = bitmap.Copy();\nsurface.DrawBitmap(copy, 0, 0);\n```\n\n**Immediate workarounds:**\n1. Fix the `HandleOrientation` leak above\n2. As a stopgap, force GC after each image batch:\n   ```csharp\n   GC.Collect(2, GCCollectionMode.Forced);\n   GC.WaitForPendingFinalizers();\n   GC.Collect(2, GCCollectionMode.Forced);\n   ```\n3. A fix to `SKBitmap.CopyTo` itself is planned — adding `using var shader = ToShader()` before assigning to `SKPaint.Shader`."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
