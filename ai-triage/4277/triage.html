<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 4277, "repo": "mono/SkiaSharp", "analyzedAt": "2026-06-30T05:36:40Z", "currentLabels": ["type/bug"]}, "summary": "SKSwapChainPanel on WinUI crashes with error 0xc0000409 (STATUS_STACK_BUFFER_OVERRUN) when rapidly resizing the window and then closing it, specifically when DrawInBackground=true and EnableRenderLoop=true due to a race condition between the background render thread and context teardown on unload.", "classification": {"type": {"value": "type/bug", "confidence": 0.95}, "area": {"value": "area/SkiaSharp.Views", "confidence": 0.95}, "platforms": ["os/Windows-WinUI"], "backends": ["backend/OpenGL"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "high", "regressionClaimed": false, "errorType": "crash", "errorMessage": "Application crashed with error code 0xc0000409 (STATUS_STACK_BUFFER_OVERRUN)", "reproQuality": "partial", "targetFrameworks": ["net8.0-windows"]}, "reproEvidence": {"stepsToReproduce": ["Create a WinUI app using SKSwapChainPanel with DrawInBackground=true and EnableRenderLoop=true", "Rapidly and repeatedly resize the application window", "Close the window immediately after resizing"], "environmentDetails": "SkiaSharp.Views.WinUI 4.148.0, Visual Studio on Windows", "relatedIssues": [1490]}, "versionAnalysis": {"mentionedVersions": ["4.148.0"], "currentRelevance": "likely", "relevanceReason": "The race-condition code path in AngleSwapChainPanel has not changed since this version was released — UpdateRenderLoop still cancels without awaiting and OnUnloaded does not join background threads."}}, "analysis": {"summary": "Race condition in AngleSwapChainPanel: when DrawInBackground=true the render loop and one-shot render workers execute EGL calls on background threads, but OnUnloaded cancels the loop action and destroys the GlesContext without waiting for those threads to finish. Rapid resize events can queue multiple renderOnceWorker calls that run concurrently with context disposal, causing a use-after-free of EGL resources which Windows reports as a stack buffer overrun.", "rationale": "The crash is triggered by a clear threading hazard: UpdateRenderLoop cancels the IAsyncAction but does not wait for the background thread to exit before DestroyRenderSurface and glesContext.Dispose run on the UI thread. Additionally renderOnceWorker is never cancelled or joined in OnUnloaded. Setting DrawInBackground=false routes rendering through the UI thread (DispatcherQueue), which serializes access and eliminates the race — consistent with the reporter's observation.", "keySignals": [{"text": "error code:0xc0000409", "source": "issue body", "interpretation": "STATUS_STACK_BUFFER_OVERRUN — typically a Windows security cookie violation triggered by native memory corruption (use-after-free of EGL resources)."}, {"text": "maybe related to DrawInBackground=true, if set false, it seems be ok", "source": "comment #1", "interpretation": "Confirms the race: DrawInBackground=false routes frames through the dispatcher (serialized), DrawInBackground=true runs frames on thread pool (unguarded teardown)."}, {"text": "SKSwapChainPanel DrawInBackground=\"true\" EnableRenderLoop=\"true\"", "source": "XAML in issue body", "interpretation": "Both DrawInBackground and EnableRenderLoop are true — rendering runs entirely on background threads with no synchronization against context disposal."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/AngleSwapChainPanel.cs", "lines": "137-151", "finding": "OnUnloaded calls UpdateRenderLoop(false), DestroyRenderSurface(), then glesContext.Dispose() in sequence without waiting for background threads to complete. The Cancel() call on the IAsyncAction is non-blocking.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/AngleSwapChainPanel.cs", "lines": "241-262", "finding": "UpdateRenderLoop(false) calls renderLoopWorker.Cancel() and sets it to null, but never awaits termination. The background RenderLoop thread can still be executing when the caller proceeds to destroy the context.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/AngleSwapChainPanel.cs", "lines": "96-113", "finding": "Invalidate() with DrawInBackground=true spawns a new ThreadPool.RunAsync(RenderOnce) worker if none is running. Rapid resize events can queue multiple such workers. OnUnloaded does not cancel or await renderOnceWorker at all.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/AngleSwapChainPanel.cs", "lines": "264-282", "finding": "RenderOnce runs RenderFrame() directly on the background thread when DrawInBackground=true. After completion it nulls out renderOnceWorker inside a lock, but this happens after EGL calls that can race with OnUnloaded disposing glesContext.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.WinUI/GlesInterop/GlesContext.cs", "lines": "127-134", "finding": "DestroySurface() calls eglDestroySurface() immediately. If a background thread is mid-way through MakeCurrent() or SwapBuffers() using the same surface, this produces a use-after-free at the native layer.", "relevance": "direct"}], "workarounds": ["Set DrawInBackground=\"false\" on SKSwapChainPanel. Rendering will execute on the UI thread via the dispatcher, eliminating the race. This may reduce frame rate under heavy resize load but is safe.", "Disable EnableRenderLoop and call Invalidate() manually from the UI thread only, keeping DrawInBackground=false."], "nextQuestions": ["Does the same crash occur with EnableRenderLoop=false (only Invalidate-driven renders)?", "Is there a minimal repro project that reliably triggers the crash, to aid a fix?", "Does the crash also affect SKGLView in WinUI MAUI (which shares the same AngleSwapChainPanel base)?"], "resolution": {"hypothesis": "Background render threads access EGL surfaces concurrently with context disposal in OnUnloaded. Adding a cancellation token and a Task-based join (or a ManualResetEventSlim) to synchronize OnUnloaded with all in-flight background render workers before destroying the context would fix the crash.", "proposals": [{"title": "Set DrawInBackground=false as a workaround", "description": "Use DrawInBackground=false on SKSwapChainPanel. Rendering runs on the UI thread via DispatcherQueue and is safe against concurrent disposal. Performance may be lower but correctness is guaranteed.", "category": "workaround", "confidence": 0.95, "effort": "cost/xs", "validated": "yes"}, {"title": "Synchronize OnUnloaded with background render threads", "description": "Add a CancellationTokenSource and awaitable completion signal (e.g., SemaphoreSlim or ManualResetEventSlim) to AngleSwapChainPanel. Set the token in OnUnloaded and wait for in-flight RenderLoop/RenderOnce workers to exit before calling DestroyRenderSurface() and glesContext.Dispose(). Also cancel renderOnceWorker in OnUnloaded.", "category": "fix", "confidence": 0.8, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Set DrawInBackground=false as a workaround", "recommendedReason": "Immediate, zero-code workaround the reporter can apply now. The proper fix requires synchronization rework in AngleSwapChainPanel."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.88, "reason": "Race condition is confirmed by code analysis and reporter's observation. Root cause is clear but a thread-safe fix requires careful rework of the background render loop teardown sequence in AngleSwapChainPanel.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Apply bug, views, WinUI, OpenGL, and reliability labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp.Views", "os/Windows-WinUI", "backend/OpenGL", "tenet/reliability"]}, {"type": "link-related", "description": "Cross-reference issue #1490 — same DrawInBackground race condition on UWP/WinUI", "risk": "low", "confidence": 0.88, "linkedIssue": 1490}, {"type": "add-comment", "description": "Post analysis with confirmed workaround and root cause explanation", "risk": "medium", "confidence": 0.88, "comment": "Thank you for the detailed report and the helpful narrowing clue about `DrawInBackground`.\n\n**Root cause:** This is a race condition in `AngleSwapChainPanel`. When `DrawInBackground=\"true\"` and `EnableRenderLoop=\"true\"`, frames are rendered on a background thread pool thread. When the window is closed, `OnUnloaded` cancels the render loop `IAsyncAction` but does not *wait* for the background thread to finish before destroying the GLES context (`glesContext.Dispose()` / `DestroyRenderSurface()`). Rapid resize events also queue one-shot `renderOnceWorker` tasks that are never cancelled in `OnUnloaded`. When the background thread tries to call `MakeCurrent()` or `SwapBuffers()` on the already-destroyed EGL surface, Windows reports the resulting native memory corruption as `0xc0000409`.\n\n**Workaround (immediate):** Set `DrawInBackground=\"false\"` on the panel. Rendering will be dispatched to the UI thread, which serializes access to the EGL context and eliminates the race.\n\n```xaml\n<skia:SKSwapChainPanel DrawInBackground=\"false\" EnableRenderLoop=\"true\" />\n```\n\nThis is consistent with your observation. There will be no crash, though frame delivery under extreme resize load may be slightly slower.\n\n**Related issue:** This is the same underlying race as #1490 (AccessViolationException in UWP with `DrawInBackground=true`).\n\nA proper fix requires synchronizing `OnUnloaded` with all in-flight background render workers before context teardown — this needs investigation into the best synchronization primitive to use without introducing deadlocks."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
