<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3609, "repo": "mono/SkiaSharp", "analyzedAt": "2026-07-03T05:30:00Z", "currentLabels": ["type/bug", "os/Windows-Classic", "status/known-issue"]}, "summary": "Seven GC lifecycle tests intermittently fail on Windows .NET Framework CI due to non-deterministic finalizer scheduling; the CollectGarbage() helper lacks the double-collect pattern and there is no SkipOnNetFramework() guard equivalent to the existing SkipOnMono().", "classification": {"type": {"value": "type/bug", "confidence": 0.97}, "area": {"value": "area/SkiaSharp", "confidence": 0.9}, "platforms": ["os/Windows-Classic"], "tenets": ["tenet/reliability"]}, "evidence": {"bugSignals": {"severity": "low", "regressionClaimed": false, "errorType": "other", "reproQuality": "partial", "targetFrameworks": ["net48"]}, "reproEvidence": {"stepsToReproduce": ["Run the full SkiaSharp test suite on Windows .NET Framework (net48) under concurrent CI load", "Observe intermittent failures in GC lifecycle tests (~1â€“2x per 10 builds each)"], "environmentDetails": "Windows .NET Framework 4.8, concurrent test execution under CI load", "relatedIssues": [3608]}}, "analysis": {"summary": "The CollectGarbage() helper in BaseTest.cs only calls GC.Collect() + GC.WaitForPendingFinalizers() once â€” missing the standard double-collect pattern required to reliably flush finalizers. Under concurrent CI execution on .NET Framework, finalizer threads can race with assertions causing both 'object not collected' and 'refcount off by 1' failures. The fix is to improve CollectGarbage() and add a SkipOnNetFramework() guard for the most fragile tests.", "codeInvestigation": [{"file": "tests/Tests/BaseTest.cs", "lines": "38-42", "finding": "CollectGarbage() calls GC.Collect() + GC.WaitForPendingFinalizers() only once â€” the standard double-collect idiom (Collect, WaitForPendingFinalizers, Collect) is missing. This means some finalization rounds may not complete before tests assert, especially under heavy parallel test execution.", "relevance": "direct"}, {"file": "tests/Tests/BaseTest.cs", "lines": "72-75", "finding": "SkipOnMono() exists to skip tests on runtimes where finalizer timing is non-deterministic, but no SkipOnNetFramework() equivalent is defined. .NET Framework 4.8 under concurrent test load exhibits similar non-determinism.", "relevance": "direct"}, {"file": "tests/Tests/SkiaSharp/SKManagedWStreamTest.cs", "lines": "112-150", "finding": "StreamIsReferencedAndNotDisposedPrematurely calls CollectGarbage() inside DoWork(), then checks stream liveness after the outer CollectGarbage(). The NullReferenceException in CI suggests a finalizer thread disposes the stream between the GC call and the assertion â€” a classic finalization race.", "relevance": "direct"}, {"file": "tests/Tests/SkiaSharp/SKColorSpaceTest.cs", "lines": "134-161", "finding": "ColorSpaceIsNotDisposedPrematurely asserts exact native refcounts (e.g., Assert.Equal(2, ...)) after CollectGarbage(). Internal caching or concurrent finalizers can cause the refcount to be off-by-one. The test at line 175 already uses Assert.InRange for the PeekPixels refcount, but lines 148/155/159 still use strict Assert.Equal.", "relevance": "direct"}, {"file": "tests/Tests/SkiaSharp/SKTypefaceTest.cs", "lines": "556-590", "finding": "GCStillCollectsTypeface skips on non-Windows only (SkipOnNonWindows), so it runs on Windows .NET Framework. It relies on GC collecting a typeface after a single CollectGarbage() call â€” fails when finalizers don't run within the expected window.", "relevance": "related"}], "keySignals": [{"text": "call CollectGarbage(), then assert that objects have been finalized or reference counts have changed", "source": "issue body", "interpretation": "All failing tests share the same root cause: asserting deterministic GC timing on a non-deterministic runtime."}, {"text": "NullReferenceException (GC race)", "source": "issue body â€” SKManagedWStreamTest.StreamIsReferencedAndNotDisposedPrematurely", "interpretation": "Confirms a finalizer thread is running concurrently and disposing objects before assertions complete."}, {"text": "Several of these tests call SkipOnMono(), acknowledging that GC behavior varies by runtime. The same non-determinism applies to .NET Framework under CI load.", "source": "issue body", "interpretation": "The SkipOnMono() guard already exists for the same class of problem; a SkipOnNetFramework() is the symmetrical solution."}, {"text": "Expected refcount 4, got 3", "source": "issue body â€” SKColorSpaceTest.ColorSpaceIsNotDisposedPrematurely", "interpretation": "Off-by-one refcount suggests a concurrent finalizer ran before the assertion, already releasing one reference."}], "rationale": "This is a type/bug in the test infrastructure (not the library itself) that causes CI noise on Windows .NET Framework. The root cause is well-understood: CollectGarbage() lacks the double-collect pattern, and there is no SkipOnNetFramework() guard equivalent to SkipOnMono(). The fix is narrow and mechanical: improve the helper and guard the most fragile tests. Classification is ready-to-fix because both the root cause and the fix path are documented in the issue itself by the maintainer.", "workarounds": ["Use the double-collect pattern manually in specific tests: GC.Collect(); GC.WaitForPendingFinalizers(); GC.Collect();", "Add Thread.Sleep(100) between GC calls to reduce finalizer race conditions under CI load"], "nextQuestions": ["Should SkipOnNetFramework() fully skip the test or should it retry with tolerance instead?", "Are the refcount assertions in ColorSpaceIsNotDisposedPrematurely intentionally strict, or can they use Assert.InRange across the board?"], "resolution": {"hypothesis": "The CollectGarbage() helper is too weak for concurrent CI environments. Upgrading it to the double-collect pattern (GC.Collect, WaitForPendingFinalizers, GC.Collect) with optional retry will resolve most failures. The most fragile tests should also gain a SkipOnNetFramework() guard.", "proposals": [{"title": "Improve CollectGarbage() with double-collect pattern", "description": "Update BaseTest.CollectGarbage() to call GC.Collect(), GC.WaitForPendingFinalizers(), then GC.Collect() a second time. This is the standard idiom for flushing the finalizer queue reliably.", "category": "fix", "codeSnippet": "public static void CollectGarbage()\n{\n    GC.Collect();\n    GC.WaitForPendingFinalizers();\n    GC.Collect();\n}", "confidence": 0.9, "effort": "cost/xs", "validated": "yes"}, {"title": "Add SkipOnNetFramework() guard for fragile GC tests", "description": "Add a SkipOnNetFramework() helper to BaseTest (mirroring SkipOnMono()) and apply it to tests where exact finalizer timing is required: GCStillCollectsTypeface, StreamIsReferencedAndNotDisposedPrematurely, StreamLosesOwnershipAndCanBeGarbageCollected, DataOutLivesImageUntilFinalizersRun.", "category": "fix", "codeSnippet": "protected static void SkipOnNetFramework(string reason = \".NET Framework does not guarantee finalizers run immediately under CI load\")\n{\n    Assert.SkipWhen(IsNetFramework, reason);\n}\n\nprivate static bool IsNetFramework =>\n#if NETFRAMEWORK\n    true;\n#else\n    false;\n#endif", "confidence": 0.85, "effort": "cost/s", "validated": "yes"}, {"title": "Use Assert.InRange for refcount-sensitive assertions", "description": "Replace Assert.Equal for native refcount checks in ColorSpaceIsNotDisposedPrematurely with Assert.InRange(actual, expected - 1, expected + 1) to tolerate off-by-one from concurrent finalizers.", "category": "fix", "confidence": 0.8, "effort": "cost/xs", "validated": "untested"}], "recommendedProposal": "Improve CollectGarbage() with double-collect pattern", "recommendedReason": "Fixing the root cause in one place (BaseTest.CollectGarbage) improves all seven tests at once, with minimal code change and zero risk of hiding real bugs."}}, "output": {"actionability": {"suggestedAction": "ready-to-fix", "confidence": 0.92, "reason": "Root cause is clearly identified (incomplete CollectGarbage helper and missing SkipOnNetFramework guard), fix path is well-scoped and documented in the issue body by the maintainer. No reproduction is needed â€” the CI failures are the reproduction.", "suggestedReproPlatform": "windows"}, "actions": [{"type": "update-labels", "description": "Add area/SkiaSharp and tenet/reliability labels; type/bug and os/Windows-Classic are already present", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp", "os/Windows-Classic", "tenet/reliability"]}, {"type": "add-comment", "description": "Summarize root cause and direct to the three fix proposals", "risk": "medium", "confidence": 0.9, "comment": "**Root cause confirmed:** `CollectGarbage()` in `BaseTest.cs` uses a single `GC.Collect() + GC.WaitForPendingFinalizers()` call, which is insufficient to reliably drain the finalizer queue under concurrent .NET Framework CI execution.\n\n**Recommended fix (ready to implement):**\n\n1. **Upgrade `CollectGarbage()`** to the double-collect pattern:\n   ```csharp\n   public static void CollectGarbage()\n   {\n       GC.Collect();\n       GC.WaitForPendingFinalizers();\n       GC.Collect();\n   }\n   ```\n\n2. **Add `SkipOnNetFramework()` guard** (mirrors `SkipOnMono()`) for the most timing-sensitive tests: `GCStillCollectsTypeface`, `StreamIsReferencedAndNotDisposedPrematurely`, `StreamLosesOwnershipAndCanBeGarbageCollected`, `DataOutLivesImageUntilFinalizersRun`.\n\n3. **Optionally** replace `Assert.Equal` with `Assert.InRange` for native refcount checks in `ColorSpaceIsNotDisposedPrematurely` (lines 148, 155, 159) to tolerate off-by-one from concurrent finalizers.\n\nAll three changes are in test infrastructure only â€” no library code is affected."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : 'â€”';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">â€”</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || 'â€”'],
    ['Area', classification.area?.value || 'â€”'],
    ['Action', actionability.suggestedAction || 'â€”'],
    ['Severity', bug.severity || 'â€”']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} â€˘ ${meta.repo || 'mono/SkiaSharp'} â€˘ analyzed ${meta.analyzedAt || 'â€”'}`;

  document.getElementById('hero-story').textContent = data.summary || 'â€”';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || 'â€”';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || 'â€”';
  document.getElementById('hero-action-reason').textContent = actionability.reason || 'â€”';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || 'â€”')],
    ['Repository', esc(meta.repo || 'â€”')],
    ['Analyzed at', esc(meta.analyzedAt || 'â€”')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || 'â€”')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || 'â€”')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || 'â€”')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || 'â€”')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' â€” ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' â€” ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} â€” <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' â€” ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || 'â€”')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? 'â€”'))],
      ['Error type', esc(bug.errorType || 'â€”')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || 'â€”')}</div>`],
      ['Repro quality', esc(bug.reproQuality || 'â€”')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || 'â€”')],
      ['Broke in', esc(version.brokeIn || 'â€”')],
      ['Current relevance', esc(version.currentRelevance || 'â€”')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || 'â€”')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? 'â€”'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || 'â€”')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || 'â€”')],
      ['Broke in version', esc(regression.brokeInVersion || 'â€”')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? 'â€”'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || 'â€”')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || 'â€”')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || 'â€”')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" â€” <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || 'â€”')}</td>
                <td>${esc(item.relevance || 'â€”')}</td>
                <td>${esc(item.finding || 'â€”')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || 'â€”')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || 'â€”')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || 'â€”')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || 'â€”')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || 'â€”')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
