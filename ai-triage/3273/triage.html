<script>const DATA = {"meta": {"schemaVersion": "1.0", "number": 3273, "repo": "mono/SkiaSharp", "analyzedAt": "2026-04-24T20:26:43Z", "currentLabels": ["type/bug"]}, "summary": "SKCanvasView in Blazor WASM shows 'No canvas element was provided' error in browser console when running from IDE debug mode, but works correctly with dotnet watch; root cause is stale cached JavaScript files (SKHtmlCanvas.js) after upgrading SkiaSharp versions.", "classification": {"type": {"value": "type/bug", "confidence": 0.9}, "area": {"value": "area/SkiaSharp.Views.Blazor", "confidence": 0.95}, "platforms": ["os/WASM"]}, "evidence": {"bugSignals": {"severity": "medium", "regressionClaimed": false, "errorType": "missing-output", "errorMessage": "No canvas element was provided", "reproQuality": "partial", "targetFrameworks": ["net8.0-wasm", "net9.0-wasm"]}, "reproEvidence": {"stepsToReproduce": ["Create a Blazor WASM app with SKCanvasView component", "Run the app in debug mode from the IDE (not dotnet watch)", "Observe 'No canvas element was provided' in browser console", "Canvas content does not render"], "environmentDetails": "macOS, Blazor WASM, SkiaSharp 3.116.0/3.119.0, VS 17.14.2 (second reporter), IDE debug mode", "repoLinks": [{"url": "https://github.com/mono/SkiaSharp/issues/3273#issuecomment-2869649165", "description": "OP: caching issue — switching to interactiveWasm mode + clearing browser cache + project folder + dotnet restore fixed it"}, {"url": "https://github.com/mono/SkiaSharp/issues/3273#issuecomment-2909810315", "description": "Second reporter: same error on SkiaSharp 3.119.0 + VS 17.14.2 + MudBlazor 8.6.0; resolved after clean rebuild"}, {"url": "https://github.com/mono/SkiaSharp/issues/3273#issuecomment-3640226549", "description": "Third reporter: triggered after upgrading from 2.88.6 to 3.119.0; workaround works for devs but not for production users who cannot clear caches"}]}, "versionAnalysis": {"mentionedVersions": ["3.116.0", "3.119.0", "2.88.6"], "currentRelevance": "likely", "relevanceReason": "Third reporter in December 2025 confirmed still reproducible after upgrading from 2.88.6 to 3.119.0; issue remains open."}}, "analysis": {"summary": "The 'No canvas element was provided' error originates in SKHtmlCanvas.js (line 18) when document.querySelector('[' + elementId + ']') returns null because stale browser-cached or project-cached JavaScript (from an old SkiaSharp version) doesn't match the current element ID scheme. In NET7+ mode, InitRaster passes element=null and relies entirely on the CSS attribute selector lookup; old cached JS may use a different lookup mechanism. Clearing browser cache and the bin/obj/_framework folder consistently fixes the issue, confirming the root cause is stale static assets with no version/cache-busting.", "rationale": "Classified as type/bug because canvas fails to render with a JS error that is not caused by user code. The area is SkiaSharp.Views.Blazor because the error originates in SKHtmlCanvas.js, a static asset bundled with that package. The workaround (clear cache / clean rebuild) consistently fixes it, confirming a cache staleness problem. Three separate reporters from May to December 2025 all confirm the same pattern, particularly after upgrading SkiaSharp versions. The third reporter raises a valid production concern: end-users cannot clear their caches, meaning a proper fix (cache-busting on static assets) is needed.", "keySignals": [{"text": "No canvas element was provided", "source": "browser console (issue body)", "interpretation": "Exact error from SKHtmlCanvas.js line 18 — element lookup via document.querySelector returns null."}, {"text": "I made a mistake, I used the interactiveAuto mode in blazor, but when i switched to interactiveWasm, it still doesn't work until I clear all the cache both in browser and the project folder. Then I run dotnet restore before I run it in debug mode, it works.", "source": "issue comment #2869649165", "interpretation": "Cache staleness is the root cause — clearing both browser cache and project output (bin/obj/_framework) restores correct behavior."}, {"text": "after properly cleaning and rebuilding, I no longer had this issue", "source": "issue comment #2909810315", "interpretation": "Confirms clean build resolves the issue; stale build output is the cause."}, {"text": "I encounter the same issue, after updating from 2.88.6 to 3.119.0... my app is running on a server and is accessible for many people, which I can't tell all, how to clear the cache successfully.", "source": "issue comment #3640226549", "interpretation": "Version upgrade from 2.88.x to 3.x is a trigger; production impact because end-users cannot clear browser caches manually."}, {"text": "When I use dotnet watch command to run my app, it works all fine.", "source": "issue body", "interpretation": "dotnet watch invalidates static assets differently than IDE debug launch, consistently working around the cache problem."}], "codeInvestigation": [{"file": "source/SkiaSharp.Views/SkiaSharp.Views.Blazor/wwwroot/SKHtmlCanvas.js", "lines": "14-20", "finding": "SKHtmlCanvas.init() first tries the passed element, then falls back to document.querySelector('[' + elementId + ']'). In NET7+ mode element is always null, so the CSS attribute selector is the only lookup mechanism. If the browser serves a stale/old SKHtmlCanvas.js (e.g., from 2.88.x cache), the element lookup scheme may differ from what the current C# interop expects, causing the selector to return null and triggering the 'No canvas element was provided' error.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.Blazor/Internal/SKHtmlCanvasInterop.cs", "lines": "46, 72-80", "finding": "htmlElementId is constructed as '_bl_' + element.Id. In NET7+ path (line 76), InitRaster is called with element=null and htmlElementId, relying entirely on the JS querySelector fallback. The URL for the JS module is '_content/SkiaSharp.Views.Blazor/SKHtmlCanvas.js' with no version fingerprint, meaning browsers can cache it indefinitely across SkiaSharp upgrades.", "relevance": "direct"}, {"file": "source/SkiaSharp.Views/SkiaSharp.Views.Blazor/Internal/JSModuleInterop.cs", "lines": "23", "finding": "In NET7+ mode, the JS module is loaded via JSHost.ImportAsync(moduleName, '../' + moduleUrl). There is no cache-busting query parameter or versioned URL; the module path '_content/SkiaSharp.Views.Blazor/SKHtmlCanvas.js' is static and will be cached by browsers using standard HTTP caching headers set by the host.", "relevance": "related"}], "workarounds": ["Clear browser cache (hard reload / clear site data) and restart the app", "Delete the bin/obj/_framework folder, run 'dotnet restore', then rebuild from IDE", "Use 'dotnet watch' instead of the IDE debug launch button during development", "For production deployments: configure the web server to send no-cache or short-lived cache headers for _content/SkiaSharp.Views.Blazor/*.js files"], "nextQuestions": ["Does this reproduce on a fresh install with no prior SkiaSharp version ever loaded in the browser, or only after upgrading?", "Does the IDE debug launch skip running 'dotnet restore', potentially leaving stale bin/obj/_framework fingerprinted assets?", "Can the JS module URL be fingerprinted/versioned per SkiaSharp release to force cache invalidation on upgrade?", "Is the ServiceWorker (if any) caching the old SKHtmlCanvas.js file?"], "resolution": {"hypothesis": "The SkiaSharp.Views.Blazor JavaScript static assets (SKHtmlCanvas.js) are cached by browsers and the build system without version-aware invalidation. When users upgrade SkiaSharp versions the browser continues serving the old JS whose element lookup is incompatible with the new C# interop, causing the canvas initialization to fail. dotnet watch works because it rebuilds assets and may trigger cache invalidation differently.", "proposals": [{"title": "Clear cache and clean rebuild (immediate workaround)", "description": "Delete bin/obj/_framework, run dotnet restore, rebuild, and clear browser cache. For production, configure the hosting server to set short-lived Cache-Control headers on _content/SkiaSharp.Views.Blazor/ static assets.", "category": "workaround", "confidence": 0.95, "effort": "cost/xs", "validated": "untested"}, {"title": "Add version fingerprint to JS module URL", "description": "Append a version query string (e.g., ?v=3.119.0) to the JsFilename constant in JSModuleInterop.cs so the browser treats each SkiaSharp release as a new resource. This forces cache invalidation on upgrade without requiring users to manually clear their caches.", "category": "fix", "confidence": 0.75, "effort": "cost/s", "validated": "untested"}, {"title": "Improve dotnet publish/serve cache-busting", "description": "Ensure the Blazor build output pipeline fingerprints the _content/ static assets. Investigate whether setting StaticWebAssets fingerprinting in the .csproj file resolves the issue across all hosting scenarios.", "category": "investigation", "confidence": 0.65, "effort": "cost/m", "validated": "untested"}], "recommendedProposal": "Add version fingerprint to JS module URL", "recommendedReason": "Most targeted fix that directly addresses the root cause (stale browser cache of the JS module) without requiring server configuration changes or user intervention."}}, "output": {"actionability": {"suggestedAction": "needs-investigation", "confidence": 0.82, "reason": "Multiple reporters confirm the issue is real and reproducible after SkiaSharp version upgrades; root cause (stale JS cache) is well-understood but the correct fix location (URL versioning, build pipeline, or hosting guidance) needs confirmation.", "suggestedReproPlatform": "linux"}, "actions": [{"type": "update-labels", "description": "Apply Blazor views, WASM, and reliability tenet labels", "risk": "low", "confidence": 0.95, "labels": ["type/bug", "area/SkiaSharp.Views.Blazor", "os/WASM", "tenet/reliability"]}, {"type": "add-comment", "description": "Acknowledge the caching root cause, provide the clean-rebuild workaround, and note the production concern", "risk": "medium", "confidence": 0.82, "comment": "Thanks for the report and the follow-up details from everyone in this thread.\n\nThe 'No canvas element was provided' error comes from `SKHtmlCanvas.js` when the JavaScript module cannot locate the canvas element in the DOM. The consistent pattern here — working after a clean rebuild + cache clear but failing after upgrading from 2.88.x to 3.x — points to **stale browser-cached or project-cached JavaScript assets**.\n\n**Immediate workaround:**\n1. Delete the `bin/obj/_framework` folder in your project\n2. Run `dotnet restore`\n3. Rebuild and clear your browser cache (hard reload / clear site data)\n\nFor **production deployments** where you can't ask users to clear caches: configure your web server to send short-lived `Cache-Control` headers for `_content/SkiaSharp.Views.Blazor/` static assets, or set `no-cache` so the browser always revalidates.\n\nWe're tracking this as a versioning gap — the JS module URL doesn't include a version fingerprint, so browsers can indefinitely cache the old file across SkiaSharp upgrades. We'll investigate adding proper cache-busting."}]}};</script>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value ?? '';
  return div.innerHTML;
}

function badge(text, cls='bg-secondary-subtle text-secondary-emphasis') {
  return `<span class="badge rounded-pill ${cls}">${esc(text)}</span>`;
}

function fmtConfidence(value) {
  return typeof value === 'number' ? `${value.toFixed(2)} (${Math.round(value * 100)}%)` : '—';
}

function fmtList(items, formatter) {
  if (!items || !items.length) return '<span class="text-muted">—</span>';
  return items.map(item => formatter ? formatter(item) : esc(item)).join(', ');
}

function table(rows) {
  return `<table class="table table-sm">
    <tbody>
      ${rows.map(([k, v]) => `<tr><th style="width: 220px">${esc(k)}</th><td>${v}</td></tr>`).join('')}
    </tbody>
  </table>`;
}

function section(title, bodyHtml) {
  return `<div class="card mb-3"><div class="card-header bg-white fw-semibold">${esc(title)}</div><div class="card-body">${bodyHtml}</div></div>`;
}

function listOrEmpty(items, formatter) {
  if (!items || !items.length) return '<div class="empty-state">No data in this section.</div>';
  return `<ul class="mb-0">${items.map(item => `<li>${formatter ? formatter(item) : esc(item)}</li>`).join('')}</ul>`;
}

function renderMetricCards(data) {
  const classification = data.classification || {};
  const bug = (data.evidence || {}).bugSignals || {};
  const actionability = (data.output || {}).actionability || {};
  const cards = [
    ['Type', classification.type?.value || '—'],
    ['Area', classification.area?.value || '—'],
    ['Action', actionability.suggestedAction || '—'],
    ['Severity', bug.severity || '—']
  ];
  document.getElementById('metric-cards').innerHTML = cards.map(([label, value]) => `
    <div class="col-6 col-lg-3">
      <div class="card metric-card h-100">
        <div class="card-body">
          <div class="metric-label">${esc(label)}</div>
          <div class="metric-value">${esc(value)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOverview(data) {
  const meta = data.meta || {};
  const classification = data.classification || {};
  const actionability = (data.output || {}).actionability || {};

  const badges = [
    classification.type?.value && badge(classification.type.value, 'bg-primary-subtle text-primary-emphasis'),
    classification.area?.value && badge(classification.area.value, 'bg-info-subtle text-info-emphasis'),
    actionability.suggestedAction && badge(actionability.suggestedAction, 'bg-warning-subtle text-warning-emphasis')
  ].filter(Boolean).join(' ');
  document.getElementById('header-badges').innerHTML = badges;
  document.getElementById('header-subtitle').textContent =
    `Issue #${meta.number || '?'} • ${meta.repo || 'mono/SkiaSharp'} • analyzed ${meta.analyzedAt || '—'}`;

  document.getElementById('hero-story').textContent = data.summary || '—';
  document.getElementById('hero-analysis').textContent = (data.analysis || {}).summary || '—';
  document.getElementById('hero-action-label').textContent = actionability.suggestedAction || '—';
  document.getElementById('hero-action-reason').textContent = actionability.reason || '—';

  const overviewRows = [
    ['Schema version', esc(meta.schemaVersion || '—')],
    ['Repository', esc(meta.repo || '—')],
    ['Analyzed at', esc(meta.analyzedAt || '—')],
    ['Current labels', fmtList(meta.currentLabels)],
    ['Type confidence', fmtConfidence(classification.type?.confidence)],
    ['Area confidence', fmtConfidence(classification.area?.confidence)],
    ['Platforms', fmtList(classification.platforms)],
    ['Backends', fmtList(classification.backends)],
    ['Tenets', fmtList(classification.tenets)],
    ['Partner', esc(classification.partner || '—')]
  ];

  document.getElementById('overview').innerHTML =
    section('Classification & Metadata', table(overviewRows)) +
    section('Actionability', table([
      ['Suggested action', esc(actionability.suggestedAction || '—')],
      ['Confidence', fmtConfidence(actionability.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(actionability.reason || '—')}</div>`],
      ['Suggested repro platform', esc(actionability.suggestedReproPlatform || '—')]
    ]));
}

function renderEvidence(data) {
  const evidence = data.evidence || {};
  const repro = evidence.reproEvidence || {};
  const bug = evidence.bugSignals || {};
  const version = evidence.versionAnalysis || {};
  const regression = evidence.regression || {};
  const fix = evidence.fixStatus || {};

  let html = '';
  html += section('Reproduction', [
    repro.stepsToReproduce?.length ? `<h6>Steps</h6>${listOrEmpty(repro.stepsToReproduce)}` : '',
    repro.environmentDetails ? `<p><strong>Environment:</strong> ${esc(repro.environmentDetails)}</p>` : '',
    repro.relatedIssues?.length ? `<p><strong>Related issues:</strong> ${repro.relatedIssues.map(n => `#${n}`).join(', ')}</p>` : '',
    repro.repoLinks?.length ? `<h6>Repo Links</h6>${listOrEmpty(repro.repoLinks, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.screenshots?.length ? `<h6>Screenshots</h6>${listOrEmpty(repro.screenshots, item => `<a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.attachments?.length ? `<h6>Attachments</h6>${listOrEmpty(repro.attachments, item => `${esc(item.filename)} — <a href="${esc(item.url)}">${esc(item.url)}</a>${item.description ? ' — ' + esc(item.description) : ''}`)}` : '',
    repro.codeSnippets?.length ? `<h6>Code Snippets</h6>${repro.codeSnippets.map(s => `<pre>${esc(s)}</pre>`).join('')}` : ''
  ].filter(Boolean).join('') || '<div class="empty-state">No reproduction evidence recorded.</div>');

  if (Object.keys(bug).length) {
    html += section('Bug Signals', table([
      ['Severity', esc(bug.severity || '—')],
      ['Regression claimed', esc(String(bug.regressionClaimed ?? '—'))],
      ['Error type', esc(bug.errorType || '—')],
      ['Error message', `<div class="text-wrap-pre">${esc(bug.errorMessage || '—')}</div>`],
      ['Repro quality', esc(bug.reproQuality || '—')],
      ['Target frameworks', fmtList(bug.targetFrameworks)]
    ]) + (bug.stackTrace ? `<h6>Stack Trace</h6><pre>${esc(bug.stackTrace)}</pre>` : ''));
  }

  if (Object.keys(version).length) {
    html += section('Version Analysis', table([
      ['Mentioned versions', fmtList(version.mentionedVersions)],
      ['Worked in', esc(version.workedIn || '—')],
      ['Broke in', esc(version.brokeIn || '—')],
      ['Current relevance', esc(version.currentRelevance || '—')],
      ['Relevance reason', `<div class="text-wrap-pre">${esc(version.relevanceReason || '—')}</div>`]
    ]));
  }

  if (Object.keys(regression).length) {
    html += section('Regression', table([
      ['Is regression', esc(String(regression.isRegression ?? '—'))],
      ['Confidence', fmtConfidence(regression.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(regression.reason || '—')}</div>`],
      ['Worked in version', esc(regression.workedInVersion || '—')],
      ['Broke in version', esc(regression.brokeInVersion || '—')]
    ]));
  }

  if (Object.keys(fix).length) {
    html += section('Fix Status', table([
      ['Likely fixed', esc(String(fix.likelyFixed ?? '—'))],
      ['Confidence', fmtConfidence(fix.confidence)],
      ['Reason', `<div class="text-wrap-pre">${esc(fix.reason || '—')}</div>`],
      ['Related PRs', fmtList(fix.relatedPRs, n => `#${n}`)],
      ['Related commits', fmtList(fix.relatedCommits)],
      ['Fixed in version', esc(fix.fixedInVersion || '—')]
    ]));
  }

  document.getElementById('evidence').innerHTML = html;
}

function renderAnalysis(data) {
  const analysis = data.analysis || {};
  const resolution = analysis.resolution || {};
  let html = '';

  html += section('Technical Summary', `<p class="mb-0 text-wrap-pre">${esc(analysis.summary || '—')}</p>`);
  if (analysis.rationale) {
    html += section('Rationale', `<p class="mb-0 text-wrap-pre">${esc(analysis.rationale)}</p>`);
  }
  if (analysis.keySignals?.length) {
    html += section('Key Signals', listOrEmpty(analysis.keySignals, item => {
      const interpretation = item.interpretation ? ` <span class="text-muted">(${esc(item.interpretation)})</span>` : '';
      return `"${esc(item.text)}" — <strong>${esc(item.source)}</strong>${interpretation}`;
    }));
  }
  if (analysis.codeInvestigation?.length) {
    html += section('Code Investigation', `
      <div class="table-responsive">
        <table class="table table-sm">
          <thead><tr><th>File</th><th>Lines</th><th>Relevance</th><th>Finding</th></tr></thead>
          <tbody>
            ${analysis.codeInvestigation.map(item => `
              <tr>
                <td class="mono">${esc(item.file)}</td>
                <td>${esc(item.lines || '—')}</td>
                <td>${esc(item.relevance || '—')}</td>
                <td>${esc(item.finding || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  }
  if (analysis.errorFingerprint) {
    html += section('Error Fingerprint', `<code>${esc(analysis.errorFingerprint)}</code>`);
  }
  if (analysis.workarounds?.length) {
    html += section('Workarounds', listOrEmpty(analysis.workarounds));
  }
  if (analysis.nextQuestions?.length) {
    html += section('Next Questions', listOrEmpty(analysis.nextQuestions));
  }

  if (Object.keys(resolution).length) {
    let body = '';
    if (resolution.hypothesis) {
      body += `<p><strong>Hypothesis:</strong> ${esc(resolution.hypothesis)}</p>`;
    }
    if (resolution.proposals?.length) {
      body += resolution.proposals.map((proposal, index) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">${index + 1}. ${esc(proposal.title || `Proposal ${index + 1}`)}</h6>
              <div class="d-flex gap-2 flex-wrap">
                ${proposal.category ? badge(proposal.category, 'badge-soft') : ''}
                ${proposal.effort ? badge(proposal.effort, 'bg-secondary-subtle text-secondary-emphasis') : ''}
                ${proposal.validated ? badge(`validated:${proposal.validated}`, 'bg-success-subtle text-success-emphasis') : ''}
              </div>
            </div>
            <p class="mb-2 text-wrap-pre">${esc(proposal.description || '—')}</p>
            ${typeof proposal.confidence === 'number' ? `<p class="mb-2"><strong>Confidence:</strong> ${fmtConfidence(proposal.confidence)}</p>` : ''}
            ${proposal.codeSnippet ? `<pre>${esc(proposal.codeSnippet)}</pre>` : ''}
          </div>
        </div>`).join('');
    } else {
      body += '<div class="empty-state">No proposals recorded.</div>';
    }
    if (resolution.recommendedProposal) {
      body += `<p><strong>Recommended proposal:</strong> ${esc(resolution.recommendedProposal)}</p>`;
    }
    if (resolution.recommendedReason) {
      body += `<p class="mb-0"><strong>Reason:</strong> ${esc(resolution.recommendedReason)}</p>`;
    }
    html += section('Resolution', body);
  }

  document.getElementById('analysis').innerHTML = html;
}

function renderActions(data) {
  const output = data.output || {};
  const actions = output.actions || [];

  let html = section('Actionability', table([
    ['Suggested action', esc(output.actionability?.suggestedAction || '—')],
    ['Confidence', fmtConfidence(output.actionability?.confidence)],
    ['Reason', `<div class="text-wrap-pre">${esc(output.actionability?.reason || '—')}</div>`],
    ['Suggested repro platform', esc(output.actionability?.suggestedReproPlatform || '—')]
  ]));

  if (output.missingInfo?.length) {
    html += section('Missing Info', listOrEmpty(output.missingInfo));
  }

  html += section('Automatable Actions', actions.length ? actions.map(action => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <h6 class="mb-0">${esc(action.type || 'action')}</h6>
          <div class="d-flex gap-2 flex-wrap">
            ${action.risk ? badge(`risk:${action.risk}`, 'bg-danger-subtle text-danger-emphasis') : ''}
            ${typeof action.confidence === 'number' ? badge(`confidence:${fmtConfidence(action.confidence)}`, 'bg-info-subtle text-info-emphasis') : ''}
          </div>
        </div>
        <p class="mb-2 text-wrap-pre">${esc(action.description || '—')}</p>
        ${action.labels?.length ? `<p><strong>Labels:</strong> ${fmtList(action.labels)}</p>` : ''}
        ${action.linkedIssue ? `<p><strong>Linked issue:</strong> #${action.linkedIssue}</p>` : ''}
        ${action.stateReason ? `<p><strong>State reason:</strong> ${esc(action.stateReason)}</p>` : ''}
        ${action.category ? `<p><strong>Discussion category:</strong> ${esc(action.category)}</p>` : ''}
        ${action.milestone ? `<p><strong>Milestone:</strong> ${esc(action.milestone)}</p>` : ''}
        ${action.comment ? `<h6>Comment Draft</h6><pre>${esc(action.comment)}</pre>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty-state">No automatable actions recorded.</div>');

  document.getElementById('actions').innerHTML = html;
}

function renderRaw(data) {
  document.getElementById('raw').innerHTML = `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

renderMetricCards(DATA);
renderOverview(DATA);
renderEvidence(DATA);
renderAnalysis(DATA);
renderActions(DATA);
renderRaw(DATA);
</script>
</body>
</html>
