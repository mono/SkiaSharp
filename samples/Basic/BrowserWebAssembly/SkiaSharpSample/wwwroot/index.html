<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
  <title>SkiaSharp — Browser WebAssembly</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <style>
    body { background: #f8f9fa; }
    #surface {
      border: 1px solid #dee2e6;
      border-radius: 0.375rem;
      display: block;
      max-width: 100%;
      touch-action: none;
    }
    .color-swatch {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      display: inline-block;
    }
    .color-swatch.active { border-color: #0d6efd; box-shadow: 0 0 0 2px #0d6efd44; }
    #loading { min-height: 400px; }
    #fps-badge { font-variant-numeric: tabular-nums; }
  </style>
  <script type='module' src="./main.js"></script>
</head>

<body>
  <div class="container py-4" style="max-width: 880px;">
    <h4 class="mb-3">SkiaSharp — Browser WebAssembly</h4>

    <!-- Tabs -->
    <ul class="nav nav-tabs" id="sampleTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="cpu-tab" data-bs-toggle="tab" data-bs-target="#cpu-pane"
          type="button" role="tab">CPU</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="gpu-tab" data-bs-toggle="tab" data-bs-target="#gpu-pane"
          type="button" role="tab">GPU</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="drawing-tab" data-bs-toggle="tab" data-bs-target="#drawing-pane"
          type="button" role="tab">Drawing</button>
      </li>
    </ul>

    <!-- Tab content -->
    <div class="tab-content border border-top-0 rounded-bottom bg-white p-3">
      <!-- CPU pane -->
      <div class="tab-pane fade show active" id="cpu-pane" role="tabpanel">
        <p class="text-muted small mb-2">Radial gradient, circles, and centered text — rendered on the CPU.</p>
        <canvas id="surface" width="800" height="600"></canvas>
      </div>

      <!-- GPU pane -->
      <div class="tab-pane fade" id="gpu-pane" role="tabpanel">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="text-muted small">Animated SkSL metaball shader. Touch or click to interact.</span>
          <span id="fps-badge" class="badge bg-secondary">-- FPS</span>
        </div>
        <canvas id="surface" width="800" height="600"></canvas>
      </div>

      <!-- Drawing pane -->
      <div class="tab-pane fade" id="drawing-pane" role="tabpanel">
        <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
          <span class="text-muted small me-1">Color:</span>
          <span class="color-swatch active" data-color="0" style="background:#000000;" title="#000000"></span>
          <span class="color-swatch" data-color="1" style="background:#E53935;" title="#E53935"></span>
          <span class="color-swatch" data-color="2" style="background:#1E88E5;" title="#1E88E5"></span>
          <span class="color-swatch" data-color="3" style="background:#43A047;" title="#43A047"></span>
          <span class="color-swatch" data-color="4" style="background:#FB8C00;" title="#FB8C00"></span>
          <span class="color-swatch" data-color="5" style="background:#8E24AA;" title="#8E24AA"></span>
          <span class="text-muted small ms-3 me-1">Size:</span>
          <input type="range" class="form-range" id="brush-size" min="1" max="24" value="4" style="width:120px;">
          <button class="btn btn-outline-secondary btn-sm ms-auto" id="clear-btn">Clear</button>
        </div>
        <canvas id="surface" width="800" height="600"></canvas>
      </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading" class="d-flex justify-content-center align-items-center position-absolute top-0 start-0 w-100 h-100 bg-white bg-opacity-75" style="z-index:10;">
      <div class="text-center">
        <div class="spinner-border text-primary mb-2" role="status"></div>
        <div class="text-muted">Loading SkiaSharp…</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
</body>

</html>
