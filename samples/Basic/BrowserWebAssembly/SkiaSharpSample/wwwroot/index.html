<!DOCTYPE html>
<html lang="en">

<head>
  <title>SkiaSharp — Browser WebAssembly</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <script type='module' src="./main.js"></script>
</head>

<body class="bg-light">
  <div class="container py-4" style="max-width: 880px;">
    <h4 class="mb-3">SkiaSharp — Browser WebAssembly</h4>
    <p class="text-muted small">Radial gradient, circles, and centered text — rendered entirely in C# via SkiaSharp,
      running as WebAssembly in the browser.</p>
    <div class="card">
      <div class="card-body p-2 text-center">
        <div id="loading" class="py-5">
          <div class="spinner-border text-primary mb-2" role="status"></div>
          <div class="text-muted">Loading SkiaSharp…</div>
        </div>
        <img id="output" class="img-fluid rounded d-none" alt="SkiaSharp rendered image">
      </div>
    </div>
    <p class="text-muted small mt-2 mb-0">Image generated by .NET WebAssembly — no server-side rendering.</p>
  </div>
</body>

</html>
