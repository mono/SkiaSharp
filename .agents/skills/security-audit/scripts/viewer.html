<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Security Audit Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --bg: #f6f8fa; --border: #d0d7de; --muted: #57606a; --surface: #fff; }
    body { background: var(--bg); color: #1f2328; }
    .page-shell { max-width: 1200px; }
    .sticky-header { position: sticky; top: 0; z-index: 1030; backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.94); border-bottom: 1px solid var(--border); }
    .card { border: 1px solid var(--border); box-shadow: 0 1px 2px rgba(16,24,40,0.04); }
    .status-pill { font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 12px; }
    .st-attention { background: #fee2e2; color: #991b1b; }
    .st-cg-tracked { background: #ede9fe; color: #5b21b6; }
    .st-undiscovered { background: #dbeafe; color: #1e40af; }
    .st-false-positive { background: #f3f4f6; color: #6b7280; }
    .st-clean { background: #dcfce7; color: #166534; }
    .st-in-progress { background: #fef3c7; color: #92400e; }
    .st-ready { background: #dcfce7; color: #166534; }
    .sev-critical { color: #7f1d1d; font-weight: 700; }
    .sev-high { color: #991b1b; font-weight: 600; }
    .sev-medium { color: #92400e; }
    .sev-low { color: #6b7280; }
    .sev-unknown { color: #dc2626; font-style: italic; }
    .version-match { color: #166534; }
    .version-mismatch { color: #991b1b; font-weight: 700; }
    .finding-header { cursor: pointer; }
    .finding-header:hover { background: #f3f4f6; }
    .cve-table th { white-space: nowrap; font-size: 0.85rem; }
    .cve-table td { font-size: 0.85rem; }
    .next-step { border-left: 3px solid; padding-left: 12px; margin-bottom: 12px; }
    .ns-high { border-color: #dc2626; }
    .ns-medium { border-color: #f59e0b; }
    .ns-low { border-color: #6b7280; }
    .meta-table td, .meta-table th { font-size: 0.85rem; padding: 4px 8px; }
    .overview-row { cursor: pointer; transition: background 0.15s; }
    .overview-row:hover { background: #e8f0fe !important; }
    .overview-mismatch { background: #fef2f2 !important; }
    .overview-mismatch:hover { background: #fee2e2 !important; }
    .overview-mismatch td { color: #991b1b; }
    code { font-size: 0.8rem; }
  </style>
</head>
<body>
<!--INJECT_DATA_HERE-->
<div class="page-shell mx-auto px-3 py-4">

  <!-- Header -->
  <div class="sticky-header py-2 px-3 mb-4">
    <div class="d-flex align-items-center justify-content-between">
      <div>
        <h4 class="mb-0"><i class="bi bi-shield-check me-2"></i>Security Audit Report</h4>
        <small class="text-muted" id="header-subtitle"></small>
      </div>
      <div id="header-badges"></div>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="row g-3 mb-4" id="summary-cards"></div>

  <!-- Dependency Overview (combined version + security status) -->
  <div class="card mb-4">
    <div class="card-header bg-white d-flex align-items-center">
      <i class="bi bi-table me-2"></i><strong>Dependency Overview</strong>
      <span class="ms-auto text-muted" id="overview-status"></span>
    </div>
    <div class="card-body p-0">
      <table class="table table-sm table-hover mb-0 meta-table" id="overview-table">
        <thead><tr>
          <th>Dependency</th><th>Source</th><th>Current Version</th>
          <th>Latest</th><th>Severity</th><th>Status</th><th>CVEs</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Findings -->
  <h5 class="mb-3"><i class="bi bi-exclamation-triangle me-2"></i>Findings</h5>
  <div id="findings-container"></div>

  <!-- Component Governance Alerts -->
  <div class="card mb-4" id="cg-section" style="display:none;">
    <div class="card-header bg-white d-flex align-items-center">
      <i class="bi bi-shield-exclamation me-2"></i><strong>Component Governance (Build Pipeline)</strong>
      <a href="https://devdiv.visualstudio.com/DevDiv/_componentGovernance/113321?_a=alerts&typeId=29227950&alerts-view-option=active" target="_blank" class="ms-2 small">Open in AzDO</a>
      <span class="ms-auto" id="cg-badge"></span>
    </div>
    <div class="card-body">
      <div class="row g-3 mb-3" id="cg-severity-cards"></div>
      <div id="cg-components"></div>
      <div class="text-muted small mt-3" id="cg-pipelines"></div>
    </div>
  </div>

  <!-- Chrome Releases Blog -->
  <div class="card mb-4" id="cr-section" style="display:none;">
    <div class="card-header bg-white d-flex align-items-center">
      <i class="bi bi-rss me-2"></i><strong>Chrome Releases Blog</strong>
      <a href="https://chromereleases.googleblog.com/" target="_blank" class="ms-2 small">Open Blog</a>
      <span class="ms-auto" id="cr-badge"></span>
    </div>
    <div class="card-body">
      <div class="row g-3 mb-3" id="cr-summary-cards"></div>
      <div id="cr-cve-table"></div>
      <div class="text-muted small mt-3" id="cr-meta"></div>
    </div>
  </div>

  <!-- Next Steps -->
  <div class="card mb-4">
    <div class="card-header bg-white"><i class="bi bi-list-check me-2"></i><strong>Next Steps</strong></div>
    <div class="card-body" id="next-steps"></div>
  </div>

  <!-- Skia Upstream Info -->
  <div class="card mb-4">
    <div class="card-header bg-white"><i class="bi bi-git me-2"></i><strong>Skia Upstream Verification</strong></div>
    <div class="card-body" id="upstream-info"></div>
  </div>
</div>

<script>
const STATUS_LABELS = {
  needs_attention: ['🔴 Needs Attention', 'st-attention'],
  cg_tracked: ['🛡️ CG Tracked', 'st-cg-tracked'],
  undiscovered: ['🆕 Undiscovered', 'st-undiscovered'],
  false_positive: ['⚪ False Positive', 'st-false-positive'],
  clean: ['✅ Clean', 'st-clean'],
  in_progress: ['🟡 In Progress', 'st-in-progress'],
  ready_to_merge: ['✅ Ready', 'st-ready'],
};

const SEV_CLASS = { CRITICAL: 'sev-critical', HIGH: 'sev-high', MEDIUM: 'sev-medium', LOW: 'sev-low' };

function sevClass(s) { return SEV_CLASS[(s||'').toUpperCase()] || 'sev-unknown'; }
function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

const ASSESSMENT_LABELS = {
  affected: ['🔴 Affected', 'badge bg-danger'],
  already_fixed: ['✅ Fixed', 'badge bg-success'],
  false_positive: ['⚪ False Positive', 'badge bg-secondary'],
  needs_review: ['🟡 Needs Review', 'badge bg-warning text-dark'],
  not_in_tree: ['➖ Not In Tree', 'badge bg-light text-dark border'],
};
function assessmentBadge(val) {
  const entry = ASSESSMENT_LABELS[val];
  if (entry) return `<span class="${entry[1]}">${entry[0]}</span>`;
  return esc(val);
}

function renderSummary(s, cgAlerts) {
  const cgCount = cgAlerts ? (cgAlerts.totalAlerts || 0) : 0;
  const cgHigh = cgAlerts ? ((cgAlerts.bySeverity || {}).High || 0) + ((cgAlerts.bySeverity || {}).Critical || 0) : 0;
  const cards = [
    ['Needs Attention', s.needsAttention + cgHigh, 'danger', 'exclamation-triangle', 'CVEs requiring action or patches'],
    ['CG Alerts', cgCount, cgHigh > 0 ? 'danger' : 'warning', 'shield-exclamation', 'Build pipeline container vulnerabilities'],
    ['Undiscovered', s.undiscovered, 'primary', 'search', 'Proactively found, no issue filed yet'],
    ['False Positive', s.falsePositive, 'secondary', 'x-circle', 'Not applicable to SkiaSharp'],
    ['Clean', s.clean, 'success', 'check-circle', 'Dependencies with no open CVEs'],
  ];
  const el = document.getElementById('summary-cards');
  el.innerHTML = cards.map(([label, count, color, icon, desc]) => `
    <div class="col-6 col-md">
      <div class="card text-center p-3">
        <div class="fs-2 text-${color}"><i class="bi bi-${icon}"></i></div>
        <div class="fs-1 fw-bold">${count}</div>
        <div class="text-muted small">${label}</div>
        <div class="text-muted" style="font-size:0.7rem;">${desc}</div>
      </div>
    </div>`).join('');
}

function renderOverview(vers, findings, cgAlerts) {
  const tbody = document.querySelector('#overview-table tbody');
  const findingMap = {};
  (findings || []).forEach((f, i) => { findingMap[f.dependency] = { ...f, idx: i }; });

  // Enrich each entry with CVE count and finding index
  const enriched = (vers || []).map(v => {
    const f = findingMap[v.name];
    const cveTotal = f ? (f.cves||[]).length + (f.nonChromeCves||[]).length : 0;
    // Derive highest severity from CVEs
    let maxSev = '';
    if (f) {
      const allCves = [...(f.cves||[]), ...(f.nonChromeCves||[])];
      const sevOrd = { Critical: 0, High: 1, Medium: 2, Low: 3 };
      allCves.forEach(c => {
        const norm = (c.severity||'').charAt(0).toUpperCase() + (c.severity||'').slice(1).toLowerCase();
        if (!maxSev || (sevOrd[norm] ?? 9) < (sevOrd[maxSev] ?? 9)) maxSev = norm;
      });
    }
    return { ...v, f, cveTotal, findingIdx: f ? f.idx : -1, isCg: false, cgSeverity: maxSev };
  });

  // Add CG components as rows (grouped by component)
  if (cgAlerts && cgAlerts.alerts) {
    const byComp = {};
    cgAlerts.alerts.forEach(a => {
      if (!byComp[a.component]) byComp[a.component] = { alerts: [], severity: 'Low' };
      byComp[a.component].alerts.push(a);
      const sevOrder = { Critical: 0, High: 1, Medium: 2, Low: 3 };
      if ((sevOrder[a.severity] || 9) < (sevOrder[byComp[a.component].severity] || 9)) {
        byComp[a.component].severity = a.severity;
      }
    });
    Object.entries(byComp).forEach(([comp, data]) => {
      // Split "minimatch 3.1.2" or "Debian:12:binutils 2.39-r2" into name + version
      const verMatch = comp.match(/^(.+?)\s+([\d][\w.\-+:~]*)$/);
      const compName = verMatch ? verMatch[1] : comp;
      const compVersion = verMatch ? verMatch[2] : '';
      // Map CG severity to finding status — all CVEs need attention, severity determines urgency
      const statusMap = { Critical: 'needs_attention', High: 'needs_attention', Medium: 'cg_tracked', Low: 'cg_tracked' };
      enriched.push({
        name: compName,
        source: 'CG (Build Pipeline)',
        verifiedVersion: compVersion,
        cgmanifestVersion: '',
        latestVersion: '',
        match: true,
        f: { status: statusMap[data.severity] || 'undiscovered' },
        cveTotal: data.alerts.length,
        findingIdx: -1,
        isCg: true,
        cgSeverity: data.severity
      });
    });
  }

  // Split into groups: has CVEs vs no CVEs, sorted by severity then name
  const sevOrder = { Critical: 0, High: 1, Medium: 2, Low: 3 };
  const withCves = enriched.filter(e => e.cveTotal > 0).sort((a,b) => {
    const aSev = sevOrder[a.cgSeverity] ?? (a.f?.status === 'needs_attention' ? 1 : a.f?.status === 'undiscovered' ? 2 : 3);
    const bSev = sevOrder[b.cgSeverity] ?? (b.f?.status === 'needs_attention' ? 1 : b.f?.status === 'undiscovered' ? 2 : 3);
    return aSev !== bSev ? aSev - bSev : a.name.localeCompare(b.name);
  });
  const noCves = enriched.filter(e => e.cveTotal === 0).sort((a,b) => a.name.localeCompare(b.name));

  let mismatches = 0;

  function buildRow(v) {
    if (!v.match) mismatches++;
    const rowCls = v.match ? 'overview-row' : 'overview-row overview-mismatch';
    let onclick = '';
    if (v.isCg) {
      onclick = `onclick="document.getElementById('cg-section').scrollIntoView({behavior:'smooth',block:'start'})"`;
    } else if (v.findingIdx >= 0) {
      onclick = `onclick="document.getElementById('finding-${v.findingIdx}').scrollIntoView({behavior:'smooth',block:'start'}); var col=document.getElementById('finding-${v.findingIdx}'); if(!col.classList.contains('show')){col.previousElementSibling.click();}"`;
    }

    let secBadge = '<span class="status-pill st-clean">✅ Clean</span>';
    let cveCount = '';
    let latest = v.latestVersion || '';
    let sevBadge = '<span class="text-muted">—</span>';
    if (v.cgSeverity) {
      const normSev = v.cgSeverity.charAt(0).toUpperCase() + v.cgSeverity.slice(1).toLowerCase();
      sevBadge = `<span class="${sevClass(v.cgSeverity)}">${esc(normSev)}</span>`;
    }
    if (v.f) {
      const [label, cls] = STATUS_LABELS[v.f.status] || ['?', ''];
      secBadge = `<span class="status-pill ${cls}">${label}</span>`;
      if (v.cveTotal > 0) cveCount = `<span class="badge bg-danger">${v.cveTotal}</span>`;
      if (v.f.latestVersion) latest = v.f.latestVersion;
    }

    const versionDisplay = !v.match
      ? `${esc(v.verifiedVersion)} <span class="text-danger small">(cgmanifest: ${esc(v.cgmanifestVersion||'missing')})</span>`
      : esc(v.verifiedVersion);

    return `<tr class="${rowCls}" ${onclick}>
      <td><strong>${esc(v.name)}</strong></td>
      <td class="text-muted small">${esc(v.source || 'Skia DEPS')}</td>
      <td>${versionDisplay}</td>
      <td>${latest ? esc(latest) : '<span class="text-muted">—</span>'}</td>
      <td>${sevBadge}</td>
      <td>${secBadge}</td>
      <td>${cveCount}</td>
    </tr>`;
  }

  function groupHeader(label, count) {
    return `<tr class="table-light"><td colspan="7" class="fw-bold small text-muted py-1 px-2"><i class="bi bi-${count > 0 ? 'exclamation-triangle text-danger' : 'check-circle text-success'} me-1"></i>${label} (${count})</td></tr>`;
  }

  let html = '';
  html += groupHeader('Dependencies with CVEs', withCves.length);
  html += withCves.map(buildRow).join('');
  html += groupHeader('Clean dependencies', noCves.length);
  html += noCves.map(buildRow).join('');

  tbody.innerHTML = html;
  const nonCgEntries = enriched.filter(v => !v.isCg);
  const total = nonCgEntries.length;
  const cgMissing = nonCgEntries.filter(v => !v.cgmanifestVersion).length;
  const cgTotal = enriched.filter(v => v.isCg).length;
  let statusText = mismatches === 0 && cgMissing === 0
    ? `✅ All ${total} dependencies verified`
    : `${total} deps`;
  if (mismatches > 0) statusText += ` · ❌ ${mismatches} version mismatch${mismatches > 1 ? 'es' : ''}`;
  if (cgMissing > 0) statusText += ` · ⚠️ ${cgMissing} missing from cgmanifest`;
  if (cgTotal > 0) statusText += ` · 🛡️ ${cgTotal} CG components`;
  document.getElementById('overview-status').textContent = statusText;
}

function renderCveTable(cves, columns) {
  if (!cves || cves.length === 0) return '';
  // Filter out description from main columns — it goes in the expand row
  const mainCols = columns.filter(c => c.key !== 'description');
  const hasDesc = columns.some(c => c.key === 'description');
  const hasSource = columns.some(c => c.key === 'source');
  const descWidth = hasSource ? '35%' : '50%';
  const hdrs = mainCols.map(c => `<th>${c.label}</th>`).join('') + (hasDesc ? `<th style="width:${descWidth};">Description</th>` : '');
  const rows = cves.map((cve, i) => {
    const cells = mainCols.map(c => {
      const val = cve[c.key] || '';
      if (c.key === 'severity' || c.key === 'cvss') {
        return `<td class="${sevClass(cve.severity)}" style="white-space:nowrap;width:70px;overflow:hidden;">${esc(String(val))}</td>`;
      }
      if (c.key === 'id') {
        const url = val.startsWith('GHSA-') ? `https://github.com/advisories/${esc(val)}` : `https://nvd.nist.gov/vuln/detail/${esc(val)}`;
        return `<td style="white-space:nowrap;width:145px;"><a href="${url}" target="_blank">${esc(val)}</a></td>`;
      }
      if (c.key === 'assessment') {
        return `<td style="width:90px;">${assessmentBadge(String(val))}</td>`;
      }
      if (c.key === 'fixedIn') {
        return `<td style="white-space:nowrap;width:70px;">${esc(String(val))}</td>`;
      }
      if (c.key === 'source') {
        return `<td style="white-space:nowrap;width:150px;">${esc(String(val))}</td>`;
      }
      return `<td style="white-space:nowrap;">${esc(String(val))}</td>`;
    }).join('');
    const desc = cve.description || '';
    const descCell = hasDesc ? `<td class="cve-desc-cell" style="cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" onclick="this.closest('tr').nextElementSibling.classList.toggle('d-none')" title="${esc(desc)}">${esc(desc)} ${desc.length > 30 ? '<i class="bi bi-chevron-down small text-muted"></i>' : ''}</td>` : '';
    const expandRow = hasDesc && desc.length > 30
      ? `<tr class="d-none"><td colspan="${mainCols.length + 1}" class="py-2 ps-4 small text-muted border-0" style="white-space:normal;">${esc(desc)}</td></tr>`
      : `<tr class="d-none"><td colspan="${mainCols.length + 1}" class="border-0"></td></tr>`;
    return `<tr>${cells}${descCell}</tr>${expandRow}`;
  }).join('');
  return `<table class="table table-sm cve-table mb-2" style="table-layout:fixed;width:100%;"><thead><tr>${hdrs}</tr></thead><tbody>${rows}</tbody></table>`;
}

function renderFinding(f, idx) {
  const [statusLabel, statusCls] = STATUS_LABELS[f.status] || ['?', ''];
  const hasCves = (f.cves && f.cves.length > 0) || (f.nonChromeCves && f.nonChromeCves.length > 0);
  const collapseId = `finding-${idx}`;

  let body = '';

  // Info table
  body += `<table class="table table-sm meta-table mb-3"><tbody>`;
  if (f.currentVersion) body += `<tr><th>Current</th><td>${esc(f.currentVersion)}</td></tr>`;
  if (f.fixVersion) body += `<tr><th>Min Fix</th><td>${esc(f.fixVersion)}</td></tr>`;
  if (f.latestVersion) body += `<tr><th>Latest</th><td>${esc(f.latestVersion)}</td></tr>`;
  if (f.issues && f.issues.length) body += `<tr><th>Issues</th><td>${f.issues.map(i => {
      const num = typeof i === 'object' ? i.number : i;
      const repo = (typeof i === 'object' && i.repo) ? i.repo : 'mono/SkiaSharp';
      const state = (typeof i === 'object' && i.state) ? ` (${i.state.toLowerCase()})` : '';
      return `<a href="https://github.com/${repo}/issues/${num}" target="_blank">#${num}</a>${state}`;
    }).join(', ')}</td></tr>`;
  if (f.prs && f.prs.length) body += `<tr><th>PRs</th><td>${f.prs.map(p => {
      const num = typeof p === 'object' ? p.number : p;
      const repo = (typeof p === 'object' && p.repo) ? p.repo : 'mono/SkiaSharp';
      const title = (typeof p === 'object' && p.title) ? ` &mdash; ${esc(p.title)}` : '';
      return `<a href="https://github.com/${repo}/pull/${num}" target="_blank">#${num}</a>${title}`;
    }).join('<br>')}</td></tr>`;
  body += `</tbody></table>`;

  // Chrome CVEs
  if (f.cves && f.cves.length > 0) {
    // Normalize: populate fixedIn from fixMilestone if missing
    f.cves.forEach(c => { if (!c.fixedIn && c.fixMilestone) c.fixedIn = c.fixMilestone; });
    const hasFixedIn = f.cves.some(c => c.fixedIn);
    body += `<h6>CVEs</h6>`;
    const cveCols = [{key:'id', label:'CVE'}];
    if (hasFixedIn) cveCols.push({key:'fixedIn', label:'Fixed In'});
    cveCols.push({key:'severity', label:'Severity'}, {key:'cvss', label:'CVSS'},
      {key:'description', label:'Description'}, {key:'assessment', label:'Status'});
    body += renderCveTable(f.cves, cveCols);
  }

  // Non-Chrome CVEs
  if (f.nonChromeCves && f.nonChromeCves.length > 0) {
    body += `<h6 class="mt-3">Non-Chrome CVEs (Manual Review)</h6>`;
    body += renderCveTable(f.nonChromeCves, [
      {key:'id', label:'CVE'}, {key:'severity', label:'Severity'},
      {key:'description', label:'Description'}, {key:'source', label:'Source'},
      {key:'assessment', label:'Status'}
    ]);
  }

  // Action + Notes
  if (f.action) body += `<div class="alert alert-info mt-3 py-2 small"><strong>Action:</strong> ${esc(f.action)}</div>`;
  if (f.notes) body += `<div class="text-muted small">${esc(f.notes)}</div>`;
  // False positive reason
  if (f.status === 'false_positive' && f.falsePositiveReason) {
    body += `<div class="alert alert-secondary mt-2 py-2 small"><strong>Reason:</strong> ${esc(f.falsePositiveReason)}</div>`;
  }

  return `
    <div class="card mb-3">
      <div class="card-header bg-white finding-header d-flex align-items-center" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
        <span class="me-2 fw-bold">${idx + 1}.</span>
        <span class="status-pill ${statusCls} me-2">${statusLabel}</span>
        <strong class="me-auto">${esc(f.dependency)}</strong>
        ${hasCves ? `<span class="badge bg-danger">${(f.cves||[]).length + (f.nonChromeCves||[]).length} CVEs</span>` : ''}
        <i class="bi bi-chevron-down ms-2"></i>
      </div>
      <div class="collapse ${f.status === 'clean' || f.status === 'false_positive' ? '' : 'show'}" id="${collapseId}">
        <div class="card-body">${body}</div>
      </div>
    </div>`;
}

function renderNextSteps(steps) {
  const el = document.getElementById('next-steps');
  el.innerHTML = steps.map(s => {
    const cls = (s.severity||'').toUpperCase() === 'HIGH' || (s.severity||'').toUpperCase() === 'CRITICAL'
      ? 'ns-high' : (s.severity||'').toUpperCase() === 'MEDIUM' ? 'ns-medium' : 'ns-low';
    return `<div class="next-step ${cls}">
      <div class="d-flex align-items-center">
        <span class="badge bg-secondary me-2">${s.priority}</span>
        <strong>${esc(s.action)}</strong>
        <span class="ms-2 ${sevClass(s.severity)} small">${esc(s.severity||'')}</span>
      </div>
      <div class="text-muted small">${esc(s.reason)}</div>
      ${s.command ? `<code class="small">${esc(s.command)}</code>` : ''}
    </div>`;
  }).join('');
}

function renderUpstream(meta) {
  const el = document.getElementById('upstream-info');
  const milestoneNote = meta.upstreamVerified ? ' (verified from SkMilestone.h)' : ' <span class="text-danger">(NOT independently verified)</span>';
  const forkCommit = meta.skiaSubmoduleCommit
    ? `<code><a href="https://github.com/mono/skia/commit/${esc(meta.skiaSubmoduleCommit)}" target="_blank">${esc(meta.skiaSubmoduleCommit)}</a></code>`
    : '<span class="text-muted">not captured</span>';
  const upstreamCommit = meta.skiaUpstreamCommit
    ? `<code><a href="https://github.com/google/skia/commit/${esc(meta.skiaUpstreamCommit)}" target="_blank">${esc(meta.skiaUpstreamCommit)}</a></code>`
    : '<span class="text-muted">not captured</span>';
  el.innerHTML = `<table class="table table-sm meta-table mb-0"><tbody>
    <tr><th>Milestone</th><td>m${esc(String(meta.skiaMilestone))}${milestoneNote}</td></tr>
    <tr><th>Fork Commit</th><td>${forkCommit}</td></tr>
    <tr><th>Upstream Commit</th><td>${upstreamCommit}</td></tr>
    <tr><th>Ancestry Verified</th><td>${meta.upstreamVerified ? '✅ Yes' : '❌ No'}</td></tr>
  </tbody></table>`;
}

function renderChromeReleases(cr, milestone) {
  if (!cr || !cr.skiaRelevantCves) return;
  const section = document.getElementById('cr-section');
  section.style.display = '';

  // Badge
  const badge = document.getElementById('cr-badge');
  const aboveMilestone = (cr.structuredCves || []).filter(c => c.milestone > milestone).length;
  badge.innerHTML = `<span class="badge bg-${aboveMilestone > 0 ? 'warning' : 'success'}">${cr.skiaRelevantCves} relevant CVEs</span>`;

  // Summary cards
  const cards = document.getElementById('cr-summary-cards');
  const sevCounts = { Critical: 0, High: 0, Medium: 0, Low: 0 };
  (cr.structuredCves || []).forEach(c => { sevCounts[c.severity] = (sevCounts[c.severity] || 0) + 1; });
  const cardEntries = [
    ['Critical', sevCounts.Critical, 'danger'],
    ['High', sevCounts.High, 'warning'],
    ['Medium', sevCounts.Medium, 'info'],
    ['Low', sevCounts.Low, 'secondary'],
    ['Above m' + milestone, aboveMilestone, aboveMilestone > 0 ? 'danger' : 'success'],
    ['Posts Reviewed', cr.postsReviewed, 'primary'],
  ];
  cards.innerHTML = cardEntries.filter(([,count]) => count > 0).map(([label, count, color]) => `
    <div class="col-2">
      <div class="card text-center p-2">
        <div class="fs-5 fw-bold text-${color}">${count}</div>
        <div class="text-muted small">${label}</div>
      </div>
    </div>`).join('');

  // CVE table (group by component, show only those above our milestone)
  const cves = (cr.structuredCves || []).filter(c => c.milestone > milestone);
  if (cves.length > 0) {
    const byComp = {};
    cves.forEach(c => {
      if (!byComp[c.component]) byComp[c.component] = [];
      byComp[c.component].push(c);
    });
    const sevOrder = { Critical: 0, High: 1, Medium: 2, Low: 3 };
    const compPriority = { 'Skia': 0, 'ANGLE': 1, 'Canvas': 2, 'Fonts': 3, 'GPU': 4, 'Compositing': 5, 'WebGL': 6 };
    const sorted = Object.entries(byComp).sort((a, b) => {
      const aPri = compPriority[a[0]] ?? 99;
      const bPri = compPriority[b[0]] ?? 99;
      if (aPri !== bPri) return aPri - bPri;
      const aMin = Math.min(...a[1].map(c => sevOrder[c.severity] ?? 9));
      const bMin = Math.min(...b[1].map(c => sevOrder[c.severity] ?? 9));
      return aMin - bMin;
    });

    const table = document.getElementById('cr-cve-table');
    table.innerHTML = `<h6 class="mb-2">CVEs Above Current Milestone (m${milestone})</h6>` +
      sorted.map(([comp, compCves]) => {
        const rows = compCves.sort((a, b) => (sevOrder[a.severity] ?? 9) - (sevOrder[b.severity] ?? 9))
          .map(c => {
            const bugUrl = c.bugId ? `https://issues.chromium.org/issues/${esc(c.bugId)}` : '#';
          const blogLink = c.blogPostUrl ? `<a href="${esc(c.blogPostUrl)}" target="_blank" title="Blog post"><i class="bi bi-link-45deg"></i></a>` : '';
          return `<tr>
            <td><span class="${sevClass(c.severity)}">${esc(c.severity)}</span></td>
            <td>${esc(c.cveId)}</td>
            <td>m${c.milestone}</td>
            <td><a href="${bugUrl}" target="_blank">${esc(c.bugId || 'N/A')}</a></td>
            <td>${blogLink}</td>
          </tr>`;
        }).join('');
        return `<div class="mb-2"><strong>${esc(comp)}</strong> <span class="badge bg-secondary">${compCves.length}</span>
        <table class="table table-sm cve-table mb-1"><thead><tr><th>Severity</th><th>CVE</th><th>Fixed In</th><th>Bug</th><th>Blog</th></tr></thead>
        <tbody>${rows}</tbody></table></div>`;
      }).join('');
  }

  // Meta
  const meta = document.getElementById('cr-meta');
  meta.textContent = `Queried ${cr.monthsQueried} months (${cr.postsReviewed} posts) • ${cr.totalCvesExtracted} total CVEs extracted • ${cr.skiaRelevantCves} Skia-relevant`;
}

function renderCgAlerts(cg) {
  if (!cg || !cg.totalAlerts) return;
  const section = document.getElementById('cg-section');
  section.style.display = '';

  // Badge
  const badge = document.getElementById('cg-badge');
  const highCount = ((cg.bySeverity || {}).High || 0) + ((cg.bySeverity || {}).Critical || 0);
  const totalCount = cg.totalAlerts || 0;
  badge.innerHTML = `<span class="badge bg-${highCount > 0 ? 'danger' : 'warning'}">${totalCount} alerts</span>`;

  // Severity cards
  const sevCards = document.getElementById('cg-severity-cards');
  const sevData = cg.bySeverity || {};
  const sevEntries = [
    ['Critical', sevData.Critical || 0, 'danger', 'shield-fill-exclamation'],
    ['High', sevData.High || 0, 'danger', 'exclamation-octagon'],
    ['Medium', sevData.Medium || 0, 'warning', 'exclamation-triangle'],
    ['Low', sevData.Low || 0, 'secondary', 'info-circle'],
  ];
  sevCards.innerHTML = sevEntries.filter(([,count]) => count > 0).map(([label, count, color, icon]) => `
    <div class="col-3">
      <div class="card text-center p-2">
        <div class="text-${color}"><i class="bi bi-${icon}"></i></div>
        <div class="fs-4 fw-bold">${count}</div>
        <div class="text-muted small">${label}</div>
      </div>
    </div>`).join('');

  // cg.alerts = [{id, component, severity, paths, pipelines, branches, sources}]
  const allAlerts = cg.alerts || [];

  // Group alerts by component, render as collapsible cards
  if (allAlerts.length > 0) {
    const byComp = {};
    allAlerts.forEach(a => {
      const key = a.component;
      if (!byComp[key]) byComp[key] = { component: key, alerts: [], paths: new Set(), pipelines: new Set(), branches: new Set() };
      byComp[key].alerts.push(a);
      (a.paths || []).forEach(p => byComp[key].paths.add(p));
      (a.pipelines || []).forEach(p => byComp[key].pipelines.add(p));
      (a.branches || []).forEach(b => byComp[key].branches.add(b));
    });

    // Sort: highest severity first, then by alert count desc
    const sevOrder = { Critical: 0, High: 1, Medium: 2, Low: 3 };
    const groups = Object.values(byComp).sort((a, b) => {
      const aMax = Math.min(...a.alerts.map(x => sevOrder[x.severity] ?? 9));
      const bMax = Math.min(...b.alerts.map(x => sevOrder[x.severity] ?? 9));
      return aMax !== bMax ? aMax - bMax : b.alerts.length - a.alerts.length;
    });

    const container = document.getElementById('cg-components');
    container.innerHTML = groups.map((g, idx) => {
      const maxSev = g.alerts.reduce((best, a) => (sevOrder[a.severity] ?? 9) < (sevOrder[best] ?? 9) ? a.severity : best, 'Low');
      const collapseId = `cg-comp-${idx}`;
      const cveRows = g.alerts.map(a => {
        const cveUrl = a.id.startsWith('GHSA-') ? `https://github.com/advisories/${esc(a.id)}` : `https://nvd.nist.gov/vuln/detail/${esc(a.id)}`;
        return `<tr><td><a href="${cveUrl}" target="_blank">${esc(a.id)}</a></td><td class="${sevClass(a.severity)}">${esc(a.severity)}</td></tr>`;
      }).join('');
      const pathList = [...g.paths].sort().map(p => `<code class="small d-block">${esc(p)}</code>`).join('');
      return `
        <div class="card mb-2">
          <div class="card-header bg-white finding-header d-flex align-items-center py-2" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
            <span class="status-pill ${sevClass(maxSev)} me-2" style="font-size:0.7rem;padding:1px 6px;">${esc(maxSev)}</span>
            <strong class="me-2">${esc(g.component)}</strong>
            <span class="badge bg-secondary me-2">${g.alerts.length} CVE${g.alerts.length > 1 ? 's' : ''}</span>
            <span class="text-muted small me-auto">${[...g.branches].join(', ')}</span>
            <i class="bi bi-chevron-down ms-2"></i>
          </div>
          <div class="collapse" id="${collapseId}">
            <div class="card-body py-2">
              ${pathList ? `<div class="mb-2"><strong class="small">Found at:</strong><br>${pathList}</div>` : ''}
              <table class="table table-sm cve-table mb-2">
                <thead><tr><th>CVE/Advisory</th><th>Severity</th></tr></thead>
                <tbody>${cveRows}</tbody>
              </table>
              <div class="text-muted small">Pipelines: ${[...g.pipelines].join(', ')}</div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // Pipelines
  const pipes = cg.pipelines || [];
  if (pipes.length > 0) {
    document.getElementById('cg-pipelines').innerHTML = `<i class="bi bi-gear me-1"></i>Scanned: ${pipes.map(p =>
      `<a href="https://dev.azure.com/devdiv/DevDiv/_build?definitionId=${p.id}" target="_blank">${esc(p.name)}</a>`
    ).join(', ')}`;
  }
}

// Boot
document.addEventListener('DOMContentLoaded', () => {
  if (typeof DATA === 'undefined') { document.body.innerHTML = '<p class="p-4 text-danger">No DATA found. JSON not injected.</p>'; return; }
  const d = DATA;
  const cgTotal = d.cgAlerts ? (d.cgAlerts.totalAlerts || 0) : 0;
  const crTotal = d.chromeReleases ? (d.chromeReleases.skiaRelevantCves || 0) : 0;
  const subtitleParts = [`${d.meta.date}`, `Skia m${d.meta.skiaMilestone}`, `${d.summary.totalCves} CVEs`];
  if (cgTotal > 0) subtitleParts.push(`${cgTotal} CG alerts`);
  if (crTotal > 0) subtitleParts.push(`${crTotal} Chrome blog CVEs`);
  document.getElementById('header-subtitle').textContent = subtitleParts.join(' · ');
  document.getElementById('header-badges').innerHTML =
    `<span class="badge bg-${d.summary.highestSeverity === 'CRITICAL' ? 'danger' : d.summary.highestSeverity === 'HIGH' ? 'warning' : 'info'}">${d.summary.highestSeverity}</span>`;
  renderSummary(d.summary, d.cgAlerts);
  renderOverview(d.versionVerification, d.findings, d.cgAlerts);
  const container = document.getElementById('findings-container');
  container.innerHTML = d.findings.map((f, i) => renderFinding(f, i)).join('');
  renderNextSteps(d.nextSteps);
  if (d.cgAlerts) renderCgAlerts(d.cgAlerts);
  if (d.chromeReleases) renderChromeReleases(d.chromeReleases, d.meta.skiaMilestone);
  renderUpstream(d.meta);
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
