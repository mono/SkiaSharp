parameters:
  - name: buildAgentHost
    type: object

stages:
  - stage: prepare
    displayName: Prepare Build
    jobs:
      - job: prepare
        displayName: Prepare Build
        pool: ${{ parameters.buildAgentHost.pool }}
        steps:
          - checkout: self
            submodules: false
            fetchDepth: 1
          - pwsh: ./scripts/infra/native/shared/set-build-variables.ps1 -UpdateBuildNumber
            displayName: Configure build variables
          - bash: python3 scripts/infra/caching/repo-deps.py validate
            displayName: Validate cache config coverage
          - bash: |
              BASE=""
              if [ -n "$SYSTEM_PULLREQUEST_TARGETBRANCH" ]; then
                TARGET=$(echo "$SYSTEM_PULLREQUEST_TARGETBRANCH" | sed 's|refs/heads/||')
                git fetch origin "$TARGET" --depth=1 2>/dev/null
                BASE="origin/$TARGET"
              fi
              python3 scripts/infra/caching/repo-deps.py cache-key \
                --job all --name prepare ${BASE:+--base "$BASE"}
            displayName: Show dependency tree
