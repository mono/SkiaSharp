parameters:
  - name: buildAgentHost
    type: object

stages:
  - stage: prepare
    displayName: Prepare Build
    jobs:
      - job: prepare
        displayName: Prepare Build
        pool: ${{ parameters.buildAgentHost.pool }}
        steps:
          - checkout: self
            submodules: false
            fetchDepth: 1
          - pwsh: ./scripts/infra/native/shared/set-build-variables.ps1 -UpdateBuildNumber
            displayName: Configure build variables
          - bash: python3 scripts/infra/caching/repo-deps.py validate
            displayName: Validate cache config coverage
          - bash: python3 scripts/infra/caching/repo-deps.py analyze
            displayName: Analyze jobs to run
