parameters:
  - name: buildAgentLinuxNative
    type: object
  - name: use1ESPipelineTemplates
    type: boolean
  - name: enableCaching
    type: boolean
    default: false

stages:

  - stage: native_linux
    displayName: Native Linux
    dependsOn: prepare
    jobs:

      - template: /scripts/azure-templates-jobs-linux-matrix.yml@self # Build Native Linux (Linux)
        parameters:
          enableCaching: ${{ parameters.enableCaching }}
          buildAgent: ${{ parameters.buildAgentLinuxNative }}
          use1ESPipelineTemplates: ${{ parameters.use1ESPipelineTemplates }}
          builds:
            - name: ''
              additionalArgs: --verifyIncluded=fontconfig
            - name: nodeps
              desc: 'No Deps'
              additionalArgs: --verifyExcluded=fontconfig
              gnArgs: skia_use_fontconfig=false
          matrix:
            # Azure Linux + loongarch64 cross-package extraction (gcc-14, glibc 2.38).
            # loongarch64 has no Debian binary archive — uses its own Dockerfile.
            - arch: loongarch64
              docker: scripts/infra/native/linux/docker/loongarch64
              target: externals-linux-clang-cross
              additionalArgs: --verifyGlibcMax=2.38
              dockerArgs: --build-arg SYSROOT_RELEASE=trixie
            # Azure Linux + Trixie sysroot (gcc-14, glibc 2.38) - for archs that
            # need GCC 14 (lld 18 is incompatible with GCC 10's static libstdc++.a
            # on riscv64 due to .eh_frame discarded-section errors).
            - arch: riscv64
              docker: scripts/infra/native/linux/docker/glibc
              target: externals-linux-clang-cross
              additionalArgs: --verifyGlibcMax=2.38
              dockerArgs: --build-arg SYSROOT_RELEASE=trixie
            # Azure Linux + Bullseye sysroot (gcc-10, glibc 2.31).
            - ${{ each arch in split('arm,arm64,x86,x64', ',') }}:
              - arch: ${{ arch }}
                docker: scripts/infra/native/linux/docker/glibc
                target: externals-linux-clang-cross
                additionalArgs: --verifyGlibcMax=2.31
                dockerArgs: --build-arg SYSROOT_RELEASE=bullseye
            - ${{ each arch in split('arm,arm64,x64,riscv64,loongarch64', ',') }}: # removed x86 as it is having issues building
              - arch: ${{ arch }}
                variant: alpine
                docker: scripts/infra/native/linux/docker/alpine
                target: externals-linux-clang-cross

      - template: /scripts/azure-templates-jobs-linux-matrix.yml@self # Build Native Linux (Bionic)
        parameters:
          enableCaching: ${{ parameters.enableCaching }}
          buildAgent: ${{ parameters.buildAgentLinuxNative }}
          use1ESPipelineTemplates: ${{ parameters.use1ESPipelineTemplates }}
          builds:
            - name: ''
              additionalArgs: --verifyExcluded=fontconfig
          matrix:
            - ${{ each arch in split('arm64,x64', ',') }}:
              - arch: ${{ arch }}
                variant: bionic
                docker: scripts/infra/native/linux/docker/bionic

