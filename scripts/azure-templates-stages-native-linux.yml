parameters:
  - name: buildAgentLinuxNative
    type: object
  - name: use1ESPipelineTemplates
    type: boolean
  - name: enableCaching
    type: boolean
    default: false

stages:

  - stage: native_linux
    displayName: Native Linux
    dependsOn: prepare
    jobs:

      - template: /scripts/azure-templates-jobs-linux-matrix.yml@self # Build Native Linux (Linux)
        parameters:
          enableCaching: ${{ parameters.enableCaching }}
          buildAgent: ${{ parameters.buildAgentLinuxNative }}
          use1ESPipelineTemplates: ${{ parameters.use1ESPipelineTemplates }}
          builds:
            - name: ''
              additionalArgs: --verifyIncluded=fontconfig
            - name: nodeps
              desc: 'No Deps'
              additionalArgs: --verifyExcluded=fontconfig
              gnArgs: skia_use_fontconfig=false
          matrix:
            # .NET official cross images (glibc)
            # verifyGlibcMax ensures we detect if the base image bumps its sysroot
            - arch: arm64
              docker: scripts/infra/native/linux/docker/glibc
              target: externals-linux-clang-cross
              additionalArgs: --verifyGlibcMax=2.27
            # x86 needs libc++ built first (the .NET team doesn't ship it for x86).
            # Uses a separate directory with a self-contained Dockerfile (multi-stage).
            - arch: x86
              docker: scripts/infra/native/linux/docker/glibc-x86
              target: externals-linux-clang-cross
              additionalArgs: --verifyGlibcMax=2.27
            - arch: arm
              docker: scripts/infra/native/linux/docker/glibc
              target: externals-linux-clang-cross
              additionalArgs: --verifyGlibcMax=2.35
            - arch: x64
              docker: scripts/infra/native/linux/docker/glibc
              target: externals-linux-clang-cross
              additionalArgs: --verifyGlibcMax=2.27
            - arch: riscv64
              docker: scripts/infra/native/linux/docker/glibc
              target: externals-linux-clang-cross
              additionalArgs: --verifyGlibcMax=2.39
            - arch: loongarch64
              docker: scripts/infra/native/linux/docker/glibc
              target: externals-linux-clang-cross
              additionalArgs: --verifyGlibcMax=2.42
            # .NET official cross images (musl/Alpine)
            - ${{ each arch in split('arm,arm64,x64,riscv64,loongarch64', ',') }}:
              - arch: ${{ arch }}
                variant: alpine
                docker: scripts/infra/native/linux/docker/alpine
                target: externals-linux-clang-cross

      - template: /scripts/azure-templates-jobs-linux-matrix.yml@self # Build Native Linux (Bionic)
        parameters:
          enableCaching: ${{ parameters.enableCaching }}
          buildAgent: ${{ parameters.buildAgentLinuxNative }}
          use1ESPipelineTemplates: ${{ parameters.use1ESPipelineTemplates }}
          builds:
            - name: ''
              additionalArgs: --verifyExcluded=fontconfig
          matrix:
            - ${{ each arch in split('arm64,x64', ',') }}:
              - arch: ${{ arch }}
                variant: bionic
                docker: scripts/infra/native/linux/docker/bionic

