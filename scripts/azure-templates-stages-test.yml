parameters:
  - name: isSplitPipeline
    type: boolean
    default: false
  - name: buildAgentHost
    type: object
  - name: buildAgentWindows
    type: object
  - name: buildAgentMac
    type: object
  - name: buildAgentLinux
    type: object
  - name: buildAgentAndroidTests
    type: object
  - name: enableCaching
    type: boolean
    default: false

stages:

    - stage: managed
      displayName: Build Managed
      ${{ if eq(parameters.isSplitPipeline, 'true') }}:
        dependsOn: prepare
      ${{ else }}:
        dependsOn: native
      jobs:
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Validate Interop
          parameters:
            name: managed_interop_windows
            displayName: Validate Interop
            buildAgent: ${{ parameters.buildAgentWindows}}
            target: externals-interop
            additionalArgs: --skipExternals="all"
            installAndroidSdk: false
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Build Managed (Windows)
          parameters:
            name: managed_windows
            displayName: Managed (Windows)
            buildAgent: ${{ parameters.buildAgentWindows}}
            target: libs
            cacheJob: managed/libs
            enableCaching: ${{ parameters.enableCaching }}
            additionalArgs: --skipExternals="all"
            requiredArtifacts:
              - name: native
            postBuildSteps:
              - pwsh: Remove-Item ./output/native/ -Recurse -Force -ErrorAction Continue
                displayName: Delete the native folder
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Build Managed (macOS)
          parameters:
            name: managed_macos
            displayName: Managed (macOS)
            buildAgent: ${{ parameters.buildAgentMac }}
            target: libs
            cacheJob: managed/libs
            enableCaching: ${{ parameters.enableCaching }}
            additionalArgs: --skipExternals="all"
            requiredArtifacts:
              - name: native
            postBuildSteps:
              - pwsh: Remove-Item ./output/native/ -Recurse -Force -ErrorAction Continue
                displayName: Delete the native folder
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Build Managed (Linux)
          parameters:
            name: managed_linux
            displayName: Managed (Linux)
            buildAgent: ${{ parameters.buildAgentLinux }}
            packages: $(MANAGED_LINUX_PACKAGES)
            target: libs
            cacheJob: managed/libs
            enableCaching: ${{ parameters.enableCaching }}
            additionalArgs: --skipExternals="all"
            requiredArtifacts:
              - name: native
            postBuildSteps:
              - pwsh: Remove-Item ./output/native/ -Recurse -Force -ErrorAction Continue
                displayName: Delete the native folder

    - stage: tests
      displayName: Tests
      ${{ if eq(parameters.isSplitPipeline, 'true') }}:
        dependsOn: prepare
      ${{ else }}:
        dependsOn: native
      jobs:
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Tests|netfx (Windows)
          parameters:
            name: tests_netfx_windows
            displayName: Windows (.NET Framework)
            buildAgent: ${{ parameters.buildAgentWindows}}
            target: tests-netfx
            additionalArgs: --skipExternals="all" --coverage=$(ENABLE_CODE_COVERAGE)
            installAndroidSdk: false
            shouldPublish: false
            requiredArtifacts:
              - name: native
            postBuildSteps:
              - pwsh: python3 scripts/infra/tests/extract-visual-goldens.py output/logs/testlogs --failures-out output/logs/testlogs/visual-failures
                displayName: Extract visual-regression failure images for triage
                condition: always()
              - task: PublishTestResults@2
                displayName: Publish the .NET Framework test results
                condition: always()
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: 'output/logs/testlogs/**/*.trx'
                  testRunTitle: 'Windows .NET Framework Tests'
            publishArtifacts:
              - name: testlogs_netfx_windows
                always: true
                path: 'output/logs/testlogs'
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Tests|netcore (Windows)
          parameters:
            name: tests_netcore_windows
            displayName: Windows (.NET Core)
            buildAgent: ${{ parameters.buildAgentWindows}}
            target: tests-netcore
            additionalArgs: --skipExternals="all" --coverage=$(ENABLE_CODE_COVERAGE)
            installAndroidSdk: false
            shouldPublish: false
            requiredArtifacts:
              - name: native
            postBuildSteps:
              - pwsh: python3 scripts/infra/tests/extract-visual-goldens.py output/logs/testlogs --failures-out output/logs/testlogs/visual-failures
                displayName: Extract visual-regression failure images for triage
                condition: always()
              - task: PublishTestResults@2
                displayName: Publish the .NET Core test results
                condition: always()
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: 'output/logs/testlogs/**/*.trx'
                  testRunTitle: 'Windows .NET Core Tests'
            publishArtifacts:
              - name: testlogs_netcore_windows
                always: true
                path: 'output/logs/testlogs'
              - name: coverage_netcore_windows
                path: 'output/coverage'
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Tests|netcore (macOS)
          parameters:
            name: tests_netcore_macos
            displayName: macOS (.NET Core)
            buildAgent: ${{ parameters.buildAgentMac }}
            target: tests-netcore
            additionalArgs: --skipExternals="all" --coverage=$(ENABLE_CODE_COVERAGE)
            installAndroidSdk: false
            shouldPublish: false
            requiredArtifacts:
              - name: native
            postBuildSteps:
              - pwsh: python3 scripts/infra/tests/extract-visual-goldens.py output/logs/testlogs --failures-out output/logs/testlogs/visual-failures
                displayName: Extract visual-regression failure images for triage
                condition: always()
              - task: PublishTestResults@2
                displayName: Publish the .NET Core test results
                condition: always()
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: 'output/logs/testlogs/**/*.trx'
                  testRunTitle: 'macOS .NET Core Tests'
            publishArtifacts:
              - name: testlogs_netcore_macos
                always: true
                path: 'output/logs/testlogs'
              - name: coverage_netcore_macos
                path: 'output/coverage'
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Tests|netcore (Linux)
          parameters:
            name: tests_netcore_linux
            displayName: Linux (.NET Core)
            buildAgent: ${{ parameters.buildAgentLinux }}
            # Software GL (Mesa llvmpipe) + software Vulkan (Mesa lavapipe) + a
            # virtual X server give the headless agent deterministic GPU output so
            # the visual-regression matrix can render and golden-compare ganesh-gl
            # / ganesh-vulkan here. If any of this is missing the GPU cells skip
            # (no display / no ICD), so this provisioning can only add coverage,
            # never turn the build red.
            packages: $(MANAGED_LINUX_PACKAGES) xvfb mesa-utils libgl1-mesa-dri mesa-vulkan-drivers vulkan-tools
            target: tests-netcore
            additionalArgs: --skipExternals="all" --coverage=$(ENABLE_CODE_COVERAGE)
            installAndroidSdk: false
            shouldPublish: false
            requiredArtifacts:
              - name: native
            preBuildSteps:
              - bash: |
                  set -e
                  nohup Xvfb :99 -screen 0 1280x1024x24 > /tmp/xvfb.log 2>&1 &
                  sleep 3
                  echo "Started Xvfb on :99"
                  # Expose the software-GPU environment to the test step. Forcing
                  # Mesa llvmpipe (GL) and the lavapipe ICD (Vulkan) keeps output
                  # deterministic; a wrong/absent ICD path just means the cell finds
                  # no driver and skips, so this never turns the build red.
                  echo "##vso[task.setvariable variable=DISPLAY]:99"
                  echo "##vso[task.setvariable variable=LIBGL_ALWAYS_SOFTWARE]1"
                  echo "##vso[task.setvariable variable=GALLIUM_DRIVER]llvmpipe"
                  echo "##vso[task.setvariable variable=VK_ICD_FILENAMES]/usr/share/vulkan/icd.d/lvp_icd.x86_64.json"
                  echo "##vso[task.setvariable variable=VK_DRIVER_FILES]/usr/share/vulkan/icd.d/lvp_icd.x86_64.json"
                displayName: Start Xvfb and select software GPU (visual tests)
            postBuildSteps:
              - pwsh: python3 scripts/infra/tests/extract-visual-goldens.py output/logs/testlogs --failures-out output/logs/testlogs/visual-failures
                displayName: Extract visual-regression failure images for triage
                condition: always()
              - task: PublishTestResults@2
                displayName: Publish the .NET Core test results
                condition: always()
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: 'output/logs/testlogs/**/*.trx'
                  testRunTitle: 'Linux .NET Core Tests'
            publishArtifacts:
              - name: testlogs_netcore_linux
                always: true
                path: 'output/logs/testlogs'
              - name: coverage_netcore_linux
                path: 'output/coverage'
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Tests|android (Linux)
          parameters:
            name: tests_android_linux
            displayName: Android (Linux)
            buildAgent: ${{ parameters.buildAgentAndroidTests }}
            target: tests-android
            additionalArgs: --device=android-emulator-64 --deviceVersion=$(ANDROID_TEST_DEVICE_VERSION) --skipExternals="all" --coverage=$(ENABLE_CODE_COVERAGE)
            shouldPublish: false
            installXcode: false
            dotnetWorkloads: android,maui-android
            requiredArtifacts:
              - name: native
            preBuildSteps:
              - script: |
                  echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                  sudo udevadm control --reload-rules
                  sudo udevadm trigger --name-match=kvm
                displayName: Enable KVM for Android emulator
              - script: |
                  mkdir -p "$HOME/.android/avd"
                  echo "##vso[task.setvariable variable=ANDROID_AVD_HOME]$HOME/.android/avd"
                  echo "##vso[task.setvariable variable=ANDROID_EMULATOR_HOME]$HOME/.android"
                displayName: Set Android AVD home (fix XDG path mismatch)
              - pwsh: .\scripts\infra\managed\install-android-package.ps1 -Package "emulator"
                displayName: Install the Android emulator
              - pwsh: .\scripts\infra\managed\install-android-package.ps1 -Package "system-images;android-$(ANDROID_TEST_DEVICE_VERSION);google_apis;x86_64"
                displayName: Install the Android API $(ANDROID_TEST_DEVICE_VERSION) emulator image
            postBuildSteps:
              - pwsh: python3 scripts/infra/tests/extract-visual-goldens.py output/logs/testlogs --failures-out output/logs/testlogs/visual-failures
                displayName: Extract visual-regression failure images for triage
                condition: always()
              - task: PublishTestResults@2
                displayName: Publish the Android test results
                condition: always()
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: 'output/logs/testlogs/**/*.trx'
                  testRunTitle: 'Android Tests (API $(ANDROID_TEST_DEVICE_VERSION))'
            publishArtifacts:
              - name: testlogs_android_$(ANDROID_TEST_DEVICE_VERSION)
                always: true
                path: 'output/logs/testlogs'
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Tests|ios (macOS)
          parameters:
            name: tests_ios_macos
            displayName: iOS (macOS)
            buildAgent: ${{ parameters.buildAgentMac }}
            target: tests-ios
            additionalArgs: --device=ios-simulator-64 --deviceVersion=$(IOS_TEST_DEVICE_VERSION) --skipExternals="all" --coverage=$(ENABLE_CODE_COVERAGE)
            shouldPublish: false
            requiredArtifacts:
              - name: native
            postBuildSteps:
              - pwsh: python3 scripts/infra/tests/extract-visual-goldens.py output/logs/testlogs --failures-out output/logs/testlogs/visual-failures
                displayName: Extract visual-regression failure images for triage
                condition: always()
              - task: PublishTestResults@2
                displayName: Publish the iOS test results
                condition: always()
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: 'output/logs/testlogs/**/*.trx'
                  testRunTitle: 'iOS Tests (v$(IOS_TEST_DEVICE_VERSION))'
            publishArtifacts:
              - name: testlogs_ios_$(IOS_TEST_DEVICE_VERSION)
                always: true
                path: 'output/logs/testlogs'
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Tests|maccatalyst (macOS)
          parameters:
            name: tests_maccatalyst_macos
            displayName: Mac Catalyst (macOS)
            continueOnError: true
            buildAgent: ${{ parameters.buildAgentMac }}
            target: tests-maccatalyst
            additionalArgs: --device=maccatalyst --skipExternals="all" --coverage=$(ENABLE_CODE_COVERAGE)
            installAndroidSdk: false
            shouldPublish: false
            requiredArtifacts:
              - name: native
            postBuildSteps:
              - pwsh: python3 scripts/infra/tests/extract-visual-goldens.py output/logs/testlogs --failures-out output/logs/testlogs/visual-failures
                displayName: Extract visual-regression failure images for triage
                condition: always()
              - task: PublishTestResults@2
                displayName: Publish the Mac Catalyst test results
                condition: always()
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: 'output/logs/testlogs/**/*.trx'
                  testRunTitle: 'Mac Catalyst Tests'
            publishArtifacts:
              - name: testlogs_maccatalyst
                always: true
                path: 'output/logs/testlogs'
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Tests [WASM] (Linux)
          parameters:
            name: tests_wasm_linux
            displayName: WASM (Linux)
            buildAgent: ${{ parameters.buildAgentLinux }}
            packages: $(MANAGED_LINUX_PACKAGES) ninja-build
            target: tests-wasm
            additionalArgs: --skipExternals="all" --coverage=false
            installAndroidSdk: false
            shouldPublish: false
            requiredArtifacts:
              - name: native
            installEmsdk: true
            initScript: source ~/emsdk/emsdk_env.sh
            postBuildSteps:
              - pwsh: python3 scripts/infra/tests/extract-visual-goldens.py output/logs/testlogs --failures-out output/logs/testlogs/visual-failures
                displayName: Extract visual-regression failure images for triage
                condition: always()
              - task: PublishTestResults@2
                displayName: Publish the WASM test results
                condition: always()
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: 'output/logs/testlogs/**/*.trx'
                  testRunTitle: 'Linux WASM Tests'
            publishArtifacts:
              - name: testlogs_wasm
                always: true
                path: 'output/logs/testlogs'
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Tests [WASM Preview] (Linux)
          parameters:
            # Runs the SkiaSharp.Tests.Wasm suite as the preview .NET (tests only — the rest of CI
            # stays on net10) so WASM regressions on the newer runtime, such as an exception-handling
            # mismatch in the native lib, fail CI. installPreviewSdk provisions the preview SDK +
            # wasm-tools workload (which bundles the matching emscripten) and pins global.json to it.
            name: tests_wasm_preview_linux
            displayName: WASM Preview (Linux)
            buildAgent: ${{ parameters.buildAgentLinux }}
            packages: $(MANAGED_LINUX_PACKAGES) ninja-build
            target: tests-wasm
            additionalArgs: --skipExternals="all" --coverage=false --previewtfm=true
            installAndroidSdk: false
            shouldPublish: false
            installPreviewSdk: true
            previewWorkloads: wasm-tools,android
            requiredArtifacts:
              - name: native
            postBuildSteps:
              - task: PublishTestResults@2
                displayName: Publish the WASM preview test results
                condition: always()
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: 'output/logs/testlogs/**/*.trx'
                  testRunTitle: 'Linux WASM Preview Tests'
            publishArtifacts:
              - name: testlogs_wasm_preview
                always: true
                path: 'output/logs/testlogs'
        # TODO: add tests for linux no dependencies

        # --- Containerized test legs (run by default, non-gating) -----------------------------
        # Run the console test suite INSIDE a container using the standard bootstrapper `docker:`
        # feature: it builds the env image with the approved Docker@2 task, then runs
        # `dotnet cake --target=tests-container` against the mounted repo. The native library comes
        # from the merged `native` artifact (requiredArtifacts) — never externals-download — and
        # `--nativePlatform` makes the build copy ONLY that platform's library (a real swap via the
        # SkiaSharp/HarfBuzzSharp NativePlatform MSBuild property). Legs are non-gating
        # (continueOnError) while the known-failure baseline is established, but they run by default.
        # (These legs intentionally do NOT flow use1ESPipelineTemplates: tests never run on the 1ES
        # pipeline, and should fail loudly if they ever do.)
        # See documentation/dev/containerized-testing.md.
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Tests|container (Linux glibc)
          parameters:
            name: tests_container_linux
            displayName: Container (Linux)
            buildAgent: ${{ parameters.buildAgentLinux }}
            docker: scripts/infra/tests/docker/glibc
            target: tests-container
            additionalArgs: --nativePlatform=linux
            installAndroidSdk: false
            installXcode: false
            shouldPublish: false
            continueOnError: true          # NON-GATING until a known-failure baseline is agreed
            requiredArtifacts:
              - name: native               # -> output/native/linux/<arch>/libSkiaSharp.so (never externals-download)
            postBuildSteps:
              - task: PublishTestResults@2
                displayName: Publish the Linux container test results
                condition: always()
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: 'output/logs/testlogs/**/*.trx'
                  testRunTitle: 'Linux Container Tests'
            publishArtifacts:
              - name: testlogs_container_linux
                always: true
                path: 'output/logs/testlogs'
        # Linux Alpine (musl). Same feature, against the musl native build (--nativePlatform=alpine).
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Tests|container (Linux Alpine)
          parameters:
            name: tests_container_alpine_linux
            displayName: Container (Alpine)
            buildAgent: ${{ parameters.buildAgentLinux }}
            docker: scripts/infra/tests/docker/alpine
            target: tests-container
            additionalArgs: --nativePlatform=alpine
            installAndroidSdk: false
            installXcode: false
            shouldPublish: false
            continueOnError: true          # NON-GATING until a known-failure baseline is agreed
            requiredArtifacts:
              - name: native               # -> output/native/alpine/<arch>/libSkiaSharp.so (never externals-download)
            postBuildSteps:
              - task: PublishTestResults@2
                displayName: Publish the Alpine container test results
                condition: always()
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: 'output/logs/testlogs/**/*.trx'
                  testRunTitle: 'Alpine Container Tests'
            publishArtifacts:
              - name: testlogs_container_alpine
                always: true
                path: 'output/logs/testlogs'
        # Windows Nano Server. REQUIRES a Windows agent with container support. It builds AND runs
        # the suite in the Nano Server .NET SDK image (no system fonts — the environment under test),
        # against the nanoserver native build (--nativePlatform=nanoserver). Known font-related
        # failures are expected — hence non-gating.
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Tests|container (Nano Server)
          parameters:
            name: tests_container_nanoserver_windows
            displayName: Container (Nano Server)
            buildAgent: ${{ parameters.buildAgentWindows }}
            docker: scripts/infra/tests/docker/nanoserver
            target: tests-container
            additionalArgs: --nativePlatform=nanoserver
            installAndroidSdk: false
            installXcode: false
            shouldPublish: false
            continueOnError: true          # NON-GATING (known font-related failures are expected)
            requiredArtifacts:
              - name: native               # -> output/native/nanoserver/x64/libSkiaSharp.dll (never externals-download)
            postBuildSteps:
              - task: PublishTestResults@2
                displayName: Publish the Nano Server container test results
                condition: always()
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: 'output/logs/testlogs/**/*.trx'
                  testRunTitle: 'Nano Server Container Tests'
            publishArtifacts:
              - name: testlogs_container_nanoserver
                always: true
                path: 'output/logs/testlogs'

        - job: coverage_reports                      # Coverage Reports
          displayName: Coverage Reports
          pool: ${{ parameters.buildAgentHost.pool }}
          dependsOn:
            - tests_netcore_windows
            - tests_netcore_macos
            - tests_netcore_linux
          steps:
            - checkout: self
            - pwsh: ./scripts/infra/native/shared/set-build-variables.ps1
              displayName: Configure build variables
            - task: DownloadBuildArtifacts@1
              displayName: Download the coverage_netcore_windows artifact
              inputs:
                artifactName: coverage_netcore_windows
                downloadPath: output
            - task: DownloadBuildArtifacts@1
              displayName: Download the coverage_netcore_macos artifact
              inputs:
                artifactName: coverage_netcore_macos
                downloadPath: output
            - task: DownloadBuildArtifacts@1
              displayName: Download the coverage_netcore_linux artifact
              inputs:
                artifactName: coverage_netcore_linux
                downloadPath: output
            - task: PublishCodeCoverageResults@1
              displayName: 'Publish the code coverage results'
              inputs:
                codeCoverageTool: Cobertura
                summaryFileLocation: 'output/**/Cobertura.xml'

    - stage: samples
      displayName: Samples
      ${{ if eq(parameters.isSplitPipeline, 'true') }}:
        dependsOn: prepare
      ${{ else }}:
        dependsOn: package
      jobs:
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Build Samples (Windows)
          parameters:
            name: samples_windows
            displayName: Windows
            buildAgent: ${{ parameters.buildAgentWindows}}
            target: samples
            requiredArtifacts:
              - name: nuget
                dir: nugets
            postBuildSteps:
              - pwsh: Remove-Item ./output/nugets/ -Recurse -Force -ErrorAction Continue
                displayName: Delete the nugets folder
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Build Samples (macOS)
          parameters:
            name: samples_macos
            displayName: macOS
            buildAgent: ${{ parameters.buildAgentMac }}
            target: samples
            installNinja: true
            shouldPublish: false
            requiredArtifacts:
              - name: nuget
                dir: nugets
        - template: /scripts/azure-templates-jobs-bootstrapper.yml@self # Build Samples (Linux)
          parameters:
            name: samples_linux
            displayName: Linux
            buildAgent: ${{ parameters.buildAgentLinux }}
            packages: $(MANAGED_LINUX_PACKAGES)
            target: samples
            shouldPublish: false
            requiredArtifacts:
              - name: nuget
                dir: nugets
            installEmsdk: true
            initScript: source ~/emsdk/emsdk_env.sh
